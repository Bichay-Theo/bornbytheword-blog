name: Daily Archive Publisher

on:
  schedule:
    - cron: '0 10 * * *' # 10:00 UTC (1:00 PM Cairo/Mecca time)
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  tweet_archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the history file back
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Post Daily Archive to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: node scripts/postDailyArchive.js

      - name: Commit tweet history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status -s data/tweet-history.json) ]]; then
            git add data/tweet-history.json
            git commit -m "chore: update daily archive tweet history"
            git push
          else
            echo "No changes to commit."
          fi
