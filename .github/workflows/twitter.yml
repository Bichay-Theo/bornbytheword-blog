name: Auto Publish to Twitter

on:
  push:
    branches:
      - main
    paths:
      - 'content/posts/**.md'

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Needed to get diff of last commit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Get added articles
        id: changed-files
        run: |
          ADDED_FILES=$(git diff --name-only --diff-filter=A HEAD^ HEAD | grep '^content/posts/.*\.md$' | tr '\n' ' ' || true)
          echo "ADDED_FILES=$ADDED_FILES" >> $GITHUB_ENV

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: |
          for file in $ADDED_FILES; do
            if [ -n "$file" ]; then
              echo "Processing $file..."
              node scripts/postToTwitter.js "$file"
            fi
          done
