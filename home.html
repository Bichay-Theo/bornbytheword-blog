خيرة حيث يُفرز الخير من الشر. «هكَذَا يَكُونُ فِي انْقِضَاءِ الْعَالَمِ: يَخْرُجُ الْمَلاَئِكَةُ وَيُفْرِزُونَ الأَشْرَارَ مِنْ بَيْنِ الأَبْرَارِ،» [متى ١٣ : ٤٩]. «فَكَمَا يُجْمَعُ الزَّوَانُ وَيُحْرَقُ بِالنَّارِ، هكَذَا يَكُونُ فِي انْقِضَاءِ هذَا الْعَالَمِ.» [متى ١٣ : ٤٠]. ولذلك، لا يوجد أي سبب وجيه للاعتقاد بأن هذا ليس هو ما يسأل عنه التلاميذ وما يشير إليه يسوع في إجابته. إن المنتهى الذي سيأتي عندما يصل الإنجيل إلى الأمم هو الدينونة الشاملة، حين يُفرز الخير من الشر. وهذا المنتهى ليس مجرد إشارة إلى عام ٧٠ م.\u003c/p\u003e\n\u003ch4\u003e٢. المنتهى ليس بعد، والارسالية لم تنجز\u003c/h4\u003e\n\u003cp\u003eفي المأمورية العظمى الواردة في [متى ٢٨ : ١٩-٢٠]، يحول يسوع وعد [متى ٢٤ : ١٤] إلى وصية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاذْهَبُوا وَتَلْمِذُوا جَمِيعَ الأُمَمِ وَعَمِّدُوهُمْ بِاسْمِ الآبِ وَالابْنِ وَالرُّوحِ الْقُدُسِ. وَعَلِّمُوهُمْ أَنْ يَحْفَظُوا جَمِيعَ مَا أَوْصَيْتُكُمْ بِهِ. وَهَا أَنَا مَعَكُمْ كُلَّ الأَيَّامِ إِلَى انْقِضَاءِ الدَّهْرِ. آمِينَ.» [متى ٢٨ : ١٩-٢٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوهنا مرة أخرى نجد مصطلح \"انقضاء الدهر\"، وهو المصطلح عينه الذي يسأل عنه التلاميذ في [متى ٢٤ : ٣] (συντελείας τοῦ αἰῶνος - synteleias tou aiōnos) والذي يلمح إليه يسوع في [متى ٢٤ : ١٤]: \"ثم يأتي المنتهى.\" غير أنه هنا، في [متى ٢٨ : ٢٠]، تستمر الإرسالية إلى \"انقضاء الدهر\" ذاته، والذي يتميز، لا بدمار أورشليم، بل بالدينونة الشاملة ([متى ١٣ : ٤٠، ٤٩]).\u003c/p\u003e\n\u003cp\u003eولذلك، فإن \"المنتهى\" الذي يعد يسوع بأنه سيأتي حين يبلغ الإنجيل أقصى امتداد وعمق له، هو \"المنتهى\" الذي لم يأت بعد، لأن الإرسالية لا تزال جارية. وهي مسنودة بوعد الرب بأن يكون معنا إلى الانقضاء. وحين تكتمل، سيأتي المنتهى. أي، سيأتي الرب.\u003c/p\u003e\n\u003ch4\u003e٣. في عام ٧٠ م، لم يكن المنتهى قد حل بعد\u003c/h4\u003e\n\u003cp\u003eفي [متى ٢٤ : ٦]، يقول يسوع: «وَسَوْفَ تَسْمَعُونَ بِحُرُوبٍ وَأَخْبَارِ حُرُوبٍ. اُنْظُرُوا، لاَ تَرْتَاعُوا. لأَنَّهُ لاَ بُدَّ أَنْ تَكُونَ هذِهِ كُلُّهَا، وَلكِنْ لَيْسَ الْمُنْتَهَى بَعْدُ.» وأنا أرى أن هذا \"المنتهى\" هو ذاته \"المنتهى\" المذكور في العددين ٣ و ١٤ (رغم أن الكلمة اليونانية عينها لا تُستخدم في كليهما). غير أن يسوع يقول هنا في العدد ٦ إن الحروب لن تعني حلول المنتهى. والمعنى الطبيعي هو أن هذا يشمل الحرب ضد أورشليم في عام ٧٠ م.\u003c/p\u003e\n\u003cp\u003eوهكذا، فكأن يسوع يقول جوهريا: \"حين ترون أهوال الحرب ضد أورشليم، لا ترتاعوا. فليس المنتهى بعد.\" [متى ٢٤ : ٦]. ولذلك، فإن \"المنتهى\" ليس هو عام ٧٠ م. وعليه، فإن كلمات [متى ٢٤ : ١٤] («وَيُكْرَزُ بِبِشَارَةِ الْمَلَكُوتِ هذِهِ فِي كُلِّ الْمَسْكُونَةِ شَهَادَةً لِجَمِيعِ الأُمَمِ. ثُمَّ يَأْتِي الْمُنْتَهَى.») لا تشير إلى عام ٧٠ م باعتباره المنتهى، بل بالأحرى إلى انقضاء هذا الدهر، والذي يبلغ ذروته في المجيء الثاني.\u003c/p\u003e\n\u003cp\u003eلذا أستنتج أن وعد [متى ٢٤ : ١٤] يعني أن المأمورية العظمى ستُطاع إلى انقضاء هذا الدهر الحاضر، وحين تكتمل، سيرجع المسيح.\u003c/p\u003e\n\u003ch3\u003eمن الصعب إدراك اكتمال المأمورية العظمى\u003c/h3\u003e\n\u003cp\u003eلقد حاولت في مؤلفات أخرى تحديد طبيعة ونطاق \"جميع الأمم\" في [متى ٢٤ : ١٤] و (٢٨ : ١٩). وبعبارة أخرى، لقد صارعت مع الكيفية التي سيبدو عليها اكتمال المأمورية العظمى.\u003ca href=\"#ch17-fn-6\"\u003e[٦]\u003c/a\u003e ولكن، وبناء على ما يقرب من خمسين صفحة من الصراع الفكري، فإن استنتاجي غير مرض لأي شخص يأمل في أن نتمكن من استخدام تقدم الكرازة العالمية للتنبؤ بوقت رجوع الرب. فعلى سبيل المثال، كتبت قائلا: \"بل إن المغزى هو أنه طالما لم يرجع الرب بعد، فلا بد أن يكون هناك المزيد من المجموعات العرقية التي يجب الوصول إليها، ويجب علينا أن نواصل السعي للوصول إليهم.\"\u003ca href=\"#ch17-fn-7\"\u003e[٧]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eالتعديل الوحيد الذي سأجريه على تلك الجملة اليوم هو إضافة أن اكتمال المأمورية العظمى يشمل مدى الكرازة والطاعة داخل المجموعات العرقية، وليس مجرد الوصول إلى مجموعات جديدة. وهذا هو مغزى [بطرس الثانية ٣ : ٩]، التي تُعلِّم بأن المجيء الثاني يتأخر من أجل اكتمال جمع المختارين.\u003ca href=\"#ch17-fn-8\"\u003e[٨]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eولذلك، تُعلِّمنا [متى ٢٤ : ١٤] أن كل تقدم للإنجيل هو في آن واحد تشجيع بأن الرب يقترب، وحافز \"لطلب سرعة\" مجيئه [بطرس الثانية ٣ : ١٢] من خلال تكريس طاقة هائلة للكرازة العالمية.\u003c/p\u003e\n\u003ch3\u003eما الذي سيحدث قبل مجيء المسيح؟\u003c/h3\u003e\n\u003cp\u003eمن بين جميع الأحداث المؤدية إلى المجيء الثاني، هناك حدثان أكثر تحديدا من غيرهما: ظهور إنسان الخطية [تسالونيكي الثانية ٢ : ٣] والأحداث الكونية الموصوفة في [متى ٢٤ : ٢٩-٣٠].\u003ca href=\"#ch17-fn-9\"\u003e[٩]\u003c/a\u003e ويصف يسوع الأحداث الكونية هكذا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلِلْوَقْتِ بَعْدَ ضِيقِ تِلْكَ الأَيَّامِ تُظْلِمُ الشَّمْسُ، وَالْقَمَرُ لاَ يُعْطِي ضَوْءَهُ، وَالنُّجُومُ تَسْقُطُ مِنَ السَّمَاءِ، وَقُوَّاتُ السَّمَاوَاتِ تَتَزَعْزَعُ. وَحِينَئِذٍ تَظْهَرُ عَلاَمَةُ ابْنِ الإِنْسَانِ فِي السَّمَاءِ. وَحِينَئِذٍ تَنُوحُ جَمِيعُ قَبَائِلِ الأَرْضِ، وَيُبْصِرُونَ ابْنَ الإِنْسَانِ آتِيًا عَلَى سَحَابِ السَّمَاءِ بِقُوَّةٍ وَمَجْدٍ كَثِيرٍ.» [متى ٢٤ : ٢٩-٣٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأفهم هذه الأحداث الكونية على أنها أحداث فلكية حقيقية، تماما كما أن مجيء المسيح هو حدث جسدي، ومكاني، ومرئي، ومسموع حقيقي. فمع تجسد يسوع المسيح في لحم ودم حقيقيين، ومع القيامة في جسد أكل سمكا وأظهر جروحا، ومع صعود ذلك الجسد على سحاب حقيقي، ومع الوعد بمجيء ذلك الجسد المجيد إلى أرض حقيقية، ينبغي لنا أن نكون بطيئين في اعتبار العلامات المرافقة للمجيء الثاني على أنها استعارات مجازية. فيسوع والرسل لا يقدمون أي تلميح بأنهم لا يصفون واقعا فلكيا كونيا.\u003ca href=\"#ch17-fn-10\"\u003e[١٠]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eومن الطريقة التي يصف بها يسوع أحداث [متى ٢٤ : ٢٩-٣٠]، يبدو أنها تقع في تزامن مباشر مع ظهور المسيح. ولا يبدو أن هذه العلامات تقع بوقت كاف قبل مجيئه بحيث يمكن استخدامها لحساب قرب وصوله. بل إنها تحدث عند مجيئه. لست أعلم كيف ستكون الشمس المظلمة (ما مدى ظلمتها؟)، أو القمر الذي لا يعطي ضوءه (كسوف؟)، أو النجوم التي تسقط (تختفي — أم نيازك؟)، أو قوات السماوات التي تتزعزع. ولست أعلم ما هي \"علامة ابن الإنسان\"، لكن يبدو أنها متزامنة فعليا مع ظهور المسيح.\u003c/p\u003e\n\u003cp\u003eلذلك، فإن هذه الأحداث الكونية لا تخبرنا متى سيأتي المنتهى. بل تخبرنا أنه قد حل الآن. يقول يسوع إن التجليات الكونية ستعلن ظهوره كالبرق: «لأَنَّهُ كَمَا أَنَّ الْبَرْقَ يَخْرُجُ مِنَ الْمَشَارِقِ وَيَظْهَرُ إِلَى الْمَغَارِبِ، هكَذَا يَكُونُ أَيْضًا مَجِيءُ ابْنِ الإِنْسَانِ.» [متى ٢٤ : ٢٧].\u003c/p\u003e\n\u003ch3\u003eلا مبرر لافتراض أنه ليس قريبا\u003c/h3\u003e\n\u003cp\u003eنحن لا نعلم كم من الوقت يجب أن ينقضي قبل أن يأتي يسوع. لنجعل هذا واضحا جليا. نحن لا نعلم. ونخطئ إن قلنا غير ذلك. غير أننا قد نخطئ في الاتجاه المعاكس أيضا — حين نفترض ونتجاسر بالظن أنه لا بد ألا يكون قريبا. لعلكم تذكرون أنني صرحت سابقا بأنه لا يوجد لدينا أي مبرر لنتيقن من أن مجيء المسيح يبعد عنا أكثر من بضع سنوات. ولأكون واضحا، أنا لا أعلم ما إذا كان المسيح سيعود بعد ست سنوات أو ستين عاما أو ستمائة عام. بل ما أقوله هنا هو أنه لا يوجد لدى أي شخص مبرر كتابي لليقين بأن يسوع يبعد عنا أكثر من سنوات قليلة جدا، كخمس أو ست سنوات. وقد يكون أقرب من ذلك.\u003c/p\u003e\n\u003ch3\u003eإنسان الخطية لم يأت بعد\u003c/h3\u003e\n\u003cp\u003eلماذا أقول ذلك؟ لقد قال بولس إن إنسان الخطية سيكون قابلا للتمييز بدرجة تكفي لنعلم أنه لم يأت بعد. وإلا فإن حجته في [تسالونيكي الثانية ٢ : ٣] تنهار: «لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي [يوم مجيء الرب] إِنْ لَمْ... يُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ.» فالحجة هي كالتالي: يمكنك تجنب الانخداع بأن الرب قد جاء بالفعل، من خلال إدراكك أن إنسان الخطية لم يأت بعد. فمجيئه قابل للتمييز. ويمكنك أن تعلم حينما يأتي.\u003c/p\u003e\n\u003cp\u003eوحقيقة أن تاريخ الكنيسة متخم بالتعريفات الخاطئة لإنسان الخطية لا تناقض نقطة بولس. فما نحتاج إليه ليس رفض تعليم بولس لتجنب إساءة استخدامه، بل بالأحرى تحسين تعليمنا حول ما قصده بولس.\u003c/p\u003e\n\u003ch3\u003eلماذا خمس إلى سبع سنوات؟\u003c/h3\u003e\n\u003cp\u003eلماذا قلت إنه لا يوجد لدينا في أي وقت مبرر للاعتقاد بأن مجيء المسيح يبعد عنا أكثر من بضع سنوات، لنقل خمس أو ست سنوات؟ إليكم استدلالي. بناء على كل الحسابات تقريبا، فإن إنسان الخطية لن يدوم طويلا قبل أن يبيده الرب يسوع بمجيئه. يقول بولس: «...وَحِينَئِذٍ سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ، وَيُبْطِلُهُ بِظُهُورِ مَجِيئِهِ.» [تسالونيكي الثانية ٢ : ٨]. فهو يبقى على قيد الحياة فترة كافية ليفعل ما يقول بولس إنه سيفعله: «الْمُقَاوِمُ وَالْمُرْتَفِعُ عَلَى كُلِّ مَا يُدْعَى إِلهًا أَوْ مَعْبُودًا، حَتَّى إِنَّهُ يَجْلِسُ فِي هَيْكَلِ اللهِ كَإِلهٍ، مُظْهِرًا نَفْسَهُ أَنَّهُ إِلهٌ.» [تسالونيكي الثانية ٢ : ٤]. غير أن ملكه المتبجح لا يمكن أن يكون طويلا، لأن صعوده إلى سدة البروز وإبادته بمجيء الرب يوصفان وكأنهما حدث واحد تقريبا: «...سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ... يُبْطِلُهُ بِظُهُورِ مَجِيئِهِ.» [تسالونيكي الثانية ٢ : ٨].\u003c/p\u003e\n\u003cp\u003eاجمع هذه الحقيقة مع حقيقة أن إنسان الخطية يمكن أن يبرز بأهمية عالمية بسرعة فائقة. فلا ينبغي لنا أن نفكر فقط بلغة العمليات الطبيعية العادية التي تؤدي إلى صعوده، بل وأيضا بالعمليات الخارقة للطبيعة وغير العادية — الشيطانية منها والإلهية على حد سواء. يقول بولس: «الَّذِي مَجِيئُهُ بِعَمَلِ الشَّيْطَانِ، بِكُلِّ قُوَّةٍ، وَبِآيَاتٍ وَعَجَائِبَ كَاذِبَةٍ» [تسالونيكي الثانية ٢ : ٩]. ثم يضيف: «وَلأَجْلِ هذَا سَيُرْسِلُ إِلَيْهِمُ اللهُ عَمَلَ الضَّلاَلِ، حَتَّى يُصَدِّقُوا الْكَذِبَ،» [تسالونيكي الثانية ٢ : ١١]. ومن السهل تخيل أن مثل هذه القوة الإلهية والشيطانية، المصحوبة بآيات وعجائب خارقة للطبيعة، قد تسيطر على ملايين البشر عالميا في غضون بضعة أشهر.\u003c/p\u003e\n\u003cp\u003eولذلك، وبالجمع بين قصر المدة المحتملة من أية لحظة في التاريخ وحتى بروز إنسان الخطية (ربما أشهر وليس سنوات)، وبين قصر مدة هيمنته قبل أن يبيده الرب بمجيئه،\u003ca href=\"#ch17-fn-11\"\u003e[١١]\u003c/a\u003e استنتج أنه لا يوجد لدينا في أي وقت مبرر للقول بثقة إن الرب يبعد عنا أكثر من سنوات قليلة جدا، لنقل خمس أو ست سنوات. وقد تكون المدة أقصر بكثير. وينبغي لسيادة الله على إنسان الخطية وعلى الارتداد النهائي في الكنيسة أن تحرسنا من ظننا أننا نعلم كم من الوقت تستغرق هذه الأحداث لتقع. وكما قال يسوع، فإن الافتراض المسبق بإبطاء محدد هو حماقة انتحارية [متى ٢٤ : ٢٤-٥١].\u003c/p\u003e\n\u003cp\u003eتأكد من أنك تفهم ما لا أقوله، بقدر ما تفهم ما أقوله. أنا لا أقول إن الرب سيأتي في غضون خمس أو ست سنوات. نحن لا نعلم. بل أنا أقول: لا يمكن لأحد أن يقول بثقة، وبشكل شرعي، إنه لا يمكن أن يأتي، أو أنه لن يأتي في مثل هذا الوقت القصير، أو حتى أقصر منه.\u003c/p\u003e\n\u003ch3\u003eهل ينبغي أن نتوقع رجوعا في أية لحظة؟\u003c/h3\u003e\n\u003cp\u003eها نحن قد وصلنا إلى نهاية إجابتنا ذات الخطوات الثلاث عن التساؤل: هل يُعلِّم العهد الجديد بأن يسوع قد يأتي في أية لحظة؟ إجابتي هي النفي. فيجب أن يأتي إنسان الخطية أولا [تسالونيكي الثانية ٢ : ٣]. وسيكون مجيئه قابلا للتمييز. وفي وقت كتابتي في خريف عام ٢٠٢١، لم يأت بعد. ولذلك، فإن ظهور الرب يسوع، وقت كتابتي، ربما يبعد بضعة أشهر أو سنوات. وفي وقت قراءتك، قد تكون الأمور مختلفة جدا.\u003c/p\u003e\n\u003ch3\u003eماذا عن السهر واليقظة؟\u003c/h3\u003e\n\u003cp\u003eوالآن يبرز التساؤل: كيف ينبغي لنا أن نعيش إذن؟ والأكثر إلحاحا هو التساؤل عما إذا كان غياب التوقع للمجيء في أية لحظة يضعف أو يقوض وصايا يسوع المتكررة بأن ننظر (βλέπετε - blepete) [مرقس ١٣ : ٣٣]، ونسهر (ἀγρυπνεῖτε - agrypneite) [مرقس ١٣ : ٣٣]، ونكون متيقظين (γρηγορεῖτε - grēgoreite) [مرقس ١٣ : ٣٥]، ومستعدين (γίνεσθε ἕτοιμοι - ginesthe hetoimoi) [لوقا ١٢ : ٤٠]، ونحترز (προσέχετε - prosechete) [لوقا ٢١ : ٣٤]. فهل تفترض هذه التحريضات مجيئا للرب في أية لحظة؟ إن أحد الأسباب التي يقدمها يسوع لمثل هذه اليقظة هو «لأَنَّكُمْ لاَ تَعْرِفُونَ الْيَوْمَ وَلاَ السَّاعَةَ» [متى ٢٥ : ١٣]. ستكون هذه القضية المتعلقة بالسهر واليقظة هي شاغلنا الأول في الجزء الثالث، بعد أن نُمهد الطريق في المقدمة.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-1\"\u003e[١]\u003c/a\u003e كما قال يسوع تماما: «...انْظُرُوا لاَ يُضِلَّكُمْ أَحَدٌ.» [متى ٢٤ : ٤]. وعلى غرار تحذير بولس، كان الخطر يكمن في أن ينجرف المرء في جنون وقت النهاية ويقفز إلى الاستنتاج بأن أحد المسحاء الكذبة كان حقيقيا وأن يوم الرب قد حضر. «فَإِنَّ كَثِيرِينَ سَيَأْتُونَ بِاسْمِي قَائِلِينَ: أَنَا هُوَ الْمَسِيحُ! وَيُضِلُّونَ كَثِيرِينَ.» [متى ٢٤ : ٥].\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-2\"\u003e[٢]\u003c/a\u003e انظر الفصل ٩ للتعرف على وصف شخصية وقت النهاية هذه.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-3\"\u003e[٣]\u003c/a\u003e إن هذا الفهم لحضور المستقبل هو جزء من النظرة \"الشمولية\" للمستقبل القريب والبعيد التي بسطتها في الفصل ١٤ تحت العنوان الفرعي \"قريب شموليا\".\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-4\"\u003e[٤]\u003c/a\u003e لشرح هذه المصطلحات، انظر الفصل ١٤.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-5\"\u003e[٥]\u003c/a\u003e انظر الفصل ١٦، الهامش ٥.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-6\"\u003e[٦]\u003c/a\u003e جون بايبر، لتبتهج الأمم!: سيادة الله في الإرساليات (غراند رابيدز، ميشيغان: بيكر أكاديميك، ٢٠١٠)، ١٧٧-٢٤.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-7\"\u003e[٧]\u003c/a\u003e بايبر، لتبتهج الأمم!، ٢١٢.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-8\"\u003e[٨]\u003c/a\u003e انظر الفصل ١٤، الهامش ٣.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-9\"\u003e[٩]\u003c/a\u003e لقد قدمت الحجة (في الفصل ٩ وفي وقت سابق من هذا الفصل) بأن بولس يتعامل مع الارتداد أو التمرد في الأيام الأخيرة المذكور في [تسالونيكي الثانية ٢ : ٣] كواقعة تاريخية قابلة للتمييز يمكنه الاستشهاد بها كسبب لعدم وقوع المجيء الثاني بعد: «...لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ...». لذا يمكنني إدراج هذا الحدث إلى جانب مجيء إنسان الخطية كحدث آخر يجب أن يقع قبل مجيء الرب. هذا صحيح. والسبب في أنني لا أتناول الارتداد بشكل منفصل هو أن بولس يبدو وكأنه يراه مرتبطا ارتباطا وثيقا بظهور إنسان الخطية بدلا من كونه حدثا متميزا. وفي الواقع، يبدو لي أنه بعد ذكره لكل من إنسان الخطية والارتداد في [تسالونيكي الثانية ٢ : ٣]، يتناول بعد ذلك إنسان الخطية في الأعداد ٤-٨ ثم يتناول الارتداد بشكل متكامل في الأعداد ٩-١٢. لذلك عندما أركز الآن على مجيء إنسان الخطية، فإنني أضع في اعتباري أن الارتداد هو جزء من مجيئه.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-10\"\u003e[١٠]\u003c/a\u003e إن استخدام الأنبياء لمثل هذه اللغة يأتي بانتظام في سياقات تتميز بما أسميته \"المنظور النبوي\" والذي يُتحدث فيه عن حدث قريب (مثل دمار بابل) وحدث بعيد (مثل الدينونة الشاملة) دون تمييز زمني. ولذلك، يجب على المرء أن يكون حذرا من افتراض أن الإشارة إلى إظلام النجوم والشمس (على سبيل المثال، [إشعياء ١٣ : ١٠]) هي إشارة مجازية في مثل هذا السياق، في حين أنها قد تحظى بإتمام حرفي في اليوم الأخير.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch17-ref-11\"\u003e[١١]\u003c/a\u003e قد يحسب المرء أن الضيقة العظيمة هي الأسبوع السبعون من [دانيال ٩ : ٢٤-٢٥]، وبالتالي فإن مدتها هي سبع سنوات. ثم قد يلاحظ المرء من سفر الرؤيا أن الوحش أو ضد المسيح (والذي هو على الأرجح ذاته إنسان الخطية) سيهيمن في جزء كبير من هذا الوقت. وإذا اتبعنا مسار التفكير هذا، فإن سبع سنوات هي الحد الأقصى للمدة التي سيهيمن فيها إنسان الخطية. ولكن حتى لو اتبعنا هذا المسار، فإن الأرقام غالبا ما تكون رمزية في الكتاب المقدس. وأضف إلى ذلك ما يقوله يسوع عن أيام الضيقة تلك: «وَلَوْ لَمْ تُقَصَّرْ تِلْكَ الأَيَّامُ لَمْ يَخْلُصْ جَسَدٌ. وَلكِنْ لأَجْلِ الْمُخْتَارِينَ تُقَصَّرُ تِلْكَ الأَيَّامُ.» [متى ٢٤ : ٢٢]. وفي ضوء هذا \"التقصير\" الإلهي للأيام، وفي ضوء الطابع الرمزي المتكرر للرقم سبعة، لا أعتقد أنه يمكننا القول بيقين مدى سرعة صعود إنسان الخطية، ولا كم من الوقت سيمضي قبل أن يبيده الرب. ولكن بالنظر إلى كل الأمور، لا تبدو مدة خمس إلى سبع سنوات كتقدير متهور لطول الفترة التي قد تستغرقها المرحلة من ظهوره وحتى مجيء المسيح، حين يُباد إنسان الخطية [تسالونيكي الثانية ٢ : ٨].\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh2AIK-nYOaIq1fDoATS0HI3K9it0XL1GeWrsUISiTOVaAWlPRUsltmtjZfYIFzGV9ToiL7-LYQ_bXz5q0hTRF9QrGo_QVWmqr__asZgckQTbKA3jDVbvfOPO2E35Vt5Tywd1fkn7VDsem5snT-iapEDLSS9itzWNAD5oqBFhrrxMLGffX8JV8GBpBOJ5Q/s2752/%D8%B9%D9%84%D8%A7%D9%85%D8%A7%D8%AA_%D9%85%D8%A7_%D9%82%D8%A8%D9%84_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh2AIK-nYOaIq1fDoATS0HI3K9it0XL1GeWrsUISiTOVaAWlPRUsltmtjZfYIFzGV9ToiL7-LYQ_bXz5q0hTRF9QrGo_QVWmqr__asZgckQTbKA3jDVbvfOPO2E35Vt5Tywd1fkn7VDsem5snT-iapEDLSS9itzWNAD5oqBFhrrxMLGffX8JV8GBpBOJ5Q/s600/%D8%B9%D9%84%D8%A7%D9%85%D8%A7%D8%AA_%D9%85%D8%A7_%D9%82%D8%A8%D9%84_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"16:Td5c7,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل السادس عشر\u003c/h2\u003e\n\u003cp\u003eيسوع وبولس رؤية مشتركة لمجيء المسيح\u003c/p\u003e\n\u003cp\u003eتتمثل خطوتي الثانية في إثباتي بأن العهد الجديد لا يُعلِّم بمجيء المسيح في أية لحظة، في بيان أن معظم الأحداث المتنبأ بها في [متى ٢٤] لا تقتصر على الفترة المؤدية إلى عام ٧٠ ميلادية، بل هي ذات صلة بتفسير التاريخ بأسره، مع صلة خاصة بتصاعد وتيرة التاريخ قبل مجيء الرب. وفي خضم ذلك، سنرى أن نظرة بولس للمجيء الثاني (في رسالتي تسالونيكي الأولى والثانية) هي ذاتها نظرة يسوع (لاسيما في [متى ٢٤]). وهذا بدوره سيمكننا من الانتقال إلى الخطوة الثالثة (الفصل السابع عشر)، ألا وهي، بيان بعض الأحداث التي لم تقع بعد ويجب أن تحدث قبل مجيء المسيح.\u003c/p\u003e\n\u003ch3\u003eمجيء واحد في رسالتي تسالونيكي الأولى والثانية\u003c/h3\u003e\n\u003cp\u003eأولا، يجب علينا أن ندرك أنه في رسالتي تسالونيكي الأولى والثانية، يتناول بولس مجيئا واحدا فقط للمسيح. ولا أشير هنا إلى القضية التي تناولناها في الفصل السابق والمتعلقة بالاحتمالية المزعومة لمجيء المسيح قبل الضيقة، يليه مجيء آخر بعد سبع سنوات. بل أشير إلى حقيقة أن جميع الإشارات إلى المجيء الثاني للمسيح في رسالتي تسالونيكي هما إشارات إلى الحدث عينه ([تسالونيكي الأولى ٢ : ١٩]؛ [تسالونيكي الأولى ٣ : ١٣]؛ [تسالونيكي الأولى ٤ : ١٣-١٨]؛ [تسالونيكي الأولى ٥ : ١-١١، ٢٣]؛ [تسالونيكي الثانية ١ : ٥-١٠]؛ و [تسالونيكي الثانية ٢ : ١-١٢]). وستكون هذه الحقيقة بالغة الأهمية ونحن نربط تعليم يسوع بتعليم بولس. فإذا تمكنت من إثبات أن بولس ويسوع يصوران أوقات النهاية بطرق متماثلة، فحينئذ قد يقدم كل من [متى ٢٤] ورسالتي تسالونيكي إجابة موحدة عن التساؤل: هل يُعلِّم العهد الجديد بأن هناك أحداثا لم تقع بعد ويجب أن تحدث قبل أن يرجع الرب؟\u003c/p\u003e\n\u003cp\u003eإليكم ثلاثة مؤشرات على أن بولس يضع الحدث ذاته لمجيء المسيح نصب عينيه طوال رسائله إلى تسالونيكي:\u003c/p\u003e\n\u003cp\u003e١. إن الكلمة اليونانية المفتاحية للمجيء الثاني (باروسيا - parousia)، يستخدمها بولس للمجيء الثاني في ([تسالونيكي الأولى ٢ : ١٩]؛ [تسالونيكي الأولى ٣ : ١٣]؛ [تسالونيكي الأولى ٤ : ١٥]؛ [تسالونيكي الأولى ٥ : ٢٣]؛ و[تسالونيكي الثانية ٢ : ١، ٨]). فهو لا يستخدم مفردات مختلفة لمجيئات مختلفة. بل يستخدم هذه الكلمة عينها في هذه السياقات المتنوعة لأنه يتعامل مع مجيء واحد.\u003c/p\u003e\n\u003cp\u003e٢. يستخدم بولس مصطلح \"يوم الرب\" في [تسالونيكي الأولى ٥ : ٢] للإشارة إلى اليوم الذي يجيء كلص في الليل. سيكون المؤمنون على الأرض في \"يوم الرب\" هذا، وسيكونون ساهرين (\"نسهر\"، γρηγορῶμεν - grēgorōmen، [تسالونيكي الأولى ٥ : ٦]) لكيلا يأتيهم اليوم بهلاك: «وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمُ ذلِكَ الْيَوْمُ كَلِصٍّ. جَمِيعُكُمْ أَبْنَاءُ نُورٍ وَأَبْنَاءُ نَهَارٍ.» [تسالونيكي الأولى ٥ : ٤-٥]. ولكن ذلك المصطلح عينه، \"يوم المسيح [الرب]\" [تسالونيكي الثانية ٢ : ٢]، يشير إلى \"اليوم\" [تسالونيكي الثانية ٢ : ٣] الذي فيه يُستعلن إنسان الخطية ويُبيده الرب بـ «ظُهُورِ مَجِيئِهِ» [تسالونيكي الثانية ٢ : ٨]. ولذلك، فإن مجيء الرب في [تسالونيكي الأولى ٥] والمجيء في [تسالونيكي الثانية ٢] هما المجيء عينه.\u003c/p\u003e\n\u003cp\u003e٣. إن مجيء المسيح في [تسالونيكي الثانية ١ : ٥-١٠] يكون: «مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ» [تسالونيكي الثانية ١ : ٧-٨]. لذلك فإن أولئك الذين يؤمنون بمجيء المسيح قبل الضيقة سيقولون إن هذا المجيء في [تسالونيكي الثانية ١ : ٥-١٠] ليس هو ذات المجيء المذكور في [تسالونيكي الأولى ٤ : ١٣-١٨]، حيث ينقذ يسوع جميع المؤمنين، الأحياء والأموات، من العالم قبل أن تحل تلك الدينونة النارية. ومع ذلك، فإن هذا المجيء عينه المذكور في [تسالونيكي الثانية ١ : ٦-٧] يوصف بأنه يمنح راحة للمؤمنين الذين لا يزالون على الأرض حين يأتي: «إِذْ هُوَ عَادِلٌ عِنْدَ اللهِ أَنَّ الَّذِينَ يُضَايِقُونَكُمْ يُجَازِيهِمْ ضِيقاً، وَإِيَّاكُمُ الَّذِينَ تَتَضَايَقُونَ رَاحَةً مَعَنَا، عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ».\u003c/p\u003e\n\u003cp\u003eوهذا يعني أن مجيء المسيح في [تسالونيكي الأولى ٤ : ١٣-١٨] والمجيء في [تسالونيكي الثانية ١ : ٥-١٠] هما المجيء عينه.\u003c/p\u003e\n\u003cp\u003eلذا فعندما أبرهن بأن نظرة بولس للمجيء الثاني هي ذاتها نظرة يسوع، فإنني أشير إلى تصور بولس الموحد للمجيء الثاني في رسالتيه الأولى والثانية إلى تسالونيكي.\u003c/p\u003e\n\u003ch3\u003eتصور بولس قد تشكل بتصور يسوع\u003c/h3\u003e\n\u003cp\u003eإن عدد وتحديد المتوازيات بين أوصاف بولس للمجيء الثاني وأوصاف يسوع له أمر مذهل. فأنا أرى أربع عشرة متوازية على الأقل، اعتمادا على كيفية إحصائك لها (فبعضها عبارة عن مجموعات من المتوازيات). وأجد الاستنتاج بأنه لا مفر من أن أحداث وقت النهاية التي يصفها بولس هي ذاتها التي يصفها يسوع استنتاجا لا يمكن الهروب منه.\u003c/p\u003e\n\u003cp\u003eأما عن كيفية انتقال تعاليم يسوع إلى بولس فهو أمر غير مؤكد تماما. فنحن نعلم أنه بعد وقت قصير من تجديد بولس، أمضى أسبوعين مع بطرس في أورشليم: «ثُمَّ بَعْدَ ثَلاَثِ سِنِينَ صَعِدْتُ إِلَى أُورُشَلِيمَ لأَتَعَرَّفَ بِبُطْرُسَ، فَمَكَثْتُ عِنْدَهُ خَمْسَةَ عَشَرَ يَوْماً.» [غلاطية ١ : ١٨]. ولم تكن هذه هي المرة الوحيدة التي أمضى فيها بولس وقتا مع بطرس. ففي [غلاطية ٢ : ١-١٠] يصف بولس زيارة أخرى لأورشليم، حيث أعطاه بطرس يمين الشركة [غلاطية ٢ : ٩]؛ (راجع [أعمال الرسل ١٥ : ٣]). ونحن نعلم بزيارة واحدة على الأقل لبطرس إلى أنطاكية حيث كان بولس هناك [غلاطية ٢ : ١١].\u003c/p\u003e\n\u003cp\u003eمما يعني أنه كانت هناك فرصة كافية لبولس ليتعلم من شهود العيان اللغة ذاتها التي استخدمها يسوع لوصف مجيئه الثاني، فضلا عن احتمالية تداول تقاليد شفوية أخرى أو قصاصات مكتوبة بين الكنائس.\u003c/p\u003e\n\u003cp\u003eوفيما يلي أربع عشرة متوازية بين بولس ويسوع فيما يتعلق بالطريقة التي يتحدثان بها عن المجيء الثاني.\u003c/p\u003e\n\u003ch3\u003e١. الباروسيا (Parousia)\u003c/h3\u003e\n\u003cp\u003eيصف كل من يسوع وبولس مجيء المسيح باستخدام الكلمة النمطية المعتادة (باروسيا).\u003c/p\u003e\n\u003cp\u003eرأينا سابقا أن بولس يستخدم كلمة \"باروسيا\" ست مرات في رسالتي تسالونيكي الأولى والثانية للإشارة إلى مجيء الرب ([تسالونيكي الأولى ٢ : ١٩]؛ [تسالونيكي الأولى ٣ : ١٣]؛ [تسالونيكي الأولى ٤ : ١٥]؛ [تسالونيكي الأولى ٥ : ٢٣]؛ [تسالونيكي الثانية ٢ : ١، ٨]). ويستخدم يسوع المصطلح في [متى ٢٤] ثلاث مرات (بالإضافة إلى استخدام تلاميذه له بطرحهم السؤال: «...وَمَا هِيَ عَلاَمَةُ مَجِيئِكَ وَانْقِضَاءِ الدَّهْرِ؟» [متى ٢٤ : ٣]):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ كَمَا أَنَّ الْبَرْقَ يَخْرُجُ مِنَ الْمَشَارِقِ وَيَظْهَرُ إِلَى الْمَغَارِبِ، هكَذَا يَكُونُ أَيْضاً مَجِيءُ [παρουσία - parousia] ابْنِ الإِنْسَانِ.» [متى ٢٤ : ٢٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَكَمَا كَانَتْ أَيَّامُ نُوحٍ كَذلِكَ يَكُونُ أَيْضاً مَجِيءُ [παρουσία - parousia] ابْنِ الإِنْسَانِ.» [متى ٢٤ : ٣٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلَمْ يَعْلَمُوا حَتَّى جَاءَ الطُّوفَانُ وَأَخَذَ الْجَمِيعَ، كَذلِكَ يَكُونُ أَيْضاً مَجِيءُ [παρουσία - parousia] ابْنِ الإِنْسَانِ.» [متى ٢٤ : ٣٩]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e٢. الاجتماع لملاقاة الرب\u003c/h3\u003e\n\u003cp\u003eيستخدم بولس الكلمة ذاتها التي يستخدمها يسوع لوصف اجتماع شعب الله عند مجيء الرب. يستخدم بولس الصيغة الاسمية؛ ويستخدم يسوع الصيغة الفعلية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نَسْأَلُكُمْ أَيُّهَا الإِخْوَةُ مِنْ جِهَةِ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَاجْتِمَاعِنَا [ἐπισυναγωγῆς - episynagōgēs] إِلَيْهِ، أَنْ لاَ تَتَزَعْزَعُوا سَرِيعاً عَنْ ذِهْنِكُمْ، وَلاَ تَرْتَاعُوا، لاَ بِرُوحٍ وَلاَ بِكَلِمَةٍ وَلاَ بِرِسَالَةٍ كَأَنَّهَا مِنَّا: أَيْ أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ.» [تسالونيكي الثانية ٢ : ١-٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَيُرْسِلُ مَلاَئِكَتَهُ بِبُوق عَظِيمِ الصَّوْتِ، فَيَجْمَعُونَ [ἐπισυνάξουσιν - episynaxousin] مُخْتَارِيهِ مِنَ الأَرْبَعِ الرِّيَاحِ، مِنْ أَقْصَاءِ السَّمَاوَاتِ إِلَى أَقْصَائِهَا.» [متى ٢٤ : ٣١]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن [تسالونيكي الثانية ٢ : ١] هو الموضع الوحيد الذي يستخدم فيه بولس هذه الكلمة (سواء في صيغة الاسم أو الفعل) في جميع كتاباته. وبالتالي، فإن استخدامه الوحيد لها هو للإشارة إلى المجيء الثاني. ويستخدم متى الكلمة في موضع آخر واحد: شوق يسوع لأن يجمع شعبه كما تجمع الدجاجة فراخها [متى ٢٣ : ٣٧].\u003c/p\u003e\n\u003ch3\u003e٣. لا ترتاعوا (أو تضطربوا)\u003c/h3\u003e\n\u003cp\u003eثالثا، في العهد الجديد بأسره، لا يستخدم كلمة \"ترتاعوا\" أو تضطربوا (θροεῖσθαι - throeisthai) سوى بولس ويسوع. وكلاهما يطبقها على مخاطر فقدان الاتزان بسبب علامات المجيء الثاني للرب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نَسْأَلُكُمْ أَيُّهَا الإِخْوَةُ مِنْ جِهَةِ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَاجْتِمَاعِنَا إِلَيْهِ، أَنْ لاَ تَتَزَعْزَعُوا سَرِيعاً عَنْ ذِهْنِكُمْ، وَلاَ تَرْتَاعُوا [μηδὲ θροεῖσθαι - mēde throeisthai]، لاَ بِرُوحٍ وَلاَ بِكَلِمَةٍ وَلاَ بِرِسَالَةٍ كَأَنَّهَا مِنَّا: أَيْ أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ.» [تسالونيكي الثانية ٢ : ١-٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَإِنَّ كَثِيرِينَ سَيَأْتُونَ بِاسْمِي قَائِلِينَ: أَنَا هُوَ الْمَسِيحُ! وَيُضِلُّونَ كَثِيرِينَ. وَسَوْفَ تَسْمَعُونَ بِحُرُوبٍ وَأَخْبَارِ حُرُوبٍ. اُنْظُرُوا، لاَ تَرْتَاعُوا [μὴ θροεῖσθε - mē throeisthe]. لأَنَّهُ لاَ بُدَّ أَنْ تَكُونَ هذِهِ كُلُّهَا، وَلكِنْ لَيْسَ الْمُنْتَهَى بَعْدُ.» [متى ٢٤ : ٥-٦]؛ (راجع [مرقس ١٣ : ٧])\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا أمر ملفت للنظر. فلا يستخدم هذه الكلمة سوى يسوع وبولس. وكلاهما يستخدمها في الارتباط ذاته تماما: الارتياع غير المبرر بسبب علامات المجيء الثاني. وهذا يشير إلى وحدة مفاهيمية، إن لم يكن اعتمادا لفظيا.\u003c/p\u003e\n\u003ch3\u003e٤. ارتداد كبير ومحدد عن الإيمان\u003c/h3\u003e\n\u003cp\u003eعلى الرغم من أنهما لا يستخدمان المفردات ذاتها، إلا أن كليهما، بولس ويسوع، يصفان ارتدادا بالغ الذروة وفي وقت النهاية لمسيحيين بالاسم عن إيمانهم:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ [ἀποστασία - apostasia] أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ، ابْنُ الْهَلاَكِ،» [تسالونيكي الثانية ٢ : ٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَأَجَابَ يَسُوعُ وَقَالَ لَهُمْ: انْظُرُوا لاَ يُضِلَّكُمْ [πλανήσῃ - planēsē] أَحَدٌ. فَإِنَّ كَثِيرِينَ سَيَأْتُونَ بِاسْمِي قَائِلِينَ: أَنَا هُوَ الْمَسِيحُ! وَيُضِلُّونَ [πλανήσουσιν - planēsousin] كَثِيرِينَ... وَحِينَئِذٍ يَعْثُرُ [σκανδαλισθήσονται - skandalisthēsontai] كَثِيرُونَ وَيُسَلِّمُونَ بَعْضُهُمْ بَعْضاً وَيُبْغِضُونَ بَعْضُهُمْ بَعْضاً. وَيَقُومُ أَنْبِيَاءُ كَذَبَةٌ كَثِيرُونَ وَيُضِلُّونَ [πλανήσουσιν - planēsousin] كَثِيرِينَ... لأَنَّهُ سَيَقُومُ مُسَحَاءُ كَذَبَةٌ وَأَنْبِيَاءُ كَذَبَةٌ وَيُعْطُونَ آيَاتٍ عَظِيمَةً وَعَجَائِبَ، حَتَّى يُضِلُّوا [πλανῆσαι - planēsai] لَوْ أَمْكَنَ الْمُخْتَارِينَ أَيْضاً.» [متى ٢٤ : ٤-٥، ١٠-١١، ٢٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيكرر يسوع هذا التحذير من الضلال عن الإيمان أكثر من أي تحذير آخر في [متى ٢٤]. ويبلغ تهديد الارتداد، أو الضلال، أو العثرة، ذروته بكثافة تهدد حتى المختارين أنفسهم [متى ٢٤ : ٢٤]. غير أن يسوع يقول في العدد ٢٢: «...وَلكِنْ لأَجْلِ الْمُخْتَارِينَ تُقَصَّرُ تِلْكَ الأَيَّامُ.» [متى ٢٤ : ٢٢]\u003c/p\u003e\n\u003cp\u003eلا يستخدم بولس كلمة \"أبوستاسيا\" (apostasia) إلا هنا في [تسالونيكي الثانية ٢ : ٣]، والتي يُعرّفها القاموس اليوناني القياسي بأنها \"تحدي نظام أو سلطة مؤسسة، تمرد، تخلي، نقض إيمان\".\u003ca href=\"#ch16-fn-1\"\u003e[١]\u003c/a\u003e \"لأَنَّهُ لاَ يَأْتِي [يوم الرب] إِنْ لَمْ يَأْتِ [التخلي، نقض الإيمان] أَوَّلاً.\" [تسالونيكي الثانية ٢ : ٣]. فإن سألنا: \"من أين استوحى بولس فكرة أن المسيحيين سيختبرون في وقت ما في المستقبل 'تخليا' عظيما عن الإيمان؟\" ستكون إحدى الإجابات هي أن بولس كان مُلهما بالروح القدس، الذي قال يسوع عنه إنه: «...وَيُخْبِرُكُمْ [رسله] بِأُمُورٍ آتِيَةٍ.» [يوحنا ١٦ : ١٣].\u003c/p\u003e\n\u003cp\u003eولكن بالنظر إلى التوازي المذهل مع تحذيرات يسوع المتكررة من مثل هذا التخلي عن الإيمان عبر التضليل [متى ٢٤ : ٤، ١٠، ١١، ٢٤]، ألن يكون من المرجح أن الروح القدس أرشد بولس إلى هذا الحق من خلال إرشاده إلى معرفة جادة بتعاليم يسوع المدونة في [متى ٢٤]؟ فكلاهما توقع زمنا سيكون فيه ما هو أكثر من مجرد ارتدادات نمطية معتادة، بل ارتداد كبير ومحدد لكثير من المسيحيين بالاسم عن الإيمان.\u003c/p\u003e\n\u003ch3\u003e٥. الإثم (أو الخطية)\u003c/h3\u003e\n\u003cp\u003eيشير كل من يسوع وبولس إلى إثم متزايد قبل مجيء الرب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَيَقُومُ أَنْبِيَاءُ كَذَبَةٌ كَثِيرُونَ وَيُضِلُّونَ كَثِيرِينَ. وَلِكَثْرَةِ الإِثْمِ [ἀνομίαν - anomian] تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ.» [متى ٢٤ : ١١-١٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ [ἀνομίας - anomias]، ابْنُ الْهَلاَكِ... لأَنَّ سِرَّ الإِثْمِ الآنَ يَعْمَلُ فَقَطْ، إِلَى أَنْ يُرْفَعَ مِنَ الْوَسَطِ الَّذِي يَحْجِزُ الآنَ، وَحِينَئِذٍ سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ، وَيُبْطِلُهُ بِظُهُورِ مَجِيئِهِ. الَّذِي مَجِيئُهُ بِعَمَلِ الشَّيْطَانِ، بِكُلِّ قُوَّةٍ، وَبِآيَاتٍ وَعَجَائِبَ كَاذِبَةٍ،» [تسالونيكي الثانية ٢ : ٣، ٧-٩]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفي تعاليم كل من يسوع وبولس، يرتبط الابتعاد عن الإيمان (بالخداع والارتداد) بقوة الإثم. وفي كليهما، هناك انتقال من إثم أصغر إلى إثم أعظم. يتعامل بولس مع \"سِرَّ الإِثْمِ\" كأمر \"الآنَ يَعْمَلُ\" والذي سيُطلق العنان له بلا رادع في وقت ما في المستقبل [تسالونيكي الثانية ٢ : ٧]. ويتحدث يسوع عن تكاثره وتأثيراته المدمرة للمحبة.\u003c/p\u003e\n\u003ch3\u003e٦. إخفاق المحبة (أو برودها)\u003c/h3\u003e\n\u003cp\u003eيربط كل من يسوع وبولس بين الإثم المتكاثر وإخفاق المحبة (وبرودها):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلِكَثْرَةِ الإِثْمِ تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ.» [متى ٢٤ : ١٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي مَجِيئُهُ بِعَمَلِ الشَّيْطَانِ، بِكُلِّ قُوَّةٍ، وَبِآيَاتٍ وَعَجَائِبَ كَاذِبَةٍ، وَبِكُلِّ خَدِيعَةِ الإِثْمِ، فِي الْهَالِكِينَ، لأَنَّهُمْ لَمْ يَقْبَلُوا مَحَبَّةَ الْحَقِّ حَتَّى يَخْلُصُوا.» [تسالونيكي الثانية ٢ : ١-١٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eقد يكون هذا الارتباط بإخفاق المحبة مجرد مصادفة. غير أنه عندما يُرى كجزء من روابط أخرى كالإثم والارتداد، فإنه يبدو كقطعة أخرى من أحجية الصور المقطوعة تتناسب مع صورة تشكل تصور مشترك للمستقبل.\u003c/p\u003e\n\u003ch3\u003e٧. آيات وعجائب في خدمة الكذب\u003c/h3\u003e\n\u003cp\u003eيقول كل من بولس ويسوع إن آيات وعجائب خادعة ستُصنع لإضلال التلاميذ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي مَجِيئُهُ بِعَمَلِ الشَّيْطَانِ، بِكُلِّ قُوَّةٍ، وَبِآيَاتٍ وَعَجَائِبَ [καὶ σημείοις καὶ τέρασιν - kai sēmeiois kai terasin] كَاذِبَةٍ [ψεύδους - pseudous - أي للباطل أو الكذب]، وَبِكُلِّ خَدِيعَةِ الإِثْمِ، فِي الْهَالِكِينَ، لأَنَّهُمْ لَمْ يَقْبَلُوا مَحَبَّةَ الْحَقِّ حَتَّى يَخْلُصُوا.» [تسالونيكي الثانية ٢ : ٩-١٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ سَيَقُومُ مُسَحَاءُ كَذَبَةٌ وَأَنْبِيَاءُ كَذَبَةٌ [ψευδόχριστοι καὶ ψευδοπροφῆται - pseudochristoi kai pseudoprophētai] وَيُعْطُونَ آيَاتٍ عَظِيمَةً وَعَجَائِبَ [σημεῖα καὶ τέρατα - sēmeia kai terata]، حَتَّى يُضِلُّوا لَوْ أَمْكَنَ الْمُخْتَارِينَ أَيْضاً.» [متى ٢٤ : ٢٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيتحدث كل من بولس ويسوع عن خداع في وقت النهاية هذا ويربطانه بقوة \"الآيات والعجائب\" على الخداع من خلال توصيلها لكذبة. ولا يُنكر أي منهما أن الآيات والعجائب تحدث حقا. بل إن كليهما يقول إنها تخدم كذبة وتعمل لأجلها.\u003c/p\u003e\n\u003ch3\u003e٨. ملائكة، بوق، سحاب، مجد، قوة\u003c/h3\u003e\n\u003cp\u003eيتحدث كل من بولس ويسوع عن ملائكة، وبوق، وسحاب، ومجد، وقوة ترافق مجيء الرب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّ الرَّبَّ نَفْسَهُ بِهُتَافٍ، بِصَوْتِ رَئِيسِ مَلاَئِكَةٍ وَبُوقِ اللهِ، سَوْفَ يَنْزِلُ مِنَ السَّمَاءِ وَالأَمْوَاتُ فِي الْمَسِيحِ سَيَقُومُونَ أَوَّلاً. ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعاً مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ، وَهكَذَا نَكُونُ كُلَّ حِينٍ مَعَ الرَّبِّ.» [تسالونيكي الأولى ٤ : ١٦-١٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«...عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِينَ سَيُعَاقَبُونَ بِهَلاَكٍ أَبَدِيٍّ مِنْ وَجْهِ الرَّبِّ وَمِنْ مَجْدِ قُوَّتِهِ،» [تسالونيكي الثانية ١ : ٧-٩]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَحِينَئِذٍ تَظْهَرُ عَلاَمَةُ ابْنِ الإِنْسَانِ فِي السَّمَاءِ. وَحِينَئِذٍ تَنُوحُ جَمِيعُ قَبَائِلِ الأَرْضِ، وَيُبْصِرُونَ ابْنَ الإِنْسَانِ آتِياً عَلَى سَحَابِ السَّمَاءِ بِقُوَّةٍ وَمَجْدٍ كَثِيرٍ. فَيُرْسِلُ مَلاَئِكَتَهُ بِبُوق عَظِيمِ الصَّوْتِ، فَيَجْمَعُونَ مُخْتَارِيهِ مِنَ الأَرْبَعِ الرِّيَاحِ، مِنْ أَقْصَاءِ السَّمَاوَاتِ إِلَى أَقْصَائِهَا.» [متى ٢٤ : ٣٠-٣١]؛ (راجع [متى ٢٥ : ٣١])\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفي ظل وجود الملائكة، والبوق، والسحاب، والمجد، والقوة في وصف ظهور المسيح، سيكون من قبيل المبالغة والتعسف أن نظن أن يسوع وبولس كانا يتصوران مجيئات مختلفة للرب.\u003c/p\u003e\n\u003ch3\u003e٩. كلص\u003c/h3\u003e\n\u003cp\u003eيشبه كل من يسوع وبولس المجيء الثاني ليسوع بمجيء لص في الليل:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَاعْلَمُوا هذَا: أَنَّهُ لَوْ عَرَفَ رَبُّ الْبَيْتِ فِي أَيِّ هَزِيعٍ يَأْتِي السَّارِقُ [ποίᾳ φυλακῇ ὁ κλέπτης - poia phylakē ho kleptēs]، لَسَهِرَ وَلَمْ يَدَعْ بَيْتَهُ يُنْقَبُ.» [متى ٢٤ : ٤٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ أَنْتُمْ تَعْلَمُونَ يَقِيناً أَنَّ يَوْمَ الرَّبِّ كَلِصٍّ فِي اللَّيْلِ [κλέπτης ἐν νυκτὶ - kleptēs en nykti] هكَذَا يَجِيءُ.» [تسالونيكي الأولى ٥ : ٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن التشبيه بين مجيء يسوع ومجيء اللص هو تشبيه جريء. ولم يستخدمه بولس فحسب، بل استخدمه أيضا بطرس [بطرس الثانية ٣ : ١٠] ويوحنا ([رؤيا ٣ : ٣]؛ [رؤيا ١٦ : ١٥]). ومن المؤكد فعليا أنه لم يكن لأحد سوى يسوع أن يجرؤ على استخدام مثل هذه الصورة، وبذلك أعطى رسله المبرر لاستخدامها. وقد استخدموها بالفعل، مقدمين دليلا قويا على اعتمادهم على تعاليم يسوع ومشاركتهم إياه رؤية مشتركة لمجيء المسيح الثاني.\u003c/p\u003e\n\u003ch3\u003e١٠. ملاقاة الرب عند مجيئه\u003c/h3\u003e\n\u003cp\u003eيستخدم كل من يسوع وبولس الكلمة غير المعتادة ملاقاة (أو لقاء) لوصف الطريقة التي سيتم بها استقبال الرب عند مجيئه:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَفِي نِصْفِ اللَّيْلِ صَارَ صُرَاخٌ: هُوَذَا الْعَرِيسُ مُقْبِلٌ، فَاخْرُجْنَ لِلِقَائِهِ [ἀπάντησιν - apantēsin]!» [متى ٢٥ : ٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعاً مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ [ἀπάντησιν - apantēsin] الرَّبِّ فِي الْهَوَاءِ، وَهكَذَا نَكُونُ كُلَّ حِينٍ مَعَ الرَّبِّ.» [تسالونيكي الأولى ٤ : ١٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد أشرنا سابقا إلى أن هذه الكلمة \"ملاقاة\" لم تُستخدم إلا ثلاث مرات في العهد الجديد ([متى ٢٥ : ٦]؛ [أعمال الرسل ٢٨ : ١٥]؛ [تسالونيكي الأولى ٤ : ١٧]) وتشير دائما إلى لقاء تخرج فيه مجموعة وترافق شخصا ما في عودته للداخل.\u003ca href=\"#ch16-fn-2\"\u003e[٢]\u003c/a\u003e وهكذا الحال في مثل العذارى اللواتي يسمعن الصراخ ويلاقين العريس ويرحبن به ويرافقنه إلى وليمة العرس. وهكذا الحال في [تسالونيكي الأولى ٤ : ١٧]، حيث يصعد القديسون المقامون والأحياء لملاقاة الرب يسوع والترحيب به ومرافقته إلى الأرض.\u003c/p\u003e\n\u003cp\u003eإن حقيقة استخدام كل من بولس ويسوع لهذه الكلمة حصريا للإشارة إلى المجيء الثاني هي ارتباط لغوي مذهل آخر.\u003c/p\u003e\n\u003ch3\u003e١١. كفخ مدمر وبغتة\u003c/h3\u003e\n\u003cp\u003eلا أحد في العهد الجديد يستخدم كلمة بغتة (αἰφνίδιος - aiphnidios) سوى بولس ويسوع. ولا ترد في أي موضع آخر. ومرة أخرى، وبصورة مذهلة، كلاهما يستخدم الكلمة للإشارة إلى الهلاك الذي سيجلبه المجيء الثاني على غير المستعدين:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ حِينَمَا يَقُولُونَ: «سَلاَمٌ وَأَمَانٌ»، حِينَئِذٍ يُفَاجِئُهُمْ هَلاَكٌ بَغْتَةً [αἰφνίδιος - aiphnidios]، كَالْمَخَاضِ لِلْحُبْلَى، فَلاَ يَنْجُونَ.» [تسالونيكي الأولى ٥ : ٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاحْتَرِزُوا لأَنْفُسِكُمْ لِئَلاَّ تَثْقُلَ قُلُوبُكُمْ فِي خُمَارٍ وَسُكْرٍ وَهُمُومِ الْحَيَاةِ، فَيُصَادِفَكُمْ ذلِكَ الْيَوْمُ بَغْتَةً [αἰφνίδιος - aiphnidios]. لأَنَّهُ كَالْفَخِّ يَأْتِي عَلَى جَمِيعِ الْجَالِسِينَ عَلَى وَجْهِ كُلِّ الأَرْضِ.» [لوقا ٢١ : ٣٤-٣٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e١٢. أوجاع المخاض\u003c/h3\u003e\n\u003cp\u003eيستخدم كل من يسوع وبولس صورة وجع المخاض (ὠδίν - ōdin) لوصف الآلام المتزايدة، ثم البالغة ذروتها، في الفترة المؤدية إلى رجوع يسوع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ تَقُومُ أُمَّةٌ عَلَى أُمَّةٍ وَمَمْلَكَةٌ عَلَى مَمْلَكَةٍ، وَتَكُونُ مَجَاعَاتٌ وَأَوْبِئَةٌ وَزَلاَزِلُ فِي أَمَاكِنَ. وَلكِنَّ هذِهِ كُلَّهَا مُبْتَدَأُ الأَوْجَاعِ [ὠδίνων - ōdinōn].» [متى ٢٤ : ٧-٨]؛ (راجع [مرقس ١٣ : ٨])\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ أَنْتُمْ تَعْلَمُونَ يَقِيناً أَنَّ يَوْمَ الرَّبِّ كَلِصٍّ فِي اللَّيْلِ هكَذَا يَجِيءُ. لأَنَّهُ حِينَمَا يَقُولُونَ: «سَلاَمٌ وَأَمَانٌ»، حِينَئِذٍ يُفَاجِئُهُمْ هَلاَكٌ بَغْتَةً، كَالْمَخَاضِ [ὠδὶν - ōdin] لِلْحُبْلَى، فَلاَ يَنْجُونَ.» [تسالونيكي الأولى ٥ : ٢-٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعلى الرغم من أن بولس يستخدم صورة أوجاع المخاض بصورة أوسع ([رومية ٨ : ٢٢]؛ [غلاطية ٤ : ١٩، ٢٧])، إلا أنه ويسوع لا يستخدمان الاسم (ὠδίν، وجع مخاض) إلا مرة واحدة لكل منهما، وذلك للإشارة إلى أحداث وقت النهاية التي تأخذ غير المؤمنين على حين غرة تماما وتجلب الهلاك. \"فلا ينجون\" [تسالونيكي الأولى ٥ : ٣].\u003c/p\u003e\n\u003ch3\u003e١٣. المؤمنون سينجون (أو يخلصون)\u003c/h3\u003e\n\u003cp\u003eيشير كل من يسوع وبولس إلى ضرورة أو استحالة النجاة (ἐκφεύγω - ekpheugō) من القوى المدمرة الآتية على غير المستعدين عند المجيء الثاني:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«اِسْهَرُوا إِذاً وَتَضَرَّعُوا فِي كُلِّ حِينٍ، لِكَيْ تُحْسَبُوا أَهْلاً لِلنَّجَاةِ [ἐκφυγεῖν - ekphygein] مِنْ جَمِيعِ هذَا الْمُزْمِعِ أَنْ يَكُونَ، وَتَقِفُوا قُدَّامَ ابْنِ الإِنْسَانِ.» [لوقا ٢١ : ٣٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ حِينَمَا يَقُولُونَ: «سَلاَمٌ وَأَمَانٌ»، حِينَئِذٍ يُفَاجِئُهُمْ هَلاَكٌ بَغْتَةً، كَالْمَخَاضِ لِلْحُبْلَى، فَلاَ يَنْجُونَ [ἐκφύγωσιν - ekphygōsin].» [تسالونيكي الأولى ٥ : ٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيستخدم يسوع هذه الكلمة (ἐκφεύγω) مرة واحدة فقط. ويستخدمها بولس ثلاث مرات، تتوازى إحداها مع استخدام يسوع، ألا وهي، رجاء النجاة من مباغتة مجيء المسيح. ويقرر كل من يسوع وبولس أن المؤمنين لن يهلكوا بهذه المباغتة. يقول بولس: «وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمُ ذلِكَ الْيَوْمُ كَلِصٍّ.» [تسالونيكي الأولى ٥ : ٤]. ويقول يسوع: \"[تضرعوا] لِكَيْ تُحْسَبُوا أَهْلاً لِلنَّجَاةِ.\" [لوقا ٢١ : ٣٦].\u003c/p\u003e\n\u003ch3\u003e١٤. ابقوا ساهرين، وصاحين\u003c/h3\u003e\n\u003cp\u003eيستخدم كل من بولس ويسوع لغة السهر اليقظ وعدم النوم وعدم السُكر فيما يتعلق بالاستعداد للمجيء الثاني:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ أَنْتُمْ تَعْلَمُونَ بِالتَّحْقِيقِ أَنَّ يَوْمَ الرَّبِّ كَلِصٍّ فِي اللَّيْلِ هكَذَا يَجِيءُ... وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمُ ذلِكَ الْيَوْمُ كَلِصٍّ... لَسْنَا مِنْ لَيْل وَلاَ ظُلْمَةٍ. فَلاَ نَنَمْ إِذاً [μὴ καθεύδωμεν - mē katheudōmen] كَالْبَاقِينَ، بَلْ لِنَسْهَرْ [γρηγορῶμεν - grēgorōmen] وَنَصْحُ [νήφωμεν - nēphōmen]. لأَنَّ الَّذِينَ يَنَامُونَ فَبِاللَّيْلِ يَنَامُونَ، وَالَّذِينَ يَسْكَرُونَ فَبِاللَّيْلِ يَسْكَرُونَ [μεθυσκόμενοι νυκτὸς μεθύουσιν - methyskomenoi nyktos methyousin].» [تسالونيكي الأولى ٥ : ٢-٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«اِسْهَرُوا [γρηγορεῖτε - grēgoreite] إِذاً لأَنَّكُمْ لاَ تَعْلَمُونَ فِي أَيَّةِ سَاعَةٍ يَأْتِي رَبُّكُمْ... وَلكِنْ إِنْ قَالَ ذلِكَ الْعَبْدُ الرَّدِيُّ فِي قَلْبِهِ: سَيِّدِي يُبْطِئُ قُدُومَهُ. فَيَبْتَدِئُ يَضْرِبُ الْعَبِيدَ رُفَقَاءَهُ، وَيَأْكُلُ وَيَشْرَبُ مَعَ السُّكَارَى [μεθυόντων - methyontōn]. يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ فِي يَوْمٍ لاَ يَنْتَظِرُهُ وَفِي سَاعَةٍ لاَ يَعْرِفُهَا، فَيُقَطِّعُهُ...» [متى ٢٤ : ٤٢-٥١]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاحْتَرِزُوا لأَنْفُسِكُمْ لِئَلاَّ تَثْقُلَ قُلُوبُكُمْ فِي خُمَارٍ وَسُكْرٍ [μέθῃ - methē] وَهُمُومِ الْحَيَاةِ، فَيُصَادِفَكُمْ ذلِكَ الْيَوْمُ بَغْتَةً. لأَنَّهُ كَالْفَخِّ يَأْتِي عَلَى جَمِيعِ الْجَالِسِينَ عَلَى وَجْهِ كُلِّ الأَرْضِ.» [لوقا ٢١ : ٣٤-٣٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَأَمَّا ذلِكَ الْيَوْمُ وَتِلْكَ السَّاعَةُ فَلاَ يَعْلَمُ بِهِمَا أَحَدٌ، وَلاَ الْمَلاَئِكَةُ الَّذِينَ فِي السَّمَاءِ، وَلاَ الابْنُ، إِلاَّ الآبُ. اُنْظُرُوا! اِسْهَرُوا وَصَلُّوا، لأَنَّكُمْ لاَ تَعْلَمُونَ مَتَى يَكُونُ الْوَقْتُ... اِسْهَرُوا إِذاً، لأَنَّكُمْ لاَ تَعْلَمُونَ مَتَى يَأْتِي رَبُّ الْبَيْتِ... لِئَلاَّ يَأْتِيَ بَغْتَةً فَيَجِدَكُمْ نِيَاماً [καθεύδοντας - katheudontas]!» [مرقس ١٣ : ٣٢-٣٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيستخدم كل من بولس ويسوع صورة عدم النوم (καθεύδω - katheudō) بل السهر (γρηγορέω - grēgoreō)، وعدم السكر (μεθύω - methyō) بل الصحو (νήφω - nēphō) — وتأتي كلتا الصورتين في سياق الاستعداد للمجيء الثاني.\u003c/p\u003e\n\u003ch3\u003eما هو المغزى؟\u003c/h3\u003e\n\u003cp\u003eما هي خلاصة ما رأيناه في مقارنة تصور يسوع وبولس لوقت النهاية؟ إليكم اللبنات الأساسية لاستدلالي:\u003c/p\u003e\n\u003cp\u003eأولا، تحتوي رسالتي تسالونيكي على نظرة واحدة موحدة للمجيء الثاني. ففي كلتا الرسالتين، يتحدث بولس عن حدث واحد، \"الباروسيا\" (المجيء)، أي يوم الرب.\u003c/p\u003e\n\u003cp\u003eثانيا، تتضمن تلك النظرة الموحدة المجيء النهائي للرب على السحاب [تسالونيكي الأولى ٤ : ١٧] لإنقاذ شعبه [تسالونيكي الثانية ١ : ١٧]، وإيقاع النقمة على غير المؤمنين [تسالونيكي الثانية ١ : ٦]، وإبادة إنسان الخطية [تسالونيكي الثانية ٢ : ٨]، وإقامة جميع المؤمنين من الأموات [تسالونيكي الأولى ٤ : ١٦].\u003c/p\u003e\n\u003cp\u003eثالثا، إن اللغة التي يستخدمها بولس لوصف هذا الحدث المستقبلي الواحد تشبه إلى حد بعيد لغة يسوع، لاسيما في [متى ٢٤]، لدرجة أنه من المرجح جدا أنهما يتحدثان عن الحدث عينه.\u003ca href=\"#ch16-fn-3\"\u003e[٣]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eرابعا، ولذلك، فإن يسوع في [متى ٢٤] لا يضع نصب عينيه مجرد العلامات الأولى للمجيء الثاني في أحداث القرن الأول فحسب، بل يضع أيضا الأحداث النهائية التي يصفها بولس في رسالتي تسالونيكي. ومن الخطأ قصر الإشارة في [متى ٢٤ : ٤-٣١] على الجيل الذي تلا يسوع مباشرة، والذي بلغ ذروته في دمار أورشليم عام ٧٠ ميلادية.\u003ca href=\"#ch16-fn-4\"\u003e[٤]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eويمكن إيراد المزيد من الأدلة لدعم هذه النقطة الرابعة. فعلى سبيل المثال، يبدو من التعسف والجمود المفرط الإصرار على أنه عندما سأل التلاميذ يسوع في [متى ٢٤ : ٣]: «...قُلْ لَنَا مَتَى يَكُونُ هذَا؟ وَمَا هِيَ عَلاَمَةُ مَجِيئِكَ وَانْقِضَاءِ الدَّهْرِ؟» كان لديهم وقتان مختلفان في أذهانهم (وقت قريب ووقت بعيد)، أو أن يسوع سيجيب عن سؤالهم بترتيب تسلسلي دقيق، وكأن في أذهانهم بالفعل وقتين (الأعداد ٤-٣٥ تجيب عن السؤال المتعلق بدمار أورشليم، والأعداد ٣٦-٥١ تجيب عن السؤال المتعلق بانقضاء الدهر).\u003c/p\u003e\n\u003cp\u003eولذلك، فإن الاستدلال بناء على هذا الهيكل المُفترض بأن [متى ٢٤ : ٤-٣٥] يتعلق فقط بالقرن الأول (ما قبل عام ٧٠ م) وبقية الإصحاح (٢٤ : ٣٦-٥١) تصف المجيء الثاني المستقبلي الذي لم يقع بعد، هو استدلال غير مبرر في اعتقادي. وأقترح أن كلا من تساؤلات التلاميذ [متى ٢٤ : ٣] وإجابة يسوع تعكس ما أسميته \"المنظور النبوي\" (انظر الفصل الثامن، الهامش ١). حيث تُرى السلاسل الجبلية القريبة والبعيدة للمستقبل ككل واحد، دون وضع فواصل دقيقة بينها. وهكذا، يتحدث [متى ٢٤] بطرق تُنير فهمنا طوال الإصحاح لتاريخ هذا الدهر المستمر وللنهاية البالغة ذروتها عند المجيء الثاني على حد سواء.\u003c/p\u003e\n\u003ch3\u003e\"انقضاء الدهر\"\u003c/h3\u003e\n\u003cp\u003eعندما استخدم التلاميذ عبارة \"انقضاء الدهر\" (συντελείας τοῦ αἰῶνος - synteleias tou aiōnos، [متى ٢٤ : ٣])، فمن المرجح جدا أنهم استخدموها بالطريقة عينها التي استخدمها يسوع على مسمع منهم، وتحديدا، للإشارة إلى النهاية المطلقة لهذا الدهر والتي تتميز بالدينونة على غير المؤمنين. فعلى سبيل المثال:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«...وَالْحَصَادُ هُوَ انْقِضَاءُ الْعَالَمِ [الدَّهْرِ] [συντέλεια αἰῶνός - synteleia aiōnos]، وَالْحَصَّادُونَ هُمُ الْمَلاَئِكَةُ. فَكَمَا يُجْمَعُ الزَّوَانُ وَيُحْرَقُ بِالنَّارِ، هكَذَا يَكُونُ فِي انْقِضَاءِ هذَا الْعَالَمِ [الدَّهْرِ] [τῇ συντελείᾳ τοῦ αἰῶνος - tē synteleia tou aiōnos]: يُرْسِلُ ابْنُ الإِنْسَانِ مَلاَئِكَتَهُ فَيَجْمَعُونَ مِنْ مَلَكُوتِهِ جَمِيعَ الْمَعَاثِرِ وَفَاعِلِي الإِثْمِ، وَيَطْرَحُونَهُمْ فِي أَتُونِ النَّارِ. هُنَاكَ يَكُونُ الْبُكَاءُ وَصَرِيرُ الأَسْنَانِ. حِينَئِذٍ يُضِيءُ الأَبْرَارُ كَالشَّمْسِ فِي مَلَكُوتِ أَبِيهِمْ. مَنْ لَهُ أُذُنَانِ لِلسَّمْعِ، فَلْيَسْمَعْ.» [متى ١٣ : ٣٩-٤٣]؛ (راجع [متى ١٣ : ٤٩]؛ [متى ٢٨ : ٢٠])\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eومن المستبعد، حين شرع يسوع في الحديث في [متى ٢٤]، أن يفهم التلاميذ الأعداد ٤-٣٥ على أنها غير مرتبطة بـ \"انقضاء الدهر\". وتشير كافة المتوازيات التي رأيناها بين كلمات يسوع وكلمات بولس إلى أن الأعداد ٤-٣٥ تتداخل وتتشابك مع إشارات إلى النهاية المطلقة للدهر والتي لا تزال في رحم المستقبل.\u003c/p\u003e\n\u003ch3\u003eمجيء ابن الإنسان في دينونة شاملة\u003c/h3\u003e\n\u003cp\u003eدعوني أقدم ملاحظة داعمة أخيرة. كان التلاميذ قد سمعوا يسوع بالمثل يتحدث عن مجيء ابن الإنسان في [متى ١٦ : ٢٧]: «فَإِنَّ ابْنَ الإِنْسَانِ سَوْفَ يَأْتِي فِي مَجْدِ أَبِيهِ مَعَ مَلاَئِكَتِهِ،...» وفي ذلك النص، يقول يسوع إنه عند هذا المجيء: «...وَحِينَئِذٍ يُجَازِي كُلَّ وَاحِدٍ حَسَبَ عَمَلِهِ.» لذا فإن هذا يمثل نبوة عن مجيء ابن الإنسان في النهاية المطلقة للدهر، والتي تبلغ ذروتها بدينونة لكل شخص. ولذلك، أجد من المستبعد أن تقتصر الإشارات في [متى ٢٤] إلى مجيء ابن الإنسان — على سبيل المثال، في العددين ٢٧ و ٣٠ — على عام ٧٠ ميلادية.\u003c/p\u003e\n\u003ch3\u003eجمع خيوط الحجة\u003c/h3\u003e\n\u003cp\u003eدعونا نجمع خيوط الفصول الأربعة الماضية لنرى إن كان بوسعنا توضيح معالم النسيج الذي ننسجه. إن تساؤلنا الأعم والأشمل في الجزء الثاني هو كيف ينبغي لنا أن نفكر بشأن وقت ظهور يسوع. ولمعالجة هذا التساؤل، يجب علينا الإجابة عن ثلاثة تساؤلات أخرى.\u003c/p\u003e\n\u003cp\u003eأولا، هل تنبأ يسوع بأنه سيرجع لينهي هذا الدهر الحاضر في غضون جيل واحد؟ كلا، لم يفعل (الفصل ١٣).\u003c/p\u003e\n\u003cp\u003eثانيا، ماذا يقصد العهد الجديد بقوله إن يسوع سيرجع سريعا؟ اقترحت ثلاثة معان وطرحت ثلاثة مصطلحات: سريعا إمكانيا، وسريعا شموليا، وسريعا إلهيا (الفصل ١٤).\u003c/p\u003e\n\u003cp\u003eثالثا، هل يُعلِّم العهد الجديد برجوع يسوع في أية لحظة؟ اقترحت أن هناك ثلاث خطوات للإجابة عن هذا التساؤل:\u003c/p\u003e\n\u003cp\u003e١. هل يُعلِّم العهد الجديد باختطاف في أية لحظة ينزع الكنيسة من العالم، يليه بعد عدة سنوات المجيء الثاني للمسيح لتأسيس ملكوته؟ أجبت بالنفي (الفصل ١٥).\u003c/p\u003e\n\u003cp\u003e٢. هل رؤية وقت النهاية في رسالتي تسالونيكي الأولى والثانية وفي تعليم يسوع (لاسيما في [متى ٢٤]) هي رؤية واحدة؟ أجبت بالإيجاب (الفصل ١٦). والمغزى من هذه الإجابة الأخيرة هو أن كلا من [متى ٢٤] ورسالتي تسالونيكي يمكن أن ينير إجابتنا عن التساؤل الثالث والأخير حول رجوع الرب في أية لحظة.\u003c/p\u003e\n\u003cp\u003e٣. هل يُعلِّم العهد الجديد بأن هناك أحداثا لم تقع بعد ويجب أن تحدث قبل أن يرجع الرب؟ إن وُجدت، فمن المرجح أن يُجيب ذلك عن تساؤلنا حول ظهور المسيح في أية لحظة. وإلى هذا التساؤل نتحول في الفصل القادم.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch16-ref-1\"\u003e[١]\u003c/a\u003e دبليو. أرندت، وإف. دبليو. دانكر، ودبليو. باور، وإف. دبليو. غينجريتش، معجم يوناني-إنجليزي للعهد الجديد والأدب المسيحي المبكر الآخر، الطبعة الثالثة (شيكاغو: مطبعة جامعة شيكاغو، ٢٠٠٠)، ١٢٠.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch16-ref-2\"\u003e[٢]\u003c/a\u003e يزعم بعض المفسرين أنه نظرا لأن اللغة هنا تعكس لغة [دانيال ٧ : ١٣-١٤]، فإن هذا \"الآتي على سحاب\" ليس مجيئا إلى الأرض بل مجيئا لابن الإنسان إلى القديم الأيام في السماء. يقول [دانيال ٧ : ١٣-١٤]: «كُنْتُ أَرَى فِي رُؤَى اللَّيْلِ وَإِذَا مَعَ سُحُبِ السَّمَاءِ مِثْلُ ابْنِ إِنْسَانٍ أَتَى وَجَاءَ إِلَى الْقَدِيمِ الأَيَّامِ، فَقَرَّبُوهُ قُدَّامَهُ. فَأُعْطِيَ سُلْطَاناً وَمَجْداً وَمَلَكُوتاً لِتَتَعَبَّدَ لَهُ كُلُّ الشُّعُوبِ وَالأُمَمِ وَالأَلْسِنَةِ. سُلْطَانُهُ سُلْطَانٌ أَبَدِيٌّ مَا لَنْ يَزُولَ، وَمَلَكُوتُهُ مَا لاَ يَنْقَرِضُ.» ثمة مشاكل عديدة في إنكار أن \"الآتي على سحاب\" (في [متى ٢٤ : ٣٠] و [متى ٢٦ : ٦٤]) هو المجيء الثاني للمسيح إلى الأرض. أولا، القراءة الطبيعية لإنجيل متى تتعارض مع هذا الإنكار. ثانيا، الروابط اللغوية مع رسالتي تسالونيكي الأولى والثانية (والتي نتفحصها في هذا الفصل) تشير إلى معنى المجيء الثاني. ثالثا، من الممكن تماما، بل ومن المرجح، أن يسوع كان يأخذ من لغة [دانيال ٧ : ١٣-١٤] بدلا من إعادة إنتاج المشهد السماوي نفسه. رابعا، حتى في [دانيال ٧]، فإن الملكوت الذي يتسلمه ابن الإنسان الذي يأتي \"إلى القديم الأيام\" يُعطى بدوره لقديسي العلي على الأرض: «أَمَّا قِدِّيسُو الْعَلِيِّ فَيَأْخُذُونَ الْمَلَكُوتَ وَيَمْتَلِكُونَ الْمَلَكُوتَ إِلَى الأَبَدِ وَإِلَى أَبَدِ الآبِدِينَ.» ([دانيال ٧ : ١٨]؛ راجع ٧ : ٢٢، ٢٧). ومن الطبيعي تماما أن يأتي ابن الإنسان على السحاب إلى الله ليتسلم الملكوت، ثم يرجع على السحاب «...فِي مَجْدِهِ وَجَمِيعُ الْمَلاَئِكَةِ الْقِدِّيسِينَ مَعَهُ،» [متى ٢٥ : ٣١] ويقول لشعبه: «...تَعَالَوْا يَا مُبَارَكِي أَبِي، رِثُوا الْمَلَكُوتَ الْمُعَدَّ لَكُمْ مُنْذُ تَأْسِيسِ الْعَالَمِ.» [متى ٢٥ : ٣٤].\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch16-ref-3\"\u003e[٣]\u003c/a\u003e انظر الفصل ١٥.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch16-ref-4\"\u003e[٤]\u003c/a\u003e من باب التذكير، لاحظ كيف تتغلغل المتوازيات مع نظرة بولس في كل [متى ٢٤]: الباروسيا (٢٤ : ٢٧)، الاجتماع (٢٤ : ٣١)، لا ترتاعوا (٢٤ : ٦)، الخداع وفقدان الإيمان (٢٤ : ٤، ١٠، ١١، ٢٤)، الإثم (٢٤ : ١٢)، إخفاق المحبة (٢٤ : ١٢)، آيات وعجائب (٢٤ : ٢٤)، سحاب، قوة، مجد، بوق (٢٤ : ٣٠-٣١)، أوجاع مخاض (٢٤ : ٨).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch16-ref-5\"\u003e[٥]\u003c/a\u003e انظر الهامش ٤ في الفصل ١٣. يجادل بعض مفسري [متى ٢٤] بأنه عندما سأل التلاميذ في العدد ٣: «...مَتَى يَكُونُ هذَا؟» كانوا يشيرون فقط إلى دمار الهيكل، وأن يسوع يجيب عن هذا الجزء من سؤالهم في الأعداد ٤-٣٥. وفي ذلك الرأي، تشير لغة تلك الأعداد فقط إلى القرن الأول. وهكذا، على سبيل المثال، عندما يقول يسوع في العدد ١٤: «وَيُكْرَزُ بِبِشَارَةِ الْمَلَكُوتِ هذِهِ فِي كُلِّ الْمَسْكُونَةِ شَهَادَةً لِجَمِيعِ الأُمَمِ. ثُمَّ يَأْتِي الْمُنْتَهَى.» يقول سام ستورمز [Sam Storms، لاهوتي أمريكي إصلاحي معاصر]: \"بقدر ما يتعلق الأمر بنبوة يسوع في [متى ٢٤ : ١٤]، فإن النقطة التي يرمي إليها هي أنه في أعقاب قيامته سيُكرز بالإنجيل خارج حدود اليهودية، بحيث تسمع الأمم الوثنية في العالم المأهول المعروف باسم الإمبراطورية الرومانية شهادة عمله الفدائي. وفقط بعد ذلك، كما يقول يسوع، سيحدث 'منتهى' المدينة والهيكل... إن المأمورية العظمى في [متى ٢٨] لا تترك أية ثغرات. يجب علينا ببساطة أن نكدح في نعمة الله لنكرز بإنجيل الله ولنتلمذ جميع الأمم. إن نقطتي... هي ببساطة أن [متى ٢٤ : ١٤] لا يهتم بتلك المهمة.\" سام ستورمز، ملكوت آت: البديل اللاألفي (فيرن، روس-شاير، المملكة المتحدة: مينتور، ٢٠١٣)، ٢٤٢-٤٤.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjWD8s1sDgLT2BJ8R0ftTGcflVdvMpFjbice_dqkU1XinQGuFDIBbgfww2ADVxSjHrFgAZzfeYKTQ8nje2FN7naknI3Gl2S5HDqanBRuTlYU7KHKq65fRfjSnKAuFuqD6ltoHrxaFFd_65GukBbYYvd6cvwTkk0othVPnhUvcHfUV81YnYPphrZnDu-AIA/s2752/%D8%B1%D8%A4%D9%8A%D8%A9_%D9%85%D9%88%D8%AD%D8%AF%D8%A9_%D9%84%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjWD8s1sDgLT2BJ8R0ftTGcflVdvMpFjbice_dqkU1XinQGuFDIBbgfww2ADVxSjHrFgAZzfeYKTQ8nje2FN7naknI3Gl2S5HDqanBRuTlYU7KHKq65fRfjSnKAuFuqD6ltoHrxaFFd_65GukBbYYvd6cvwTkk0othVPnhUvcHfUV81YnYPphrZnDu-AIA/s600/%D8%B1%D8%A4%D9%8A%D8%A9_%D9%85%D9%88%D8%AD%D8%AF%D8%A9_%D9%84%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"17:T7dd4,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الخامس عشر\u003c/h2\u003e\n\u003cp\u003eهل هناك اختطاف في أية لحظة قبل المجيء الثاني؟\u003c/p\u003e\n\u003cp\u003eسأحاول في الفصول ١٥-١٧ الإجابة عن سؤال: هل يُعلّم العهد الجديد بأن يسوع قد يأتي في أية لحظة؟ فإن أجبت عن هذا السؤال بالنفي، أتساءل عما إذا كنتم ستستنتجون أنني بذلك أنكر الحاح كافة التحذيرات الكتابية بالسهر واليقظة. لقد أمرنا يسوع بالفعل أن ننظر (βλέπετε - blepete) [مرقس ١٣ : ٣٣]، ونسهر (ἀγρυπνεῖτε - agrypneite) [مرقس ١٣ : ٣٣]، ونكون متيقظين (γρηγορεῖτε - grēgoreite) [مرقس ١٣ : ٣٥]، ومستعدين (γίνεσθε ἕτοιμοι - ginesthe hetoimoi) [لوقا ١٢ : ٤٠]، ونحترز (προσέχετε - prosechete) [لوقا ٢١ : ٣٤]. وأحد الأسباب المقدمة لكل هذه اليقظة هو: «لأَنَّكُمْ لاَ تَعْرِفُونَ الْيَوْمَ وَلاَ السَّاعَةَ» [متى ٢٥ : ١٣]. وأي نظرة لمجيء يسوع تفرغ هذه التحريضات من معناها ستكون نظرة مشكوكا فيها.\u003c/p\u003e\n\u003cp\u003eغير أنني أعتقد حقا أن الإجابة عن سؤال: هل يُعلّم العهد الجديد بأن يسوع قد يأتي في أية لحظة؟ هي النفي. والسبب هو أن العهد الجديد يُعلّم بأن هناك أحداثا لم تقع بعد يجب أن تحدث قبل مجيئه. وسأحاول أن أبين ماهية تلك الأحداث. وسأحاول أيضا أن أبين أن هذا لا يقلل البتة من الحاح الوصايا بالسهر واليقظة والانتباه والاستعداد لمجيئه.\u003c/p\u003e\n\u003cp\u003eوفي الواقع، سأحاجج بأنه لا يوجد لدينا أي مسوغ لنتيقن من أن مجيئه يبعد عنا أكثر من بضع سنوات. ولذلك، فما من أحد يكف عن يقظته، مستسلما للسبات الروحي، يمتلك أي مبرر ليظن أنه سينجو من الغضب المباغت، كاللص، في مجيء الرب.\u003c/p\u003e\n\u003cp\u003eويستند دعمي الكتابي لهذه النظرة إلى ثلاث خطوات تتوافق مع الفصول الثلاثة القادمة.\u003c/p\u003e\n\u003cp\u003eأولا، سأبين في هذا الفصل سبب عدم إيماني بمجيء ثان على جزأين، حيث يختطف الجزء الأول المسيحيين (الأحياء منهم والأموات) من العالم ويأخذهم إلى السماء في أثناء «ضِيقٌ عَظِيمٌ» [متى ٢٤ : ٢١]؛ [رؤيا ٧ : ١٤]، يليه الجزء الثاني عندما يأتي المسيح في دينونة نارية.\u003c/p\u003e\n\u003cp\u003eثانيا، سأبين في الفصل السادس عشر سبب عدم اقتصار معظم الأحداث المتنبأ بها في [متى ٢٤] على الفترة المؤدية إلى عام ٧٠ ميلاديا، بل هي ذات صلة بتفسير التاريخ بأسره، مع صلة خاصة بتصاعد وتيرة التاريخ قُبيل مجيء الرب.\u003c/p\u003e\n\u003cp\u003eوفي خضم ذلك، سنرى أن نظرة بولس للمجيء الثاني (في رسالتي تسالونيكي الأولى والثانية) تتطابق تماما مع نظرة يسوع (لاسيما في [متى ٢٤]).\u003c/p\u003e\n\u003cp\u003eوسيُمكننا هذا بعد ذلك في الفصل السابع عشر من الانتقال إلى الخطوة الثالثة، ألا وهي بيان بعض الأحداث التي لم تقع بعد ويجب أن تحدث قبل مجيء المسيح.\u003c/p\u003e\n\u003ch3\u003eما هو الإختطاف؟\u003c/h3\u003e\n\u003cp\u003eنتحول في هذا الفصل إلى سؤال: هل هناك اختطاف في أية لحظة، يُنقل فيه المسيحيون من العالم قبل المجيء الثاني ببضع سنوات؟ أم أن هناك مجيئا ثانيا واحدا للمسيح بدلا من مجيء منقسم إلى جزأين؟\u003c/p\u003e\n\u003cp\u003eإجابتي هي أن \"الاختطاف\" يحدث عند المجيء الثاني الواحد، وليس قبله بسنوات. تأتي كلمة الاختطاف (Rapture) من الكلمة اللاتينية (rapio)، المستخدمة في الفولجاتا (الترجمة اللاتينية للكتاب المقدس)، وتعني \"ينتزع أو يختطف\". وفي صيغة المستقبل (rapiemur — سنُخطف)، تُستخدم الكلمة في [تسالونيكي الأولى ٤ : ١٧]، لوصف ما يحدث عند المجيء الثاني: «ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ [rapiemur] جَمِيعًا مَعَهُمْ [أولئك الذين رقدوا] فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ، وَهكَذَا نَكُونُ كُلَّ حِينٍ مَعَ الرَّبِّ.» وهكذا، يقول أحد التفسيرات إن هذا الاختطاف \"لملاقاة الرب في الهواء\" يشير إلى رحيل المسيحيين عن الأرض لعدة سنوات بينما تقع ضيقة مروعة على الأرض قبل أن يرجع الرب لتأسيس ملكوته.\u003c/p\u003e\n\u003cp\u003eيقرر هذا الرأي أنه قبل أن ينزل الرب فعليا لتأسيس ملكوته، ستكون هناك فترة «ضِيقٌ عَظِيمٌ» [متى ٢٤ : ٢١] على الأرض. والمسيحيون الموجودون على الأرض حين تحل هذه الضيقة سيُنجّون من هذه الفترة. وستتم نجاتهم بنقلهم من العالم بمجيء الرب يسوع على السحاب، الذي سيأخذهم معه إلى السماء (\"الاختطاف\") قبل الضيقة. ثم، بعد الضيقة، سيأتي مع قديسيه ويؤسس ملكوته على الأرض. يُسمى هذا الرأي بـ \"المجيء قبل الضيقة\" (Pretribulational) لأن المسيح يأتي قبل الضيقة ويُخرج المسيحيين منها.\u003c/p\u003e\n\u003cp\u003eوسأحاجج بأن هذا الرأي خاطئ، وبأن المسيح سيرجع مرة واحدة بقوة عظيمة مع ملائكته لتأسيس ملكوته على الأرض. وسيُخطف شعبه لملاقاته في الهواء والترحيب برجوعه إلى الأرض. وقبل أن أطرح أسبابي، سيمهد تعليقان الطريق لفهم طريقتي في التفكير بشأن هذا الخلاف بين المسيحيين.\u003c/p\u003e\n\u003ch3\u003eما مدى أهمية الاتفاق؟\u003c/h3\u003e\n\u003cp\u003eأولا، لقد كنت أتبنى سابقا الرأي الذي أختلف معه الآن. ولدي اليوم أصدقاء وأقرباء أعزاء يؤمنون بمجيء المسيح قبل الضيقة. وأذكر هذا ببساطة كفرصة لتوضيح أن هذا الخلاف لا يثنيني البتة عن الشركة مع أي مسيحي. فعندما كنت راعيا، قُدت كنيستنا في صياغة إقرار إيمان لم يجعل من هذه المسألة قضية عقائدية فاصلة. فتطابق الآراء حول هذه المسألة لم يكن هو ما يُعرّف كنيستنا.\u003c/p\u003e\n\u003cp\u003eتعليقي الثاني هو أن كتبا بأكملها قد كُتبت للدفاع عن الرأي الذي أطرحه الآن.\u003ca href=\"#ch15-fn-1\"\u003e[١]\u003c/a\u003e وهذا الكتاب ليس واحدا منها. ولذلك، ستكون حججي موجزة. وستترك بعض التساؤلات بلا إجابة. غير أن هذا لا يزعجني، لأن الهدف الرئيسي من هذا الكتاب ليس تغيير آراء أولئك الذين يتبنون نظرة المجيء قبل الضيقة للمجيء الثاني. بل هدفي الرئيسي هو أن يحب كلانا ظهور الرب، بغض النظر عن الرأي الذي نتبناه.\u003c/p\u003e\n\u003ch3\u003eثمانية أسباب لعدم تبني رأي المجيء قبل الضيقة\u003c/h3\u003e\n\u003cp\u003eإن السبب الذي يدفعني لتناول هذا الخلاف من الأساس هو أنني أحاول الإجابة عن التساؤل حول ما إذا كان ينبغي لنا أن نؤمن بأن العهد الجديد يُعلّم بأن يسوع قد يأتي في أية لحظة. فإحدى الحجج المستخدمة لدعم نظرة المجيء قبل الضيقة هي أن العهد الجديد يُعلّم بالفعل بأن يسوع قد يأتي في أية لحظة، وأنه لا يمكن الحفاظ على رجوع \"في أية لحظة\" إلا من خلال تقسيم مجيء الرب إلى جزأين. فإذا كان الرب سيأتي بعد الضيقة العظيمة (مجيء بعد الضيقة - Posttribulational)، فإن مجيئه لا يمكن أن يكون في أية لحظة لأن بعض جوانب تلك الضيقة لم تحل بنا بعد. إذ يجب أن تقع تلك الأحداث أولا. لذا، فإن السبب الذي يدفعني لتناول نظرة المجيء قبل الضيقة هو لبيان أن نظرة مجيء المسيح في أية لحظة هي نظرة خاطئة. وبالطبع، يُعد هذا الهدف جزءا من الغاية الأكبر المتمثلة في جلب وضوح كتابي لتفكيرنا حول مجيء الرب، وبالتالي إزالة العقبات غير الضرورية التي تعيق محبة ظهوره.\u003c/p\u003e\n\u003ch4\u003e١. كيف نلاقي الرب في الهواء\u003c/h4\u003e\n\u003cp\u003eيقول رأي المجيء قبل الضيقة إن [تسالونيكي الأولى ٤ : ١٧] يصف الجزء الأول من رجوع المسيح، والذي يرجع بعده إلى السماء مع كنيسته المختطفة: «ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ [ἀπάντησιν - apantēsin] الرَّبِّ فِي الْهَوَاءِ، وَهكَذَا نَكُونُ كُلَّ حِينٍ مَعَ الرَّبِّ.»\u003c/p\u003e\n\u003cp\u003eلم تَرِد الكلمة المترجمة \"لملاقاة\" (في الأصل اليوناني) إلا في موضعين آخرين فقط في العهد الجديد، وفي كليهما، تشير الكلمة إلى لقاء يخرج فيه الناس لملاقاة شخصي رفيع المستوى ثم يرافقونه إلى المكان الذي خرجوا منه. ففي [أعمال الرسل ٢٨]، يصف لوقا مجموعة مرحبة من المسيحيين خرجت من روما لملاقاة بولس الوافد حديثا والترحيب بقدومه:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَمِنْ هُنَاكَ لَمَّا سَمِعَ الإِخْوَةُ بِخَبَرِنَا، خَرَجُوا لاسْتِقْبَالِنَا [ἀπάντησιν - apantēsin] إِلَى فُورُنِ أَبِّيُوسَ وَالثَّلاَثَةِ الْحَوَانِيتِ. فَلَمَّا رَآهُمْ بُولُسُ شَكَرَ اللهَ وَتَشَجَّعَ. وَلَمَّا دَخَلْنَا رُومِيَةَ... أَمَّا بُولُسُ فَأُذِنَ لَهُ أَنْ يُقِيمَ وَحْدَهُ مَعَ الْعَسْكَرِيِّ الَّذِي كَانَ يَحْرُسُهُ.» [أعمال الرسل ٢٨ : ١٥-١٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوفي [متى ٢٥ : ٦]، لدينا صورة للمجيء الثاني نفسه. فهو يصور العذارى الخمس الحكيمات يخرجن لملاقاة العريس العائد ويرافقنه إلى وليمة العرس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَفِي نِصْفِ اللَّيْلِ صَارَ صُرَاخٌ: هُوَذَا الْعَرِيسُ مُقْبِلٌ، فَاخْرُجْنَ لِلِقَائِهِ! [ἀπάντησιν - apantēsin]... وَفِيمَا هُنَّ [العذارى الجاهلات] ذَاهِبَاتٌ لِيَبْتَعْنَ جَاءَ الْعَرِيسُ، وَالْمُسْتَعِدَّاتُ دَخَلْنَ مَعَهُ إِلَى الْعُرْسِ، وَأُغْلِقَ الْبَابُ.» [متى ٢٥ : ٦، ١٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيوحي هذا بقوة أن الصورة الماثلة أمامنا في [تسالونيكي الأولى ٤ : ١٧] هي صورة للمؤمنين المسيحيين يصعدون لملاقاة الرب في الهواء ويرافقونه في عودته إلى ملكوته الشرعي على الأرض. فالكلمة لا توحي بأي رحيل مع المسيح عن الأرض.\u003c/p\u003e\n\u003ch4\u003e٢. الراحة والنقمة في اليوم عينه\u003c/h4\u003e\n\u003cp\u003eإن صياغة [تسالونيكي الثانية ١ : ٥-٨]، عند قراءتها بعناية، تُظهر أن بولس، إن كان حيا عند مجيء الرب، يتوقع نوال الراحة من الألم في الوقت ذاته، وفي الحدث عينه، الذي يتوقع فيه أن ينال غير المؤمنين عقابهم — وتحديدا، عند استعلان يسوع مع ملائكة قوته في نار لهيب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«بَيِّنَةً عَلَى قَضَاءِ اللهِ الْعَادِلِ، أَنَّكُمْ تُؤَهَّلُونَ لِمَلَكُوتِ اللهِ الَّذِي لأَجْلِهِ تَتَأَلَّمُونَ أَيْضًا. إِذْ هُوَ عَادِلٌ عِنْدَ اللهِ أَنَّ الَّذِينَ يُضَايِقُونَكُمْ يُجَازِيهِمْ ضِيقًا، وَإِيَّاكُمُ الَّذِينَ تَتَضَايَقُونَ رَاحَةً مَعَنَا، عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن استعلان الرب يسوع من السماء في [تسالونيكي الثانية ١ : ٧] ليس اختطافا قبل الضيقة، لأنه لا ينطوي على راحة المؤمنين فحسب، بل يشمل أيضا عقاب غير المؤمنين في نار لهيب. مما يعني أن بولس لم يكن يتوقع حدثا يُمنح فيه هو وسائر المؤمنين راحة قبل سبع سنوات من ظهور المسيح المجيد في نار لهيب. فالنقمة على غير المؤمنين والراحة للكنيسة المضطهدة يأتيان في اليوم عينه وفي الحدث عينه\u003ca href=\"#ch15-fn-2\"\u003e[٢]\u003c/a\u003e — المجيء الثاني الواحد.\u003c/p\u003e\n\u003ch4\u003e٣. الاجتماع إلى المسيح يكون في يوم الرب\u003c/h4\u003e\n\u003cp\u003eوبالمثل، توحي صياغة [تسالونيكي الثانية ٢ : ١-٢] بأن الاجتماع لملاقاة الرب في الهواء هو ذاته \"يوم الرب\" (أو يوم المسيح) حين يدين يسوع غير المؤمنين وينقذ المؤمنين:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نَسْأَلُكُمْ أَيُّهَا الإِخْوَةُ مِنْ جِهَةِ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَاجْتِمَاعِنَا إِلَيْهِ، أَنْ لاَ تَتَزَعْزَعُوا سَرِيعًا عَنْ ذِهْنِكُمْ، وَلاَ تَرْتَاعُوا، لاَ بِرُوحٍ وَلاَ بِكَلِمَةٍ وَلاَ بِرِسَالَةٍ كَأَنَّهَا مِنَّا: أَيْ أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلا يبدو من المنطقي التمييز بين هذا \"الاجتماع إليه [إلى الرب]\" وبين \"يوم الرب\" (أو يوم المسيح). فتدفق الأفكار يتعامل معهما كشيء واحد. إن الطريقة الطبيعية لفهم الاجتماع إلى الرب هي رؤيته في ضوء [تسالونيكي الأولى ٤ : ١٧]: «ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ، وَهكَذَا نَكُونُ كُلَّ حِينٍ مَعَ الرَّبِّ.» فهذا هو ذاته \"اجتماعنا إليه\" المذكور في [تسالونيكي الثانية ٢ : ١]. وهو ذاته \"يوم المسيح\" [تسالونيكي الثانية ٢ : ٢].\u003c/p\u003e\n\u003cp\u003eوالطريقة الطبيعية لفهم \"يوم الرب\" هي رؤيته في ضوء \"اليوم\" الذي يصفه بولس فيما يلي. ففي ذلك \"اليوم\" [تسالونيكي الثانية ٢ : ٣]، وبعد أن \"يستعلن إنسان الخطية\" [تسالونيكي الثانية ٢ : ٣]، فإن: «الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ، وَيُبْطِلُهُ بِظُهُورِ مَجِيئِهِ» [تسالونيكي الثانية ٢ : ٨]. ولذلك، فإن الاجتماع لملاقاة الرب والدينونة على أعداء الله هما الحدث عينه. فالاختطاف لا يحدث قبل سبع سنوات من \"ظهور مجيئه\" بقوة مدمرة. بل هما جزءان من الحدث ذاته.\u003c/p\u003e\n\u003ch4\u003e٤. يحاجج بولس كمن يؤمن بمجيء بعد الضيقة\u003c/h4\u003e\n\u003cp\u003eلو كان بولس ممن يتبنون المجيء قبل الضيقة، فلماذا لم يقل ببساطة في [تسالونيكي الثانية ٢ : ٣] إنه لا داعي لقلق المسيحيين من أن يكون يوم الرب قد حضر لأن جميع المسيحيين لا يزالون هنا؟ وأنهم لم يُختطفوا بعد. لكنه لم يقل ذلك. بل عوضا عن ذلك، يتحدث بالطريقة عينها التي تتوقع أن يتحدث بها من يؤمن بمجيء بعد الضيقة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نَسْأَلُكُمْ أَيُّهَا الإِخْوَةُ مِنْ جِهَةِ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَاجْتِمَاعِنَا إِلَيْهِ، أَنْ لاَ تَتَزَعْزَعُوا سَرِيعًا عَنْ ذِهْنِكُمْ، وَلاَ تَرْتَاعُوا، لاَ بِرُوحٍ وَلاَ بِكَلِمَةٍ وَلاَ بِرِسَالَةٍ كَأَنَّهَا مِنَّا: أَيْ أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ. لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ، ابْنُ الْهَلاَكِ.» [تسالونيكي الثانية ٢ : ١-٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيخبرهم بولس بأنه لا ينبغي لهم أن يظنوا أن يوم الرب قد حضر، لأن الارتداد وإنسان الخطية لم يظهرا بعد. وبعبارة أخرى، هو يصف حدثين يجب أن يقعا قبل مجيء الرب، والذي رأينا سلفا أنه الحدث ذاته المتمثل في اجتماع المؤمنين في [تسالونيكي الأولى ٤ : ١٧]، حين يحدث \"الاختطاف\".\u003c/p\u003e\n\u003ch4\u003e٥. يصور يسوع تلاميذه المستقبليين وهم يحتملون الضيقة\u003c/h4\u003e\n\u003cp\u003eعندما تقرأ [متى ٢٤] أو [مرقس ١٣] أو [لوقا ٢١]، والتي سأحاجج في الفصل السادس عشر بأنها لا تقتصر على أحداث القرن الأول بل تتضمن أوصاف يسوع لأوقات النهاية المؤدية إلى المجيء الثاني للمسيح، لا تجد أي ذكر لاختطاف ينزع المؤمنين من أي من أحداث النهاية. فالقراءة الطبيعية لا تعطي أي انطباع برحيل المسيحيين عن الأرض. بل على النقيض من ذلك، يتحدث يسوع وكأن السامعين المؤمنين، ثم القراء اللاحقين، سيعيشون أو قد يعيشون الأحداث التي يذكرها (راجع [متى ٢٤ : ٤، ٩، ١٥، ٢٣، ٢٦، ٣٣]).\u003c/p\u003e\n\u003ch4\u003e٦. يختبر المسيحيون الضيقة كتنقية، لا كغضب\u003c/h4\u003e\n\u003cp\u003eيُحاجج رأي المجيء قبل الضيقة بأنه سيكون من المخالف لطرق الله أن يسمح للمسيحيين بالمرور في الضيقة العظيمة، التي تتميز بغضبه. غير أن التعليم المعتاد للعهد الجديد هو أنه: «بِضِيقَاتٍ كَثِيرَةٍ يَنْبَغِي أَنْ نَدْخُلَ مَلَكُوتَ اللهِ.» [أعمال الرسل ١٤ : ٢٢]. وحتى عندما تكون الضيقة من الله، يُصوّر المؤمنون وهم يمرون فيها، لا كعقاب بل كتنقية. فعلى سبيل المثال، يكتب بطرس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَيُّهَا الأَحِبَّاءُ، لاَ تَسْتَغْرِبُوا الْبَلْوَى الْمُحْرِقَةَ الَّتِي بَيْنَكُمْ حَادِثَةٌ، لأَجْلِ امْتِحَانِكُمْ، كَأَنَّهُ أَصَابَكُمْ أَمْرٌ غَرِيبٌ... لأَنَّهُ الْوَقْتُ لابْتِدَاءِ الْقَضَاءِ مِنْ بَيْتِ اللهِ. فَإِنْ كَانَ أَوَّلاً مِنَّا، فَمَا هِيَ نِهَايَةُ الَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ اللهِ؟ «وَإِنْ كَانَ الْبَارُّ بِالْجَهْدِ يَخْلُصُ، فَالْفَاجِرُ وَالْخَاطِئُ أَيْنَ يَظْهَرَانِ؟» فَإِذًا، الَّذِينَ يَتَأَلَّمُونَ بِحَسَبِ مَشِيئَةِ اللهِ، فَلْيَسْتَوْدِعُوا أَنْفُسَهُمْ، كَمَا لِخَالِق أَمِينٍ،فِي عَمَلِ الْخَيْرِ.» [بطرس الأولى ٤ : ١٢، ١٧-١٩]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفالمؤمنون ليسوا معفيين من الضيقة، حتى أشد أنواعها — بل وحتى عندما تكون الضيقة مقدرة ومعينة من الله.\u003c/p\u003e\n\u003cp\u003eكان بطرس قد وصف سلفا في الأصحاح الأول من رسالته سبب حدوث هذه التجارب النارية (πειρασμὸν - peirasmon) [بطرس الأولى ٤ : ١٢] للمؤمنين:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي بِهِ تَبْتَهِجُونَ، مَعَ أَنَّكُمُ الآنَ — إِنْ كَانَ يَجِبُ — تُحْزَنُونَ يَسِيرًا بِتَجَارِبَ [πειρασμοῖς - peirasmois] مُتَنَوِّعَةٍ، لِكَيْ تَكُونَ تَزْكِيَةُ إِيمَانِكُمْ، وَهِيَ أَثْمَنُ مِنَ الذَّهَبِ الْفَانِي، مَعَ أَنَّهُ يُمْتَحَنُ بِالنَّارِ، تُوجَدُ لِلْمَدْحِ وَالْكَرَامَةِ وَالْمَجْدِ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ.» [بطرس الأولى ١ : ٦-٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيختبر المؤمنون نيران التجربة لا كعقاب بل كتنقية تصفي الذهب. ومحاججة البعض بأن المسيحيين لا يمكن أن يجتازوا في «ضِيقٌ عَظِيمٌ» [متى ٢٤ : ٢١]؛ [رؤيا ٧ : ١٤]، لكونها تنطوي على دينونة غضب الله، تفشل في التمييز بين كيف يمكن لقصد الله في الضيقة أن يكون مدمرا لغير المؤمنين ومنقيا للمؤمنين.\u003c/p\u003e\n\u003ch4\u003e٧. محفوظون من ساعة التجربة\u003c/h4\u003e\n\u003cp\u003eأحد النصوص المستخدمة لدعم نظرة المجيء قبل الضيقة هو [رؤيا ٣ : ١٠]: «لأَنَّكَ حَفِظْتَ كَلِمَةَ صَبْرِي، أَنَا أَيْضًا سَأَحْفَظُكَ مِنْ سَاعَةِ التَّجْرِبَةِ الْعَتِيدَةِ أَنْ تَأْتِيَ عَلَى الْعَالَمِ كُلِّهِ لِتُجَرِّبَ السَّاكِنِينَ عَلَى الأَرْضِ.» فهل تعني كلمات \"سأحفظك من ساعة التجربة\" أن المسيحيين سيُنقلون من العالم قبل الضيقة؟\u003c/p\u003e\n\u003cp\u003eثمة تفسير طبيعي آخر. فأن تكون \"محفوظا من ساعة التجربة\" لا يعني بالضرورة أن تُنقل من العالم في أثناء هذه الساعة، فتنجو بذلك من الألم، بل يعني أن تُحفظ أمينا وأنت تجتاز فيها. قارن هذا بما ورد في [غلاطية ١ : ٣-٥]:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«نِعْمَةٌ لَكُمْ وَسَلاَمٌ مِنَ اللهِ الآبِ، وَمِنْ رَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِي بَذَلَ نَفْسَهُ لأَجْلِ خَطَايَانَا، لِيُنْقِذَنَا مِنَ الْعَالَمِ الْحَاضِرِ الشِّرِّيرِ حَسَبَ إِرَادَةِ اللهِ وَأَبِينَا، الَّذِي لَهُ الْمَجْدُ إِلَى أَبَدِ الآبِدِينَ. آمِينَ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن الإنقاذ \"من العالم... الشرير\" (أو الدهر الشرير) لا يعني أننا نُنقل منه، بل يعني أن إيماننا يُحفظ بينما نحن نجتاز فيه. وبالمثل، يصلي يسوع في [يوحنا ١٧ : ١٥]: «لَسْتُ أَسْأَلُ أَنْ تَأْخُذَهُمْ مِنَ الْعَالَمِ بَلْ أَنْ تَحْفَظَهُمْ مِنَ الشِّرِّيرِ.» فأن يحفظنا \"من الشرير\" لا يعني أننا نخرج من العالم، أو نخرج من نطاق نفوذه. بل يعني أننا محميون من قوته المدمرة بينما نحن باقون في العالم.\u003c/p\u003e\n\u003cp\u003eوحتى في سفر الرؤيا نفسه (حيث نجد هذا الوعد في ٣ : ١٠)، نُمنح وعدا بأن الله سيقتضي الاستشهاد من بعض شعبه في الأيام الأخيرة. «فَأُعْطُوا [الشهداء تحت المذبح السماوي] كُلُّ وَاحِدٍ ثِيَابًا بِيضًا، وَقِيلَ لَهُمْ أَنْ يَسْتَرِيحُوا زَمَانًا يَسِيرًا أَيْضًا حَتَّى يَكْمَلَ الْعَبِيدُ رُفَقَاؤُهُمْ، وَإِخْوَتُهُمْ أَيْضًا، الْعَتِيدُونَ أَنْ يُقْتَلُوا مِثْلَهُمْ.» [رؤيا ٦ : ١١]. إن وعد [رؤيا ٣ : ١٠] يعني أن شعب الله سيُحفظ من القوى المدمرة للإيمان في تلك الساعة، وليس أنه سيكون هناك اختطاف يُخرجهم من عالم مضطرب.\u003c/p\u003e\n\u003ch4\u003e٨. إلحاح السهر واليقظة لن تضيع\u003c/h4\u003e\n\u003cp\u003eيضع رأي المجيء قبل الضيقة قيمة عالية، وكما ينبغي له أن يفعل، على التأثيرات التقديسية، الأخلاقية والروحية، للمجيء غير المتوقع للمسيح. وسنرى في الفصل الثامن عشر أن هذا الاهتمام المشروع محفوظ بالكامل في النظرة للمجيء الثاني التي أوصي بها. فإلحاح السهر والانتباه والاستعداد واليقظة لن تضيع. غير أن التركيز سينصب على التأثيرات التقديسية لمحبة ظهور الرب، كما نرى ذلك في [يوحنا الأولى ٣ : ٢-٣]: «وَلكِنْ نَعْلَمُ أَنَّهُ إِذَا أُظْهِرَ نَكُونُ مِثْلَهُ، لأَنَّنَا سَنَرَاهُ كَمَا هُوَ. وَكُلُّ مَنْ عِنْدَهُ هذَا الرَّجَاءُ بِهِ، يُطَهِّرُ نَفْسَهُ كَمَا هُوَ طَاهِرٌ.»\u003c/p\u003e\n\u003ch3\u003eظهور مستقبلي واحد للمسيح\u003c/h3\u003e\n\u003cp\u003eأستنتج من هذه الحجج الثماني أن هناك مجيئا ثانيا واحدا للمسيح. وهو لا يقع قبل ضيقة عظيمة بهدف إنقاذ المسيحيين وإخراجهم من العالم. بل إنه يقع كذروة حاسمة عند قيامة المسيحيين وينطوي على إنقاذ للمؤمنين ودينونة لغير المؤمنين في آن واحد.\u003ca href=\"#ch15-fn-3\"\u003e[٣]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eولذلك، لا يمكن لموقف المجيء قبل الضيقة أن يقدم دعما مقنعا للرأي القائل بأن العهد الجديد يُعلّم برجوع يسوع في أية لحظة. لذا، ولمواصلة سعينا نحو إجابة كتابية عن التساؤل حول ما يُعلمه العهد الجديد حقا، ننتقل الآن إلى الخطوة الثانية من حجتنا ذات الخطوات الثلاث.\u003c/p\u003e\n\u003cp\u003eسأحاول أن أبين في الفصل القادم أن نظرة بولس للمجيء الثاني ونظرة يسوع (لاسيما في [متى ٢٤]) هما نظرة واحدة. وسيكون لهذا تداعيات مهمة على الخطوة الثالثة (الفصل السابع عشر)، وتحديدا، ما هي الأحداث التي يجب أن تقع قبل مجيء المسيح.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch15-ref-1\"\u003e[١]\u003c/a\u003e جورج إلدون لاد، الرجاء المبارك: دراسة كتابية للمجيء الثاني والاختطاف (غراند رابيدز، ميشيغان: إيردمانز، ١٩٩٠)؛ روبرت إتش. غوندري، الكنيسة والضيقة (غراند رابيدز، ميشيغان: زوندرفان، ١٩٧٣).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch15-ref-2\"\u003e[٢]\u003c/a\u003e يتضح التزامن بين الدينونة والإنقاذ من خلال (١) قول بولس إن كليهما يحدثان «عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ» (ἐν τῇ ἀποκαλύψει τοῦ κυρίου Ἰησοῦ ἀπʼ οὐρανοῦ μετʼ ἀγγέλων δυνάμεως αὐτοῦ - en tē apokalypsei tou kyriou Iēsou ap’ ouranou met’ angelōn dynameōs autou) [تسالونيكي الثانية ١ : ٧]، و(٢) من خلال قوله إن الدينونة تحدث «مَتَى جَاءَ لِيَتَمَجَّدَ فِي قِدِّيسِيهِ» (ὅταν ἔλθῃ ἐνδοξασθῆναι ἐν τοῖς ἁγίοις αὐτοῦ - hotan elthē endoxasthēnai en tois hagiois autou) [تسالونيكي الثانية ١ : ١٠].\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch15-ref-3\"\u003e[٣]\u003c/a\u003e انظر الفصل الثامن.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEipIRSFiao37CxGmBlT1MbelYH5QusR5DKFBZE6v0tb76KZCuqwDUvyZ3bwdTT6ImyrfwzCckY0RPg1sDZ5nwWjOmUjs9bb3KQ8J1OxN5mXanKm3SgMLYy6Zad2_MkATqM8WrXNsVgyq-vBqnG-xM8g282dNXEtGuFcqiRw30Bmb0raWiTbQYtPRPCbfiM/s2752/%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A__%D8%AD%D8%AF%D8%AB_%D8%A3%D9%85_%D8%AD%D8%AF%D8%AB%D8%A7%D9%86%D8%9F.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEipIRSFiao37CxGmBlT1MbelYH5QusR5DKFBZE6v0tb76KZCuqwDUvyZ3bwdTT6ImyrfwzCckY0RPg1sDZ5nwWjOmUjs9bb3KQ8J1OxN5mXanKm3SgMLYy6Zad2_MkATqM8WrXNsVgyq-vBqnG-xM8g282dNXEtGuFcqiRw30Bmb0raWiTbQYtPRPCbfiM/s600/%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A__%D8%AD%D8%AF%D8%AB_%D8%A3%D9%85_%D8%AD%D8%AF%D8%AB%D8%A7%D9%86%D8%9F.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"18:T6ef1,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الرابع عشر\u003c/h2\u003e\n\u003cp\u003eماذا يقصد العهد الجديد بأن يسوع سيأتي سريعا؟\u003c/p\u003e\n\u003cp\u003eيعبر العهد الجديد عن فكرة توقع مجيء الرب \"سريعا\" بطرق عدة: «اِفْرَحُوا فِي الرَّبِّ كُلَّ حِينٍ، وَأَقُولُ أَيْضًا: افْرَحُوا. لِيَكُنْ حِلْمُكُمْ مَعْرُوفًا عِنْدَ جَمِيعِ النَّاسِ. اَلرَّبُّ قَرِيبٌ» [ἐγγύς - engys]. [فيلبي ٤ : ٤-٥]\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ تَحْتَاجُونَ إِلَى الصَّبْرِ، حَتَّى إِذَا صَنَعْتُمْ مَشِيئَةَ اللهِ تَنَالُونَ الْمَوْعِدَ. لأَنَّهُ بَعْدَ قَلِيل جِدًّا [μικρὸν ὅσον ὅσον - mikron hoson hoson] سَيَأْتِي الآتِي وَلاَ يُبْطِئُ.» [عبرانيين ١٠ : ٣٦-٣٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَتَأَنَّوْا أَنْتُمْ وَثَبِّتُوا قُلُوبَكُمْ، لأَنَّ مَجِيءَ الرَّبِّ قَدِ اقْتَرَبَ. لاَ يَئِنَّ بَعْضُكُمْ عَلَى بَعْضٍ أَيُّهَا الإِخْوَةُ لِئَلاَّ تُدَانُوا. هُوَذَا الدَّيَّانُ وَاقِفٌ قُدَّامَ الْبَابِ» [θυρῶν - thyrōn]. [يعقوب ٥ : ٨-٩]؛ (راجع [متى ٢٤ : ٣٣]، «مَتَى رَأَيْتُمْ هذَا كُلَّهُ فَاعْلَمُوا أَنَّهُ قَرِيبٌ عَلَى الأَبْوَابِ» [θύραις - thyrais]).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَإِنَّمَا نِهَايَةُ كُلِّ شَيْءٍ قَدِ اقْتَرَبَتْ [ἤγγικεν - ēngiken]، فَتَعَقَّلُوا وَاصْحُوا لِلصَّلَوَاتِ.» [بطرس الأولى ٤ : ٧]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إِعْلاَنُ يَسُوعَ الْمَسِيحِ، الَّذِي أَعْطَاهُ إِيَّاهُ اللهُ، لِيُرِيَ عَبِيدَهُ مَا لاَ بُدَّ أَنْ يَكُونَ عَنْ قَرِيبٍ [ἐν τάχει - en tachei]... وَهَا أَنَا آتِي سَرِيعًا» [ταχύ - tachy]. «طُوبَى لِمَنْ يَحْفَظُ أَقْوَالَ نُبُوَّةِ هذَا الْكِتَابِ... يَقُولُ الشَّاهِدُ بِهذَا: «نَعَمْ! أَنَا آتِي سَرِيعًا»» [ταχύ - tachy]. «آمِينَ. تَعَالَ أَيُّهَا الرَّبُّ يَسُوعُ.» [رؤيا ١ : ١]؛ [رؤيا ٢٢ : ٧، ٢٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوهنا يبرز التساؤل المحوري: إذا كان المتحدث المعصوم باسم يسوع المسيح لا يعلم متى سيرجع الرب (كما قال يسوع إنه سيكون الحال، [متى ٢٤ : ٣٦])، فماذا يقصد هذا المتحدث بقوله إنه سيكون \"سريعا\" [رؤيا ٢٢ : ٢٠]، أو \"اقتربت\" [بطرس الأولى ٤ : ٧]، أو \"قدام الباب\" [يعقوب ٥ : ٩]؟\u003c/p\u003e\n\u003cp\u003eأعتقد أنه من الخطأ في فهم مغزى [متى ٢٤ : ٣٦] أن نقول إن يسوع لم يكن يعلم \"اليوم والساعة\" ولكنه كان يعلم الشهر أو السنة. فالغاية من عدم معرفة يسوع بالوقت هي إزالة أي إمكانية لحساب المدة التي نجرؤ فيها على اللامبالاة تجاه مجيئه. فعدم معرفة \"اليوم أو الساعة\" هو طريقة تصويرية للقول بأنه لا هو ولا نحن قادرون على التنبؤ بالوقت.\u003c/p\u003e\n\u003cp\u003eلذا يبقى التساؤل قائما: ماذا يعني إذن، بالنسبة لكاتب معصوم، لا يستطيع التنبؤ بالوقت، أن يقول إن يسوع آت سريعا، أو أن يسوع على الباب، أو أن يسوع قريب، أو أن يسوع سيأتي بعد قليل جدا؟ ماذا يقصد كُتّاب العهد الجديد بتنبؤاتهم عن قرب يسوع؟ وبأي معنى يقصدون أنه قريب؟\u003c/p\u003e\n\u003cp\u003eللإجابة عن هذه التساؤلات، سأطرح ثلاثة مصطلحات أعتقد أنها متأصلة في النصوص الكتابية، ثم سأقدم شرحا موجزا لكل منها: قريب إمكانيا، وقريب شموليا، وقريب إلهيا.\u003c/p\u003e\n\u003ch3\u003eقريب إمكانيا\u003c/h3\u003e\n\u003cp\u003eأولا، يقصد الرسل أن يسوع قريب إمكانيا.\u003c/p\u003e\n\u003cp\u003eأي أنه قريب بمعنى أن أي افتراض من جانبنا بإبطائه سيكون حماقة. وكأن الرسل يقولون: \"أنتم تعلمون أننا لا نستطيع التنبؤ بوقت مجيء الرب، لأن الرب نفسه لم يكن يعلم الوقت [متى ٢٤ : ٣٦]، وقد أخبرنا: «لَيْسَ لَكُمْ أَنْ تَعْرِفُوا الأَزْمِنَةَ وَالأَوْقَاتَ الَّتِي جَعَلَهَا الآبُ فِي سُلْطَانِهِ» [أعمال الرسل ١ : ٧]. لذلك، أنتم تعلمون أننا عندما نقول 'سريعا' فإننا لا نفعل ما لا نستطيع فعله. نحن لا نتنبأ بما لا يمكننا التنبؤ به. بل نحن نخبركم أنه قريب إمكانيا، مما يعني أن استبدال الرجاء في سرعة مجيئه هذه بافتراض الإبطاء سيجعلكم غير مستعدين لمجيئه ويقودكم إلى الهلاك.\"\u003c/p\u003e\n\u003cp\u003eوأقصد بالافتراض ذلك الزعم غير المبرر بأن مجيئه بعيد جدا لدرجة أنني لست في خطر من مجيئه بينما أهمل يقظتي للسلوك باستقامة. فهذا الافتراض يفشل في إدراك حقيقة أن الافتقار إلى اليقظة الآن قد يؤدي إلى غفلة تامة لبقية حياتك، بحيث يفاجئك المجيء الذي تظنه بعيدا وأنت غير مستعد على الإطلاق.\u003c/p\u003e\n\u003cp\u003eأستمد هذا المعنى لكلمة \"سريعا\" من توضيح يسوع للمجيء الثاني في [متى ٢٤ : ٤٥-٥١]: «فَمَنْ هُوَ الْعَبْدُ الأَمِينُ الْحَكِيمُ الَّذِي أَقَامَهُ سَيِّدُهُ عَلَى خَدَمِهِ لِيُعْطِيَهُمُ الطَّعَامَ فِي حِينِهِ؟ طُوبَى لِذلِكَ الْعَبْدِ الَّذِي إِذَا جَاءَ سَيِّدُهُ يَجِدُهُ يَفْعَلُ هكَذَا! اَلْحَقَّ أَقُولُ لَكُمْ: إِنَّهُ يُقِيمُهُ عَلَى جَمِيعِ أَمْوَالِهِ. وَلكِنْ إِنْ قَالَ ذلِكَ الْعَبْدُ الرَّدِيُّ فِي قَلْبِهِ: سَيِّدِي يُبْطِئُ قُدُومَهُ. فَيَبْتَدِئُ يَضْرِبُ الْعَبِيدَ رُفَقَاءَهُ وَيَأْكُلُ وَيَشْرَبُ مَعَ السُّكَارَى. يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ فِي يَوْمٍ لاَ يَنْتَظِرُهُ وَفِي سَاعَةٍ لاَ يَعْرِفُهَا، فَيُقَطِّعُهُ وَيَجْعَلُ نَصِيبَهُ مَعَ الْمُرَائِينَ. هُنَاكَ يَكُونُ الْبُكَاءُ وَصَرِيرُ الأَسْنَانِ.»\u003c/p\u003e\n\u003cp\u003eوالتحذير هو هذا: إياك أن تفترض إبطاء السيد. أي، إياك أن تفترض أن إهمال اليقظة الروحية لن يقابل بمفاجأة ظهوره. ارجُ دائما وصوله السريع وتصرف في ضوء ذلك. إن القول بأن مجيء يسوع قريب وأنت لا تعلم متى سيأتي، يعني أنه قريب إمكانيا، وأن أي افتراض بخلاف ذلك هو خطر جسيم.\u003c/p\u003e\n\u003ch3\u003eقريب شموليا\u003c/h3\u003e\n\u003cp\u003eثانيا، يقصد الرسل أن يسوع قريب شموليا.\u003c/p\u003e\n\u003cp\u003eأي أنه كجزء من رؤية شمولية وموحدة لوقت النهاية، هو قريب لأنه، وبالنظر إلى الصورة ككل، فإن \"النهاية\"، أي \"الأيام الأخيرة\"، حاضرة بالفعل. فالنهاية، في شموليتها، قد بدأت. عندما نقول إن يسوع والرسل لم يكونوا يعلمون متى سيقع المجيء الثاني، فإننا نعني أن المستقبل الذي منحوا أن يروه كان أشبه بسلاسل جبلية متتابعة تبدو كسلسلة واحدة. وهذه السلسلة المتداخلة من القمم الجبلية، التي تبدو كواحدة، هي ما أقصده برؤية شمولية وموحدة لوقت النهاية.\u003c/p\u003e\n\u003cp\u003eلقد أمضت عائلتي بعض الوقت في منزل في ولاية تينيسي له شرفة أمامية تواجه الشمال الشرقي. في أمسية صافية تماما، يمكننا رؤية سبع سلاسل جبلية متمايزة على الأقل من تلك الشرفة. ولكن في أمسية ضبابية، تبدو وكأنها سلسلة جبلية واحدة. وقد استخدمت مصطلح جورج إلدون لاد \"المنظور النبوي\" لوصف هذه الطريقة في رؤية المستقبل.\u003ca href=\"#ch14-fn-1\"\u003e[١]\u003c/a\u003e فهي ترى الواقع البعيد والواقع القريب كشيء واحد. وأنا أستخدم مصطلح \"قريب شموليا\"، بدلا من \"قريب نبويا\"، لأنني أعتقد أنه قد يثير في ذاكرتنا بصورة أوضح فكرة كون المجيء الثاني جزءا من رؤية متداخلة أو مقربة لتاريخ من الأحداث يرى ككل واحد.\u003c/p\u003e\n\u003ch3\u003eنحن نعيش في انقضاء الدهور\u003c/h3\u003e\n\u003cp\u003eلقد أشرنا سابقا إلى أن \"الأيام الأخيرة\" قد بدأت مع المجيء الأول للمسيا. «مَعْرُوفًا سَابِقًا قَبْلَ تَأْسِيسِ الْعَالَمِ، وَلكِنْ قَدْ أُظْهِرَ فِي الأَزْمِنَةِ الأَخِيرَةِ مِنْ أَجْلِكُمْ، أَنْتُمُ الَّذِينَ بِهِ تُؤْمِنُونَ بِاللهِ» [بطرس الأولى ١ : ٢٠-٢١]. «كَلَّمَنَا فِي هذِهِ الأَيَّامِ الأَخِيرَةِ فِي ابْنِهِ» [عبرانيين ١ : ٢]. «وَلكِنَّهُ الآنَ قَدْ أُظْهِرَ مَرَّةً عِنْدَ انْقِضَاءِ الدُّهُورِ لِيُبْطِلَ الْخَطِيَّةَ بِذَبِيحَةِ نَفْسِهِ» [عبرانيين ٩ : ٢٦]؛ (راجع [كورنثوس الأولى ١٠ : ١١]).\u003c/p\u003e\n\u003cp\u003eوهذا يقتضي أن تكون رؤية الفترة بأكملها بين التجسد والمجيء الثاني عبارة عن سلسلة جبلية عظيمة واحدة ذات تلال وقمم عديدة كانت غير متمايزة بالنسبة للرسل. لقد منحوا معرفة تفاصيل كثيرة، ولكن القليل جدا عن الإطار الزمني العام. لقد رأوا النهاية في مجملها كحقيقة واحدة، وهم يتحدثون عنها شموليا كأمر قريب لأنها، ككل، قريبة. وهذا الكل القريب يشمل مجيئه (الباروسيا) — مجيء يسوع. ولذلك، فهو أيضا قريب — قريب كجزء من الكل الذي بدأ بالفعل. وإليكم الطريقة التي يعبر بها سي. إي. بي. كرانفيلد عن الأمر:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eإذا أدركنا أن التجسد-الصلب-القيامة-الصعود، من ناحية، والباروسيا [المجيء الثاني]، من ناحية أخرى، ينتميان جوهريا إلى بعضهما البعض وهما بمعنى حقيقي حدث واحد، عمل إلهي واحد، لا يفصل بينهما سوى رحمة الله الذي يشاء أن يمنح الناس فرصة للإيمان والتوبة، فحينئذ يمكننا أن نرى أنه بمعنى حقيقي جدا، يكون الأخير وشيكا دائما الآن وقد حد
