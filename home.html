سلطانه. أمر الريح فأطاعته. وعندما رأى التلاميذ ذلك، تعجبوا. ثم عبدوا. \"’فَحَدَثَ نَوْءُ رِيحٍ عَظِيمٌ، فَكَانَتِ الأَمْوَاجُ تَضْرِبُ إِلَى السَّفِينَةِ… فَقَامَ وَانْتَهَرَ الرِّيحَ، وَقَالَ لِلْبَحْرِ: ’اسْكُتْ! اِبْكَمْ!‘. فَسَكَنَتِ الرِّيحُ وَصَارَ هُدُوءٌ عَظِيمٌ… فَخَافُوا خَوْفًا عَظِيمًا، وَقَالُوا بَعْضُهُمْ لِبَعْضٍ: ’مَنْ هُوَ هذَا؟ فَإِنَّ الرِّيحَ أَيْضًا وَالْبَهْرَ يُطِيعَانِهِ!‘\" (مرقس ٤: ٣٧-٤١). أطاع الماء يسوع بأكثر من طريقة. عندما أمر، أصبح الماء صلبًا تحت قدميه، ومشى عليه. وعندما رأى التلاميذ ذلك، \"سَجَدُوا لَهُ قَائِلِينَ: ’بِالْحَقِيقَةِ أَنْتَ ابْنُ اللهِ!‘\" (متى ١٤: ٣٣). في مرة أخرى، أمر الماء، فصار خمرًا في عرس قانا الجليل. ويقول يوحنا إنه \"’أَظْهَرَ مَجْدَهُ، فَآمَنَ بِهِ تَلاَمِيذُهُ.‘\" (يوحنا ٢: ١١). الريح والماء يفعلان كل ما يأمرهما به الرب يسوع. اسكت. احمل الوزن. صِرْ خمرًا. السنن الكونية خلقها المسيح وتتغير بأمره. تركيب كل شيء لم يُخلق فقط بواسطة المسيح، بل يُحفظ أيضًا لحظة بلحظة في الكون كله بإرادته. \"’وَهُوَ... حَامِلٌ كُلَّ الأَشْيَاءِ بِكَلِمَةِ قُدْرَتِهِ‘\" (عبرانيين ١: ٣). \"’وَفِيهِ يَقُومُ الْكُلُّ‘\" (كولوسي ١: ١٧).\u003c/p\u003e\n\u003cp\u003eالوفيات، الحمى، السمك، الطعام، أشجار التين. أينما التفت، المسيح هو السيد المطلق على كل مادة في الكون. بكلمة يأمر الموتى أن يعيشوا مرة أخرى. \"’لِعَازَرُ، هَلُمَّ خَارِجًا‘\" (يوحنا ١١: ٤٣). \"’أَيُّهَا الشَّابُّ، لَكَ أَقُولُ: قُمْ‘\" (لوقا ٧: ١٤). \"’طَلِيثَا، قُومِي!‘ (مرقس ٥: ٤١). وانتهر الحمى فتركت حماة بطرس (لوقا ٤: ٣٩). خطط لسمكة أن تبتلع دينارًا ثم تُصطاد بخطاف بطرس (متى ١٧: ٢٧). أخذ خمسة أرغفة وأطعم خمسة آلاف رجل (متى ١٤: ١٩-٢١). وجعل شجرة تين تذبل عندما لعنها (مرقس ١١: ٢١). الآن لدينا خيار. العبادة أو اللعن. كانت هناك مجموعة عند قبر لعازر كانت الحقائق التي يعرفونها صحيحة ولكن قلوبهم مخطئة. قالوا: \"’أَلَمْ يَقْدِرْ هذَا الَّذِي فَتَحَ عَيْنَيِ الأَعْمَى أَنْ يَجْعَلَ هذَا أَيْضًا لاَ يَمُوتُ؟‘\" (يوحنا ١١: ٣٧). الإجابة على هذا السؤال هي: نعم، يقدر. لقد حدد يسوع توقيت قدومه إلى بيت لعازر ليترك صديقه يموت. انتظر يومين، ثم قال: \"’لِعَازَرُ مَاتَ. وَأَنَا أَفْرَحُ لأَجْلِكُمْ إِنِّي لَمْ أَكُنْ هُنَاكَ، لِتُؤْمِنُوا. وَلكِنْ لِنَذْهَبْ إِلَيْهِ!‘‘\" (يوحنا ١١: ١٤-١٥). نعم، كان بإمكانه إنقاذه. كما كان بإمكانه إنقاذ أبناء أيوب، وعشرة آلاف آخرين في هندوراس وغواتيمالا، بأن يأمر إعصار ميتش أن ينحرف إلى البحر، كما فعل في الجليل. هل سنعبد أم سنلعن الذي يحكم العالم؟ هل نرى أن الخطاة هم من يتحكمون في من يعيش ومن يموت؟ أم سنقول مع حنة: \"’الرَّبُّ يُمِيتُ وَيُحْيِي. يُهْبِطُ إِلَى الْهَاوِيَةِ وَيُصْعِدُ.‘\" (صموئيل الأول ٢: ٦)؟ أو والرماد على رؤوسنا، نعبد مع أيوب: \"’فَلْيَكُنِ اسْمُ الرَّبِّ مُبَارَكًا‘\" (أيوب ١: ٢١)؟ هل سنتعلم من يعقوب أن هناك هدفًا صالحًا في كل هذا: \"’قَدْ سَمِعْتُمْ بِصَبْرِ أَيُّوبَ وَرَأَيْتُمْ عَاقِبَةَ الرَّبِّ. لأَنَّ الرَّبَّ كَثِيرُ الرَّحْمَةِ وَرَؤُوفٌ.‘\" (يعقوب ٥: ١١)؟ ألا ينبغي إذًا أن نواجه الريح ونقف على أمواج الضيق ونغني مع كاثارينا فون شليغل: أثبتي يا نفسي، فإلهُكِ يقودُ، يَهديكِ غدًا كما هدى بالأمسِ. لا يتزعزعْ رجاؤكِ، فهو ثباتُكِ، كلُّ الخفايا ستُضيءُ في النهايةِ. أثبتي يا نفسي، فالموجُ والريحُ لا يزالانِ يَعرِفانِ صوتَهُ. هو الذي أسكتهما حينَ سَكَنَ دُنيانا.\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الرب، العالم كله معاناة والألم عظيم. ارحم، وأيقظ نفوس الملايين المتألمين على رجاء بعض الراحة الآن والفرح الذي لا يوصف في الدهر الآتي. أرسل كنيستك، يا الله، بالإغاثة وبكلمة الإنجيل أن هناك مغفرة للخطايا بالإيمان بالمسيح وأن أشد معاناة هنا لا يمكن أن تقارن بالمجد الذي سيُعلن لأبناء الله. احمِ كنيستك، يا أبي، من القسوة وعدم المبالاة بالكوارث التي تترك الملايين بائسين، واحمها أيضًا من الاستسلام للنقد من الذين هم مثل امرأة أيوب، الذين لا يستطيعون الثقة بحكمة وقوة وصلاح المسيح وسط البؤس الذي لا يُفسر. آه، ساعد ضعف إيماننا. أَمِلْ قلوبنا إلى كلمتك وتأكيدها أنك \"تَعْمَلُ كُلَّ شَيْءٍ حَسَبَ رَأْيِ مَشِيئَتِكَ\" و\"أَنَّكَ تَسْتَطِيعُ كُلَّ شَيْءٍ، وَلاَ يَعْسُرُ عَلَيْكَ أَمْرٌ\" وأنك تعمل الصالح وتتصرف بحكمة بطرق لا يمكننا الآن حتى أن نتخيلها. احفظنا في سلام، يا رب، ولا تسمح أن نتذمر أو نشكو. امنحنا قلوبًا تخضع لك في تواضع تحت يدك القوية. علمنا أن ننتظر ونراقب مقاصدك النهائية والمقدسة في كل شيء. امنحنا أن \"نفرح في الرجاء\" حتى عندما تجلب الظروف الحالية الدموع إلى عيوننا. افتح عيون قلوبنا لرؤية جلال ميراثنا في المسيح، وأرسلنا بأيدٍ حنونة لنلمس برحمة بؤس العالم. باسم يسوع نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل السادس\u003c/h2\u003e\n\u003ch3\u003eهوذا أعظم من سليمان ههنا\u003c/h3\u003e\n\u003ch4\u003eحكمة يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eكثيرون حاولوا إفحام يسوع، لكنهم قالوا في النهاية: \"لم يتكلم قط إنسان هكذا مثل هذا الإنسان!\" (يوحنا ٧: ٤٦). أحد الأسباب هو حكمة وعلم المسيح الذي لا يدانى.\u003c/p\u003e\n\u003cp\u003eكانت ملكة سبأ مندهشة جدا من حكمة ومعرفة سليمان لدرجة أنه عندما رأت بيته وسمعت إجاباته على أسئلتها، \"لم يبق فيها روح بعد\" (ملوك الأول ١٠: ٥). إذن ماذا يعني قول يسوع: \"ملكة التيمن ستقوم في الدين مع هذا الجيل وتدينه، لأنها أتت من أقاصي الأرض لتسمع حكمة سليمان، وهوذا أعظم من سليمان ههنا!\" (متى ١٢: ٤٢)؟\u003c/p\u003e\n\u003cp\u003eهذا يعني أن حتى أحكم الملوك لم يتكلم مثله. لقد ظهر على مضمار التاريخ شخص لا مثيل له في العلم والحكمة. حتى نقطة معينة، كان يسوع مستعدا للحوار مع حكماء عصره. لكن عندما حان الوقت، وكان جاهزا، نطق بالجملة الحاسمة التي أنهت الحوار: \"فإن كان داود يدعوه ربا، فكيف يكون ابنه؟\" (متى ٢٢: ٤٥). \"فلم يستطع أحد أن يجيبه بكلمة. ومن ذلك اليوم لم يجسر أحد أن يسأله بتة\" (متى ٢٢: ٤٦). علمه وحكمته جعلتاه سيد كل موقف. أحد أسباب إعجابنا بالمسيح وثقتنا به فوق الجميع هو أن علمه وحكمته لا تدانى.\u003c/p\u003e\n\u003cp\u003eإنه يعرف جميع الناس بعمق، يعرف قلوبنا وأفكارنا. أشاد يوحنا بهذا العلم الواسع عندما قال: \"لكن يسوع لم يأتمنهم على نفسه، لأنه كان يعرف الجميع. ولأنه لم يكن محتاجا أن يشهد أحد عن الإنسان، لأنه علم ما كان في الإنسان\" (يوحنا ٢: ٢٤-٢٥). إنه يعرف أفكارنا قبل أن نعبر عنها. إنه يرى حيث لا يستطيع أحد آخر أن يرى. لا شيء مخفي عن عينيه. \"فعلم يسوع أفكارهم، فقال: لماذا تفكرون بالشر في قلوبكم؟\" (متى ٩: ٤). وهكذا كانت شهادة الكنيسة الأولى: \"أيها الرب العارف قلوب الجميع...\" (أعمال الرسل ١: ٢٤).\u003c/p\u003e\n\u003cp\u003eلا يوجد أحد يعجز يسوع. لا فكر أو فعل غير مفهوم عنده، فهو يعرف أصله ومنتهاه. أفكار وأفعال أكثر البشر تعقيدا ذهنيا ونفسيا، وأيضا أعماق أعقد عبقري، مفتوحة ومكشوفة له. إنه يفهم كل حركة وكل فكرة في كل عقل.\u003c/p\u003e\n\u003cp\u003eيسوع لا يعرفنا فقط كما نحن اليوم، بل يعرف أيضا ما سنفكر فيه ونفعله غدا. إنه يعرف كل الأشياء التي ستحدث. يؤكد إنجيل يوحنا على هذا، لأن يوحنا يراه جزءا من جلال يسوع اللاهوتي. \"فخرج يسوع وهو عالم بكل ما يأتي عليه\" (يوحنا ١٨: ٤). بناء على هذا العلم، سبق وأخبر عن أشياء عديدة سيفعلها أصدقاؤه وأعداؤه. \"لأن يسوع من البدء علم من هم الذين لا يؤمنون، ومن هو الذي يسلمه\" (يوحنا ٦: ٦٤). وقال: \"أقول لكم الآن قبل أن يكون، حتى متى كان تؤمنون أني أنا هو\" (يوحنا ١٣: ١٩).\u003c/p\u003e\n\u003cp\u003eبعبارة أخرى، السبب في أنه أخبر بهذه الأمور الآتية هو لكي نؤمن أنه \"يهوه\"¹. أي ماذا؟ أنه ابن الله الأزلي. \"يهوه\" هو اسم الله في الخروج ٣: ١٤ واسم الله في إشعياء ٤٣: ١٠. من المحتمل جدا أن هذا هو قصد يسوع عندما استخدم الكلمات بشكل مطلق: \"الحق الحق أقول لكم: قبل أن يكون إبراهيم أنا كائن\" (يوحنا ٨: ٥٨). يريد يسوع أن نؤمن أنه الله. لهذا يقول: \"ها أنا قد سبقت وأخبرتكم\" (متى ٢٤: ٢٥). علمه المسبق جوهري للاهوته.\u003c/p\u003e\n\u003cp\u003eمدى علم يسوع بالأمور الآتية هو دليل قوي للإيمان بلاهوته. لذلك \"قال له تلاميذه: ... الآن نعلم أنك عالم بكل شيء، ولست تحتاج أن يسألك أحد. لهذا نؤمن أنك من الله خرجت\" (يوحنا ١٦: ٢٩-٣٠). في نهاية وقته على الأرض، سأل يسوع بطرس ثلاث مرات: \"يا سمعان بن يونا، أتحبني؟\" فحزن بطرس لأنه قال له في المرة الثالثة: \"أتحبني؟\" فقال له: \"يارب، أنت تعلم كل شيء. أنت تعرف أني أحبك\" (يوحنا ٢١: ١٧). لم يستنتج بطرس من معرفة يسوع بما في قلبه أنه يعرف كل شيء؛ بل استنتج من علم المسيح الكلي أنه يعرف قلبه. \"أنت تعلم كل شيء\" هي عبارة عامة وغير مشروطة في إنجيل يوحنا — يسوع يعرف كل ما هو موجود وكل ما سيحدث في المستقبل.\u003c/p\u003e\n\u003cp\u003eأقرب شيء يمكن أن يرقى لمستوى الإشكال الظاهري لهذه الحقيقة هو متى ٢٤: ٣٦ حيث يقول يسوع عن المجيء الثاني: \"وأما ذلك اليوم وتلك الساعة فلا يعلم بهما أحد، ولا ملائكة السماوات، إلا أبي وحده\". أنا أفهم هذا على أنه يعني أن يسوع، في ناسوته لا لاهوته، لم يكن يعرف موعد مجيئه الثاني. كيف تتحد الطبيعتان الناسوتية واللاهوتية للمسيح في شخص واحد؟ هذا أحد أعظم أسرار الكون.\u003c/p\u003e\n\u003cp\u003eأعظم ما يمكن قوله عن علم يسوع هو أنه يعرف الله بشكل كامل. إنه يعرف الله معرفة كاملة لأنه هو الله. نحن نعرف الله معرفة نسبية وبطريقة ناقصة. يسوع يعرفه كما لا يعرفه كائن آخر. إنه يعرفه كما يعرف شخص كلي العلم نفسه. \"كل شيء قد دفع إلي من أبي، وليس أحد يعرف الابن إلا الآب، ولا أحد يعرف الآب إلا الابن ومن أراد الابن أن يعلن له\" (متى ١١: ٢٧). لا أحد سوى يسوع يعرف الآب مباشرة وبشكل كامل وتام. معرفتنا بالآب تعتمد كليا على إعلان يسوع ونعمته؛ معرفتنا مشتقة وجزئية، وبسبب فساد طبيعتنا هي معرفة ناقصة. لا يمكن قول شيء أعظم عن علم يسوع من أنه يعرف الله معرفة كاملة وتامة. كل واقع أو وجود خارج الله هو محدود مقارنة بالواقع اللانهائي الذي هو الله. ما صنعه الله يشبه لعبة صغيرة مقارنة بالحقيقة المعقدة والعميقة لطبيعة الله. كل العلوم التي تلامس قشور الكون المخلوق هي مجرد أبجديات مقارنة بمعرفة المسيح الشاملة للكون المخلوق. وحتى هذه المعرفة بالكون المخلوق هي قطرة ندى على نصل عشب مقارنة بمحيط العلم الذي يمتلكه يسوع عن كيان الله نفسه. بينما الكون محدود، الله لانهائي. المعرفة الكاملة باللانهائي هي لانهائية. لذلك، معرفة الله كما يعرفه يسوع هي معرفة لانهائية. لذلك، فلنسجد ونعبد يسوع المسيح. حتى لو أعجبتنا العلوم البشرية وإنجازات المعرفة العلمية، فلن نسلك مسلك الجهلاء بنشر عجائب هذه المعرفة الصغيرة مع تجاهل هدير علم المسيح الكلي. يسوع وحده يستحق أعلى إعجابنا. يسوع وحده يستحق ثقتنا. إنه يستطيع أن يرينا الآب (متى ١١: ٢٧). يستطيع أن يعطينا حكمة لا تقاوم (لوقا ٢١: ١٥). يستطيع أن يجعل كل الأشياء تعمل معا لخيرنا (رومية ٨: ٢٨). لا أحد من أحكامه عن أي شيء يخطئ أبدا (يوحنا ٨: ١٦). إنه يعلم طريق الله بحق لا يخطئ (متى ٢٢: ١٦). ثق به. أعجب به. اتبعه. فإنه \"المذخر فيه جميع كنوز الحكمة والعلم\" (كولوسي ٢: ٣).\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الآب، نقول مع المرنم، إن هذه المعرفة عجيبة جدا بالنسبة لنا؛ إنها عالية جدا، لا نقدر أن نصل إليها. نقف مندهشين أمام علمك وحكمتك اللانهائيتين. قلوبنا مليئة بالأسئلة. لكنك مليء بالإجابات. لا توجد أسرار بالنسبة لك. لا توجد حقائق لا تعرفها، ولا مشاكل لا تستطيع حلها، ولا أحداث لا تستطيع تفسيرها، ولا نفاق لا تراه. أيها الإله، امنحنا أن نرى ونشعر أن عقلك العارف بكل شيء، مع قوتك ونعمتك، يجعلك جديرا بالثقة الكاملة. مشورتك تحيط بكل التدابير، بما في ذلك الماضي والمستقبل. خطتك الصالحة لن تتغير بسبب أحداث غير متوقعة. يمكننا أن نعتمد عليك. وبينما نفعل ذلك، يا أبانا، نصلي أن تشاركنا بما فيه كفايتنا من حكمتك العظيمة وعلمك العظيم حتى نعيش ونحب، وأخيرا نموت، بطريقة تجلب الحياة للآخرين، بطريقة تشبع نفوسنا، وتكرمك. شفاه الحكماء هي ينبوع حياة، آه، كم نشتاق أن نجلب الحياة للهالكين. امنحنا حكمتك بقدر ما نستطيع تحمله. باسم يسوع نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل السابع\u003c/h2\u003e\n\u003ch3\u003eالفقر المجيد للصيت السيء\u003c/h3\u003e\n\u003ch4\u003eتشويه سمعة يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eإن كان «الصِّيتُ أَفْضَلُ مِنَ الْغِنَى الْعَظِيمِ» (أمثال ٢٢: ١)، فيسوع كان فقيراً بشكل مزدوج. فهو لم يكتفِ بأن «أَخْلَى نَفْسَهُ» مُتخلياً عن غنى السماء المجيد (فيلبي ٢: ٧-٨)، ليعيش بيننا كشخص «لَيْسَ لَهُ أَيْنَ يُسْنِدُ رَأْسَهُ» (لوقا ٩: ٥٨)، بل وفوق ذلك كله، كانت سمعته تُلَطَّخ المرة تلو الأخرى. كان التشهير به بلا هوادة، والشائعات عصية على الإصلاح، وأنصاف الحقائق أكثر مكراً من أن يُرَد عليها. وفي النهاية، دُمِّر \"الصيت الحسن\" لأعظم إنسان في أورشليم؛ فالجموع التي هتفت له كملك، صلبته كمجرم. ولكن، يا للعظمة الكامنة خلف كل واحدة من تلك الفضائح المُفتعلة! تأملوا في أمجاد ملكنا في خضم كل الوشايات التي تحملها.\u003c/p\u003e\n\u003cp\u003eبدأ الأمر بمولده. كانت الفضيحة حتمية، والله يعلم ذلك: والدة يسوع حبلى قبل أن تتصور، ويوسف ليس الأب. لذا يقول متى: «فَيُوسُفُ رَجُلُهَا إِذْ كَانَ بَارّاً، وَلَمْ يَشَأْ أَنْ يُشْهِرَهَا، أَرَادَ تَخْلِيَتَهَا سِرّاً» (متى ١: ١٩). لم تكن تلك خطة الله، ولم تكن مقاصده تتضمن إزالة العار. نحن لا نعلم ما عانته مريم، لكننا نلمح بعضاً مما تحمله يسوع. كان لدى أعدائه دائماً تلك الورقة الرابحة التي يلقونها على الطاولة عندما تنقلب قوة الحق ضدهم. في يوحنا ٨، كان يسوع يكشف رياءهم العميق وعبوديتهم للخطية، مُشيراً إلى أن إبليس هو أبوهم. وحين قال يسوع: «أَنْتُمْ تَعْمَلُونَ أَعْمَالَ أَبِيكُمْ»، سحبوا تلك الورقة وقالوا: «إِنَّنَا لَمْ نُولَدْ مِنْ زِنًا. لَنَا أَبٌ وَاحِدٌ وَهُوَ اللهُ» (يوحنا ٨: ٤١). لم يكن الاتهام مبطناً: لقد نعتوا يسوع بأنه ابن غير شرعي. وحتى القرن الثالث، كان أوريجانوس لا يزال يرد على هذا الافتراء في كتابات كلسوس.\u003c/p\u003e\n\u003cp\u003eولكن يا له من شرف كان مخفياً خلف هذه الإهانة! نعم، كانت مريم حبلى قبل الزواج. ونعم، لم يكن يوسف هو الأب. ولكن كلا، لم يكن يسوع غير شرعي. ثمة حقيقة أخرى: «فَأَجَابَ الْمَلاَكُ وَقَالَ لَها: اَلرُّوحُ الْقُدُسُ يَحِلُّ عَلَيْكِ، وَقُوَّةُ الْعَلِيِّ تُظَلِّلُكِ، فَلِذَلِكَ أَيْضاً اَلْقُدُّوسُ الْمَوْلُودُ مِنْكِ يُدْعَى ابْنَ اللهِ» (لوقا ١: ٣٥). لم يحدث ميلاد آخر مثل هذا قط. لأنه لا يوجد سوى ابن واحد لله. إنسان واحد بلا دنس. إله-إنسان واحد. حمل واحد كامل ليرفع خطية العالم. يا للحقائق الجميلة التي كانت تكمن تحت أكاذيب أعداء يسوع.\u003c/p\u003e\n\u003cp\u003eعندما يبغض شخص ما الحق الذي تنادي به، فإن كل مساعي المحبة ستتعرض للتشهير، حتى تلك التي تبدو متناقضة. تعجب يسوع من هذا في جيله: «وَبِمَنْ أُشَبِّهُ هَذَا الْجِيلَ؟ يُشْبِهُ أَوْلاَداً جَالِسِينَ فِي الأَسْواقِ يُنَادُونَ أَصْحَابَهُمْ» (متى ١١: ١٦). إنهم لا يرقصون للمزمار ولا ينوحون للرثاء. بالنسبة لهم، موسيقى الحق ليست ملائمة أبداً. كان يوحنا المعمدان هو الرثاء، وكان يسوع هو المزمار، وجيلهما لم يسمع لهذا ولا ذاك. فكيف يتم إسكات هذين الاثنين؟ بالافتراء. «لأَنَّهُ جَاءَ يُوحَنَّا لاَ يَأْكُلُ وَلاَ يَشْرَبُ، فَيَقُولُونَ: فِيهِ شَيْطَانٌ. جَاءَ ابْنُ الإِنسَانِ يَأْكُلُ وَيَشْرَبُ، فَيَقُولُونَ: هُوَذَا إِنْسَانٌ أَكُولٌ وَشِرِّيبُ خَمْرٍ، مُحِبٌّ لِلْعَشَّارِينَ وَالْخُطَاةِ» (متى ١١: ١٨-١٩). جاء الحق مرتدياً وبر الإبل وآكلاً جراداً وعائشاً في البرية وداعياً الملوك زناةً ولم يصنع معجزات ومات بسبب رقصة فتاة؛ كان يوحنا غير مقبول. ثم جاء الحق اجتماعياً وذهب إلى الولائم وصنع خمراً جيدة وسمح لخاطئة أن تغسل قدميه؛ وكان هذا أيضاً غير مقبول.\u003c/p\u003e\n\u003cp\u003eما يعنيه هذا هو أن الشكل لم يكن هو حجر العثرة، بل \"الحق\" ذاته كان حجر العثرة. ولذلك، كان المفر الوحيد لأعداء الحق هو التشويه وأنصاف الحقائق. \"يسوع أكول وشريب خمر\"؛ ولهذا السبب يأكل مع العشارين والخطاة. ولكن تحت قبح الوشاية يكمن مجد الرحمة. لماذا أكل مع العشارين والخطاة؟ لقد قدم الإجابة بنفسه: «لاَ يَحْتَاجُ الأَصِحَّاءُ إِلَى طَبِيبٍ بَلِ الْمَرْضَى. لَمْ آتِ لأَدْعُوَ أَبْرَاراً بَلْ خُطَاةً إِلَى التَّوْبَةِ» (لوقا ٥: ٣١-٣٢). خلف تهمة النهم يكمن مجد الرحمة. ضحى يسوع بصيته الحسن ليجلس مع الخطاة ويخلصهم. ثم كان هناك مجد قوته في تحرير الناس من الشياطين. كيف يمكن تدمير هذا الصلاح العظيم؟ إن حقيقة تحرير يسوع للناس من الأرواح الشريرة كانت لا يمكن إنكارها. كانت واقعاً. لكن كراهية الحق لا تُهزم بسهولة بالحقائق. الحقائق تعطي شكلاً فقط لإطار الخداع. «بِرَئِيسِ الشَّيَاطِينِ يُخْرِجُ الشَّيَاطِينَ!» (متى ٩: ٣٤). «إِنَّكَ سَامِرِيٌّ وَبِكَ شَيْطَانٌ» (يوحنا ٨: ٤٨). «بِهِ شَيْطَانٌ وَهُوَ مَجْنُونٌ. لِمَاذَا تَسْمَعُونَ لَهُ؟» (يوحنا ١٠: ٢٠). كان هذا أفضل ما استطاعوا فعله: الشيطان يخرج الشيطان.\u003c/p\u003e\n\u003cp\u003eولكن ياله من حق أطلقه الرب رداً على هذا الافتراء! «كُلُّ مَدِينَةٍ أَوْ بَيْتٍ مُنْقَسِمٍ عَلَى ذَاتِهِ لاَ يَثْبُتُ» (متى ١٢: ٢٥). إذاً حتى الافتراء يحمل خبراً ساراً. لكن الحق أفضل: «فَقَدْ أَقْبَلَ عَلَيْكُمْ مَلَكُوتُ اللهِ... أَمْ كَيْفَ يَسْتَطِيعُ أَحَدٌ أَنْ يَدْخُلَ بَيْتَ الْقَوِيِّ وَيَنْهَبَ أَمْتِعَتَهُ، إِنْ لَمْ يَرْبِطِ الْقَوِيَّ أَوَّلاً، وَحِينَئِذٍ يَنْهَبُ بَيْتَهُ؟» (متى ١٢: ٢٨-٢٩). خلف تشويه سمعة المسيح يكمن إعلان ملكوت الله. لقد رُبط \"القوي\" بمن هو أقوى منه بما لا يقاس. الأمتعة تُنهب والأسرى يُحررون. في هذه الحالة، الشياطين تعرف أفضل من الفريسيين: كان «رَجُلٌ بِهِ رُوحٌ نَجِسٌ، فَصَرَخَ قَائِلاً: ...مَا لَنَا وَلَكَ يَا يَسُوعُ النَّاصِرِيُّ؟ ...أَنَا أَعْرِفُكَ مَنْ أَنْتَ: قُدُّوسُ اللهِ!» (مرقس ١: ٢٣-٢٤). يسوع لا يخرج الشياطين برئيس الشياطين، بل يأمر الشياطين بصفته قدوس الله. وتستمر الافتراءات: «هَذَا الإِنْسَانُ لَيْسَ مِنَ اللهِ، لأَنَّهُ لاَ يَحْفَظُ السَّبْتَ» (يوحنا ٩: ١٦). «هَذَا الإِنْسَانَ خَاطِئٌ» (يوحنا ٩: ٢٤). «إِنَّهُ مُخْتَلٌّ!» (مرقس ٣: ٢١). «خَلَّصَ آخَرِينَ وَأَمَّا نَفْسُهُ فَمَا يَقْدِرُ أَنْ يُخَلِّصَهَا!» (متى ٢٧: ٤٢). «نَحْنُ سَمِعناهُ يَقُولُ: إِنِّي أَنْقُضُ هَذَا الْهَيْكَلَ الْمَصْنوعَ بِالأَيَادِي، وَفِي ثَلاَثَةِ أَيَّامٍ أَبْنِي آخَرَ غَيْرَ مَصْنُوعٍ بِأَيَادٍ» (مرقس ١٤: ٥٨). ولكن في كل حالة، «الْحِكْمَةُ تَبَرَّرَتْ مِنْ بَنِيهَا» (متى ١١: ١٩). «لَوْ لَمْ يَكُنْ هَذَا مِنَ اللهِ لَمْ يَقْدِرْ أَنْ يَفْعَلَ شَيْئاً» (يوحنا ٩: ٣٣). «لَيْسَ أَحَدٌ يَأْخُذُهَا مِنِّي، بَلْ أَضَعُهَا أَنَا مِنْ ذَاتِي. لِي سُلْطَانٌ أَنْ أَضَعَهَا وَلِي سُلْطَانٌ أَنْ آخُذَهَا أَيْضاً» (يوحنا ١٠: ١٨). في النهاية، \"الصيت الحسن\" الوحيد الذي يهم ليس شعور الناس تجاهنا، بل شعور الله تجاهنا. جاء الافتراء الأقصى عند الصليب: «فَلْيُنْقِذْهُ الآنَ إِنْ كَانَ يُرِيدُهُ» (متى ٢٧: ٤٣). \"إن كان\"؟ ليس هناك شك. «هَذَا هُوَ ابْنِي الْحَبِيبُ الَّذِي بِهِ سُرِرْتُ» (متى ٣: ١٧). هذا هو الصيت الحسن الوحيد الذي يهم في النهاية. هذا هو الغنى الحقيقي. هذا هو مجد المسيح.\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eيا أبانا السماوي، أنت الوحيد الذي يهم حكمه في النهاية. إن ما يظنه الناس فينا قد يثقل أيامنا أو يبهجها، لكنه قليل الشأن في الخاتمة. قد يكون الصيت الحسن بين الناس أفضل من الغنى العظيم الآن، لكن لا الصيت ولا الغنى سينجو من نار تمحيصك. الحق هو كل ما سيهم، لا المال ولا رأي البشر. هذا ما تعلمناه من ابنك يسوع. آه، كم نحب تحرره الثابت من طلب رضا الناس. نحن نسبحك لأنه كان مثبتاً نظره عليك. ما قاله الناس لم يمله يميناً أو يساراً. كانت بوصلته ثابتة عليك. إننا نحزن لأن بشراً، يحملون نفس طبيعتنا الخاطئة، تحدثوا عنه بمثل هذا السوء. لقد رأينا فسادنا في افترائهم. اغفر لنا كل مشاركتنا في التحدث بالسوء عن ابن الله، أو صمتنا. املأ عقولنا وأفواهنا يا رب بحق المسيح حتى نتكلم عنه بالحق. لتكن أفواهنا علامات على جبل تعلن أن يسوع هو المسيح، ابن الله. إن لحماً ودماً لا يعلمنا هذا، بل هو معلن منك، أيها الآب، في السماوات. تكلم يا الله من خلال \"المكتوب\" بقوة تشق الصخر، وهبنا أن نرى حقيقة يسوع في كل مكان. أمل قلوبنا نحوه. وبدّد الافتراءات التي شوهت صيت الرب أينما تكلمنا. ليتمجد ابنك في كل ما نقول! باسمه نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الثامن\u003c/h2\u003e\n\u003ch3\u003eالآلام التي لا تُضاهى\u003c/h3\u003e\n\u003ch4\u003eأوجاع يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eكانت آلام ابن الله لا تُضاهى. لم يعانِ أحد مثل هذا الرجل. عبر كل الأبدية، سنتأمل موت ابن الله ونرنم: \"مُسْتَحِقٌّ هُوَ الْخَروُفُ الْمَذْبُوحُ\" (رؤيا ٥: ١٢). طور الكونت زينزندورف (١٧٠٠-١٧٦٠) والمورافيون لاهوتًا يركز على جروح ودم يسوع، والبعض يعتقد أنه أصبح غير متوازن في تركيزه على \"الجروح الخمسة\" للمسيح. لكننا اليوم لسنا في خطر المبالغة في الانشغال بأوجاع يسوع. فتعالَ واعبد معي متأملاً مجد آلام المسيح. لم يكن أحد غيره مُنزَّهاً عن استحقاق المعاناة، لكنه تحمل معاناة أكثر من غيره. ختم الله على حياة يسوع الكاملة يتلخص في كلمتين: \"بِلاَ خَطِيَّةٍ\" (عبرانيين ٤: ١٥). الشخص الوحيد في التاريخ الذي لم يستحق المعاناة، عانى أكثر من الجميع. \"الَّذِي لَمْ يَفْعَلْ خَطِيَّةً، وَلاَ وُجِدَ فِي فَمِهِ مَكْرٌ\" (بطرس الأولى ٢: ٢٢). لم يكن أي ألم من آلام يسوع عقوبة لخطيته. لم يكن لديه خطية. لذلك، لم يكن لأحد غيره حق أكبر في الانتقام، لكنه استخدم هذا الحق أقل من غيره. كانت لديه قوة لا نهائية تحت تصرفه للقصاص في أي لحظة من لحظات عذابه. \"أَتَظُنُّ أَنِّي لاَ أَسْتَطِيعُ الآنَ أَنْ أَطْلُبَ إِلَى أَبِي فَيُقَدِّمَ لِي أَكْثَرَ مِنِ اثْنَيْ عَشَرَ جَيْشًا مِنَ الْمَلاَئِكَةِ؟\" (متى ٢٦: ٥٣). لكنه لم يفعل. عندما صرخت العدالة في كل أرجاء الكون \"هذا ظلم!\"، كان يسوع صامتًا. \"فَلَمْ يُجِبْهُ وَلاَ عَنْ كَلِمَةٍ وَاحِدَةٍ\" (متى ٢٧: ١٤). ولم يرد على السخرية: \"الَّذِي إِذْ شُتِمَ لَمْ يَكُنْ يَشْتِمُ عِوَضًا، وَإِذْ تَأَلَّمَ لَمْ يَكُنْ يُهَدِّدُ\" (بطرس الأولى ٢: ٢٣). ولا دافع عن نفسه ردًا على استجواب هيرودس: \"فَلَمْ يُجِبْهُ بِشَيْءٍ\" (لوقا ٢٣: ٩). لم يعانِ أحد من ظلم بهذا الحجم مع انتقام ضئيل إلى هذا الحد. لم يكن ذلك لأن العذاب كان محتملاً. لو أُجبرنا على المشاهدة، ربما كنا سنفقد الوعي. في البستان، \"صَارَ عَرَقُهُ كَقَطَرَاتِ دَمٍ نَازِلَةٍ عَلَى الأَرْضِ\" (لوقا ٢٢: ٤٤). في منتصف الليل، أمام رئيس الكهنة، \"حِينَئِذٍ بَصَقُوا فِي وَجْهِهِ وَلَكَمُوهُ، وَآخَرُونَ لَطَمُوهُ\" (متى ٢٦: ٦٧). أمام الوالي، \"جَلَدَهُ\" (متى ٢٧: ٢٦). وصف يوسابيوس الجلد الروماني: \"كانوا يُمزَّقون بالسياط حتى الأوردة والشرايين العميقة، إلى أن تصير أحشاؤهم وأعضاؤهم مكشوفة للعيان\". في عذابه، تلاعب الجنود به. ألبسوه ثيابًا ملكية للسخرية. \"فَابْتَدَأَ قَوْمٌ يَبْصُقُونَ عَلَيْهِ، وَيُغَطُّونَ وَجْهَهُ وَيَلْكُمُونَهُ وَيَقُولُونَ لَهُ: ’تَنَبَّأْ‘. وَكَانَ الْخُدَّامُ يَلْطِمُونَهُ\" (مرقس ١٤: ٦٥). وُضع إكليل من الشوك على رأسه — وازداد الأمر سوءًا \"وَكَانُوا يَضْرِبُونَهُ عَلَى رَأْسِهِ بِقَصَبَةٍ، وَيَبْصُقُونَ عَلَيْهِ، ثُمَّ يَسْجُدُونَ لَهُ\" (مرقس ١٥: ١٩). في هذه الحالة، لم يكن قادرًا على حمل صليبه بنفسه \"وَفِيمَا هُمْ خَارِجُونَ وَجَدُوا إِنْسَانًا قَيْرَوَانِيًّا اسْمُهُ سِمْعَانُ، فَسَخَّرُوهُ لِيَحْمِلَ صَلِيبَهُ\" (متى ٢٧: ٣٢). استمر التعذيب والعار. جُرِّد من ملابسه. سُمِّرت يداه ورجلاه إلى الصليب \"هذَا أَخَذْتُمُوهُ مُسَلَّمًا بِمَشُورَةِ اللهِ الْمَحْتُومَةِ وَعِلْمِهِ السَّابِقِ، وَبِأَيْدِي أَثَمَةٍ صَلَبْتُمُوهُ وَقَتَلْتُمُوهُ\" (أعمال الرسل ٢: ٢٣)، \"ثَقَبُوا يَدَيَّ وَرِجْلَيَّ\" (مزمور ٢٢: ١٦). استمر الهزء بلا هوادة طوال الصباح الرهيب. \"وَضَفَرُوا إِكْلِيلاً مِنْ شَوْكٍ وَوَضَعُوهُ عَلَى رَأْسِهِ، وَقَصَبَةً فِي يَمِينِهِ. وَكَانُوا يَجْثُونَ قُدَّامَهُ وَيَسْتَهْزِئُونَ بِهِ قَائِلِينَ: ’السَّلاَمُ يَا مَلِكَ الْيَهُودِ!‘\"، \"’يَا نَاقِضَ الْهَيْكَلِ وَبَانِيَهُ فِي ثَلاَثَةِ أَيَّامٍ، خَلِّصْ نَفْسَكَ! إِنْ كُنْتَ ابْنَ اللهِ فَانْزِلْ عَنِ الصَّلِيبِ!‘\" (متى ٢٧: ٢٩، ٤٠). حتى أحد اللصين \"وَكَانَ وَاحِدٌ مِنَ الْمُذْنِبَيْنِ الْمُعَلَّقَيْنِ يُجَدِّفُ عَلَيْهِ\" (لوقا ٢٣: ٣٩). كان موتًا بشعًا. تقول دائرة المعارف الكتابية: \"انتفخت الجروح حول المسامير الخشنة، وتسببت الأوتار والأعصاب الممزقة في عذاب مُبرح. امتلأت شرايين الرأس والمعدة بالدم مسببةً صداعاً رهيباً. عانى ضحية الصلب فعليًا ألف موتة. كان عذاب الصلب مرعبًا لدرجة أنه أحيانا كان يثير رأفة الجنود المولعين بالحرب\". جاء كل هذا على \"صديق الخطاة\"، بدون إخوة إلى جانبه، بل وحيدًا متروكًا تمامًا. خانه يهوذا بقبلة (لوقا ٢٢: ٤٨). أنكره بطرس ثلاث مرات (متى ٢٦: ٧٥). \"تَرَكَهُ التَّلاَمِيذُ كُلُّهُمْ وَهَرَبُوا\" (متى ٢٦: ٥٦). في أحلك ساعة في تاريخ العالم، ضرب الله الآب ابنه بقصاصنا. \"وَنَحْنُ حَسِبْنَاهُ مُصَابًا مَضْرُوبًا مِنَ اللهِ وَمَذْلُولاً\" (إشعياء ٥٣: ٤). الشخص الوحيد في العالم الذي عرف الله الآب حقًا صرخ قائلاً: \"’إِلهِي، إِلهِي، لِمَاذَا تَرَكْتَنِي؟‘\" (متى ٢٧: ٤٦). لم تكن هناك معاناة من قبل أو بعد مثل هذه، لأنها، في كل شدتها المروعة، كانت معاناة مُدبَّرة. دبَّرها الله الآب وقبلها الله الابن. \"أَمَّا الرَّبُّ فَسُرَّ بِأَنْ يَسْحَقَهُ بِالْحَزَنِ\" (إشعياء ٥٣: ١٠). \"هذَا أَخَذْتُمُوهُ مُسَلَّمًا بِمَشُورَةِ اللهِ الْمَحْتُومَةِ وَعِلْمِهِ السَّابِقِ، وَبِأَيْدِي أَثَمَةٍ صَلَبْتُمُوهُ وَقَتَلْتُمُوه\" (أعمال الرسل ٢: ٢٣). فعل هيرودس وبيلاطس والجنود واليهود بيسوع \"... كُلَّ مَا سَبَقَتْ فَعَيَّنَتْ يَدُكَ وَمَشُورَتُكَ أَنْ يَكُونَ\" (أعمال الرسل ٤: ٢٨). حتى التفاصيل، كانت آلام الابن مكتوبة في أسفار العهد القديم. \"بَعْدَ هذَا رَأَى يَسُوعُ أَنَّ كُلَّ شَيْءٍ قَدْ كَمَلَ، فَلِكَيْ يَتِمَّ الْكِتَابُ قَالَ: ’أَنَا عَطْشَانُ‘\" (يوحنا ١٩: ٢٨). لم تكن فقط معاناة مُدبَّرة، بل أيضًا معاناة طاعة. احتضن يسوع الألم. اختارها يسوع — \"وَإِذْ وُجِدَ فِي الْهَيْئَةِ كَإِنْسَانٍ، وَضَعَ نَفْسَهُ وَأَطَاعَ حَتَّى الْمَوْتَ مَوْتَ الصَّلِيبِ\" (فيلبي ٢: ٨). واستمرت طاعته واثقًا بأبيه. \"الَّذِي إِذْ شُتِمَ لَمْ يَكُنْ يَشْتِمُ عِوَضًا، وَإِذْ تَأَلَّمَ لَمْ يَكُنْ يُهَدِّدُ بَلْ كَانَ يُسَلِّمُ لِمَنْ يَقْضِي بِعَدْل\" (بطرس الأولى ٢: ٢٣). \"’يَا أَبَتَاهُ، فِي يَدَيْكَ أَسْتَوْدِعُ رُوحِي‘\" (لوقا ٢٣: ٤٦). بهذه الثقة، \"ثَبَّتَ وَجْهَهُ لِيَنْطَلِقَ إِلَى أُورُشَلِيمَ\" (لوقا ٩: ٥١). لماذا؟ \"لأَنَّهُ لاَ يُمْكِنُ أَنْ يَهْلِكَ نَبِيٌّ خَارِجًا عَنْ أُورُشَلِيمَ!\" (لوقا ١٣: ٣٣). لقد ثبت وجهه ليموت في أورشليم. \"اَلآنَ نَفْسِي قَدِ اضْطَرَبَتْ. وَمَاذَا أَقُولُ؟ أَيُّهَا الآبُ نَجِّنِي مِنْ هذِهِ السَّاعَةِ؟. وَلكِنْ لأَجْلِ هذَا أَتيتُ إِلَى هذِهِ السَّاعَةِ\" (يوحنا ١٢: ٢٧). عاش ليموت. لذلك، كانت معاناة وضعف يسوع عملاً نابعاً من قوته السيادية. \"لَيْسَ أَحَدٌ يَأْخُذُهَا مِنِّي، بَلْ أَضَعُهَا أَنَا مِنْ ذَاتِي\" (يوحنا ١٠: ١٨). اختار بحريته أن ينضم إلى تدبير الآب لمعاناته وموته. وما كان ذلك التصميم؟ هو أن يكون بديلاً عنا، حتى نحيا. \"لأَنَّ ابْنَ الإِنْسَانِ أَيْضًا لَمْ يَأْتِ لِيُخْدَمَ بَلْ لِيَخْدِمَ وَلِيَبْذِلَ نَفْسَهُ فِدْيَةً عَنْ كَثِيرِينَ\" (مرقس ١٠: ٤٥). \"الَّذِي حَمَلَ هُوَ نَفْسُهُ خَطاياانا فِي جَسَدِهِ عَلَى الْخَشَبَةِ\" (بطرس الأولى ٢: ٢٤). \"الرَّبُّ وَضَعَ عَلَيْهِ إِثْمَ جَمِيعِنَا\" (إشعياء ٥٣: ٦). ما هو الهدف من كل هذا؟ هو \"لَيْسَ لأَحَدٍ حُبٌّ أَعْظَمُ مِنْ هذَا: أَنْ يَضَعَ أَحَدٌ نَفْسَهُ لأَجْلِ أَحِبَّائِهِ\" (يوحنا ١٥: ١٣). نعم، لكن ما هي الغاية؟ ما هو الهدف الذي تسعى إليه المحبة؟ لقد تم تحقيق هدفين عظيمين في آلام المسيح، وهما في الحقيقة هدف واحد. أولاً، \"فَإِنَّ الْمَسِيحَ أَيْضًا تَأَلَّمَ مَرَّةً وَاحِدَةً مِنْ أَجْلِ الْخَطَايَا، الْبَارُّ مِنْ أَجْلِ الأَثَمَةِ، لِكَيْ يُقَرِّبَنَا إِلَى اللهِ\" (بطرس الأولى ٣: ١٨). آلام يسوع أتت بنا إلى الله، الذي هو ملء الفرح والمسرة إلى الأبد. ثانيًا، في ساعة الموت ذاتها، تمجد الآب والابن. \"الآنَ تَمَجَّدَ ابْنُ الإِنسَانِ وَتَمَجَّدَ اللهُ فِيهِ\" (يوحنا ١٣: ٣١). فرحنا في الاستمتاع والاكتفاء بالله ومجده في خلاصنا هما واحد. هذا هو مجد آلام المسيح التي لا تُضاهى.\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الآب، ماذا يمكن أن نقول؟ نشعر بأننا غير مستحقين تمامًا أمام آلام المسيح التي لا تُوصف. نحن نادمون. خطيئتنا هي التي جعلت هذا يحدث. نحن من ضربناه، وبصقنا عليه، وسخرنا منه. أيها الآب، نحن تائبون. ننحني إلى التراب ونغلق أفواهنا الصغيرة المظلمة التافهة الخاطئة. أيها الآب، المسنا بإيمان جديد حتى نؤمن بهذا الأمر المدهش. إن آلام المسيح التي تجعلنا نفقد الأمل في ذواتنا هي نفسها خلاصنا. افتح قلوبنا الخائفة لتقبل الإنجيل. أيقظ الأجزاء الميتة في قلوبنا التي لا تستطيع أن تشعر بما يجب أن نشعر به — أننا محبوبون بالحب الأعمق والأقوى والأنقى في الكون. يا رب، امنحنا القوة لنفهم مع جميع القديسين العمق والارتفاع والطول والعرض لمحبة المسيح الفائقة المعرفة، ونمتلئ بكل ملء الله. قاتل من أجلنا، يا الله، حتى لا ننجرف مشوشين وعميان وحمقى إلى إثارة باطلة وعابرة. الحياة قصيرة جدًا، ثمينة جدًا، مؤلمة جدًا لنضيعها في فقاعات دنيوية تنفجر متلاشية. السماء عظيمة جدًا، والجحيم مروع جدًا، والأبدية طويلة جدًا لكي نتسكع على شرفات الأبدية. يا الله، افتح عيوننا لعظمة آلام المسيح وما تعنيه للخطية والقداسة والرجاء والسماء. نخاف من ميلنا إلى التفاهة. اجعلنا مستيقظين لثقل المجد — مجد آلام المسيح التي لا تُضاهى. باسمه العظيم والرائع نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل التاسع\u003c/h2\u003e\n\u003ch3\u003eمجد خلاص الخطاة، لا إبادة الشيطان\u003c/h3\u003e\n\u003ch4\u003eذبيحة يسوع المسيح المُخلِّصة\u003c/h4\u003e\n\u003cp\u003eيُرى مجد المسيح في حقه المطلق وقوته على إفناء الشيطان وكل جنوده والقضاء عليهم. لكن السبب في أنه يمتنع عن تدميرهم أو إيقافهم تمامًا هو إظهار جماله وقيمته السامية بوضوح أكبر. لو أفنى المسيح كل الشياطين الآن (وهو قادر على ذلك)، لكان مجده في قوته المطلقة ظاهرًا، لكن جماله وقيمته الأعلى لم يكونا ليشرقا بنفس السطوع كما يحدث عندما يتخلى البشر عما يقدمه لهم الشيطان ويجدون فرحًا في مجد المسيح الأعظم.\u003c/p\u003e\n\u003cp\u003eالشيطان وملائكته لا يمكن خلاصهم. يُشير يسوع إلى هذا عندما يقول إن \"’النَّارِ الأَبَدِيَّةِ الْمُعَدَّةِ لإِبْلِيسَ وَمَلاَئِكَتِهِ‘\" (متى ٢٥: ٤١). ويؤكد يهوذا ذلك عندما يقول إن الملائكة الساقطين \"حَفِظَهُمْ إِلَى دَيْنُونَةِ الْيَوْمِ الْعَظِيمِ بِقُيُودٍ أَبَدِيَّةٍ تَحْتَ الظَّلاَمِ\" (يهوذا ١: ٦). لذلك، فإن سبب امتناع المسيح عن دينونتهم الآن ليس لإعطائهم فرصة للتوبة والخلاص.\u003c/p\u003e\n\u003cp\u003eإذن، لماذا لا يُفنيهم تمامًا، أو على الأقل يوقف تأثيرهم الضار؟ هل لأن لهم إرادة حرة ولا يستطيع المسيح إيقافهم؟ لا. نصوص كثيرة توضح حق المسيح وقوته في كبح الشيطان وجنوده وإخضاعهم. على سبيل المثال، (١) \"[يسوع] بِسُلْطَانٍ يَأْمُرُ حَتَّى الأَرْوَاحَ النَّجِسَةَ فَتُطِيعُهُ\" (مرقس ١: ٢٧). (٢) عندما يتصرف الشيطان بحرية، فإنما بإذن إلهي فقط. \"’سِمْعَانُ، سِمْعَانُ، هُوَذَا الشَّيْطَانُ طَلَبَكُمْ لِكَيْ يُغَرْبِلَكُمْ كَالْحِنْطَةِ! وَلكِنِّي طَلبتُ مِنْ أَجْلِكِ لِكَيْ لاَ يَفْنَى إِيمَانُكَ‘\" (لوقا ٢٢: ٣١-٣٢). (٣) على الرغم من أن بولس قد أعطى \"... شَوْكَةً فِي الْجَسَدِ، مَلاَكَ الشَّيْطَانِ لِيَلْطِمَنِي\"، إلا أن المسيح جعلها تخدم تواضع بولس وإظهار قوة المسيح نفسه (كورنثوس الثانية ١٢: ٧-١٠). (٤) في النهاية، سيربط الله الشيطان لألف سنة، ثم يُلقيه أخيرًا في بحيرة النار ’فَقَبَضَ عَلَى التِّنِّينِ، الْحَيَّةِ الْقَدِيمَةِ، الَّذِي هُوَ إِبْلِيسُ وَالشَّيْطَانُ، وَقَيَّدَهُ أَلْفَ سَنَةٍ‘، \"وَإِبْلِيسُ الَّذِي كَانَ يُضِلُّهُمْ طُرِحَ فِي بُحَيْرَةِ النَّارِ وَالْكِبْرِيتِ\" (رؤيا ٢٠: ٢، ١٠). لذلك، قرار ترك الشيطان في العالم ليس لأن المسيح ليس لديه الحق أو القوة على إبادته. فما هو السبب إذن؟\u003c/p\u003e\n\u003cp\u003eيجب أن يكون للمسيح مقصد سامٍ في استمرار وجود الشيطان، لأنه، على الرغم من حقه وقوته في إفنائه الآن، لكنه اختار أن يهزمه على مراحل دافعًا الثمن الذي هو حياته. \"لأَجْلِ هذَا أُظْهِرَ ابْنُ اللهِ لِكَيْ يَنْقُضَ أَعْمَالَ إِبْلِيسَ\" (يوحنا الأولى ٣: ٨). لكن كيف فعل هذا؟ تعطينا عبرانيين ٢: ١٤ الإجابة: \"فَإِذْ قَدْ تَشَارَكَ الأَوْلاَدُ فِي اللَّحْمِ وَالدَّمِ اشْتَرَكَ هُوَ أَيْضًا كَذلِكَ فِيهِمَا، لِكَيْ يُبِيدَ بِالْمَوْتِ ذَاكَ الَّذِي لَهُ سُلْطَانُ الْمَوْتِ، أَيْ إِبْلِيسَ\". بمعنى آخر، أصبح المسيح إنسانًا لكي يموت، وبموته \"يُبيدَ\" الشيطان.\u003c/p\u003e\n\u003cp\u003eهذا يعني أن هدف المسيح في هزيمة الشيطان يجب أن يكون شيئًا مختلفًا عن مجرد إزالة تأثيره المميت. كان بإمكانه تحقيق ذلك بأمر واحد: \"اذهب إلى الجحيم!\" فسيُطيع الشيطان — كما سيفعل يومًا ما! فما هو نوع الهزيمة التي ألحقها المسيح بالشيطان؟ ولماذا هي أفضل من إزالة الشيطان من التاريخ ببساطة؟\u003c/p\u003e\n\u003cp\u003eالمفتاح هو أن الشيطان هُزم بموت يسوع. يضع بولس الأمر هكذا، مشيرًا إلى موت المسيح: \"إِذْ جَرَّدَ الرِّيَاسَاتِ وَالسَّلاَطِينَ أَشْهَرَهُمْ جِهَارًا، ظَافِرًا بِهِمْ فِيهِ [أي في الصليب]\" (كولوسي ٢: ١٥). بأي معنى \"جَرَّدَ الرِّيَاسَاتِ وَالسَّلاَطِينَ\" لمملكة الظلمة؟ فلا يزال الشيطان يعمي \"أَذْهَانَ غَيْرِ الْمُؤْمِنِينَ\" (كورنثوس الثانية ٤: ٤)، ويجرّب \"لَعَلَّ الْمُجَرِّبَ يَكُونُ قَدْ جَرَّبَكُمْ\" (تسالونيكي الأولى ٣: ٥)، ويخدع و\"يُضِلَّ الأُمَمَ\" (رؤيا ٢٠: ٣)، ويُلقي في السجن \"إِبْلِيسُ مُزْمِعٌ أَنْ يُلْقِيَ بَعْضًا مِنْكُمْ فِي السِّجْنِ\" (رؤيا ٢: ١٠)، ويأسر \"فَيَسْتَفِيقُوا مِنْ فَخِّ إِبْلِيسَ إِذْ قَدِ اقْتَنَصَهُمْ لإِرَادَتِهِ\" (تيموثاوس الثانية ٢: ٢٦)، ويهلك الجسد \"أَنْ يُسَلَّمَ مِثْلُ هذَا لِلشَّيْطَانِ لِهَلاَكِ الْجَسَدِ\" (كورنثوس الأولى ٥: ٥). لا يبدو مهزومًا أو مدمرًا. فكيف إذن جُرد الشيطان بموت يسوع؟\u003c/p\u003e\n\u003cp\u003eإجابة واحدة هي أن موت يسوع أبطل، عن كل من يؤمن به، تأثير الخطية الذي يجلب اللعنة. سلاح الخطية المدمر للنفوس والجُرم الجالب للعقوبة أُخذ من يد الشيطان. لقد جُرد من السلاح الوحيد الذي يمكن أن يجلب لنا الدينونة الأبدية، أي الخطية غير المغفورة. نرى هذا في كورنثوس الأولى ١٥: ٥٥-٥٧ \"’أَيْنَ شَوْكَتُكَ يَا مَوْتُ؟ أَيْنَ غَلَبَتُكِ يَا هَاوِيَةُ؟‘ أَمَّا شَوْكَةُ الْمَوْتِ فَهِيَ الْخَطِيَّةُ، وَقُوَّةُ الْخَطِيَّةِ هِيَ النَّامُوسُ. وَلكِنْ شُكْرًا ِللهِ الَّذِي يُعْطِينَا الْغَلَبَةَ بِرَبِّنَا يَسُوعَ الْمَسِيحِ\". لماذا الخطية هي شوكة الموت؟ لأن الخطية غير المغفورة وحدها يمكن أن تدين النفس وتجعل الموت بوابة إلى الجحيم، لا السماء. لذلك، الطريقة التي يستطيع بها الشيطان تدمير النفس ليست بالسحر أو الظهورات أو المرض أو الاضطهاد، بل فقط ببقائنا في ذنب ودينونة خطيتنا. \"وَلكِنْ شُكْرًا ِللهِ\"، يقول بولس، \"الَّذِي يُعْطِينَا الْغَلَبَةَ بِرَبِّنَا يَسُوعَ الْمَسِيحِ\". \"فَإِنَّ الْمَسِيحَ أَيْضًا تَأَلَّمَ مَرَّةً وَاحِدَةً مِنْ أَجْلِ الْخَطَايَا، الْبَارُّ مِنْ أَجْلِ الأَثَمَةِ، لِكَيْ يُقَرِّبَنَا إِلَى اللهِ\" (بطرس الأولى ٣: ١٨). إذا غُفرت خطايانا من أجل المسيح، فليس للشيطان سلاح يقدر أن يجلب لنا الدينونة الأبدية. يمكنه أن يؤذينا، بل ويقتلنا، لكنه لا يستطيع أن يديننا. هذا قصد عبرانيين ٢: ١٤ عندما تقول إن المسيح بموته ’يُبِيدَ‘ الذي له سلطان الموت. كان للشيطان ’سلطان الموت‘ بمعنى أنه يلوح بشوكة الموت القاتلة. لكن الآن بدم المسيح، غُفرت خطايانا، وقوة الشيطان المدمرة للنفس أُبطلت لكل من هم في المسيح. لا توجد إدانة — من الشيطان أو أي أحد.\u003c/p\u003e\n\u003cp\u003eيمكنك رؤية ذلك مجددًا في الكلمات \"أَمَّا شَوْكَةُ الْمَوْتِ فَهِيَ الْخَطِيَّةُ، وَقُوَّةُ الْخَطِيَّةِ هِيَ النَّامُوسُ\" (كورنثوس الأولى ١٥: ٥٦). إذا كانت الخطية هي شوكة الموت القاتلة، فذلك لأن الناموس يحدد عقوبة أبدية للخطية. \"لأَنَّ أُجْرَةَ الْخَطِيَّةِ هِيَ مَوْتٌ [أبدي]\" (رومية ٦: ٢٣). لكن عندما مات المسيح كبديل كامل عنا، يقول بولس إن الله \"مَحَا الصَّكَّ الَّذِي عَلَيْنَا فِي الْفَرَائِضِ، الَّذِي كَانَ ضِدًّا لَنَا، وَقَدْ رَفَعَهُ مِنَ الْوَسَطِ مُسَمِّرًا إِيَّاهُ بِالصَّلِيبِ\" (كولوسي ٢: ١٤). لذا، أُخذ سلاح الناموس من يد الشيطان. لا يستطيع استخدامه لإدانة شعب الله. الآن، بدون خطية أو ناموس لإدانتنا واتهامنا وإهلاكنا، أصبح الشيطان عدوًا مهزومًا. لقد جُرد من سلاحه. انتصر المسيح عليه، ليس بإخراجه من الوجود، بل بتركه يعيش ويرى ملايين القديسين يجدون الغفران لخطاياهم ويُديرون ظهرهم للشيطان بسبب مجد نعمة المسيح العظيمة. كان انتصارًا مكلفًا. لكن قيم الله لا تُحسب بسهولة. لو أنهى الله الشيطان ببساطة، لما كان واضحًا أن الله ليس فقط أقوى، بل أيضًا أكثر جاذبية ومتعة بما لا يقاس أكثر من الشيطان. يريد الله أن يشع مجده ليس فقط من خلال أعمال قوته في العالم المادي، بل أيضًا من خلال أعمال قوته الأخلاقية والروحية التي تُظهر جمال نعمته بأنوار ساطعة. إخراج الخطاة من يد الشيطان بفضل ذبيحة المسيح الماحية للخطية وطاعته للآب المُتممة للناموس كان انتصارًا أكثر مجدًا من مجرد إفناء العدو.\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الآب السماوي، نحن واعون أنك تُقدّر مجد ابنك بدرجة عالية لدرجة أن وجود الشيطان المستمر يستحق ذلك لإظهار مجده بالكامل. نشعر بالخجل لأننا تذمرنا من معارك الحياة لأنك تركت للعدو مساحة للحركة وهو في قيده، بينما كان يجب أن نبذل كل جهد لتمجيد هدفك الذي هو تمجيد المسيح. اغفر لنا لفشلنا في رؤية مقاصدك المقدسة. والآن، يا الله، بدم ابنك، مُخلّصنا، امنحنا النصرة على الشيطان. امنحنا أن نرى ونستمتع ونتذوق ونكتفي بالمسيح الغالي. أعطنا أن نُخزي الشيطان بتمجيد يسوع. امنحنا أن نمجد عمل الصليب. امنحنا أن نستمتع بعمل المسيح الكامل الذي جرد الشيطان من سلاحه وأزال شوكة الموت. علّمنا كيف نقاتل بالإيمان ضد قوة الخطية، واثقين أن المسيح قد اشترى لنا غفرانًا وحقق انتصارًا ثابتًا لكل من يثقون به. حوّل كل مُخطط شرير للشيطان إلى تدبير محبة يقدسنا. خلّصنا من خداعاته. احفظ جمال المسيح واضحًا في عيون قلوبنا. اجعلنا أدوات لهزيمة الشيطان حتى تأتي وتبيده بنفخة فمِكَ. اجعلنا شجعانًا في تخليص الآخرين بسيف الروح، كلمة الله؛ إنجيلك العظيم. باسم يسوع نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل العاشر\u003c/h2\u003e\n\u003ch3\u003eغنى رحمة الله المتجسدة\u003c/h3\u003e\n\u003ch4\u003eمراحم يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eالله هو أغنى شخص في الكون. فهو لا يمتلك فقط أكثر من أي شخص آخر، بل يمتلك الجميع وكل ما يمتلكه الجميع. عندما تخلق شيئا، فإنه يصبح ملكك. خلق الله كل شيء — بمن فيهم نحن. \"اعلموا أن الرب هو الله. هو صنعنا، وله نحن شعبه وغنم مرعاه\" (مزمور ١٠٠: ٣). هناك مالك مطلق واحد في الكون: الله. كل الآخرين هم مجرد وكلاء. لا نحن ولا ما نملك هو ملكنا في النهاية. كل شيء أمانة تستخدم لأهداف المالك. بمعنى ما، إذًا، كل خطية هي اختلاس.\u003c/p\u003e\n\u003cp\u003eلكن، بشكل لافت، يصف العهد الجديد غنى الله بشكل رئيسي ليس من جهة ما خلقه ويملكه، بل بشكل رئيسي من جهة مجده الذاتي منذ الأزل. نقرأ مرارا عن \"غنى مجده\" أو \"غناه في المجد\" (مثل أفسس ٣: ١٦؛ فيلبي ٤: ١٩؛ كولوسي ١: ٢٧). لو كان الله غنيا فقط لأنه خلق ويملك كل شيء، لكان فقيرا قبل الخلق. لكن هذا يعني أنه كان سيخلق بدافع الحاجة وسيكون معتمدا على خليقته. لكن هذه ليست صورة الله التي نجدها في الكتاب المقدس. لم يخلق الله ليكتسب غنى؛ بل خلق ليظهر غناه — غنى مجده ليستمتع به شعبه (أفسس ١: ٦، ١٢، ١٤).\u003c/p\u003e\n\u003cp\u003eلكن، بشكل أكثر تحديدا، يركز العهد الجديد على أن غنى مجد الله هو، في ذروته، غنى رحمته. هذا شيء يستهين به العالم: \"أم تستهين بغنى لطفه وإمهاله وطول أناته\" (رومية ٢: ٤). خلق الله العالم وفداه \"لكي يبين غنى مجده على آنية رحمة قد سبق فأعدها للمجد\" (رومية ٩: ٢٣). أو، بعبارة أخرى، يخلق ويخلص شعبه \"ليظهر في الدهور الآتية غنى نعمته الفائق، باللطف علينا في المسيح يسوع\" (أفسس ٢: ٧). يوجد الكون أساسا ليظهر غنى مجد رحمة الله ليستمتع بها شعبه المفدي من كل قبيلة ولسان وشعب وأمة.\u003c/p\u003e\n\u003cp\u003eالعدل جوهري في كمالات مجد الله. لكن الرحمة هي الأسمى. \"مبرئ المذنب ومذنب البريء كلاهما مكررة الرب\" (أمثال ١٧: ١٥). نعم. لذلك العدل ضروري. لكن هناك شيء آخر صحيح أيضا: \"تعقل الإنسان يبطئ غضبه، وفخره الصفح عن معصية.\" (أمثال ١٩: ١١). لذلك، إذا أمكن حفظ العدل، فإن ذروة إعلان المجد هي إظهار الرحمة. لهذا السبب جاء يسوع المسيح إلى العالم. يسوع هو رحمة الله متجسدة ومرئية. هو أيضا عدل الله المتجسد؛ لكن العدل كان خادما للرحمة: \"لأنه لم يرسل الله ابنه إلى العالم ليدين العالم، بل ليخلص به العالم\" (يوحنا ٣: ١٧). قدم الله الآب ابنه للموت \"لإظهار بره في الزمان الحاضر، ليكون بارا ويبرر من هو من الإيمان بيسوع\" (رومية ٣: ٢٦). موت يسوع الكفاري النيابي خلق أرضية العدل حيث ستشرق الرحمة المبررة بمجد لا يضاهى. لذلك، مجد رحمة الله هو هدف مجيء المسيح. هذا واضح في رومية ١٥: ٨-٩ جاء المسيح إلى العالم \"... من أجل صدق الله، حتى يثبت مواعيد الآباء. وأما الأمم فمجدوا الله من أجل الرحمة\". كان هدف التجسد هو تمجيد رحمة الله ليستمتع بها الأمم.\u003c/p\u003e\n\u003cp\u003eفي تسبحة مريم، وفي نبوة زكريا عند ولادة يوحنا المعمدان، كان السبب المعطى لمجيء يسوع هو \"ليذكر رحمة\" (لوقا ١: ٥٤)، و\"أحشاء رحمة إلهنا\" (لوقا ١: ٧٨). أو كما قال الرسول بولس، يعزى عمل المسيح إلى كون الله \"غني في الرحمة\" (أفسس ٢: ٤). كل هذا \"حسب غنى نعمته\" (أفسس ١: ٧). إنه \"غنياً لجميع الذين يدعون به\" (رومية ١٠: ١٢). هذه الرحمة التي يجسدها يسوع ويمنحها هي مجانية بالكامل. ليس لانتفاء التكلفة؛ لقد دفع يسوع الثمن بموته. \"الذي فيه لنا الفداء بدمه، غفران الخطايا، حسب غنى نعمته\" (أفسس ١: ٧). لكن هي الآن مجانية تماما للخطاة المنكسرين والمحتاجين. لذا يقول الله: \"إني أرحم من أرحم، وأتراءف على من أتراءف. فإذا ليس لمن يشاء ولا لمن يسعى، بل لله الذي يرحم… فإذا هو يرحم من يشاء، ويقسي من يشاء\" (رومية ٩: ١٤-١٦، ١٨). نحن لا ننال الرحمة كأجرة على أعمالنا. نحن نتلقاها كهدية مجانية بالإيمان، لا بالأعمال. \"لا بأعمال في بر عملناها نحن، بل بمقتضى رحمته\" (تيطس ٣: ٥). حتى الإيمان الذي بواسطته نتلقى هذه الرحمة هو ذاته هدية من الرحمة. \"لأنه قد وهب لكم لأجل المسيح لا أن تؤمنوا به فقط، بل أيضا أن تتألموا لأجله\" (فيلبي ١: ٢٩). وماذا عن الآخرين؟ لنقوم ونؤدب \"بالوداعة المقاومين، عسى أن يعطيهم الله توبة لمعرفة الحق\" (تيموثاوس الثانية ٢: ٢٥). من البداية إلى النهاية، يخلصنا الله \"الذي خلصنا ودعانا دعوة مقدسة، لا بمقتضى أعمالنا، بل بمقتضى القصد والنعمة التي أعطيت لنا في المسيح يسوع قبل الأزمنة الأزلية\" (تيموثاوس الثانية ١: ٩). رحمته المنتصرة مجانية بالكامل.\u003c/p\u003e\n\u003cp\u003eبما أن المسيح هو الإعلان المتجسد لغنى رحمة الله، فليس من المستغرب أن تكون حياته على الأرض إعلانا غنيا لرحمة الله لكل أنواع البشر. كل نوع من الاحتياجات والألم لامسته رحمة يسوع في سنوات تجسده القليلة على الأرض. عندما صرخ الشحات الأعمى: \"... قائلا: يا يسوع ابن داود، ارحمني!\"، شعر الكثيرون بالإحراج والاستياء. لكن \"قال له يسوع: أبصر. إيمانك قد شفاك\" (لوقا ١٨: ٣٨، ٤٢). عندما جاء البرص المثيرون للاشمئزاز \"ورفعوا صوتا قائلين: يا يسوع، يا معلم، ارحمنا!\"، توقف يسوع وأشفق عليهم \"فنظر وقال لهم: اذهبوا وأروا أنفسكم للكهنة. وفيما هم منطلقون طهروا\" (لوقا ١٧: ١٣-١٤). بل وأكثر إثارة للدهشة، يذكر مرقس الوقت الذي جثا أبرص آخر، كان برصه مرعبا، على ركبتيه متوسلا إلى يسوع أن يطهره، فلم تكتف رحمة يسوع بالحديث معه، بل لمسه: \"فتحنن يسوع ومد يده ولمسه وقال له: أريد، فاطهر!\" (مرقس ١: ٤١). عندما رأى يسوع أرملة لم تفقد زوجها فقط بل ابنها الوحيد أيضا، يقول لوقا: \"فلما رآها الرب تحنن عليها، وقال لها: لا تبكي\" (لوقا ٧: ١٣). ثم أقام ابنها من الموت. وفي هذه الحالة، لم تذكر كلمة عن إيمانها. كان فيضا مجانيا غزيرا وغنيا من الرحمة الإلهية، حتى قبل الإيمان. جذبت الرحمة يسوع أيضا إلى أولئك الذين جعلتهم الشياطين بائسين ومدمرين. وتوسل الأب إلى يسوع: \"تحنن علينا وأعنا\" (مرقس ٩: ٢٢). وعلى الرغم من أن الأب الحزين لم يستطع جمع سوى حبة خردل من الإيمان — \"صرخ أبو الولد بدموع وقال: أومن يا سيد، فأعن عدم إيماني\" (مرقس ٩: ٢٤) — استجاب يسوع لصرخة الألم وانتهر الروح وأخرجه. حتى عندما لم يكن هناك من يدافع عن رجل مسكون بالشياطين ولم يستطع أن يؤمن أو يخضع ليسوع — كما في حالة مجنون كورة الجدريين — خلصه الرب ثم شرح أنها كانت رحمة خالصة: \"قال له: اذهب إلى بيتك وإلى أهلك، وأخبرهم كم صنع الرب بك ورحمك\" (مرقس ٥: ١٩). ولا تفوتك الرحمة الإضافية أن هذا الرجل لم يكن يهوديا، بل أجنبيا مثل \"المرأة الكنعانية\" التي صرخت: \"ارحمني، يا سيد، يا ابن داود! ابنتي مجنونة جدا\" (متى ١٥: ٢٢).\u003c/p\u003e\n\u003cp\u003eرحمة يسوع لم تشعلها فقط معاناة المرضى، بل أيضا الخطية. عندما أكل يسوع مع \"العشارين والخطاة\"، انتقده الفريسيون والكتبة. لكن يسوع روى ثلاثة أمثال ليشرح ما كان يفعله. أحدها كان مثل الابن الضال. ذروة هذا المثل تصور الله، ممتلئا بالرحمة تجاه ابنه الغارق في الخطية العائد إلى البيت: \"فقام وجاء إلى أبيه. وإذ كان لم يزل بعيدا رآه أبوه، فتحنن وركض ووقع على عنقه وقبله\" (لوقا ١٥: ٢٠). بعبارة أخرى، أكل يسوع مع جباة الضرائب والخطاة لأنه كان الإعلان المتجسد لرحمة الله الآب الحانية تجاه الخطاة. أظهر يسوع هذه الرحمة ليس فقط للأفراد الذين يخطئون ويتألمون، بل أيضا لجموع بأكملها. مرة عندما تبعته حشود كبيرة ولم يخططوا جيدا لطعامهم، نظر إليهم يسوع وقال: \"إني أشفق على الجمع، لأن الآن لهم ثلاثة أيام يمكثون معي وليس لهم ما يأكلون\" (مرقس ٨: ٢). في مناسبة أخرى، لم يكن جوعهم بل حاجتهم الروحية إلى الحق هي التي ملأته بالرحمة تجاه الجموع: \"فلما خرج يسوع رأى جمعا كثيرا، فتحنن عليهم إذ كانوا كخراف لا راعي لها، فابتدأ يعلمهم كثيرا\" (مرقس ٦: ٣٤). واحد من أكثر أقوال يسوع شمولا عن رحمة الله جاءت من هوشع ٦: ٦. عندما انتقدوه لأنه ذهب للعشاء في بيت متى مع جباة الضرائب النجسين، قلب يسوع النقد وقال: \"فاذهبوا وتعلموا ما هو: إني أريد رحمة لا ذبيحة، لأني لم آت لأدعو أبرارا بل خطاة إلى التوبة\" (متى ٩: ١٣). وعندما وبخ الفريسيون تلاميذه لأنهم قطفوا سنابل وأكلوها في السبت، قال يسوع: \"فلو علمتم ما هو: إني أريد رحمة لا ذبيحة، لما حكمتم على الأبرياء!\" (متى ١٢: ٧). بعبارة أخرى، تشكلت خدمة يسوع بأكملها برؤية أن الرحمة هي المعنى النهائي لناموس الله. وبما أن يسوع لم يأت لينقض بل ليكمل هذا الناموس، فقد كان هو نفسه التجسد والظهور لغنى رحمة الله. الأمر نفسه صحيح عن يسوع اليوم \"يسوع المسيح هو هو أمسا واليوم وإلى الأبد\" (عبرانيين ١٣: ٨). لهذا السبب، يدعونا الله، الذي يدعى \"مبارك الله أبو ربنا يسوع المسيح، أبو الرأفة وإله كل تعزية\" (كورنثوس الثانية ١: ٣)، للاقتراب بجرأة إلى عرشه من خلال يسوع المسيح الذي يستطيع \"... أن يرثي لضعفاتنا\" (عبرانيين ٤: ١٥). يسوع هو رئيس كهنتنا البار، القدوس، والكافي لكل شيء. لقد قدم نفسه نائبا عنا في طاعة كاملة كذبيحة كاملة. كل مراحم الآب ملك لأولئك الذين يأتون إلى الله بالإيمان بيسوع. \"فلنتقدم بثقة إلى عرش النعمة لكي ننال رحمة ونجد نعمة عونا في حينه\" (عبرانيين ٤: ١٦).\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الآب، كم نحتاج إلى رحمتك. نخطئ يوميا. نخفق في حفظ وصيتك أن نحبك بكل قلوبنا ونفوسنا وعقولنا وقوتنا. نحن فاترون في عواطفنا. كل دوافعنا، حتى في أفضل حالاتها، مشوهة. نتذمر. نقلق بشأن الغد. نغضب بسرعة كبيرة. نرغب فيما لا ينبغي أن نرغب فيه. نستاء من أفعال الآخرين التي فعلناها نحن أنفسنا قبل خمس دقائق. إذا لم تظهر رحمتك لنا، فنحن هالكون. يا الله، دعنا نرى رحمة المسيح ونستمتع ونكتفي بها. امنحنا القوة لنفهم محبته. اجعلنا نميل إلى قراءة وتأمل قصص رحمة يسوع في الأناجيل. دعنا نعجب بما فعله لدرجة أننا نقتدي به. لكن ليكن أكثر بكثير من مجرد اقتداء خارجي. ليكن من القلب حيث انكسرنا بسبب خطيتنا وحيث أصبحنا نثمن الرحمة ونعيش بالرحمة ونرجو الرحمة ونتوق إلى الرحمة. اجعل رحمة يسوع أجمل ما نراه في مخلصنا يسوع. أعطنا أن نبصر ونرى، وبرؤيتنا، نصير مثله. ووجه هذا التذوق للرحمة إلى الخارج حتى نظهرها. اجعلنا مملوئين برحمته حتى نظهر الرحمة. حقق فينا الوصية بأن نفعل العدل ونحب الرحمة. اجعلنا نحب إظهار الرحمة. اجعلها جزءا منا حتى تصير هويتنا. وحدنا بالمسيح لدرجة أن رحمته تصبح رحمتنا، ورحمتنا تصبح تقديمنا للمسيح. هو كل ما لدينا لنقدمه في النهاية. مجد رحمته، يا أبانا، في إيماننا وصبرنا. جزيل الشكر على المسيح ورحمتك لنا فيه. باسمه نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الحادي عشر\u003c/h2\u003e\n\u003ch3\u003eجانب الشِدة\u003c/h3\u003e\n\u003ch4\u003eشِدة يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eيكمن مجد يسوع المسيح في أنه دائمًا خارج التوافق مع العالم، وبالتالي لديه دائمًا ما يحتاج العالم لسماعه. لو كان متناغمًا تمامًا معه، لما كان ذا فائدة تُذكر. إن محاولة إعادة صياغة \"يسوع الكتابي\" ليتناسب مع روح جيل واحد تجعله ضعيفًا في جيل آخر. من الأفضل أن ندعه يكون كما هو، لأن الجانب \"المُعثر\" في شخصية يسوع هو غالبًا ما نحتاجه أكثر. الأكثر إثارة للغضب في العالم اليوم هو محبة يسوع المتسمة بالشدة والصراحة. الأشخاص ذوي المشاعر المرهفة، الذين يستاؤون من أي شيء يُؤثِّر سلباً على مشاعرهم، غالبًا ما شعروا بالأذى من كلماته الصارمة. والأشخاص الذين يربطون الحب فقط بالكلمات والأساليب الناعمة والرقيقة كانوا يثورون من لغته اللاذعة، التي تكاد تكون عنيفة.\u003c/p\u003e\n\u003cp\u003eليس أن هذه كانت الطريقة الوحيدة التي تكلم بها؛ فقد رأينا حلاوة رحمته وكيف كان صبورًا ولطيفًا ومتسامحًا في الفصل العاشر. لهذا السبب لا يمكن رفض كلامه الشديد بدعوى أنه عنف أو انفعالات غضب أو عداء قاسٍ. إن ما نلقاه في لغة المسيح اللاذعة هو شكل من أشكال الحب يتوافق مع فساد عالمنا الواقعي، وظلمة قلوبنا، وخطورة ما هو على المحك في خياراتنا. لو كان هناك عالم بلا شرور عظيمة، ولا قلوب صماء، ولا عواقب أبدية، لكان الشكل المناسب الوحيد للحب هو اللمسة الناعمة والكلمات الرقيقة. عالم مثل هذا لا يقتل ابن الله ولا يكره تلاميذه. لكن لا وجود لمثل هذا العالم. نحن بحاجة أن نستمع إلى شدة رحمة يسوع المذهلة. لقد جعلت الناس يتعجبون في زمنه. حتى أعداؤه اعترفوا أنه كان غير مبالٍ بشكل مذهل بدعم الآخرين له. نحن نميل إلى القلق المفرط بشأن موافقة الآخرين ودعمهم لما نقول، أما يسوع فلم يكن كذلك: \"يَامُعَلِّمُ، نَعْلَمُ أَنَّكَ بِالاسْتِقَامَةِ تَتَكَلَّمُ وَتُعَلِّمُ، وَلاَ تَقْبَلُ الْوُجُوهَ، بَلْ بِالْحَقِّ تُعَلِّمُ طَرِيقَ اللهِ\" (لوقا ٢٠: ٢١). وعندما أرسل الفريسيون العدائيين ضباطًا للقبض على يسوع، عادوا خالي اليدين بهذا التفسير: \"أَجَابَ الْخُدَّامُ: لَمْ يَتَكَلَّمْ قَطُّ إِنْسَانٌ هكَذَا مِثْلَ هذَا الإِنْسَانِ!\" (يوحنا ٧: ٤٦).\u003c/p\u003e\n\u003cp\u003eهذه شهادة كل جيل. لم يتكلم أحد مثل هذا الرجل. ظهر ذلك عندما كان صبيًا في الهيكل: \"وَكُلُّ الَّذِينَ سَمِعُوهُ بُهِتُوا مِنْ فَهْمِهِ وَأَجْوِبَتِهِ\" (لوقا ٢: ٤٧). وعندما بدأ خدمته العامة في مجمع الناصرة، في البداية \"كَانَ الْجَمِيعُ يَشْهَدُونَ لَهُ وَيَتَعَجَّبُونَ مِنْ كَلِمَاتِ النِّعْمَةِ الخارِجَةِ مِنْ فَمِهِ\" (لوقا ٤: ٢٢)؛ لكن عندما قطع بصراحة توقعاتهم المتمحورة حول الذات، امتلأ أولئك الأشخاص أنفسهم \"غَضَبًا… وَأَخْرَجُوهُ خَارِجَ الْمَدِينَةِ، وَجَاءُوا بِهِ إِلَى حَافَّةَِ الْجَبَلِ… حَتَّى يَطْرَحُوهُ إِلَى أَسْفَلٍ\" (لوقا ٤: ٢٨-٢٩). ثم، في نهاية خدمته في الأسبوع الأخير من حياته، أسكتت إجاباته الصارمة أفواه خصومه، باستثناء صرخات الإدانة: \"فَلَمْ يَسْتَطِعْ أَحَدٌ أَنْ يُجِيبَهُ بِكَلِمَةٍ. وَمِنْ ذلِكَ الْيَوْمِ لَمْ يَجْسُرْ أَحَدٌ أَنْ يَسْأَلَهُ بَتَّةً\" (متى ٢٢: ٤٦). كانت حالة العالم التي جعلت مجيء المسيح ضروريًا سيئة لدرجة أن يسوع استخدم لغة صادمة لتصويرها. عندما جاء الناس يطلبون آية، أجابهم: \"جِيلٌ شِرِّيرٌ فَاسِقٌ يَلْتَمِسُ آيَةً\" (متى ١٦: ٤). وعندما لم يستطع تلاميذه طرد شيطان، قال: \"أَيُّهَا الْجِيلُ غَيْرُ الْمُؤْمِنِ، إِلَى مَتَى أَكُونُ مَعَكُمْ؟ إِلَى مَتَى أَحْتَمِلُكُمْ؟\" (مرقس ٩: ١٩). وعندما علمهم الصلاة، قال: \"فَإِنْ كُنْتُمْ وَأَنْتُمْ أَشْرَارٌ تَعْرِفُونَ أَنْ تُعْطُوا أَوْلاَدَكُمْ عَطَايَا جَيِّدَةً، فَكَمْ بِالْحَرِيِّ أَبُوكُمُ الَّذِي فِي السَّمَاوَاتِ، يَهَبُ خَيْرَاتٍ لِلَّذِينَ يَسْأَلُونَهُ!\" (متى ٧: ١١). لقد بدأ بافتراض أنهم أشرار، وأخبرهم بذلك. لم يكتفِ يسوع باتهام العالم بأنه شرير وفاسق وغير مؤمن، بل قال إن الجميع \"موتى\" روحيًا. عندما طلب تلميذ من يسوع أن يذهب ليدفن أباه، صدمه يسوع بالقول: \"اتْبَعْنِي، وَدَعِ الْمَوْتَى يَدْفِنُونَ مَوْتَاهُمْ\" (متى ٨: ٢٢). إن حالة \"الأحياء الأموات\" الرهيبة تطلبت كلمات قاسية. كان الأمر نفسه مع الفريسيين: \"وَيْلٌ لَكُمْ أَيُّهَا الْكَتَبَةُ وَالْفَرِّيسِيُّونَ الْمُرَاؤُونَ! لأَنَّكُمْ مِثلُ الْقُبُورِ الْمُخْتَفِيَةِ\" (لوقا ١١: ٤٤). \"وَيْلٌ لَكُمْ أَيُّهَا الْكَتَبَةُ وَالْفَرِّيسِيُّونَ الْمُرَاؤُونَ! لأَنَّكُمْ تُشْبِهُ تُشْبِهُ قُبُورًا مُبَيَّضَةً تَظْهَرُ مِنْ خَارِجٍ جَمِيلَةً، وَهِيَ مِنْ دَاخِل مَمْلُوءَةٌ عِظَامَ أَمْوَاتٍ وَكُلَّ نَجَاسَةٍ\" (متى ٢٣: ٢٧).\u003c/p\u003e\n\u003cp\u003eكانت حالة الموت هذه \"شيطانية\" لأن الشيطان كان قاتلاً روحياً للإنسان منذ البدء. أثار يسوع غضب المتدينين غير المؤمنين بهذا الاتهام: \"أَنْتُمْ مِنْ أَبٍ هُوي إِبْلِيسُ، وَشَهَوَاتِ أَبِيكُمْ تُرِيدُونَ أَنْ تَعْمَلُوا. ذَاكَ كَانَ قَتَّالاً لِلنَّاسِ مِنَ الْبَدْءِ، وَلَمْ يَثْبُتْ فِي الْحَقِّ لأَنَّهُ لَيْسَ فِيهِ حَقٌّ\" (يوحنا ٨: ٤٤). وعندما تحدث بطرس، تلميذه المخلص، ببطولة عن عدم السماح بقتل يسوع، استدار يسوع وقال له: \"اذْهَبْ عَنِّي يَاشَيْطَانُ! أَنْتَ مَعْثَرَةٌ لِي\" (متى ١٦: ٢٣). كان هناك حل واحد للموت الروحي: موت يسوع كبديل عنا. وأي عائق لذلك كان عملاً شيطانيًا، ولم تكن هناك كلمات قوية بما يكفي لصدّه. إن حالة القلب البشري ستؤدي حتماً إلى عقاب أبدي لأولئك الذين لا يقبلون العلاج الذي جاء به المسيح. لذلك، لم يراعِ يسوع المشاعر الرقيقة في تحذيره من جهنم. لم يتحدث أحد في الكتاب المقدس عن جهنم أكثر من يسوع، أو بطريقة أكثر رعبًا: \"يَخْرُجُ الْمَلاَئِكَةُ وَيُفْرِزُونَ الأَشْرَارَ مِنْ بَيْنِ الأَبْرارِ، وَيَطْرَحُونَهُمْ فِي أَتُونِ النَّارِ. هُنَاكَ يَكُونُ الْبُكَاءُ وَصَرِيرُ الأَسْنَانِ\" (متى ١٣: ٤٩-٥٠). جهنم، كما قال يسوع، هي مكان \"حَيْثُ دُودُهُمْ لاَ يَمُوتُ وَالنَّارُ لاَ تُطْفَأُ\" (مرقس ٩: ٤٨). إنها مكان \"الظُّلْمَةِ الْخَارِجِيَّةِ\" (متى ٨: ١٢؛ ٢٢: ١٣؛ ٢٥: ٣٠). إنها \"النَّارِ الأَبَدِيَّةِ الْمُعَدَّةِ لإِبْلِيسَ وَمَلاَئِكَتِهِ\" (متى ٢٥: ٤١). \"النَّارِ الَّتِي لاَ تُطْفَأُ\" (مرقس ٩: ٤٣). إنها \"عَذَاب أَبَدِيٍّ\" (متى ٢٥: ٤٦). لذلك، يشرح يسوع بمنطقية مذهلة أن الأخطار الأرضية البحتة — مثل القتل! — لا تُقارن بخطر جهنم: \"وَلكِنْ أَقُولُ لَكُمْ يَا أَحِبَّائِي: لاَ تَخَافُوا مِنَ الَّذِينَ يَقْتُلُونَ الْجَسَدَ، وَبَعْدَ ذلِكَ لَيْسَ لَهُمْ مَا يَفْعَلُونَ أَكْثَرَ. بَلْ أُرِيكُمْ مِمَّنْ تَخَافُونَ: خَافُوا مِنَ الَّذِي بَعْدَمَا يَقْتُلُ، لَهُ سُلْطَانٌ أَنْ يُلْقِيَ فِي جَهَنَّمَ. نَعَمْ، أَقُولُ لَكُمْ: مِنْ هذَا خَافُوا!\" (لوقا ١٢: ٤-٥). بعبارة أخرى: \"لا تخافوا، يا تلاميذي، من أن تُقتلوا!\". ويترتب على ذلك، بوضوح، أن الكوارث المروعة في هذا العالم، مهما كانت مؤلمة، ليست هي المأساة العظمى. المأساة الأعظم بكثير هي الفشل في الهروب من جهنم من خلال التوبة والإيمان. كان ليسوع طريقة غير عاطفية لقول هذه الحقيقة الحاسمة لأناس وضعوا أسوأ مخاوفهم في المكان الخطأ. على سبيل المثال، ارتعبت مجموعة مما فعله بيلاطس عندما خلط دم بعض العابدين الجليليين بذبائحهم. أبلغوا يسوع بهذه الفاجعة، ومن المؤكد أنهم قد ذهلوا من ردِّه عندما قال: \"فَأَجَابَ يَسُوعُ وَقَالَ لَهُمْ: أَتَظُنُّونَ أَنَّ هؤُلاَءِ الْجَلِيلِيِّينَ كَانُوا خُطَاةً أَكْثَرَ مِنْ كُلِّ الْجَلِيلِيِّينَ لأَنَّهُمْ كَابَدُوا مِثْلَ هذَا؟ كَلاَّ! أَقُولُ لَكُمْ: بَلِ إِنْ لَمْ تَتُوبُوا فَجَمِيعُكُمْ كَذلِكَ تَهْلِكُونَ\" (لوقا ١٣: ٢-٣). بعبارة أخرى، بدلاً من أن تتعجبوا أن البشر الخطاة يهلكون، تعجبوا أنكم لم تهلكوا بعد!\u003c/p\u003e\n\u003cp\u003eسيُرينا يسوع طريق السماء سواء استطعنا تحمله أم لا: \"فَإِنْ كَانَتْ عَيْنُكَ الْيُمْنَى تُعْثِرُكَ فَاقْلَعْهَا وَأَلْقِهَا عَنْكَ، لأَنَّهُ خَيْرٌ لَكَ أَنْ يَهْلِكَ أَحَدُ أَعْضَائِكَ وَلاَ يُلْقَى جَسَدُكَ كُلُّهُ فِي جَهَنَّمَ. وَإِنْ كَانَتْ يَدُكَ الْيُمْنَى تُعْثِرُكَ فَاقْطَعْهَا وَأَلْقِهَا عَنْكَ، لأَنَّهُ خَيْرٌ لَكَ أَنْ يَهْلِكَ أَحَدُ أَعْضَائِكَ وَلاَ يُلْقَى جَسَدُكَ كُلُّهُ فِي جَهَنَّمَ\" (متى ٥: ٢٩-٣٠). خير لك أن تبتر أحد أعضائك من أن تكابد الدينونة الأبدية. وإن كان الأمر هكذا مع دينونتنا الشخصية، فكم بالأحرى بالتسبب في دينونة الآخرين: \"وَمَنْ أَعْثَرَ أَحَدَ هؤُلاَءِ الصِّغَارِ الْمُؤمنينَ بِي فَخَيْرٌ لَهُ أَنْ يُعَلَّقَ فِي عُنُقِهِ حَجَرُ الرَّحَى وَيُغَرْقَ فِي لُجَّةِ الْبَحْرِ\" (متى ١٨: ٦). خير لك أن تهلك في البحر من أن تدفع آخر إلى جهنم. لذلك، ليس من المستغرب أن يصف يسوع دخول الملكوت كفعل \"عَنيف\": \"وَمِنْ أَيَّامِ يُوحَنَّا الْمَعْمَدَانِ إِلَى الآنَ مَلَكُوتُ السَّمَاوَاتِ يُغْصَبُ، وَالْغَاصِبُونَ يَخْتَطِفُونَهُ\" (متى ١١: ١٢). وليس من المستغرب أن يقول: \"مَا أَضْيَقَ الْبَابَ وَأَكْرَبَ الطَّرِيقَ الَّذِي يُؤَدِّي إِلَى الْحَيَاةِ، وَقَلِيلُونَ هُمُ الَّذِينَ يَجِدُونَهُ!\" (متى ٧: ١٤). ليس هناك كثيرون سيؤمنون بالمسيح بعمق، ويعتزون بالسماء بشدة، لدرجة أنهم يعتبرون أعينهم وأيديهم وحياتهم أقل قيمة من الشركة مع يسوع في الفردوس. لذا الطريق ضيق، وقليلون هم السالكين فيه. بل إن الكثيرين يستمعون إلى يسوع ويقولون: \"إِنَّ هذَا الْكَلاَمَ صَعْبٌ! مَنْ يَقْدِرُ أَنْ يَسْمَعَهُ؟\" (يوحنا ٦: ٦٠). لكنه لا يتراجع؛ بل يَحُثُّ على الطريق الضيق، ليس فقط فيما يتعلق بنقاء أيدينا وأعيننا، وحبنا العميق لأولادنا؛ بل يستهدف أيضًا ولاءنا المفرط للعائلة والنفس والممتلكات: \"إِنْ كَانَ أَحَدٌ يَأْتِي إِلَيَّ وَلاَ يُبْغِضُ أَبَاهُ وَأُمَّهُ وَامْرَأَتَهُ وَأَوْلاَدَهُ وَإِخْوَتَهُ وَأَخَوَاتِهِ، حَتَّى نَفْسَهُ أَيْضًا، فَلاَ يَقْدِرُ أَنْ يَكُونَ لِي تِلْمِيذًا\" (لوقا ١٤: ٢٦). \"مَنْ يُحِبُّ نَفْسَهُ يُهْلِكُهَا، وَمَنْ يُبْغِضُ نَفْسَهُ فِي هذَا الْعَالَمِ يَحْفَظُهَا إِلَى حَيَاةٍ أَبَدِيَّةٍ\" (يوحنا ١٢: ٢٥). \"فَكَذلِكَ كُلُّ وَاحِدٍ مِنْكُمْ لاَ يَتْرُكُ جَمِيعَ أَمْوَالِهِ، لاَ يَقْدِرُ أَنْ يَكُونَ لِي تِلْمِيذًا\" (لوقا ١٤: ٣٣). حتى الحب للوالدين الصالحين سيبدو غالبًا كبغض في نظر العالم عندما نسعى إلى الملكوت أولاً. وإذا لم يكن والدينا صالحين، فإن الإيمان الذي يجعلنا نسعى لخلاصهم سيحولهم ضدنا: \"فَإِنِّي جِئْتُ لأُفَرِّقَ الإِنْسَانَ ضِدَّ أَبِيهِ، وَالابْنَةَ ضِدَّ أُمِّهَا، وَالْكَنَّةَ ضِدَّ حَمَاتِهَا\" (متى ١٠: ٣٥). فهل نفقد عائلتنا عندما نتبع المسيح؟ تأتي إجابة يسوع المفاجئة: \"لأَنَّ مَنْ يَصْنَعُ مَشِيئَةَ أَبِي الَّذِي فِي السَّمَاوَاتِ هُوَ أَخِي وَأُخْتِي وَأُمِّي\" (متى ١٢: ٥٠). إذا لم يَبدُ هذا كخدمة رئيس السلام، فاعلم أن هدفه ليس السلام مع عدم الإيمان والعصيان. هؤلاء هم الأعداء الذين يجب تدميرهم، وإلا دمرونا. عندما يُحتقر الغفران الذي يقدمه يسوع، يصبح الانقسام حتميًا — ويسوع كان يعلم ذلك: \"أَتَظُنُّ أَنِّي جِئْتُ لأُعْطِيَ سَلاَمًا عَلَى الأَرْضِ؟ كَّلاَّ، أَقُولُ لَكُمْ: بَلِ انْقِسَامًا\" (لوقا ١٢: ٥١). \"وَسَوْفَ تُسَلَّمُونَ مِنَ الْوَالِدِينَ وَالإِخْوَةِ وَالأَقْرِبَاءِ وَالأَصْدِقَاءِ، وَيَقْتُلُونَ مِنْكُمْ\" (لوقا ٢١: ١٦). \"جِئْتُ لأُلْقِيَ نَارًا عَلَى الأَرْضِ، فَمَاذَا أُرِيدُ لَوِ اضْطَرَمَتْ؟\" (لوقا ١٢: ٤٩). من يستطيع سماع هذه الأشياء؟ من يستطيع أن يفرح بهذه الكلمات ويُدرك حقيقة كلام يسوع عندما يقول: \"كَلَّمْتُكُمْ بِهذَا لِكَيْ يَثْبُتَ فَرَحِي فِيكُمْ وَيُكْمَلَ فَرَحُكُمْ\" (يوحنا ١٥: ١١)؟ إجابة يسوع مدهشة كاللغة التي أثارت السؤال. ويعطيها بفرح: وَفِي تِلْكَ السَّاعَةِ تَهَلَّلَ يَسُوعُ بِالرُّوحِ وَقَالَ: \"أَحْمَدُكَ أَيُّهَا الآبُ، رَبُّ السَّمَاءِ وَالأَرْضِ، لأَنَّكَ أَخْفَيْتَ هذِهِ عَنِ الْحُكَمَاءِ وَالْفُهَمَاءِ وَأَعْلَنْتَهَا لِلأَطْفَالِ\" (لوقا ١٠: ٢١). المتواضعون، القابلون للتعليم، المنكسرون، الخاضعون — أي \"الأطفال\" — هؤلاء سيسمعون صوت القوة والحق والبر والحب. سيسمعون، وستلتهب قلوبهم داخلهم عندما يتكلم (لوقا ٢٤: ٣٢). لن يتأذوا؛ بل سيتعزون بأن هناك أخيرًا من يرى بؤس حالتنا البشرية، ويعرف العدو الحقيقي، ولا يساوم، ويتكلم كملك منتصر ومُخلّص عظيم.\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eيا رب، اجعلنا لا نكون مفرطي الحساسية. ليس لنكون أقل رقة، بل لنكون أقل عرضة للأذى. انزع عنا ميلنا إلى الشفقة على الذات. امنحنا شغفًا بالحق أقوى من شغفنا الفطري بتلقي المدح. اغفر لنا، يا أبتِ، لأننا نَصِفُ كلماتك بأنها خالية من المحبة فقط لأنها حازمة. اغفر لنا لأننا ننسب دوافع خبيثة للناس عندما لا نعرف دوافعهم. ساعدنا أن نتعلم من يسوع متى نكون أشداء ومتى نكون رقيقين. احمنا من تبرير الغضب البشري مستخدمين أقوال يسوع الشديدة ذريعةً لذلك. لكن لا تدعنا نكون رخوين لدرجة أننا لا نستطيع قول كلمة حق حازمة في وقتها. نحن نتعجب من كلمات ربنا يسوع. كم كان غير مُتوقع! لم يتكلم أحد مثله قط. إنه في مقام خاص متفرد. ننحني أمامه ونُغلق أفواهنا. نحن متلهفون لسماعه يتكلم — وليتكلم بأي طريقة يشاء. نحن المتعلمون الصامتون. هو المعلم الذي بلا خطية. نضع أيدينا على أفواهنا ونأخذ مكاننا عند قدميه. افعل بنا ما شئت، يا أبتِ. لسنا قضاتك، ولا قضاة طريقة كلام ابنك. ارحمنا — حازمًا كنت أم رقيقًا — واهدنا إلى فرحك الأبدي. باسم ابنك، ربنا يسوع، نصلي. آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الثاني عشر\u003c/h2\u003e\n\u003ch3\u003eقوة حياة لا تزول\u003c/h3\u003e\n\u003ch4\u003eقيامة يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eأقام الله يسوع المسيح من الأموات (كورنثوس الأولى ١٥: ٤؛ بطرس الأولى ١: ٢١). كان الجميع يعلم أنه قد مَات، من الحاكم إلى الجنود الذين نفذوا الإعدام، إلى النساء اللواتي دفنَّه، إلى الخصوم الذين خافوا من مؤامرة شائعة القيامة. كلهم كانوا يعلمون أنه قد مَات. وليفسروا قبره الفارغ، اختلقوا الافتراءات بأنه لم يمت فعلاً لكن تلاميذه سرقوا جسده (متى ٢٨: ١٣). لكن ذلك لم ينجح، لأن الناس لا يعرضون حياتهم للخطر من أجل كذبة من صنعهم. لم يكن الجسد في القبر، وإلا لكان الأعداء قد أوقفوا المسيحية بعرض جسد يسوع. كان التلاميذ ملتهبين بالجرأة، يخاطرون بحياتهم بنشر خبر أن يسوع قام من الأموات (أعمال الرسل ٢: ٢٤، ٣٢؛ ٣: ١٥). فقد استشهد إسطفانوس والرسول يعقوب (أعمال الرسل ٧: ٦٠؛ ١٢: ٢). وظهر يسوع لمدة أربعين يومًا لأفراد وجماعات، بعضها يصل إلى خمسمائة شخص (أعمال الرسل ١: ٣؛ كورنثوس الأولى ١٥: ٦). معظمهم لم يكونوا سذجًا، بل كانوا ممن يصعب إقناعهم (لوقا ٢٤: ١١، ٣٨؛ يوحنا ٢٠: ٢٥، ٢٧).\u003c/p\u003e\n\u003cp\u003eعندما بدأ التلاميذ المتشككون يدركون احتمال صحة القيامة، كانت التخمينات الأولى أن يسوع الذي رأوه كان شبحًا أو ظهورًا من نوع ما. لكن يسوع كان حازمًا في القضاء على هذا التخمين فورًا. لتوما المتشكك قال: \"’هَاتِ إِصْبِعَكَ إِلَى هُنَا وَأَبْصِرْ يَدَيَّ، وَهَاتِ يَدَكَ وَضَعْهَا فِي جَنْبِي، وَلاَ تَكُنْ غَيْرَ مُؤْمِنٍ بَلْ مُؤْمِنًا‘\" (يوحنا ٢٠: ٢٧). في مناسبة أخرى أمام التلاميذ المذهولين، أكل يسوع معهم سمكًا ليُريهم أنه ليس شبحًا: \"’اُنْظُرُوا يَدَيَّ وَرِجْلَيَّ: إِنِّي أَنَا هُوَ! جُسُّونِي وَانْظُرُوا، فَإِنَّ الرُّوحَ لَيْسَ لَهُ لَحْمٌ وَعِظَامٌ كَمَا تَرَوْنَ لِي‘... وَبَيْنَمَا هُمْ غَيْرُ مُصَدِّقِين مِنَ الْفَرَحِ، وَمُتَعَجِّبُونَ، قَالَ لَهُمْ: \"’أَعِنْدَكُمْ ههُنَا طَعَامٌ؟‘\" (لوقا ٢٤: ٣٩-٤٣).\u003c/p\u003e\n\u003cp\u003eلكن جسد يسوع القائم من الأموات كان أكثر من مجرد جسد بشري أُعيد إحياؤه. كان هو نفسه، ومع ذلك ليس هو نفسه. كان يمكن التعرف عليه كما كان دائمًا. كان جسده ماديًا. لكنه كان أيضًا جسدًا تحول لمَجدِ القيامة. عندما وصف الرسول بولس جسد القيامة الذي سيناله المسيحيون في القيامة، كان يصف جسد قيامة يسوع أيضًا، لأن المسيح أُقيم كـ\"بَاكُورَةُ الرَّاقِدِينَ\" (كورنثوس الأولى ١٥: ٢٠). بعبارة أخرى، جسد المسيح القائم هو جزء من نفس حصاد الأجساد الأخرى التي سَيُقيمها المسيح في المجد في اليوم الأخير. يقول بولس إن المسيح \"الَّذِي سَيُغَيِّرُ شَكْلَ جَسَدِ تَوَاضُعِنَا لِيَكُونَ عَلَى صُورَةِ جَسَدِ مَجْدِهِ\" (فيلبي ٣: ٢١). لذلك، ينطبق هذا الوصف لأجساد قيامتنا المستقبلية على جسد يسوع أيضًا: \"يُزْرَعُ فِي فَسَادٍ وَيُقَامُ فِي عَدَمِ فَسَادٍ. يُزْرَعُ فِي هَوَانٍ وَيُقَامُ فِي مَجْدٍ. يُزْرَعُ فِي ضَعْفٍ وَيُقَامُ فِي قُوَّةٍ. يُزْرَعُ جِسْمًا حَيَوَانِيًّا وَيُقَامُ جِسْمًا رُوحَانِيًّا\" (كورنثوس الأولى ١٥: ٤٢-٤٤). إنه نفس الجسد، ومع ذلك صار له مجدٌ رائعٌ. كانت له قوة إلهية هائلة قبل وأثناء وبعد قيامة يسوع. قبل قيامته، كان يسوع متحكمًا تمامًا في حياته وموته. \"’...أَنِّي أَضَعُ نَفْسِي لآخُذَهَا أَيْضًا. لَيْسَ أَحَدٌ يَأْخُذُهَا مِنِّي، بَل أَضَعُهَا أَنَا مِنْ ذَاتِي. لِي سُلْطَانٌ أَنْ أَضَعَهَا وَلِي سُلْطَانٌ أَنْ آخُذَهَا أَيْضًا‘\" (يوحنا ١٠: ١٧-١٨). سخر يسوع من التهديدات بأنه يمكن قتله قبل ساعته، ناهيك عن أن يُحتجز في القبر دون إرادته. عندما حُذر أن هيرودس يريد قتله، قال يسوع: \"’امْضُوا وَقُولُوا لِهذَا الثَّعْلَبِ: هَا أَنَا أُخْرِجُ شَيَاطِينَ، وَأَشْفِي الْيَوْمَ وَغَدًا، وَفِي الْيَوْمِ الثَّالِثِ أُكَمَّلُ‘\" (لوقا ١٣: ٣٢). تنبأ بتفاصيل موته وقيامته كمن يتبع خطته الخاصة التي لا يمكن إيقافها: \"’ابْنُ الإِنْسَانِ سَوْفَ يُسَلَّمُ إِلَى أَيْدِي النَّاسِ فَيَقْتُلُونَهُ، وَفِي الْيَوْمِ الثَّالِثِ يَقُومُ‘\" (متى ١٧: ٢٢-٢٣).\u003c/p\u003e\n\u003cp\u003eفي فعل القيامة ذاته، كانت القوة الإلهية مُسيطرة تمامًا. أشار بولس إلى \"عَظَمَةُ قُدْرَتِهِ الْفَائِقَةُ نَحْوَنَا نَحْنُ الْمُؤْمِنِينَ، حَسَبَ عَمَلِ شِدَّةِ قُوَّتِهِ الَّذِي عَمِلَهُ فِي الْمَسِيحِ، إِذْ أَقَامَهُ مِنَ الأَمْوَاتِ، وَأَجْلَسَهُ عَنْ يَمِينِهِ فِي السَّمَاوِيَّاتِ\" (أفسس ١: ١٩-٢٠). وقال بطرس: \"’... إِذْ لَمْ يَكُنْ مُمْكِنًا أَنْ يُمْسَكَ مِنْهُ [الموت وقوته]\" (أعمال الرسل ٢: ٢٤). عبر الموت بقوته السيادية، دخل المسيح إلى حياة لا فساد فيها ولا تنتهي. أصبح يسوع رئيس كهنة حيًا إلى الأبد \"بِحَسَبِ قُوَّةِ حَيَاةٍ لاَ تَزُولُ\" (عبرانيين ٧: ١٦). \"عَالِمِينَ أَنَّ الْمَسِيحَ بَعْدَمَا أُقِيمَ مِنَ الأَمْوَاتِ لاَ يَمُوتُ أَيْضًا. لاَ يَسُودُ عَلَيْهِ الْمَوْتُ بَعْدُ\" (رومية ٦: ٩). \"رَفَّعَهُ اللهُ أَيْضًا، وَأَعْطَاهُ اسْمًا فَوْقَ كُلِّ اسْمٍ\" (فيلبي ٢: ٩). \"أَنْتُمُ الَّذِينَ بِهِ تُؤْمِنُونَ بِاللهِ الَّذِي أَقَامَهُ مِنَ الأَمْواتِ وَأَعْطَاهُ مَجْدًا\" (بطرس الأولى ١: ٢١). قبل، أثناء، وبعد القيامة، كانت قيامة يسوع تجليًا رائعًا للقوة الإلهية. تؤكد قيامة يسوع كل عمله في المستقبل نيابة عن شعبه: سلطانه وحكمه على كل شيء في الكون (متى ٢٨: ١٨)؛ شفاعته الكهنوتية من أجلنا (رومية ٨: ٣٤)؛ تشفعه من أجلنا ككاهن عند الله الآب (يوحنا الأولى ٢: ١)؛ حضوره المعزي والحامي معنا حتى نهاية الدهر (متى ٢٨: ٢٠)؛ ومجيئه الأخير إلى الأرض في المجد ليعطي راحة لنا و\"مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ\" (تسالونيكي الثانية ١: ٧-٨). تثبت القيامة كفاية الصليب وتُثَبت يقين ونهائية تبريرنا — تَبرأتنا — بالإيمان. \"[يسوع] الَّذِي أُسْلِمَ مِنْ أَجْلِ خَطَايَانَا وَأُقِيمَ لأَجْلِ تَبْرِيرِنَا\" (رومية ٤: ٢٥). جميع وعود الله، المشتراة بدم المسيح، أصبحت ملكنا إلى الأبد بسبب قيامة يسوع. الغفران، على سبيل المثال: \"وَإِذْ لَمْ يَكُنِ الْمَسِيحُ قَدْ قَامَ، فَبَاطِلٌ إِيمَانُكُمْ. أَنْتُمْ بَعْدُ فِي خَطَايَاكُمْ!\" (كورنثوس الأولى ١٥: ١٧). لكنه قد قام، لذا الغفران حقيقي ودائم. \"إِذْ هُوَ حَيٌّ فِي كُلِّ حِينٍ لِيَشْفَعَ [فينا]\" (عبرانيين ٧: ٢٥). في النهاية، المسيح القائم من الأموات سيُقِمنا معه. \"وَإِنْ كَانَ رُوحُ الَّذِي أَقَامَ يَسُوعَ مِنَ الأَمْوَاتِ سَاكِنًا فِيكُمْ، فَالَّذِي أَقَامَ الْمَسِيحَ مِنَ الأَمْوَاتِ سَيُحْيِي أَجْسَادَكُمُ الْمَائِتَةَ أَيْضًا بِرُوحِهِ السَّاكِنِ فِيكُمْ\" (رومية ٨: ١١). \"لأَنَّهُ إِنْ كُنَّا قَدْ صِرْنَا مُتَّحِدِينَ مَعَهُ بِشِبْهِ مَوْتِهِ، نَصِيرُ أَيْضًا بِقِيَامَتِهِ\" (رومية ٦: ٥). كما استرد يسوع حياته من أنياب الموت، كذلك سيُقيم من الأموات الذين هم له. يَسُوع يعطي هذا الوعد لكل من يؤمن به: \"’وَأَنَا أُقِيمُهُ فِي الْيَوْمِ الأَخِيرِ‘\" (يوحنا ٦: ٤٠). وهكذا، قيامته تُؤْمِنُ قيامتهم. هم آمنون ومحفوظون في المجد كما هو أيضًا. \"إِذْ لاَ يَسْتَطِيعُونَ أَنْ يَمُوتُوا أَيْضًا،… إِذْ هُمْ أَبْنَاءُ الْقِيَامَةِ\" (لوقا ٢٠: ٣٦). \"هؤُلاَءِ لَيْسَ لِلْمَوْتِ الثَّانِي سُلْطَانٌ عَلَيْهِمْ\" (رؤيا ٢٠: ٦). مجد المسيح في قوة قيامته إلى حياة لا تُهزم وسلطان مُطلق سيرجع إليه في عبادة مِلؤُها الفرح من قديسيه القائمين والمُكمَلين. من سيستمتع بهبة الحياة الأبدية هذه؟ يجيب يسوع: \"’أَنَا هُوَ الْقِيَامَةُ وَالْحَيَاةُ. مَنْ آمَنَ بِي وَلَوْ مَاتَ فَسَيَحْيَا‘\" (يوحنا ١١: ٢٥-٢٦).\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eيا أبا المجد، نسبحك لأنك أقمت ابنك يسوع بقوة من بين الأموات. نسبحك لأن الحجر الذي رفضه البناؤون قد صار رأس الزاوية. هذا فعلك وهو عجيب في أعيننا. لم يستطع الموت أن يحتجزه! آخر أعدائنا سقط أمام قوتك في انتصار يسوع على الموت، وقد تحررنا من خوف هذا العدو القديم. والآن، يا الله، امنحنا أن نعيش في غنى كل ما تقدمه قيامة يسوع. له كل السلطان في السماء وعلى الأرض. لا قوة ولا عدو يمكن أن يغلبه. لا يأتينا إلا الخير في النهاية ونحن نثق به. الأفضل دائمًا قادم. لذا، يا أبانا، انزع الخوف والقلق والإحباط والتقلبات المزاجية من حياتنا. ركز انتباهنا على الحقيقة النهائية لانتصار المسيح الأخير على الموت. لا تدعنا ننسى أو نفشل في الشعور بالمجد الأبدي الذي أعطيته ليَسُوع، أعطيته اسمًا فوق كل اسم. اجعل هذا عمليًا في حياتنا اليومية ونحن نتعامل مع كل إنسان، كبيرًا أو صغيرًا، أنه سيواجه يومًا ما القاضي القائم من الأموات والمنتصر ليدين كل الأمم. امنحنا جرأة متضعة في رحمة وقوة يسوع. يا أبانا، نُريد أن تكون حياتنا أداة لإعلان عظمته. اعمل فينا لهذا الهدف بكل قوتك، نصلي. باسم يسوع، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الثالث عشر\u003c/h2\u003e\n\u003ch3\u003eظهور مجد إلهنا ومخلّصنا العظيم\u003c/h3\u003e\n\u003ch4\u003eالمجيء الثاني ليسوع المسيح\u003c/h4\u003e\n\u003cp\u003eفي مجيئه الأول، اشترك المسيح في اللحم والدم \"لِكَيْ يُبِيدَ بِالْمَوْتِ ذاكَ الَّذِي لَهُ سُلْطَانُ الْمَوْتِ، أَيْ إِبْلِيسَ، وَيُعْتِقَ أُولئِكَ الَّذِينَ­ خَوْفاً مِنَ الْمَوْتِ­ كَانُوا جَمِيعاً كُلَّ حَيَاتِهِمْ تَحْتَ الْعُبُودِيَّةِ\" (عبرانيين ٢: ١٤-١٥). وسيظهر ثانيةً ليخلّص الذين ينتظرونه بشوق (عبرانيين ٩: ٢٨). سيأتي وقت يُبتلع فيه الإيمان بالعيان. الآن، \"بِالإِيمَانِ نَسْلُكُ لاَ بِالْعِيَانِ\" (كورنثوس الثانية ٥: ٧). لكن عند البوق الأخير، عندما يُقام الأموات ونتغيّر في طرفة عين (كورنثوس الأولى ١٥: ٥٢)، ستتوحد رؤيتنا الروحية والجسدية لنُبصر بوضوح مجد المسيح. الآن، نرى المسيح بـ\"عُيُونِ أَذْهَانِكُمْ\" (أفسس ١: ١٨). الآن يُشرق الله في قلوبنا ليعطينا \"إِنَارَةُ إِنْجِيلِ مَجْدِ الْمَسِيحِ\" (كورنثوس الثانية ٤: ٤، ٦). \"’لَيْسَ أَحَدٌ يَعْرِفُ الابْنَ إِلاَّ الآبُ‘\" (متى ١١: ٢٧). لذا، إذا رأينا مجد الابن، فإن ما قاله يسوع لبطرس ينطبق علينا أيضًا: \"’إِنَّ لَحْماً وَدَماً لَمْ يُعْلِنْ لَكَ، لكِنَّ أَبِي الَّذِي فِي السَّمَاوَاتِ‘\" (متى ١٦: ١٧). عندما يحدث ذلك، نكون \"نَاظِرِينَ مَجْدَ الرَّبِّ\" (كورنثوس الثانية ٣: ١٨).\u003c/p\u003e\n\u003cp\u003eلكن هناك مجد سيأتي لا نراه الآن. يسميه بولس \"الرَّجَاءَ الْمُبَارَكَ\" — \"ظُهُورَ مَجْدِ اللهِ الْعَظِيمِ وَمُخَلِّصِنَا يَسُوعَ الْمَسِيحِ\" (تيطس ٢: ١٣). أولاً، كان هناك ألم ابن الإنسان وكشف مجده فقط لعيون الإيمان (كورنثوس الأولى ١: ١٨، ٢٣). ثم، في نهاية الدهر، يأتي مجد يراه الجميع بعيون أجسادهم. \"’كَمَا أَنَّ الْبَرْقَ الَّذِي يَبْرُقُ مِنْ نَاحِيَةٍ تَحْتَ السَّمَاءِ يُضِيءُ إِلَى نَاحِيَةٍ تَحْتَ السَّمَاءِ، كَذلِكَ يَكُونُ أَيْضًا ابْنُ الإِنْسَانِ فِي يَوْمِهِ. وَلكِنْ يَنْبَغِي أَوَّلاً أَنْ يَتَأَلَّمَ كَثِيرًا‘\" (لوقا ١٧: ٢٤). المجد — هكذا يتحدث كتّاب الوحي المُقدس عن هذا الحدث مرارًا وتكرارًا. \"’وَمَتَى جَاءَ ابْنُ الإِنْسَانِ فِي مَجْدِهِ وَجَمِيعُ الْمَلاَئِكَةِ الْقِدِّيسِينَ مَعَهُ، فَحِينَئِذٍ يَجْلِسُ عَلَى كُرْسِيِّ مَجْدِهِ‘\" (متى ٢٥: ٣١). ليس بعض الملائكة فقط، بل جميعهم، \"عَدَدُهُمْ رَبَوَاتُ رَبَوَاتٍ وَأُلُوفَ أُلُوفٍ\" (رؤيا ٥: ١١). عندما يأتي ابن الإنسان و\"’يَجْلِسُ عَلَى كُرْسِيِّ مَجْدِهِ‘\" (متى ٢٥: ٣١). ومن ذلك العرش المجيد سيملك. \"لِنُمُوِّ رِيَاسَتِهِ، وَلِلسَّلاَمِ لاَ نِهَايَةَ … بِالْحَقِّ وَالْبِرِّ، … إِلَى الأَبَدِ\" (إشعياء ٩: ٦-٧). سيكون هذا المجد هو مجد ابن الإنسان (متى ٢٥: ٣١). ولكن بما أن ابن الإنسان هو أيضًا ابن الله، وهو والآب واحد، سيكون أيضًا \"’مَجْدِ أَبِيهِ‘\" (متى ١٦: ٢٧). يُسمى مجيئه ببساطة استعلان \"مَجْدِهِ\" (بطرس الأولى ٤: ١٣)، وكل قديس، كما يقول بطرس، سيكون \"شَرِيكَ الْمَجْدِ الْعَتِيدِ أَنْ يُعْلَنَ\" (بطرس الأولى ٥: ١). فرح القديسين، الذين \"يَفْرَحُوا فِي اسْتِعْلاَنِ مَجْدِهِ أَيْضًا مُبْتَهِجِينَ\" (بطرس الأولى ٤: ١٣)، سيكون فرح تقدير وتسبيح مجد المسيح غير المحجوب. لهذا سيأتي — \"لِيَتَمَجَّدَ فِي قِدِّيسِيهِ وَيُتَعَجَّبُ مِنْهُ فِي جَمِيعِ الْمُؤْمِنِينَ\" (تسالونيكي الثانية ١: ١٠).\u003c/p\u003e\n\u003cp\u003eكيف سيكون استعلان هذا المجد؟ سيكون \"بِهُتَافٍ، بِصَوْتِ رَئِيسِ مَلاَئِكَةٍ وَبُوقِ اللهِ، …وَالسَّمَاءُ انْفَلَقَتْ كَدَرْجٍ مُلْتَفّ، وَكُلُّ جَبَل وَجَزِيرَةٍ تَزَحْزَحَا مِنْ مَوْضِعِهِمَا\" (تسالونيكي الأولى ٤: ١٦؛ رؤيا ٦: ١٤). ستكون نار الدينونة \"عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ… فِي نَارِ لَهِيبٍ\" (تسالونيكي الثانية ١: ٧-٨). ستُجمع كل الأمم أمامه، وكل غير المؤمنين \"سَيُعَاقَبُونَ بِهَلاَكٍ أَبَدِيٍّ مِنْ وَجْهِ الرَّبِّ وَمِنْ مَجْدِ قُوَّتِهِ\" (تسالونيكي الثانية ١: ٩). ملوك الأرض والعبيد المتواضعون \"أَخْفَوْا أَنْفُسَهُمْ فِي الْمَغَايِرِ وَفِي صُخُورِ الْجِبَالِ، وَهُمْ يَقُولُونَ لِلْجِبَالِ وَالصُّخُورِ: ’اسْقُطِي عَلَيْنَا وَأَخْفِينَا… عَنْ غَضَبِ الْخَرُوفِ‘\" (رؤيا ٦: ١٥-١٦). \"وَ… سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ\" (تسالونيكي الثانية ٢: ٨). \"وَستَنْظُرُهُ كُلُّ عَيْنٍ، وَالَّذِينَ طَعَنُوهُ، وَيَنُوحُ عَلَيْهِ جَمِيعُ قَبَائِلِ الأَرْضِ\" (رؤيا ١: ٧). لكن مجد مجيء الرب سيكون أيضًا خلاصًا. \"... الْمَسِيحُ… سَيَظْهَرُ ثَانِيَةً بِلاَ خَطِيَّةٍ لِلْخَلاَصِ لِلَّذِينَ يَنْتَظِرُونَهُ\" (عبرانيين ٩: ٢٨). عند \"صَوْتِ رَئِيسِ مَلاَئِكَةٍ وَبُوقِ اللهِ… الأَمْوَاتُ فِي الْمَسِيحِ سَيَقُومُونَ أَوَّلاً. ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ\" (تسالونيكي الأولى ٤: ١٦-١٧). \"حَسَبِ عَمَلِ اسْتِطَاعَتِهِ أَنْ يُخْضِعَ لِنَفْسِهِ كُلَّ شَيْءٍ\" \"سَيُغَيِّرُ شَكْلَ جَسَدِ تَوَاضُعِنَا لِيَكُونَ عَلَى صُورَةِ جَسَدِ مَجْدِهِ\" (فيلبي ٣: ٢١). \"فِي لَحْظَةٍ فِي طَرْفَةِ عَيْنٍ… يُقَامُ الأَمْوَاتُ عَدِيمِي فَسَادٍ، وَنَحْنُ نَتَغَيَّرُ\" (كورنثوس الأولى ١٥: ٥٢). \"’وَسَيَمْسَحُ اللهُ كُلَّ دَمْعَةٍ مِنْ عُيُونِهِمْ، وَالْمَوْتُ لاَ يَكُونُ فِي مَا بَعْدُ، وَلاَ يَكُونُ حُزْنٌ وَلاَ صُرَاخٌ وَلاَ وَجَعٌ فِي مَا بَعْدُ‘\" (رؤيا ٢١: ٤).\u003c/p\u003e\n\u003cp\u003eوربما الأكثر مجدًا هو الغيرة التي سيُعظم بها نعمته. لن يُشارك مجد كونه مانح النعمة. يقول بطرس ببساطة: \"أَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ\" (بطرس الأولى ١: ١٣). وكيف ستبدو تلك النعمة؟ صوّرها يسوع في مثل: \"’طُوبَى لأُولَئِكَ الْعَبِيدِ الَّذِينَ إِذَا جَاءَ سَيِّدُهُمْ يَجِدُهُمْ سَاهِرِينَ. اَلْحَقَّ أَقُولُ لَكُمْ: إِنَّهُ يَتَمَنْطَقُ وَيُتْكِئُهُمْ وَيَتَقَدَّمُ وَيَخْدُمُهُمْ‘\" (لوقا ١٢: ٣٧). إنها نعمة أن يكون الله \"خادمنا\" — المَانح والمُعطي — إلى الأبد. سأل يسوع في العشاء الأخير: \"’مَنْ هُوَ أَكْبَرُ: أَلَّذِي يَتَّكِئُ أَمِ الَّذِي يَخْدُمُ؟ أَلَيْسَ الَّذِي يَتَّكِئُ؟ وَلكِنِّي أَنَا بَيْنَكُمْ كَالَّذِي يَخْدُمُ‘\" (لوقا ٢٢: ٢٧). وهكذا سيكون إلى الأبد. لماذا؟ لأن المَانح يأخذ المجد. لن يتخلى المسيح عن مجد نعمته السيادية. \"’لاَ يُخْدَمُ بِأَيَادِي النَّاسِ كَأَنَّهُ مُحْتَاجٌ إِلَى شَيْءٍ،‘\" (أعمال الرسل ١٧: ٢٥). خَلق ليَحصل على مستفيدين يعظمون جوده. وسيُنهي التاريخ كمانح أبدي. من البداية إلى النهاية، هدفه واحد: \"مَدْحِ مَجْدِ نِعْمَتِهِ\" (أفسس ١: ٦). تعال، فلنعبد وننحني. ونُحب ظهوره. \"وَأَخِيرًا قَدْ وُضِعَ لِي إِكْلِيلُ الْبِرِّ، الَّذِي يَهَبُهُ لِي فِي ذلِكَ الْيَوْمِ، الرَّبُّ الدَّيَّانُ الْعَادِلُ، وَلَيْسَ لِي فَقَطْ، بَلْ لِجَمِيعِ الَّذِينَ يُحِبُّونَ ظُهُورَهُ أَيْضًا\" (تيموثاوس الثانية ٤: ٨).\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eاغفر لنا، يا أبانا، لا مبالاتنا بالمجيء الثاني لابنك. لم نحتفظ بمصابيح توقعنا مشتعلة أو نشتري زيت الشوق برجاء عودة العريس. اشترينا حقلًا وذهبنا لننظر إليه. اشترينا ثيرانًا وقضينا وقتًا نعجب بحجمها ووزنها. تزوجنا زوجة واشتَهيناها أكثر من مجيء ابنك. يا رب، اغفر لنا. نعتذر عن الإساءة التي تُظهرها عواطفنا الضالة تجاهك وتجاه ابنك يسوع. لكن، يا رب، نحن مشتاقون أن نتغيّر. ونأتي إليك طالبين المساعدة. املأ قلوبنا بالمسيح. افتح أعيننا على مجد المسيح. اجعل ظهور إلهنا ومخلّصنا العظيم \"الرَّجَاءَ الْمُبَارَكَ\" في قلوبنا رجاءً مفرحًا، رجاءً مُشبعًا. اكسر إدماننا على هذا العالم. اجعلنا نركز عقولنا على ما هو فوق حيث يجلس المسيح عن يمينك. اعمل فينا وصية بطرس أن \"... أَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ\" (بطرس الأولى ١: ١٣). حررنا من القلق الناتج عن الاعتماد على الظروف الأرضية. شكّلنا لنكون جماعة تخاطر باسم المحبة لأننا نعلم أن هذا الجسد الفاني سيلبس عدم الفساد وهذا الجسد المتواضع سيتغيّر إلى جسد مثل جسد المسيح المجيد. نحبك، يا أبانا. نحب ظهور ابنك. امنحنا أن نعيش هذا الرجاء في حرية التضحية بالذات لمجد نعمتك العظيمة. باسم يسوع، آمين.\u003c/p\u003e\n\u003ch2\u003eالخاتمة\u003c/h2\u003e\n\u003ch3\u003eكيف يمكننا أن نثق بيسوع؟\u003c/h3\u003e\n\u003cp\u003eفي منتصف القرن الماضي، أصاب الكاتب البريطاني سي. إس. لويس الحقيقة بطريقة مذهلة: \"لو أنّ إنسانًا كان مجرّد إنسانٍ وقال ما قاله يسوعُ، لما كان معلمًا أخلاقيًّا عظيمًا. إما أن يكون مجنونًا — بمستوى من يقول إنه بيضة مسلوقة — أو شيطاناً من الجحيم. يمكنك أن تسكته كأحمق، أو تبصق عليه وتقتله كشيطان؛ أو يمكنك أن تسجد عند قدميه وتدعوه ربًا وإلهًا. لكن دعنا لا نأتي بأي هراء متعالٍ عن كونه إنسانًا ومعلمًا عظيمًا. لم يترك لنا هذا الخيار. ولم يكن ذلك قصده\".¹\u003c/p\u003e\n\u003cp\u003eبعبارة أخرى، يسوع لن يُدجَّن. لكن الناس ما زالوا يحاولون. يبدو أن هناك شيئًا في هذا الرجل لكل شخص. فنختار وننتقي بطريقة ما ما يُظهر أنه في صفنا. في جميع أنحاء العالم، وجود يسوع في صفك هو أمر جيد. لكن ليس يسوع الأصيل، غير المُدجَّن، غير المُعدَّل. فقط يسوع المُنقّح الذي يناسب ديانتنا أو منصتنا السياسية أو أسلوب حياتنا. من المنطقي إذًا أن رجلاً خطط لحياته كلها ليموت على صليب سيكون خطرًا أن نؤمن به. هل يمكننا أن نعرفه كما كان وكما هو في الحقيقة؟ كيف نعرف شخصًا عاش على الأرض قبل ألفي عام — شخص ادعى أنه قام من الأموات بحياة لا تُفنى وبالتالي يعيش اليوم؟ يقول البعض إن ذلك مستحيل. يسوع الحقيقي مدفون في التاريخ، كما يقولون، ولا سبيل للوصول إليه. آخرون ليسوا متشككين إلى هذا الحد؛ إذ يؤمنون أن السجلات الكتابية لحياة يسوع موثوقة، وأن مفسريها الأوائل — مثل الرسول بولس — هم أدلة أكثر ثقة من نقاد اليوم. لكن كيف يمكنك التأكد من أن الصورة الكتابية ليسوع صحيحة؟\u003c/p\u003e\n\u003cp\u003eيسلك الناس مسارين بحثًا عن أرض صلبة تحت أقدام الإيمان. الأول هو مسار البحث التاريخي الدقيق لاختبار موثوقية السجلات التاريخية. سلكت هذا المسار خلال سنواتي التكوينية في المعهد اللاهوتي والدراسات العليا وأثناء قيامي بالتدريس. على الرغم من كل التحديات لإيماني في تلك الأيام، لم أتزعزع أبدًا عن الاقتناع بأن هناك مبررًا جيدًا للثقة بوثائق العهد الجديد عن يسوع. اليوم، هناك العديد من الكتب المقنعة — على المستويين العلمي والشعبي — تدعم هذه الثقة³. لكن الآن أنا قس ولست مدرسًا جامعيًا. ما زلت أقُدّر مسار البحث التاريخي العلمي، وفي الواقع، أعتمد عليه كثيرًا. لكني الآن أكثر وعيًا بأن الغالبية العظمى من الناس في العالم لن يكون لديهم الوقت أو الأدوات لتتبع كل الأدلة على الصحة التاريخية للعهد الجديد. فلابد أن يكون هناك مسار آخر لمعرفة يسوع الحقيقي، غير البحث التاريخي الأكاديمي الصارم.\u003c/p\u003e\n\u003cp\u003eهناك مسار آخر؛ إنه المسار الذي سلكته في هذا الكتاب. يبدأ بالاقتناع بأن الحق الإلهي هو حق \"مُصدِّق لذاته\". في الواقع، سيكون من الغريب أن يكون الله قد أعلن عن نفسه في ابنه يسوع المسيح وأوحى بسجل هذا الإعلان في الكتاب المقدس، لكنه لم يوفر طريقة للناس العاديين لمعرفته. بإيجاز، المسار الشائع لمعرفة يسوع الحقيقي هو هذا: يسوع، كما أعلنه الكتاب المقدس، له مجد — تفوق، وجمال روحي — يمكن رؤيته كحقيقة واضحة بذاتها. إنه مثل رؤية الشمس ومعرفة أنها ضوء وليست ظلامًا، أو تذوق العسل ومعرفة أنه حلو وليس لاذعًا. لا توجد سلسلة طويلة من الاستدلال من المقدمات إلى النتائج، بل هناك إدراك مباشر أن هذا الشخص حقيقي ومجده هو مجد الله. وصف الرسول بولس هذا المسار لمعرفة يسوع في كورنثوس الثانية ٤: ٤-٦:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"الَّذِينَ فِيهِمْ إِلهُ هذَا الدَّهْرِ قَدْ أَعْمَى أَذْهَانَ غَيْرِ الْمُؤْمِنِينَ، لِئَلاَّ تُضِيءَ لَهُمْ إِنَارَةِ إِنْجِيلِ مَجْدِ الْمَسِيحِ، الَّذِي هُوَ صُورَةُ اللهِ... لأَنَّ اللهَ الَّذِي قَالَ: «أَنْ يُشْرِقَ نُورٌ مِنْ ظُلْمَةٍ»، هُوَ الَّذِي أَشْرَقَ فِي قُلُوبِنَا، لإِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ\".\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلاحظ أن بولس يتحدث عن إنارة الله لقلوبنا لإدراك \"مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ\". إنه يتحدث عن أناس لم يروا يسوع التاريخي أبدًا. ما \"يرونه\" هو الصورة اللفظية ليسوع في الإنجيل، أي في الكرازة الرسولية بالمسيح. هذه الصورة، كما يقول بولس، مصحوبة بإشراق الله \"فِي قُلُوبِنَا\"، لتظهر لنا كما هي في الحقيقة — \"مَجْدِ اللهِ فِي... يَسُوعَ الْمَسِيحِ\"، أو \"مَجْدِ الْمَسِيحِ... صُورَةُ اللهِ\". يمكنك أن ترى أن أمرين يجعلان هذا المسار ممكنًا. الأول هو حقيقة مجد يسوع المسيح الذي يشع من خلال صورته في الكتاب المقدس. والثاني هو عمل الله لفتح عيون قلوبنا العمياء لرؤية هذا المجد. هذا يختلف تمامًا عن أن \"يُخبرنا\" الله أن الكتاب المقدس صحيح؛ إنه، بالأحرى، جعلُ الله لنا قادرين على رؤية الحقيقة الموجودة بالفعل. هذا فرق جوهري؛ فإذا همس الله في آذاننا بإعلان خاص بأن يسوع الكتاب المقدس حقيقي، فإن هذا الإعلان سيكون له السلطة النهائية وكل شيء سيعتمد عليه. لكن هذا ليس المسار الذي أراه في الكتاب المقدس ولا المسار الذي أتبعه. بل يسوع نفسه، وصورته الموحى بها من الله في الكتاب المقدس، لهما السلطة النهائية.\u003c/p\u003e\n\u003cp\u003eالأثر العملي لهذا النهج هو أنني لا أطلب منك أن تصلي لنيل إعلان خاص من الله لتقرر إن كان يسوع حقيقيًا. بل أطلب منك أن تنظر إلى يسوع الكتاب المقدس. انظر إليه. لا تغمض عينيك على رجاء أن تسمع كلمة تأكيد، بل أبقِ عينيك مفتوحين واملأهما بالصورة الكاملة ليسوع المقدمة في الكتاب المقدس. إذا وصلت إلى الإيمان بيسوع المسيح كرب وإله، فسيكون ذلك لأنك ترى فيه مجدًا وكمالًا إلهيًا هو ببساطة ما هو عليه — حقيقي. تُسمى هذه الطريقة أحيانًا \"شهادة الروح القدس الداخلية\". حيث نقرأ في كتب التعليم المسيحي المصلحة: \"روح الله، الذي يشهد مع وبالكتاب المقدس في قلب الإنسان، هو وحده القادر على إقناعه تمامًا بأنها كلمة الله الحقيقية\"⁴. تأكد من أنك لاحظت أن الروح القدس يُقنع \"مع الكتاب المقدس\"؛ فهو لا يتجاوز الكتاب المقدس ويستبدل به إعلانات خاصة. إنه يزيل عمى العداء والتمرد، وبالتالي يفتح عيون قلوبنا لرؤية الصدق الذاتي والواضح لنور الجمال الإلهي للمسيح. لذلك، حاولت في هذا الكتاب أن أعرض الصورة الكتابية ليسوع. الكتاب المقدس وحده هو المصدر الموثوق لوصف يسوع المسيح. آمل في النهاية أن تنتقل من هذا الكتاب إلى الكتاب المقدس؛ ولهذا السبب، زخرت هذه الفصول القصيرة بنصوص الكتاب المقدس. آمل أن يكون هذا الكتاب مفيدًا للمؤمنين وغير المؤمنين على حد سواء.\u003c/p\u003e\n\u003cp\u003eعندما نرى يسوع كما هو حقًا، نتذوقه مستمتعين ومكتفين؛ أي نفرح ونتمتع به كغبطة وشبع حقيقي. هذا هو هدفي، لأن أمرين ينتجان عن مثل هذه التجربة مع يسوع المسيح: هو يتمجد، ونحن بالفرح نتحرر لنسير في طريق المحبة الضيق. يتمجّد المسيح فينا أكثر عندما نكون أكثر اكتفاءً به. وعندما نكتفي به، نُصلب للعالم. بهذه الطريقة، رؤية يسوع والتمتع والاكتفاء به ستزيد انعكاس حضوره في العالم. كما قال الرسول بولس: \"وَنَحْنُ جَمِيعًا نَاظِرِينَ مَجْدَ الرَّبِّ بِوَجْهٍ مَكْشُوفٍ، كَمَا فِي مِرْآةٍ، نَتَغَيَّرُ إِلَى تِلْكَ الصُّورةِ عَيْنِهَا، مِنْ مَجْدٍ إِلَى مَجْدٍ، كَمَا مِنَ الرَّبِّ الرُّوحِ\" (كورنثوس الثانية ٣: ١٨). الرؤية هي ما يُغيرنا؛ فرؤية المسيح تُخلّص وتُقدّس. بما أن كل هذا، كما يقول بولس، هو \"مِنَ الرَّبِّ الرُّوحِ\"، فقد أدرجت صلوات بعد كل فصل. عمل الروح في حياتنا أساسي؛ وقد قال يسوع: \"«فَإِنْ كُنْتُمْ وَأَنْتُمْ أَشْرَارٌ تَعْرِفُونَ أَنْ تُعْطُوا أَوْلاَدَكُمْ عَطَايَا جَيِّدَةً، فَكَمْ بِالْحَرِيِّ الآبُ الَّذِي مِنَ السَّمَاءِ، يُعْطِي الرُّوحَ الْقُدُسَ لِلَّذِينَ يَسْأَلُونَهُ؟»\" (لوقا ١١: ١٣). أضم نفسي إلى القراء الجادين في طلب قدر أعظم وأكمل لعمل الروح في حياتنا. ونحن ننظر إلى يسوع، فليمنحنا أن نرى ونتذوق ونتمتع بـ \"مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ\" (كورنثوس الثانية ٤: ٦). أدعوك للانضمام إليَّ في هذا البحث الجاد عن غبطة لها أساس أبدي ثابت يُنتج المحبة. كل شيء على المحك؛ فلا توجد قضية أهم في الحياة من رؤية يسوع كما هو حقًا، وأن تكون مستمتعًا ومكتفيًا به فوق كل شيء.\u003c/p\u003e\n\u003cp\u003e١. C. S. Lewis, Mere Christianity (New York: Macmillan, 1952), p. 56.\u003cbr\u003e\n٢. Milan Machove, Jesus für Atheisten (Stuttgart: Kreuz Verlag, 1972).\u003cbr\u003e\n٣. انظر المصادر الأكاديمية المذكورة في النص الأصلي لمزيد من البحث التاريخي.\u003cbr\u003e\n٤. السؤال الرابع من \"كتاب التعليم المسيحي الأكبر لوستمنستر\". يصف يوحنا كالفن \"شهادة الروح\" كما يلي: \"إن شهادة الروح تفوق كل إقناع بشري... الروح نفسه الذي تكلم بأفواه الأنبياء يجب أن ينفذ إلى قلوبنا ليقنعنا أنهم نقلوا بأمانة ما أمر به الله\" (تأسيس الدين المسيحي، الكتاب الأول).\u003cbr\u003e\n٥. انظر الهامش رقم ٣.\u003c/p\u003e\n\u003ch2\u003eDesiring God\u003c/h2\u003e\n\u003cp\u003eالجميع يريد أن يكون سعيدًا. وُلد موقعنا الإلكتروني وبُني من أجل السعادة. نريد أن يفهم الناس في كل مكان ويقبلوا حقيقة أن الله يتمجد فينا أكثر عندما نتمتع به أكثر. لقد جمعنا أكثر من ثلاثين عامًا من عظات جون بايبر، بما في ذلك ترجمات إلى أكثر من أربعين لغة. كما نقدم تدفقًا يوميًا من الموارد المكتوبة والصوتية والمرئية الجديدة لمساعدتك في العثور على الحقيقة والغرض والرضا الذي لا ينتهي. وكل ذلك متاح مجانًا، بفضل كرم الأشخاص الذين تباركوا بهذه الخدمة.\u003c/p\u003e\n\u003cp\u003eإذا كنت ترغب في المزيد من الموارد للسعادة الحقيقية، أو إذا أردت معرفة المزيد عن عملنا في \"Desiring God\"، ندعوك لزيارة موقعنا على:\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://www.desiringGod.org\"\u003ewww.desiringGod.org\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"6:[\"$\",\"div\",null,{\"style\":{\"maxWidth\":\"1200px\",\"margin\":\"0 auto\"},\"children\":[[\"$\",\"header\",null,{\"style\":{\"textAlign\":\"center\",\"marginBottom\":\"4rem\",\"marginTop\":\"1rem\"},\"children\":[[\"$\",\"h1\",null,{\"style\":{\"fontSize\":\"3.5rem\",\"marginBottom\":\"1rem\",\"color\":\"var(--primary)\",\"fontWeight\":\"bold\"},\"children\":\"شاء فولدنا بكلمة الحق\"}],[\"$\",\"p\",null,{\"style\":{\"fontSize\":\"1.25rem\",\"color\":\"var(--text-muted)\",\"maxWidth\":\"800px\",\"margin\":\"0 auto\"},\"children\":\"منصة لاهوتية تعتني بنشر كلمة الحق من خلال دراسات كتابية، وتأملات روحية، وترجمات لكتب لاهوتية\"}]]}],[\"$\",\"$8\",null,{\"fallback\":[\"$\",\"div\",null,{\"style\":{\"textAlign\":\"center\",\"color\":\"var(--text-muted)\"},\"children\":\"جارٍ التحميل...\"}],\"children\":[\"$\",\"$Lf\",null,{\"allPosts\":[{\"id\":\"end-time-prayer-and-mission-come-lord-jesus\",\"slug\":\"end-time-prayer-and-mission-come-lord-jesus\",\"title\":\"ترجمة الفصل الثاني والعشرون من كتاب جون بايبر \\\"تعال أيها الرب يسوع\\\"\",\"published\":\"2026-07-07T20:35:57.827-07:00\",\"updated\":\"2026-07-07T20:35:57.827-07:00\",\"labels\":[\"ترجمات\"],\"content\":\"$10\"},{\"id\":\"go-to-work-go-to-church-in-the-end-times\",\"slug\":\"go-to-work-go-to-church-in-the-end-times\",\"title\":\"ترجمة الفصل الفصل الحادي والعشرين من كتاب جون بايبر \\\"تعال أيها الرب يسوع\\\"\",\"published\":\"2026-07-07T19:31:30.467-07:00\",\"updated\":\"2026-07-07T19:32:02.346-07:00\",\"labels\":[\"ترجمات\"],\"content\":\"$11\"},{\"id\":\"living-holy-and-gentle-awaiting-christ-return\",\"slug\":\"living-holy-and-gentle-awaiting-christ-return\",\"title\":\"ترجمة الفصل الفصل العشرون من كتاب جون بايبر \\\"تعال أيها الرب يسوع\\\"\",\"published\":\"2026-07-07T18:54:12.182-07:00\",\"updated\":\"2026-07-07T18:54:12.184-07:00\",\"labels\":[\"ترجمات\"],\"content\":\"$12\"},{\"id\":\"end-times-deception-patience-and-joy\
