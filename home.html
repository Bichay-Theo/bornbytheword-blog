ه عقل وإرادة وجوهر إلهي. ينسب الوحي إليه صفات الأشخاص بوضوح؛ فهو يتكلم:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«قَالَ الرُّوحُ الْقُدُسُ: أَفْرِزُوا لِي بَرْنَابَا وَشَاؤُلَ لِلْعَمَلِ الَّذِي دَعَوْتُهُمَا إِلَيْهِ» (أَعْمَال ١٣ : ٢)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eويحزن:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلاَ تُحْزِنُوا رُوحَ اللهِ الْقُدُّوسَ الَّذِي بِهِ خُتِمْتُمْ لِيَوْمِ الْفِدَاءِ» (أَفَسُس ٤ : ٣٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eويشهد، ويعزي، ويعلم، ويريد. فالقوة الميكانيكية الصماء لا تحزن ولا تختار؛ أما الروح القدس فيفعل ذلك كله لأنه أقنوم حي في الجوهر الإلهي الواحد.\u003c/p\u003e\n\u003cp\u003eوحين كذب حنانيا وسفيرة على الروح القدس، واجههما بطرس الرسول قائلا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«يَا حَنَانِيَا، لِمَاذَا مَلأَ الشَّيْطَانُ قَلْبَكَ لِتَكْذِبَ عَلَى الرُّوحِ الْقُدُوسِ... أَنْتَ لَمْ تَكْذِبْ عَلَى النَّاسِ بَلْ عَلَى اللهِ» (أَعْمَال ٥ : ٣-٤)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن ألوهيته لا تقبل القسمة؛ فهو الخالق:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَرُوحُ اللهِ كَانَ يَرِفُّ عَلَى وَجْهِ الْمِيَاهِ» (تَكْوِين ١ : ٢)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوهو المقدس وواهب الحياة الأبدية، المساوي للآب والابن في العظمة والمجد.\u003c/p\u003e\n\u003ch3\u003e٢️⃣ حضور الروح في العهدين\u003c/h3\u003e\n\u003cp\u003eفي العهد القديم، كان الروح القدس يحل على أشخاص معينين لمهام محددة وفترات مؤقتة؛ فآزر شمشوناً، وألهم الأنبياء، ومسح داود. أما في العهد الجديد، فصار حضوره سكنى دائمة وشاملة لكل جسد المسيح. نزل على الرب يسوع في معموديته، وحل على الكنيسة في يوم الخمسين ليمكث فيها إلى الأبد. واليوم، يسكن الروح في كل مؤمن حقيقي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَمَا تَعْلَمُونَ أَنَّكُمْ هَيْكَلُ اللهِ، وَأَنَّ رُوحَ اللهِ يَسُوكُنُ فيكُمْ؟» (١ كُورِنْثُوس ٣ : ١٦)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهو الذي يجدد طبيعتنا، ويختم نفوسنا، ويشهد لأرواحنا أننا أولاد الله.\u003c/p\u003e\n\u003ch3\u003e٣️⃣ سر الانبثاق الأزلي والإرسال الزمني\u003c/h3\u003e\n\u003cp\u003eالروح القدس غير مخلوق، بل هو ينبثق أزليا من الآب. هذا «الصدور الأزلي» (الانبثاق) يُعرف به الروح في الثالوث الأنطولوجي؛ فهو «نسمة» الله وحياته، ويشبهه الآباء بـ «رباط الحب» الذي يجمع الآب (المُحب) بالابن (المحبوب).\u003c/p\u003e\n\u003cp\u003eيجب التمييز هنا بين الانبثاق الأزلي (علاقة الأقانيم منذ الأزل) وبين الإرسال الزمني (حين أرسله الآب والابن إلينا في التاريخ). الروح ليس أداة وظيفية، بل هو شريك جوهري؛ فالآب يلد الابن أزليا، والروح ينبثق منهما أزليا، في شركة حب كاملة ومساواة مطلقة.\u003c/p\u003e\n\u003ch3\u003e٤️⃣ الروح يربطنا بشركة الثالوث\u003c/h3\u003e\n\u003cp\u003eيعلمنا الكتاب المقدس أن الروح القدس هو «روح المسيح» الذي يطبق عمل الخلاص في قلوبنا. فإذا كان الآب قد وضع الخطة، والابن قد نفذ الكفارة فوق الصليب، فإن الروح القدس هو الذي «يُفعِّل» هذا الخلاص؛ فهو الذي يبكتنا على الخطية، ويمنحنا «الولادة الثانية» (التجديد)، ويقوينا لنحيا حياة القداسة.\u003c/p\u003e\n\u003cp\u003eالروح هو الذي يأخذ مما للمسيح ويخبرنا، إنه روح الابن الذي يصرخ في قلوبنا: «يَا أَبَا الآبُ». بدونه، تظل المسيحية معلومات في الذهن، أما به، فتصير حياة في الروح، ومشاركة فعلية في الفرح الأزلي القائم بين الآب والابن.\u003c/p\u003e\n\u003ch3\u003e📍 الكلمة في حياتنا\u003c/h3\u003e\n\u003cp\u003eإن الروح القدس هو رفيق الدرب والضامن للميراث؛ لا تحاول أن تعيش القداسة بقدرتك الذاتية، بل استند إلى الأقنوم الذي يسكن فيك. هو الذي يحول «الكلمة المكتوبة» إلى قوة حياة تعمل في وجدانك، وهو الذي يمنحك السلام الذي يفوق كل عقل في وسط أتون التجارب.\u003c/p\u003e\n\u003cp\u003e📖 للمزيد من الدراسة: في كتاب «ضرورة التعددية في الوحدانية الإلهية» يفصل د. عماد شحادة في الفصول ٢٣ و٢٤ و٢٥ هذا السر بدقة: الروح ليس مجرد ترتيب ثالث، بل هو الأقنوم الذي يتمم شركة الجوهر ويعلنها في حياة المؤمن.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjZV3X9FrcDov6VPPE9sIjYaiioJCauPuQa1lJZq7c8K7KEOMGZGQdJta2C_gtZWp9dxmclfjmyscQ2AYTcuGCoMIf8udiOIwljMxtHPHJkYmEkV3N5pTqrPGp6Kia6T6BLzOvZtrDcGtKFEn_Q-UfJhfYsdV2aEMdx_3U1gu-i-KwPJs0l0awUb7xp0lY/s2752/unnamed%20%2857%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjZV3X9FrcDov6VPPE9sIjYaiioJCauPuQa1lJZq7c8K7KEOMGZGQdJta2C_gtZWp9dxmclfjmyscQ2AYTcuGCoMIf8udiOIwljMxtHPHJkYmEkV3N5pTqrPGp6Kia6T6BLzOvZtrDcGtKFEn_Q-UfJhfYsdV2aEMdx_3U1gu-i-KwPJs0l0awUb7xp0lY/s600/unnamed%20%2857%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"30:T1973,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e📜 سلسلة أسرار الشَّرِكَةِ الأزليَّة\u003c/h2\u003e\n\u003cp\u003e📍 المقال السابع: سر التواضع والانتصار.. من المذود إلى يمين العظمة\u003c/p\u003e\n\u003cp\u003eلم يأت إلينا يسوع المسيح في مجد ظاهر يبهر الأبصار، بل تكمن عظمة تدبيره في تواضعه الكامل. هو الذي كان في صورة الله، لكنه أخلى نفسه وصار إنسانا ليشاركنا بؤسنا. هذا التواضع ليس ضعفا أو انتقاصا، بل هو سر قوته الفدائية؛ فمن المذود الوضيع إلى الصليب المهين، ثم إلى القيامة المظفرة والصعود المجيد، يرسم لنا الابن طريق الخلاص الذي صممه الآب.\u003c/p\u003e\n\u003ch3\u003e١️⃣ لاهوت الإخلاء.. الله الذي تواضع\u003c/h3\u003e\n\u003cp\u003eيكشف لنا الوحي في رسالة فيلبي عن هذا السر العظيم (Kenosis):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَلْيَكُنْ فِيكُمْ هذَا الْفِكْرُ الَّذِي فِي الْمَسِيحِ يَسُوعَ أَيْضاً: الَّذِي إِذْ كَانَ فِي صُورَةِ اللهِ، لَمْ يَحْسِبْ خُلْسَةً أَنْ يَكُونَ مُعَادِلاً لِلَّهِ. لكِنَّهُ أَخْلَى نَفْسَهُ، آخِذاً صُورَةَ عَبْدٍ، صَائِراً فِي شِبْهِ النَّاسِ.» (فِيلِبِّي ٢ : ٥-٧).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلم يفقد الابن ألوهيته في التجسد، بل «حجب» مجده الظاهر تحت ستار الناسوت الضعيف. هذا الإخلاء لا يعني تخليه عن صفاته الإلهية، بل يعني وضع استخدامها العلني جانبا طوعا. لقد ارتضى الخالق أن يخضع لقوانين الزمان والمكان، وأن يختبر الجوع والعطش والألم، لكي يكون نائبا عنا في كل شيء ما عدا فعل الخطية.\u003c/p\u003e\n\u003cp\u003eوقد بدأ هذا المسار بـ «الحبل العذراوي»؛ حيث حل الروح القدس على العذراء مريم، فاتحد اللاهوت بالناسوت في أحشائها، ليصير الابن «عمانوئيل» – أي الله معنا – بغير انقسام في الشخص.\u003c/p\u003e\n\u003ch3\u003e٢️⃣ الوظائف الثلاث.. نبي وكاهن وملك\u003c/h3\u003e\n\u003cp\u003eلم يتجسد المسيح ليكون معلما فحسب، بل ليتمم وظائف الوساطة الثلاث التي يحتاجها الإنسان الساقط:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eنبي:\u003c/strong\u003e هو الكلمة الذاتي الذي لا ينطق «عن» الله كباقي الأنبياء، بل هو الله يعلن «ذاته» بسلطان مطلق، كاشفا مشيئة الآب للخلاص.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eكاهن:\u003c/strong\u003e هو الذي قدم نفسه ذبيحة كفارية كاملة على مذبح الصليب. لم يحتج لتقدمة تيس أو عجل، بل كفى دمه الأقدس لاستيفاء العدل الإلهي إلى الأبد، والآن هو يحيا ليشفع فينا أمام وجه الآب.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eملك:\u003c/strong\u003e هو الذي سحق رأس الحية، وانتصر على الموت، ويملك الآن على قلوب المفديين، ويدبر شؤون كنيسته والتاريخ بسلطانه السيادي حتى يخضع له كل شيء.\u003c/p\u003e\n\u003cp\u003eهذه الوظائف تجتمع في أقنومه الواحد؛ فهو يعلن الحق (نبي)، ويكفر عن الذنب (كاهن)، ويحمي الرعية (ملك).\u003c/p\u003e\n\u003ch3\u003e٣️⃣ الانتصار.. من الصليب إلى يمين العظمة\u003c/h3\u003e\n\u003cp\u003eلم يكن التواضع غاية في ذاته، بل كان سبيلا لانتصار أبدي تجلى في:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالقيامة:\u003c/strong\u003e أعلن الله قبول ذبيحة ابنه بقيامته من بين الأموات بقوة الروح القدس وقوته الذاتية، محطما شوكة الموت.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالصعود والجلوس:\u003c/strong\u003e صعد المسيح بجسده الممجد وجلس «فِي يَمِينِ الْعَظَمَةِ». وهذا التعبير يشير إلى مقام السيادة المطلقة وتدبير الكون.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالشفاعة الحالية:\u003c/strong\u003e لا يزال المسيح يمارس عمله الكهنوتي لأجلنا؛ فهو «الشفيع» والضامن الذي يحمل سمات جراحاته أمام الآب، مؤكدا أن دين المؤمنين قد سدد بالكامل.\u003c/p\u003e\n\u003cp\u003eيقول الوحي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«بَعْدَمَا صَنَعَ بِنَفْسِهِ تَطْهِيراً لِخَطَايَانَا، جَلَسَ فِي يَمِينِ الْعَظَمَةِ فِي الأَعَالِي» (عِبْرَانِيِّينَ ١ : ٣).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفمن المذود الفقير إلى يمين العظمة، أكمل يسوع كل ما تتطلبه قداسة الله لخلاصنا.\u003c/p\u003e\n\u003ch3\u003e📍 الكلمة في حياتنا\u003c/h3\u003e\n\u003cp\u003eإن تواضع المسيح هو الضمان الوحيد لرفعتنا؛ فهو الذي نزل إلى عمق بؤسنا ليحملنا إلى سماوات مجده. وعندما تشتد عليك التجارب، تذكر أن لك «شفيعا» في الأعالي اختبر ضعفك وتألم مثلك، وهو الآن يملك كل السلطان ليعين المجربين.\u003c/p\u003e\n\u003cp\u003e📖 للمزيد من الدراسة: في كتاب «ضرورة التعددية في الوحدانية الإلهية» يفصل د. عماد شحادة في الفصول ١٦-٢٢ هذا السر العجيب: كيف كان إخلاء الابن هو الطريق لإعلان مجد المحبة والعدل الإلهي في أسمى صورهما.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEijM0yhMN5a0q9gIS_VSMnzKihEhw9vCEAR8ErOmhHUiMlzR0ME2CJy81JMM5NbRbFomwiZZ5VX2BjXXnUBiLSkZVEYxm1T8tgIbhcaOAghJazb3g8NneS1i_nlyP5Y4L5GcAwjN4Q_cQoeELUov7hqk1aBgNp7atcOPhrTZwiBhAMfprg75iKX3y1u3-0/s2752/unnamed%20%2854%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEijM0yhMN5a0q9gIS_VSMnzKihEhw9vCEAR8ErOmhHUiMlzR0ME2CJy81JMM5NbRbFomwiZZ5VX2BjXXnUBiLSkZVEYxm1T8tgIbhcaOAghJazb3g8NneS1i_nlyP5Y4L5GcAwjN4Q_cQoeELUov7hqk1aBgNp7atcOPhrTZwiBhAMfprg75iKX3y1u3-0/s600/unnamed%20%2854%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"31:T214d,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e📜 سلسلة أسرار الشَّرِكَةِ الأزليَّة\u003c/h2\u003e\n\u003cp\u003e📍 المقال السادس: يسوع المسيح.. إعلان الذات وعصمة الفادي\u003c/p\u003e\n\u003cp\u003eلم يتركِ اللهُ البشريةَ تتخبطُ في ظنونِها حولَ ماهيتِهِ، بل بادرَ بكشفِ حقيقةِ ذاتِهِ في مِلءِ الزمانِ حينَ أرسلَ ابنَهُ الوحيدَ «مَوْلُوداً مِنِ امْرَأَةٍ». ليسَ يسوعُ المسيحُ مجردَ قامةٍ أخلاقيةٍ أو نبيٍّ يحملُ رسالةً، بل هو «الإعلانُ الأسمى»؛ فيهِ صارَ اللهُ منظوراً، وفيهِ نجدُ الفاديَ الذي اجتمعتْ فيهِ كفايةُ اللاهوتِ معَ كمالِ الناسوتِ.\u003c/p\u003e\n\u003ch3\u003e١️⃣ إثباتُ ألوهيةِ الابنِ الصريحةِ\u003c/h3\u003e\n\u003cp\u003eأعلنَ الربُّ يسوعُ هويتَهُ الإلهيةَ بوضوحٍ لا يتركُ مجالاً للبسِ التفسيرِ. فحينَ واجهَ اليهودَ، استخدمَ الاسمَ الجوهريَّ للذاتِ الإلهيةِ؛ إذ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«قَالَ لَهُمْ يَسُوعُ: الْحَقَّ الْحَقَّ أَقُولُ لَكُمْ: قَبْلَ أَنْ يَكُونَ إِبْرَاهِيمُ أَنَا كَائِنٌ» (يُوحَنَّا ٨ : ٥٨).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوعبارةُ «أَنَا كَائِنٌ» (Ego Eimi) هي الصيغةُ اليونانيةُ للاسمِ «يهوه» الذي أعلنهُ اللهُ عن نفسِهِ في (خُرُوج ٣ : ١٤). ولقد أدركَ السامعونَ حينذاكِ ثقلَ هذا التصريحِ، فأرادوا رجمَهُ لعلمِهم أنَّهُ يُساوي نفسَهُ باللهِ.\u003c/p\u003e\n\u003cp\u003eويؤكدُ الوحيُ في مقدمةِ إنجيلِ يُوحَنَّا هذهِ الأزليةَ والوحدانيةَ في الجوهرِ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فِي الْبَدْءِ كَانَ الْكَلِمَةُ، وَالْكَلِمَةُ كَانَ عِنْدَ اللهِ، وَكَانَ الْكَلِمَةُ اللهَ» (يُوحَنَّا ١ : ١).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفالكلمةُ (الابنُ) ليسَ كائناً مخلوقاً، بل هو اللهُ في حقيقةِ جوهرِهِ. وتصفُ الرسالةُ إلى العبرانيينَ عظمةَ هذا الإعلانِ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي، وَهُوَ بَهَاءُ مَجْدِهِ، وَرَسْمُ جَوْهَرِهِ، وَحَامِلٌ كُلَّ الأَشْيَاءِ بِكَلِمَةِ قُدْرَتِهِ» (عِبْرَانِيِّينَ ١ : ٣).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإنَّ عبارةَ «رَسْمُ جَوْهَرِهِ» (Character) تعني البصمةَ المطابقةَ تماماً؛ فكلُّ ما للآبِ من كمالاتٍ وجلالٍ وحقٍّ، هو ذاتُهُ كائنٌ في الابنِ بغيرِ انتقاصٍ.\u003c/p\u003e\n\u003ch3\u003e٢️⃣ سرُّ «الاتحادِ الأقنوميِّ».. طبيعتانِ في شخصٍ واحدٍ\u003c/h3\u003e\n\u003cp\u003eيقفُ العقلُ خاشعاً أمامَ عقيدةِ «الاتحادِ الأقنوميِّ» (Hypostatic Union)، وهي اتحادُ الطبيعةِ الإلهيةِ الكاملةِ والطبيعةِ البشريةِ الكاملةِ في أقنومِ الابنِ الواحدِ، بغيرِ اختلاطٍ أو امتزاجٍ ولا تغييرٍ، وبغيرِ انقسامٍ ولا انفصالٍ. المسيحُ لم يتخلَّ عن ألوهيتِهِ ليصيرَ إنساناً، بل أضافَ الناسوتَ إلى لاهوتِهِ. هو شخصٌ واحدٌ، يجمعُ في ذاتِهِ براهينَ اللاهوتِ وعلاماتِ الناسوتِ:\u003c/p\u003e\n\u003cp\u003eبالطبيعةِ الإلهيةِ: غفرَ الخطايا، وقبِلَ السجودَ، وخلقَ عيوناً للأعمى، وسلطانُهُ شملَ الطبيعةَ وإقامةَ الموتى.\u003c/p\u003e\n\u003cp\u003eبالطبيعةِ البشريةِ: جاعَ، وتعبَ، وبكى، وأسلمَ الروحَ على الصليبِ.\u003c/p\u003e\n\u003cp\u003eهذا اتحادُ هو الذي جعلَ الفداءَ ممكناً؛ إذ توجبَ أن يكونَ الفادي إنساناً ليُمثِّلَنا ويقومَ مقامَنا، وأن يكونَ إلهاً لتكونَ ذبيحتُهُ ذاتَ كفايةٍ وقيمةٍ غيرِ محدودةٍ قادرةٍ على استيفاءِ العدلِ الإلهيِّ.\u003c/p\u003e\n\u003ch3\u003e٣️⃣ عصمةُ المسيحِ.. حجرُ الزاويةِ في الاحتسابِ والتبريرِ\u003c/h3\u003e\n\u003cp\u003eتُعدُّ عصمةُ المسيحِ ضرورةً لاهوتيةً قبلَ أن تكونَ كمالاً أخلاقياً. فالوحيُ يقررُ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ جَعَلَ الَّذِي لَمْ يَعْرِفْ خَطِيَّةً، خَطِيَّةً لأَجْلِنَا، لِنَصِيرَ نَحْنُ بِرَّ اللهِ فِيهِ» (٢ كُورِنْثُوس ٥ : ٢١).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهنا يتجلى دورُ المسيحِ بوصفِهِ «الولي أو الضامنَ» (الكفيلَ)؛ فلو وُجدتْ فيهِ خطيةٌ واحدةٌ، لاستحقَ الموتَ عن نفسِهِ ولعجزَ عن فداءِ غيرِهِ. لكنَّ طهارتَهُ المطلقةَ جعلتْهُ المؤهلَ الوحيدَ لإتمامِ سرِّ «الاحتسابِ»:\u003c/p\u003e\n\u003cp\u003e١. احتسابُ خطايانا لهُ: حُمِّلَ آثامَنا وكأنَّهُ هو الذي اقترفَها، ليفِيَ عقوبتَها عدلاً.\u003c/p\u003e\n\u003cp\u003e٢. احتسابُ برِّهِ لنا: أُعطِينا كمالَهُ وطاعتَهُ الكاملةَ أمامَ الآبِ وكأننا نحنُ الذينَ عشناها.\u003c/p\u003e\n\u003cp\u003eبناءً على هذا، يتمُّ «تبريرُنا»؛ وهو حكمٌ قضائيٌّ يُعلِنُ فيهِ اللهُ قبولَنا كأبرارٍ، ليسَ بناءً على صلاحٍ فينا، بل بناءً على برِّ المسيحِ المودَعِ في حسابِنا. ولأنَّ ذبيحتَهُ قُدِّمَتْ بلاهوتِهِ، يصفُها الكتابُ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَكَمْ بِالْحَرِيِّ يَكُونُ دَمُ الْمَسِيحِ، الَّذِي بِرُوحٍ أَزَلِيٍّ قَدَّمَ نَفْسَهُ لِلَّهِ بِلَا عَيْبٍ» (عِبْرَانِيِّينَ ٩ : ١٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eولأنَّهُ البارُّ الذي لا يستحقُ الموتَ، لم يستطعِ القبرُ أن يحبسَهُ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي أَقَامَهُ اللهُ نَاقِضاً أَوْجَاعَ الْمَوْتِ، إِذْ لَمْ يَكُنْ مُمْكِناً أَنْ يُمْسَكَ مِنْهُ» (أَعْمَال ٢ : ٢٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e📍 الكلمةُ في حياتِنا\u003c/h3\u003e\n\u003cp\u003eإنَّ الإيمانَ بألوهيةِ المسيحِ وعصمتِهِ هو مرساةُ النفسِ؛ فعندما نُدركُ أنَّ الذي ماتَ لأجلِنا هو اللهُ المتجسدُ، نتيقنُ أنَّ كفارتَهُ لا تسقطُ أبداً. وعندما نعلمُ أنَّ برَّهُ قدِ احتُسبَ لنا، يتبددُ خوفُنا من الوقوفِ أمامَ عرشِ القداسةِ الإلهيةِ؛ فنحنُ لا نقفُ بخرقِ برِّنا الذاتيِّ، بل بجمالِ كمالِهِ هو.\u003c/p\u003e\n\u003cp\u003e📖 للمزيد من الدراسة: في كتاب «ضرورة التعددية في الوحدانية الإلهية» يُفصِّل د. عماد شحادة في الفصول ١٣ و١٤ و١٥ هذا السر بدقة: يسوع هو إعلان الآب الكامل، والاتحاد الأقنومي هو الطريق الوحيد الذي جعل الفداء ممكناً.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjss6oRMLIXjyq_RZJbpXrb00QF7UqPPNTPSXoNt_inN22ea9zB6tckm7ciV0lGRBNxdlU4z2Adpz-0g06wCIgBtemMrq-nueXzcRJzZAesvht8pYyQ13gUGSADKISiHDNSDlr7zf95MeRbpIgyk66E4bKNWcxI5Pz5IStYspvwIHhScneWfUr3_L-dmSE/s2752/unnamed%20%2853%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjss6oRMLIXjyq_RZJbpXrb00QF7UqPPNTPSXoNt_inN22ea9zB6tckm7ciV0lGRBNxdlU4z2Adpz-0g06wCIgBtemMrq-nueXzcRJzZAesvht8pYyQ13gUGSADKISiHDNSDlr7zf95MeRbpIgyk66E4bKNWcxI5Pz5IStYspvwIHhScneWfUr3_L-dmSE/s600/unnamed%20%2853%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"32:T20ac,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e📜 سلسلة أسرار الشَرِكَةِ الأزليَّة\u003c/h2\u003e\n\u003cp\u003e📍 المقال الخامس: اللهُ الآبُ.. المَصْدَرُ والسِّيَادَةُ والمُخَطِّطُ\u003c/p\u003e\n\u003cp\u003eليس الله مجرد «قوة» هائمة في السموات، بل هو «آب». هذا الاسم ليس رمزا مجردا أو لقبا شرفيا أو تمثيلا بشريا، بل هو حقيقة أزلية تكشف عن قلب الله وجوهره. الآب هو المصدر الذي يبدأ منه كل شيء، والسيادة التي تحكم كل شيء، والمهندس الذي رسم خطة الخلاص قبل أن يوجد العالم.\u003c/p\u003e\n\u003cp\u003eولكي ندرك دور الآب في ضوء الإعلان الكتابي، يلزمنا التمييز بين:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالثالوث الأنطولوجي (الذاتي):\u003c/strong\u003e يصف طبيعة الله كما هو في ذاته منذ الأزل؛ حيث الأقانيم الثلاثة متساوون تماما في الجوهر والألوهية.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالثالوث التدبيري (Economic Trinity):\u003c/strong\u003e يشير إلى كيفية عملهم معا وإعلان أنفسهم داخل التاريخ البشري لإتمام الفداء، حيث تتمايز الأدوار وظيفيا.\u003c/p\u003e\n\u003ch3\u003e١️⃣ أبوية الله الجوهرية للابن (الولادة الأزلية)\u003c/h3\u003e\n\u003cp\u003eالآب ليس أبا فقط لنا نحن البشر؛ بل أبوته للابن أزلية سابقة للخليقة. فالابن لم يخلق في لحظة زمنية، بل هو «الابن الوحيد أو الفريد» المولود من الآب منذ الأزل. تشرح عقيدة «الولادة الأزلية» أن الآب يَلِد الابن أزليا (بلا بداية)، مانحا إياه كامل جوهره الإلهي الواحد غير المنقسم؛ وهذا يحفظ تمايز الأقانيم مع ضمان المساواة المطلقة، وينفي فكرة التبعية أو الدونية.\u003c/p\u003e\n\u003cp\u003eفي الجوهر الإلهي لا يوجد «رئيس ومرؤوس أو سابق ولاحق»، فالآب والابن والروح القدس متساوون في العظمة والقدرة والمجد والأزلية. لكن في ترتيب العلاقة يُعرف الآب بأنه «الينبوع»؛ هو الذي لم يولَد من أحد، وهو الذي يَلِد الابن أزليا ويُنبِع الروح القدس أزليا.\u003c/p\u003e\n\u003cp\u003eبسط اللاهوتيون العرب الأوائل هذا المفهوم بـ «التوليد الروحي» لتنزيه الذات الإلهية:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eتشبيه الشمس (أبو رائطة التكريتي):\u003c/strong\u003e كما يخرج الشعاع من الشمس دون أن ينفصل عنها أو يتأخر عنها زمنيا، كذلك الابن مولود وملازم للآب أزليا.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eتشبيه العقل (يحيى بن عدي):\u003c/strong\u003e الله «عاقل وعقل ومعقول». الولادة هي «فعل الإدراك الذاتي»؛ فبما أن الله يعقل ذاته أزليا، فإنه يَلِد «كلمته» (عقله) أزليا دون انقسام.\u003c/p\u003e\n\u003ch3\u003e٢️⃣ أبوية الله وتبنيه للمؤمنين\u003c/h3\u003e\n\u003cp\u003eلم يتوقف قصد الآب عند أبوته الأزلية للابن، بل اختار أن يجعلنا أبناء أيضا بـ «التبني». يقول الوحي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مُبَارَكٌ اللهُ أَبُو رَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِي بَارَكَنَا بِكُلِّ بَرَكَةٍ رُوحِيَّةٍ فِي السَّمَاوِيَّاتِ فِي الْمَسِيحِ، كَمَا اخْتَارَنَا فِيهِ قَبْلَ تَأْسِيسِ الْعَالَمِ، لِنَكُونَ قِدِّيسِينَ وَبِلاَ لَوْمٍ قُدَّامَهُ فِي الْمَحَبَّةِ» (أَفَسُس ١ : ٣-٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eنحن لم نكن أبناء بالطبيعة، بل صرنا أبناء بالنعمة. الآب يرانا في الابن، فيحسبنا أبناءه، ويعطينا الروح الذي ينادي في قلوبنا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إِذْ لَمْ تَأْخُذُوا رُوحَ الْعُبُودِيَّةِ أَيْضاً لِلْخَوْفِ، بَلْ أَخَذْتُمْ رُوحَ التَّبَنِّي الَّذِي بِهِ نَصْرُخُ: يَا أَبَا الآبُ» (رُومِيَة ٨ : ١٥).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e٣️⃣ الآب صاحب المبادرة والمهندس الأول لخطة الفداء\u003c/h3\u003e\n\u003cp\u003eفي الثالوث التدبيري، الآب هو الذي بادر ورسم العهد الأزلي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي فِيهِ أَيْضاً نِلْنَا نَصِيباً، مُعَيَّنِينَ سَابِقاً حَسَبَ قَصْدِ الَّذِي يَعْمَلُ كُلَّ شَيْءٍ حَسَبَ رَأْيِ مَشِيئَتِهِ» (أَفَسُس ١ : ١١).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفي هذا الترتيب، يقوم كل أقنوم بدور وظيفي دون مساس بالمساواة الجوهرية:\u003c/p\u003e\n\u003cp\u003eالآب يرسل: هو المنعم الذي بذل ابنه لكي لا يهلك كل من يؤمن به.\u003c/p\u003e\n\u003cp\u003eالابن يطيع ويتمم: تنفيذ الفداء طوعا.\u003c/p\u003e\n\u003cp\u003eالروح القدس يطبق ويُفعِّل: إتمام العمل في قلوب المؤمنين وتقديسهم.\u003c/p\u003e\n\u003cp\u003eهذا الخضوع هو خضوع \"وظيفي\" مؤقت وطوعي لإتمام الفداء، ولا يمس المساواة الأزلية في الجوهر. السيادة الكاملة للآب تُظهر الانسجام الرائع داخل الثالوث.\u003c/p\u003e\n\u003ch3\u003e٤️⃣ الآب يمثل العدل الإلهي الكامل\u003c/h3\u003e\n\u003cp\u003eالآب هو مصدر العدل الذي يطالب بالكفارة ويقبلها. عدله لا يتعارض مع محبته؛ بل يلتقيان في الصليب. فالآب حريص على استيفاء حق القداسة، لذا أرسل الابن ليموت عوضا عنا، ليكون هو «بارا ومُبررا» لمن هو من الإيمان بيسوع.\u003c/p\u003e\n\u003ch3\u003e📍 الكلمة في حياتنا\u003c/h3\u003e\n\u003cp\u003eإن سيادة الآب هي مرساة الطمأنينة في حياتنا؛ فحين ندرك أن حياتنا مرسومة حسب «رأي مشيئته»، نستريح من القلق. أبوته تضمن لنا القبول، وسيادته تضمن لنا الأمان، وعدله الذي استوفي في المسيح يضمن لنا التبرير الأبدي.\u003c/p\u003e\n\u003cp\u003e📖 للمزيد من الدراسة: في كتاب «ضرورة التعددية في الوحدانية الإلهية» يفصل د. عماد شحادة في الفصل الثاني عشر هذه الحقيقة بوضوح: الآب هو المصدر الذي يجعل الثالوث شركة حية.\u003c/p\u003e\n\u003ch3\u003e📑 هوامش:\u003c/h3\u003e\n\u003cp\u003eأبو رائطة التكريتي: حبيب بن خِدمة (القرن ٩م)، من كبار لاهوتيي السريان في العصر العباسي، عُرف بدفاعه المنطقي عن العقائد المسيحية واستخدامه للتشبيهات الطبيعية (كالشمس) لتقريب مفهوم الثالوث.\u003c/p\u003e\n\u003cp\u003eيحيى بن عدي: فيلسوف ومنطقي ولاهوتي سرياني (القرن ١٠م)، تلميذ الفارابي، يُعد من أبرز من استخدموا \"المنطق\" في شرح العقيدة، ومبتكر مفهوم (عاقل، عقل، معقول) لشرح الولادة الأزلية للكلمة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgwcQWiB0R3RRFmNmN7GL9VYgU3y5owHyc1kHEPKqKRkPS0BN3FFO4i-CmNh30oK3KjEZdqIy-zJnj_4DOGySTkTlqcW_6pzv9nyljI7nWLQ_kBQJSFn7nmjSA6O9FV5E3YU2hmY4rpZYUSkAy0Byv268i_lKNTifB9Zax1GRQ-y4oSj9wXFnnwMyh2hKE/s2752/unnamed%20%2852%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgwcQWiB0R3RRFmNmN7GL9VYgU3y5owHyc1kHEPKqKRkPS0BN3FFO4i-CmNh30oK3KjEZdqIy-zJnj_4DOGySTkTlqcW_6pzv9nyljI7nWLQ_kBQJSFn7nmjSA6O9FV5E3YU2hmY4rpZYUSkAy0Byv268i_lKNTifB9Zax1GRQ-y4oSj9wXFnnwMyh2hKE/s600/unnamed%20%2852%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"33:T23b4,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e📜 سلسلة أسرار الشَّرِكَةِ الأزليَّة\u003c/h2\u003e\n\u003cp\u003e📍 المقال الرابع: يَهْوَه.. الاسمُ الشخصيُّ وبذورُ التعددية\u003c/p\u003e\n\u003cp\u003eاللهُ لم يتركنا في الظلام. هو أعلن اسمَهُ الشخصيَّ بوضوح، وفي هذا الاسم نفسه زرع بذور سرِّه العجيب: هو واحدٌ، وفيه شَرِكَةٌ أزلية. هذا الاسم هو «يَهْوَه» – «أَنَا هُوَ».\u003c/p\u003e\n\u003ch3\u003e١️⃣ معنى الاسم «يَهْوَه».. \"الرب الواحد\" (الشَّمَاع)\u003c/h3\u003e\n\u003cp\u003eعندما سأل موسى اللهَ عن اسمه على جبل حوريب، أجابه الله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَقَالَ اللهُ لِمُوسَى: «أَهْيَهُ الَّذِي أَهْيَهُ». وَقَالَ: «هكَذَا تَقُولُ لِبَنِي إِسْرَائِيلَ: أَهْيَهُ أَرْسَلَنِي إِلَيْكُمْ». وَقَالَ اللهُ أَيْضاً لِمُوسَى: «هكَذَا تَقُولُ لِبَنِي إِسْرَائِيلَ: يَهْوَه إِلهُ آبَائِكُمْ، إِلهُ إِبْرَاهِيمَ وَإِلهُ إِسْحَاقَ وَإِلهُ يَعْقُوبَ أَرْسَلَنِي إِلَيْكُمْ. هذَا اسْمِي إِلَى الأَبَدِ وَهذَا ذِكْرِي إِلَى دَوْرٍ فَدَوْرٍ» (خُرُوج ٣ : ١٤-١٥).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإنَّ \"قانون الإيمان\" العبري الأسمى، المعروف بـ \"الشَّمَاع\" (إسمع)، يقول فيه الوحي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إِسْمَعْ يَا إِسْرَائِيلُ: الرَّبُّ [يَهْوَه] إِلهُنَا رَبٌّ [يَهْوَه] وَاحِدٌ [إِيخَاد]» (تَثْنِيَة ٦ : ٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالكلمة العبرية \"إِيخَاد\" (אֶחָד) المستخدمة هنا لوصف وحدانية الله، تشير لغوياً إلى \"وحدانية مركبة\" أو جامعة، وليس مجرد رقم مفرد مُصمت. ولتوضيح هذا المفهوم، نجد ذات الكلمة تُستخدم في وصف اتحاد الرجل والمرأة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لِذلِكَ يَتْرُكُ الرَّجُلُ أَبَاهُ وَأُمَّهُ وَيَلْتَصِقُ بِامْرَأَتِهِ وَيَكُونَانِ جَسَداً وَاحِداً [إِيخَاد]» (تَكْوِين ٢ : ٢٤). حيث يظل الرجل والمرأة شخصين متمايزين لكنهما \"واحد\" في الجوهر والعهد.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا الربط يوضح أنَّ \"الوحدانية\" التي أعلنها الله عن نفسه هي وحدانية تتضمن تميزاً وترابطاً بين أقانيم في كيان واحد. وكلمة \"إِيخَاد\" مرتبطة لغوياً بـ \"يَحْدَاو\" (معاً)، بينما الكلمة التي تعني \"واحد وحيد/منعزل\" (يَاحِيد) موجودة في العبرية لكنَّ الوحي لم يستخدمها لوصف وحدانية الله، بل استخدم \"إِيخَاد\" عوضاً عنها، مما يؤكد أنَّ وحدانيته هي \"وحدانية شَرِكَة\".\u003c/p\u003e\n\u003ch3\u003e٢️⃣ بذور التعددية داخل اسم يَهْوَه\u003c/h3\u003e\n\u003cp\u003eنجد في العهد القديم ظلالاً غنية لهذه التعددية تحت ذات الاسم:\u003c/p\u003e\n\u003cp\u003eصيغ الجمع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَقَالَ اللهُ: نَعْمَلُ الإِنْسَانَ عَلَى صُورَتِنَا كَشَبَهِنَا، فَيَتَسَلَّطُونَ عَلَى سَمَكِ الْبَحْرِ وَعَلَى طَيْرِ السَّمَاءِ وَعَلَى الْبَهَائِمِ، وَعَلَى كُلِّ الأَرْضِ، وَعَلَى جَمِيعِ الدَّبَّابَاتِ الَّتِي تَدِبُّ عَلَى الأَرْضِ» (تَكْوِين ١ : ٢٦).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالله يتكلم بصيغة الجمع؛ وهو حوار أزلي داخل الذات الإلهية، إذ لم يكن \"جمع التعظيم\" معروفاً في لغة ذلك العصر.\u003c/p\u003e\n\u003cp\u003eظهورات \"ملاك يَهْوَه\": تعتبر هذه الظهورات من أهم الإشارات للثالوث؛ لأنَّ هذا الملاك يظهر كشخص مُرسَل من الله، ولكنه في الوقت نفسه يتحدث ويتصرف كأنه الله ذاته. ففي قصة العُلَّيْقَة، يظهر \"ملاك الرب\"، ثم يقول النص:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَلَمَّا رَأَى الرَّبُّ أَنَّهُ مَالَ لِيَنْظُرَ، نَادَاهُ اللهُ مِنْ وَسَطِ الْعُلَّيْقَةِ وَقَالَ: مُوسَى، مُوسَى! فَقَالَ: هأَنَذَا» (خُرُوج ٣ : ٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا الملاك (المُرسَل) هو أقنوم الابن قبل تجسده.\u003c/p\u003e\n\u003cp\u003eالروح القدس يخلق:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَكَانَتِ الأَرْضُ خَرِبَةً وَخَالِيَةً، وَعَلَى وَجْهِ الْغَمْرِ ظُلْمَةٌ، وَرُوحُ اللهِ يَرِفُّ عَلَى وَجْهِ الْمِيَاهِ» (تَكْوِين ١ : ٢).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوالروح القدس هو \"روح يَهْوَه\" الذي يحلُّ لمنح الحكمة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَيَحِلُّ عَلَيْهِ رُوحُ الرَّبِّ، رُوحُ الْحِكْمَةِ وَالْفَهْمِ، رُوحُ الْمَشُورَةِ وَالْقُوَّةِ، رُوحُ الْمَعْرِفَةِ وَمَخَافَةِ الرَّبِّ» (إِشَعْيَاء ١١ : ٢).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003e٣️⃣ فلسفة التعددية: لماذا ثلاثة أقانيم؟\u003c/h3\u003e\n\u003cp\u003eإنَّ \"التعددية ضمن الوحدانية\" صفة أساسية وأزلية في صميم طبيعة الله. فالصفات العلاقية كالمحبة تتطلب بالضرورة وجود \"فاعل\" و\"مفعول به\" يتبادلانها منذ الأزل.\u003c/p\u003e\n\u003cp\u003eأولاً (منطقياً): كمال المحبة والشركة يتطلب شخصاً ثالثاً؛ لتكون المحبة منفتحة ومُتشارَكة بانسجام، وليست علاقة مغلقة بين اثنين فقط. رقم ثلاثة هو أول عدد يحقق هذه \"الوحدانية الجامعة\".\u003c/p\u003e\n\u003cp\u003eثانياً (الوحي): السبب الحاسم هو أنَّ الله قد أعلن عن نفسه لنا صراحةً في ثلاثة أقانيم تحديداً، وعلينا الاكتفاء بما أعلنه عن ذاته.\u003c/p\u003e\n\u003ch3\u003e٤️⃣ الإعلان المتدرج.. من الظلال إلى النور\u003c/h3\u003e\n\u003cp\u003eفي العهد القديم كان الإعلان «ظلاً» يُمهِّد للنور الكامل. في العهد الجديد، قال يسوع المسيح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَقُلْتُ لَكُمْ إِنَّكُمْ تَمُوتُونَ فِي خَطَايَاكُمْ، لأَنَّكُمْ إِنْ لَمْ تُؤْمِنُوا أَنِّي أَنَا هُوَ تَمُوتُونَ فِي خَطَايَاكُمْ» (يُوحَنَّا ٨ : ٢٤)، وأيضاً: «قَالَ لَهُمْ يَسُوعُ: الْحَقَّ الْحَقَّ أَقُولُ لَكُمْ: قَبْلَ أَنْ يَكُونَ إِبْرَاهِيمُ أَنَا هُوَ» (يُوحَنَّا ٨ : ٥٨) – عبارة \"أَنَا هُوَ\" هي المقابل اليوناني لاسم \"يَهْوَه\".\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالابن هو يَهْوَه الذي تجسَّد، والروح القدس هو يَهْوَه الذي يسكن فينا. هكذا يتجلى الاسم كاملاً: آب وابن وروح قدس، واحد في الجوهر، متمايز في الأقانيم. إنَّ العهد القديم لم يعلمنا «التوحيد الرياضي» (١ = ١)، بل علمنا «التوحيد الكياني»: إله واحد لا شريك له من الخارج، يحمل في داخله غنى الشَّرِكَة والنطق والحياة والفرح.\u003c/p\u003e\n\u003cp\u003e📖 للمزيد من الدراسة: راجع كتاب «ضرورة التعددية في الوحدانية الإلهية» للدكتور عماد شحادة، خاصة الفصول من ٣ إلى ١٠، لفهم أعمق للعلاقة بين اسم يَهْوَه والوحدانية الجامعة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgGFiUPaGb1PshzDc7P7f34arS-MzkWxx1e_Q_TKnPrdiLbMSnutekzOqvE2h9_4ZJ08bBU-adkj7ZDpMszBQQQOyhmYra-lmxmGUSobNpir7Mh3Sq8vwiPaJ7TbL1xUCPx9pbmtIh5Wv4KftqUUfSOgNsh4SDpPS7XbI-vHAw0D-BJOOzq_xp8VewyqNw/s2752/unnamed%20%2851%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgGFiUPaGb1PshzDc7P7f34arS-MzkWxx1e_Q_TKnPrdiLbMSnutekzOqvE2h9_4ZJ08bBU-adkj7ZDpMszBQQQOyhmYra-lmxmGUSobNpir7Mh3Sq8vwiPaJ7TbL1xUCPx9pbmtIh5Wv4KftqUUfSOgNsh4SDpPS7XbI-vHAw0D-BJOOzq_xp8VewyqNw/s600/unnamed%20%2851%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"34:T2419,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e📜 سلسلة أسرار الشَرِكَةِ الأزليَّة\u003c/h2\u003e\n\u003cp\u003e📍 المقال الثالث: لماذا لا تكفي الوحدانية الصامتة؟\u003c/p\u003e\n\u003cp\u003eلو أنَّ اللهَ واحدٌ صامتاً مُصْمَتاً، بدون أيِّ شَرِكَةٍ داخل ذاته، فماذا يعني ذلك؟\u003c/p\u003e\n\u003cp\u003eيعني أنَّهُ كان صامتاً قبل أن يخلق العالم. لا كلامَ، ولا مَحَبَّةَ، ولا فَرَحَ؛ لأنَّ المحبة تحتاج إلى «مُحِبٍّ» و «مَحْبُوبٍ»، والكلام يحتاج إلى «مُتَكَلِّمٍ» و «كَلِمَةٍ». فإذا كان اللهُ وحيداُ تماماً منذ الأزل بدون شركة داخل ذاته، فمَنْ كان يحبُّ؟ ومع مَنْ كان يتكلم؟ هذه هي «معضلة الوحدانية الصامتة» التي لا يستطيع العقل أن يقبلها.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e١️⃣ الوحدانية الصامتة تجعل الله عاجزاً\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eالله ليس مجرد «قوة» كبيرة. الكتاب يقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مَنْ لاَ يُحِبُّ لَمْ يَعْرِفِ اللهَ، لأَنَّ اللهَ مَحَبَّةٌ» (١ يُوحَنَّا ٤ : ٨).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالمحبة ليست صفة تنتظر الخليقة حتى تظهر؛ المحبة جزء من طبيعته الأزلية. لو كان الله واحداً صامتاً مُصْمَتاً، لكانت مَحَبَّتُهُ قد بدأت فقط بعد أن خلق الملائكة والإنسان. هذا يجعله ناقصاً قبل الخلق، وهو أمر مستحيل.\u003c/p\u003e\n\u003cp\u003eكذلك العدل والحكمة والكلام. الله عادل منذ الأزل، فكيف يمارس عدله إن لم يكن فيه علاقة أزلية؟ الله حكيم منذ الأزل، فكيف يمارس حكمته إن لم يكن فيه «حكمة» قائمة بذاتها؟ هنا يظهر التناقض: الوحدانية الصامتة تجعل صفات الله مُعَلَّقَةً، تنتظر الخليقة حتى تتحرك. لكنَّ الله كامل قبل الخليقة وبعدها.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e٢️⃣ انسجام الصفات يطلب شركة داخلية\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eصفات الله لا تتعارض؛ بل تتناغم في انسجام كامل. المحبة والعدل والحكمة والكلام كلها تعمل معاً منذ الأزل. هذا الانسجام (الذي سُمِّيَ «التناظر الإلهي») لا يمكن أن يحدث في وحدانية صامتة. يجب أن يكون في الله «شَرِكَةٌ» أزلية تسمح للصفات أن تُمارَس داخل ذاته.\u003c/p\u003e\n\u003cp\u003eالكتاب المقدس يُشير لهذا منذ البداية. في (تَكْوِين ١ : ٢٦) يقول الله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَقَالَ اللهُ: نَعْمَلُ الإِنْسَانَ عَلَى صُورَتِنَا كَشَبَهِنَا، فَيَتَسَلَّطُونَ عَلَى سَمَكِ الْبَحْرِ وَعَلَى طَيْرِ السَّمَاءِ وَعَلَى الْبَهَائِمِ، وَعَلَى كُلِّ الأَرْضِ، وَعَلَى كُلِّ الدَّبَّابَاتِ الَّتِي تَدِبُّ عَلَى الأَرْضِ» (تَكْوِين ١ : ٢٦).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eصيغة الجمع «نَعْمَلُ» و«صُورَتِنَا» تُشير إلى تعددية داخل الوحدة. ليس تعدد آلهة، بل شركة داخل الإله الواحد. هذا الإعلان المتدرج يمهِّد لما سيُعلَن بوضوح في العهد الجديد: الله واحد في الجوهر، ثلاثة في الأقانيم.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e٣️⃣ التعددية الأقنومية: إعلان الوحي المقدس\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eهكذا نصل إلى الجواب الوحيد الذي يحفظ كمال الله: التعددية داخل الوحدانية.\u003c/p\u003e\n\u003cp\u003eالآب يحب الابن منذ الأزل.\u003c/p\u003e\n\u003cp\u003eالابن يرد المحبة.\u003c/p\u003e\n\u003cp\u003eالروح القدس يربط بينهما في شركة كاملة.\u003c/p\u003e\n\u003cp\u003eالمحبة تُمارَس، والكلام يتدفق، والعدل يتحقق – كل ذلك قبل أن يخلق الله أي شيء. الله «شخص» لا «فكرة». هو مكتفٍ بذاته؛ فهو لا يحتاج لخلقنا ليحب، بل هو يحب داخل ذاته منذ الأزل.\u003c/p\u003e\n\u003cp\u003eالآب هو أصل الكيان، والابن هو «الكلمة» المواجه للآب وجهاً لوجه، والروح القدس هو «نفس» هذا الحب ورباطه. يقول الكتاب في افتتاحية إنجيل يوحنا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فِي الْبَدْءِ كَانَ الْكَلِمَةُ، وَالْكَلِمَةُ كَانَ عِنْدَ اللهِ، وَكَانَ الْكَلِمَةُ اللهَ» (يُوحَنَّا ١ : ١).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eكلمة «عِنْدَ اللهِ» تعني «مواجهاً لله» – حوار أزلي داخل جوهر واحد. هكذا تكون وحدانية الثالوث «وحدانية الغنى المطلق»: الله هو «الواحد» الذي لا شريك له من خارج ذاته، وهو «الجامع» لكل كمالات الشخصية من داخل ذاته.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e✨ شهادة العهد الجديد الجامعة\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eيوجد العديد من النصوص في العهد الجديد التي تجمع الأقانيم الثلاثة معاً في سياق واحد يثبت تساويهم، ومن أبرزها:\u003c/p\u003e\n\u003cp\u003eصيغة المعمودية (مَتَّى ٢٨ : ١٩): أوصى المسيح تلاميذه بتعميد المؤمنين «بِاسْمِ الآبِ وَالابْنِ وَالرُّوحِ الْقُدُسِ». استخدام كلمة \"اسْمِ\" (بالمفرد) وليس \"أسماء\" يؤكد بقوة على وحدانية الجوهر الإلهي، بينما يوضح ذكر الأقانيم الثلاثة معاً تمايزهم وتساويهم المطلق.\u003c/p\u003e\n\u003cp\u003eالبركة الرسولية (٢ كُورِنْثُوس ١٣ : ١٤): يختتم بولس الرسول رسالته قائلاً: «نِعْمَةُ رَبِّنَا يَسُوعَ الْمَسِيحِ، وَمَحَبَّةُ اللهِ، وَشَرِكَةُ الرُّوحِ الْقُدُسِ مَعَ جَمِيعِكُمْ». هذا النص يربط الأقانيم الثلاثة معاً في منح البركة والخلاص للمؤمنين.\u003c/p\u003e\n\u003cp\u003eخطة الخلاص (١ بُطْرُس ١ : ٢): يوضح بطرس الرسول دور كل أقنوم في الخلاص بقوله إنَّ المؤمنين مختارون: «بِمُقْتَضَى عِلْمِ اللهِ الآبِ السَّابِقِ، فِي تَقْدِيسِ الرُّوحِ لِلطَّاعَةِ، وَرَشِّ دَمِ يَسُوعَ الْمَسِيحِ».\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e🏁 الخلاصة: إعلانٌ لا اختراع\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eعقيدة الثالوث ليست اختراعاً فلسفياً، بل هي استنتاج لاهوتي مبني بالكامل على ما أعلنه الله عن نفسه بقوة في الكتاب المقدس. بما أنَّ العقل بادر البشري المحدود لا يمكنه اكتشاف طبيعة الله بمفرده، فإنه يخضع تماماً للإعلان الإلهي.\u003c/p\u003e\n\u003cp\u003eيرتكز هذا الاستنتاج على أنَّ الكتاب المقدس يعلن بوضوح أنَّ الله واحد، ولكنه في الوقت نفسه يعلن عن ذاته في ثلاثة أقانيم متساوية (الآب والابن والروح القدس). وقد جاء هذا الإعلان بشكل متدرج؛ حيث وضع العهد القديم الجذور والإشارات الأولى لهذه التعددية، ثم اكتمل الإعلان بوضوح تام في العهد الجديد.\u003c/p\u003e\n\u003cp\u003e📖 للمزيد من الدراسة: في كتاب «ضرورة التعددية في الوحدانية الإلهية» يُفصِّل د. عماد شحادة في الفصول ٣-٩ هذه المعضلة بدقة، ويُبيِّن أنَّ التعددية الأقنومية ليست تناقضاً مع الوحدانية، بل هي الشرط الوحيد الذي يجعل الله كاملاً في ذاته. هذا ليس فلسفة بشرية، بل هو ما يشهد له الكتاب المقدس من أوله إلى آخره.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh7Y1g2fUjKnSFIK42r-GWhpDQqnA6DvOfPltPW_vdvrLFn74qtc33jVJj96i4Lje9Yk1G-JWZlud62W956z6B5xTK_lkqdxCpP6caeZyba2UY7uZWCa3j8jJMVjt4CmaHWeaL1_poPcaM9V7mtsi-rmNEJE7QjuLKGBhPjhAOrjxD12kvtmqQAHhBlHrg/s2752/unnamed%20%2850%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh7Y1g2fUjKnSFIK42r-GWhpDQqnA6DvOfPltPW_vdvrLFn74qtc33jVJj96i4Lje9Yk1G-JWZlud62W956z6B5xTK_lkqdxCpP6caeZyba2UY7uZWCa3j8jJMVjt4CmaHWeaL1_poPcaM9V7mtsi-rmNEJE7QjuLKGBhPjhAOrjxD12kvtmqQAHhBlHrg/s600/unnamed%20%2850%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"35:T1b29,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eرحلة في قلب الإيمان المسيحي\u003c/h2\u003e\n\u003cp\u003eهل فكرت يوماً لماذا يوصف الله في المسيحية بأنه \"محبة\"؟ وكيف يمكن أن يكون محباً قبل أن يخلق الملائكة أو البشر؟ إن الإجابة على هذه الأسئلة تكمن في أعظم أسرار الإيمان: عقيدة الثالوث القدوس.\u003c/p\u003e\n\u003cp\u003eهذه السلسلة، التي نبدأها اليوم تحت عنوان \"أسرار الشركة الأزلية\"، ليست مجرد دراسة جافة أو ألغازاً رياضية نحاول حلها، بل هي رحلة استكشافية لنعرف من هو الإله الذي نعبده. إننا لا نتحدث عن إله \"وحيد\" يعيش في عزلة صامتة، بل عن إله \"واحد\" في جوهره، لكنه يعيش في حالة دائمة من الحب والنطق والحياة والفرح بين الآب والابن والروح القدس.\u003c/p\u003e\n\u003cp\u003e📜 سلسلة أسرار الشَرِكَةِ الأزليَّة\u003c/p\u003e\n\u003cp\u003e📍 المقال الأول: كَيْفَ نَعْرِفُ اللهَ حَقًّا؟\u003c/p\u003e\n\u003cp\u003eكلُّ إنسان يسأل في لحظة ما: «مَنْ هُوَ اللهُ؟». هذا السؤال ليس جديداً، ولا يقتصر على الفلاسفة أو العلماء. هو سؤال القلب الذي يشعر بالفراغ، والعقل الذي يبحث عن معنى. لكنَّ الإجابة لا تأتي من تفكيرنا وحده. الله نفسه هو الذي يُعلِن عن ذاته.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e١️⃣ المَعرفة العامَّة والمَعرفة الخاصَّة\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eالمَعرفة العامَّة (أو الإعلان العام) هي التي يحصل عليها كلُّ إنسان من خلال الخليقة. السماء والأرض والنظام الدقيق في الكون يشهدان أنَّ هناك خالقاً عظيماً. كما قال الكتاب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«اَلسَّمَاوَاتُ تُحَدِّثُ بِمَجْدِ اللهِ، وَالْفَلَكُ يُخْبِرُ بِعَمَلِ يَدَيْهِ» (مزمور ١٩ : ١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذه المَعرفة كافية لتجعل الإنسان مسؤولاً أمام الله، لكنَّها لا تكفي لتُنقذه أو تُقرِّبه منه.\u003c/p\u003e\n\u003cp\u003eأما المَعرفة الخاصَّة (أو الإعلان الخاص) فهي مختلفة تماماً. هي مَعرفة شخصية، حميمة، مثل مَعرفة الابن لأبيه. الكتاب المقدس يُسمِّيها «يدوع» – مَعرفة اختبارية تلامس القلب. يسوع نفسه قال:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَهذِهِ هِيَ الْحَيَاةُ الأَبَدِيَّةُ: أَنْ يَعْرِفُوكَ أَنْتَ الإِلهَ الْحَقِيقِيَّ وَحْدَكَ، وَيَسُوعَ الْمَسِيحَ الَّذِي أَرْسَلْتَهُ» (يُوحَنَّا ١٧ : ٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذه المَعرفة لا تأتي من جهد بشري، بل من إعلان الله نفسه.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e٢️⃣ البَصيرة: العين التي تفتحها كلمة الله\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eكيف نصل إلى هذه المَعرفة الخاصَّة؟ الجواب هو «البَصيرة» – القدرة على رؤية الحق الإلهي بوضوح. البَصيرة ليست ذكاءً بشرياً، بل عمل الروح القدس الذي يفتح أعيننا على ما أعلنه الله في كتابه.\u003c/p\u003e\n\u003cp\u003eفي العهد القديم يُعبِّر الكتاب عن هذين المستويين بكلمتين عبريتين دقيقتين:\u003c/p\u003e\n\u003cp\u003e«هَسْكِيل» (يَفْهَمُ): البَصيرة التي تمكِّننا من تمييز النظام والحكمة وراء الخلق.\u003c/p\u003e\n\u003cp\u003e«يَدُوع» (يَعْرِفُنِي): المَعرفة الاختباريَّة القائمة على العَلاقة الحية.\u003c/p\u003e\n\u003cp\u003eيقول الرب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هكَذَا قَالَ الرَّبُّ: لاَ يَفْتَخِرَنَّ الْحَكِيمُ بِحِكْمَتِهِ، وَلاَ يَفْتَخِرَنَّ الْجَبَّارُ بِجَبَرُوتِهِ، وَلاَ يَفْتَخِرَنَّ الْغَنِيُّ بِغِنَاهُ. بَلْ بِهذَا لِيَفْتَخِرَ الْمُفْتَخِرُ: بِأَنَّهُ يَفْهَمُ وَيَعْرِفُنِي أَنِّي أَنَا الرَّبُّ الصَّانِعُ رَحْمَةً وَقَضَاءً وَعَدْلاً فِي الأَرْضِ، لأَنِّي بِهذِهِ أُسَرُّ، يَقُولُ الرَّبُّ.» (إرميا ٩ : ٢٣-٢٤)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهكذا ينتقل الإنسان من «الاقتناع العقلي» بوجود الله إلى «الشركة الحية» معه. بدون البَصيرة نبقى عمياً أمام أعظم حقيقة: الله ليس فكرة بعيدة، بل أباً يريد أن يُعرِّفنا نفسه.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e٣️⃣ دافع البحث عن الخالق\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eلماذا نبحث عن الله أصلاً؟ لأنَّ الله نفسه وضع في قلبنا هذا الدافع. الإنسان مخلوق على صورة الله، فهو يشعر بالفراغ إذا لم يعرفه. كلُّ فلسفة أو دين أو علم يحاول أن يملأ هذا الفراغ، لكنَّه يبقى ناقصاً حتى يأتي الله ويُعلِن ذاته.\u003c/p\u003e\n\u003cp\u003eإنَّنا نبدأ هذه الرحلة معاً، لا لنخترع إلهاً على مقاس عقولنا، بل لنتواضع أمام ما أعلنه هو عن ذاته في كلمته. المدخل الأول للفهم هو التواضع؛ أن نلقي شموخ افتخارنا الأرضي لكي يفتح هو بصائرنا لنعرفه مَعرفة حقيقية.\u003c/p\u003e\n\u003cp\u003eهكذا تبدأ رحلتنا في فهم الثالوث: ليس من أجل حلِّ لغز عقلي، بل من أجل مَعرفة شخصية لله الذي يحبنا منذ الأزل. الله ليس فكرة مجردة، بل أب وابن وروح يعيشون في شركة كاملة، ويدعوننا لنشارك في هذه الشركة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhRWTRgZqZPLngL1c5OJGEqw_bwIZYefO_43NTv6xTVmQjZafO9BMjYsM13fRqMBqv78lr_W_uxlGzm1TSxAn1AbqOGD1zI74q0PFcDaH5gGWTY4lLRLmPnFF21So_xveBg-A-qe3a2PXQWmzL_OyecS4zlOjog4SzoGbYaBeDezCoOumPz-JzpZvS91A4/s2752/unnamed%20%2848%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhRWTRgZqZPLngL1c5OJGEqw_bwIZYefO_43NTv6xTVmQjZafO9BMjYsM13fRqMBqv78lr_W_uxlGzm1TSxAn1AbqOGD1zI74q0PFcDaH5gGWTY4lLRLmPnFF21So_xveBg-A-qe3a2PXQWmzL_OyecS4zlOjog4SzoGbYaBeDezCoOumPz-JzpZvS91A4/s600/unnamed%20%2848%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"36:T23e0,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eتاريخية الأناجيل وبرهان التدوين المبكر\u003c/h2\u003e\n\u003cp\u003eإن فهم تاريخ كتابة الأناجيل هو المفتاح لإدراك مدى أمانة النقل التاريخي؛ فكلما اقترب زمن الكتابة من زمن الحدث، زادت الثقة في أن النصوص هي سجلات لشهود عيان عاصروا الأحداث فعلياً.\u003c/p\u003e\n\u003cp\u003eأولاً: التواريخ\u003c/p\u003e\n\u003cp\u003eيوضح الجدول التالي نطاق التاريخ المبكر مما يربط النصوص بشرود العيان مباشرة:\u003c/p\u003e\n\u003cp\u003eثانياً: دليل الصمت التاريخي\u003c/p\u003e\n\u003cp\u003eيعتمد هذا الدليل على غياب أحداث مفصلية كبرى كانت لابد أن تفرض نفسها على النص وتحدث تغيراً جذرياً في مسار الكتابة لو حدثت قبل التدوين. غياب ذكر هذه الأحداث في الأناجيل وسفر الأعمال يعد دليلاً بليغاً على أنها كُتبت قبل وقوع هذه الكوارث:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eزلزال دمار أورشليم في عام ٧٠ م: لم يسجل سفر الأعمال أو الأناجيل المتوازية -متى ومرقس ولوقا- وقوع دمار الهيكل كحدث ماضٍ. وبحسب يوسيفوس، قُتل أكثر من مليون يهودي ونُفي ٢٠٠,٠٠٠ آخرون. غياب ذكر هذا \"الكابوس التاريخي\" في كتابات تدور أحداثها في أورشليم وتعتم بمصيرها يعد قرينة قوية على أن التدوين سبق الكارثة.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eاستشهاد القادة الكبار بين ٦٢ م - ٦٧ م: يُنهي لوقا سفر الأعمال وبولس لا يزال حياً في سجنه الأول (حوالي ٦٢ م). لا توجد إشارة لاستشهاد يعقوب أخو الرب في عام ٦٢ م، ولا استشهاد بطرس أو بولس بين ٦٤-٦٧ م. عدم تخليد ذكرى استشهاد هؤلاء القادة يرجح اكتمال النص قبل وقوع هذه الأحداث.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003eاضطهاد نيرون عام ٦٤ م: لم يشر لوقا إلى اضطهاد نيرون العنيف حيث كان الرومان يُصلبون المسيحيين ويحرقونهم أحياء. بل يصور لوقا السلطات الرومانية بشكل محايد، وهو أمر غير متصور بعد عام ٦٤ م.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eثالثاً: الدليل الإحصائي لأسماء الأعلام (البصمة السكانية)\u003c/p\u003e\n\u003cp\u003eيُعد هذا الدليل من أدق الوسائل العلمية الحديثة (أبحاث الدكتور بيتر ويليامز) لإثبات أن الأناجيل سجلات تعكس بدقة الواقع السكاني لفلسطين في زمن يسوع.\u003c/p\u003e\n\u003cp\u003e١. مطابقة التكرار الإحصائي (قاعدة بيانات \"تال إيلان\")\u003c/p\u003e\n\u003cp\u003eتمت مقارنة الأسماء في الأناجيل بقاعدة بيانات تضم آلاف الأسماء من فلسطين (من ٣٠٠ ق.م إلى ٧٠ م):\u003c/p\u003e\n\u003cp\u003e* تطابق الأسماء الشائعة: اسم \"سمعان\" كان يمثل ١٥.٦% من أسماء الرجال في فلسطين، وهو الاسم الأول تكراراً في الأناجيل (٨ أشخاص). اسم \"يوسف\" كان الثاني تكراراً في فلسطين بنسبة ١٤.٦%، وهو الثاني تكراراً في الأناجيل أيضاً.\u003c/p\u003e\n\u003cp\u003e* تطابق الأسماء النسائية: اسمي \"مريم\" و\"سالومة\" كانا يمثلان ٢٩% من النساء في فلسطين، وهما بالفعل أكثر الأسماء النسائية تكراراً في نصوص الأناجيل.\u003c/p\u003e\n\u003cp\u003e٢. أستخدام \"التميز\" الأسماء المتشابهة\u003c/p\u003e\n\u003cp\u003eهذا هو الجزء الأكثر إدهاشاً في الدليل؛ فكُتّاب الوحي استخدموا \"التميز\" للتعريف بالأشخاص بطريقة عفوية تثبت معاصرتهم للبيئة، فقد استخدموا هذا الاسلوب:\u003c/p\u003e\n\u003cp\u003e++ للأسماء الشائعة فقط: عندما يكون الاسم شائعاً جداً (مثل سمعان)، يضيف كُتّاب الوحي تعريفاً فورياً (سمعان الأبرص، سمعان القيرواني، سمعان بطرس) لتمييزهم عن آلاف الأشخاص الذين يحملون نفس الاسم.\u003c/p\u003e\n\u003cp\u003e++ للأسماء النادرة: عندما يذكرون اسماً نادراً (مثل فيلبس أو توما)، لا يضيفون أي مميزات، لأن الاسم بحد ذاته يكفي للتعريف بصاحبه في ذلك الوسط.\u003c/p\u003e\n\u003cp\u003e++ النتيجة: هذا المستوى من الدقة \"غير الواعية\" يثبت أن الأناجيل تعكس \"البصمة السكانية\" الدقيقة لفلسطين ما قبل عام ٧٠ م، ولا تستخدم أسماء يهود الشتات (مثل مصر أو روما) التي كان تكرارها الإحصائي مختلف تماماً.\u003c/p\u003e\n\u003cp\u003eرابعاً: الدليل القانوني واللاهوتي (ضريبة الهيكل)\u003c/p\u003e\n\u003cp\u003eفي إنجيل متى (١٧: ٢٤-٢٧)، يبرز دليل دقيق حول \"ضريبة الهيكل\" المخصصة حصراً لهيكل القدس:\u003c/p\u003e\n\u003cp\u003e++ تاريخياً، بعد عام ٧٠ م، حول الرومان هذه الضريبة قسراً لمعبد \"جوبيتير\" الوثني تحت اسم \"fiscus Iudaicus\".\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eلو كان متى يكتب بعد عام ٧٠ م، لكان إدراج هذا النص دعوة ضمنية للمسيحيين لدفع ضريبة لمعبد وثني، وهو ما يتناقض مع لاهوت أنجيل متى الصارم. وجود هذا النص يثبت أن الهيكل كان قائماً والضريبة كانت تُدفع وجهتها الأصلية -وهي الهيكل- وقت التدوين.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eخامساً: دليل الاكتشافات الطبوغرافية (معالم أورشليم المفقودة)\u003c/p\u003e\n\u003cp\u003eإنجيل يوحنا يظهر دقة متناهية في معرفة الواقع الطبوغرافي لأورشليم قبل دمارها سنة ٧٠ م:\u003c/p\u003e\n\u003cp\u003e١. التفاصيل الجغرافية المدفونة\u003c/p\u003e\n\u003cp\u003eيصف يوحنا معالم دقيقة لأورشليم سويت بالأرض بعد عام ٧٠ م ولم تكتشف إلا حديثاً.\u003c/p\u003e\n\u003cp\u003e++ الدليل: الوصف الدقيق لبركة بيت حسدا وبركة سلوام والمعالم الطبوغرافية يثبت أن كُتّاب الوحي كانوا يصفون واقعاً ملموساً رأوه بأعينهم قبل أن يُمحى أثره تماماً بعد الثورة اليهودية.\u003c/p\u003e\n\u003cp\u003e++ الاستنتاج: هذه الدقة في وصف الواقع الطبوغرافي يجعل أي محاولة لوضع الإنجيل في القرن الثاني أمر شديد الصعوبة؛ فالكاتب المتأخر لا يمكنه معرفة تفاصيل جغرافية دقيقة لمدينة دُمّرت تماماً قبل ولادته بعقود.\u003c/p\u003e\n\u003cp\u003e٢. بردية P٥٢ (الشهادة المادية)\u003c/p\u003e\n\u003cp\u003eتُعد بردية P٥٢ أقدم وثيقة مادية لإنجيل يوحنا، وتعود لبدايات القرن الثاني.\u003c/p\u003e\n\u003cp\u003e++ وجودها في مصر في ذلك الوقت المبكر يثبت بالضرورة أن الإنجيل كُتب، وانتشر، ونُسخ في القرن الأول الميلادي، مما يحطم فرضيات التأريخ المتأخر.\u003c/p\u003e\n\u003cp\u003eالخلاصة:\u003c/p\u003e\n\u003cp\u003eإن تظافر \"دليل الصمت\" عن الكوارث الكبرى، مع \"الدليل الإحصائي\" الذي يثبت دقة الأسماء اليهودية في فلسطين، و\"الدليل الطبوغرافي\" للجغرافيا المدفونة، يؤكد أن الأناجيل الأربعة دُوِّنت في جيل شهود العيان، ما بين عامي ٥٠ م و٩٠ م. هذه النصوص ليست أساطير تراكمت عبر الأجيال، بل هي وثائق تاريخية رصينة تعكس بدقة الواقع الذي انمحى تماماً بعد عام ٧٠ م، مما يعزز الثقة المطلقة في أصلها الرسولي المبكر.\u003c/p\u003e\n\u003cp\u003eالجدول الزمني والأدلة التراكمية لتوثيق الأناجيل\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj1RwIJtsRDbYD-jfO38Z6rV-lnLqzDJHGAeH7RgU3cLNaDaTvGpALneYTFPkrQHV1MB4Y3YixhMOQcZKsTgqA1TrYkGWmgIELWN3JAI1gME6OIIXaBf5SDltOTupoN5EPoHRkfLO6ubIo3ewEBV8YLgDfsHMtrWrt6ZTmyQhqPALERJ8Hqp5ugh4gmH1g/s2752/unnamed%20%2847%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj1RwIJtsRDbYD-jfO38Z6rV-lnLqzDJHGAeH7RgU3cLNaDaTvGpALneYTFPkrQHV1MB4Y3YixhMOQcZKsTgqA1TrYkGWmgIELWN3JAI1gME6OIIXaBf5SDltOTupoN5EPoHRkfLO6ubIo3ewEBV8YLgDfsHMtrWrt6ZTmyQhqPALERJ8Hqp5ugh4gmH1g/s600/unnamed%20%2847%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"37:T1d08,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eسلطان السياق ومعضلة التجزئة: دراسة في وحدة النص الكتابي\u003c/h2\u003e\n\u003cp\u003e١. معضلة \"تجزئة النص\" وسلطان السياق\u003c/p\u003e\n\u003cp\u003eيُعد السياق الحكم والأداة الأساسية لفهم المعنى الحقيقي للنص؛ فكما يمكنك أن تفهم المعنى التقريبي للكلمة المجهولة من خلال موقعها في الجملة، لا يُمكن إدراك مقاصد الوحي إلا بإحاطة النص ببيئته اللغوية والفكرية. إن تفتيت النص الكتابي قد تسبب في ضرر بالغ لفهمنا اللاهوتي، فأصبح البعض يتعامل مع الأسفار كـ \"صندوق مجوهرات\" تُنتقى منه الوعود والآيات بشكل عشوائي. إن رفض فكرة \"الآية المفضلة\" بمعزل عن سياقها هو ضرورة منهجية، فالتفضيل يجب أن ينصب على \"الأفكار\" و\"الحجج\" الكاملة التي يبنيها الكاتب الأصلي كبناء كلي متماسك.\u003c/p\u003e\n\u003cp\u003e٢. التطور التاريخي لتقسيم النص: من المخطوطة إلى الترقيم\u003c/p\u003e\n\u003cp\u003eلم يعرف كتاب الوحي الأصليون تقسيم الفصول والآيات، بل كتبوا تدفقاً فكرياً مستمراً في شكل فقرات كبرى ورسائل متكاملة. كانت المخطوطات الأصلية، العبرية واليونانية، تُكتب بأسلوب (Scriptio Continua) أي السطر المستمر أو المتصل، وهو النص المتصل الخالي من الفواصل وعلامات الترقيم، مما فرض على القارئ معرفة عميقة باللغة لتمييز المعاني.\u003c/p\u003e\n\u003cp\u003eتقسيم الفصول: وضعه \"ستيفن لانغتون\"، رئيس أساقفة كانتربري، بين عامي ١٢٠٥ و١٢٢٧ م.\u003c/p\u003e\n\u003cp\u003eترقيم العهد الجديد: قام به الباحث \"روبرت إتيان\" في طبعته اليونانية عام ١٥٥١ م لتسهيل المقارنة بين النصوص.\u003c/p\u003e\n\u003cp\u003eاكتمال الترقيم: كانت \"ترجمة جنيف\" عام ١٥٦٠ م هي أول نسخة إنجليزية تدمج الفصول والآيات معاً، وهو النظام الذي استمر لـ ٥٠٠ عام حتى اليوم.\u003c/p\u003e\n\u003cp\u003e٣. الغرض التنظيمي مقابل الأثر التفسيري\u003c/p\u003e\n\u003cp\u003eإن ترقيم الآيات هو أداة تنظيمية تسمح للدارسين بالبدء من نقطة موحدة، وله قيمة أكاديمية واضحة في البحث والدراسة الجماعية. ومع ذلك، أدى هذا التنظيم لنشوء تقليد خطير يوهم القارئ بأن كل آية هي فكرة مستقلة. ويظهر هذا الأثر السلبي في الوعظ الذي يستخدم آية مفردة مقطوعة عن سياقها كمنصة ينطلق منها لمواضيع مختلفة تماماً عن قصد كاتب الوحي، متجاهلاً الحجة التي تسبقها أو تلحقها. إن قراءة نصف جملة من رسالة مطولة لا يمكن أن تمنح القارئ استيعاباً لما كتبه المرسل، وكذلك النص الكتابي.\u003c/p\u003e\n\u003cp\u003e٤. منهجية الدراسة المتسلسلة\u003c/p\u003e\n\u003cp\u003eلإعادة الاعتبار للنص كفكرة متصلة، يجب تجاوز الترقيم والتركيز على قراءة الأسفار كرسائل ذات بداية، وجسد، وخاتمة. يُنصح المبتدئون بالبدء بأسفار ذات طبيعة سردية مثل إنجيل يوحنا، وقراءته من البداية إلى النهاية دون التوقف عند آيات مشهورة مثل (يوحنا ٣ : ١٦) بمعزل عما يتبعها في (يوحنا ٣ : ١٨). إن الالتزام بالقراءة المتسلسلة يفرض على الدارس التعامل مع كل ما قاله الوحي، بما في ذلك المقاطع الصعبة، مما يحقق فهماً كلياً وصحيحاً لمقاصد الله.\u003c/p\u003e\n\u003cp\u003e٥. مثال: سلطان الشريعة في مواجهة وهم الرؤية الخاصة\u003c/p\u003e\n\u003cp\u003eمعضلة \"صندوق المجوهرات\" وتجزئة الحكمة: يمثل التعامل الشائع مع آية (أمثال ٢٩ : ١٨) نموذجاً صارخاً لـ \"تفتيت النص الكتابي\"، حيث يتم التعامل مع النص كـ \"صندوق مجوهرات\" تُنتقى منه الآيات -وفي هذه الحالة نصف آية- لتعضيد أفكار مسبقة. إن بتر الشطر الأول «بِلاَ رُؤْيَا يَجْمَحُ الشَّعْبُ» عن باقي الآية «أَمَّا حافِظُ الشَّرِيعَةِ فَطُوبَاهُ» هو تجسيد لخطورة قراءة \"نصف جملة\" والاعتقاد بالحصول على فهم كامل للقصد الإلهي.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«بِلاَ رُؤْيَا يَجْمَحُ الشَّعْبُ»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَمَّا حَافِظُ الشَّرِيعَةِ فَطُوبَاهُ»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالتوازي الشعري مقابل الترقيم المادي: كثيراً ما سمعنا عظات اتخذت «بِلاَ رُؤْيَا يَجْمَحُ الشَّعْبُ» كمنصة لانطلاقها عن ضرورة \"أن يكون لديك رؤيا من الله عن خدمتك أو حياتك\"، أو سُئلنا بإلحاح: \"ما هي رؤيتك؟\". إن تطبيق الآية كضرورة لامتلاك \"رؤية خاصة\" هو انحراف لاهوتي ناتج عن تجاهل \"الحجة الكاملة\" للكاتب. في المخطوطات الأصلية ذات \"السطر المتصل\"، لم تكن هناك فاصلة تُغري بوقف الفكرة. إن المعنى يكمن في \"التوازي\"، حيث يفرض السياق الكلي أن \"الرؤية\" هي الإعلان الإلهي، بدليل مقابلتها بـ \"الشريعة\". إن \"الجموح\" ناتج عن غياب الإرشاد المكتوب، لا غياب \"الإعلان الخاص بالمستقبل الشخصي\"، والكنز الحقيقي موجود في \"الكل المتكامل\" للوحي.\u003c/p\u003e\n\u003cp\u003eبداية الإصلاح: قراءة النص كبنية موحدة: إن العلاج يكمن في \"تجاهل الترقيم\" والعودة لقراءة الفكرة ككتلة واحدة. إن المؤمن الذي يقرأ \"الرؤية\" في ضوء \"حفظ الشريعة\" يدرك أن طوباه (فرحه) ليست مرتبطة بكشف مستقبلي، بل بالأمانة في اتباع ما أُعلن مسبقاً في كلمة الله.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiI_779T19I_qdK2kVM43vIn05-5P25dn5SoURkSPmq8CYxD6iqbjcywluvaJp97eUG2KJJPDESU_rgvMmme0qoHCKerMHYB0sZEwEARkdvVDzOqyx4sKgHA_q-1dOO6x8BuEBOvnEXJ4kdByeeFc14I4V9sU2OmxpjNMSW3Ipl6Pl2AeDG9S5N98K3npA/s2752/unnamed%20%2846%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiI_779T19I_qdK2kVM43vIn05-5P25dn5SoURkSPmq8CYxD6iqbjcywluvaJp97eUG2KJJPDESU_rgvMmme0qoHCKerMHYB0sZEwEARkdvVDzOqyx4sKgHA_q-1dOO6x8BuEBOvnEXJ4kdByeeFc14I4V9sU2OmxpjNMSW3Ipl6Pl2AeDG9S5N98K3npA/s600/unnamed%20%2846%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"38:T64b9,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الحادي عشر: الإنجيل — ما الذي يجعله صالحاً في النهاية: هل هو رؤية المجد أم أن نتمجد؟\u003c/h2\u003e\n\u003cp\u003eإنَّ أعظمَ بشارةٍ في الإنجيلِ الذي ينتمي للمسيحِ هي أنَّ الذي خلقَ الكونِ فائقَ المجدِ قد عَمِلَ، من خلالِ موتِ يسوعَ المسيحِ وقيامتِهِ، على إزالةِ كلِّ عائقٍ بينَنَا وبينَ ذاته، لكي نجدَ فرحاً أبديّاً في رؤيةِ جمالِهِ غيرِ المحدودِ والتلذُّذِ بهِ. إنَّ محبةَ اللهِ التي تخلص هي قيامُهُ بكلِّ ما يجبُ فعلُهُ، بتكلفةٍ باهظةٍ تحمَّلَهَا هو، ومن أجلِ أناسٍ لا يستحقونَ أدنى شيءٍ، لكي يسلبَ لبَّهُم بما يجعلُهُم سُعداءَ للغايةِ إلى الأبدِ، أي: ذاته. لذلكَ، فإنَّ إنجيلَ اللهِ ومحبةَ اللهِ يُعبَّرُ عنهُما بشكلٍ نهائيٍّ وكاملٍ في عطيّةِ اللهِ لذاتهِ من أجلِ لذَّتِنَا الأبديّةِ [١].\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«تُعَرِّفُنِي سَبِيلَ الْحَيَاةِ. أَمَامَكَ شِبَعُ سُرُورٍ. فِي يَمِينِكَ نِعَمٌ إِلَى الأَبَدِ» (مزامير ١٦ : ١١).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالمسيحُ هو النصيبُ الذي يُشبعُ النفسَ\u003c/p\u003e\n\u003cp\u003eأولئكَ الذينَ رأوا اللهَ بوضوحٍ أكبرَ في وجهِ المسيحِ، وتذوَّقُوهُ بملءِ كيانِهِم، يخبرونَنا بشيءٍ من هذهِ الخبرةَ. يفتحُ \"جوناثان إدواردز\" نافذةً على نفسِهِ وعلى معنى الإنجيلِ بهذهِ الكلماتِ المملوءة بالبهجة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eإنَّ الذينَ يملكونَ المسيحَ، يملكونَ نصيباً يُشبعُ النفسَ. إنَّهم يملكونَ أصدقَ اللذاتِ والتعزياتِ. هنا توجدُ السعادةُ اللائقةُ بالنفسِ، وهي الأقلُّ عُرضةً للحوادثِ والتغييرِ... هنا يوجدُ أفضلُ توظيفٍ للفهمِ... إنَّ الذينَ يملكونَ المسيحَ يملكونَ غنًى أفضلَ وأعظمَ من الآخرينَ... كرامةً أفضلَ... لذاتٍ أفضلَ بكثيرٍ من البشرِ الحسيِّينَ. إنَّ الأفراحَ هنا أكثرُ دقّةً في بهائها ممَّا تمتَّعَ بهِ أعظمُ \"إبيقوريٍّ\" على الإطلاقِ. [فلا توجدُ] لذاتٌ مثلَ تلكَ التي تأتي باستناراتِ روحِ المسيحِ، واكتشافاتِ جمالِ المسيحِ، وإعلاناتِ محبتهِ [٢].\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا هو السببُ في أنَّ يسوعَ قالَ إنَّ الأنقياءَ هم الذين نالوا الغبطة—لأنَّهم «يُعَايِنُونَ اللهَ» (متى ٥ : ٨). وهو السببُ الذي جعلَ داودَ يقولُ: «وَاحِدَةً سَأَلْتُ مِنَ الرَّبِّ وَإِيَّاهَا أَلْتَمِسُ: أَنْ أَسْكُنَ فِي بَيْتِ الرَّبِّ كُلَّ أَيَّامِ حَيَاتِي، لِكَيْ أَنْظُرَ إِلَى جَمَالِ الرَّبِّ، وَأَتَفَرَّسَ فِي هَيْكَلِهِ» (مزامير ٢٧ : ٤). إنَّ تأمُّلَ جمالِ اللهِ كانَ دائمًا هو الرغبةَ الأسمى لأولئكَ الذينَ يعرفونَهُ معرفةً عميقةً.\u003c/p\u003e\n\u003cp\u003eالمديحُ للأنا هو كالجنسِ للجسدِ\u003c/p\u003e\n\u003cp\u003eخلاصةُ هذا القولِ هي أنَّ محبةَ اللهِ وإنجيلَ اللهِ يتمحورانِ جذريّاً حولَ اللهِ. اللهُ يحبُّنا بإعطائِهِ ذاته لنا لنتمتَّعَ بها. الإنجيلُ هو بشارةٌ صالحةٌ لأنَّهُ يعلنُ لنا أنَّ اللهَ قد عَمِلَ في المسيحِ لا لمجرَّدِ أنْ نملكِ السماءَ، بل لنملكِ اللهَ. «كُلُّ مَنْ... لاَ يَثْبُتُ فِي تَعْلِيمِ الْمَسِيحِ فَلَيْسَ لَهُ اللهُ» (٢ يوحنا ٩). إنَّ أعظمَ صلاحٍ في الإنجيلِ هو أنْ \"نملكِ اللهَ\" ككنزِنا إلى الأبدِ. إنَّ محبةَ اللهِ التي تتمحورُ حولَ اللهِ هي غريبةٌ عن البشرِ الذين سقطوا، ولا سيّما أولئكَ الذينَ، مثلَ معظمِنا، تشبَّعُوا لعقودٍ بفكرة \"تقديرِ الذاتِ\".\u003c/p\u003e\n\u003cp\u003eلقد امتصصنَا تعريفاً للمحبةِ يجعلُنا نحنُ المركزَ. أي أنَّنا نشعرُ بأنَّنا محبوبونَ عندما يعظّمُ أحدٌ شأنَنَا. وهكذا، فإنَّ التعريفَ البشريَّ الطبيعيَّ للمحبةِ هو \"تعظيمُ شأنِ الشخصِ\". والسببُ الرئيسيُّ وراءَ شعورِنا بأنَّ هذا هو الحبُّ هو أنَّهُ من الجميلِ جدّاً أنْ يُعظَّمَ شأنُنا. المشكلةُ هي أنَّ هذا الشعورَ جميلٌ بناءً على أُسسٍ طبيعيّةٍ محضٍة. لا يوجدُ شيءٌ روحيٌّ فيهِ. فلا حاجةَ لأيِّ تغييرٍ فينَا لنختبرَ هذا النوعَ من \"الحبِّ\". إنَّ المديحَ للأنا هو كالجنسِ للجسدِ؛ لا يمكنُ للأمورِ أنْ تصبحَ أفضلَ من ذلكَ—طالما أنَّنا ميتونَ روحيّاً. إنَّ أساسَ الحبِّ الطبيعيِّ في نهايةِ المطافِ هو \"أنا\"، وليسَ اللهَ.\u003c/p\u003e\n\u003cp\u003eعندما يتديَّنُ الذين لا يؤمنون\u003c/p\u003e\n\u003cp\u003eالأمرُ المذهلُ هو أنَّ الناسَ في تلكَ الحالةِ يمكنُ أنْ يصبحوا متديِّنينَ دونَ أنْ يختبروا التجديدَ. أي أنَّهم ينضمونَ إلى الكنائسِ ويبدؤونَ في قراءةِ الكتابِ المقدسِ والقيامِ بأمورٍ دينيّةٍ، دونَ أيِّ تغييرٍ في أساسِ سعادتِهِم. فلا تزالُ \"ذواتهُم\" هي الأساسُ. إنَّهم هم أساسُ فرحِهِم. وتُصبحُ صياغةُ \"تعظيمُ شأنِ الشخصِ\" هي تعريفَ الحبِّ الذي يحملُونَهُ معهم إلى الكنيسةِ. وبناءً على ذلكَ، فإنَّ كلَّ ما يُغذي حاجتَهُم لتعظيمِ شأنِهم يُعتبرُ حبّاً. وبعضُ الكنائسِ قد ضلَّتْ كثيراً في لاهوتِها لدرجةِ أنَّها تُغذي تلكَ الحاجةَ وتسمِّيها حبّاً. إنَّهم يفسِّرونَ كلَّ المشاعرِ الطيّبةِ في الكنيسةِ على أنَّها نابعةٌ من نعمةِ اللهِ، بينما في الواقعِ يمكنُ للمبادئِ الطبيعيّةِ أنْ تُفسِّرَ معظمَها. قد لا تقومُ كنائسُ أخرى بتغذيةِ التوقِ إلى تعظيمِ الشأنِ، لكنَّ الذين لم يتجددوا قد يفسِّرونَ كلَّ ما يحدثُ من خلالِ تلكَ العدسةِ.\u003c/p\u003e\n\u003cp\u003eكيفَ يبتهجُ المرؤون باللهِ\u003c/p\u003e\n\u003cp\u003eلا يوجدُ شيءٌ من هذا روحيّاً؛ بل هو طبيعيٌّ بَحْتٌ. لقد أُعيدَ تفسيرُ اللهِ ليناسبَ الجوانب الساقطةَ من الأنانيةِ البشريّةِ. ويصعبُ رصدُ هذا الأمرِ لأنَّ الإنسانَ قادرٌ على القيامِ بالعديدِ من الأعمالِ الصالحةِ وهو في وَهَجِ المديحِ البشريِّ. بعبارةٍ أخرى، يمكنُ بناءُ أنظمةٍ كاملةٍ من \"المسيحيةِ الكاذبةِ\" على صُورٍ مشوَّهةٍ لمحبةِ اللهِ وإنجيلِ اللهِ. وقد تعلَّمَ \"جوناثان إدواردز\" ذلكَ بمرارةِ نفسِهِ بينما كانَ يدرسُ تحوُّلاتِ الرياءِ في تَبِعَاتِ \"النهضةِ العظيمةِ\":\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eهذا هو... الفارقُ... بينَ فرحِ المُرائي وفرحِ القدّيسِ الحقيقيِّ. إنَّ [المُرائيَ] يبتهجُ بنفسِهِ؛ فالأنا هي الأساسُ الأولُ لفرحِهِ؛ أما [القدّيسُ الحقيقيُّ] فيبتهجُ باللهِ... فالقدّيسونَ الحقيقيونَ لديهم عقولٌ، في المقامِ الأولِ، مسرورةٌ ومبتهجةٌ بما لا يُوصفُ بالأفكارِ العذبةِ عن طبيعةِ أمورِ اللهِ المجيدةِ والمحبوبةِ. وهذا هو نبعُ كلِّ فرحهم، وزبدةُ كلِّ لذاتِهِم... أما تبعيّةُ عواطفِ المُرائينَ فهي بترتيبٍ عكسيٍّ: إنَّهم يبتهجونَ أولاً... بأنَّ اللهَ قد عظَّمَ شأنَهُم بهذا القدرِ؛ ثمَّ بناءً على ذلكَ الأساسِ، يبدو اللهُ لهم، نوعاً ما، محبوباً [٣].\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eاللهُ، بمعنى ما، يُعظِّمُ شأنَنا\u003c/p\u003e\n\u003cp\u003eسنرى لاحقاً في هذا الفصلِ أنَّ هناكَ معنًى يُعظِّمُ فيهِ اللهُ حقّاً شأنَ شعبِهِ. ولكنَّ الفرقَ هو أنَّهُ بالنسبةِ للأشخاصِ الذين لم يهتدوا، فإنَّ تعظيمَ اللهِ لشأنِهِم هو بالضبطِ أساسُ فرحِهِم. القضيةُ ليستْ مجردَ ما إذا كانَ اللهُ يرضى عن شعبِهِ أو حتى يمدحُهُم (وهو ما يفعلُهُ)؛ بل القضيةُ هي: أينَ يسكنُ أساسُ فرحِنا؟ ما هو أساس سعادتِنا؟ هل هو أنفسُنا أم هو اللهُ؟\u003c/p\u003e\n\u003cp\u003eالتجديدُ: التحطيمُ الرحيمُ للفرحِ الأدنى\u003c/p\u003e\n\u003cp\u003eالتجديدُ الذي ينتمي للمسيحِ هو الإفاقةُ الروحيّةُ لنفوسِنا لرؤيةِ مجدِ اللهِ كأساسٍ لفرحِنا. التجديدُ هو الاكتشافُ الروحيُّ بأنَّ كونَنا محبوبينَ من اللهِ ليسَ هو المصادقةَ الإلهيّةَ على شغفِنا بتعظيمِ الذاتِ. في الواقعِ، كونُنا محبوبينَ من اللهِ هو التحطيمُ الرحيمُ لهذا الشغفِ. وهذا التحطيمُ ليسَ غايةً في ذاتِهِ، بل هو لإفساحِ المجالِ للاختبارِ الفائقِ للطبيعةِ بأنْ نكونَ محبوبينَ حقّاً من اللهِ—أيْ أنْ يُمكِّنَنا هو من التمتُّعِ بتعظيمِ اللهِ كغايةٍ في حدِّ ذاتِهِ. إنَّ كونَ المرءِ محبوباً من اللهِ هو الاستبدالُ الرائعُ لـ \"الأنا\" كأساسٍ لفرحِنا. وفي مكانِ \"الأنا\" يأتي مجدُ اللهِ.\u003c/p\u003e\n\u003cp\u003eاللهُ يستخدمُ النصوصَ لرفعِ البرقعِ\u003c/p\u003e\n\u003cp\u003eولكنْ يبدو أنَّ التعريفَ الذي يركزُ على الإنسانِ كمحور للمحبةِ الإلهيّةِ قد تعمَّقَ جدّاً، لدرجةِ أنَّ الكثيرينَ ببساطةٍ لا يستطيعونَ رؤيتَهُ بطريقةٍ أخرى. وبالفعلِ، من المستحيلِ رؤيتُهُ حتى يرفعَ المسيحُ البرقعَ ونصبحَ قادرينَ على رؤيةِ مجدِ اللهِ كأعظمِ كنزٍ لنا. عندها، لا يصبحُ من المنطقيِّ فقط أنَّ محبتَهُ هي عطيّةُ ذاتهِ، بل إنَّنا نختبرُ ذلكَ. اللهُ يستخدمُ وسائلَ لرفعِ البرقعِ، وإحدى تلكَ الوسائلِ هي الكتابُ المقدسُ. إحدى هذهِ النصوصِ هي قصةُ مَرَضِ لعازرَ وموتِهِ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَكَانَ إِنْسَانٌ مَرِيضاً وَهُوَ لَعَازَرُ... فَأَرْسَلَتِ الأُخْتَانِ إِلَيْهِ قَائِلَتَيْنِ: يَا سَيِّدُ، هُوَذَا الَّذِي تُحِبُّهُ مَرِيضٌ. فَلَمَّا سَمِعَ يَسُوعُ قَالَ: هَذَا الْمَرَضُ لَيْسَ لِلْمَوْتِ، بَلْ لأَجْلِ مَجْدِ اللهِ، لِيَتَمَجَّدَ ابْنُ اللهِ بِهِ... وَكَانَ يَسُوعُ يُحِبُّ مَرْثَا وَأُخْتَهَا وَلَعَازَرَ. فَلَمَّا سَمِعَ أَنَّهُ مَرِيضٌ مَكَثَ حِينَئِذٍ فِي الْمَوْضِعِ الَّذِي كَانَ فِيهِ يَوْمَيْنِ» (يوحنا ١١ : ١ - ٦).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالتوقيتُ الغريبُ لمحبةِ المسيحِ\u003c/p\u003e\n\u003cp\u003eأولُ أمرٍ مذهلٍ في هذا النصِّ هو أنَّ يسوعَ لم يغادرْ على الفورِ لكي يصلَ في الوقتِ المناسبِ لشفاءِ لعازرَ. «مَكَثَ... فِي الْمَوْضِعِ الَّذِي كَانَ فِيهِ يَوْمَيْنِ» (الآية ٦). بعبارةٍ أخرى، لقد تأخَّرَ عمداً وتركَ لعازرَ يموتُ. والأمرُ الثاني المذهلُ هنا هو أنَّ هذا التأخيرَ وُصِفَ بأنَّهُ نتيجةُ محبةِ يسوعَ لأصدقائِهِ. لاحظْ كلمةَ \"إذًا\" [٤] في بدايةِ الآيةِ ٦: «وَكَانَ يَسُوعُ يُحِبُّ مَرْثَا وَأُخْتَهَا وَلَعَازَرَ. إذًا... مَكَثَ... يَوْمَيْنِ». يسوعُ تركَ لعازرَ يموتُ لأنَّهُ كانَ يحبُّهُ ويحبُّ أختيهِ. وتفسيرُهُ يتكونُ من جزأينِ: أولاً، بتركِ لعازرَ يموتُ من أجلِ إقامتِهِ من الأمواتِ، فإنَّ غايتَهُ هي إظهارُ مجدِ اللهِ الآبِ واللهِ الابنِ. ثانياً، في هذا الإعلانِ المُكلفِ لمجدِهِ، سيكونُ محبّاً لهذهِ العائلةِ.\u003c/p\u003e\n\u003cp\u003eمحبةُ المسيحِ غيرُ المفهومةِ\u003c/p\u003e\n\u003cp\u003eكثيرونَ اليومَ قد يصفونَ يسوعَ بالقسوةِ وانعدامِ المحبةِ لتركِهِ لعازرَ يموتُ. المحبةُ هي القيامُ بكلِّ ما تحتاجُ إلى فعلِهِ لمساعدةِ الناسِ على رؤيةِ وتذوُّقِ مجدِ اللهِ في المسيحِ إلى أبدِ الآبدينَ. المحبةُ تُبقي اللهَ هو المركزَ. يسوعُ هو الكائنُ الوحيدُ في الكونِ الذي يُعدُّ تعظيمُهُ لنفسِهِ هو أسمى فضيلةٍ وأكثرَ عملٍ محبٍّ؛ لأنَّهُ هو اللهُ. لذلكَ، فإنَّ أفضلَ عطيّةٍ يمكنُ أنْ يُعطيَها هي إعلانُ نفسِهِ. المحبةُ تعني مساعدةَ الناسِ على رؤيةِ وتذوُّقِ المسيحِ إلى الأبدِ.\u003c/p\u003e\n\u003cp\u003eكيفَ يحبُّنا المسيحُ بصلاةِ تعظيمِ المسيحِ\u003c/p\u003e\n\u003cp\u003eيؤكدُ يسوعُ أنَّنا على المسارِ الصحيحِ هنا بالصلاةِ من أجلِنا في يوحنا ١٧ لكي يُمجّدَهُ اللهُ، ولكي نرى نحنُ مجدَهُ. صلاتُهُ هي عملُ محبةٍ. لذلكَ يصلي قائلاً:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَيُّهَا الآبُ... مَجِّدِ ابْنَكَ لِيُمَجِّدَكَ ابْنُكَ أَيْضاً... وَالآنَ مَجِّدْنِي أَنْتَ أَيُّهَا الآبُ عِنْدَ ذَاتِكَ بِالْمَجْدِ الَّذِي كَانَ لِي عِنْدَكَ قَبْلَ كَوْنِ الْعَالَمِ» (يوحنا ١٧ : ١، ٥).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eرغمَ غرابةِ الأمرِ، فإنَّ محبتَهُ لنا تفيضُ في صلاةٍ لكي يُمجَّدَ هو نفسُهُ. إنَّ رؤيةَ مجدِ اللهِ في المسيحِ هي أسمى عطيّةٍ وأعظمُ لذةٍ نحنُ قادرونَ عليها. في يوحنا ١٧ : ٢٤، يوضحُ يسوعُ أنَّهُ يصلي من أجلِ مجدِهِ الخاصِّ لكي نتمكَّنَ نحنُ من رؤيةِ مجدِهِ. «أَيُّهَا الآبُ أُرِيدُ أَنَّ هؤُلاَءِ الَّذِينَ أَعْطَيْتَنِي يَكُونُونَ مَعِي حَيْثُ أَكُونُ أَنَا، لِيَنْظُرُوا مَجْدِي».\u003c/p\u003e\n\u003cp\u003eالتقابلُ غيرُ المنصفِ\u003c/p\u003e\n\u003cp\u003eالسؤالُ الذي ينبغي أنْ نطرحَهُ على أنفسِنا هو هذا: هل نشعرُ بأنَّنا محبوبونَ من اللهِ لأنَّ اللهَ يُعظِّمُ شأنَنا، أم لأنَّ اللهَ، بتكلفةٍ باهظةٍ تحمَّلَها هو، قد عَمِلَ كلَّ ما يلزمُ لكي نتمتَّعَ نحنُ بتعظيمِ شأنِهِ إلى الأبدِ؟ هناكَ معنًى يُعظِّمُ فيهِ اللهُ حقّاً شأنَنا. ولكنَّ الإجابةَ على هذا السؤالِ ستقودُنا إلى تأمُّلِنَا النهائيةِ حولَ معنى \"التمجيدِ\".\u003c/p\u003e\n\u003cp\u003eكيفَ عظَّمَ اللهُ شأنَنا؟\u003c/p\u003e\n\u003cp\u003eالطريقةُ التي عظَّمَ بها اللهُ شأنَنا هي خَلْقُنا على صورتِهِ. ثمَّ بعدَ السقوطِ، يسعى لاستعادةِ تلكَ الصورةِ والتحوُّلِ إلى التشبُّهِ بالابنِ المتجسِّدِ. ويُطلقُ بولسُ على ما سيحدثُ لنا اسمَ \"التمجيدِ\": «وَالَّذِينَ بَرَّرَهُمْ، فَهؤُلاَءِ مَجَّدَهُمْ أَيْضاً» (رومية ٨ : ٣٠). سيكونُ المجدُ ساطعاً لدرجةٍ لا تُحتملُ، لأنَّ «الأَبْرَارُ يُضِيئُونَ كَالشَّمْسِ فِي مَلَكُوتِ أَبِيهِمْ» (متى ١٣ : ٤٣).\u003c/p\u003e\n\u003cp\u003eسنرى المجدَ، وسنكونُ مُمَجدين\u003c/p\u003e\n\u003cp\u003eبهذا المعنى، إذن، يمكنُنا التحدُّثُ عن تعظيمِ اللهِ لشأنِنا. سنرى جمالَ اللهِ، وسنعكسُ جمالَ اللهِ. لقد صاغَ \"جوناثان إدواردز\" ذلكَ على النحوِ التالي: ما أسعدَ تلكَ المحبةَ التي يوجدُ فيها تقدُّمٌ أبديٌ في كلِّ هذهِ الأمورِ، حيثُ تُكتشفُ جمالاتٌ جديدةٌ باستمرارٍ، وجمالاً أكثرُ فأكثرَ، وفيها سنزدادُ جمالاً نحنُ أنفسُنا إلى الأبدِ [٧]. وهذا يعني أنَّ حقيقةَ ٢ كورنثوس ٣ : ١٨ لا تنقطعُ أبداً. «نَاظِرِينَ مَجْدَ الرَّبِّ... نَتَغَيَّرُ إِلَى تِلْكَ الصُّورَةِ عَيْنِهَا، مِنْ مَجْدٍ إِلَى مَجْدٍ».\u003c/p\u003e\n\u003cp\u003eيجبُ أنْ نكونَ مثلَ المسيحِ لكي نرى مِلءَ مجدِهِ\u003c/p\u003e\n\u003cp\u003eإنَّ مصيرُنا في أنْ نكونَ مِثلَ المسيحِ يتعلَّقُ في نهايةِ المطافِ بكونِنا مُهيَّئينَ ومُمكَّنينَ لرؤيةِ وتذوُّقِ مجدِ سموِّهِ. يجبُ أنْ نملكِ صِفَاتَهُ ومِثالَهُ لكي نعرفَهُ ونراهُ ونحبَّهُ ونعجبَ بهِ بالطريقةِ التي ينبغي. بإضافةِ الكلماتِ: «لِيَكُونَ هُوَ بِكْراً بَيْنَ إِخْوَةٍ كَثِيرِينَ» (رومية ٨ : ٢٩)، يوضحُ بولسُ أنَّ المسيحَ هو دائمًا وأبداً الأسمى فوقَ إخوتِهِ. إنَّ رؤيةَ وتذوُّقَ وإظهارَ سيادةِ المسيحِ هي الغايةُ النهائيةُ.\u003c/p\u003e\n\u003cp\u003eاختبارٌ شخصيٌّ لما هو نهائيٌّ في قلوبِنا\u003c/p\u003e\n\u003cp\u003eهل أريدُ أنْ أكونَ مقدَّساً مِثلَ المسيحِ لكي أُمدحَ بكوني مقدَّساً، أم لكي أتحرَّرَ من كلِّ الموانعِ غيرِ المقدسةِ التي تمنعُني من رؤيةِ وتذوُّقِ قداسةِ المسيحِ؟ كلُّ شيءٍ في رومية ٨ : ٢٩ - ٣٠ قد صمَّمهُ اللهُ في نهايةِ المطافِ ليسَ ليعظِّمَ شأنَنا، بل ليحرِّرَنا ويُهيِّئَنا للتمتُّعِ برؤيةِ وتعظيمِ شأنِ المسيحِ إلى الأبدِ.\u003c/p\u003e\n\u003cp\u003eليستِ الصيرورةُ والرؤيةُ في النهايةِ، بل التلذذ والإعلان\u003c/p\u003e\n\u003cp\u003eأليسَ من الأفضلِ القولُ إنَّ الفائدةَ النهائيةَ للإنجيلِ ليستِ الصيرورةَ ولا الرؤيةَ، بل التلذذ والإعلان — أي التلذذ بـ «مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ» وإعلانهُ (٢ كورنثوس ٤ : ٦)؟ الصيرورةُ والتأمُّلُ هما وسيلةٌ لغايةِ التلذذ والإعلان. والعبارةَ الختاميّةَ لصلاةِ يسوعَ في يوحنا ١٧ : ٢٦ هي وعدٌ يسترعي الانتباهَ إلى اللذةِ التي سنأخذُها: «لِيَكُونَ فِيهِمِ الْحُبُّ الَّذِي أَحْبَبْتَنِي بِهِ، وَأَكُونَ أَنَا فِيهِمْ». الآبُ لديهِ فرحٌ غيرُ محدودٍ بمجدِ ابنِهِ، ونحنُ موعودونَ بنصيبٍ في هذا الفرحِ.\u003c/p\u003e\n\u003cp\u003eعرضُ مجدِ اللهِ سيكونُ روحيّاً وجسديّاً\u003c/p\u003e\n\u003cp\u003eداخليّاً، عاطفةُ اللذةِ نفسُها تُعظِّمُ قيمةَ اللهِ؛ فاللهُ يتمجَّدُ فينَا عندما نكونُ نحنُ مستمتعين بهِ. خارجيّاً، تتدفَّقُ الأعمالُ التي تُعظِّمُ المسيحَ من هذا التمتُّعِ. سيكونُ الأمرُ روحيّاً وجسديّاً؛ فكلٌّ من فرحِ قلبِنا وأعمالِ أجسادِ قيامتِنا ستُعرِّفُ بمجدِ اللهِ [٩].\u003c/p\u003e\n\u003cp\u003eموجةٌ لا تنتهي من الإعلانِ المتزايدِ للمجدِ الإلهيِّ\u003c/p\u003e\n\u003cp\u003eالويلُ لنا إنْ تحدَّثنا عن وجودِنا من أجلِ ذاتِها. إنَّ الصلاحَ النهائيَّ ليسَ الإعجابَ بالذاتِ، بل هو القدرةُ على رؤيةِ مجدِ اللهِ دونَ تلاشٍ، والقدرةُ على التلذذ بمجدِ المسيحِ بنفسِ لذةِ اللهِ الآبِ بابنِهِ. وتتحرَّرُ موجةٌ من إعلانِ المجدِ الإلهيِّ في القدّيسينَ وفي الخليقةِ تستمرُّ وتنمو إلى كلِّ الأبديّةِ. وهكذا ستستمرُّ موجةُ إعلانِ غنى مجدِ اللهِ المتناميةُ باستمرارٍ إلى أبدِ الآبدينَ. وسيتَّضحُ أنَّ الصلاحَ العظيمَ والنهائيَّ للإنجيلِ هو اللهُ [١٠].\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003e[الهوامش]\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e[١] بنيامين ب. وارفيلد، \"السؤال الأول من كتيب تعليم وستمنستر الأصغر\"، المجلد ٦ (جراند رابيدز، ميشيغان: بيكر، ٢٠٠٣)، ٣٧٩ - ٤٠٠.\u003c/p\u003e\n\u003cp\u003e[٢] جوناثان إدواردز، \"الافتخار بالمخلص\"، المجلد ١٤ (نيو هيفن، كونيتيكت: مطبعة جامعة ييل، ١٩٩٧)، ٤٦٧.\u003c/p\u003e\n\u003cp\u003e[٣] جوناثان إدواردز، \"المشاعر الدينية\"، المجلد ٢ (١٩٥٩)، ٢٤٩ - ٢٥٠.\u003c/p\u003e\n\u003cp\u003e[٤] د. أ. كارسون، \"إنجيل يوحنا\" (١٩٩١)، ٤٠٧.\u003c/p\u003e\n\u003cp\u003e[٥] جُون بَايبَر، \"مطعون بالكلمة\" (سيسترز، أوريغون: مولتنوماه، ٢٠٠٣)، ١٣ - ١٥.\u003c/p\u003e\n\u003cp\u003e[٦] توم ستيلر: صديق وزميل المؤلف الذي ساهم في موازنة الطرح اللاهوتي لهذا الفصل.\u003c/p\u003e\n\u003cp\u003e[٧] جوناثان إدواردز، \"المتنوعات\"، المجلد ١٣ (١٩٩٤)، ٣٣٦ - ٣٣٧.\u003c/p\u003e\n\u003cp\u003e[٨] جيمس بيتجرو بويس، \"خلاصة اللاهوت النظامي\" (١٨٨٧)، ٤٧٥ - ٤٧٦.\u003c/p\u003e\n\u003cp\u003e[٩] جوناثان إدواردز، \"المتنوعات\"، المجلد ١٨ (٢٠٠٠)، ٣٥١.\u003c/p\u003e\n\u003cp\u003e[١٠] جُون بَايبَر، \"المجاهدة لأجل كلينا\" (٢٠٠٦).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj1hi4s8uK_yUF9097v6OR74NJgCyfQAbJmJdJCKA7mBOV8s207u1gqk3WhqLHbwH8HpKapweXhOAkjol-WJk6zxx1VVSFHDByQ4nIC3YnnrMoX5kpuge7My1vwN2LqMwoSrQu4Ma2BpeFZ1_lXKUea5hv5xpEI_-o-ktK-k1rvyNyU3nwKdgogj21H89M/s2752/11.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj1hi4s8uK_yUF9097v6OR74NJgCyfQAbJmJdJCKA7mBOV8s207u1gqk3WhqLHbwH8HpKapweXhOAkjol-WJk6zxx1VVSFHDByQ4nIC3YnnrMoX5kpuge7My1vwN2LqMwoSrQu4Ma2BpeFZ1_lXKUea5hv5xpEI_-o-ktK-k1rvyNyU3nwKdgogj21H89M/s600/11.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"39:Ta470,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل العاشر: الإنجيل — عطيةُ اللهِ ذاته فوق وفي كافةِ عطاياه السَّارّة\u003c/h2\u003e\n\u003cp\u003eهناك الآلافُ من بركاتِ الإنجيل التي قد اشتراها دمُ المسيح للذين يؤمنون. وقد رأينا ذلك في (رومية ٨ : ٣٢) في الفصل السابق: «اَلَّذِي لَمْ يُشْفِقْ عَلَى ابْنِهِ، بَلْ بَذَلَهُ لأَجْلِنَا أَجْمَعِينَ، كَيْفَ لاَ يَهْبُنَا أَيْضاً مَعَهُ كُلَّ شَيْءٍ؟». لقد رأينا أنَّ \"كلَّ شيء\" تشملُ الموتَ والاضطهادَ والأشواكَ في الجسد. ولكنَّ \"كلَّ شيء\" تشملُ أيضاً الأشياءَ السارةَ. وهذا هو ما ننتقلُ إليه في هذا الفصل. ويستمرُّ السؤالُ: كيف ترتبطُ عطايا الله الصالحةُ بالله ذاته بوصفه العطيةَ العظمى للإنجيل؟\u003c/p\u003e\n\u003cp\u003eكافةُ الاستجاباتِ للصلاة هي عطايا اشتراها الإنجيلُ بدم المسيح\u003c/p\u003e\n\u003cp\u003eإنَّ أحدَ أقوى التحذيرات الكتابية بعدمِ استخدام إله الإنجيل فقط للحصول على عطايا إنجيله يأتي في العلاقةِ مع الصلاة. كان هذا وثيقَ الصلة بي وبزوجتي بشكلٍ خاصٍّ بينما كنا نصارعُ بعضَ الأمور الصعبة في حياتنا أثناء كتابتي لهذا الكتاب. كنا نريدُ من الله أن يفعلَ شيئاً وكنا نصلي بدموعٍ ولجاجةٍ عظيمةٍ. ولكن جاءت لحظةٌ شعرتُ فيها أنَّنا لا نصلي بطريقةٍ تكرمُ الله. لذا كتبتُ ملاحظةً لزوجتي تعبرُ عن جزءٍ من التحذير الكتابي الذي ذكرتُه للتو: إنَّ الشعورَ القويَّ الذي يراودني الآن عندما استيقظتُ مبكراً ولا أستطيع العودةَ للنوم هو أنَّ الربَّ يريدنا أن نثقَ به. لقد بدا وكأنَّه يوبخني لأنَّ توسلاتي لم يكن يملأها الإيمانُ. لقد بدأتُ في الإلحاح المزعج. ليس من الجيدِ الإلحاحُ على الله. لم أكن مستسلماً وأسلمُ الحملَ إليه. كنتُ أعامله بالطريقةِ التي عاملتُكِ بها أحياناً في التوسلِ لأجل شيءٍ ما بنبرةٍ مفادها أنني إذا لم أحصلْ عليه فسأكونُ غيرَ سعيدٍ بصفةٍ دائمةٍ. إنَّ هذا هو عدمُ الإيمانٍ، لأنَّه يرفعُ عطيةَ الله فوق الله. لذا تشجعتُ بهذه الأفكار: «أَلْقِ عَلَى الرَّبِّ حِمْلَكَ»، وثقَ في الوعدِ بأنه «هُوَ يَعُولُكَ. لاَ يَدَعُ الصِّدِّيقَ يَتَزَعْزَعُ إِلَى الأَبَدِ» (مزمور ٥٥ : ٢٢). ولإرشادنا، أخذتُ (مزمور ٢٥ : ٨): «صَالِحٌ وَمُسْتَقِيمٌ هُوَ الرَّبُّ، لِذَلِكَ يُعَلِّمُ الْخُطَاةَ الطَّرِيقَ». هذا هو أحدُ المؤهلات التي آتي بها بثقةٍ إلى صلواتي: إنني خاطئٌ.\u003c/p\u003e\n\u003cp\u003eوالآن، كيف توضحُ هذه التجربةُ وتحذيرُ الكتاب المقدس ضدَّ استخدام الله للحصول على عطاياه ما هي العطيةُ العظمى للإنجيل؟ إنَّ استجابات الصلاة هي عطايا اشتراها الإنجيلُ بدم المسيح. تعلمنا (عبرانيين ٤ : ١٦) أنَّنا نستطيعُ أن «نَتَقَدَّمْ بِثِقَةٍ إِلَى عَرْشِ النِّعْمَةِ لِكَيْ نَنَالَ رَحْمَةً وَنَجِدَ نِعْمَةً عَوْناً فِي حِينِهِ» لأنَّ «لَنَا رَئِيسُ كَهَنَةٍ عَظِيمٌ» (عبرانيين ٤ : ١٤). والسببُ في أنَّ يسوع المسيح، الذي هو رئيسُ كهنتنا، يجعلُ استجابات الصلاة ممكنةً هو أنَّه ليس مثلَ كهنة العهد القديم:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي لَيْسَ لَهُ اضْطِرَارٌ كُلَّ يَوْمٍ مِثْلُ رُؤَسَاءِ الْكَهَنَةِ أَنْ يُقَدِّمَ ذَبَائِحَ أَوَّلاً عَنْ خَطَايَا نَفْسِهِ ثُمَّ عَنْ خَطَايَا الشَّعْبِ، لأَنَّهُ فَعَلَ هَذَا مَرَّةً وَاحِدَةً، إِذْ قَدَّمَ نَفْسَهُ» (عبرانيين ٧ : ٢٧).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eولهذا السبب فإنَّ كلَّ مواعيد الله هي \"نعم\" في المسيح، ولهذا السبب نصلي باسم يسوع. «لأَنْ مَهْمَا كَانَتْ مَوَاعِيدُ اللهِ فَهُوَ فِيهِ \"النَّعَمْ\" وَفِيهِ \"الآمِينُ\"، لِمَجْدِ اللهِ، بِوَاسِطَتِنَا» (٢ كورنثوس ١ : ٢٠). لذلك قال يسوع: «اخْتَرْتُكُمْ وَأَقَمْتُكُمْ لِتَذْهَبُوا وَتَأْتُوا بِثَمَرٍ... لِكَيْ يُعْطِيَكُمُ الآبُ كُلَّ مَا طَلَبْتُمْ بِاسْمِي» (يوحنا ١٥ : ١٦). إنَّ الصلاة المستجابة مبنيةٌ على شفاعة المسيح الكهنوتية لأجلنا، وتلك الشفاعةُ مبنيةٌ على الدم الذي سفكه ليزيلَ خطايانا ويطلقَ فيضَ النعمةِ التي تستجيب للصلاة. لذلك، فإنَّ كلَّ البركات التي ننالها كاستجابةٍ للصلاة، نحن مدينون بها لإنجيل المسيح المصلوب والقائم. إنَّها ليست بركاتٍ تلقائيةً، بل هي التي تُشترى بالدم لخطاةٍ مثلنا.\u003c/p\u003e\n\u003cp\u003eكيف يمكن للصلاة أن تتعامل مع الله كزوج مخدوع\u003c/p\u003e\n\u003cp\u003eالآن يأتي أقوى تحذيرٍ في العهد الجديد ضدَّ جعل الصلاة المكانَ الذي نستخدمُ فيه الله للحصول على عطاياه ولكن ليس لنحصل على الله ذاته. تُطلقُ (يعقوب ٤ : ٢ - ٥) صيحةَ التحذير:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«تَشْتَهُونَ وَلَسْتُمْ تَمْتَلِكُونَ. تَقْتُلُونَ وَتَحْسِدُونَ وَلَسْتُمْ تَقْدِرُونَ أَنْ تَنَالُوا. تُخَاصِمُونَ وَتُحَارِبُونَ وَلَسْتُمْ تَمْتَلِكُونَ، لأَنَّكُمْ لاَ تَطْلُبُونَ. تَطْلُبُونَ وَلَسْتُمْ تَأْخُذُونَ، لأَنَّكُمْ تَطْلُبُونَ رَدِيّاً لِكَيْ تُنْفِقُوا فِي لَذَّاتِكُمْ. أَيُّهَا الزُّنَاةُ وَالزَّوَانِي، أَمَا تَعْلَمُونَ أَنَّ مَحَبَّةَ الْعَالَمِ عَدَاوَةٌ لِلَّهِ؟ فَمَنْ أَرَادَ أَنْ يَكُونَ مُحِبّاً لِلْعَالَمِ، فَقَدْ صَارَ عَدُوّاً لِلَّهِ. أَمْ تَظُنُّونَ أَنَّ الْكِتَابَ يَقُولُ بَاطِلاً: الرُّوحُ الَّذِي حَلَّ فِينَا يَشْتَاقُ إِلَى الْحَسَدِ؟».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلماذا يُسمينا \"زانيات\" عندما نصلي؟ ذلك لأنَّنا نطلبُ من الله أشياءً لننغمسَ في رغباتنا والتي ليست هي رغباتٍ فيه هو. هذا أمرٌ مذهلٌ — أنَّنا في لحظةِ ممارسة أحد أكثر الأفعال تقوى في ديننا، وهي الصلاة، يمكن أن نكون بصدد جعلِ الله \"زوجاً مخدوعاً\". الصورةُ في هذا النص هي أنَّ الله هو عريسنا الذي يفي بعهده وهو الكريمُ في عطائه. فنذهبُ إليه ونطلبُ، مثلاً، ٥٠ دولاراً، فيعطينا إياها. ثم نأخذها ونبتعدُ عنه ونذهبُ إلى نهاية الردهة حيث توجد غرفةُ عشيقنا غير الشرعي. هذه هي الطريقةُ التي ينظرُ بها الله إلى الصلاة التي لا تجعلُ من عبارة «لِيَتَقَدَّسِ اسْمُكَ» صرخةَ القلب في كلِّ طلبةٍ. عندما يقول يعقوبُ في نهاية هذا النص إنَّ الله «يَشْتَاقُ إِلَى الْحَسَدِ عَلَى الرُّوحِ الَّذِي جَعَلَهُ يَسْكُنُ فِينَا»، فإنه يعني: الله يريدُ قلبَك عندما تصلي. الله لن يكون مجردَ مَن يوزع العطايا لأولئك الذين لا يجدون فرحاً في الله ذاته. ما الذي نتعلمه هنا إذن عن الإنجيل؟ أن الإنجيلُ هو الذي اشترى ووعد استجابة كل صلواتنا. ما نتعلمه هو أنَّ هدف الإنجيل ليس بشكلٍ أساسيٍّ إعطاءنا عطايا الله، بل إعطاءنا الله ذاته. كلُّ عطاياه صالحةٌ. ولكن في كلِّ تلك العطايا ومن خلالها، فإنَّ الهدف هو رؤيةُ المزيد من مجد الله والتذوق بالمزيد من كمالاته الأخلاقية الجميلة بشكلٍ غير محدود والمعروضة في الإنجيل.\u003c/p\u003e\n\u003cp\u003eهل يمكن للشكرِ لله أن يكون وثنياً؟\u003c/p\u003e\n\u003cp\u003eماذا لو قال شخصٌ ما: «ربما تكمنُ المشكلةُ في الزوجة التي طلبت ٥٠ دولاراً من زوجها في أنها ليست شاكرة حقاً. ربما مشكلتنا في تعاملنا مع الله والإنجيل هي أنَّنا لسنا ممتنين». حسناً، هذا بالتأكيد جزءٌ من مشكلتنا. ولكنه ليس مشكلتنا الرئيسية. ذلك التشخيصُ لا يذهبُ إلى جذور المشكلة لأنه من الممكن أن نشعر بامتنانٍ حقيقيٍّ لشخصٍ ما من أجل عطيةٍ ما ولا نحب المعطي. لقد رأى جوناثان إدواردز [١] قاع هذه المشكلة بينما كان يدرسُ قلوب الناس في \"اليقظة الكبرى الأولى\". إنه يساعدنا على الحذر من الكيفية التي يمكن للإنجيل أن يُنتج بها شكراً ليس له قيمة أخلاقية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إنَّ الشكر الحقيقي أو الامتنان لله على لطفه معنا، ينبعُ على أساسٍ وُضع من قبل، وهو محبة الله لما هو عليه في ذاته؛ في حين أنَّ الامتنان الطبيعي ليس له مثلُ هذا الأساس السابق. إنَّ تَحرك النعِمة للعاطفة الشاكرة لله، من أجل لطفٍ تمَّ تلقيه، هي دائماً نابعةٌ من مخزونٍ من المحبة موجود بالفعل في القلب، وقد تأسس في المقام الأول على أساسٍ آخر، وهو: سمو الله ذاته» [٢].\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبعبارةٍ أخرى، الامتنانُ الذي يرضي الله ليس في المقام الأول فرحاً بالفوائد التي يعطيها الله. بل يجب أن يتجذرَ الشكرُ الحقيقي في شيءٍ آخر يأتي أولاً — أي الفرح بجمال وسمو شخص الله. إذا لم يكن هذا هو أساسُ امتناننا، فإنه لا يعلو عما يختبره \"الإنسان الطبيعي\"، بمعزلٍ عن الروح والطبيعة الجديدة في المسيح. في تلك الحالة، فإنَّ \"الامتنان\" لله ليس أكثرَ إرضاءً لله من كل المشاعر الأخرى التي يمتلكها غيرُ المؤمنين دون أن يجدوا فرحاً فيه. لن تشعرَ بالإكرام إذا شكرتك كثيراً على عطاياك لي ولكن لم يكن لدي اعتبارٌ عميقٌ وتلقائيٌّ لك كشخصٍ. ستشعرُ بالإهانة، مهما شكرتك على عطاياك. إذا كانت شخصيتك وصفاتك لا تجذبني أو تمنحني فرحاً في التواجد معك، فستشعرُ حينها أنك مجردُ شخص استخدَمه، كأداةٍ للحصول على الأشياء التي أحبها حقاً. هكذا هو الحال مع الله. إذا لم نكن من الذين أُخذوا بجمال شخصيته وصفاته، المعلنة في عمله الذي يخلص، فإنَّ كل إعلاناتنا عن الشكر والامتنان هي مثلُ امتنان الزوجة لزوجها من أجل المال الذي تحصل عليه منه لتستخدمه في علاقتها مع رجلٍ آخر.\u003c/p\u003e\n\u003cp\u003eهل يمكن للشكرِ من أجل الصليب أن يكون وثنياً؟\u003c/p\u003e\n\u003cp\u003eإنه لأمرٌ مذهلٌ أنَّ هذه الوثنيةَ ذاتها تكون صحيحةً أحياناً حتّى عندما يشكرُ الناسُ الله على إرسال المسيح ليموتَ لأجلهم. ربما سمعتَ الناسَ يقولون كم يجب أن نكون شاكرين لموت المسيح لأنه يظهر مقدارَ القيمة التي يضعها الله علينا. بعبارةٍ أخرى، هم شاكرون للصليب كصدى لقيمتنا نحن. فما هو أساسُ هذا الامتنان؟ يسميه جوناثان إدواردز امتنانَ المنافقين. لماذا؟ لأنهم «يفرحون أولاً، ويرتفعون بحقيقة أنَّ الله قد عظم شأنهم؛ ثم بناءً على ذلك الأساس، يبدو [الله] لهم، بنوع ما، محبوباً... إنهم يُسرون إلى أقصى درجة بسماع كم يعظم الله والمسيح من شأنهم. بحيث يكون فرحهم هو في الحقيقة فرح في أنفسهم، وليس في الله» [٣]. إنه لأمرٌ صادمٌ أن يكون أحد أكثر الأوصاف الشائعة اليوم للصليب أنه دليل على مقدار قيمتنا التي يحتفي بها؛ قد يكون هذا في الواقع وصفاً لحب الذات الطبيعي الذي ليس له قيمة روحية. يا ليتنا جميعاً ننتبه لحكمة جوناثان إدواردز هنا. إنه ببساطة يشرح ما يعنيه أن نفعلَ كلَّ شيءٍ — بما في ذلك تقديم الشكر — لمجد الله (١ كورنثوس ١٠ : ٣١). إنه يوضح لنا الغرض من الإنجيل. إنه لأجل مجد الله. والله لا يتمجد إذا كان أساسُ امتناننا للإنجيل هو قيمةُ عطاياه وليس قيمةُ المعطي. إذا لم يكن الامتنانُ للإنجيل متجذراً في مجد الله الكامن تحت عطية الله، فهو وثنيةٌ متخفيةٌ. ليت الله يمنحنا قلباً يرى في الإنجيل إنارةَ معرفةِ مجد الله في وجه المسيح. ليته يمنحنا أن نبتهج به لما هو عليه، لكي يكون كلُّ امتناننا لعطاياه هو صدى لفرحنا بسمو المعطي!\u003c/p\u003e\n\u003cp\u003eلماذا خلقَ الله عالماً مادياً\u003c/p\u003e\n\u003cp\u003eهذا هو جوابي على مائة سؤال حول الأشياء الجيدة التي صنعها الله وأعطاها لنا. إنَّ خلقَ العالم المادي، بما في ذلك أجسادنا بكل حواسها الخمس، كان فكرةَ الله. هو لم يفعل ذلك بشكلٍ أساسيٍّ كتجربةٍ للوقوع في الوثنية، بل بشكلٍ أساسيٍّ كعرضٍ لمجده. «اَلسَّمَاوَاتُ تُحَدِّثُ بِمَجْدِ اللهِ، وَالْفَلَكُ يُخْبِرُ بِعَمَلِ يَدَيْهِ» (مزمور ١٩ : ١). هذا هو القصدُ من مليون نوعٍ من الحيوانات والنباتات، ومليون مجرةٍ. «لأَنَّ كُلَّ خَلِيقَةِ اللهِ جَيِّدَةٌ، وَلاَ يُرْفَضُ شَيْءٌ إِذَا أُخِذَ مَعَ الشُّكْرِ» (١ تيموثاوس ٤ : ٤). نعم، إذا كان الشكرُ متجذراً في رؤية مجد المعطي الذي هو أجدرُ بالإعجاب من كل عطاياه، وهو الذي يشبعنا تماماً في كل عطاياه. أود أن أقول المزيد عن هذا هنا — دور الخليقة في التوسط لنقل مجد الخالق، وتقديم العبادة له. ولكنني خصصت مساحة كبيرة لهذا في فصل بعنوان \"كيفية استخدام العالم في المحاربة لأجل الفرح\" في كتابي \"عندما لا أرغب في الله: كيف تحارب لأجل الفرح\" [٤]. آمل أن تقرأوه، إذا كنتم ترغبون في التعمق في هذه القضية. يكفي أن نقول هنا إنَّ الله خلق \"ما ليس هو الله\". لذلك فمن الجيد أن يوجد ما ليس هو الله. والسببُ في أنَّ الله خلق ما ليس هو الله هو أنَّ هذا كان أفضل طريقة لله ليعرضَ مجده لكائناتٍ أخرى غير ذاته. كان دافعه في ذلك هو في الوقت نفسه حباً لهم وحباً لإعلان مجده. أقول \"في الوقت نفسه\" لأنَّ هذين الأمرين يحدثان في الفعل ذاته. يُعلن الله، ونحن نُحَب. الحب يعطينا ما هو أفضل لنا، وما هو أفضل لنا هو معرفة الله والتمتع به. هو يعرف تماماً كيف يجعلُ ملء مجده معروفاً لتمتعنا. لم يكن ذلك بدون الخليقة المادية. لقد حقق حبه لنا وأعلى نفسه بخلق العالم المادي. وهذا يستمر في الحدوث بينما يعطينا الله عيوناً لترى أنَّ كل الخليقة «تحدث بمجد الله».\u003c/p\u003e\n\u003cp\u003eمجدُ اللهِ في الإنجيل يفوقُ كل مجده في الطبيعة\u003c/p\u003e\n\u003cp\u003eعلاوةً على ذلك، ذهب الله إلى ما هو أبعد من إعلان مجده في الطبيعة وفي الإنسان من خلال العمل الفدائي في العالم المادي بعد السقوط. لم يكن هذا فقط لاستعادة الرؤية المفقودة لله بالنسبة للإنسان، بل لإعلان المزيد من مجده في الإنجيل بشكلٍ هائل عما كان يمكن معرفته لولا السقوط وتاريخ الفداء. كان لجون أوين [٥] رؤية ثاقبة للإعلان الفريد لمجد الله في الإنجيل. كان هذا هو المكان الذي ركز فيه انتباهه بينما كان يستعد للموت ولقاء المسيح وجهاً لوجه:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إنَّ الإعلان المقدم عن المسيح في الإنجيل المبارك هو أكثر سمواً، وأكثر مجداً، وأكثر امتلاءً بأشعة الحكمة والصلاح الإلهي، مما يمكن للخليقة بأكملها والاستيعاب الصحيح لها، لو كان قابلاً للتحقيق، أن تحتويه أو تقدمه. وبدون المعرفة بهذا، فإن عقل الإنسان، مهما افتخر بابتكارات واكتشافات أخرى، يظل ملفوفاً في الظلمة والارتباك» [٦].\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوهكذا في الإنجيل، كما هو الحال مع الخليقة — ولكن أكثر مما في الخليقة — يحدث حب الله لنا وإعلانه لنفسه في الفعل ذاته. إنَّ أسمى فعل للحب هو إعطاء أفضل عطية، وإذا لزم الأمر، بأغلى ثمن، للشخص الأقل استحقاقاً. وهذا هو ما فعله الله. على حساب حياة ابنه، للذين لا يستحقون تماماً، أعطى الله أفضل عطية — إعلان مجد المسيح الذي هو صورة الله. لم يكن أي من هذا ممكناً بدون العالم المادي المخلوق.\u003c/p\u003e\n\u003cp\u003eنحن نستخدمُ العالم للولائم وللصوم\u003c/p\u003e\n\u003cp\u003eلذلك لا يجب أن ننظر إلى العالم المادي على أنه شر. إنه محفوف بالتجارب في هذا الدهر. ولكن الحلَّ ليس التراجع عن العالم. فهذا أمر مستحيل. نحن نأخذ قلبنا الخاطئ معنا دائماً. إنَّ الطريق إلى السماء هو عبارة عن \"نعم\" و\"لا\" متوازنتين كتابياً تجاه العالم الذي صنعه الله. إنَّ الانضباط المسيحي في الصوم والامتياز المسيحي في الولا
