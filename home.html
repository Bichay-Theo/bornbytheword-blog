003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبالمثل، يعزي بطرس في الاصحاح الخامس المؤمنين، لا بالنجاة من دخول الآلام، بل بالنجاة من آثارها المهلكة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَإِلهُ كُلِّ نِعْمَةٍ الَّذِي دَعَانَا إِلَى مَجْدِهِ الأَبَدِيِّ فِي الْمَسِيحِ يَسُوعَ، بَعْدَمَا تَأَلَّمْتُمْ يَسِيرًا، هُوَ يُكَمِّلُكُمْ، وَيُثَبِّتُكُمْ، وَيُقَوِّيكُمْ، وَيُمَكِّنُكُمْ. لَهُ الْمَجْدُ وَالسُّلْطَانُ إِلَى أَبَدِ الآبِدِينَ. آمِينَ.» (١ بطرس ٥: ١٠-١١).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003eالوقوف قدام ابن الإنسان—بالنعمة\u003c/h3\u003e\n\u003cp\u003eوهكذا يُعلّم كل من يسوع وبطرس أن المسيحيين مدعوون لاستخدام وسائل (نشاط ذهني مرن وفعال ويقظ) لأجل إلقاء رجائهم بالتمام على نعمة الله، وبذلك يتمكنون من الوقوف قدام ابن الإنسان عند مجيئه. ونقيض الوقوف قدام ابن الإنسان هو الانفصال عن الأبرار والطرد النهائي من محضر الرب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هكَذَا يَكُونُ فِي انْقِضَاءِ الدَّهْرِ: يَخْرُجُ الْمَلاَئِكَةُ وَيُفْرِزُونَ الأَشْرَارَ مِنْ بَيْنِ الأَبْرَارِ، وَيَطْرَحُونَهُمْ فِي أَتُونِ النَّارِ. هُنَاكَ يَكُونُ الْبُكَاءُ وَصَرِيرُ الأَسْنَانِ» (متى ١٣: ٤٩-٥٠؛ ومقارنة مع ٢٥: ٣١-٤٦).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن تحذيراً كهذا يدعو لليقظة واليقين والرهبة أيضاً إن تُرِكنا لذواتنا ولقدراتنا الخاصة. فبمعزل عن النعمة، يصبح مجيء المسيح الكلي القداسة مرعباً. إذ تتجه أذهاننا نحو كل تقصير ممكن نستشعره في ذلك اليوم. وهو ما قد يزعزع بسهولة محبتنا لظهور الرب. وتأتي إجابة بطرس عن هذا الخطر كتذكير ثمين في قالب وصية رحيمة: «أَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ» (١ بطرس ١: ١٣). نعم، سنحمل معنا تقصيرنا إلى ذلك اليوم الأخير حينما نواجه المسيح. فالكمال بانتظار تحولنا النهائي في ذلك اللقاء عياناً (١ كورنثوس ١٣: ٩-١٢؛ ١ يوحنا ٣: ٢). وإلى ذلك الحين، نحن بحاجة للغفران كل يوم (متى ٦: ١٢؛ فيلبي ٣: ١٢؛ ١ يوحنا ١: ٨-١٠).\u003c/p\u003e\n\u003cp\u003eلذلك، فإن كلمة بطرس الثمينة لمعاونتنا على محبة ظهور الرب هي أن يسوع آتٍ إلينا بالنعمة لا بالإدانة. فالغفران الذي اشتراه بصورة حاسمة على الصليب سيكون صالحاً لنا في ذلك اليوم كصلاحه في كل يوم آخر من حياتنا. ستنتصر النعمة على خطيتنا في ذلك اليوم. وهذا هو السبب في أننا نحب ظهوره.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-1\"\u003e[١]\u003c/a\u003e يُقترح هذا التفسير والترجمة في كتاب روبرت هـ. غوندري، تعليق على العهد الجديد: تفسيرات آية بآية مع ترجمة حرفية (Robert H. Gundry, Commentary on the New Testament: Verseby-Verse Explanations with a Literal Translation, Peabody, MA: Hendrickson, 2010)، ص ٩٣٩.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg9y0az-iBd5ujtD17MpaeiXGrTDHWDAwWdcWLvsiNKBe58xVUJa_tAnyXkX58LTpWlhZotWFlziKvRrWbQH-WVQ15yZYwIP_7zSxLh_IrCBzwfYYM8Iz7iw7iNDC2RLTXEEQ8GxUV-VI87Cb8HFT4Gr-GtcN6_K2gxx6ShIlSjEi9kG6ZAKZL_mMCBkvA/s2752/%D8%A7%D9%84%D9%86%D8%B9%D9%85%D8%A9_%D8%B9%D9%86%D8%AF_%D8%A7%D8%B3%D8%AA%D8%B9%D9%84%D8%A7%D9%86_%D9%8A%D8%B3%D9%88%D8%B9_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD%20%281%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg9y0az-iBd5ujtD17MpaeiXGrTDHWDAwWdcWLvsiNKBe58xVUJa_tAnyXkX58LTpWlhZotWFlziKvRrWbQH-WVQ15yZYwIP_7zSxLh_IrCBzwfYYM8Iz7iw7iNDC2RLTXEEQ8GxUV-VI87Cb8HFT4Gr-GtcN6_K2gxx6ShIlSjEi9kG6ZAKZL_mMCBkvA/s600/%D8%A7%D9%84%D9%86%D8%B9%D9%85%D8%A9_%D8%B9%D9%86%D8%AF_%D8%A7%D8%B3%D8%AA%D8%B9%D9%84%D8%A7%D9%86_%D9%8A%D8%B3%D9%88%D8%B9_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD%20%281%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"22:T75ab,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الرابع\u003c/h2\u003e\n\u003cp\u003eاختبار مجد المسيح ببهجة الاندهاش\u003cbr\u003e\nجوهر الأمر، الجزء ٢\u003c/p\u003e\n\u003cp\u003eيُكمِّل هذا الفصل سعينا لشرح جوهر الأمر في مجيء المسيح. وأُحاجج هنا بأن هذا الجوهر يكمن في العلاقة بين مجد المسيح بوصفه الحقيقة الأسمى للمجيء الثاني، واختبار ذلك المجد في قلوب شعب الله.\u003c/p\u003e\n\u003cp\u003eرأينا في الفصل الثالث أن بولس وبطرس ويسوع قد تحدثوا جميعاً عن مجد المسيح بوصفه الحقيقة الأسمى لمجيئه. فمجيئه هو استعلان مجده (١ بطرس ٤: ١٣). وهو «ظُهُورِ مَجْدِ اللهِ الْعَظِيمِ وَمُخَلِّصِنَا يَسُوعَ الْمَسِيحِ» (تيطس ٢: ١٣). وهو مجيؤه «فِي مَجْدِهِ... فَحِينَئِذٍ يَجْلِسُ عَلَى كُرْسِيِّ مَجْدِهِ» (متى ٢٥: ٣١).\u003c/p\u003e\n\u003cp\u003eوننتقل في هذا الفصل من التركيز على المجد ذاته، لنسلط الضوء على اختبار شعب الله عند مجيئه حينما يعاينون هذا المجد. فكيف يستجيب شعب الله لاستعلان مجده؟ وكيف تُثبت هذه العلاقة بين الاستعلان والاستجابة أنها جوهر الأمر؟\u003c/p\u003e\n\u003ch3\u003e\"اسجد لي وأنا أعطيك كل الممالك\"\u003c/h3\u003e\n\u003cp\u003eمن المثير للدهشة أن تجربة الشيطان ليسوع في متى ٤: ٨-١٠ تسلط ضوءاً ساطعاً على العلاقة بين مجد المسيح في مجيئه واختبار ذلك المجد من قِبل الذين يعاينونه:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ أَخَذَهُ أَيْضاً إِبْلِيسُ إِلَى جَبَلٍ عَالٍ جِدًّا، وَأَرَاهُ جَمِيعَ مَمَالِكِ الْعَالَمِ وَمَجْدَهَا، وَقَالَ لَهُ: «أُعْطِيكَ هَذِهِ جَمِيعَهَا إِنْ خَرَرْتَ وَسَجَدْتَ لِي». حِينَئِذٍ قَالَ لَهُ يَسُوعُ: «اذْهَبْ يَا شَيْطَانُ! لأَنَّهُ مَكْتُوبٌ: لِلرَّبِّ إِلَهِكَ تَسْجُدُ وَإِيَّاهُ وَحْدَهُ تَعْبُدُ».»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eولكي ندرك ارتباط هذا بمجد المسيح عند مجيئه واختبارنا له، ينبغي لي أن أشرح أمراً كان ضمنياً في النصوص التي درسناها في الفصل الثالث. فعلى سبيل المثال، عندما يقول يسوع إن ابن الإنسان عند مجيئه «يَجْلِسُ عَلَى كُرْسِيِّ مَجْدِهِ» (متى ٢٥: ٣١)، فإنه يلمح إلى أن مُلكه كملك وديّان يمثل جزءاً من مجده. وهذا هو ما يشير إليه العرش. ماذا نفهم من هذا، ومن سائر الإشارات الأخرى إلى مجد المسيح، ومُلكه على جميع ممالك العالم. فالمسيح لا يأتي ليتقاسم مُلكه مع حكام منافسين. إن مجده هو مجد ذاك الجالس على عرش الكون—«كُرْسِيِّ مَجْدِهِ».\u003c/p\u003e\n\u003cp\u003eولنتأمل الآن في الطريقة التي يعرض بها الشيطان على يسوع هذا المُلك الشامل تحديداً. «أَرَاهُ جَمِيعَ مَمَالِكِ الْعَالَمِ وَمَجْدَهَا، وَقَالَ لَهُ: أُعْطِيكَ هَذِهِ جَمِيعَهَا إِنْ خَرَرْتَ وَسَجَدْتَ لِي» (متى ٤: ٨-٩). يسعى إبليس إلى إلهاء يسوع عن مسار الطاعة والألم الذي سيُتوج بهذه الحقيقة عينها—سيادته على جميع ممالك العالم ومجدها. فهذه الممالك ستؤول إليه بحق بصفته ابن الله المطيع طاعة تامة. فبسبب ألمه تحديداً، سيملك. لقد «أَطَاعَ حَتَّى الْمَوْتَ... لِذَلِكَ رَفَّعَهُ اللهُ أَيْضاً... لِكَيْ تَجْثُوَ بِاسْمِ يَسُوعَ كُلَّ رُكْبَةٍ» (فيلبي ٢: ٨-١٠). وكان يسوع يعلم هذا. فما يعرضه عليه الشيطان سيكون له إن أطاع حتى الموت. وهو أمر كان جلياً له، ولهذا السبب لم يتزعزع.\u003c/p\u003e\n\u003cp\u003eغير أن ثمة أمراً أقل وضوحاً يُستشف من طريقة طرح الشيطان للأمر. فهو يقول، في واقع الأمر: \"سأمنحك السيادة على جميع ممالك العالم ومجدها إن سجدت لي\". ولم ينكر يسوع قدرة الشيطان على فعل ذلك. فالأمر لم يكن مجرد اقتراح مثير للسخرية، وكأن الشيطان لا يملك ادعاءً على الممالك. إذ يصف يسوع الشيطان ثلاث مرات بأنه «رَئِيسُ هَذَا الْعَالَمِ» (يوحنا ١٢: ٣١؛ ١٤: ٣٠؛ ١٦: ١١). ويسميه بولس «إِلَهُ هَذَا الدَّهْرِ» (٢ كورنثوس ٤: ٤) و«رَئِيسِ سُلْطَانِ الْهَوَاءِ» (أفسس ٢: ٢). ويكتب يوحنا أن «الْعَالَمَ كُلَّهُ قَدْ وُضِعَ فِي الشِّرِّيرِ» (١ يوحنا ٥: ١٩). ولا تتعارض أي من هذه الإعلانات مع عناية الله الشاملة والمهيمنة على كل شيء. فلله مقاصده في إطلاق العنان للشيطان إلى هذا الحد في هذا الدهر \u003ca href=\"#footnote-1\"\u003e[١]\u003c/a\u003e. ولم تكن طريقة يسوع في الرد على الشيطان هي التشكيك في سلطانه على ممالك العالم.\u003c/p\u003e\n\u003ch3\u003eلماذا آثر الشيطان أن يُعبد على أن يملك الكل؟\u003c/h3\u003e\n\u003cp\u003eهنا يبرز أمامنا تساؤل محير: لماذا كان الشيطان مستعداً للتخلي عن سلطانه على ممالك العالم؟ ولماذا كان على استعداد لمنح هذه القوة وهذا السلطان ليسوع؟ يتمثل الشق الأول من الإجابة في هذا: لأنه سينال، في مقابل هذه القوة وهذا السلطان، عبادة يسوع. بعبارة أخرى، وعوضاً عن امتلاك القوة والسلطان على ممالك العالم، سيحظى الشيطان بعبادة ذاك الذي يمتلك القوة والسلطان على الممالك.\u003c/p\u003e\n\u003cp\u003eصحيح أن الشيطان كان أحمق لظنه أن بإمكانه حمل ابن الله على التراجع عن مسار الطاعة والألم. ولكن هل كان أحمق باقتراحه مقايضة السلطة الشاملة بالعبادة؟ والسلطان بالعبادة؟ والملكية بالعبادة؟ كلا، لم يكن كذلك. وفهم السبب في ذلك يسلط ضوءاً ساطعاً على العلاقة بين مجد المسيح عند مجيئه واختبار هذا المجد من قِبل أولئك الذين يعاينونه.\u003c/p\u003e\n\u003cp\u003eما يراه الشيطان بوضوح هو أن مَن يُعبد فوق الجميع هو مَن تُوجد كل الأشياء لأجله، بغض النظر عمن يتولى السيادة المباشرة للكل. فإن عبدتُكَ لأنك وهبتني الأمم، فأنا أُقر بأن الأمم توجد من أجلك. ولم يكن السماح ليسوع بملك العالم ليمثل خسارة للشيطان، إن كان يسوع سيحكم العالم من أجل الشيطان. وهذا هو معنى العبادة. إنها تعني أن يقر يسوع بأن الشيطان هو ولاؤه الأعظم وكنزه الأسمى. وليس مجرد الإقرار، بل التوقير والإعجاب والاحترام والتقدير. هذا هو معنى العبادة. وبدون ذلك فهي نفاق وليست عبادة.\u003c/p\u003e\n\u003cp\u003eوإليك الدلالة الحاسمة: إن القوة المجردة أو السلطان على الأمم لا يمثلان التكريم الأسمى للمسيح. فقد كان الشيطان على استعداد لترك يسوع ينال ذلك، لعلمه أن التكريم الأسمى لا يكمن في حكم كل الأشياء، بل في نوال الإعجاب والاعتبار ككنز لكونه الحاكم. لا يكمن التكريم الأسمى في امتلاك كل الأشياء، بل في نوال الإعجاب والاعتبار ككنز بسبب الامتلاك. ولماذا كان الأمر على هذا الشكل؟ لأنه في حين أن المُلك والامتلاك أمران مجيدان بمعنًى ما، فإن التعبد—أي نوال التوقير والإعجاب والاعتبار ككنز—هو مجد أعظم. فقد يكون المرء حاكماً قوياً ومالكاً للكل، ولكنه مكروه من جميع رعاياه. ولن يكون هذا مجيداً.\u003c/p\u003e\n\u003cp\u003eأدرك الشيطان هذا الأمر، وربما منذ لحظة خلقه. فابن الله سيُثبت أنه مجيد ليس فقط لمطلق امتلاكه وحكمه، بل أيضاً لأن اليوم سيأتي حيث تُكنزه ملايين المخلوقات فوق كل شيء. فلن يسطع مجده لمجرد الإقرار به كمالك وحاكم لكل الكنوز، بل لأنه سيُعبد بصفته الكنز الأعظم.\u003c/p\u003e\n\u003cp\u003eإن ما رآه الشيطان ولم ينسه قط هو أن القصد الأسمى لله، في خلق الكون وتسيير تاريخ عظيم للعالم، لم يكن التمجيد الجزئي لابنه من خلال مطلق ملكيته وقوته وحكمته ونعمته، بل بالأحرى التمجيد الكامل لابنه بأن يُحاط بملايين المتعبدين الذين لا يكتفون بالإقرار بتقدمه في كل شيء (كولوسي ١: ١٨)، بل يعجبون به ويوقرونه ويحبونه ويُكنزونه كنصيبهم الأعظم في الحياة (مزمور ٧٣: ٢٦؛ مراثي ٣: ٢٤). وهذا ما ابتغاه الشيطان لنفسه. فبدون ذلك، لن يكون لملكية الممالك وحكمها أي قيمة.\u003c/p\u003e\n\u003ch3\u003eاستعلان المجد يكتمل في العبادة\u003c/h3\u003e\n\u003cp\u003eكان الغرض من تسليط الضوء على تجربة الشيطان ليسوع هو النفوذ إلى جوهر الأمر فيما يتعلق بالعلاقة بين مجد المسيح في مجيئه واختبار هذا المجد من قِبل الذين يعاينونه. ويتمثل الاستنتاج في هذا: من الصحيح القول إن مجد المسيح هو الحقيقة الموضوعية الأساسية المستعلنة في المجيء الثاني (كما رأينا من نصوص عديدة في الفصل الثالث)، ولكن دون الحقيقة المتمثلة في كيفية اختبار الناس لذلك المجد، فإننا نغفل جوهر الأمر. فإن خلا الأمر من العبادة القلبية، ومن الابتهاج بالمجد وكنزه، فإن القصد الأسمى لله يخفق. وقد أدرك الشيطان هذا. وحري بنا أن ندركه نحن. فمن الأهمية القصوى لقصد الله الأسمى في المجيء الثاني ألا يُستعلن مجد المسيح فحسب، بل أن يُحب. وأن يُحب بحق.\u003c/p\u003e\n\u003ch3\u003eآتٍ ليتَمجد ويُتعجَّب منه\u003c/h3\u003e\n\u003cp\u003eنلتفت الآن إلى مقطع يجمع بين هاتين الحقيقتين—مجد المسيح عند مجيئه، واختبار ذلك المجد في قلوب شعبه. لقد كتب بولس رسالة تسالونيكي الثانية في المقام الأول لمعالجة قضايا تتعلق بالمجيء الثاني للمسيح. وأراد أن يعين الكنيسة على إبصار قصد الله «فِي جَمِيعِ اضْطِهَادَاتِكُمْ وَالضِّيقَاتِ الَّتِي تَحْتَمِلُونَهَا» (٢ تسالونيكي ١: ٤)، وربط ذلك القصد بالمجيء الثاني. كما أراد مساعدة الكنيسة في التعامل مع أشخاص كانوا يتركون أعمالهم ويصيرون كسالى، بدافع ظنهم، على ما يبدو، «أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ» (٢ تسالونيكي ٢: ٢؛ ٣: ٦).\u003c/p\u003e\n\u003cp\u003eوالجزء الذي يهمنا الآن من هذه الرسالة هو ٢ تسالونيكي ١: ١٠. وإليك سياق الأعداد ٥-١٠:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«بَيِّنَةً عَلَى قَضَاءِ اللهِ الْعَادِلِ، أَنَّكُمْ تُؤَهَّلُونَ لِمَلَكُوتِ اللهِ الَّذِي لأَجْلِهِ تَتَأَلَّمُونَ أَيْضاً. إِذْ هُوَ عَادِلٌ عِنْدَ اللهِ أَنَّ الَّذِينَ يُضَايِقُونَكُمْ يُجَازِيهِمْ ضِيقاً، وَإِيَّاكُمُ الَّذِينَ تَتَضَايَقُونَ رَاحَةً مَعَنَا، عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِينَ سَيُعَاقَبُونَ بِهَلاَكٍ أَبَدِيٍّ مِنْ وَجْهِ الرَّبِّ وَمِنْ مَجْدِ قُوَّتِهِ، مَتَى جَاءَ لِيَتَمَجَّدَ \u003ca href=\"#footnote-2\"\u003e[٢]\u003c/a\u003e فِي قِدِّيسِيهِ وَيُتَعَجَّبَ مِنْهُ فِي جَمِيعِ الْمُؤْمِنِينَ. لأَنَّ شَهَادَتَنَا عِنْدَكُمْ صُدِّقَتْ فِي ذَلِكَ الْيَوْمِ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eسنعود إلى هذا النص في الفصلين ٨ و٩ لنلقي نظرة فاحصة على أجزائه المتعددة والمهمة، ولكن ينصب التركيز الآن على العدد ١٠: «...مَتَى جَاءَ لِيَتَمَجَّدَ [ἐνδοξασθῆναι] فِي قِدِّيسِيهِ وَيُتَعَجَّبَ مِنْهُ [θαυμασθῆναι] فِي جَمِيعِ الْمُؤْمِنِينَ». ويعد هذا من أوضح إعلانات القصد من المجيء الثاني في الكتاب المقدس بأسره. إنه قصد المسيح. فهو آتٍ، كما يقول بولس، لهذا القصد المزدوج: ليتمجد وليُتعجب منه. ومن بين مقاصد أخرى صممها الله للمجيء الثاني، يأخذنا هذا الإعلان إلى القصد الأسمى—وهو القصد الذي لا يُعد وسيلة لأي قصد آخر، بل غاية في حد ذاته.\u003c/p\u003e\n\u003ch3\u003eما العلاقة بين أن يَتمجد ويُتعجب منه؟\u003c/h3\u003e\n\u003cp\u003eتكمن أهمية هذا النص لصلب موضوعنا في هذه النقطة في أن عبارتي \"يتمجد\" و\"يُتعجب منه\" تكشفان عما أسميته جوهر الأمر، ألا وهو العلاقة بين مجد المسيح في مجيئه واختبار هذا المجد في قلوب شعبه. فما العلاقة بين تمجد المسيح عند مجيئه والتعجب منه في مجيئه؟\u003c/p\u003e\n\u003cp\u003eأن يتمجد يعني أن يُجعل مجد الرب جلياً. أن يُعرض. أن يُجعل مرئياً في عظمته الحقيقية. أن يُكبر—كمنظار لا كمجهر (أي ليس بجعل شيء صغير يبدو أكبر مما هو عليه، بل بجعل شيء ضخم بصورة لا تُتخيل يبدو أقرب إلى حقيقته). وقد يتحقق ذلك بكلمات التسبيح، أو بأفعال تلفت الانتباه إلى عظمة الرب وقيمته وجماله.\u003c/p\u003e\n\u003cp\u003eمن ناحية أخرى، فإن التعجب هو فعل يخص قلب الإنسان وعقله. إنه إيقاظ لما أسميناه انفعالاً قلبياً—شعور قلبي بالذهول أو الاندهاش أو الرهبة. ولا يشترط أن تعني الكلمة ذاتها عاطفة إيجابية. فقد تكون مجرد دهشة خالية من أي إعجاب بهيج، كما حينما «تَعَجَّبَ [يَسُوعُ] مِنْ عَدَمِ إِيمَانِهِمْ» (مرقس ٦: ٦). ولكن في ٢ تسالونيكي ١: ١٠، الكلمة إيجابية. بل إيجابية للغاية. فيسوع راجع إلى الأرض لأجل هذا! إن رجاء المجيء الثاني هو «رَجَاءً مُبَارَكاً» (مبهجاً) (μακαρίαν ἐλπίδα، تيطس ٢: ١٣). وسوف نفرح «فِي اسْتِعْلاَنِ مَجْدِهِ أَيْضاً مُبْتَهِجِينَ» (١ بطرس ٤: ١٣). فالتعجب الذي يأتي يسوع ليناله هو تعجب بهيج.\u003c/p\u003e\n\u003cp\u003eوعندما نجمع بين الأمرين—يتمجد ويُتعجب منه—نرى أن التمجيد هو الثمر الخارجي لعرض مجد الرب، والتعجب هو الجذر الداخلي للإعجاب المذهول والرهبة من ذلك المجد. وعندما يضاف التعجب إلى التمجيد، يتضح أن التمجيد لا ينطوي على انعكاس خارجي فحسب، بل على انفعال داخلي أيضاً. فمجد المسيح لا ينعكس في شعبه كما ينعكس ضوء الشمس في القمر الفاقد للإحساس، بل كما ينعكس حضور المحبوب في الوجه المشرق للمُحِب.\u003c/p\u003e\n\u003cp\u003eلقد أسميت هذا جوهر الأمر. فالمسيح لن يعود فقط لكي يُرى ويُظهر كمجيد، بل ليُتعجب منه كمجيد. إنه آتٍ ليقدم شخصه المجيد تقديماً موضوعياً، وآتٍ لكي يُختبر كالشخص المجيد الذي هو عليه. إنه آتٍ ليُقَر بمجده ويُعجَب بمجده. وغايته أن يُعرَف ظهوره عالمياً وأن يُحَب بشدة.\u003c/p\u003e\n\u003cp\u003eوليس الأمر وكأن هاتين الغايتين منفصلتان، تقفان جنباً إلى جنب ككأسين على رف. بل يكمن جوهر الأمر في أن الاستجابة الداخلية المتمثلة في التعجب والإعجاب والمحبة إزاء مجيء يسوع هي أمر جوهري لأصالة تمجيدنا الخارجي لعظمته. فبدون التعجب، سيكون التمجيد أجوفاً. وهذا ما أبصره الشيطان. فحتى لو حاز كل مجد ممالك العالم كمالك أو حاكم، لكان ذلك أجوفاً بلا عبادة. فالعبادة، والإعجاب، والتعجب، والمحبة هي ما يجعل التمجيد ممتلئاً بدلاً من كونه أجوفاً.\u003c/p\u003e\n\u003ch3\u003eالابتهاج المسيحي—مجدداً!\u003c/h3\u003e\n\u003cp\u003eلقد كرست الخمسين عاماً الماضية من حياتي لعرض حقيقة أن الله يتمجد فينا بأعظم صورة عندما نكتفي نحن به بأعظم صورة. وقد أسميت ذلك \"الابتهاج المسيحي\". وها نحن نلتقي بهذه الحقيقة مجدداً. وهي تمثل جوهر الأمر. فمن البداية إلى النهاية، يفعل الله كل شيء من أجل مجده. وهذه الحقيقة تتخلل الكتاب المقدس بأسره \u003ca href=\"#footnote-3\"\u003e[٣]\u003c/a\u003e.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مِنْ أَجْلِ اسْمِي أُبَطِّئُ غَضَبِي، وَمِنْ أَجْلِ فَخْرِي أُمْسِكُ عَنْكَ حَتَّى لاَ أَقْطَعَكَ. هأَنَذَا قَدْ نَقَّيْتُكَ وَلَيْسَ بِفِضَّةٍ. اخْتَرْتُكَ فِي كُورِ الْمَشَقَّةِ. مِنْ أَجْلِ نَفْسِي، مِنْ أَجْلِ نَفْسِي أَفْعَلُ. لأَنَّهُ كَيْفَ يُدَنَّسُ اسْمِي؟ وَكَرَامَتِي لاَ أُعْطِيهَا لآخَرَ.» (إشعياء ٤٨: ٩-١١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد خلقنا الله لمجده في البداية (إشعياء ٤٣: ٦-٧)؛ وأرسل ابنه إلى العالم في المرة الأولى لمجده (لوقا ٢: ١٤؛ يوحنا ١٢: ٢٧-٢٨)؛ وعند المجيء الثاني للمسيح، سيبلغ التاريخ كما نعرفه ذروته لمجده (٢ تسالونيكي ١: ١٠). فخليقة الله هي كون محوره الله ومُمجِّد للمسيح. وتاريخ العالم هو تاريخ محوره الله ومُمجِّد للمسيح. «الْكُلُّ بِهِ وَلَهُ قَدْ خُلِقَ» (كولوسي ١: ١٦). وكل ما يحدث، وكل ما يوجد، قد صممه الله في نهاية المطاف ليوصل كامل مجموع فضائله \u003ca href=\"#footnote-4\"\u003e[٤]\u003c/a\u003e. فهو «يَعْمَلُ كُلَّ شَيْءٍ حَسَبَ رَأْيِ مَشِيئَتِهِ» (أفسس ١: ١١).\u003c/p\u003e\n\u003cp\u003eلكن ليس هذا هو جوهر الأمر. بل يكمن جوهر الأمر في أن هذا القصد الأسمى المتمثل في تمجيد الله في يسوع المسيح يتحقق بأكمل صورة وفي ذروته عندما يختبر شعب الله مجده كأمر مذهل بعمق. وأقول بعمق لأن الانفعالات القلبية المعتدلة تعكس صورة باهتة عن المحبوب. فلم يوصنا الله بأن نحبه بنصف قلبنا أو بثلثيه، بل «مِنْ كُلِّ قَلْبِكَ» (متى ٢٢: ٣٧). «تَعْبُدُوهُ بِكُلِّ قَلْبِكُمْ» (يشوع ٢٢: ٥). «تَوَكَّلْ عَلَى الرَّبِّ بِكُلِّ قَلْبِكَ» (أمثال ٣: ٥). «تَطْلُبُونَنِي بِكُلِّ قَلْبِكُمْ» (إرميا ٢٩: ١٣). «ارْجِعُوا إِلَيَّ بِكُلِّ قُلُوبِكُمْ» (يوئيل ٢: ١٢). «تَهَلَّلِي بِكُلِّ قَلْبِكِ» (صفنيا ٣: ١٤). ورغم أننا نقصر عن بلوغ هذه الغاية في هذه الحياة، إلا أننا لن نقصر في ذلك اليوم. فالمسيح لا يعود لينال تعجباً معتدلاً.\u003c/p\u003e\n\u003cp\u003eفي ذلك اليوم، عندما نراه، سنتغير لنشعر بما ينبغي لنا أن نشعر به (١ يوحنا ٣: ٢). وهذا الشعور القلبي—ذلك التعجب المستلهم من المجد—سيكون القصد الأسمى لكل الأشياء. فالله في المسيح سيتمجد بأعظم صورة عندما نكتفي به نحن بأعظم صورة. إن الغاية الإلهية ليست فقط استعلان المجد. ولا هي فقط التعجب البهيج للقديسين. بل الغاية هي كلاهما—المجد الذي يستدعي التعجب البهيج، والتعجب البهيج الذي يثبت قيمة المجد وجماله وعظمته. هذا هو جوهر الأمر. وهذا هو القصد الإلهي لكل الأشياء.\u003c/p\u003e\n\u003ch3\u003eتجنب النتائج الكارثية للمحبة المَعيبة\u003c/h3\u003e\n\u003cp\u003eنحن الآن في موقع يسمح لنا بالعودة إلى الهدف العملي والشخصي للفصلين الثالث والرابع: وهو درء نوع من المحبة للمجيء الثاني يفضي إلى نتائج كارثية. لقد رأينا تلك النتائج الكارثية للمجيء الثاني في متى ٧: ٢١-٢٣، ورأينا نتائج كارثية في المجيء الأول في يوحنا ٥: ٣٨-٤٤. وكلتاهما تضمنتا محبة مَعيبة لظهور المسيح. فمحبتهم لمجيء المسيح لم تتوافق مع مقاصده من المجيء.\u003c/p\u003e\n\u003cp\u003eكانت القضية هي المجد. «كَيْفَ تَقْدِرُونَ أَنْ تُؤْمِنُوا وَأَنْتُمْ تَقْبَلُونَ مَجْدًا بَعْضُكُمْ مِنْ بَعْضٍ، وَالْمَجْدُ الَّذِي مِنَ الإِلهِ الْوَاحِدِ لَسْتُمْ تَطْلُبُونَهُ؟» (يوحنا ٥: ٤٤). لقد أحبوا المجد الذي يأتي من الإنسان، لا المجد الذي يأتي من الله. لكن المسيح لم يأتِ ليثبت البشر الساقطين في عشقهم للمديح البشري. بل جاء ليخلق شعباً يختبر ثورة كوبرنيكية بوضع الله في مركز النظام الشمسي لحياتهم، لا ذواتهم. لقد جاء المسيح في المرة الأولى ليموت عن الخطاة لكي تُستبدل المحبة الانتحارية لتمجيد الذات بالاختبار المُشبع تماماً لتمجيد الله. «وَهُوَ مَاتَ لأَجْلِ الْجَمِيعِ كَيْ لاَ يَعِيشَ الأَحْيَاءُ فِيمَا بَعْدُ لأَنْفُسِهِمْ، بَلْ لِلَّذِي مَاتَ لأَجْلِهِمْ وَقَامَ» (٢ كورنثوس ٥: ١٥).\u003c/p\u003e\n\u003cp\u003eلكن كثيرين في زمن المسيح أحبوا ظهور المسيح بطريقة جعلت هدف يسوع من المجيء يبدو بغيضاً. فقد تعارض مع محبتهم للمديح البشري. وتعارض مع نظرتهم لله كمن يستحسن تمجيدهم لذواتهم في برهم (لوقا ١٨: ١١-١٤). وجعل الإيمان بيسوع الحقيقي مستحيلاً (يوحنا ٥: ٤٤). فمحبتهم لظهور المسيح وضعتهم في عداء معه وأثبتت أنها كارثية.\u003c/p\u003e\n\u003ch3\u003eمحبة لظهوره تضع الذات وتُعلي المسيح\u003c/h3\u003e\n\u003cp\u003eبعد أن كشفنا عن جوهر الأمر في المجيء الثاني للمسيح، يمكننا الآن أن نمتحن أنفسنا. هل تتوافق محبتنا لظهور المسيح مع مقاصده في المجيء؟ يكمن جوهر الأمر في أنه آتٍ ليتمجد ويُتعجب منه. إن قصد المسيح في المجيء هو إعلاء المسيح بشكل جذري. فهو يقصد أن يكون مجده في الصدارة والمركز. ويقصد أن يبرق بوضوح من الأفق إلى الأفق (لوقا ١٧: ٢٤). ويقصد أن يسطع هذا المجد بأبهى صورة في التعجب البهيج لشعبه. لن نكون نحن مركز الاهتمام، بل هو. وسيكون مجد مركزيته هو فرحنا. إن تعجبنا من مجده الأسمى سيكمل تمجيده وسيكون قمة ابتهاجنا.\u003c/p\u003e\n\u003cp\u003eوتتجلى الأسئلة الملحة للغاية بالنسبة لنا في: هل يهيننا هذا؟ هل يتعارض مع أي توق باقٍ في قلوبنا لنكون مركز الاهتمام؟ هل يبدو لنا من الأنانية أن يكون قصد المسيح هو أن يُعلى المسيح؟ أم أننا اختبرنا ما مات المسيح لأجله: أي التغيير الجذري الذي يجعلنا نحب مجيء المسيح ليتمجد؟ عندما قال الوحي إن الرب سيهب إكليل البر «لِجَمِيعِ الَّذِينَ يُحِبُّونَ ظُهُورَهُ أَيْضًا» (٢ تيموثاوس ٤: ٨)، فهذه هي المحبة التي كان يقصدها. محبة تتعجب ببهجة لمجيء المسيح الكلي المجد، لكي ينال التعجب المفعم بالفرح من شعبه.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-1\"\u003e[١]\u003c/a\u003e انظر الفصلين ١٨ و١٩ (\"الشيطان والشياطين\" و\"الوجود المستمر للشيطان\") في كتاب جون بايبر، العناية الإلهية (Providence، Wheaton, IL: Crossway, 2021)، ص ٢٥٥-٢٨٦.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-2\"\u003e[٢]\u003c/a\u003e هنا فقط وفي العدد ١٢ يستخدم بولس الكلمة المركبة ἐνδοξασθῆναι (en-doxasthēnai) بدلاً من الكلمة الأكثر شيوعاً δοξάζω. وفي كلتا الحالتين، يتبع الفعل شبه جملة جر تبدأ بـ en (العدد ١٠، ἐν τοῖς ἁγίοις αὐτοῦ، \"في قديسيه\"؛ والعدد ١٢، ἐν ὑμῖν، \"فيكم\"). وبالتالي، يبدو أن القصد هو لفت الانتباه إلى حقيقة أن فعل التمجيد هذا متأصل داخل القديسين. وهو ليس داخلياً حصراً، لكنه متأصل هناك. إنه ليس مجرد فعل تمجيد منفصل عن قلب الإنسان، كأن يقول قائل: \"حتى الصخور والجبال والنجوم تمجد الله\". إنها تفعل ذلك بالتأكيد، بمجرد عكسها لمجده كصانعها، ولكنه لا يتمجد \"فيها\" كما يتمجد \"في قديسيه\".\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-3\"\u003e[٣]\u003c/a\u003e لمجموعة من النصوص التي توضح ذلك، انظر جون بايبر، \"نصوص كتابية لإظهار غيرة الله لمجده الخاص\"، ديزايرنج جاد (Desiring God)، ٢٤ نوفمبر ٢٠٠٧، https://www.desiringgod.org/.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-4\"\u003e[٤]\u003c/a\u003e الدليل والتفسير لهذا الادعاء مطروحان في كتاب بايبر، العناية الإلهية.\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"23:T7abd,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eمجد المسيح بوصفه الحقيقة الأسمى لمجيئه\u003c/h2\u003e\n\u003ch2\u003eجوهر الأمر، الجزء ١\u003c/h2\u003e\n\u003cp\u003eشرحتُ أن محبة ظهور الرب يسوع هي عاطفة روحية، أو انفعال قلبي، يخلقه (في أصله) ويصيغه (في طبيعته) الروح القدس. ومن تداعيات هذا الأمر وجود أنواع متباينة من العواطف—أنواع من المحبة—لظهوره. فبعض هذه العواطف ليس روحياً، ولا يمثل تلك المحبة التي وعدها الوحي بإكليل البر (٢ تيموثاوس ٤: ٨). لذا، يشمل هدفي في هذا الكتاب السعي لمنع نوع من المحبة للمجيء الثاني يُفضي إلى نتائج كارثية.\u003c/p\u003e\n\u003ch3\u003eمساعدتنا في تجنب النتائج الكارثية عند مجيئه\u003c/h3\u003e\n\u003cp\u003eما أعنيه بـ \"النتائج الكارثية\" هو ما يحذر منه يسوع في متى ٧: ٢١-٢٣. فهو يقول إنه في \"ذلك اليوم\"—يوم مجيئه للدينونة—سيتفاجأ بعض الذين بدا أنهم يحبون ظهوره برفضهم وطردهم من محضر المسيح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لَيْسَ كُلُّ مَنْ يَقُولُ لِي: يَا رَبُّ، يَا رَبُّ! يَدْخُلُ مَلَكُوتَ السَّمَاوَاتِ. بَلِ الَّذِي يَفْعَلُ إِرَادَةَ أَبِي الَّذِي فِي السَّمَاوَاتِ. كَثِيرُونَ سَيَقُولُونَ لِي فِي ذَلِكَ الْيَوْمِ: يَا رَبُّ، يَا رَبُّ! أَلَيْسَ بِاسْمِكَ تَنَبَّأْنَا، وَبِاسْمِكَ أَخْرَجْنَا شَيَاطِينَ، وَبِاسْمِكَ صَنَعْنَا قُوَّاتٍ كَثِيرَةً؟ فَحِينَئِذٍ أُصَرِّحُ لَهُمْ: إِنِّي لَمْ أَعْرِفْكُمْ قَطُّ! اذْهَبُوا عَنِّي يَا فَاعِلِي الإِثْمِ!»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوالسبب في قولي إن هؤلاء التلاميذ المزيفين بدا أنهم يحبون ظهور الرب هو أنهم أرادوا أن يكونوا مشمولين في \"ذلك اليوم\". لقد أرادوا الدخول، ودعوا يسوع \"يا رب\"، وربما رنموا ترنيمة عبادة كتلك التي رنمتها أنا في ثمانينيات القرن الماضي: \"أحبك يا رب، وأرفع صوتي لأعبدك. ابتهجي يا نفسي\". لكن يسوع يطردهم. فرغم كل تأكيداتهم الدينية (بشأن ربوبيته) وكل إنجازاتهم (في صنع \"قوات كثيرة\")، يقول إن أعمالهم نبعت من روح متمردة. لم يكونوا خاضعين بتواضع لله ولوصاياه، بل سادت عليهم نزعة استقلالية. وفيما يتعلق بترانيم عبادتهم، قال يسوع في واقع الأمر: «يَقْتَرِبُ إِلَيَّ هَذَا الشَّعْبُ بِفَمِهِ، وَيُكْرِمُنِي بِشَفَتَيْهِ، وَأَمَّا قَلْبُهُ فَمُبْتَعِدٌ عَنِّي بَعِيداً. وَبَاطِلاً يَعْبُدُونَنِي وَهُمْ يُعَلِّمُونَ تَعَالِيمَ هِيَ وَصَايَا النَّاسِ» (متى ١٥: ٨-٩). فكيف نحب ظهور الرب يسوع بطريقة تجنبنا هذه النتيجة الكارثية في يوم مجيئه؟\u003c/p\u003e\n\u003ch3\u003eجوهر الأمر عند مجيئه\u003c/h3\u003e\n\u003cp\u003eإحدى الإجابات هي أن نسأل أنفسنا بصدق عما نحبه حقاً في ظهور الرب، ثم نقارن ذلك بما سيجلبه يسوع فعلياً عند مجيئه. أو بعبارة أخرى، هل تتوافق محبتنا لمجيئه مع مقاصده من هذا المجيء؟ وبمعنى ما، يمثل هذا الكتاب برمته مسعى لمساعدتنا في إجابة هذا السؤال. لكنني أريد في هذا الفصل أن أنفذ إلى جوهر الأمر، أي إلى صميم قصد المسيح الأسمى من مجيئه ثانية. وسيمثل هذا القصد الاختبار لمعرفة ما إذا كانت محبتنا لمجيئه تتوافق مع مقاصده منه.\u003c/p\u003e\n\u003cp\u003eيرتبط جوهر الأمر، أولاً، بالحقيقة الموضوعية الأساسية لمجيء الرب، وهي مجده—وأعني بذلك دائماً هو استعلان ذاته في كامل مجده. وسوف نرى أن هناك تركيزاً مذهلاً على مجد الرب عند مجيئه، ولهذا السبب أسميها الحقيقة الموضوعية الأساسية. لكن جوهر الأمر الذي أتحدث عنه لا يقتصر على مجد المسيح فحسب، بل يتألف أيضاً، ثانياً، من اختبارنا لذلك المجد في يوم مجيئه. إن العلاقة بين هذين الأمرين—مجد المسيح واختبارنا له—هو جوهر الأمر الذي أعنيه.\u003c/p\u003e\n\u003cp\u003eيكمن جوهر الأمر في كيفية اختبارنا لمجد المسيح في مجيئه. فالمسيح لا يأتي ليعرض مجده فحسب، بل ليُختبَر مجده أيضاً بطريقة معينة. وإن إدراك هذه العلاقة بين قصد المسيح في استعلان مجده وقصده في أن يُختبَر هذا المجد بطريقة معينة، سيساعدنا على معرفة ما إذا كانت محبتنا لظهوره أصيلة أم لا. فهل تتوافق مع مقاصده في مجيئه؟\u003c/p\u003e\n\u003ch3\u003eكيف كشف يسوع عن المحبة المَعيبة لمجيئه الأول؟\u003c/h3\u003e\n\u003cp\u003eقبل أن أوضح هذا من النصوص الكتابية المتعلقة بمجيء المسيح الثاني، تأمل كيف كان هذا أيضاً هو جوهر الأمر في مجيئه الأول. لقد رَجَت إسرائيل كلها تقريباً المجيء الأول للمسيا، ويمكن القول إن كثيرين أحبوا ظهوره. لكن كثيرين من هؤلاء الناس أنفسهم عثروا بظهوره، إذ لم تتوافق طريقة رجائهم أو محبتهم مع قصد المسيح من مجيئه. كان هناك شيء خاطئ في قلوب كثيرين ممن اعتبروا أنفسهم يهوداً أمناء. كان هناك شيء خاطئ في محبتهم لله ولمجيء مسيحه. وإليك إحدى الطرق التي كشف بها يسوع عن هذا العيب. اقرأ النص التالي من إنجيل يوحنا واضعاً هذا السؤال في ذهنك: هل لدى هذا المقطع ما يقوله عما إذا كنا سنفرح بمجيء المسيح الثاني؟\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلَيْسَتْ لَكُمْ كَلِمَتُهُ ثَابِتَةً فِيكُمْ، لأَنَّ الَّذِي أَرْسَلَهُ هُوَ لَسْتُمْ تُؤْمِنُونَ بِهِ. فَتِّشُوا الْكُتُبَ لأَنَّكُمْ تَظُنُّونَ أَنَّ لَكُمْ فِيهَا حَيَاةً أَبَدِيَّةً، وَهِيَ الَّتِي تَشْهَدُ لِي. وَلاَ تُرِيدُونَ أَنْ تَأْتُوا إِلَيَّ لِتَكُونَ لَكُمْ حَيَاةٌ. مَجْداً مِنَ النَّاسِ لَسْتُ أَقْبَلُ، وَلَكِنِّي قَدْ عَرَفْتُكُمْ أَنْ لَيْسَتْ لَكُمْ مَحَبَّةُ اللهِ فِي أَنْفُسِكُمْ. أَنَا قَدْ أَتَيْتُ بِاسْمِ أَبِي وَلَسْتُمْ تَقْبَلُونَنِي. إِنْ أَتَى آخَرُ بِاسْمِ نَفْسِهِ فَذَلِكَ تَقْبَلُونَهُ. كَيْفَ تَقْدِرُونَ أَنْ تُؤْمِنُوا وَأَنْتُمْ تَقْبَلُونَ مَجْداً بَعْضُكُمْ مِنْ بَعْضٍ، وَالْمَجْدُ الَّذِي مِنَ الإِلَهِ الْوَاحِدِ لَسْتُمْ تَطْلُبُونَهُ؟» (يوحنا ٥: ٣٨-٤٤)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد قالوا إنهم يحبون الله. لكن يسوع يقول: \"ليست لكم محبة الله في أنفسكم\". وقد قالوا إنهم يحبون مجيء مسيح الله. لكنه واقف أمامهم، ويسوع يقول: \"لستم تقبلونني\". فماذا كانت المشكلة؟\u003c/p\u003e\n\u003cp\u003eيضع يسوع إصبعه على جوهر الأمر في العدد ٤٤: \"كيف تقدرون أن تؤمنوا وأنتم تقبلون مجداً بعضكم من بعض، والمجد الذي من الإله الواحد لستم تطلبونه؟\" هذا سؤال بلاغي يُقصد به تقرير حقيقة. عندما يقول: \"كيف تقدرون؟\" فإنه يعني: \"لا تقدرون\". لا يقدرون على ماذا؟ لا يقدرون أن يؤمنوا بيسوع. لا يقدرون أن يقبلوا يسوع على حقيقته. ولماذا لا؟ للأمر علاقة بالطريقة التي يختبرون بها المجد.\u003c/p\u003e\n\u003cp\u003eيصف يسوع حالة قلوبهم هكذا: \"أنتم تقبلون مجداً بعضكم من بعض، والمجد الذي من الإله الواحد لستم تطلبونه\". فماذا يعني ذلك؟ يعني على الأقل هذا: أنكم تحبون أن يمدحكم الآخرون أكثر مما تريدون مدح الله. ولماذا كان الأمر على هذا الشكل؟ لأنهم أحبوا الارتباط بالعظمة البشرية أكثر من عظمة الله. ولماذا أيضاً؟ لأن وراء عدم الاهتمام بمدح الله والارتباط به يكمن احتقار لقيمة الله نفسه باعتباره الكنز الأعظم في الكون. ولهذا السبب يقول يسوع: \"ليست لكم محبة الله في أنفسكم\" (يوحنا ٥: ٤٢). أنتم لا تكنزون مجد الله فوق كل شيء. ويقول يسوع إن هذا هو السبب في أنكم لا تقدرون أن تقبلوني. وطالما أن هذه هي حالة قلوبكم، فلا يمكنكم قبولي على حقيقتي. ولماذا يكون الأمر كذلك؟ يشير يسوع إلى الإجابة بالكلمات: \"إن أتى آخر باسم نفسه فذلك تقبلونه\" (يوحنا ٥: ٤٣). لماذا؟ لأنه سيكون مُمجِّداً لنفسه مثلكم، ولن يكون وجوده بمثابة إدانة صريحة لتمجيدكم لذواتكم. عندما يأتي يسوع متواضعاً ومطيعاً ومضحياً باسم أبيه (يوحنا ٥: ٤٣)، فإن مجرد وجوده يدين محبي المجد البشري المُمجِّدين لذواتهم. ولهذا السبب لا يمكنهم قبوله، فهم غير مستعدين للانضمام إلى يسوع في كنز مجد الآب فوق كل مجد بشري.\u003c/p\u003e\n\u003cp\u003eكان الغرض من تناول يوحنا ٥: ٣٨-٤٤ هو إيضاح كيف حدثت نتيجة كارثية لكثيرين ممن \"أحبوا ظهوره\" حتى في المجيء الأول للمسيا. لقد حدث ذلك لأن المسيا الذي أرادوه لم يكن هو المسيا الذي رأوه. لم تتوافق مقاصد يسوع من مجيئه مع رغباتهم، فـ \"أحبوا ظهوره\" بطريقة ثبت زيفها، ولم تتوافق مع حقيقته. كانوا سعداء بظهور مسيا يؤكد علاقة حبهم بالمجد البشري واحتقارهم لمجد الله. لكن لم يكن هذا هو الغرض من مجيء يسوع.\u003c/p\u003e\n\u003cp\u003eتشير خبرة بعض اليهود هذه مع مجيء يسوع الأول إلى جوهر الأمر في مجيئه الثاني، وأعني بذلك الطريقة التي سيُختبَر بها مجده عندما يأتي. فلنلتفت إذن إلى تلك النصوص التي تسلط الضوء على مجد المسيح في مجيئه، ثم نلاحظ أي نوع من الاستجابة البشرية لذلك المجد يتوافق فعلياً مع قصد المسيح.\u003c/p\u003e\n\u003ch3\u003eبولس: مجد المسيح هو ما يظهر!\u003c/h3\u003e\n\u003cp\u003eيجعل الرسول بولس مجد المسيح مركزياً في المجيء الثاني، وبشكل مباشر يفوق أي من كُتاب الوحي. فهو يقول، على سبيل المثال، إن المسيحيين \"مُنْتَظِرِينَ الرَّجَاءَ الْمُبَارَكَ وَظُهُورَ مَجْدِ اللهِ الْعَظِيمِ وَمُخَلِّصِنَا يَسُوعَ الْمَسِيحِ\" (تيطس ٢: ١٣). هناك عشرات الأشياء التي كان بإمكان لبولس أن يقولها عما يجعل رجاءنا \"رجاءً مباركاً\" (μακαρίαν ἐλπίδα)—أي رجاءً سعيداً. لكن ما يقوله هنا هو أن ما يجعله سعيداً هو ظهور المجد—مجد الله العظيم ومخلصنا يسوع المسيح. يسوع هو مخلصنا، وهو إلهنا، وهو عظيم. ولذلك عندما يظهر، ستتضح هذه العظمة للعالم كمجد. وهكذا، فمن بين كل ما كان يمكن لبولس أن يقوله عما يجعل مجيء المسيح رجاءً سعيداً، فإنه يركز على المجد.\u003c/p\u003e\n\u003cp\u003eولا تظهر أولوية هذا المجد في كيفية إسعاده للمسيحيين (μακάριος) فحسب، بل أيضاً في كيف أن خسارة هذا المجد ستكون مدمرة لغير المؤمنين.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«... فِي نَارِ لَهِيبٍ، مُعْطِياً نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِينَ سَيُعَاقَبُونَ بِهَلاَكٍ أَبَدِيٍّ مِنْ وَجْهِ الرَّبِّ وَمِنْ مَجْدِ قُوَّتِهِ، مَتَى جَاءَ لِيَتَمَجَّدَ فِي قِدِّيسِيهِ وَيُتَعَجَّبَ مِنْهُ فِي جَمِيعِ الْمُؤْمِنِينَ... فِي ذَلِكَ الْيَوْمِ.» (٢ تسالونيكي ١: ٨-١٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد خُلق البشر على صورة الله (تكوين ١: ٢٧). ويعني هذا، على الأقل، أننا خُلقنا لنعكس مجد الله—أن نراه ونحبه ونتغير به لكي نعكسه. سيكون هذا هو الفرح الأعمق والأسمى والأطول لخلق الله للبشر. لذلك، فإن الانفصال عن مجد الله يعني خسارة كل العجب والفرح اللذين صُمِّمنا من أجلهما. سيكون هذا هو الحزن الكامن وراء كل \"هلاك أبدي\". وبهذا، يجعل بولس المجد مركزياً في المجيء الثاني لكل من المؤمنين كـ \"رجائنا السعيد\" ولغير المؤمنين كأعظم خسارة لهم.\u003c/p\u003e\n\u003ch3\u003eبطرس: طريق الآلام أولاً، ثم الأمجاد\u003c/h3\u003e\n\u003cp\u003eأشار الرسول بطرس إلى الأهمية الفائقة للمجد من خلال توجيه انتباهنا إلى خطة الله الممتدة عبر الأجيال لقيادة المسيح عبر الألم (في مجيئه الأول) إلى المجد (في مجيئه الثاني). وهو يفعل ذلك ثلاث مرات.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الْخَلاَصَ الَّذِي فَتَّشَ وَبَحَثَ عَنْهُ أَنْبِيَاءٌ، الَّذِينَ تَنَبَّأُوا عَنِ النَّعْمَةِ الَّتِي لأَجْلِكُمْ، بَاحِثِينَ أَيُّ وَقْتٍ أَوْ مَا الْوَقْتُ الَّذِي كَانَ يَدُلُّ عَلَيْهِ رُوحُ الْمَسِيحِ الَّذِي فِيهِمْ، إِذْ سَبَقَ فَشَهِدَ بِالآلاَمِ الَّتِي لِلْمَسِيحِ، وَالأَمْجَادِ الَّتِي بَعْدَهَا.» (١ بطرس ١: ١٠-١١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eرأى الأنبياء بشكل غامض كيف ترتبط آلام المسيا ومجده ببعضهما البعض، فقد \"فتشوا وبحثوا\". وكانوا بالتأكيد سيقولون إن مجده سيتبع آلامه، وأنه سيكون منتصراً في النهاية، ولن يكون لملكه نهاية (إشعياء ٩: ٧). لكنهم لم يتمكنوا من رؤية بوضوح كيف ارتبطت الآلام بالأمجاد، أو كم من الوقت سيمضي حتى تُعلن الأمجاد بعد الآلام. ما استطاعوا رؤيته، وما رآه بطرس بالوضوح نفسه، هو أن الحقيقة المركزية لانتظارنا المستقبلي هي مجد المسيح.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e« أَيُّهَا الأَحِبَّاءُ، لاَ تَسْتَغْرِبُوا الْبَلْوَى الْمُحْرِقَةَ الَّتِي بَيْنَكُمْ حَادِثَةٌ، لأَجْلِ امْتِحَانِكُمْ، كَأَنَّهُ أَصَابَكُمْ أَمْرٌ غَرِيبٌ، بَلْ كَمَا اشْتَرَكْتُمْ فِي آلاَمِ الْمَسِيحِ، افْرَحُوا لِكَيْ تَفْرَحُوا فِي اسْتِعْلاَنِ مَجْدِهِ أَيْضًا مُبْتَهِجِينَ.» [١] (١ بطرس ٤: ١٢-١٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eومثلما يجعل بولس \"ظهور المجد\" مركزياً في المجيء الثاني (تيطس ٢: ١٣)، كذلك يجعله بطرس مركزياً لرجاء شعب المسيح المتألم. وكما سار المسيح نفسه أولاً في طريق الآلام نحو \"الأمجاد التي بعدها\"، كذلك يفعل شعبه أيضاً. \"بل كما اشتركتم في آلام المسيح، افرحوا لكي تفرحوا في استعلان مجده أيضاً مبتهجين\". في الواقع، يقول بطرس إن كيفية استجابتنا لآلامنا الآن تحدد كيف سنختبر المجد لاحقاً. افرحوا في آلامكم \"لكي\" تفرحوا في المجد.\u003c/p\u003e\n\u003cp\u003eثم يتحدث بطرس، ثالثاً، من خبرته الخاصة بآلام المسيح ليؤكد مرة أخرى على مركزية المجد الآتي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e« أَطْلُبُ إِلَى الشُّيُوخِ الَّذِينَ بَيْنَكُمْ، أَنَا الشَّيْخَ رَفِيقَهُمْ، وَالشَّاهِدَ لآلاَمِ الْمَسِيحِ، وَشَرِيكَ الْمَجْدِ الْعَتِيدِ أَنْ يُعْلَنَ...» (١ بطرس ٥: ١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوهكذا يقدم بطرس تعزيزاً ثلاثياً لتركيز بولس على مركزية مجد المسيح في مجيئه الثاني. (١) يلخص بطرس رسالة الأنبياء بهذه الكلمات: \"آلام\" المسيح في مجيئه الأول و\"أمجاد\" في مجيئه الثاني (١ بطرس ١: ١١). (٢) يصف المجيء الثاني للمسيح بالعبارة الملخصة \"استعلان مجده\" (١ بطرس ٤: ١٣). (٣) عندما يصف تطلعه الخاص للمجيء الثاني، يلخصه بالحقيقة المليئة بالرجاء بأنه سيكون \"شريكاً في المجد\" (١ بطرس ٥: ١). الأنبياء يتوقعون المجد، والمسيحيون المتألمون يتوقعون المجد، وبطرس يتوقع المجد. المجد—أي المسيح مستعلناً في مجده—هو الحقيقة المركزية للمجيء الثاني.\u003c/p\u003e\n\u003ch3\u003eتنبؤ يسوع بمجد ثلاثي عند مجيئه\u003c/h3\u003e\n\u003cp\u003eهذا التركيز الموحد على صدارة المجد الإلهي في المجيء الثاني ليس غريباً بالنظر إلى الطريقة التي يصف بها يسوع نفسه رجوعه. فهو يتحدث مراراً كثيرة عن المجد المستقبلي لمجيئه. وفي نهاية حياته، في صلاته من أجل التلاميذ (الحاضرين والمستقبليين، يوحنا ١٧: ٢٠)، يصلي يسوع قائلاً: «أَيُّهَا الآبُ أُرِيدُ أَنَّ هؤُلاَءِ الَّذِينَ أَعْطَيْتَنِي يَكُونُونَ مَعِي حَيْثُ أَكُونُ أَنَا، لِيَنْظُرُوا مَجْدِي الَّذِي أَعْطَيْتَنِي…» (يوحنا ١٧: ٢٤).\u003c/p\u003e\n\u003cp\u003eهذا المجد بالتأكيد يشمل، المجد الذي سيعلن في المجيء الثاني للرب. على سبيل المثال، في لوقا ٩: ٢٣-٢٧، يشير يسوع إلى مجد ثلاثي عند مجيئه:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ِنْ أَرَادَ أَحَدٌ أَنْ يَأْتِيَ وَرَائِي، فَلْيُنْكِرْ نَفْسَهُ وَيَحْمِلْ صَلِيبَهُ كُلَّ يَوْمٍ، وَيَتْبَعْنِي. فَإِنَّ مَنْ أَرَادَ أَنْ يُخَلِّصَ نَفْسَهُ يُهْلِكُهَا، وَمَنْ يُهْلِكُ نَفْسَهُ مِنْ أَجْلِي فَهذَا يُخَلِّصُهَا. لأَنَّهُ مَاذَا يَنْتَفِعُ الإِنْسَانُ لَوْ رَبحَ الْعَالَمَ كُلَّهُ، وَأَهْلَكَ نَفْسَهُ أَوْ خَسِرَهَا؟ لأَنَّ مَنِ اسْتَحَى بِي وَبِكَلاَمِي، فَبِهذَا يَسْتَحِي ابْنُ الإِنْسَانِ مَتَى جَاءَ بِمَجْدِهِ وَمَجْدِ الآبِ وَالْمَلاَئِكَةِ الْقِدِّيسِينَ. حَقًّا أَقُولُ لَكُمْ: إِنَّ مِنَ الْقِيَامِ ههُنَا قَوْمًا لاَ يَذُوقُونَ الْمَوْتَ حَتَّى يَرَوْا مَلَكُوتَ اللهِ.» [٢] (لوقا ٩: ٢٣-٢٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوما أعنيه بـ \"المجد الثلاثي\" هو هذه الأمجاد الثلاثة المشار إليها في العدد ٢٦: \"فبهذا يستحي ابن الإنسان متى جاء بـ [١] مجده و[٢] مجد الآب و[٣] الملائكة القديسين\". لماذا هذه الطلقة الثلاثية من مدفع المجد؟ يكمن السبب في الوظيفة المنطقية للجملة، والتي تشير إليها الكلمة الاستهلالية \"لأَنَّ\".\u003c/p\u003e\n\u003cp\u003eيأتي العدد ٢٦ كسبب (لأَنَّ، γὰρ) لبيان عدم الجدوى المطلقة لمحاولة إنقاذ حياتك برفض إنكار نفسك من أجل المسيح (لوقا ٩: ٢٣). فإذا حاولت إنقاذ حياتك (لوقا ٩: ٢٤) وربح العالم كله (لوقا ٩: ٢٥)—بالاستحياء من يسوع في هذا العالم، وبمحبة مجد الإنسان—فإنك ترتكب خطأً فادحاً. لماذا؟ الإجابة عن هذا السؤال هي الغرض من لوقا ٩: ٢٦: \"لأَنَّ\" (γὰρ) المجد الذي ظننت أنك ستربحه بتجنب الاستحياء من المسيح وبربح العالم كله، هو مجد صغير بشكل مضحك مقارنة بالمجد الثلاثي الذي ستراه وتتمتع به وتكون جزءاً منه في المجيء الثاني للمسيح.\u003c/p\u003e\n\u003cp\u003eبعبارة أخرى، فإن مجد المسيح والآب والملائكة—وكلها مقصودة لتعظيم جلال المسيح في مجيئه—هو ما يؤكد عليه يسوع باعتباره الحقيقة الأساسية لرجوعه. وهو بالفعل يؤكد على مجده بطريقة تؤثر في الحاضر على ما نقدره في هذه الحياة. فهل نقدر تجنب الاستحياء ونوال مجد العالم، أم نقدر مجد المسيح ورجاء أن نكون جزءاً من ذلك الاستعلان العظيم في مجيئه؟\u003c/p\u003e\n\u003ch3\u003eتنبؤات المسيح بمجيئه بمجد عظيم\u003c/h3\u003e\n\u003cp\u003eنجد مثالاً آخر على كيفية تركيز يسوع على مجد مجيئه في الصورة التي يرسمها للدينونة الأخيرة في متى ٢٥: ٣١-٤٦. وتبدأ هكذا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَمَتَى جَاءَ ابْنُ الإِنْسَانِ فِي مَجْدِهِ وَجَمِيعُ الْمَلاَئِكَةِ الْقِدِّيسِينَ مَعَهُ، فَحِينَئِذٍ يَجْلِسُ عَلَى كُرْسِيِّ مَجْدِهِ. وَيَجْتَمِعُ أَمَامَهُ جَمِيعُ الشُّعُوبِ، فَيُمَيِّزُ بَعْضَهُمْ مِنْ بَعْضٍ كَمَا يُمَيِّزُ الرَّاعِي الْخِرَافَ مِنَ الْجِدَاءِ» (متى ٢٥: ٣١-٣٢)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعندما يأتي يسوع في اليوم الأخير ويفرز الخراف عن الجداء في الدينونة، سيكون مجيئه \"في مجده\"، والعرش الذي يجلس عليه سيكون عرش مجد. المجد هو الحقيقة الأساسية في وصف يسوع لمجيئه الثاني.\u003c/p\u003e\n\u003cp\u003eوسأذكر مقطعين آخرين فقط من كلمات يسوع يظهران صدارة المجد عند مجيء الرب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَتَكُونُ عَلاَمَاتٌ فِي الشَّمْسِ وَالْقَمَرِ وَالنُّجُومِ، وَعَلَى الأَرْضِ كَرْبُ أُمَمٍ بحَيْرَةٍ. اَلْبَحْرُ وَالأَمْوَاجُ تَضِجُّ، وَالنَّاسُ يُغْشَى عَلَيْهِمْ مِنْ خَوْفٍ وَانْتِظَارِ مَا يَأْتِي عَلَى الْمَسْكُونَةِ، لأَنَّ قُوَّاتِ السَّمَاوَاتِ تَتَزَعْزَعُ. وَحِينَئِذٍ يُبْصِرُونَ ابْنَ الإِنْسَانِ آتِيًا فِي سَحَابَةٍ بِقُوَّةٍ وَمَجْدٍ كَثِيرٍ.» (لوقا ٢١: ٢٥-٢٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَحِينَئِذٍ تَظْهَرُ عَلاَمَةُ ابْنِ الإِنْسَانِ فِي السَّمَاءِ. وَحِينَئِذٍ تَنُوحُ جَمِيعُ قَبَائِلِ الأَرْضِ، وَيُبْصِرُونَ ابْنَ الإِنْسَانِ آتِيًا عَلَى سَحَاب السَّمَاءِ بِقُوَّةٍ وَمَجْدٍ كَثِيرٍ.» [٣] (متى ٢٤: ٣٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيؤكد كلا النصين أن المسيح آتٍ \"بقوة ومجد كثير\". لقد أضحى كل ألم وعار وراء ظهره. فالانقلاب العظيم—المجد عوضاً عن الألم—سيُعلن على ملأ من العالم بأسره في مجيئه الثاني. ولن يكون مجداً مؤقتاً تشوبه انتكاسة لاحقة، بل سيكون \"مجداً أبدياً\" (٢ تيموثاوس ٢: ١٠؛ ١ بطرس ٥: ١٠).\u003c/p\u003e\n\u003cp\u003eهذا التأكيد من يسوع على مجد مجيئه الثاني هو مبرر واضح لبولس وبطرس لمعاملة مجد المسيح كحقيقة أساسية لمجيئه. وهذا هو بالفعل ما يفعلانه. فـ \"رجاؤنا السعيد\" (μακαρίαν ἐλπίδα) يلخصه بولس في الكلمات \"ظهور مجد الله العظيم ومخلصنا يسوع المسيح\" (تيطس ٢: ١٣). وبالنسبة لبطرس، فإن ملخص مجيء المسيح هو استعلان مجده (١ بطرس ٤: ١٣).\u003c/p\u003e\n\u003ch3\u003eالالتفات إلى اختبار مجده في الأيام الأخيرة\u003c/h3\u003e\n\u003cp\u003eلقد رأينا عند بولس وبطرس ويسوع تركيزاً مذهلاً على مجد الرب في مجيئه. فالحقيقة الموضوعية الأساسية للمجيء الثاني هي مجد المسيح—أو المسيح مستعلناً في مجد عظيم. ونحن الآن في وضع يسمح لنا بالتركيز على اختبار هذا المجد في حياة المؤمنين عندما يأتي الرب. وهذا يهيئنا لما أسميته جوهر الأمر—العلاقة بين مجد المسيح واختبارنا له. إن استيعاب هذه العلاقة سيساعدنا على تجنب المحبة غير الأصيلة لمجيء المسيح، وسيساعدنا على محبة ظهور المسيح كما ينبغي. نلتفت الآن إلى التركيز الكتابي على اختبارنا لمجد المسيح عند مجيئه.\u003c/p\u003e\n\u003cp\u003eالهوامش: [١] \"استعلان مجده\" هو بوضوح إشارة إلى المجيء الثاني، كما نرى من الطريقة التي يستخدم بها بطرس مصطلح استعلان، على سبيل المثال، في ١ بطرس ١: ٧: «... لِكَيْ تَكُونَ تَزْكِيَةُ إِيمَانِكُمْ، وَهِيَ أَثْمَنُ مِنَ الذَّهَبِ الْفَانِي، مَعَ أَنَّهُ يُخْتَبَرُ بِالنَّارِ، تُوجَدُ لِلْمَدْحِ وَالْكَرَامَةِ وَالْمَجْدِ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ». انظر أيضاً ١ بطرس ١: ١٣: «لِذَلِكَ مَنْطِقُوا أَحْقَاءَ ذِهْنِكُمْ صَاحِينَ، فَأَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النَّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ». [٢] في الفصل ١٣، أحاول توضيح كيف يرتبط العدد ٢٧ بالتجلي وبالمجيء الثاني. [٣] في الفصل ١٦، أتعامل مع الرأي الذي يسعى إلى حصر مثل هذه المقاطع في إتمام تاريخي متمثل في دمار أورشليم في عام ٧٠ ميلادية، دون أي إشارة إلى مجيء نهائي وعالمي للمسيح في انقضاء الدهر. وأحاول تبيان لماذا أظن أن هذا المسعى خاطئ.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgpomTzJpst66WIMPQsE8h-MAYTPGKGQfDsv371y6fBgzArBrejQZbiS0RWOakmFa12asoHu2kan3vIxJyuA_QOfgKz_F9mmmO6tpDFs8fakQXuGsPeoOBED2NgVyRJQ30tmZ2T-n_96GthLl0NUkg79VgNSldiJathrEFLsuWqI_aupC9U7k57h0dpM40/s2752/%D8%AC%D9%88%D9%87%D8%B1_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A_%D9%88%D9%85%D8%AC%D8%AF_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgpomTzJpst66WIMPQsE8h-MAYTPGKGQfDsv371y6fBgzArBrejQZbiS0RWOakmFa12asoHu2kan3vIxJyuA_QOfgKz_F9mmmO6tpDFs8fakQXuGsPeoOBED2NgVyRJQ30tmZ2T-n_96GthLl0NUkg79VgNSldiJathrEFLsuWqI_aupC9U7k57h0dpM40/s600/%D8%AC%D9%88%D9%87%D8%B1_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A_%D9%88%D9%85%D8%AC%D8%AF_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"24:T7849,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e٢. كيف يمكن لكتاب أن يوقظ المحبة لظهور المسيح؟\u003c/h2\u003e\n\u003cp\u003eبما أن الهدف من هذا الكتاب هو مساعدتك على محبة المجيء الثاني للمسيح، فكيف يمكن لهذا أن يحدث فعلياً؟ كيف يمكن للأفعال الطبيعية، المتمثلة في كتابة كتاب وقراءته، أن تؤدي إلى الخبرة الفائقة للطبيعة المتمثلة في محبة المسيح ومجيئه؟\u003c/p\u003e\n\u003ch3\u003eمحبة ظهور المسيح هي عمل الروح القدس\u003c/h3\u003e\n\u003cp\u003eلقد تكلمت في الفصل الأول عن ما يعنيه الكتاب المقدس بمحبة المجيء الثاني للمسيح وأنه ليس مجرد انبهار طبيعي بحدث مذهل. بل هو لهفة مأخوذة بالمسيح ولحضوره وتمجيده. تلك اللهفة المأخوذة بالمسيح هي خبرة فائقة للطبيعة. إنها عاطفة روحية في القلب لا يستطيع القلب البشري الساقط والخاطئ أن ينتجها. إنها عمل الروح القدس.\u003c/p\u003e\n\u003cp\u003eيوضح بولس أن «الإنسان الطبيعي لا يقبل ما لروح الله»، لأنها جهالة عنده، «ولا يقدر أن يعرفه لأنه إنما يحكم فيه روحياً» (١ كورنثوس ٢: ١٤). \"الإنسان الطبيعي\" هو ببساطة الشخص العادي الذي لا يسكن الروح القدس فيه ولا يغير قلبه بالإيمان. وقد وصف يهوذا الإنسان الطبيعي هكذا: «هؤُلاَءِ هُمُ الْمُعْتَزِلُونَ بِأَنْفُسِهِمْ، نَفْسَانِيُّونَ [ψυχικοί] لاَ رُوحَ [πνεῦμα μὴ ἔχοντες] لَهُمْ» (يهوذا ١٩).\u003c/p\u003e\n\u003cp\u003eوهناك طريقة أخرى لوصف \"الإنسان الطبيعي\" وهي التحدث عنه بوصفه يمتلك \"ذهن الجسد\" أو كونه \"في الجسد\". وكلمة \"الجسد\" (Flesh)، في استخدام بولس المعتاد للكلمة، تشير إلى الطبيعة البشرية الساقطة باعتبارها مستقلة عن الله وغير متأثرة بسكنى الروح القدس. في هذه الحالة، يكون الناس في عداوة مع الله. وفي حالة الاغتراب والمقاومة تلك، لا يخضعون ولا يستطيعون أن يخضعوا لإرشاد الله. لذا يقول بولس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّ اهْتِمَامَ الْجَسَدِ هُوَ عَدَاوَةٌ للهِ، إِذْ لَيْسَ هُوَ خَاضِعًا لِنَامُوسِ اللهِ، لأَنَّهُ أَيْضًا لاَ يَسْتَطِيعُ. فَالَّذِينَ هُمْ فِي الْجَسَدِ لاَ يَسْتَطِيعُونَ أَنْ يُرْضُوا اللهَ. وَأَمَّا أَنْتُمْ فَلَسْتُمْ فِي الْجَسَدِ بَلْ فِي الرُّوحِ، إِنْ كَانَ رُوحُ اللهِ سَاكِنًا فِيكُمْ. وَلكِنْ إِنْ كَانَ أَحَدٌ لَيْسَ لَهُ رُوحُ الْمَسِيحِ، فَذلِكَ لَيْسَ لَهُ.» (رومية ٨: ٧-٩)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالنقطة التي أستخلصها من تعليم بولس حول \"الإنسان الطبيعي\" و\"ذهن الجسد\" هي أنه لن يستطيع أحد منا أبداً أن يميز أو يعتنق عظمة وجمال وقيمة مجيء المسيح بدون العمل الفائق للطبيعة للروح القدس في قلوبنا. قد ننبهر بالأفكار النبوية، أو نؤخذ بتوقعات نهاية الأيام، أو نضطرب بسبب مستقبل مخيف. لكن لا شيء من هذا يتطلب تغييراً فائقاً للطبيعة للقلب البشري الساقط. لذا، بدون عمل الروح، لن نحب المجيء الثاني كما يقصد بولس في ٢ تيموثاوس ٤: ٨. لن نختبر هذه المحبة كلهفة مأخوذة بالمسيح لحضوره وتمجيده.\u003c/p\u003e\n\u003ch3\u003eرؤية مجد ظهوره تخلق التذوُّق\u003c/h3\u003e\n\u003cp\u003eلذا نعود إلى السؤال المطروح أعلاه: كيف يمكن للأفعال الطبيعية المتمثلة في كتابة كتاب وقراءته أن تؤدي إلى الخبرة الفائقة للطبيعة المتمثلة في محبة المسيح ومجيئه؟ لقد أجبتُ في الفصل الأول بأن الله يفتح العيون العمياء روحياً للأشخاص الطبيعيين ليروا عظمة ومجد وقيمة مجيء المسيح. وهو يفعل ذلك من خلال الحق الكتابي حول ظهور المسيح ومن خلال المعلمين الذين يشيرون إلى ذلك الحق. وهو يفعل ذلك، على سبيل المثال، من خلال الكتب.\u003c/p\u003e\n\u003cp\u003eلذا فإنني أقول إن المحبة الأصيلة لمجيء المسيح تُوقظ وتتكثف من خلال الرؤية الروحية لعظمة المسيح ومجده وقيمته في مجيئه. هناك \"رؤية\" تخلق \"تذوُّقاً\". هناك \"نور روحي\" يخلق \"عذوبة اللهفة\". لقد تحدث بولس عن «مُسْتَنِيرَةً عُيُونُ أَذْهَانِكُمْ، لِتَعْلَمُوا مَا هُوَ رَجَاءُ دَعْوَتِهِ» (أفسس ١: ١٨). هذا \"العلم\" ليس هو نوع المعرفة التي يمتلكها إبليس. فالشيطان يعرف عن المجيء الثاني ويوم الدينونة. نحن نعرف هذا لأنه عندما اقتحم يسوع نطاق إبليس، اشتكت الشياطين من أنه قد «جَاءَ إِلَى هُنَا قَبْلَ الْوَقْتِ لِيُعَذِّبَنَا» (متى ٨: ٢٩)؛ أي قبل اليوم المعين لدينونتهم النهائية. إنهم يعرفون جيداً ماذا سيعني المجيء الثاني للمسيح بالنسبة لهم.\u003c/p\u003e\n\u003cp\u003eهذا النوع من المعرفة ليس هدفنا. نحن لسنا بحاجة إلى إنارة عيون قلوبنا من قبل الله لكي نعرف بالطريقة التي تعرف بها الشياطين. تلك معرفة طبيعية، ولا تتطلب عمل الروح القدس. لم يكن بولس يصلي في أفسس ١: ١٨ لكي ينير الله عيون قلوبنا حتى نشارك الشياطين معرفتهم. بل كان يصلي لأجل نوع من \"المعرفة\" لا يعطيه إلا الروح القدس. كان يصلي لأجل معرفة بواقع رجائنا تنتج فعلياً ابتهاجاً في رجائنا! كان يصلي لأجل الخبرة الفائقة للطبيعة المتمثلة في الرغبة في رجائنا ومحبته. كان يصلي لكي نحب ظهور المسيح.\u003c/p\u003e\n\u003cp\u003eوتلك \"المحبة\" هي أثر لمعرفة مستنيرة روحياً. فلو كانت محبتنا للمجيء الثاني قد استُحضرت بأساليب تتجاوز معرفة الحق، فإن تلك المحبة لن تكرم المسيح. إن الأشواق التي تعظم المسيح هي أشواق توقظها رؤية حقيقية للمسيح؛ معرفة حقيقية بالمسيح. وهكذا هو الحال مع المجيء الثاني. إن المحبة الوحيدة لظهور المسيح التي تكرم المسيح هي المحبة التي توقظها معرفة حقيقية بظهوره.\u003c/p\u003e\n\u003cp\u003eلذا فإن الفعل الطبيعي المتمثل في تقديم المعرفة (مثل كتابة هذا الكتاب) يسير جنباً إلى جنب مع الخبرة الفائقة للطبيعة المتمثلة في رؤية عظمة ومجد وقيمة المسيح \"من خلال\" تلك المعرفة.\u003c/p\u003e\n\u003ch3\u003eالأخبار، والمجد، والنور\u003c/h3\u003e\n\u003cp\u003eيوضح بولس هذا الارتباط بين الرؤية الفائقة للمجد والمعرفة الطبيعية للحق. يقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِينَ فِيهِمْ إِلهُ هذَا الدَّهْرِ قَدْ أَعْمَى أَذْهَانَ غَيْرِ الْمُؤْمِنِينَ، لِئَلاَّ تُضِيءَ لَهُمْ إِنَارَةُ إِنْجِيلِ مَجْدِ الْمَسِيحِ، الَّذِي هُوَ صُورَةُ اللهِ... لأَنَّ اللهَ الَّذِي قَالَ: «أَنْ يُشْرِقَ نُورٌ مِنْ ظُلْمَةٍ»، هُوَ الَّذِي أَشْرَقَ فِي قُلُوبِنَا، لإِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ.» (٢ كورنثوس ٤: ٤-٦)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eتصف الآية ٤ ما عُمي الناس عن رؤيته. وتصف الآية ٦ التغلب على ذلك العمى بتدخل الله الفائق للطبيعة. تحتوي الآية ٤ على ثلاثة عناصر:\u003c/p\u003e\n\u003cp\u003eأولاً، هناك \"الإنجيل\"، أي \"الأخبار السارة\". هناك أخبار حقيقية وواقعية. هناك حقائق موضوعية حول من هو المسيح وماذا فعل. وكما يقول بولس في ١ كورنثوس ١٥: ١-٤: «أُعَرِّفُكُمْ أَيُّهَا الإِخْوَةُ بِالإِنْجِيلِ... أَنَّ الْمَسِيحَ مَاتَ مِنْ أَجْلِ خَطَايَانَا حَسَبَ الْكُتُبِ، وَأَنَّهُ دُفِنَ، وَأَنَّهُ قَامَ فِي الْيَوْمِ الثَّالِثِ حَسَبَ الْكُتُبِ». هذه أخبار حقيقية وموضوعية وواقعية.\u003c/p\u003e\n\u003cp\u003eثانياً، هناك \"المجد\". يشير بولس إلى «إِنْجِيلِ مَجْدِ الْمَسِيحِ» (٢ كورنثوس ٤: ٤). الأخبار هي حقيقة موضوعية، لكنها تنقل ما هو أكثر من مجرد أحداث. إنها تحمل في طياتها مجداً؛ جمالاً، وبهاءً، وقيمةً، وعظمةً للمسيح. إن أخبار المسيح، حين تُروى بشكل صحيح، تكون نافذة تطل على مجد المسيح. لكن الشخص قد يسمع الأخبار ولا يرى المجد على حقيقته.\u003c/p\u003e\n\u003cp\u003eثالثاً، هناك \"النور\" الذي قد يراه أو لا يراه أولئك الذين يسمعون أخبار هذا المجد. يتحدث بولس عن «إِنَارَةِ إِنْجِيلِ مَجْدِ الْمَسِيحِ» (٢ كورنثوس ٤: ٤). هذا النور هو ما يحاول الشيطان، «إِلهُ هذَا الدَّهْرِ» (انظر أيضاً يوحنا ١٢: ٣١؛ ١٤: ٣٠؛ ١٦: ١١؛ أفسس ٢: ٢)، إخفاءه إن استطاع. هو لا يهتم كثيراً بما إذا كان الناس يسمعون الأخبار، أو حتى ما إذا كانوا يسمعون الأخبار وهي تُروى بطريقة تشير إلى مجد المسيح. يقيناً، هو يكره الأخبار والمجد. لكن الشخص يمكنه سماع \"إنجيل مجد المسيح\" ويظل مقيداً تماماً في عبودية الشيطان. ولكن إذا رأى الشخص نور إنجيل المجد ذلك، فقد فقده الشيطان. لقد وُلد ثانية. إنه ينتمي لله. إن رؤية ذلك \"النور\" هي خبرة فائقة للطبيعة.\u003c/p\u003e\n\u003cp\u003eهذه المعجزة في الرؤية موصوفة في الآية ٦. ومرة أخرى، هناك العناصر الثلاثة نفسها.\u003c/p\u003e\n\u003cp\u003eأولاً، هناك الأخبار، لكنها تسمى هذه المرة \"معرفة\". هذا هو المحتوى الموضوعي للحق حول المسيح وما فعله.\u003c/p\u003e\n\u003cp\u003eثانياً، هناك \"المجد\". تماماً كما تحدثت الآية ٤ عن \"إنجيل المجد\"، تتحدث الآية ٦ عن «مَعْرِفَةِ مَجْدِ اللهِ». في الآية ٤، هو «مَجْدِ الْمَسِيحِ، الَّذِي هُوَ صُورَةُ اللهِ». وفي الآية ٦، هو «مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ». إنه مجد إلهي واحد؛ مجد المسيح بكونه صورة الله الآب، ومجد الله كما يشرق في وجه المسيح. مجد إلهي واحد.\u003c/p\u003e\n\u003cp\u003eثالثاً، هناك \"النور\". هنا فقط في الآية ٦، يُمكِّن الله القلب من رؤيته. لقد تم التغلب على عمى الشيطان. «اللهَ الَّذِي قَالَ: «أَنْ يُشْرِقَ نُورٌ مِنْ ظُلْمَةٍ»، هُوَ الَّذِي أَشْرَقَ فِي قُلُوبِنَا، لإِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ». إن \"معرفة [أو أخبار] المجد\" تُنقل الآن، بتدخل الله، كنوع من \"النور\" الذي يكشف المجد بكونه مجيداً لقلب من يراه. إن خبرة القلب لهذا النور تتجاوز أي شيء يمكن أن يختبره \"الإنسان الطبيعي\" أو الشيطان. هذه رؤية تفرض تذوُّقاً. هذه رؤية تصبح كنزاً.\u003c/p\u003e\n\u003cp\u003eوعندما تكون هذه الرؤية هي رؤية لمجد المجيء الثاني للمسيح، فإنها رؤية تصبح محبة. هكذا يحدث أن أياً منا قد «أحبوا ظهوره» (٢ تيموثاوس ٤: ٨). الله يشرق في قلوبنا ليعطي نور معرفة مجد الله في مجيء المسيح. تلك الخبرة لإنارة الله للقلب يسميها بولس محبة ظهور الرب. إنها عاطفة روحية متجذرة في حقائق حقيقية ومجيدة وموضوعية معلنة في الكتاب المقدس. وهي تُنقل من خلال المعرفة الحقيقية بتلك الحقائق. هكذا يمكن لكتاب أن يصبح الوسيلة لمحبتك للمجيء الثاني. وهكذا، فإن الفعل الطبيعي المتمثل في تقديم المعرفة (مثل كتابة هذا الكتاب) يسير جنباً إلى جنب مع الخبرة الفائقة للطبيعة المتمثلة في رؤية عظمة ومجد وقيمة المسيح في مجيئه.\u003c/p\u003e\n\u003ch3\u003eمثال بطرس ويوحنا المعمدان\u003c/h3\u003e\n\u003cp\u003eما رأيناه في ٢ كورنثوس ٤: ٤-٦ يظهر أيضاً بطريقة مختلفة في تعليم يسوع. هنا نرى مرة أخرى أنه عندما يكون هدفنا هو خبرة فائقة للطبيعة لواقع موضوعي، فهناك دائماً خطوتان للوصول إلى هناك. إحداهما طبيعية، والأخرى فائقة للطبيعة؛ العرض الطبيعي للواقع أمام أذهاننا، ثم الإنارة الإلهية الفائقة للطبيعة لتجعلنا نرى المجد الإلهي في ذلك الواقع. تأمل في توضيح لهاتين الخطوتين في خدمة يسوع.\u003c/p\u003e\n\u003cp\u003eجاءت لحظة ليوحنا المعمدان عندما أختلفت خدمة يسوع عن توقعاته حول كيفية تصرف المسيح الآتي. كان يوحنا في السجن، وهو أمر مزعج في حد ذاته إذا كان الملكوت المسياني على وشك البزوغ. لذا أرسل من السجن رسالة إلى يسوع قائلاً: «أَنْتَ هُوَ الآتِي أَمْ نَنْتَظِرُ آخَرَ؟» (متى ١١: ٣). ما كان على المحك هنا هو إيمان يوحنا المعمدان بيسوع بكونه المسيح.\u003c/p\u003e\n\u003cp\u003eفي هذه اللحظة، ربما كان يسوع ليصلي لأجل يوحنا لكي ينير الله قلبه بطريقة فائقة للطبيعة ليرى مجد يسوع الذي يشهد لذاته في الحقائق التي كان يوحنا يعرفها بالفعل. في الواقع، ربما فعل يسوع ذلك بالضبط؛ نحن لا نعرف. لكننا نعرف ما فعله يسوع يقيناً. قال يسوع لرسل يوحنا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«اذْهَبَا وَأَخْبِرَا يُوحَنَّا بِمَا تَسْمَعَانِ وَتَنْظُرَانِ: اَلْعُمْيُ يُبْصِرُونَ، وَالْعُرْجُ يَمْشُونَ، وَالْبُرْصُ يُطَهَّرُونَ، وَالصُّمُّ يَسْمَعُونَ، وَالْمَوْتَى يَقُومُونَ، وَالْمَسَاكِينُ يُبَشَّرُونَ. وَطُوبَى لِمَنْ لاَ يَعْثُرُ فِيَّ.» (متى ١١: ٤-٦)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبعبارة أخرى، تأكد يسوع من أن يوحنا يمتلك الحقائق. الأخبار. المعرفة.\u003c/p\u003e\n\u003cp\u003eالآن قارن هذه المعاملة بين يسوع ويوحنا المعمدان بمعاملة بين يسوع وبطرس. فبدلاً من انتظار بطرس ليسأل يسوع عما إذا كان هو المسيح أم لا، كما فعل يوحنا، بادر يسوع وسأل التلاميذ: «مَنْ تَقُولُونَ إِنِّي أَنَا؟» فأجاب بطرس: «أَنْتَ هُوَ الْمَسِيحُ ابْنُ اللهِ الْحَيِّ». فاستجاب يسوع لهذا قائلاً: «طُوبَى لَكَ يَا سِمْعَانُ بْنَ يُونَا، إِنَّ لَحْمًا وَدَمًا لَمْ يُعْلِنْ لَكَ، لكِنَّ أَبِي الَّذِي فِي السَّمَاوَاتِ» (متى ١٦: ١٥-١٧).\u003c/p\u003e\n\u003cp\u003eأدرك يسوع في إجابة بطرس أن معجزة قد حدثت. لقد \"أعلن\" الله شيئاً لبطرس يتجاوز ما يمكن لـ \"لحم ودم\" أن يراه. لقد كانت أكثر من مجرد معرفة واقعية يمكن للبشر والشياطين نيلها بفكرهم الطبيعي. إنها أكثر من مجرد الحقيقة المجردة بأن يسوع هو ابن الله. فالشيطان يعرف أن يسوع هو ابن الله. لذا يقول الروح النجس ليسوع: «أَنَا أَعْرِفُكَ مَنْ أَنْتَ: قُدُّوسُ اللهِ!» (مرقس ١: ٢٤). لكن معرفة الشيطان هي معرفة كارهة، وليست معرفة محبة. الشيطان \"يعرف\"، لكنه «لا يعرف كما يجب أن يعرف» (١ كورنثوس ٨: ٢).\u003c/p\u003e\n\u003cp\u003eلم يكن الشيطان قد رأى يسوع بكونه ثميناً بشكل مجيد. لقد رآه فقط كتهديد هجومي. لم يرَ عظمة يسوع كعظمة كنز. لكن إدراك بطرس ليسوع تجاوز ما يمكن للبشر الطبيعيين والشياطين رؤيته. كانت رؤيته \"مباركة\". أما رؤية الشيطان فلم تكن كذلك. «طُوبَى لَكَ يَا سِمْعَانُ». لقد كان مباركاً لأن رؤيته كانت رؤية مغيرة للمسيح وهبها الله له. لقد اختبر معجزة ٢ كورنثوس ٤: ٦. لقد \"أشرق الله في قلبه\" ليعطي نور معرفة مجد الله في وجه يسوع المسيح.\u003c/p\u003e\n\u003cp\u003eالآن تأمل فيما تعلمه لنا هاتان المواجهتان -مع يوحنا المعمدان ومع بطرس- حول المعرفة الطبيعية والمحبة الفائقة للطبيعة. إنهما تظهران أنه عندما يكون هدفنا هو خبرة فائقة للطبيعة لواقع موضوعي، فهناك دائماً خطوتان للوصول إلى هناك: واحدة طبيعية، والأخرى فائقة للطبيعة. احتاج كل من يوحنا وبطرس إلى معرفة واقعية عن يسوع. احتاجوا إلى عرض طبيعي للواقع أمام أذهانهم. امتلك بطرس هذه المعرفة من العيش مع يسوع كتلميذ مقرب. ويوحنا ذكّره يسوع بها: «اذْهَبَا وَأَخْبِرَا يُوحَنَّا بِمَا تَسْمَعَانِ وَتَنْظُرَانِ». وكلاهما احتاج إلى التدخل الفائق للطبيعة من الله لينير المعرفة الطبيعية بنوع من \"النور\" الذي يحول صانع عجائب يهودياً إلى كنز ذي قيمة غير محدودة (متى ١٣: ٤٤).\u003c/p\u003e\n\u003cp\u003eما هو إذن الجواب على السؤال الذي طرحناه في بداية هذا الفصل؟ بما أن الهدف من هذا الكتاب هو مساعدتك على محبة المجيء الثاني للمسيح، فكيف يمكن لهذا أن يحدث فعلياً؟ كيف يمكن للفعل الطبيعي المتمثل في كتابة كتاب وقراءته أن يؤدي إلى الخبرة الفائقة للطبيعة المتمثلة في محبة المسيح ومجيئه؟ لقد رأينا الجواب الآن. يمكن أن يحدث ذلك إذا نقلتُ بدقة \"الأخبار السارة\" و\"المعرفة\" حول مجد المسيح في مجيئه، وإذا أشرق الله في قلبك بالنور الإلهي لذلك المجد (٢ كورنثوس ٤: ٦). يمكن أن يحدث إذا أخبرتُك بدقة عن أمجاد المجيء الثاني الموجودة حقاً في الكتاب المقدس، وإذا أعلن الله قيمتها المشبعة للقلب، والتي لا يستطيع لحم ودم إعلانها (متى ١١: ١-٦؛ ١٦: ١٧). بعبارة أخرى، يمكن أن يحدث إذا قبلت الحق الموضوعي من خلال كتابتي، وإذا أشرق الله بالنور الروحي من خلال قراءتك.\u003c/p\u003e\n\u003ch3\u003eأسس الحق حول المجيء الثاني\u003c/h3\u003e\n\u003cp\u003eيمكنك أن ترى افتراضاً ضمنياً فيما قلته للتو، وأريد أن أجعله صريحاً مع بعض التوضيح. أنا أفترض صدق التعليم الكتابي حول المجيء الثاني. وأنا لا أفترض ذلك بدون سبب. لكن ذلك الاستدلال موجود في كتاب آخر، «مجد فريد: كيف تعلن الأسفار المسيحية عن صدقها الكامل». هنا أنا أفترض أن ما يعلمه الكتاب المقدس عن المجيء الثاني هو حق. وإذا كانت لديك أسئلة حول ذلك، فإن إحدى طرق المضي قدماً هي قراءة هذا الكتاب من أجل أن «تَمْتَحِنُوا كُلَّ شَيْءٍ. تَمَسَّكُوا بِالْحَسَنِ» (١ تسالونيكي ٥: ٢١). اختبر لترى ما إذا كنتُ أتعامل مع الأسفار بدقة، واقرأ مع الصلاة بأن يؤكد الله لذهنك وقلبك ما هو حق فعلاً. بعبارة أخرى، قد يكون الكتاب نفسه وسيلة يستخدمها الله لزيادة ثقتك في الأسفار.\u003c/p\u003e\n\u003cp\u003eأحد الأسباب التي تجعلني أتريث هنا للتأكيد على حق الكتاب المقدس هو أن هذا ما يفعله الرسول بطرس في رسالته الثانية عندما يبدأ في التعامل مع مسألة المجيء الثاني للمسيح. كان بطرس على وشك مخاطبة المتشككين الذين سألوا: «أَيْنَ هُوَ مَوْعِدُ مَجِيئِهِ؟» (٢ بطرس ٣: ٤). ولكن قبل أن يقدم إجاباته على تشككهم، وضع أساس صدقه.\u003c/p\u003e\n\u003cp\u003eلقد وضع أساسين: أولاً، خبرته الخاصة كشاهد عيان للمسيح على جبل التجلي، وثانياً، تأكيد أسفار العهد القديم التي أوحى بها الله. سأتعامل مع تعليم بطرس حول المجيء الثاني في الفصل العشرين. هنا أنا أشير فقط إلى أنه حريص على وضع أسس لصدق تعاليمه، وهو ما أريد القيام به أيضاً.\u003c/p\u003e\n\u003cp\u003eيقول أولاً: «لأَنَّنَا لَمْ نَتْبَعْ خُرَافَاتٍ مُصَنَّعَةً، إِذْ عَرَّفْنَاكُمْ بِقُوَّةِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَمَجِيئِهِ، بَلْ قَدْ كُنَّا مُعَايِنِينَ عَظَمَتَهُ» (٢ بطرس ١: ١٦). بطرس يدرك أن الناس يضلون بخرافات نهاية الأيام. وهو لا يريد أي شيء من ذلك. إنه ليس صانع خرافات ولا تابعاً لخرافات. إن مناداته بالحق تستند إلى خبرته الخاصة كشاهد عيان لتعاليم يسوع وأفعاله.\u003c/p\u003e\n\u003cp\u003eإشارته لرؤية \"عظمة\" المسيح تشير إلى كونه مع المسيح على جبل التجلي (متى ١٧: ١-٨). «إِذْ أَقْبَلَ عَلَيْهِ صَوْتٌ كَهذَا مِنَ الْمَجْدِ الأَسْنَى: «هذَا هُوَ ابْنِي الْحَبِيبُ الَّذِي أَنَا سُرِرْتُ بِهِ» [متى ١٧: ٥]. وَنَحْنُ سَمِعْنَا هذَا الصَّوْتَ مُقْبِلاً مِنَ السَّمَاءِ، إِذْ كُنَّا مَعَهُ فِي الْجَبَلِ الْمُقَدَّسِ» (٢ بطرس ١: ١٧-١٨). سنتعامل في الفصل الثالث عشر مع سبب ربط بطرس للتجلي بالمجيء الثاني («قوة ربنا يسوع المسيح ومجيئه»، ٢ بطرس ١: ١٦)، ولكن النقطة الآن هي ببساطة: بطرس يريد أن ينأى بنفسه قدر الإمكان عن الخرافات التخمينية. إنه يريد فقط تعليم الحق الذي يوجد له سبب وجيه. يريد أساساً معقولاً يسند كل ما يقوله. وأنا أشاركه هذا الهدف.\u003c/p\u003e\n\u003cp\u003eثانياً، ينتقل من أساس خبرته الخاصة كشاهد عيان ليسوع إلى أساس الأسفار الموحى بها، والتي كانت تعني بالنسبة له العهد القديم (رغم أنه يشير في ٣: ١٦ إلى رسائل بولس كجزء من الأسفار). يقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَعِنْدَنَا الْكَلِمَةُ النَّبَوِيَّةُ، وَهِيَ أَثْبَتُ، الَّتِي تَفْعَلُونَ حَسَنًا إِنِ انْتَبَهْتُمْ إِلَيْهَا،... عَالِمِينَ هذَا أَوَّلاً: أَنَّ كُلَّ نُبُوَّةِ الْكِتَابِ لَيْسَتْ مِنْ تَفْسِيرٍ خَاصٍّ.» (٢ بطرس ١: ١٩، ٢١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا واحد من أوضح التعاليم في الكتاب المقدس فيما يتعلق بالوحي الإلهي لأسفار العهد القديم. آمن بطرس، لسبب وجيه (وآمن يسوع بالشيء نفسه، متى ٥: ١٧-١٨؛ يوحنا ١٠: ٣٥)، بأن كتاب العهد القديم لم يكونوا يتصرفون من تلقاء أنفسهم. لقد كانوا مسوقين من الروح القدس. وما كتبوه لم يكن مجرد كلمتهم هم، بل كانت كلمة الله. لذلك، كان بطرس حريصاً على وضع أساس مزدوج أساساً لتعليمه حول المجيء الثاني؛ أي روايات شهود العيان عن يسوع والأسفار التي أوحى بها الله. وأنا أشارك بطرس حرصه، وأشاركه ثقته في رواية شهود العيان عن يسوع وفي الأسفار الموحى بها.\u003c/p\u003e\n\u003ch3\u003eكلمات لن تتزعزع أبداً\u003c/h3\u003e\n\u003cp\u003eلا يمكنني المضي قدماً دون لفت الانتباه إلى الحرص نفسه لدى يسوع للتأكد من أننا نرى تعليمه الخاص كأرضية صلبة كالصخر وغير متزعزعة لفهمنا للمجيء الثاني. ففي أطول وأكثر معالجة تفصيلية لنهاية الأيام في أناجيل العهد الجديد، أي متى ٢٤، يقول يسوع هذا: «اَلسَّمَاءُ وَالأَرْضُ تَزُولانِ وَلكِنَّ كَلاَمِي لاَ يَزُولُ» (٢٤: ٣٥). كان يسوع يدرك أن جميع أنواع الأنبياء الكذبة والمُسحاء الكذبة والتعليم الكاذب سوف يتحدون الفهم الصحيح للمجيء الثاني (متى ٢٤: ١٠-١١، ٢٤). لذلك، أراد التأكيد على أنه في كل تزلزل العالم الذي سيأتي، لن تتزعزع كلماته أبداً عن صدقها. لدينا أساس جيد لمعرفة ما نحتاج إلى معرفته عن المجيء الثاني.\u003c/p\u003e\n\u003ch3\u003eتذوُّق الحق الذي نراه\u003c/h3\u003e\n\u003cp\u003eعندما أقول إن هذا الكتاب يمكن أن يكون وسيلة لمحبتك لظهور المسيح، إذا نقلتُ الحق الموضوعي من خلال كتابتي، وإذا أعطى الله النور الروحي من خلال قراءتك، فإن الحق الموضوعي الذي أضعه في اعتباري ليس سوى ما يعلمه الكتاب المقدس. أنا لا أدعي أي سلطة خاصة بي. إذا كنتُ أميناً لما يعلمه الكتاب المقدس، فلي رجاء صالح في أن يُسر الله بالقيام بعمله الإعجازي الواهب للنور حتى لا يرى الكثيرون حقائق المسيح في مجيئه فحسب، بل يروها بكونها مجيدة وثمينة؛ أثمن من كل هذا العالم. هذا هو هدفي؛ أن تتذوق الحق الذي تراه، وأن نجد أنفسنا جميعاً ضمن عداد أولئك «الَّذِينَ يُحِبُّونَ ظُهُورَهُ» (٢ تيموثاوس ٤: ٨).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhR_q5k851J7L8ZnFPG-gnvPX5ODwgZVSv0BgrQjy4GlxKQOgS5-7S-ap7_3qONJklVZ6G1WFzXgdi7wrc1HY3n-rBrA6ZrV_60t76_XPPUBs5Vao5dd9kpHbuRDZi3W5GN1SXleRv8MERCnT2I638VJerBAI-asPZrDKeWWKRujPNkI9f5VDNzdxsO4lE/s2752/unnamed%20%2825%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhR_q5k851J7L8ZnFPG-gnvPX5ODwgZVSv0BgrQjy4GlxKQOgS5-7S-ap7_3qONJklVZ6G1WFzXgdi7wrc1HY3n-rBrA6ZrV_60t76_XPPUBs5Vao5dd9kpHbuRDZi3W5GN1SXleRv8MERCnT2I638VJerBAI-asPZrDKeWWKRujPNkI9f5VDNzdxsO4lE/s600/unnamed%20%2825%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"25:T7a54,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eترجمة كتاب \"تعال أيها الرب يسوع\" للقس جون بايبر\u003c/h2\u003e\n\u003cp\u003eيساور الكثيرين الفضول بشأن المجيء الثاني للمسيح؛ كيف ستكون هيئته، ومتى سيقع، وما هي العلامات التي ستسبقه. في كتاب «تَعَالَ أَيُّهَا الرَّبُّ يَسُوعُ»، يتناول جون بايبر كافة هذه المسائل، لكنه يشدد على أن أولئك الذين يحبون المجيء الثاني للمسيح سينالون إكليل البر (٢ تيموثاوس ٤: ٦-٨).\u003c/p\u003e\n\u003cp\u003eيفحص بايبر نصوصاً كتابية جوهرية تتعلق بالمجيء الثاني، بينما يحث القراء على التماس أشواق قلبية يوقظها الروح القدس لرجوع يسوع. كما يستقصي أسئلة حيوية مثل: هل يمكن للمسيح أن يأتي في أية لحظة، أم ثمة أحداث لا بد أن تقع أولاً؟ وماذا يعني قوله: «اِسْهَرُوا إِذًا لأَنَّكُمْ لاَ تَعْلَمُونَ الْيَوْمَ وَلاَ السَّاعَةَ»؟ وماذا ينبغي لنا أن نفعل حين يجيء؟ ومن خلال تركيز خاص على تعاليم يسوع وبولس وبطرس، لا يصور كتاب «تَعَالَ أَيُّهَا الرَّبُّ يَسُوعُ» مجد المخلص المُعلن فحسب، بل يصور أيضاً تمجيد القديسين المُقامين.\u003c/p\u003e\n\u003chr\u003e\n\u003ch2\u003eتمهيد للجزء الأول: المعجزة التي نرجوها: المحبة\u003c/h2\u003e\n\u003cp\u003eإن الهدف من هذا الكتاب هو مساعدتك على محبة المجيء الثاني ليسوع المسيح. لقد استُلهمت المحتويات والعنوان جزئياً من الصلوات الكتابية: «تَعَالَ أَيُّهَا الرَّبُّ يَسُوعُ!» (رؤيا ٢٢: ٢٠)، و«مَارَانَ أَثَا» (١ كورنثوس ١٦: ٢٢). ولكن بشكل أساسي، استُلهم الكتاب من عاطفة القلب الكامنة خلف هذه الصلوات، والتي عبر عنها بولس في ٢ تيموثاوس ٤: ٨:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَأَخِيرًا قَدْ وُضِعَ لِي إِكْلِيلُ الْبِرِّ، الَّذِي يَهَبُهُ لِي فِي ذَلِكَ الْيَوْمِ، الرَّبُّ الدَّيَّانُ الْعَادِلُ، وَلَيْسَ لِي فَقَطْ، بَلْ لِجَمِيعِ الَّذِينَ يُحِبُّونَ ظُهُورَهُ أَيْضًا.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن إكليل البر موعود لأولئك الذين يحبون المجيء الثاني للمسيح. نحن نصلي لأجل ظهوره، لأننا نحب ظهوره. إن صلاة «تَعَالَ أَيُّهَا الرَّبُّ يَسُوعُ» متجذرة في شيء أعمق: «أنا أحب ظهورك!»\u003c/p\u003e\n\u003cp\u003eيدور هذا الكتاب حول الواقع الذي يوقظ مثل هذه المحبة، وكيفية حدوث هذا الاستيقاظ. تتضمن هذه المحبة الرغبة، واللهفة، والرجاء. إنها ليست فعلاً جسدياً، بل هي عاطفة روحية في القلب. وأعني بكلمة \"روحية\" أنها أُوجدت وتشكلت بواسطة الروح القدس. وليس من المستغرب أن يوجِد الروح القدس محبة القلب لمجيء المسيح، لأن أسمى عمل جوهري للروح في قلب الإنسان هو تمجيد يسوع. يقول يسوع عن الروح: «ذَاكَ يُمَجِّدُنِي» (يوحنا ١٦: ١٤).\u003c/p\u003e\n\u003cp\u003eلذلك، فإن محبتنا للمجيء الثاني، التي أيقظها الروح، ليست انبهاراً بحدثٍ ما مع إهمال المسيح، بل هي لهفة مأخوذة بالمسيح لحضوره ومجده. إنها امتداد لمحبتنا للمسيح؛ ذلك النوع من المحبة الذي كان يسوع ينشده في متى ١٠: ٣٧: «مَنْ أَحَبَّ أَبًا أَوْ أُمًّا أَكْثَرَ مِنِّي فَلاَ يَسْتَحِقُّنِي، وَمَنْ أَحَبَّ ابْنًا أَوِ ابْنَةً أَكْثَرَ مِنِّي فَلاَ يَسْتَحِقُّنِي.» إن أي محبة للمجيء الثاني ليست امتداداً لهذه العاطفة الأسمى ليسوع نفسه، ليست هي العمل المُمجِّد للمسيح الذي يقوم به الروح القدس. إنها ليست المحبة التي وعد بولس بإكليل لها، وليست هي ما أهدف إليه.\u003c/p\u003e\n\u003cp\u003eلذلك، يهدف هذا الكتاب إلى معجزة لا يمكن للكتاب وحده أن يحققها، وهي: الأشواق التي يخلقها الروح. لكن هذا الهدف لا يختلف عن كل تعليم وكرازة ومشورة وخدمة مسيحية تسعى لبناء الإيمان بيسوع، وإنقاذ الناس من الدينونة الإلهية، وإثارة البر المُمجِّد للمسيح. كل هذا الإيمان والإنقاذ والبر هي أعمال روح الله (رومية ٥: ٩؛ أفسس ٢: ٨؛ فيلبي ١: ٢٩؛ ٢ تسالونيكي ١: ١١). الوسائل البشرية -مثل الكتب- ليست حاسمة؛ الله هو الحاسم.\u003c/p\u003e\n\u003cp\u003eلكن الوسائل البشرية معينة إلهياً. فعندما يقصد الله أن يفتح عيون العميان روحياً ليروا مجد المسيح ومجيئه، فإنه يرسل رسولاً بشرياً ويقول: «أَنَا الآنَ أُرْسِلُكَ إِلَيْهِمْ، لِتَفْتَحَ عُيُونَهُمْ كَيْ يَرْجِعُوا مِنْ ظُلُمَاتٍ إِلَى نُورٍ» (أعمال ٢٦: ١٧-١٨). هكذا يوقظ الله المحبة للمجيء الثاني؛ إنه يفتح عيون العميان ليروا عظمة ومجد وقيمة مجيء المسيح. وهو يفعل ذلك من خلال الحق الكتابي حول مجيء المسيح ومن خلال المعلمين البشر الذين يشيرون إلى ذلك الحق. وهذا ما أهدف إلى القيام به في هذا الكتاب.\u003c/p\u003e\n\u003ch3\u003e١. جميع الذين أحبوا ظهوره\u003c/h3\u003e\n\u003cp\u003eدعونا نتأكد من أن النص الكتابي الذي يستند إليه هذا الكتاب يمكنه تحمل الثقل:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\u003cstrong\u003e«\u003cstrong\u003e\u003cstrong\u003eفَإِنِّي أَنَا الآنَ أُسْكَبُ سَكِيبًا، وَوَقْتُ انْحِلاَلِي قَدْ حَضَرَ. قَدْ جَاهَدْتُ الْجِهَادَ الْحَسَنَ، أَكْمَلْتُ السَّعْيَ، حَفِظْتُ الإِيمَانَ،  وَأَخِيرًا قَدْ وُضِعَ لِي إِكْلِيلُ الْبِرِّ، الَّذِي يَهَبُهُ لِي فِي ذلِكَ الْيَوْمِ، الرَّبُّ الدَّيَّانُ الْعَادِلُ، وَلَيْسَ لِي فَقَطْ، بَلْ لِجَمِيعِ الَّذِينَ يُحِبُّونَ ظُهُورَهُ أَيْضًا.\u003c/strong\u003e\u003c/strong\u003e» (٢ تيموثاوس ٤: ٦-٨)\u003c/strong\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهل يشير \"الظهور\" المذكور في العدد ٨ فعلياً إلى المجيء الثاني للمسيح، أم يشير إلى مجيئه الأول، أي تجسده؟ بالنظر إليها في حد ذاتها، فإن كلمة \"ظهور\" (ἐπιφάνεια) يمكن أن تشير إلى مجيئه الأول. فمن بين الاستخدامات الخمسة الأخرى لهذه الكلمة من قبل الرسول بولس، تشير أربعة منها إلى المجيء الثاني (٢ تسالونيكي ٢: ٨؛ ١ تيموثاوس ٦: ١٤؛ ٢ تيموثاوس ٤: ١؛ تيطس ٢: ١٣). لكن واحدة تشير إلى المجيء الأول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«[الله] الَّذِي خَلَّصَنَا وَدَعَانَا دَعْوَةً مُقَدَّسَةً، لاَ بِمُقْتَضَى أَعْمَالِنَا، بَلْ بِمُقْتَضَى الْقَصْدِ وَالنِّعْمَةِ الَّتِي أُعْطِيَتْ لَنَا فِي الْمَسِيحِ يَسُوعَ قَبْلَ الأَزْمِنَةِ الأَزَلِيَّةِ، وَإِنَّمَا أُظْهِرَتِ الآنَ بِظُهُورِ [ἐπιφανείας] مُخَلِّصِنَا يَسُوعَ الْمَسِيحِ، الَّذِي أَبْطَلَ الْمَوْتَ وَأَنَارَ الْحَيَاةَ وَالْخُلُودَ بِوَاسِطَةِ الإِنْجِيلِ.» (٢ تيموثاوس ١: ٩-١٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلذا لا يوجد في كلمة \"ظهور\" بحد ذاتها ما يفرض الإشارة إلى المجيء الثاني. ولكن هناك أربع ملاحظات تجعلني أميل إلى الاعتقاد بأن بولس في ٢ تيموثاوس ٤: ٨ يقصد \"جميع الذين أحبوا ظهوره [الثاني]\".\u003c/p\u003e\n\u003cp\u003eأولاً، أقرب استخدام للكلمة، قبل سبعة أعداد، يشير إلى المجيء الثاني: «أَنَا أُنَاشِدُكَ إِذًا أَمَامَ اللهِ وَالرَّبِّ يَسُوعَ الْمَسِيحِ، الْعَتِيدِ أَنْ يَدِينَ الأَحْيَاءَ وَالأَمْوَاتَ، عِنْدَ ظُهُورِهِ وَمَلَكُوتِهِ: اكْرِزْ بِالْكَلِمَةِ...» (٢ تيموثاوس ٤: ١-٢).\u003c/p\u003e\n\u003cp\u003eثانياً، في العدد ١٠، يقارن بولس بين أولئك الذين «أحبوا ظهوره» (٢ تيموثاوس ٤: ٨) وبين ديماس، الذي «تركني إذ أحب الدهر الحاضر». إن لفت الانتباه إلى محبة ديماس لـ \"الدهر الحاضر\" يضعه في تباين مع أولئك الذين يحبون المجيء الثاني للمسيح، لأن المجيء الثاني يأتي بـ \"انقضاء الدهر\" (متى ١٣: ٤٠؛ ٢٤: ٣؛ ٢٨: ٢٠). المجيء الثاني ينهي الشيء الذي أحبه ديماس أكثر من غيره. أما أولئك الذين يحبون المجيء الثاني، فيفضلون وصول المسيح على كل ما يمكن أن يقدمه هذا الدهر الساقط الحاضر.\u003c/p\u003e\n\u003cp\u003eثالثاً، إشارة بولس إلى نيله المكافأة في «ذلك اليوم» (٢ تيموثاوس ٤: ٨) تخلق توقعاً بأن ما يلي سيتعلق بـ \"ذلك اليوم\" -أي يوم مجيء المسيح الثاني. (حول استخدام بولس لـ \"ذلك اليوم\" كإشارة إلى مجيء المسيح الثاني، انظر ١ تسالونيكي ٥: ٤؛ ٢ تسالونيكي ١: ١٠؛ ٢: ٣؛ ٢ تيموثاوس ١: ١٢، ١٨). في هذا السياق الفكري، سيكون من الغريب أن يعود بولس إلى الظهور الأول للمسيح.\u003c/p\u003e\n\u003cp\u003eالملاحظة الرابعة التي تجعلني أميل إلى اعتبار ٢ تيموثاوس ٤: ٨ إشارة إلى الظهور الثاني للمسيح، بدلاً من الأول، هي أن بولس يرى الظهور الأول مصمماً بدقة لتهيئتنا للثاني. لاحظ كيف يحاجج في تيطس ٢: ١١-١٣:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ قَدْ ظَهَرَتْ [ἐπεφάνη] نِعْمَةُ اللهِ الْمُخَلِّصَةُ، لِجَمِيعِ النَّاسِ، مُعَلِّمَةً إِيَّانَا أَنْ نُنْكِرَ الْفُجُورَ وَالشَّهَوَاتِ الْعَالَمِيَّةَ، وَنَعِيشَ بِالتَّعَقُّلِ وَالْبِرِّ وَالتَّقْوَى فِي الْعَالَمِ الْحَاضِرِ، مُنْتَظِرِينَ الرَّجَاءَ الْمُبَارَكَ وَظُهُورَ [ἐπιφάνειαν] مَجْدِ اللهِ الْعَظِيمِ وَمُخَلِّصِنَا يَسُوعَ الْمَسِيحِ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eباختصار، يقول بولس إن نعمة الله ظهرت في المرة الأولى لإيجاد شعب ينتظر بلهفة ظهور المسيح الثاني ببر وتقوى. بعبارة أخرى، الظهور الأول يعدنا للثاني. لدينا الكثير لنحبه في ظهور المسيح الأول. ولكن مهما كان عظيماً، وقد بلغ ذروته في صليب وقيامة يسوع، فقد صُمم كله لإيجاد شعب وواقع جديد يجد ذروته في المجيء الثاني.\u003c/p\u003e\n\u003cp\u003eلذا أعتقد أن بولس سيقول إن اختبار عاطفتنا الصحيحة تجاه مجيء المسيح الأول هو مقدار عاطفتنا تجاه المجيء الثاني. أو بعبارة أخرى، اختبار محبتنا للمسيح الذي ظهر هو لهفتنا للمسيح الذي سيظهر. لذلك، أؤمن أنني أبني على أساس متين عندما أقول إن هدف هذا الكتاب هو مساعدة الناس على محبة المجيء الثاني للمسيح. لمثل هؤلاء الناس، سيهب المسيح، الديان العادل، إكليل البر.\u003c/p\u003e\n\u003ch3\u003eلماذا الإكليل لمحبة ظهوره؟\u003c/h3\u003e\n\u003cp\u003eلماذا يربط بولس إكليل البر بمحبة ظهور المسيح؟ لماذا يقول: «الرَّبُّ الدَّيَّانُ الْعَادِلُ، سيهب [إكليل البر]... لِجَمِيعِ الَّذِينَ يُحِبُّونَ ظُهُورَهُ أَيْضًا» (٢ تيموثاوس ٤: ٨)؟ لماذا لا يقول إن الرب سيعطي إكليلاً \"لكل من أكمل سعيه\"، أو \"لكل من جاهد الجهاد الحسن\"، أو \"لكل من حفظ الإيمان\"؟ هذا ما يبدو أن بولس يمهد له عندما يقول في ٢ تيموثاوس ٤: ٧-٨:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«قَدْ جَاهَدْتُ الْجِهَادَ الْحَسَنَ، أَكْمَلْتُ السَّعْيَ، حَفِظْتُ الإِيمَانَ، وَأَخِيرًا قَدْ وُضِعَ لِي إِكْلِيلُ الْبِرِّ، الَّذِي يَهَبُهُ لِي فِي ذلِكَ الْيَوْمِ، الرَّبُّ الدَّيَّانُ الْعَادِلُ، وَلَيْسَ لِي فَقَطْ، بَلْ لِجَمِيعِ الَّذِينَ يُحِبُّونَ...»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيبدو الأمر بالتأكيد وكأن بولس سيقول: \"ليس لي فقط يُعطى الإكليل لأجل الجهاد الحسن، بل لكل شخص آخر... يجاهد الجهاد الحسن\". \"ليس لي فقط يُمنح الإكليل لأجل إكمال السعي، بل لكل شخص آخر... يكمل السعي\". \"ليس لي فقط سيعطي الديان إكليلاً لأجل حفظ الإيمان، بل سيعطي ذلك الإكليل أيضاً لجميع الذين... يحفظون الإيمان\". هذا ما نتوقعه. لكن ليس هذا ما يقوله بولس.\u003c/p\u003e\n\u003cp\u003eإنه يقول في الواقع: \"سأنال إكليلاً لأجل الجهاد الذي جاهدته، والسعي الذي أكملته، والإيمان الذي حفظته، كذلك سينال كل شخص آخر... أحب ظهور الرب\". لماذا؟ لماذا يستبدل بولس \"الجهاد\" و\"إكمال السعي\" و\"حفظ الإيمان\" بـ \"محبة ظهور الرب\"؟\u003c/p\u003e\n\u003cp\u003eاقتراحي هو أن ما كان يفيض في ذهن بولس، وهو يفكر في جهاده وسعيه وإيمانه، هو رغبته الخاصة الممتدة لعقود لظهور الرب، والتي كان لها قوة حافظة في حياته. بعبارة أخرى، بينما كان يسترجع المعارك التي خاضها، والاحتمال الذي تطلبه ماراثون حياته، والتجارب لترك إيمانه لأجل ملذات العالم، ما برز في وعيه هو القوة المساندة أي ما رآه آتياً عند ظهور الرب. لقد أحب ذلك الظهور. وتلك المحبة حفظته.\u003c/p\u003e\n\u003ch3\u003eلماذا لم يكمل ديماس؟\u003c/h3\u003e\n\u003cp\u003eهناك قرينتان في السياق تظهران لنا أن بولس كان يفكر بهذه الطريقة. إحداهما هي الرابط الذي رأيناه بالفعل بين ٢ تيموثاوس ٤: ٨ وما يليه عن ديماس في العدد ١٠:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«\u003cstrong\u003eوَأَخِيرًا قَدْ وُضِعَ لِي إِكْلِيلُ الْبِرِّ، الَّذِي يَهَبُهُ لِي فِي ذلِكَ الْيَوْمِ، الرَّبُّ الدَّيَّانُ الْعَادِلُ، وَلَيْسَ لِي فَقَطْ، بَلْ لِجَمِيعِ الَّذِينَ يُحِبُّونَ ظُهُورَهُ أَيْضًا.\u003c/strong\u003e \u003cstrong\u003eبَادِرْ أَنْ تَجِيءَ إِلَيَّ سَرِيعًا، لأَنَّ دِيمَاسَ قَدْ تَرَكَنِي إِذْ أَحَبَّ الْعَالَمَ الْحَاضِرَ وَذَهَبَ إِلَى تَسَالُونِيكِي\u003c/strong\u003e...» (٢ تيموثاوس ٤: ٨-١٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eديماس لم يواصل الجهاد. لم يكمل سعيه. لم يحفظ الإيمان. إنه نقيض ما يحث بولس تيموثاوس، ويحثنا نحن، أن نكون عليه. يقول لتيموثاوس: «احْتَمِلِ الْمَشَقَّاتِ [جاهد!]... تَمِّمْ خِدْمَتَكَ [أكمل!]» (٢ تيموثاوس ٤: ٥). لا تتوقف عن الجهاد والركض. يقدم بولس نفسه كنموذج ليتبعه تيموثاوس، وديماس كنموذج لا يُتبع. لكن اللغة التي يختارها لوصف إيمان ديماس هي لغة المحبة، وليست لغة الجهاد أو الركض أو الحفظ. ديماس توقف عن الجهاد وتوقف عن الركض وتوقف عن الحفظ، لأنه «أحب الدهر الحاضر». لم يحب ظهور الرب.\u003c/p\u003e\n\u003cp\u003eلذا، في مثال ديماس، يوضح بولس ما يدور في ذهنه في الأعداد ٦-٨، أي العلاقة بين ما نحبه وبين ما إذا كنا سنحتمل. إنه يوضح أن الوعد بإكليل البر لأولئك الذين أحبوا ظهور الرب (٢ تيموثاوس ٤: ٨) ينسجم تماماً مع الوعد بأنه سينال ذلك الإكليل نفسه لأجل جهاده الحسن وسعيه المكتمل وإيمانه المحفوظ. إنهما منسجمان لأن محبة ظهور الرب كانت ضرورية لاحتماله مدى الحياة. لقد كانت هي الجذر لهذا الثمر.\u003c/p\u003e\n\u003ch3\u003eلماذا لم يكمل أصحاب \"الآذان المستحكة\" السعي؟\u003c/h3\u003e\n\u003cp\u003eهناك قرينة سياقية أخرى تظهر أن بولس يرى محبة ظهور الرب ضرورية للجهاد الحسن وإكمال السعي وحفظ الإيمان. نجدها في الأعداد السابقة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ سَيَكُونُ وَقْتٌ لاَ يَحْتَمِلُونَ فِيهِ التَّعْلِيمَ الصَّحِيحَ، بَلْ حَسَبَ شَهَوَاتِهِمُ الْخَاصَّةِ يَجْمَعُونَ لَهُمْ مُعَلِّمِينَ مُسْتَحِكَّةً مَسَامِعُهُمْ، فَيَصْرِفُونَ مَسَامِعَهُمْ عَنِ الْحَقِّ، وَيَنْحَرِفُونَ إِلَى الْخُرَافَاتِ.» (٢ تيموثاوس ٤: ٣-٤)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهنا يهيئنا بولس لما سيقوله عن ديماس. القضية هي أن المسيحيين بالاسم \"سيصرفون مسامعهم\" عن الحق. (كان ديماس يبدو شريكاً أميناً لبولس، كولوسي ٤: ١٤). سوف \"ينحرفون\". ولكن لماذا؟ السبب الذي يذكره بولس ليس صراعات فكرية أو نزاعات أو شكوكاً مخلصة. ما يذكره هو \"آذان مستحكة\" لتعليم \"يناسب شهواتهم الخاصة\".\u003c/p\u003e\n\u003cp\u003eكلمة \"شهوات\" هي ببساطة الكلمة الشائعة للرغبات (ἐπιθυμίας). إنها لغة المحبة. إنها مشابهة لـ ٢ تيموثاوس ٤: ٨ («أحبوا ظهور الرب») والعدد ١٠ («إذ أحب الدهر الحاضر»). السبب في أنهم \"يصرفون مسامعهم\" و\"ينحرفون\" هو أنهم يحبون (يتوقون، يتلهفون، يرغبون) في الأشياء الخاطئة. لقد توقفوا عن الجهاد. توقفوا عن السعي. كفوا عن حفظ الإيمان. لأنهم، مثل ديماس، يحبون هذا الدهر. إنهم لا يحبون ظهور الرب.\u003c/p\u003e\n\u003cp\u003eليس من المستغرب إذن أن يقول بولس إن إكليله سيُمنح بسبب جهاد خيض جيداً وسعي رُكض جيداً وإيمان مثابر، بينما سيُمنح إكليلهم لأنهم أحبوا ظهور الرب. هذه ليست معايير منفصلة لمنح الأكاليل. إنها المعيار نفسه. في أحدهما، يركز بولس على العاطفة الروحية الداخلية لمحبة الرب ومجيئه. وفي الآخر، يركز بولس على الجهاد الناتج لأجل المثابرة.\u003c/p\u003e\n\u003ch3\u003eما مدى أهمية محبة المجيء الثاني؟\u003c/h3\u003e\n\u003cp\u003eهذه العلاقة بين المحبة والجهاد مهمة جداً لنا لنراها لأنها تظهر مدى حيوية أن نحب مجيء الرب الثاني. هذه المحبة ليست ثانوية. ليست اختيارية. إنها وسيلة يُحفظ بها المسيحيون من السقوط. إنها حالة القلب المسيحي التي تحمينا من محبة هذا الدهر المدمرة الشبيهة بمحبة ديماس. إنها لمحة مثيرة للجائزة في نهاية ماراثون الحياة التي تجعلنا نواصل الركض (فيلبي ٣: ١٤). إن محبة مجيء الرب هي امتداد في المستقبل لمحبة الرب الآن. ومحبة الرب الآن ضرورية لكون المرء مسيحياً.\u003c/p\u003e\n\u003cp\u003eأقرب موازٍ في العهد الجديد لـ ٢ تيموثاوس ٤: ٨ هو يعقوب ١: ١٢:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«طُوبَى لِلرَّجُلِ الَّذِي يَحْتَمِلُ التَّجْرِبَةَ، لأَنَّهُ إِذَا تَزَكَّى يَنَالُ «إِكْلِيلَ الْحَيَاةِ» الَّذِي وَعَدَ بِهِ الرَّبُّ لِلَّذِينَ يُحِبُّونَهُ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيؤكد اختلافان رئيسيان في الصياغة مدى أهمية محبة ظهور الرب. يتحدث يعقوب عن محبة الرب نفسه بينما يتحدث بولس عن محبة ظهور الرب. ويعد يعقوب بإكليل الحياة بينما يعد بولس بإكليل البر. هذه ليست صوراً متناقضة. كلاهما يعلم أن ما هو على المحك في محبة الرب وظهوره هو الخلاص النهائي. \"إكليل الحياة\" يرمز إلى الميراث النهائي للحياة الأبدية (قارن تيطس ٣: ٧)؛ و\"إكليل البر\" يرمز إلى أن هذه الحياة الأبدية هي ميراث أولئك الذين تأكد إيمانهم المخلص بثمر البر.\u003c/p\u003e\n\u003cp\u003eلذلك، فإن محبة الرب يسوع، وامتدادها في محبة مجيئه، هي علامة جوهرية للمسيحي الحقيقي. يقول بولس في نهاية ١ كورنثوس: «إِنْ كَانَ أَحَدٌ لاَ يُحِبُّ الرَّبَّ يَسُوعَ الْمَسِيحَ فَلْيَكُنْ أَنَاثِيمَا! مَارَانَ أَثَا» (١٦: ٢٢). بعبارة أخرى، لا يوجد مسيحي -لا يوجد مُخَلص- لا يحب الرب يسوع. ومن اللافت للنظر أنه كما يربط بولس بين محبة الرب ومجيء الرب في ٢ تيموثاوس ٤: ٨، فإنه هنا يربط بين عدم محبة الرب ومجيء الرب: «فَلْيَكُنْ أَنَاثِيمَا! مَارَانَ أَثَا». بعبارة أخرى، كما يُمنح إكليل البر لمحبي المسيح في يوم مجيئه، كذلك سيُنطق باللعنة على غير محبي المسيح في يوم مجيئه.\u003c/p\u003e\n\u003ch3\u003eمقام النعمة\u003c/h3\u003e\n\u003cp\u003eقد يتعثر البعض من حقيقة أن العدد التالي مباشرة في ١ كورنثوس ١٦ يقول: «نِعْمَةُ الرَّبِّ يَسُوعَ الْمَسِيحِ مَعَكُمْ» (١٦: ٢٣). قد يتساءل المرء: \"كيف يمكن لبولس أن يجعل محبة المسيح ضرورية للهروب من لعنة الله، ثم يعلن أن النعمة هي الطريقة التي يتعامل بها المسيح مع شعبه؟\"\u003c/p\u003e\n\u003cp\u003eالجواب يتكون من جزأين. أولاً، النعمة هي القوة الإلهية التي أعطتنا حياة روحية في المقام الأول حتى تمكنت قلوبنا من محبة المسيح (أفسس ٢: ٥). «وَتَفَاضَلَتْ نِعْمَةُ رَبِّنَا جِدًّا مَعَ الإِيمَانِ وَالْمَحَبَّةِ الَّتِي فِي الْمَسِيحِ يَسُوعَ» (١ تيموثاوس ١: ١٤). ثانياً، بركات النعمة المستمرة تتدفق إلينا في قنوات محبة المسيح التي خلقتها النعمة نفسها. لهذا السبب يقول بولس في أفسس ٦: ٢٤: «اَلنِّعْمَةُ مَعَ جَمِيعِ الَّذِينَ يُحِبُّونَ رَبَّنَا يَسُوعَ الْمَسِيحَ فِي عَدَمِ فَسَادٍ». محبة المسيح (وبالتالي مجيئه) هي القناة التي تتدفق من خلالها المزيد من النعمة إلينا. وهذا أيضاً هو السبب في أن كلاً من يعقوب وبطرس يقولان: «يُقَاوِمُ اللهُ الْمُسْتَكْبِرِينَ، وَأَمَّا الْمُتَوَاضِعُونَ فَيُعْطِيهِمْ نِعْمَةً» (يعقوب ٤: ٦؛ ١ بطرس ٥: ٥).\u003c/p\u003e\n\u003cp\u003eالنقطة هي أنه على الرغم من أن النعمة هي التي خلقت التواضع في المقام الأول، إلا أن المتواضعين هم الذين يعطيهم الله \"نعمة أعظم\" (يعقوب ٤: ٦). عندما يتحدث الرسل عن تدفق نعمة الله لأولئك الذين يحبون المسيح (أفسس ٦: ٢٤)، وتدفق النعمة للمتواضعين (١ بطرس ٥: ٥)، فهم لا يصفون قلوباً مختلفة -واحدة متواضعة وأخرى محبة. هناك قلب مسيحي واحد. لقد وُضع فيه التواضع، وهو يحب المسيح ومجيئه.\u003c/p\u003e\n\u003cp\u003eلذلك، عندما يقول بولس إن الشخص الذي لا يحب الرب سيكون ملعوناً عند مجيئه، والشخص الذي يحب الرب سينال إكليل البر عند مجيئه، فهو لا يقوض أو يناقض الدور الحاسم للنعمة السيادية. نعمة الله هي الخطة والقوة العظيمة التي ضمنت، قبل خلق الكون، خلاص شعب الله. «[الله] الَّذِي خَلَّصَنَا وَدَعَانَا دَعْوَةً مُقَدَّسَةً، لاَ بِمُقْتَضَى أَعْمَالِنَا، بَلْ بِمُقْتَضَى الْقَصْدِ وَالنِّعْمَةِ الَّتِي أُعْطِيَتْ لَنَا فِي الْمَسِيحِ يَسُوعَ قَبْلَ الأَزْمِنَةِ الأَزَلِيَّةِ» (٢ تيموثاوس ١: ٩). النعمة التي أعطتنا الحياة وكشفت لنا المجد الثمين اللامتناهي للمسيح -في شخصه وفي مجيئه- أُعطيت لنا قبل خلق الكون.\u003c/p\u003e\n\u003ch3\u003eمحبة المجيء الثاني جوهرية\u003c/h3\u003e\n\u003cp\u003eالنقطة التي نؤكد عليها هي أن محبة يسوع، وبالتبعية، محبة مجيئه، ضرورية لكون المرء مسيحياً. لقد علم يسوع نفسه هذا الحق أكثر من مرة. قال للقادة اليهود، الذين ادعوا معرفة الله لكنهم رفضوا يسوع: «لَوْ كَانَ اللهُ أَبَاكُمْ لَكُنْتُمْ تُحِبُّونَنِي» (يوحنا ٨: ٤٢). بعبارة أخرى، إذا كنتم لا تحبونني، فليس الله أباكم. وكما رأينا من قبل، قال يسوع: «مَنْ أَحَبَّ أَبًا أَوْ أُمًّا أَكْثَرَ مِنِّي فَلاَ يَسْتَحِقُّنِي، وَمَنْ أَحَبَّ ابْنًا أَوِ ابْنَةً أَكْثَرَ مِنِّي فَلاَ يَسْتَحِقُّنِي» (متى ١٠: ٣٧). ما يوضحه هذا العدد هو أن محبة يسوع لا يمكن اختزالها في القيام بأشياء خارجية يأمر بها. ليس هذا ما تعنيه محبة الأب والأم والابن والابنة. هذه المحبة هي ما أسميناه عاطفة القلب، وليست مجموعة من الأعمال التي يقوم بها الجسد. وفي حالة محبة يسوع ومجيئه، فهي عاطفة روحية -عمل الروح القدس في حياتنا. بدون هذه المحبة، ليس الله أبانا، وليس يسوع مخلصنا.\u003c/p\u003e\n\u003ch3\u003eوسيلة لمعجزة\u003c/h3\u003e\n\u003cp\u003eربما بات من الواضح، إذن، لماذا أسعى وراء محبة أعمق وأكثر أصالة وثباتاً لمجيء المسيح، وأود أن آخذك معي. الهدف هو أن نختبر لهفة مأخوذة بالمسيح لحضوره وتمجيده. فقط فعل إلهي في قلوبنا يمكنه تحقيق ذلك. لذا فإن السؤال الذي ننتقل إليه الآن هو: كيف يمكن لفعل طبيعي، مثل كتابة كتاب أو قراءته، أن يكون وسيلة لهذه الغاية الإعجازية؟\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEizqxQOHRH-92wvVLfvzETwSgYnzRt8nICbZaCJlCrUMeZ0spZ_7pcGSp6g0MqGcbLgTAWu0IHPGCvvhW_9HuJEzixpqWj6R7GqdTavWYh6niNObJfOWlCPy8hzUNC_LxCnDttwnHw8WTS_DTuZjtxnK9Vg2LexqDDSHbxZpJgIfqqaB1H0CzfcNdp4NR8/s2752/unnamed%20%281%29.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEizqxQOHRH-92wvVLfvzETwSgYnzRt8nICbZaCJlCrUMeZ0spZ_7pcGSp6g0MqGcbLgTAWu0IHPGCvvhW_9HuJEzixpqWj6R7GqdTavWYh6niNObJfOWlCPy8hzUNC_LxCnDttwnHw8WTS_DTuZjtxnK9Vg2LexqDDSHbxZpJgIfqqaB1H0CzfcNdp4NR8/s600/unnamed%20%281%29.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script
