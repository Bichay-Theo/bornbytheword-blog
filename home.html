).\u003c/p\u003e\n\u003ch3\u003eمَسِيحِيُّونَ يَتَكَبَّدُونَ خَسَارَةً عِنْدَ ظُهُورِ الْمَسِيحِ\u003c/h3\u003e\n\u003cp\u003eأفترض أنه لو كان بوسعنا التيقن من أن كل مسيحي سيسمع المدح المطلق ذاته في ذلك اليوم: «نِعِمَّا أَيُّهَا الْعَبْدُ الصَّالِحُ وَالأَمِينُ!» (متى ٢٥: ٢١، ٢٣)—لكان توقع دينونة بحسب أعمالنا أمراً مفرحاً لا مقلقاً. ولكن ماذا عن كلمات بولس في (كورنثوس الثانية ٥: ١٠)، بأننا جميعاً سننال مكافآتنا، أو نُحرم منها، بحسب ما كنا بالجسد: «خَيْرًا كَانَ أَمْ شَرًّا»؟ \"أَمْ شَرًّا\". ماذا لو كنا مسيحيين حقاً غير أننا قصرنا تقصيراً بالغاً في السلوك بطريقة مثمرة؟\u003c/p\u003e\n\u003cp\u003eتلك هي صورة عبيد المسيح في (كورنثوس الأولى ٣: ١١-١٥):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَإِنَّهُ لاَ يَسْتَطِيعُ أَحَدٌ أَنْ يَضَعَ أَسَاسًا آخَرَ غَيْرَ الَّذِي وُضِعَ، الَّذِي هُوَ يَسُوعُ الْمَسِيحُ. وَلكِنْ إِنْ كَانَ أَحَدُ يَبْنِي عَلَى هذَا الأَسَاسِ: ذَهَبًا، فِضَّةً، حِجَارَةً كَرِيمَةً، خَشَبًا، عُشْبًا، قَشًّا، فَعَمَلُ كُلِّ وَاحِدٍ سَيَصِيرُ ظَاهِرًا لأَنَّ الْيَوْمَ سَيُبَيِّنُهُ. لأَنَّهُ بِنَارٍ يُسْتَعْلَنُ، وَسَتَمْتَحِنُ النَّارُ عَمَلَ كُلِّ وَاحِدٍ مَا هُوَ. إِنْ بَقِيَ عَمَلُ أَحَدٍ قَدْ بَنَاهُ عَلَيْهِ فَسَيَأْخُذُ أُجْرَةً. إِنِ احْتَرَقَ عَمَلُ أَحَدٍ فَسَيَخْسَرُ، وَأَمَّا هُوَ فَسَيَخْلُصُ، وَلكِنْ كَمَا بِنَارٍ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيتعامل بولس في هذه القرينة بشكل مباشر جداً مع أولئك الذين يبنون على المسيح كأساس حقيقي للكنيسة (كورنثوس الأولى ٣: ١٠، ١١). ولذلك تشير مواد البناء، في المقام الأول، إلى التعاليم التي يبني بها المرء. وعليه، فإن \"الخشب، والعشب، والقش\" تشير على الأرجح إلى تعاليم معيبة. وهو لا يشير هنا أغلب الظن إلى هرطقة سافرة تنكر الإنجيل، والتي تستوجب في موضع آخر لعنة بولس (غلاطية ١: ٨، ٩). بل يشير على الأرجح إلى تعليم يحمل درجة أقل من الخطأ، أو التشويه، أو الافتقار إلى الحكمة، أو انعدام الصلة بالواقع، أو سوء التطبيق، أو رداءة الشرح، أو السطحية، أو لليّ الآيات لتتوافق مع تقاليد كنسية غير كتابية أو مع العالمية.\u003c/p\u003e\n\u003cp\u003eغير أنه من المشكوك فيه أن يتمكن المرء من البناء باستمرار بمثل هذا التعليم المعيب دون أن تنطوي حياته على قضايا خطيرة تتعلق بالعالمية في العقل والقلب أيضاً. «فَإِنَّهُ مِنْ فَضْلَةِ الْقَلْب يَتَكَلَّمُ الْفَمُ» (متى ١٢: ٣٤). ولذلك، فإن مبدأ الدينونة هنا ينطبق على الاتجاهات والأفعال المعيبة بشكل عام، ولا يقتصر على التعليم والمعلمين فقط. ويتأكد هذا عندما ندرك أن الكنيسة تُبنى بدرجة ما بواسطة جميع المؤمنين، وأن هذا البنيان يتم في المحبة (أفسس ٤: ١٦)، وليس في الحق فحسب (أفسس ٤: ١٥). فالمحبة المعيبة قابلة للاشتعال تماماً كالتعليم المعيب.\u003c/p\u003e\n\u003ch3\u003eهَلْ سَيَسْمَعُ كُلُّ وَاحِدٍ: \"نِعِمَّا\"؟\u003c/h3\u003e\n\u003cp\u003eهل سيسمع الشخص المذكور في (كورنثوس الأولى ٣: ١٥) يسوع يقول له: \"نِعِمَّا أَيُّهَا الْعَبْدُ الصَّالِحُ وَالأَمِينُ\"؟ وفقاً لبولس، فإن حقيقة وقيمة تعليم الشخص أو أفعاله: «بِنَارٍ يُسْتَعْلَنُ، وَسَتَمْتَحِنُ النَّارُ عَمَلَ كُلِّ وَاحِدٍ مَا هُوَ... إِنِ احْتَرَقَ عَمَلُ أَحَدٍ فَسَيَخْسَرُ، وَأَمَّا هُوَ فَسَيَخْلُصُ، وَلكِنْ كَمَا بِنَارٍ» (كورنثوس الأولى ٣: ١٣، ١٥).\u003c/p\u003e\n\u003cp\u003eأرى أن كلمات \"فَسَيَخْسَرُ\" هذه هي أفضل تعليق تفسيري يقدمه بولس ليوضح قصده في (كورنثوس الثانية ٥: ١٠) حين يقول: «لأَنَّهُ لاَبُدَّ أَنَّنَا جَمِيعًا نُظْهَرُ أَمَامَ كُرْسِيِّ الْمَسِيحِ، لِيَنَالَ كُلُّ وَاحِدٍ مَا كَانَ بِالْجَسَدِ بِحَسَبِ مَا صَنَعَ، خَيْرًا كَانَ أَمْ شَرًّا». وأفهم أن بولس يقصد أن الدينونة التي تحل بمسيحي بسبب \"الشر\" الذي في حياته تتمثل في حتمية أنه \"سَيَخْسَرُ\" المذكورة في (كورنثوس الأولى ٣: ١٥). «إِنِ احْتَرَقَ عَمَلُ أَحَدٍ فَسَيَخْسَرُ».\u003c/p\u003e\n\u003cp\u003eإن \"الخسارة\" التي يتكبدها هذا المسيحي هي خسارة مكافأة محتملة كان من الممكن أن ينالها، ولكنه لن يتلقاها. ويبدو هذا جلياً من العدد الرابع عشر: «إِنْ بَقِيَ عَمَلُ أَحَدٍ قَدْ بَنَاهُ عَلَيْهِ فَسَيَأْخُذُ أُجْرَةً». إذن فالخيارات هي: إما أن \"يأخذ أجرة\" أو \"يخسر\". ومن المنطقي أن نستنتج أن عبارة \"فَسَيَخْسَرُ\" تشير إلى خسارة المكافآت التي كان من الممكن أن تأتي لولا ذلك. وبناءً على الخدمة الموصوفة في (كورنثوس الأولى ٣: ١٠-١٥)، يصح القول إن بعض المسيحيين لن يسمعوا كلمات: «نِعِمَّا أَيُّهَا الْعَبْدُ الصَّالِحُ وَالأَمِينُ» (متى ٢٥: ٢١، ٢٣)—أو على الأقل، لن تُقال لهم بالمدح ذاته الذي يُوجه لتلاميذ آخرين أكثر أمانة. فتلك الكلمات تُقال للعبيد الذين ربحوا خمس وزنات أخرى لوزناتهم الخمس، ووزنتين لوزنتيهم (متى ٢٥: ٢٠-٢٣).\u003c/p\u003e\n\u003ch3\u003eأَلَا يَعْنِي الْفَشَلُ فِي الْقَدَاسَةِ أَنَّ الإِيمَانَ غَيْرُ حَقِيقِيٍّ؟\u003c/h3\u003e\n\u003cp\u003eومع ذلك، قد يتساءل أحدهم: ألا يُظهر الفشل في عيش حياة المحبة أن المرء لم يولد ثانية، وأنه بالتالي غير متحد بالمسيح، وليس مسيحياً على الإطلاق؟ يكتسب هذا التساؤل أهمية خاصة في ضوء ما رأيناه في الفصلين السادس والسابع. فقد كان الهدف من هذين الفصلين اكتشاف ما يعنيه العهد الجديد عندما يقول إن المسيحيين سيكونون «مُخْلِصِينَ وَبِلاَ عَثْرَةٍ إِلَى يَوْمِ الْمَسِيحِ» (فيلبي ١: ١٠)، وأن الله سيثبت قلوبكم «بِلاَ لَوْمٍ فِي الْقَدَاسَةِ... عِنْدَ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ» (تسالونيكي الأولى ٣: ١٣)، وأن الله سيثبتكم «إِلَى النِّهَايَةِ بِلاَ لَوْمٍ فِي يَوْمِ رَبِّنَا يَسُوعَ الْمَسِيحِ» (كورنثوس الأولى ١: ٨)، وأن الله القادر أن يحفظكم سيوقفكم «أَمَامَ مَجْدِهِ بِلاَ عَيْبٍ فِي الابْتِهَاجِ» (يهوذا ٢٤).\u003c/p\u003e\n\u003cp\u003eكان أحد استنتاجات الفصلين السادس والسابع هو أن:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eالمحبة ضرورة لا تقبل المساومة إن كنا سنُوجد بلا لوم في يوم المسيح. غير أن هذا ليس لأننا بلا لوم في ذلك اليوم بسبب تلك المحبة. فمحبتنا ليست هي سبب كوننا بلا لوم. محبتنا تؤكد حالة كوننا بلا لوم التي نمتلكها لأن إيماننا يوحدنا بالمسيح، الذي يصالحنا مع الله وهو بلا لوم. الإيمان الحقيقي يعمل بالمحبة (غلاطية ٥: ٦). ولذلك، فإن المحبة هي التأكيد الحتمي للإيمان. والإيمان يوحدنا بالمسيح برنا الكامل. ولذلك، تؤكد المحبة حالة كوننا بلا لوم. ولا وجود لـ 'بلا لوم' بدونها... فلا بد من وجود محبة حقيقية فينا، وإن كانت غير كاملة، لتؤكد حالة \"بلا لوم\" حقيقية وكاملة في المسيح.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوقد رأينا سابقاً أيضاً أن:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eحالة \"بلا لوم\" الخالية من الخطية هذه تكون حقيقية فقط إن تأكدت في حياة المؤمن بتغيير حقيقي من أنانية متكبرة إلى محبة متواضعة... يصلي بولس من أجل المحبة في قلوب المؤمنين لأن هذا يؤكد إيمانهم المخلص. فهي تؤكد أنهم متحدون بالمسيح وأنهم بالتالي يُحسبون بلا لوم من خلال احتساب كمالات المسيح لهم.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلذا فإن الإجابة على السؤال هي نعم، إن الفشل في عيش حياة المحبة سيُظهر أن المرء لم يولد ثانية، وأنه بالتالي غير متحد بالمسيح، وليس مسيحياً حقاً.\u003c/p\u003e\n\u003ch3\u003eعَدَمُ كَمَالِ السُّلُوكِ فِي النُّورِ\u003c/h3\u003e\n\u003cp\u003eلعل أوضح النصوص التي تتناول هذه المسألة هي (يوحنا الأولى ٣: ١٤) و(٤: ٨): «نَحْنُ نَعْلَمُ أَنَّنَا قَدِ انْتَقَلْنَا مِنَ الْمَوْتِ إِلَى الْحَيَاةِ، لأَنَّنَا نُحِبُّ الإِخْوَةَ. مَنْ لاَ يُحِبَّ أَخَاهُ يَبْقَ فِي الْمَوْتِ... مَنْ لاَ يُحِبُّ لَمْ يَعْرِفِ اللهَ، لأَنَّ اللهَ مَحَبَّةٌ».\u003c/p\u003e\n\u003cp\u003eولكن كما أشرنا في الفصل السادس، فإن السفر ذاته (رسالة يوحنا الأولى) الذي يربط بأقوى صورة بين محبة الآخرين وكوننا مسيحيين حقيقيين، هو أيضاً السفر الذي يقول، بأوضح من أي سفر آخر، إن حياة المحبة هذه، التي تؤكد ولادتنا الجديدة، تظل معيبة في هذه الحياة الأرضية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلكِنْ إِنْ سَلَكْنَا فِي النُّورِ كَمَا هُوَ فِي النُّورِ، فَلَنَا شَرِكَةٌ بَعْضِنَا مَعَ بَعْضٍ، وَدَمُ يَسُوعَ الْمَسِيحِ ابْنِهِ يُطَهِّرُنَا مِنْ كُلِّ خَطِيَّةٍ. إِنْ قُلْنَا: إِنَّهُ لَيْسَ لَنَا خَطِيَّةٌ نُضِلُّ أَنْفُسَنَا وَلَيْسَ الْحَقُّ فِينَا. إِنِ اعْتَرَفْنَا بِخَطَايَانَا فَهُوَ أَمِينٌ وَعَادِلٌ، حَتَّى يَغْفِرَ لَنَا خَطَايَانَا وَيُطَهِّرَنَا مِنْ كُلِّ إِثْمٍ. إِنْ قُلْنَا: إِنَّنَا لَمْ نُخْطِئْ نَجْعَلْهُ كَاذِبًا، وَكَلِمَتُهُ لَيْسَتْ فِينَا» (يوحنا الأولى ١: ٧-١٠).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن ما يذهلنا ويمس واقعنا في هذا النص هو أن يوحنا يقول إن \"السلوك في النور\" هو أمر حتمي إن كان لدم يسوع أن يطهرنا من كل خطية: «وَلكِنْ إِنْ سَلَكْنَا فِي النُّورِ كَمَا هُوَ فِي النُّورِ... دَمُ يَسُوعَ الْمَسِيحِ ابْنِهِ يُطَهِّرُنَا مِنْ كُلِّ خَطِيَّةٍ» (يوحنا الأولى ١: ٧).\u003c/p\u003e\n\u003cp\u003eوبعبارة أخرى، نحن لا ننال المغفرة والخلاص إن لم نسلك في النور. وهو لا يقول إن السلوك هو ما يُدخلنا إلى الخلاص، بل إنه يؤكد أننا مخلصون. إنه تأكيد حتمي. ومع ذلك فإن هذا السلوك في النور ليس خلواً من الخطية.\u003c/p\u003e\n\u003cp\u003eفإن قلنا إنه ليس لنا خطية (ونحن نسلك في النور!)، نُضل أنفسنا. وفي فكر يوحنا، فإن السلوك في النور يتضمن السلوك في المحبة. «مَنْ يُحِبُّ أَخَاهُ يَثْبُتُ فِي النُّورِ» (يوحنا الأولى ٢: ١٠). ولذلك، يُعلم يوحنا (مع بقية العهد الجديد) أن حياة المحبة (على ما فيها من عدم كمال دائماً في هذه الحياة) هي أمر حتمي لتأكيد ولادتنا الجديدة وتطهير خطايانا بالإيمان (يوحنا الأولى ٥: ١).\u003c/p\u003e\n\u003cp\u003eوهذا يعني أن الشخص المذكور في (كورنثوس الأولى ٣: ١٥) والذي \"سَيَخْلُصُ، وَلكِنْ كَمَا بِنَارٍ\" كان قد وُلد ثانية وعاش حياة المحبة بدرجة كافية لتأكيد اتحاده بالمسيح. سيظل هناك دائماً شيء يستطيع الله أن يقول عنه: \"نِعِمَّا\"، سواء استُخدمت هذه الكلمات عينها أم لا. فلن يكون تعليمنا المعيب، أو محبتنا المعيبة، ذا طبيعة تلغي إيماننا بالمسيح أو محبتنا للناس. وفي يوم الدينونة، سيكون المسيح هو الديان المعصوم لدوافعنا. لذا نحرص على الإصغاء لمشورته: «إِذًا لاَ تَحْكُمُوا فِي شَيْءٍ قَبْلَ الْوَقْتِ، حَتَّى يَأْتِيَ الرَّبُّ الَّذِي سَيُنِيرُ خَفَايَا الظَّلاَمِ وَيُظْهِرُ آرَاءَ الْقُلُوبِ» (كورنثوس الأولى ٤: ٥).\u003c/p\u003e\n\u003ch3\u003eدَيْنُونَةُ الْخَلاَصِ \"بِحَسَبِ الأَعْمَالِ\"\u003c/h3\u003e\n\u003cp\u003eما رأيناه إذن هو أن مجمل حياتنا (الأفعال ودوافع القلب) يؤدي وظيفة مزدوجة في الدينونة عند مجيء الرب. فمن ناحية، تؤكد حياة المحبة التي نعيشها أصالة إيماننا المُخلص. ولهذا السبب يقول بولس إن الله: «الَّذِي سَيُجَازِي كُلَّ وَاحِدٍ حَسَبَ أَعْمَالِهِ. أَمَّا الَّذِينَ بِصَبْرٍ فِي الْعَمَلِ الصَّالِحِ يَطْلُبُونَ الْمَجْدَ وَالْكَرَامَةَ وَالْبَقَاءَ، فَبِالْحَيَاةِ الأَبَدِيَّةِ» (رومية ٢: ٦، ٧). فالهبة المتمثلة في الحياة الأبدية تتوافق مع أعمال محبتنا.\u003c/p\u003e\n\u003cp\u003eوهذا لا يناقض البتة حقيقة أن الحياة الأبدية هي هبة مجانية من النعمة. فالحياة الأبدية لا تُنال بالاستحقاق عبر الأعمال الصالحة. «وَأَمَّا هِبَةُ اللهِ فَهِيَ حَيَاةٌ أَبَدِيَّةٌ بِالْمَسِيحِ يَسُوعَ رَبِّنَا» (رومية ٦: ٢٣؛ راجع ٥: ٢١). وعندما يقول بولس إن الحياة الأبدية تأتي إلينا \"بحسب\" أعمالنا، فهذا لا يعني أن الحياة الأبدية مستحقة أو مُكتسبة بأعمالنا. بل إن بولس يقول إن الأعمال تؤكد إيماننا (غلاطية ٥: ٦). فهي تؤكد أننا خليقة جديدة في المسيح (أفسس ٢: ٨-١٠). وبولس جلياً وصريحاً بشأن هذا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لاَ بِأَعْمَال فِي بِرّ عَمِلْنَاهَا نَحْنُ [οὐκ ἐξ ἔργων τῶν ἐν δικαιοσύνῃ]، بَلْ بِمُقْتَضَى رَحْمَتِهِ خَلَّصَنَا بِغُسْلِ الْمِيلاَدِ الثَّانِي وَتَجْدِيدِ الرُّوحِ الْقُدُسِ، الَّذِي سَكَبَهُ بِغِنًى عَلَيْنَا بِيَسُوعَ الْمَسِيحِ مُخَلِّصِنَا. حَتَّى إِذَا تَبَرَّرْنَا بِنِعْمَتِهِ، نَصِيرُ وَرَثَةً حَسَبَ رَجَاءِ الْحَيَاةِ الأَبَدِيَّةِ» (تيطس ٣: ٥-٧).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eولا يقتصر الأمر على أن خلاصنا \"ليس بأعمال\" فحسب، بل إن الأمر معكوس تماماً. فنحن نَخْلُص لكي نصنع أعمالاً صالحة: «الَّذِي بَذَلَ نَفْسَهُ لأَجْلِنَا، لِكَيْ يَفْدِيَنَا مِنْ كُلِّ إِثْمٍ، وَيُطَهِّرَ لِنَفْسِهِ شَعْبًا خَاصًّا غَيُورًا فِي أَعْمَال حَسَنَةٍ» (تيطس ٢: ١٤). أو كما يقول بولس في (أفسس ٢: ٨-١٠):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ بِالنِّعْمَةِ مُخَلَّصُونَ، بِالإِيمَانِ، وَذلِكَ لَيْسَ مِنْكُمْ. هُوَ عَطِيَّةُ اللهِ. لَيْسَ مِنْ أَعْمَال كَيْلاَ يَفْتَخِرَ أَحَدٌ. لأَنَّنَا نَحْنُ عَمَلُهُ، مَخْلُوقِينَ فِي الْمَسِيحِ يَسُوعَ لأَعْمَال صَالِحَةٍ…».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبعبارة أخرى، نحن لا نَخْلُص بواسطة الأعمال بل لأجل الأعمال. فالأعمال ليست هي السبب الذي جعلنا خليقة جديدة، بل هي النتيجة. وكنتيجة لذلك، فهي تؤكد تجددنا كما تؤكد الثمار الجيدة الشجرة الجيدة (راجع متى ٧: ١٧-١٩).\u003c/p\u003e\n\u003cp\u003eوالآن نعود إلى الوظيفة المزدوجة لأعمالنا عند مجيء المسيح في الدينونة. لقد وصفتُ للتو إحدى هاتين الوظيفتين، ألا وهي أن حياة المحبة تؤكد أصالة إيماننا المُخلص (يوحنا الأولى ٣: ١٤). فأعمال محبتنا في هذه الحياة تؤكد قَبولنا (بطرس الثانية ١: ١٠)؛ ولكنها لا تستحقه كجدارة. إنها تؤكد الإيمان الحي، لأنه «كَمَا أَنَّ الْجَسَدَ بِدُونَ رُوحٍ مَيِّتٌ، هكَذَا الإِيمَانُ أَيْضًا بِدُونِ أَعْمَال مَيِّتٌ» (يعقوب ٢: ٢٦).\u003c/p\u003e\n\u003ch3\u003eالْمَسِيحُ آتٍ لِيُوَزِّعَ الْمُكَافَآتِ\u003c/h3\u003e\n\u003cp\u003eأما الوظيفة الأخرى لأفعالنا في يوم مجيء المسيح، فستكون بوصفها المعيار الذي سيستخدمه المسيح في تحديد المكافآت التي ستحتلف من مسيحي لآخر. لقد تأملنا سلفاً في (كورنثوس الثانية ٥: ١٠): «لأَنَّهُ لاَ بُدَّ أَنَّنَا جَمِيعًا... لِيَنَالَ كُلُّ وَاحِدٍ مَا كَانَ بِالْجَسَدِ بِحَسَبِ مَا صَنَعَ، خَيْرًا كَانَ أَمْ شَرًّا». وتأملنا أيضاً في (كورنثوس الأولى ٣: ١٥): «إِنِ احْتَرَقَ عَمَلُ أَحَدٍ فَسَيَخْسَرُ». وتشير هذه النصوص ضمناً وبوضوح إلى أنه في الدينونة، سيقرر المسيح المكافآت وستختلف من مسيحي لآخر.\u003c/p\u003e\n\u003cp\u003eلقد ربط يسوع هذا النوع من الدينونة بمجيئه الثاني:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«حِينَئِذٍ قَالَ يَسُوعُ لِتَلاَمِيذِهِ: «إِنْ أَرَادَ أَحَدٌ أَنْ يَأْتِيَ وَرَائِي فَلْيُنْكِرْ نَفْسَهُ وَيَحْمِلْ صَلِيبَهُ وَيَتْبَعْنِي، فَإِنَّ مَنْ أَرَادَ أَنْ يُخَلِّصَ نَفْسَهُ يُهْلِكُهَا، وَمَنْ يُهْلِكُ نَفْسَهُ مِنْ أَجْلِي يَجِدُهَا. لأَنَّهُ مَاذَا يَنْتَفِعُ الإِنْسَانُ لَوْ رَبحَ الْعَالَمَ كُلَّهُ وَخَسِرَ نَفْسَهُ؟ أَوْ مَاذَا يُعْطِي الإِنْسَانُ فِدَاءً عَنْ نَفْسِهِ؟ فَإِنَّ ابْنَ الإِنْسَانِ سَوْفَ يَأْتِي فِي مَجْدِ أَبِيهِ مَعَ مَلاَئِكَتِهِ، وَحِينَئِذٍ يُجَازِي كُلَّ وَاحِدٍ حَسَبَ عَمَلِهِ» (متى ١٦: ٢٤-٢٧).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eقد تبدو كلمة \"يُجَازِي\" (متى ١٦: ٢٧) بسهولة كنوع من المقايضة التي توحي بأن عمل التلاميذ قد جعل يسوع مديناً لهم، وأنه الآن ملزم بالدفع كصاحب عمل عادل. لا أعتقد أن يسوع نظر إلى خدمته أو إلى الدينونة بهذه الطريقة. فالتعليم الشامل للعهد الجديد وتعليم يسوع نفسه يمنعاننا من تفسير \"يُجَازِي\" كمقايضة يرد فيها يسوع ما يدين به.\u003ca href=\"#ch10-fn-1\"\u003e[١]\u003c/a\u003e\u003c/p\u003e\n\u003ch3\u003e\"يُجَازِي\" لَا تَعْنِي \"تَسْدِيدَ دَيْنٍ\"\u003c/h3\u003e\n\u003cp\u003eلا تعني كلمة \"يُجَازِي\" \"تسديد دين\". فالله لا «يُخْدَمُ بِأَيَادِي النَّاسِ كَأَنَّهُ مُحْتَاجٌ إِلَى شَيْءٍ، إِذْ هُوَ يُعْطِي الْجَمِيعَ حَيَاةً وَنَفْسًا وَكُلَّ شَيْءٍ» (أعمال الرسل ١٧: ٢٥)، لذا لا يمكن أن يكون مديناً لأي إنسان. بل إن الأمر معكوس تماماً: فجميع الناس مدينون لنعمته التي تمدهم بكل شيء. ولذا يسأل بولس استنكارياً: «أَوْ مَنْ سَبَقَ فَأَعْطَاهُ فَيُكَافَأَ [أَوْ يُجَازَى]؟» والإجابة هي لا أحد، «لأَنَّ مِنْهُ وَبِهِ وَلَهُ كُلَّ الأَشْيَاءَ» (رومية ١١: ٣٥، ٣٦).\u003c/p\u003e\n\u003cp\u003eوقد قال يسوع نفسه: «لأَنَّ ابْنَ الإِنْسَانِ أَيْضًا لَمْ يَأْتِ لِيُخْدَمَ بَلْ لِيَخْدِمَ وَلِيَبْذِلَ نَفْسَهُ فِدْيَةً عَنْ كَثِيرِينَ» (مرقس ١٠: ٤٥). فخدمة يسوع برمتها، في الماضي والحاضر، لا تهدف إلى تجنيد عمال هو بحاجة إليهم، ليُخدم منهم، ثم يدفع لهم ما يدين به. بل على النقيض من ذلك، قال: «كَذلِكَ أَنْتُمْ أَيْضًا، مَتَى فَعَلْتُمْ كُلَّ مَا أُمِرْتُمْ بِهِ فَقُولُوا: إِنَّنَا عَبِيدٌ بَاطَّالُونَ، لأَنَّنَا إِنَّمَا عَمِلْنَا مَا كَانَ يَجِبُ عَلَيْنَا» (لوقا ١٧: ١٠). وبعبارة أخرى، هو لا يدين لنا بشيء.\u003c/p\u003e\n\u003cp\u003eوفي الواقع، تمتلك الكلمة اليونانية المترجمة \"يُجَازِي\" (ἀποδίδωμι) طيفاً واسعاً من المعاني. وهي لا تحمل المعنى الجوهري المتمثل في \"ادفع ما تدين به\". وإليك عينة من هذا الاستخدام الواسع:\u003c/p\u003e\n\u003cp\u003e«ثُمَّ طَوَى السِّفْرَ وَسَلَّمَهُ [ἀποδοὺς] إِلَى الْخَادِمِ، وَجَلَسَ» (لوقا ٤: ٢٠).\u003c/p\u003e\n\u003cp\u003e«وَبِقُوَّةٍ عَظِيمَةٍ كَانَ الرُّسُلُ يُؤَدُّونَ [ἀπεδίδουν] الشَّهَادَةَ بِقِيَامَةِ الرَّبِّ يَسُوعَ» (أعمال الرسل ٤: ٣٣).\u003c/p\u003e\n\u003cp\u003e«وَلَيْسَ لَنَا عِلَّةٌ يُمْكِنُنَا مِنْ أَجْلِهَا أَنْ نُقَدِّمَ [ἀποδοῦναι] حِسَابًا» (أعمال الرسل ١٩: ٤٠).\u003c/p\u003e\n\u003cp\u003e«وَلكِنَّ كُلَّ تَأْدِيبٍ فِي الْحَاضِرِ لاَ يُرَى أَنَّهُ لِلْفَرَحِ بَلْ لِلْحَزَنِ. وَأَمَّا أَخِيرًا فَيُعْطِي [ἀποδίδωσιν] الَّذِينَ يَتَدَرَّبُونَ بِهِ ثَمَرَ بِرّ لِلسَّلاَمِ» (عبرانيين ١٢: ١١)\u003c/p\u003e\n\u003cp\u003eإن السبب الرئيسي الذي يمنعنا من اعتبار المكافآت رداً مُستحقاً أو مكتسباً للأفعال الصالحة هو أن الأفعال الصالحة الوحيدة التي تمتلك جمالاً أخلاقياً في عيني الله هي \"عَمَلَ الإِيمَانِ\" (راجع تسالونيكي الأولى ١: ٣؛ تسالونيكي الثانية ١: ١١). فبدون إيمان لا يمكن إرضاؤه (عبرانيين ١١: ٦). ولذلك، فإن غاية بولس في خدمته هي «إِطَاعَةِ الإِيمَانِ» (رومية ١: ٥؛ ١٦: ٢٦). وبعبارة أخرى، فإن الأفعال الصالحة الوحيدة التي تنال مكافأة المسيح هي الأفعال التي نثق أن الله سيعملها من خلالنا بقوة نعمته. «وَنِعْمَتُهُ الْمُعْطَاةُ لِي لَمْ تَكُنْ بَاطِلَةً، بَلْ أَنَا تَعِبْتُ أَكْثَرَ مِنْهُمْ جَمِيعِهِمْ. وَلكِنْ لاَ أَنَا، بَلْ نِعْمَةُ اللهِ الَّتِي مَعِي» (كورنثوس الأولى ١٥: ١٠).\u003c/p\u003e\n\u003cp\u003eيُصلي بولس لكي يُكمل الله «كُلَّ مَسَرَّةِ صَلاَحٍ وَعَمَلَ الإِيمَانِ بِقُوَّةٍ... بِنِعْمَةِ إِلهِنَا وَالرَّبِّ يَسُوعَ الْمَسِيحِ» (تسالونيكي الثانية ١: ١١، ١٢). بقوته. بنعمته. من خلال إيماننا. فحياة المحبة التي يكافئها الله هي الحياة التي يعملها هو بنفسه فينا. وتكون هذه مجازاة فقط بمعنى وجود توافق حقيقي بين صلاح أعمالنا وجمالها وبين المكافآت التي يمنحها.\u003c/p\u003e\n\u003ch3\u003eمَدْحٌ وَمَجْدٌ وَكَرَامَةٌ لِلإِيمَانِ، بِالنِّعْمَةِ\u003c/h3\u003e\n\u003cp\u003eيصنع الرسول بطرس الربط ذاته بين الإيمان والنعمة والمكافآت. فهو يقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مَعَ أَنَّكُمُ الآنَ — إِنْ كَانَ يَجِبُ — تُحْزَنُونَ يَسِيرًا بِتَجَارِبَ مُتَنَوِّعَةٍ، لِكَيْ تَكُونَ تَزْكِيَةُ إِيمَانِكُمْ، وَهِيَ أَثْمَنُ مِنَ الذَّهَبِ الْفَانِي، مَعَ أَنَّهُ يُمْتَحَنُ بِالنَّارِ، تُوجَدُ لِلْمَدْحِ وَالْكَرَامَةِ وَالْمَجْدِ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ» (بطرس الأولى ١: ٦، ٧).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذه الإشارة إلى المدح (ἔπαινον) الذي يثمر عنه الإيمان هو المدح الذي سيناله المؤمنون من الرب، كما في (رومية ٢: ٢٩): «الَّذِي مَدْحُهُ [ἔπαινος] لَيْسَ مِنَ النَّاسِ بَلْ مِنَ اللهِ»، و(كورنثوس الأولى ٤: ٥): «وَحِينَئِذٍ يَكُونُ الْمَدْحُ [ἔπαινος] لِكُلِّ وَاحِدٍ مِنَ اللهِ». وبالمثل، فإن المجد الذي نناله في ذلك اليوم هو ذات المجد الذي يتوقع بطرس نفسه أن يشترك فيه عند استعلان المسيح: «أَطْلُبُ إِلَى الشُّيُوخِ الَّذِينَ بَيْنَكُمْ، أَنَا الشَّيْخَ رَفِيقَهُمْ، وَالشَّاهِدَ لآلاَمِ الْمَسِيحِ، وَشَرِيكَ الْمَجْدِ الْعَتِيدِ أَنْ يُعْلَنَ...» (بطرس الأولى ٥: ١). والكرامة التي ننالها عند استعلان المسيح هي الكرامة الموعودة لأولئك الذين يصمد إيمانهم أمام النار: «فَلَكُمْ أَنْتُمُ الَّذِينَ تُؤْمِنُونَ الْكَرَامَةُ»، بطرس الأولى ٢: ٧). إنها الكرامة التي ينالها الذين: «بِصَبْرٍ فِي الْعَمَلِ الصَّالِحِ يَطْلُبُونَ الْمَجْدَ وَالْكَرَامَةَ وَالْبَقَاءَ» (رومية ٢: ٧).\u003c/p\u003e\n\u003cp\u003eإنه لتوقع يحبس الأنفاس—أن نُمدح ونُمجد ونُكرم نحن أتباع المسيح البائسين وغير الكاملين عند استعلان المسيح. والمغزى هنا هو أن هذا المدح لا يُمنح لأعمالنا الاستحقاقية، بل لإيماننا المُزكى. فكما ائتمن الإيمانُ نعمةَ الله في هذه الحياة لتمكننا من السلوك كما يحق للرب، كذلك تبلغ النعمة ذروتها في مكافأة هذا الاعتماد عينه على النعمة. ولهذا السبب يقول بطرس بعد ستة أعداد: «فَأَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ» (بطرس الأولى ١: ١٣). وفيما نحن نتوق إلى مجيء المسيح، فإن رجاءنا في \"المدح والمجد والكرامة\" هو رجاء متأصل كلياً في النعمة. النعمة آتية إلينا. وعندما ينطق الله أو الملائكة أو القديسون بكلمات المدح والمجد والكرامة لنا، فسيكون ذلك كله بالنعمة. لأن ما يُمدح هو إيماننا الممتحن بالنار، وذلك الإيمان هو احتضاننا ليسوع ككنز حياتنا المليء بكل نعمة. ولذلك، فإن منح المكافآت (بما في ذلك المدح والمجد والكرامة) سيُعظم في الواقع من جمال الله وقيمته ونعمته في المسيح.\u003c/p\u003e\n\u003ch3\u003eسَتَتَبَايَنُ الْمُكَافَآتُ\u003c/h3\u003e\n\u003cp\u003eيوضح يسوع جلياً أن هذه المكافآت ستتباين من تلميذ لآخر. فعلى سبيل المثال، في مثل الأمناء العشرة الوارد في (لوقا ١٩: ١١-٢٧)، يربط يسوع الأمر بمجيئه الثاني بهذه الكلمات: «إِنْسَانٌ شَرِيفُ الْجِنْسِ ذَهَبَ إِلَى كُورَةٍ بَعِيدَةٍ لِيَأْخُذَ لِنَفْسِهِ مُلْكًا وَيَرْجعَ» (لوقا ١٩: ١٢). وهو يدعو عشرة عبيد ويعطي كل واحد مناً.\u003ca href=\"#ch10-fn-2\"\u003e[٢]\u003c/a\u003e وبعد مرور بعض الوقت، يرجع \"بَعْدَمَا أَخَذَ الْمُلْكَ\"، ويدعو العبيد ليحاسبهم «لِيَعْرِفَ بِمَا تَاجَرَ كُلُّ وَاحِدٍ» (لوقا ١٩: ١٥):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَجَاءَ الأَوَّلُ قَائِلاً: يَا سَيِّدُ، مَنَاكَ رَبحَ عَشَرَةَ أَمْنَاءٍ. فَقَالَ لَهُ: نِعِمَّا أَيُّهَا الْعَبْدُ الصَّالِحُ! لأَنَّكَ كُنْتَ أَمِينًا فِي الْقَلِيلِ، فَلْيَكُنْ لَكَ سُلْطَانٌ عَلَى عَشْرِ مُدْنٍ. ثُمَّ جَاءَ الثَّانِي قَائِلاً: يَا سَيِّدُ، مَنَاكَ عَمِلَ خَمْسَةَ أَمْنَاءٍ. فَقَالَ لِهذَا أَيْضًا: وَكُنْ أَنْتَ عَلَى خَمْسِ مُدْنٍ» (لوقا ١٩: ١٦-١٩).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأعتقد أن هذا المثل يُظهر ما يشير إليه يسوع حين يقول: «فَإِنَّ ابْنَ الإِنْسَانِ سَوْفَ يَأْتِي فِي مَجْدِ أَبِيهِ مَعَ مَلاَئِكَتِهِ، وَحِينَئِذٍ يُجَازِي كُلَّ وَاحِدٍ حَسَبَ عَمَلِهِ» (متى ١٦: ٢٧). إن \"المجازاة\"—أو بالأحرى، منح المكافآت—تتباين من تلميذ لآخر. ولا يوجد أي توبيخ للعبد الذي أنتج نصف ما أنتجه الاول. وحده العبد الذي كان بلا ثمر بالكلية هو من يُترك مجرداً: «وَمَنْ لَيْسَ لَهُ فَالَّذِي عِنْدَهُ سَيُؤْخَذُ مِنْهُ» (لوقا ١٩: ٢٦).\u003c/p\u003e\n\u003ch3\u003eسَيَنَالُ بُولُسُ وَأَبُلُّوسُ مُكَافَآتٍ مُخْتَلِفَةً\u003c/h3\u003e\n\u003cp\u003eلقد علّم بولس التنوع ذاته في المكافآت التي تتوافق مع \"تعب\" التلميذ.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَنَا غَرَسْتُ وَأَبُلُّوسُ سَقَى، لكِنَّ اللهَ كَانَ يُنْمِي. إِذًا لَيْسَ الْغَارِسُ شَيْئًا وَلاَ السَّاقِي، بَلِ اللهُ الَّذِي يُنْمِي. وَالْغَارِسُ وَالسَّاقِي هُمَا وَاحِدٌ، وَلكِنَّ كُلَّ وَاحِدٍ سَيَأْخُذُ أُجْرَتَهُ بِحَسَبِ تَعَبِهِ. فَإِنَّنَا نَحْنُ عَامِلاَنِ مَعَ اللهِ، وَأَنْتُمْ فَلاَحَةُ اللهِ، بِنَاءُ اللهِ» (كورنثوس الأولى ٣: ٦-٩).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e«وَلكِنَّ كُلَّ وَاحِدٍ سَيَأْخُذُ أُجْرَتَهُ بِحَسَبِ تَعَبِهِ». ومرة أخرى، تمتلك كلمة أجرة (μισθὸν)، تماماً ككلمة يجازي المذكورة سابقاً، طيفاً واسعاً من المعاني ولا تقتضي حتماً المعنى القائل بأن العمال اكتسبوا مكافأتهم بجعل الله مديناً لهم. بل يمكن أن تعني ببساطة \"مكافأة\" (متى ٥: ١٢؛ كورنثوس الأولى ٩: ٨). إن صورة العامل الزراعي الذي يتقاضى أجرة تهدف ببساطة إلى إيصال حقيقة وجود توافق حقيقي بين أتعاب التلميذ الأمينة ومكافآته من الرب يسوع.\u003c/p\u003e\n\u003cp\u003eذلك التوافق ليس استحقاقاً. بل هو لياقة اعتراف الله بجمال وقيمة عملنا الذي تم بالاعتماد على نعمته. فالعمل الجميل الذي يستحق المكافأة يُعمل: «كَأَنَّهُ مِنْ قُوَّةٍ يَمْنَحُهَا اللهُ، لِكَيْ يَتَمَجَّدَ اللهُ فِي كُلِّ شَيْءٍ» (بطرس الأولى ٤: ١١). إن ما يكافئه الله هو الجمال الأخلاقي للطاعة التي تُمارس بالاعتماد على نعمته غير المستحقة.\u003c/p\u003e\n\u003ch3\u003eكَيْفَ يُعَدُّ هذَا خَبَرًا سَارًّا\u003c/h3\u003e\n\u003cp\u003eولذلك، أختتم هذا الفصل، إجابةً عن تساؤلاتنا في الفقرة الأولى، بأن هناك وظيفة مزدوجة لأعمالنا—طاعة إيماننا—في الدينونة عند المجيء الثاني للرب يسوع. الوظيفة الأولى هي أن طاعتنا ستؤكد إيماننا المخلص. ولهذا السبب يُتحدث عن طاعتنا (أو قداستنا أو محبتنا) كأمر حتمي لخلاصنا النهائي (غلاطية ٥: ٢١؛ أفسس ٥: ٥؛ عبرانيين ١٢: ١٤؛ يوحنا الأولى ٣: ١٠). وهي ليست حتمية كأساس، بل كتأكيد. والوظيفة الأخرى لأعمالنا في يوم المسيح هي أن المسيح سيُقيمها ويكافئها كما يرى مناسباً. والآن يبرز التساؤل: كيف يساعدنا هذا التوقع على محبة ظهور الرب؟ هذا ما سنتناوله في الفصل الحادي عشر.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch10-ref-1\"\u003e[١]\u003c/a\u003e على سبيل المثال، يُظهر (لوقا ١٧: ٧-١٠) أنه لا يمكننا أن نجعل يسوع مديناً لنا: «كَذلِكَ أَنْتُمْ أَيْضًا، مَتَى فَعَلْتُمْ كُلَّ مَا أُمِرْتُمْ بِهِ فَقُولُوا: إِنَّنَا عَبِيدٌ بَاطَّالُونَ، لأَنَّنَا إِنَّمَا عَمِلْنَا مَا كَانَ يَجِبُ عَلَيْنَا.»\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch10-ref-2\"\u003e[٢]\u003c/a\u003e \"وحدات نقدية، تبلغ قيمة كل منها أجرة ثلاثة أو أربعة أشهر لعامل يدوي يعمل ستة أيام في الأسبوع.\" روبرت إتش. غوندري، تعليق على العهد الجديد: شروحات آية بآية مع ترجمة حرفية (بيبودي، ماساتشوستس: هندريكسون، ٢٠١٠)، ٣١٧.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg3qgqo4eaBj1bA2LXCpQyjQVkVl8ZYV-MJMCjf1Oja9HgEiqC3ltiOpRQiCD3GOODn0fcBMeCZ8yAEACnZpBgIbO9PazTE5viMVYBz1MDNFCqOmVhGHa71VxDdrEuStmPurK3Y0nbvfde-0XHAr0yYgJyPtWg_x5RjMchfn6eUaxyJFYlo6MSmDzaJcTM/s2752/%D8%A7%D9%84%D8%AF%D9%8A%D9%86%D9%88%D9%86%D8%A9_%D9%88%D8%A7%D9%84%D9%85%D9%83%D8%A7%D9%81%D8%A3%D8%A9_%D9%88%D9%81%D9%87%D9%85_%D8%AF%D9%88%D8%B1_%D8%A7%D9%84%D8%A3%D8%B9%D9%85%D8%A7%D9%84.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg3qgqo4eaBj1bA2LXCpQyjQVkVl8ZYV-MJMCjf1Oja9HgEiqC3ltiOpRQiCD3GOODn0fcBMeCZ8yAEACnZpBgIbO9PazTE5viMVYBz1MDNFCqOmVhGHa71VxDdrEuStmPurK3Y0nbvfde-0XHAr0yYgJyPtWg_x5RjMchfn6eUaxyJFYlo6MSmDzaJcTM/s600/%D8%A7%D9%84%D8%AF%D9%8A%D9%86%D9%88%D9%86%D8%A9_%D9%88%D8%A7%D9%84%D9%85%D9%83%D8%A7%D9%81%D8%A3%D8%A9_%D9%88%D9%81%D9%87%D9%85_%D8%AF%D9%88%D8%B1_%D8%A7%D9%84%D8%A3%D8%B9%D9%85%D8%A7%D9%84.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"1d:Tcf21,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل التاسع\u003c/h2\u003e\n\u003cp\u003eفِي نَارِ لَهِيبٍ، بِالانْتِقَامِ وَالرَّاحَةِ\u003c/p\u003e\n\u003cp\u003eكيف يكون يسوع هو الديان والمنقذ في آن واحد؟ كيف يكون هو المعاقب والمخلص معاً؟ إن أوضح صورة لهذا الدور المزدوج ليسوع عند مجيئه تتجلى في (تسالونيكي الثانية ١: ٥-١٠). ففي العدد الرابع، يمدح بولس الكنيسة بسبب: \"... صَبْرِكُمْ وَإِيمَانِكُمْ فِي جَمِيعِ اضْطِهَادَاتِكُمْ وَالضِّيقَاتِ الَّتِي تَحْتَمِلُونَهَا\". ثم في العدد الخامس، يفسر هذه الضيقات بوصفها طريقة الله ليجعل المؤمنين مؤهلين: \"لِمَلَكُوتِ اللهِ الَّذِي لأَجْلِهِ تَتَأَلَّمُونَ أَيْضًا\". ثم في الأعداد من السادس إلى العاشر، يبرر تلك الاستراتيجية الإلهية مشيراً إلى تغيير الله لحالهم عند المجيء الثاني:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إِذْ هُوَ عَادِلٌ عِنْدَ اللهِ أَنَّ الَّذِينَ يُضَايِقُونَكُمْ يُجَازِيهِمْ ضِيقًا، وَإِيَّاكُمُ الَّذِينَ تَتَضَايَقُونَ رَاحَةً مَعَنَا، عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِينَ سَيُعَاقَبُونَ بِهَلاَكٍ أَبَدِيٍّ مِنْ وَجْهِ الرَّبِّ وَمِنْ مَجْدِ قُوَّتِهِ، مَتَى جَاءَ لِيَتَمَجَّدَ فِي قِدِّيسِيهِ وَيُتَعَجَّبَ مِنْهُ فِي جَمِيعِ الْمُؤْمِنِينَ. لأَنَّ شَهَادَتَنَا عِنْدَكُمْ صُدِّقَت| فِي ذلِكَ الْيَوْم».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلا يَعلم بولس متى سيحدث \"اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ\" (تسالونيكي الثانية ١: ٧). ولا يعلم إن كان سيحدث في حياته. فقد أشار سابقاً في (تسالونيكي الأولى ٥: ١٠) إلى أنه قد يموت أو لا يموت: \"الَّذِي مَاتَ لأَجْلِنَا، حَتَّى إِذَا سَهِرْنَا أَوْ نِمْنَا نَحْيَا جَمِيعًا مَعَهُ\". ولذلك، عندما يصف مجيء الرب يسوع كحدث محتمل في فترة حياة المؤمنين في تسالونيكي، فإنه يُدرج نفسه معهم بفرح. فالله يعتبر من العدل أن يمنح \"إِيَّاكُمُ الَّذِينَ تَتَضَايَقُونَ رَاحَةً مَعَنَا\".\u003c/p\u003e\n\u003ch3\u003eالْغَضَبُ وَالإِنْقَاذُ مَعًا\u003c/h3\u003e\n\u003cp\u003eيوضح بولس في (تسالونيكي الثانية ١: ٦-١٠) أن الدينونة والإنقاذ يحدثان معاً عند المجيء الثاني للمسيح. فهما يحدثان \"عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ\" (تسالونيكي الثانية ١: ٧، ٨). وبصيغة أخرى، يقول: \"مَتَى جَاءَ لِيَتَمَجَّدَ فِي قِدِّيسِيهِ وَيُتَعَجَّبَ مِنْهُ فِي جَمِيعِ الْمُؤْمِنِينَ\" (تسالونيكي الثانية ١: ١٠).\u003c/p\u003e\n\u003cp\u003eأولاً، تأمل الدينونة في هذه الأعداد بوصفها صادرة من الله ويسوع معاً. يقول العدد السادس: \"إِذْ هُوَ عَادِلٌ عِنْدَ اللهِ أَنَّ الَّذِينَ يُضَايِقُونَكُمْ يُجَازِيهِمْ ضِيقًا\". هذا هو قرار الله؛ غضب الله. غير أن الاختبار الفعلي لذلك الغضب الإلهي يقع \"عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ... فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً\" (تسالونيكي الثانية ١: ٧، ٨). يسوع هو من يُعطي نقمة. ويُصور الله هنا بأنه \"يُجَازِيهِمْ ضِيقًا\" من خلال إعطاء يسوع للنقمة. ثم في العدد التاسع، تُوصف هذه المجازاة بالضيق وإعطاء النقمة بأنها: \"سَيُعَاقَبُونَ بِهَلاَكٍ أَبَدِيٍّ مِنْ وَجْهِ الرَّبِّ وَمِنْ مَجْدِ قُوَّتِهِ\". وهذا هو وصف \"الْغَضَبِ الآتِي\" الذي ننتظر يسوع ليُنقذنا منه (تسالونيكي الأولى ١: ١٠). إنه غضب يسوع وغضب الله.\u003c/p\u003e\n\u003cp\u003eثم تأمل الإنقاذ في هذه الأعداد. فبالتزامن مع الغضب يأتي الإنقاذ منه. ويُوصَف هذا الإنقاذ أولاً في العدد السابع. فبعد أن يُقرر بولس أن الله يعتبر من العدل أن يُجازي المضطهدين ضيقاً، يعود ليقرر أن الله يعتبر من العدل أيضاً أن يمنح: \"إِيَّاكُمُ الَّذِينَ تَتَضَايَقُونَ رَاحَةً مَعَنَا\". وهذا أيضاً، جنباً إلى جنب مع الغضب، يقع عند استعلان الرب يسوع من السماء مع ملائكة قوته في نار لهيب. ومن الأهمية أن نرى هذا الأمر: كِلا المجازاة الإلهية بالضيق والإنقاذ الإلهي بالراحة يحدثان في الحدث ذاته، ألا وهو: \"عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ... فِي نَارِ لَهِيبٍ\".\u003c/p\u003e\n\u003ch3\u003eكَيْفَ يَنْدَرِجُ الاخْتِطَافُ فِي هذَا الإِطَارِ\u003c/h3\u003e\n\u003cp\u003eمن الأهمية أن ندرك التزامن بين الانتقام والراحة، وذلك جزئياً لكي لا نقع في خطأ الاعتقاد بوجود مجيء ثانٍ على مرحلتين: مرحلة أولى (تُسمى أحياناً الاختطاف) لتأخذ الكنيسة إلى السماء في وقت الضيقة، ومرحلة أخرى لجلب الدينونة على العالم \u003ca href=\"#ch9-fn-1\"\u003e[١]\u003c/a\u003e. يُصور هذا النص الإنقاذ والدينونة كتزامن لا لبس فيه. ولا شك أن هناك اختطافاً، غير أنه يشير إلى الاختطاف لملاقاة الرب في الهواء عند مجيئه للدينونة والإنقاذ (تسالونيكي الأولى ٤: ١٧). إنه ترحيب عظيم بالرب يسوع على الأرض لتأسيس ملكوته. فليس هناك رجوع إلى السماء بينما تستمر الحياة على الأرض. إن \"الراحة\" التي تعد بها (تسالونيكي الثانية ١: ٧) \"عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ\" تتضمن ذلك الاختطاف عينه. ويستفيض روبرت غوندري في توضيح هذه النقطة التي أطرحها:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eتضع (تسالونيكي الثانية ١ :٣-١٠) \"راحة\" المسيحيين من اضطهادهم في نفس مجيء المسيح الذي يُدان فيه الأشرار \"فِي نَارِ لَهِيبٍ\". وفي (رؤيا ١٩: ١-٢١) يُثير مجيء المسيح \"هَلِّلُويَا!\" رباعية في ذات اللحظة التي يضرب فيها الأمم بسيف فمه. فما يمثل بركة للبعض، هو دينونة للبعض الآخر. لا حاجة هنا لفصل مجيئات مختلفة ليسوع بعضها عن بعض \u003ca href=\"#ch9-fn-2\"\u003e[٢]\u003c/a\u003e.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003eفِي مَجِيءٍ وَاحِدٍ، مُجَازَاةٌ وَرَاحَةٌ\u003c/h3\u003e\n\u003cp\u003eوهكذا، فإن المغزى حتى الآن هو أنه عند المجيء الثاني، يبرهن يسوع أنه جالب للغضب ومنقذ من الغضب معاً. فثمة مجازاة قضائية وراحة رحيمة في مجيء مجيد واحد: \"عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ\" (تسالونيكي الثانية ١: ٧، ٨). يُعطي يسوع نقمة وينتج عن ذلك أن غير المؤمنين: \"سَيُعَاقَبُونَ بِهَلاَكٍ أَبَدِيٍّ\" (تسالونيكي الثانية ١: ٨، ٩). ويمنح يسوع راحة وينتج عن ذلك أن المؤمنين يتعجبون من مجد المسيح في مجيئه (تسالونيكي الثانية ١: ٧، ١٠). هناك الكثير مما سيُنقذ منه، والكثير مما سيُنقذ لأجله.\u003c/p\u003e\n\u003ch3\u003eهَلْ فَاتَ التَّعَجُّبُ عَلَى الأَجْيَالِ الَّتِي رَقَدَتْ؟\u003c/h3\u003e\n\u003cp\u003eيثور التساؤل حتماً: بما أن بولس وجميع معاصريه في تسالونيكي قد رقدوا، إلى جانب أجيال عديدة من المؤمنين الأمناء من بعدهم، فهل تظل (تسالونيكي الثانية ١: ٥-١٠) وثيقة الصلة بهم؟ الإجابة هي نعم. بالطبع، ستظل تنطبق بشكل مباشر وتام على كل جيل حي من المؤمنين، لتملأنا بالمحبة والشوق لظهور الرب يسوع. غير أنها ذات صلة عميقة بأولئك الذين رقدوا في المسيح. وأقول هذا لأن بولس يتناول هذا التساؤل، وإجابته لا تقبل اللبس: نعم، إن غضب يسوع وإنقاذ يسوع عند المجيء الثاني يهمان \"الرَّاقِدِينَ\" (تسالونيكي الأولى ٤: ١٥).\u003c/p\u003e\n\u003cp\u003eيشرح بولس سبب ذلك في (تسالونيكي الأولى ٤: ١٣-١٨). فالتساؤل هناك يتناول مسألة المؤمنين الذين رقدوا بشكل مباشر. «ثُثُمَّ لاَ أُرِيدُ أَنْ تَجْهَلُوا أَيُّهَا الإِخْوَةُ مِنْ جِهَةِ الرَّاقِدِينَ، لِكَيْ لاَ تَحْزَنُوا كَالْبَاقِينَ الَّذِينَ لاَ رَجَاءَ لَهُمْ» (تسالونيكي الأولى ٤: ١٣). لقد تطرقنا بإيجاز إلى هذا النص في الفصل السابع. والأمر المذهل في هذا النص هو أن بولس لا يُعزي الأحياء من أُسر القديسين الراقدين في هذا الموضع بالقول إنهم الآن مع الرب، كما كان بوسعه أن يفعل مستخدماً كلمات (فيلبي ١: ٢٣) و(كورنثوس الثانية ٥: ٨). ومن الواضح أن ذلك لم يكن ما يشغل بال المسيحيين الأحياء. بل كان شاغلهم هو: \"وماذا عن مشاركة أحبائنا في المجيء الثاني؟ لقد علمتنا أنه سيكون أعظم حدث يمكن تخيله، وأن اختباره سيكون مذهلاً — نزول الرب، هتاف، صوت رئيس ملائكة، بوق الله، ملائكة قوة، نار لهيب، راحة من البؤس، نقمة على الأعداء، جلال الرب، وقلوب تفيض بالتعجب من مجده. لقد وصفته كحدث للأحياء، والآن أحباؤنا أموات\". كان هذا هو الشاغل. هل فاتهم الأمر؟\u003c/p\u003e\n\u003cp\u003eأجاب بولس: \"لم يفتهم الأمر، بل سيكونون، إن جاز التعبير، في مقاعد الصف الأمامي، حاضرين أولاً بأجساد قيامتهم\". هذه إعادة صياغة حرة لما ورد في (تسالونيكي الأولى ٤: ١٦، ١٧): \"َ… وَالأَمْوَاتُ فِي الْمَسِيحِ سَيَقُومُونَ أَوَّلاً. ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ\". إن طريقة التعبير هذه تهدف إلى القول: \"كلا! لن يفوتهم الأمر. ولا يوجد لديهم أي عائق\".\u003c/p\u003e\n\u003cp\u003eيحمل هذا تداعيات لكل جيل من المؤمنين الذين يموتون في الرب، ولم يختبروا مجيء الرب بعد. فلا ينبغي لأي مسيحي أن يدنو من موته مفكراً: \"لطالما رجوت أن أشهد مجيء الرب في حياتي؛ والآن سيفوتني ذلك اليوم العظيم. والآن سأنال جسد قيامتي بعد أن يتعجب الأحياء من مجيء الرب المجيد\". إن هذا غير صحيح. فاختبار التعجب وتمجيد المسيح عند مجيئه (تسالونيكي الثانية ١: ١٠) سيتمتع به الراقدون تمتعاً كاملاً تماماً كالأحياء عند مجيئه. ولذلك, ينبغي لمحبتنا لظهور الرب أن تحملنا عبر الموت إلى محضر المسيح، بقدر ما تحملنا من اليوم فصاعداً في شوق لمجيئه. وحتى في السماء، بعد الموت، وقبل المجيء الثاني، سنصلي: \"مَارَانْ أَثَا\" — \"تعال أيها الرب!\" (كورنثوس الأولى ١٦: ٢٢). وفي ذلك اليوم، ونحن في السماء مع المسيح، سنحب ظهور الرب أكثر من أي وقت مضى.\u003c/p\u003e\n\u003ch3\u003eيَوْمُ الرَّبِّ لَمْ يَأْتِ بَعْدُ\u003c/h3\u003e\n\u003cp\u003eإن ما يفعله بولس تالياً، في الأصحاح الثاني من رسالة تسالونيكي الثانية، غير مألوف لدرجة أننا قد نغفل بسهولة عن الطريقة الشخصية الجذرية التي صُمم بها وصفه للأيام الأخيرة ليزيد من محبتنا لظهور الرب. فبولس يفعل ما هو أكثر من محاولة إقناع الناس بأن يوم الرب لم يأتِ بعد ليثنيهم عن ترك وظائفهم والعودة إلى العمل. ومما لا شك فيه أنه يفعل ذلك. غير أننا سنرى أنه يفعل أمراً أعمق وأعظم لأجل محبتنا لظهور يسوع.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نَسْأَلُكُمْ أَيُّهَا الإِخْوَةُ مِنْ جِهَةِ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَاجْتِمَاعِنَا إِلَيْهِ، أَنْ لاَ تَتَزَعْزَعُوا سَرِيعًا عَنْ ذِهْنِكُمْ، وَلاَ تَرْتَاعُوا، لاَ بِرُوحٍ وَلاَ بِكَلِمَةٍ وَلاَ بِرِسَالَةٍ كَأَنَّهَا مِنَّا: أَيْ أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ. لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ، ابْنُ الْهَلاَكِ». (تسالونيكي الثانية ٢: ١-٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن الخطأ الذي يحاول بولس تصحيحه هو ظنهم أن اليوم قد حضر. غير أنه يُحاجج بأنه لم يحضر بعد.\u003c/p\u003e\n\u003ch3\u003eعُدْ إِلَى الْعَمَلِ\u003c/h3\u003e\n\u003cp\u003eفي (تسالونيكي الثانية ٣)، نرى التأثير العملي المباشر للخطأ الذي يحاول تصحيحه: أناس يتركون وظائفهم ويعيشون في بطالة. لذا، وإلى جانب تصحيحه للخطأ المتعلق بمجيء الرب، فإنه يُخبر الكنيسة بكيفية التعامل مع العاطلين. \"تَتَجَنَّبُوا كُلَّ أَخٍ يَسلكُ بِلاَ تَرْتِيبٍ\" (تسالونيكي الثانية ٣: ٦). وعوضاً عن ذلك: \"أَنْتُمْ تَتَمَثَّلُونَ بِنَا\" (تسالونيكي الثانية ٣: ٧) — بولس، وسلوانس، وتيموثاوس (تسالونيكي الثانية ١: ١). يقول: عندما كنا معكم \"لَمْ نَسْلُكْ بِلاَ تَرْتِيبٍ بَيْنَكُمْ\" (تسالونيكي الثانية ٣: ٧). \"وَلاَ أَكَلْنَا خُبْزًا مَجَّانًا مِنْ أَحَدٍ\" (تسالونيكي الثانية ٣: ٨). \"بَلْ كُنَّا نَشْتَغِلُ بِتَعَبٍ وَكَدٍّ لَيْلاً وَنَهَارًا\" (تسالونيكي الثانية ٣: ٨) لكي لا نثقل على أحد منكم. ورغم أنه كان بوسعنا المطالبة بحقنا الرسولي (فالفاعل مستحق أجرته)، إلا أننا اخترنا القيادة بالقدوة، لا بالمطالب (تسالونيكي الثانية ٣: ٩).\u003c/p\u003e\n\u003cp\u003eثم يُصبح أكثر تحديداً وحزماً: \"إِنْ كَانَ أَحَدٌ لاَ يُرِيدُ أَنْ يَشْتَغِلَ فَلاَ يَأْكُلْ أَيْضًا\" (تسالونيكي الثانية ٣: ١٠). \"فَمِثْلُ هؤُلاَءِ نُوصِيهِمْ… أَنْ يَشْتَغِلُوا بِهُدُوءٍ، وَيَأْكُلُوا خُبْزَ أَنْفُسِهِمْ\" (تسالونيكي الثانية ٣: ١٢). ومهما طال أمد الضيقة، وتأخر مجيء الرب: \"فَلاَ تَفْشَلُوا فِي عَمَلِ الْخَيْرِ\" (تسالونيكي الثانية ٣: ١٣). املأوا حياتكم — قصُرت أم طالت — بعمل مربح أو تطوعي. لا تكونوا عاطلين.\u003c/p\u003e\n\u003cp\u003eلقد أدى اللاهوت الأخروي الفاسد إلى سلوك فاسد. فقد أخطأوا بشأن المجيء الثاني وانحرفوا عن واجبات الحياة العادية. وقد تملك نوع من الهستيريا ببعض أفراد الكنيسة مما جعل بولس يقول: \"للاَ تَتَزَعْزَعُوا سَرِيعًا عَنْ ذِهْنِكُمْ\" (تسالونيكي الثانية ٢: ٢). لا تفقدوا قبضتكم العقلانية على الواقع.\u003c/p\u003e\n\u003ch3\u003eالْوُصُولُ إِلَى جُذُورِ أَسْبَابِ انْخِدَاعِ النَّاسِ\u003c/h3\u003e\n\u003cp\u003eغير أن الأمر الملفت للنظر فيما يفعله بولس تالياً هو مقدار المساحة والتفاصيل التي يكرسها لمسألة \"الارتداد\" و\"إنسان الخطية\". فإن كان هدفه هو مجرد إخبارهم بأن يوم الرب لم يحضر، لكان بوسعه التوقف فعلياً عند (تسالونيكي الثانية ٢: ٣): \"لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ، ابْنُ الْهَلاَكِ\". لقد أوصل الفكرة. وانتهت القضية. فعودوا إذن إلى العمل! وهذا يصدق بشكل خاص في ضوء العدد الخامس: \"أَمَا تَذْكُرُونَ أَنِّي وَأَنَا بَعْدُ عِنْدَكُمْ، كُنْتُ أَقُولُ لَكُمْ هذَا؟\". وبعبارة أخرى، هو ليس بحاجة لسرد قضية \"الارتداد\" و\"إنسان الخطية\". فهم يعلمون هذه الأمور. وبما أنه قد ذكرهم بالحقيقة الأساسية في العدد الثالث، فلماذا لا يكفي ذلك؟ ما هو الهدف من الأعداد ٤-١٢؟\u003c/p\u003e\n\u003cp\u003eإجابتي هي أنه يريد الوصول إلى جوهر الطريقة التي يمكن للمسيحيين من خلالها تجنب الانخداع بـ \"سِرُّ الإِثْمِ\" (تسالونيكي الثانية ٢: ٧) وبـ \"خَدِيعَةِ الإِثْمِ\" (تسالونيكي الثانية ٢: ١٠) وبـ \"عَمَلِ الشَّيْطَانِ، بِكُلِّ قُوَّةٍ، وَبِآيَاتٍ وَعَجَائِبَ كَاذِبَةٍ\" (تسالونيكي الثانية ٢: ٩). وهو يبتغي توضيح أن القضية الجذرية تتمثل في الفشل في قَبُول \"مَحَبَّةَ الْحَقِّ\" (تسالونيكي الثانية ٢: ١٠). وبصيغة أخرى، القضية الجذرية هي استبدال محبة الحق بالسرور بالإثم: \"سُرُّوا بِالإِثْمِ\" (تسالونيكي الثانية ٢: ١٢).\u003c/p\u003e\n\u003cp\u003eبعبارة أخرى، تركز هذه الأعداد المتعلقة بـ \"الارتداد\" و\"إنسان الخطية\" على خداعها الخبيث وكيفية عدم الانجرار وراءها. ويتضح أن القضية الحاسمة لا تكمن فقط فيما نعرفه، بل فيما نحبه. فالناس ينجذبون إلى الخداع الأخروي لا لافتقارهم إلى الحق فحسب، بل لأنهم لا يحبون الحق (تسالونيكي الثانية ٢: ١٠). وسنرى أن هذا الأمر يرتبط ارتباطاً مباشراً بمحبتنا لظهور الرب.\u003c/p\u003e\n\u003ch3\u003eمَجِيءٌ وَاحِدٌ لِلْمَسِيحِ فِي رِسَالَتَيْ تَسَالُونِيكِي الأُولَى وَالثَّانِيَةِ\u003c/h3\u003e\n\u003cp\u003eتبدأ حجة بولس في (تسالونيكي الثانية ٢) بإشارة إلى \"مَجِيءِ [ما يقابل παρουσίας] رَبِّنَا يَسُوعَ الْمَسِيحِ\" (تسالونيكي الثانية ٢: ١). ويستخدم بولس هذه الكلمة اليونانية لـ \"مجيء\" (παруσίας) ست مرات في رسالتي تسالونيكي للإشارة إلى المجيء الثاني للمسيح (تسالونيكي الأولى ٢: ١٩؛ ٣: ١٣؛ ٤: ١٥؛ ٥: ٢٣؛ تسالونيكي الثانية ٢: ١، ٨). وهي الكلمة الشائعة في العهد الجديد لمجيئه ثانية. وفي رسائل بولس، لا تشير هذه الكلمة إلى مجيء المسيح بطريقة روحية خلال مجرى التاريخ العادي. بل هو المجيء الذي يُحدث القيامة من الأموات. \"إِنَّنَا نَحْنُ الأَحْيَاءَ الْبَاقِينَ إِلَى مَجِيءِ [παρουσίαν] الرَّبِّ، لاَ نَسْبِقُ الرَّاقِدِينَ... نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ\" (تسالونيكي الأولى ٤: ١٥، ١٧).\u003c/p\u003e\n\u003cp\u003eإن هذه الإشارة إلى كوننا \"سَنُخْطَفُ جَمِيعًا مَعَهُمْ\" هي ما يقصده بولس في (تسالونيكي الثانية ٢: ١) بكلمات: \"وَاجْتِمَاعِنَا إِلَيْهِ\". وبذلك فإن \"المجيء\" في (تسالونيكي الثانية ٢: ١) و\"المجيء\" في (تسالونيكي الأولى ٤: ١٣-١٨) هما المجيء ذاته. وثمة رابط آخر بين اجتماعنا إليه في (تسالونيكي الثانية ٢: ١) ومجيء المسيح في (تسالونيكي الأولى ٤: ١٥-١٧) وهو أن الكلمة المستخدمة لـ \"اجتماعنا\" (ἐπισυναγωγῆς) هي صيغة من الكلمة التي استخدمها يسوع بشأن مجيئه الثاني في (متى ٢٤: ٣١)، حيث يقول إن ابن الإنسان: \"يُرْسِلُ مَلاَئِكَتَهُ بِبُوق عَظِيمِ الصَّوْتِ، فَيَجْمَعُونَ [ἐπισυνάξουσιν] مُخْتَارِيهِ مِنَ الأَرْبَعِ الرِّيَاحِ\". هذا \"الجمع\" بصوت بوق عظيم يشابه \"بُوقِ اللهِ\" في (تسالونيكي الأولى ٤: ١٦)، الذي يقيم الأموات ويجمع الأحياء والأموات لملاقاة المسيح.\u003c/p\u003e\n\u003cp\u003eلذلك، فإن \"مجيء ربنا يسوع\" الذي يقول بولس إنه يحدث في \"يوم الرب\" (تسالونيكي الثانية ٢: ١، ٢) هو المجيء الواحد الذي يضعه بولس نصب عينيه طوال رسالتي تسالونيكي الأولى والثانية. وعليه، عندما يقول في (تسالونيكي الثانية ٢: ٨): \"وَحِينَئِذٍ سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ، وَيُبْطِلهُ بِظُهُورِ مَجِيئِهِ [παρουσίας]\"، فهذه إشارة إلى المجيء ذاته الذي يقيم الأموات (تسالونيكي الأولى ٤: ١٧) والذي فيه يسوع: \"يُسْتَعْلَنْ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ\" (تسالونيكي الثانية ١: ٧، ٨).\u003c/p\u003e\n\u003ch3\u003eمَا هُوَ الارْتِدَادُ؟\u003c/h3\u003e\n\u003cp\u003eيقول بولس إنه قبل أن يحدث أي من ذلك، لا بد من وقوع أمرين: \"لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ\" (تسالونيكي الثانية ٢: ٣). فما هو \"الارتداد\" (ἀποστασία)؟ تشير الكلمة إلى التحول عما كان يُؤمن به سابقاً. وقد استُخدمت مرة أخرى في العهد الجديد للإشارة إلى تعليم اليهود الارتداد عن موسى: \"تُعَلِّمُ جَمِيعَ الْيَهُودِ الَّذِينَ بَيْنَ الأُمَمِ الارْتِدَادَ [ἀποστασίαν] عَنْ مُوسَى\" (أعمال الرسل ٢١: ٢١). وبالتالي، فإن الارتداد الذي يقصده بولس يشير إلى تحول من يَدّعون المسيحية عن المسيح.\u003c/p\u003e\n\u003cp\u003eيشير بولس إلى أمر بالغ الذروة. أمر حاسم ومُشَكِّل للحقبة التاريخية. أمر يمكن تمييزه كحدث جارف وكارثي تماماً في الكنيسة والعالم. وأقول هذا لأن الارتداد كان سلفاً جزءاً معتاداً من الاختبار المسيحي. وقد قال يسوع إنه سيكون كذلك. فقد صور يسوع الارتداد كجزء عادي من انتشار الإنجيل:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَهؤُلاَءِ كَذلِكَ هُمُ الَّذِينَ زُرِعُوا عَلَى الأَمَاكِنِ الْمُحْجِرَةِ: الَّذِينَ حِينَمَا يَسْمَعُونَ الْكَلِمَةَ يَقْبَلُونَهَا لِلْوَقْتِ بِفَرَحٍ، وَلكِنْ لَيْسَ لَهُمْ أَصْلٌ فِي ذَوَاتِهِمْ، بَلْ هُمْ إِلَى حِينٍ. فَبَعْدَ ذلِكَ إِذَا حَدَثَ ضِيقٌ أَوِ اضْطِهَادٌ مِنْ أَجْلِ الْكَلِمَةِ، فَلِلْوَقْتِ يَعْثُرُونَ». (مرقس ٤: ١٦-١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلو كان هذا الاختبار العادي للارتداد هو كل ما يدور في ذهن بولس، لما استقامت حجته. فلكي يكون لحجته معنى، يجب أن يشير \"الارتداد\" إلى شيء بالغ الذروة، يمكن تمييزه كحدث غير مألوف تاريخياً.\u003c/p\u003e\n\u003ch3\u003eتَنَبُّؤُ يَسُوعَ بِأَنَّ كَثِيرِينَ سَيَعْثُرُونَ (أَوْ يَرْتَدُّونَ)\u003c/h3\u003e\n\u003cp\u003eيمنحنا تعليم يسوع لمحة عن هذا الارتداد. لقد رأينا سلفاً روابط وثيقة بين لغة بولس عن المجيء الثاني ولغة يسوع (παρουσία، متى ٢٤: ٣، ٢٧، ٣٧، ٣٩؛ تسالونيكي الثانية ٢: ١؛ تسالونيكي الأولى ٤: ١٥؛ ἐπισυναγωγῆς، تسالونيكي الثانية ٢: ١؛ راجع متى ٢٤: ٣١). وهناك روابط أخرى تدور حول فكرة الارتداد والإثم. تأمل (متى ٢٤: ٩-١٣):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«حِينَئِذٍ يُيُسَلِّمُونَكُمْ إِلَى ضِيق وَيَقْتُلُونَكُمْ، وَتَكُونُونَ مُبْغَضِينَ مِنْ جَمِيعِ الأُمَمِ لأَجْلِ اسْمِي. وَحِينَئِذٍ يَعْثُرُ كَثِيرُونَ وَيُسَلِّمُونَ بَعْضُهُمْ بَعْضًا وَيُبْغِضُونَ بَعْضُهُمْ بَعْضًا. وَيَقُومُ أَنْبِيَاءُ كَذَبَةٌ كَثِيرُونَ وَيُضِلُّونَ كَثِيرِينَ. وَلِكَثْرَةِ الإِثْمِ تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ. وَلكِنِ الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهذَا يَخْلُصُ». (متى ٢٤: ٩-١٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلا حاجة لنا لإنكار أن مثل هذه الأمور (الضيق، الاستشهاد، الكراهية تجاه المؤمنين، الأنبياء الكذبة، الإثم، وبرود المحبة) تحدث طوال التاريخ، غير أنه يصعب تفادي الانطباع بأن يسوع يشير إلى اختبار يبلغ الذروة لهذه الأمور \u003ca href=\"#ch9-fn-3\"\u003e[٣]\u003c/a\u003e. فكلمة حينئذٍ في العددين ٩ و١٠ تشير إلى وتيرة متصاعدة. وبالمثل، فإن الإشارة إلى الإثم الذي \"يكثر\" تبدو بلا معنى لو كانت مجرد إشارة إلى التقلبات التاريخية المستمرة للإثم. ولذلك، فإن الإشارة إلى \"كثيرين\" الذين \"سيعثرون\" (متى ٢٤: ١٠، σκανδαλισθήσονται؛ راجع متى ١٣: ٢١) تبدو كوتيرة متصاعدة من الارتداد والتمرد، تشبه تلك التي أشار إليها بولس في (تسالونيكي الثانية ٢: ٣).\u003c/p\u003e\n\u003cp\u003eويتأكد هذا الرابط المذهل بين الإشارات إلى \"الإثم\" في (تسالونيكي الثانية ٢ :٣، ٧، ٨、 ٩) وفي (متى ٢٤: ١٢). يقول يسوع: \"وَلِكَثْرَةِ الإِثْمِ تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ\". هذه الإشارة إلى \"كثيرين\" مصابين بعدوى الإثم تتداخل بلا شك مع الـ \"كثيرين\" الذين يعثرون (متى ٢٤: ١٠)، والـ \"كثيرين\" الذين يضلون (متى ٢٤: ١١؛ راجع ٢٤: ٥). هذه صورة لارتداد كبير. ويلتقط بولس فكرة الإثم هذه ويشير إلى \"سِرُّ الإِثْمِ... يَعْمَلُ\" (تسالونيكي الثانية ٢: ٧)، ممهداً الأرض لـ \"إِنْسَانُ الْخَطِيَّةِ\" الأخير (تسالونيكي الثانية ٢: ٣؛ راجع \"الأثيم\"، ٢: ٨، ٩). وممّا يزيد الروابط وثوقاً بين يسوع وبولس، أن كليهما يعزو \"الارتداد\" أو \"العثرة\" إلى \"آيَاتٍ وَعَجَائِبَ\" خادعة (متى ٢٤: ٢٤؛ تسالونيكي الثانية ٢: ٩).\u003c/p\u003e\n\u003cp\u003eلذلك أستنتج أنه عندما يقول بولس: \"لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً\"، قبل مجيء المسيح، فهو يشير إلى ارتداد بالغ الذروة، حاسم، مُشكل لحقبة تاريخية، وكارثي ضد الله والمسيح وشعبه، من داخل الكنيسة المنظورة ومن خارجها — كل الأمم تبغض الكنيسة من الخارج (متى ٢٤: ٩)، والمحبة تبرد من الداخل (متى ٢٤: ١٢). في فكر بولس، يمثل ذلك فترة زمنية مميزة ومحدودة من الارتداد الدراماتيكي — وهي فترة لم تحدث بعد.\u003c/p\u003e\n\u003ch3\u003eإِنْسَانُ الْخَطِيَّةِ\u003c/h3\u003e\n\u003cp\u003eأما الحدث الآخر الذي يقول بولس إنه يجب أن يقع قبل مجيء المسيح فهو استعلان إنسان الخطية. \"لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ\" (تسالونيكي الثانية ٢: ٣). ويُخبرنا بولس بسبعة أمور على الأقل عن إنسان الخطية.\u003c/p\u003e\n\u003cp\u003e١. إنه \"إنسان\" (تسالونيكي الثانية ٢: ٣). وليس ملاكاً. ولا شيطاناً.\u003c/p\u003e\n\u003cp\u003e٢. إنه أثيم بامتياز. ويُدعى \"إِنْسَانُ الْخَطِيَّةِ\" (تسالونيكي الثانية ٢: ٣). فهو يعتبر نفسه فوق أي ناموس أو شريعة خارج ذاته.\u003c/p\u003e\n\u003cp\u003e٣. وبما أنه لا يوجد سوى كائن واحد فوق كل شريعة بهذا المعنى — ألا وهو الله — فهذا هو ما يدعيه إنسان الخطية: أنه هو الله. فهو: «الْمُقَاوِمُ وَالْمُرْتَفِعُ عَلَى كُلِّ مَا يُدْعَى إِلهًا أَوْ مَعْبُودًا، حَتَّى إِنَّهُ يَجْلِسُ فِي هَيْكَلِ اللهِ كَإِلهٍ، مُظْهِرًا نَفْسَهُ أَنَّهُ إِلهٌ» (تسالونيكي الثانية ٢: ٤). هذا هو ضد المسيح النهائي وبالغ الذروة، أي المسيح البديل الذي يُقاوم المسيح. لم يستخدم بولس قط مصطلح ضد المسيح، بل استخدمه يوحنا وحده (يوحنا الأولى ٢ :١٨، ٢٢؛ ٤: ٣؛ يوحنا الثانية ٧). لكنه يمتلك التصور ذاته \"لإنسان الخطية\" الذي يسميه يوحنا \"ضد المسيح\".\u003c/p\u003e\n\u003cp\u003eوكما يقول يوحنا إن في الساعة الأخيرة: \"ضِدُّ الْمَسِيحِ يَأْتِي\" (يوحنا الأولى ٢: ١٨)، فهو يدرك أن في أيامه قد أتى كثيرون يمتلكون \"رُوحُ ضِدِّ الْمَسِيحِ\" (يوحنا الأولى ٤: ٣). ويمكن للمرء أن يقول، بهذا المعنى، أنه: \"قَدْ صَارَ الآنَ أَضْدَادٌ لِلْمَسِيحِ كَثِيرُونَ\" (يوحنا الأولى ٢: ١٨). وبالمثل، يقول بولس إنه على الرغم من أن \"إنسان الخطية\" آتٍ، إلا أن \"سِرُّ الإِثْمِ الآنَ يَعْمَلُ\" (تسالونيكي الثانية ٢: ٧). يقصد بولس أن نرى أنه على الرغم من أن سمات وقت النهاية ستكون عاملة في وقت مبكر من التاريخ، إلا أن الأزمة في النهاية، مع الارتداد وإنسان الخطية، ستكون قابلة للتمييز. ستكون هناك نقطة، كما يقول يسوع، ينبغي لنا عندها أن: \"انْتَصِبُوا وَارْفَعُوا رُؤُوسَكُمْ لأَنَّ نَجَاتَكُمْ تَقْتَرِبُ\" (لوقا ٢١: ٢٨).\u003c/p\u003e\n\u003cp\u003e٤. \"إنسان الخطية\" مولود للهلاك. يسميه بولس \"ابْنُ الْهَلاَكِ\" (تسالونيكي الثانية ٢: ٣). فحِمضُه النووي الروحي، إن جاز التعبير، يجعله محتوماً للخراب. لا مستقبل له، بل هو أثيم بامتياز ومحكوم عليه بالدمار. لذلك لا مجال للتفكير في وجود خطر حقيقي يهدد المسيح أو ملكوته. لقد خسر إنسان الخطية المعركة قبل أن يبدأها.\u003c/p\u003e\n\u003cp\u003e٥. كإنسان، فإنه يأتي، مع ذلك, بقوة الشيطان. فمجيء الأثيم هو \"بِعَمَلِ الشَّيْطَانِ\" (تسالونيكي الثانية ٢: ٩). والذي يدير هذا الصراع بين إنسان الخطية والمسيح هو عدو الله الأكبر.\u003c/p\u003e\n\u003cp\u003e٦. لذلك، كإنسان، سيمتلك، مع ذلك، قوة خارقة. يسميها بولس: \"بِكُلِّ قُوَّةٍ\" (تسالونيكي الثانية ٢: ٩). وبها سيصنع آيات وعجائب. وحين يسميها: \"آيَاتٍ وَعَجَائِبَ كَاذِبَةٍ\"، فلا ينبغي لنا أن نقرأ ذلك على أنه يعني أنها لا تحدث حقاً. بل يعني أنها تحدث حقاً في خدمة الكذب. فهي معجزات حقيقية تهدف إلى الخداع (راجع تثنية ١٣: ١-٣؛ متى ٢٤: ٢٤).\u003c/p\u003e\n\u003cp\u003e٧. لذلك، سيكون إنسان الخطية منقطع النظير في قدرته على الخداع. فمجيء الأثيم هو: \"بِكُلِّ خَدِيعَةِ الإِثْمِ، فِي الْهَالِكِينَ\" (تسالونيكي الثانية ٢: ٩، ١٠). ذلك لأننا سنرى أدناه أن الطريقة التي يخدع بها هي بجعل الإثم يبدو أمراً مُسراً (تسالونيكي الثانية ٢: ١١).\u003c/p\u003e\n\u003ch3\u003eسَتَتَّضِحُ الأُمُورُ أَكْثَرَ مَعَ اقْتِرَابِهَا\u003c/h3\u003e\n\u003cp\u003eلا نحتاج إلى معرفة ما يعنيه بولس بدقة عندما يقول في (تسالونيكي الثانية ٢: ٤) إن إنسان الخطية: \"يَجْلِسُ فِي هَيْكَلِ اللهِ\". ويمكننا أن نتيقن أن هذه ليست إشارة محدودة إلى تدنيس الهيكل اليهودي عام ٧٠ ميلادياً. يمكننا أن نتيقن من ذلك بسبب ما يقوله بولس في العدد الثامن: \"وَحِينَئِذٍ [عندما يُرفع ما يحجزه] سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ، وَيُبْطِلهُ بِظُهُورِ مَجِيئِهِ\". هذا المجيء (παρουσίας) هو المجيء المذكور في العدد الأول، حين يجمع المسيح مختاريه من الأربع الرياح (انظر متى ٢٤: ٣١). وهو المجيء المذكور في (تسالونيكي الثانية ١: ٧، ٨)، عندما يأتي: \"مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ\". وهو المجيء المذكور في (تسالونيكي الأولى ٢: ١٩؛ ٣: ١٣؛ ٤: ١٥)، عندما يُقام القديسون، وسنُخطف لملاقاة الرب في الهواء. إن هذا الارتداد وإنسان الخطية هما في انقضاء الدهر. وسينتهيان وينقضان (ἀνελεῖ... καὶ καταργήσει) بواسطة ظهور مجيء الرب (τῇ ἐπιφανείᾳ τῆς παρουσίας αὐτοῦ).\u003c/p\u003e\n\u003cp\u003eوأين سيجلس إنسان الخطية — سواء أكان ذلك في أورشليم، أم الفاتيكان، أم جنيف، أم سولت ليك سيتي، أم كولورادو سبرينغز — فهذا ليس جوهر الأمر. بل سيكون في مركز التركيز العالمي للعبادة الباطلة. وسيكون مصحوباً بادعاء التعالي فوق كل شريعة — وبأنه هو الله. وبالنسبة لأولئك الذين لهم عيون ليروا، ستكون العلامات أكثر وضوحاً في ذلك اليوم مما هي عليه الآن. «وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمُ ذلِكَ الْيَوْمُ كَلِصٍّ. جَمِيعُكُمْ أَبْنَاءُ نُورٍ وَأَبْنَاءُ نَهَارٍ» (تسالونيكي الأولى ٥: ٤، ٥).\u003c/p\u003e\n\u003ch3\u003eتَحْذِيرَاتٌ وَتَشْجِيعَاتٌ\u003c/h3\u003e\n\u003cp\u003eما رأيناه هو أنه في كِلا الأصحاحين الأول والثاني من رسالة تسالونيكي الثانية، يقدم بولس تحذيراً وتشجيعاً. يتمثل تحذير الأصحاح الأول في أن الرب يسوع آتٍ «مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ» (تسالونيكي الثانية ١: ٧، ٨). فاحذر. فأنت لا تريد أن تكون هدفاً لتلك النار. ويتمثل تشجيع الأصحاح الأول في أنه بهذا المجيء الناري، سيمنح الرب \"راحة\" لأولئك الذين يتألمون لأجل أمانتهم للمسيح (تسالونيكي الثانية ١: ٧)، وسيُظهر مجده ليتعجب منه جميع الذين آمنوا (تسالونيكي الثانية ١: ١٠).\u003c/p\u003e\n\u003cp\u003eأما تحذير الأصحاح الثاني فيتمثل في أن بذور ارتداد وقت النهاية تُزرع سلفاً بواسطة \"سِرُّ الإِثْمِ\" (تسالونيكي الثانية ٢: ٧). وسيأتي هذا الارتداد بعمل الشيطان بقوة هائلة (\"بِكُلِّ قُوَّةٍ\"، تسالونيكي الثانية ٢: ٩)، وسيرسل الله نفسه \"عَمَلَ الضَّلاَلِ\" على الذين لم يقبلوا \"مَحَبَّةَ الْحَقِّ\" (تسالونيكي الثانية ٢: ١٠、 ١١). لذا أعد نفسك بكل وسيلة ممكنة لئلا تكون جزءاً من هذا \"الارتداد\". ويتمثل تشجيع الأصحاح الثاني في أن التجسيد الشيطاني لهذا الارتداد، أي إنسان الخطية، سيُباد بظهور مجيء الرب يسوع (تسالونيكي الثانية ٢: ٨). فلا داعي للخوف من أن يكون لديه أي فرصة لقلب مقاصد الخلاص لابن الله.\u003c/p\u003e\n\u003ch3\u003eقُلُوبٌ لاَ تُرَحِّبُ بِمَحَبَّةٍ لِلْحَقِّ\u003c/h3\u003e\n\u003cp\u003eما الذي ينبغي أن يكون عليه تأثير هذه التحذيرات والتشجيعات ونحن نتأمل في \"ظُهُورِ مَجِيئِهِ [ما يقابل τῇ ἐπιφανείᾳ τῆς παρουσίας αὐτοῦ]\"؟ أحد الإجابات هو: محبة أعظم لظهور الرب. لم يقل بولس ذلك بهذه الكلمات حرفياً. ولكن دقق النظر معي في الأعداد الختامية من فقرة بولس المتعلقة بالارتداد والأثيم وسر الإثم:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مَجِيئُهُ... بِكُلِّ خَدِيعَةِ الإِثْمِ، فِي الْهَالِكِينَ، لأَنَّهُمْ لَمْ يَقْبَلُوا مَحَبَّةَ الْحَقِّ حَتَّى يَخْلُصُوا. وَلأَجْلِ هذَا سَيُرْسِلُ إِلَيْهِمُ اللهُ عَمَلَ الضَّلاَلِ، حَتَّى يُصَدِّقُوا الْكَذِبَ، لِكَيْ يُدَانَ جَمِيعُ الَّذِينَ لَمْ يُصَدِّقُوا الْحَقَّ، بَل * سُرُّوا بِالإِثْمِ» (تسالونيكي الثانية ٢: ٩-١٢).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن هذا مقطع في غاية الأهمية للوصول إلى الجذور العميقة لسبب انجراف الناس في الارتداد. لماذا سيُخدعون؟ تأتي الإجابة في العدد العاشر: «لأَنَّهُمْ لَمْ يَقْبَلُوا [أي لم يرحبوا بـ] مَحَبَّةَ الْحَقِّ [τὴν ἀγάπην τῆς ἀληθείας οὐκ ἐδέξαντο]». وهذا أسلوب غير معتاد في التعبير: \"لَمْ يَقْبَلُوا مَحَبَّةَ الْحَقِّ\". فالفكرة هي أنهم لم يكتفوا بالفشل في محبة الحق، بل وفي مستوى أعمق، لم يُريدوا أن يحبوه. لم يكن الحق مُرحباً به في قلوبهم. وبعبارة أخرى، كانت هذه القلوب تشترك سلفاً في سر الإثم، لأن هذا هو جوهر الإثم: أنا حق نفسي ولا تروق لي حتى فكرة قبول حق من الخارج.\u003c/p\u003e\n\u003cp\u003eثم تأخذنا الأعداد ١١و١٢ إلى عمق أكبر في معنى ما أحبوه فعلياً عوضاً عن الحق. \"وَلأَجْلِ هذَا سَيُرْسِلُ إِلَيْهِمُ اللهُ عَمَلَ الضَّلاَلِ، حَتَّى يُصَدِّقُوا الْكَذِبَ، لِكَيْ يُدَانَ جَمِيعُ الَّذِينَ لَمْ يُصَدِّقُوا الْحَقَّ، بَلْ سُرُّوا بِالإِثْمِ\". صحيح أن الله يُسلم رافضي الحق هؤلاء لعمل الضلال، ولكن لماذا، في النهاية، رفضوا الحق؟ وماذا أحبوا عوضاً عنه؟ الإجابة: «سُرُّوا بِالإِثْمِ» (تسالونيكي الثانية ٢: ١٢). إنها قضية سرور. وهو ما يعادل القول إنها، بدرجة ما، قضية محبة. أي، في أي شيء تجد سرورك الأعظم: في الحق أم في الإثم؟ أيهما تحب؟ يقول العدد التاسع إن الخديعة هي \"خَدِيعَةِ الإِثْمِ\". وبعبارة أخرى، هو يخدع من خلال جعل الناس يجدون في الإثم سروراً أعظم مما يجدونه في الحق.\u003c/p\u003e\n\u003cp\u003eويصعب ألا نرى رابطاً بين فكر بولس هنا وتنبؤ يسوع في وقت النهاية: «وَلِكَثْرَةِ الإِثْمِ تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ» (متى ٢٤: ١٢). فالقلوب الأثيمة لن ترحب بمحبة الحق. وتختفي محبة الحق (ومحبة الناس) من القلوب التي تجد سروراً في كونها إلهاً لنفسها — القلوب التي تصبح شريعة لذاتها، وبالتالي تحب الإثم.\u003c/p\u003e\n\u003ch3\u003eاسْتِرَاتِيجِيَّةٌ حَاسِمَةٌ ضِدَّ سِرِّ الإِثْمِ\u003c/h3\u003e\n\u003cp\u003eاستنتاجي هو أن محبة ظهور الرب يسوع (تيموثاوس الثانية ٤: ٨) هي جزء أساسي من محبة الحق التي يضعها بولس نصب عينيه في (تسالونيكي الثانية ٢: ١٠، ١٢). ولذلك، فإن إضرام محبة لا تتزعزع لظهور الرب هو استراتيجية حاسمة لحماية أنفسنا وكنائسنا من سر الإثم، الذي: \"الآنَ يَعْمَلُ\" (تسالونيكي الثانية ٢: ٧). وينبغي أن يكون تأثير تحذيرات الأصحاحين الأول والثاني من رسالة تسالونيكي الثانية هو أن نتخذ كل خطوة ممكنة لمنع محبتنا لظهور الرب من البرود. وينبغي أن يكون تأثير تشجيعات الأصحاحين الأول والثاني من الرسالة ذاتها هو أن نرى المجيء العنيف والناري ليسوع كانتصار على جميع أعدائنا. دعونا نتعجب الآن من مجيء هذا المسيح المنتصر، ودعونا نجد فيه سروراً أعظم من أي شيء يمكن أن يقدمه هذا العالم. دعونا نحب ظهوره.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch9-ref-1\"\u003e[١]\u003c/a\u003e للاطلاع على المزيد حول فهمي لخطأ نظرية الاختطاف قبل الضيقة، انظر: جون بايبر، \"تعاريف وملاحظات حول المجيء الثاني للمسيح\"، (Desiring God)، ٣٠ أغسطس ١٩٨٧.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch9-ref-2\"\u003e[٢]\u003c/a\u003e بوب غوندري، \"أولاً ضد المسيح: لماذا لن يأتي المسيح قبل أن يأتي ضد المسيح\" (غراند رابيدز، ميشيغان: بيكر، ١٩٩٦).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch9-ref-3\"\u003e[٣]\u003c/a\u003e أعتقد أنه من الخطأ حصر تركيز (متى ٢٤) على الأحداث التاريخية التي سبقت وشملت دمار أورشليم عام ٧٠ ميلادياً. انظر الفصل السادس عشر. لا تكمن المشكلة في رؤية إشارات إلى هذه الأحداث في القرن الأول، بل تكمن المشكلة في حصر أفكار يسوع في هذه الأحداث فقط. وأنا أتفق مع لاد حين يكتب: \"من مجمل تعليم [يسوع]، يتضح أمر واحد: لقد تحدث يسوع عن سقوط أورشليم وعن مجيئه الأخروي معاً. وقد اقترح كرانفيلد أن التاريخي والأخروي قد امتزجا في منظور يسوع الخاص، وأن الحدث الأخروي الأخير يُرى من خلال \"شفافية\" الحدث التاريخي المباشر. وقد طبق المؤلف هذه الأطروحة على أنبياء العهد القديم ووجد أن هذه النظرة المقربة للمستقبل هي أحد العناصر الأساسية في المنظور النبوي. في عاموس، يوم الرب هو حدث تاريخي (عاموس ٥: ١٨-٢٠) وأخروي (عاموس ٧: ٤؛ ٨: ٨، ٩؛ ٩: ٥). ويصف إشعياء يوم افتقاد بابل التاريخي وكأنه يوم الرب الأخروي (إشعياء ١٣). ويصف صفنيا يوم الرب (صفنيا ١: ٧، ١٤) ككارثة تاريخية على يد عدو غير مسمى (صفنيا ١: ١٠-١٢، ١٦-١٧؛ ٢: ٥-١٥)؛ ولكنه يصفه أيضاً بعبارات كارثة عالمية يُمسح فيها كل كائن من على وجه الأرض (صفنيا ١: ٢، ٣) حتى لا يبقى شيء (صفنيا ١: ۱۸). إن هذه الطريقة في النظر إلى المستقبل تعبر عن الرأي القائل [بكلمات كرانفيلد] إن \"الأخروي يتجلى في أزمات التاريخ. فالدينونات الإلهية في التاريخ هي، إن جاز التعبير، بروفات للدينونة الأخيرة، والتجسدات المتتابعة لضد المسيح هي إرهاصات للتركيز الأسمى الأخير لتمرد إبليس قبل النهاية\" [سي. إي. بي. كرانفيلد، الإنجيل بحسب القديس مرقس: مقدمة وتعليق (كامبريدج، المملكة المتحدة: مطبعة جامعة كامبريدج، ١٩٥٩)، ٤٠٤]\". جورج إلدون لاد ، لاهوت العهد الجديد، طبعة منقحة، تحرير دي. إيه. هاجنر (غراند رابيدز، ميشيغان: إيردمانز، ١٩٩٣)، ١٩٩. للمزيد حول \"المنظور النبوي\"، انظر الفصل السابع، الهامش ٢.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEifFKwNR6QQC3bKFiAKqeufafEjU6RWjVcJi2tlKtkOvAnJlDCaa7h0i0mxhH-WWjvnlTVFTEJ4ePjnfiX-4w0gIW8yVnLbWo8aGtdZwAn8iBExICiqtdaJnkZjqBXptoOCjnng_T8OlHS3fTiyVcoNErE9Zv_UXUsEf8MhLGHu6w7rYO8ZfTRa0Gb4UGw/s2752/%D8%B8%D9%87%D9%88%D8%B1_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD_%D8%A7%D9%84%D9%85%D8%B2%D8%AF%D9%88%D8%AC__%D8%A7%D9%84%D8%A7%D9%86%D8%AA%D9%82%D8%A7%D9%85_%D9%88%D8%A7%D9%84%D8%B1%D8%A7%D8%AD%D8%A9.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEifFKwNR6QQC3bKFiAKqeufafEjU6RWjVcJi2tlKtkOvAnJlDCaa7h0i0mxhH-WWjvnlTVFTEJ4ePjnfiX-4w0gIW8yVnLbWo8aGtdZwAn8iBExICiqtdaJnkZjqBXptoOCjnng_T8OlHS3fTiyVcoNErE9Zv_UXUsEf8MhLGHu6w7rYO8ZfTRa0Gb4UGw/s400/%D8%B8%D9%87%D9%88%D8%B1_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD_%D8%A7%D9%84%D9%85%D8%B2%D8%AF%D9%88%D8%AC__%D8%A7%D9%84%D8%A7%D9%86%D8%AA%D9%82%D8%A7%D9%85_%D9%88%D8%A7%D9%84%D8%B1%D8%A7%D8%AD%D8%A9.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"1e:T8a1d,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الثامن\u003c/h2\u003e\n\u003cp\u003eيَسُوعُ سَيُنْقِذُنَا مِنْ غَضَبِ يَسُوعَ\u003c/p\u003e\n\u003cp\u003eلا يتعامل العهد الجديد مع يوم الدينونة الآتي وكأنه يوم لا يحتاج فيه المسيحيون إلى إنقاذ. بل على النقيض من ذلك، فإنه يعد بغضب مروع وبحماية ثمينة. سيجلب المجيء الثاني للمسيح الدينونة والإنقاذ معاً. ومهما بلغ رعب ذلك اليوم، فإنه لن يلتهم أولئك الذين هم في المسيح. فالمسيحيون هم الذين: «رَجَعْتُمْ إِلَى اللهِ مِنَ الأَوْثَانِ، لِتَعْبُدُوا اللهَ الْحَيَّ الْحَقِيقِيَّ، وَتَنْتَظِرُوا ابْنَهُ مِنَ السَّمَاءِ، الَّذِي أَقَامَهُ مِنَ الأَمْوَاتِ، يَسُوعَ، الَّذِي يُنْقِذُنَا مِنَ الْغَضَبِ الآتِي» (تسالونيكي الأولى ١: ٩-١٠). فنحن نعبد الله الحي. ونرى الغضب آتياً. وننتظر بلهفة منقذنا، يسوع المسيح. وبرعدة، نحب ظهوره.\u003c/p\u003e\n\u003ch3\u003eيَوْمُ الدَّيْنُونَةِ\u003c/h3\u003e\n\u003cp\u003eفي أغلب الأحيان، عندما يشير العهد الجديد إلى \"يوم الدينونة\"، فإنه يقصد فترة زمنية غير محددة سيُتمم فيها الله ويكمل حسابه العادل مع أولئك الذين احتقروا حق مجده وتحولوا عن عروض رحمته. فمصطلح \"يوم\" لا يحصر وقت الدينونة في أربع وعشرين ساعة. ويمكننا أن نرى هذا بوضوح في العبارة المذهلة الواردة في التمجيد الختامي في (بطرس الثانية ٣: ١٨): «لَهُ الْمَجْدُ الآنَ وَإِلَى يَوْمِ الدَّهْرِ». وربما استخدام بطرس هذا التعبير \"يَوْمِ الدَّهْرِ\" لأنه كان قد ذكر قبلها بعشرة أعداد: «يَوْمًا وَاحِدًا عِنْدَ الرَّبِّ كَأَلْفِ سَنَةٍ، وَأَلْفَ سَنَةٍ كَيَوْمٍ وَاحِدٍ» (بطرس الثانية ٣: ٨). وعليه، يبدو هذا الـ \"يوم\" أبدياً، أو متجاوزاً للزمن.\u003c/p\u003e\n\u003cp\u003eولذلك، عندما أتحدث عن \"انقاذنا من الغضب الآتي\"، أو عن خلاصنا في \"يوم الدينونة\"، فإنني أُفسح مجالاً في ذلك الزمان من الغضب وفي ذلك \"اليوم\" من الدينونة لتشمل كافة أفعال الله الكتابية التي تندرج تحت فئة الدينونة الأخيرة، بغض النظر عن الفاصل الزمني الذي قد يقع بينها. فكثيراً ما يتحدث كُتاب الكتاب المقدس عن أحداث مستقبلية منفصلة ومتعددة كحزمة واحدة، دون تحديد الفترات الزمنية الفاصلة بينها — وكأننا ننظر إلى عدة سلاسل جبلية من بعيد فتبدو لنا سلسلة واحدة غير متمايزة.\u003ca href=\"#ch8-fn-1\"\u003e[١]\u003c/a\u003e ولست أسعى هنا إلى التمييز بين كافة أعمال الدينونة المختلفة تلك، لأن العهد الجديد غالباً ما يتحدث بصورة عامة عن الدينونة الآتية بدلاً من التوقف لتمييز جوانب الدينونة التي قد يفصل بينها بعض الوقت.\u003c/p\u003e\n\u003cp\u003eتأمل، على سبيل المثال، الأحداث المتنوعة المرتبطة في العهد الجديد بيوم الدينونة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَمَنْ لاَ يَقْبَلُكُمْ وَلاَ يَسْمَعُ كَلاَمَكُمْ فَاخْرُجُوا خَارِجًا مِنْ ذلِكَ الْبَيْتِ أَوْ مِنْ تِلْكَ الْمَدِينَةِ، وَانْفُضُوا غُبَارَ أَرْجُلِكُمْ. اَلْحَقَّ أَقُولُ لَكُمْ: سَتَكُونُ لأَرْضِ سَدُومَ وَعَمُورَةَ يَوْمَ الدِّينِ حَالَةٌ أَكْثَرُ احْتِمَالاً مِمَّا لِتِلْكَ الْمَدِينَةِ». (متى ١٠: ١٤-١٥)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَيْلٌ لَكِ يَا كُورَزِينُ! وَيْلٌ لَكِ يَا بَيْتَ صَيْدَا! لأَنَّهُ لَوْ صُنِعَتْ فِي صُورَ وَصَيْدَاءَ الْقُوَّاتُ الْمَصْنُوعَةُ فِيكُمَا، لَتَابَتَا قَدِيمًا فِي الْمُسُوحِ وَالرَّمَادِ. وَلكِنْ أَقُولُ لَكُمْ: إِنَّ صُورَ وَصَيْدَاءَ تَكُونُ لَهُمَا حَالَةٌ أَكْثَرُ احْتِمَالاً يَوْمَ الدِّينِ مِمَّا لَكُمَا». (متى ١١: ٢١-٢٢)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَبَيْنَمَا كَانَ يَتَكَلَّمُ عَنِ الْبِرِّ وَالتَّعَفُّفِ وَالدَّيْنُونَةِ الْعَتِيدَةِ أَنْ تَكُونَ، ارْتَعَبَ فِيلِكْسُ، وَأَجَابَ: «أَمَّا الآنَ فَاذْهَبْ، وَمَتَى حَصَلْتُ عَلَى وَقْتٍ أَسْتَدْعِيكَ». (أعمال الرسل ٢٤: ٢٥)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَمْ تَسْتَهِينُ بِغِنَى لُطْفِهِ وَإِمْهَالِهِ وَطُولِ أَنَاتِهِ، غَيْرَ عَالِمٍ أَنَّ لُطْفَ اللهِ إِنَّمَا يَقْتَادُكَ إِلَى التَّوْبَةِ؟ وَلكِنَّكَ مِنْ أَجْلِ قَسَاوَتِكَ وَقَلْبِكَ غَيْرِ التَّائِبِ، تَذْخَرُ لِنَفْسِكَ غَضَبًا فِي يَوْمِ الْغَضَبِ وَاسْتِعْلاَنِ دَيْنُونَةِ اللهِ الْعَادِلَةِ». (رومية ٢: ٤-٥)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«يَعْلَمُ الرَّبُّ أَنْ يُنْقِذَ الأَتْقِيَاءَ مِنَ التَّجْرِبَةِ وَيَحْفَظَ الأَثَمَةَ إِلَى يَوْمِ الدَّيْنُونَةِ مُعَاقَبِينَ». (بطرس الثانية ٢: ٩)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَأَمَّا السَّمَاوَاتُ وَالأَرْضُ الْكَائِنَةُ الآنَ، فَهِيَ مَخْزُونَةٌ بِتِلْكَ الْكَلِمَةِ عَيْنِهَا، مَحْفُوظَةً لِلنَّارِ إِلَى يَوْمِ الدَّيْنُونَةِ وَهَلاَكِ النَّاسِ الْفُجَّارِ». (بطرس الثانية ٣: ١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«بِهذَا تَكَمَّلَتِ الْمَحَبَّةُ فِينَا: أَنْ يَكُونَ لَنَا ثِقَةٌ فِي يَوْمِ الدِّينِ، لأَنَّهُ كَمَا هُوَ فِي هذَا الْعَالَمِ، هكَذَا نَحْنُ أَيْضًا». (يوحنا الأولى ٤: ١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَهُمْ يَقُولُونَ لِلْجِبَالِ وَالصُّخُورِ: «اسْقُطِي عَلَيْنَا وَأَخْفِينَا عَنْ وَجْهِ الْجَالِسِ عَلَى الْعَرْشِ وَعَنْ غَضَبِ الْخَرُوفِ، لأَنَّهُ قَدْ جَاءَ يَوْمُ غَضَبِهِ الْعَظِيمُ. وَمَنْ يَسْتَطِيعُ الْوُقُوفَ؟»». (رؤيا ٦: ١٦-١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003eسَيُنْقِذُنَا مِنَ الْغَضَبِ الآتِي\u003c/h3\u003e\n\u003cp\u003eفي مقابل هذه الخلفية من الدينونة الآتية، يُرسم المجيء الثاني للمسيح كعملية إنقاذ لشعبه. فهو آتٍ ليخلصنا من غضب الله. فنحن: «تَنْتَظِر[وا] ابْنَهُ مِنَ السَّمَاءِ، الَّذِي أَقَامَهُ مِنَ الأَمْوَاتِ، يَسُوعَ، الَّذِي يُنْقِذُنَا مِنَ الْغَضَبِ الآتِي» (تسالونيكي الأولى ١: ١٠). تتنبأ إعلانات يوم الدينونة بخطر يلوح في الأفق. ويصرح بولس بأن هذا الخطر هو غضب إلهي، وأن المسيح آتٍ لينقذنا منه. ويقول بطرس إن شعب الله: «بِقُوَّةِ اللهِ مَحْرُوسُونَ، بِإِيمَانٍ، لِخَلاَصٍ مُسْتَعَدٍّ أَنْ يُعْلَنَ فِي الزَّمَانِ الأَخِيرِ» (بطرس الأولى ١: ٥). وتقرر (عبرانيين ٩: ٢٨): «هكَذَا الْمَسِيحُ أَيْضًا، بَعْدَمَا قُدِّمَ مَرَّةً لِكَيْ يَحْمِلَ خَطَايَا كَثِيرِينَ، سَيَظْهَرُ ثَانِيَةً بِلاَ خَطِيَّةٍ لِلْخَلاَصِ لِلَّذِينَ يَنْتَظِرُونَهُ». كما تُصور (رومية ٥: ٩-١٠) موت المسيح ليس فقط كإتمام لتبريرنا في الماضي، بل كضمان لإنقاذنا المستقبلي من غضب الله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَبِالأَوْلَى كَثِيرًا وَنَحْنُ مُتَبَرِّرُونَ الآنَ بِدَمِهِ نَخْلُصُ بِهِ مِنَ الْغَضَبِ! لأَنَّهُ إِنْ كُنَّا وَنَحْنُ أَعْدَاءٌ قَدْ صُولِحْنَا مَعَ اللهِ بِمَوْتِ ابْنِهِ، فَبِالأَوْلَى كَثِيرًا وَنَحْنُ مُصَالَحُونَ نَخْلُصُ بِحَيَاتِهِ!» (رومية ٥: ٩-١٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيوضح بولس جلياً في الإصحاح الخامس من رسالته الأولى إلى تسالونيكي أن خطر غضب الله هذا يحل في \"يوم الرب\" — أي عند ظهور المسيح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«للأَنَّكُمْ أَنْتُمْ تَعْلَمُونَ بِالتَّحْقِيقِ أَنَّ يَوْمَ الرَّبِّ كَلِصٍّ فِي اللَّيْلِ هكَذَا يَجِيءُ. لأَنَّهُ حِينَمَا يَقُولُونَ: «سَلاَمٌ وَأَمَانٌ»، حِينَئِذٍ يُفَاجِئُهُمْ هَلاَكٌ بَغْتَةً، كَالْمَخَاضِ لِلْحُبْلَى، فَلاَ يَنْجُونَ. وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمْ ذلِكَ الْيَوْمُ كَلِصٍّ. جَمِيعُكُمْ أَبْنَاءُ نُورٍ... لأَنَّ اللهَ لَمْ يَجْعَلْنَا لِلْغَضَبِ، بَلْ لاقْتِنَاءِ الْخَلاَصِ بِرَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِي مَاتَ لأَجْلِنَا، حَتَّى إِذَا سَهِرْنَا أَوْ نِمْنَا نَحْيَا جَمِيعًا مَعَهُ». (تسالونيكي الأولى ٥ :٢-٥، ٩، ١٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيوضح العدد التاسع أن \"الهلاك بغتة\" المذكور في العدد الثالث هو غضب إلهي. غير أنه لن يدرك \"أبناء النور\" إدراكاً مُهلكاً (كاللص). «لأَنَّ اللهَ لَمْ يَجْعَلْنَا لِلْغَضَبِ». فنحن ننتظر بلهفة «ابْنَهُ مِنَ السَّمَاءِ،… الَّذِي يُنْقِذُنَا مِنَ الْغَضَبِ الآتِي» (تسالونيكي الأولى ١: ١٠).\u003c/p\u003e\n\u003ch3\u003eيَسُوعُ يُنْقِذُ مِنْ غَضَبِ يَسُوعَ\u003c/h3\u003e\n\u003cp\u003eلكن إن لم نتوخَّ الحذر، فقد نتصور إنقاذنا من الغضب عند المجيء الثاني بطريقة تشوه الحقيقة تشويهاً بالغاً. فمن قبيل التشويه أن نتصور الله وهو يسكب غضبه بينما يقدم ابنه رحمة بحجبنا عن غضب الآب. وسيكون من الخطأ الجسيم أن نضع رحمة الابن في تعارض مع غضب الآب بهذه الطريقة — وكأن الله هو المعاقب العادل والمسيح هو المنقذ الرحيم.\u003c/p\u003e\n\u003cp\u003eفالأمر على النقيض من ذلك تماماً. إذ ليس الأمر وكأن الدينونة الإلهية تبدأ ثم يظهر يسوع ليتدخل. بل إن يسوع نفسه هو من يُطلق عجلة الدينونة وينفذها. يسوع هو الديان. يسوع يجلب الدينونة. والآثار المذهلة لذلك هي أنه عندما يقول بولس: « يَسُوعَ، الَّذِي يُنْقِذُنَا مِنَ الْغَضَبِ الآتِي» (تسالونيكي الأولى ١: ١٠)، فإنه يعني: \"يسوع يُنقذنا من غضب يسوع\". وسيتضح هذا جلياً عندما نتأمل عدة نصوص كتابية.\u003c/p\u003e\n\u003ch3\u003e\"غَضَبُهُمَا\"\u003c/h3\u003e\n\u003cp\u003eفي سفر الرؤيا، لا يتحدث يوحنا عن غضب الله عند مجيء المسيح فحسب، بل يتحدث أيضاً عن غضب الخروف:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَمُلُوكُ الأَرْضِ وَالْعُظَمَاءُ وَالأَغْنِيَاءُ وَالأُمَرَاءُ وَالأَقْوِيَاءُ وَكُلُّ عَبْدٍ وَكُلُّ حُرّ، أَخْفَوْا أَنْفُسَهُمْ فِي الْمَغَايِرِ وَفِي صُخُورِ الْجِبَالِ، وَهُمْ يَقُولُونَ لِلْجِبَالِ وَالصُّخُورِ: «اسْقُطِي عَلَيْنَا وَأَخْفِينَا عَنْ وَجْهِ الْجَالِسِ عَلَى الْعَرْشِ وَعَنْ غَضَبِ الْخَرُوفِ، لأَنَّهُ قَدْ جَاءَ يَوْمُ غَضَبِهِ الْعَظِيمُ. وَمَنْ يَسْتَطِيعُ الْوُقُوفَ؟»». (رؤيا ٦: ١٥-١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلا يوجد أي تلميح إلى أن الله غاضب بينما الخروف ضعيف. ومما لا شك فيه أن هذا الخروف كان قد ذُبح. ولكنه الآن يمتلك «سَبْعَةُ قُرُونٍ» (رؤيا ٥: ٦). فهو ليس بمن يُستهان به. وسيكون مجيئه مرعباً لكل من لم يقبل عمله الأول كخروف في ألمه الكفاري (رؤيا ٥: ٩، ١٠). فالغضب هنا هو \"غضبهما\" (كما في الأصل اليوناني لـ رؤيا ٦: ١٧).\u003c/p\u003e\n\u003ch3\u003eالآبُ قَدْ أَعْطَى كُلَّ الدَّيْنُونَةِ لِلابْنِ\u003c/h3\u003e\n\u003cp\u003eإنه \"غضبهما\" ودينونتهما لأن الابن المتجسد — ابن الإنسان — يتصرف بسلطان الآب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّ الآبَ لاَ يَدِينُ أَحَدًا، بَلْ قَدْ أَعْطَى كُلَّ الدَّيْنُونَةِ لِلابْنِ، لِكَيْ يُكْرِمَ الْجَمِيعُ الابْنَ كَمَا يُكْرِمُونَ الآبَ... لأَنَّهُ كَمَا أَنَّ الآبَ لَهُ حَيَاةٌ فِي ذَاتِهِ، كَذلِكَ أَعْطَى الابْنَ أَيْضًا أَنْ تَكُونَ لَهُ حَيَاةٌ فِي ذَاتِهِ، وَأَعْطَاهُ سُلْطَانًا أَنْ يَدِينَ أَيْضًا، لأَنَّهُ ابْنُ الإِنْسَانِ». (يوحنا ٥: ٢٢، ٢٣، ٢٦، ٢٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eمن اللائق جداً أن يكون يسوع ديان العالم. فهو من جاء إلى العالم، وأحب العالم، وبذل نفسه لأجل خلاص العالم. وثمة لياقة خاصة في أن الذي أدانه العالم، وأعدمه العالم، هو من سيدين العالم.\u003c/p\u003e\n\u003ch3\u003eالْعَالَمُ سَيُدَانُ بِوَاسِطَةِ إِنْسَانٍ\u003c/h3\u003e\n\u003cp\u003eيبدو أن بولس كان يضع هذا الأمر اللائق عينه نصب عينيه عندما قال إن إنساناً قد عُين دياناً للعالم من خلال إقامته من الأموات:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاللهُ الآنَ يَأْمُرُ جَمِيعَ النَّاسِ فِي كُلِّ مَكَانٍ أَنْ يَتُوبُوا، مُتَغَاضِيًا عَنْ أَزْمِنَةِ الْجَهْلِ. لأَنَّهُ أَقَامَ يَوْمًا هُوَ فِيهِ مُزْمِعٌ أَنْ يَدِينَ الْمَسْكُونَةَ بِالْعَدْلِ، بِرَجُل قَدْ عَيَّنَهُ، مُقَدِّمًا لِلْجَمِيعِ إِيمَانًا إِذْ أَقَامَهُ مِنَ الأَمْوَاتِ». (أعمال الرسل ١٧: ٣٠، ٣١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eويقول بطرس الأمر ذاته في كرازته لبيت كرنيليوس: «أَوْصَانَا أَنْ نَكْرِزَ لِلشَّعْبِ، وَنَشْهَدَ بِأَنَّ هذَا هُوَ الْمُعَيَّنُ مِنَ اللهِ دَيَّانًا لِلأَحْيَاءِ وَالأَمْوَاتِ» (أعمال الرسل ١٠: ٤٢). ويردد بولس اليقين ذاته في (تيموثاوس الثانية ٤: ١، ٢): «أَنَا أُنَاشِدُكَ إِذًا أَمَامَ اللهِ وَالرَّبِّ يَسُوعَ الْمَسِيحِ، الْعَتِيدِ أَنْ يَدِينَ الأَحْيَاءَ وَالأَمْوَاتَ، عِنْدَ ظُهُورِهِ وَمَلَكُوتِهِ: اكْرِزْ بِالْكَلِمَةِ…». وقد رأى يعقوب أيضاً المسيح الآتي في صورة الديان الآتي: «فَتَأَنَّوْا أَنْتُمْ وَثَبِّتُوا قُلُوبَكُمْ، لأَنَّ مَجِيءَ الرَّبِّ قَدِ اقْتَرَبَ... هُوَذَا الدَّيَّانُ وَاقِفٌ قُدَّامَ الْبَابِ» (يعقوب ٥ :٨، ٩).\u003c/p\u003e\n\u003ch3\u003eيَسُوعُ، السَّيِّدُ، سَيُقَطِّعُهُ\u003c/h3\u003e\n\u003cp\u003eولعل أشد الصور إثارة للدهشة لمجيء المسيح في الغضب كديان هي تلك الصور التي رسمها يسوع في أمثاله. فهو، على سبيل المثال، يُصور نفسه كـ \"سيد\" أقام عبده على أهل بيته. ثم يُصور مجيء السيد بعد غياب دام لفترة من الزمن:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلكِنْ إِنْ قَالَ ذلِكَ الْعَبْدُ الرَّدِيُّ فِي قَلْبِهِ: سَيِّدِي يُبْطِئُ قُدُومَهُ. فَيَبْتَدِئُ يَضْرِبُ الْعَبِيدَ رُفَقَاءَهُ وَيَأْكُلُ وَيَشْرَبُ مَعَ السُّكَارَى. يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ فِي يَوْمٍ لاَ يَنْتَظِرُهُ وَفِي سَاعَةٍ لاَ يَعْرِفُهَا، فَيُقَطِّعُهُ وَيَجْعَلُ نَصِيبَهُ مَعَ الْمُرَائِينَ. هُنَاكَ يَكُونُ الْبُكَاءُ وَصَرِيرُ الأَسْنَانِ». (متى ٢٤: ٤٨-٥١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإنه مجرد مثل. غير أن التصوير التمثيلي ليسوع وهو يُقطّع العبد غير الأمين هو تصوير مفزع للدينونة. ويسوع نفسه هو الديان.\u003c/p\u003e\n\u003ch3\u003eيَسُوعُ يَأْمُرُ بِالذَّبْحِ\u003c/h3\u003e\n\u003cp\u003eوبالمثل، في مثل الأمناء العشرة، يُصور يسوع نفسه كرجل شريف النَّسَب عائد من كورة بعيدة بعدما أخذ لنفسه ملكاً (لوقا ١٩: ١٢-١٥). وقبل رحيله، كان وفد من \"أهل مدينته\" قد قالوا: «لاَ نُرِيدُ أَنَّ هذَا يَمْلِكُ عَلَيْنَا» (لوقا ١٩: ١٤). وعند عودته ومحاسبته لجميع وكلائه، يلتفت إلى هذا الوفد المتمرد ويقول: «أَمَّا أَعْدَائِي، أُولئِكَ الَّذِينَ لَمْ يُرِيدُوا أَنْ أَمْلِكَ عَلَيْهِمْ، فَأْتُوا بِهِمْ إِلَى هُنَا وَاذْبَحُوهُمْ قُدَّامِي.» (لوقا ١٩: ٢٧). هذا هو غضب الخروف.\u003c/p\u003e\n\u003ch3\u003eيَسُوعُ يُرْسِلُ مَلاَئِكَةَ الْهَلاَكِ\u003c/h3\u003e\n\u003cp\u003eإليكم مثلاً آخر يُظهر يسوع دياناً. فمَثَل الزوان يُصور إنساناً يزرع زرعاً جيداً في حقله، غير أن عدواً جاء ليلاً وزرع زواناً. فينبت القمح والزوان معاً. فيقول رب الحصاد: «دَعُوهُمَا يَنْمِيَانِ كِلاَهُمَا مَعًا إِلَى الْحَصَادِ، وَفِي وَقْتِ الْحَصَادِ أَقُولُ لِلْحَصَّادِينَ: اجْمَعُوا أَوَّلاً الزَّوَانَ وَاحْزِمُوهُ حُزَمًا لِيُحْرَقَ، وَأَمَّا الْحِنْطَةَ فَاجْمَعُوهَا إِلَى مَخْزَني.» (متى ١٣: ٣٠).\u003c/p\u003e\n\u003cp\u003eثم يقدم يسوع التفسير (متى ١٣: ٣٦-٤٣). فالزرع الجيد قد زرعه ابن الإنسان. أما الزرع الرديء فزرعه إبليس. ويصف يسوع الحصاد على النحو التالي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«يُرْسِلُ ابْنُ الإِنْسَانِ مَلاَئِكَتَهُ فَيَجْمَعُونَ مِنْ مَلَكُوتِهِ جَمِيعَ الْمَعَاثِرِ وَفَاعِلِي الإِثْمِ، وَيَطْرَحُونَهُمْ فِي أَتُونِ النَّارِ. هُنَاكَ يَكُونُ الْبُكَاءُ وَصَرِيرُ الأَسْنَانِ. حِينَئِذٍ يُضِيءُ الأَبْرَارُ كَالشَّمْسِ فِي مَلَكُوتِ أَبِيهِمْ. مَنْ لَهُ أُذُنَانِ لِلسَّمْعِ، فَلْيَسْمَعْ». (متى ١٣: ٤١-٤٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيُرسل ابن الإنسان الملائكة في دينونة وغضب. ولكنه يُخرج الأبرار ليضيئوا كالشمس.\u003c/p\u003e\n\u003ch3\u003eحَيْرَةُ الْمَجِيءِ فِي الرَّحْمَةِ وَالْمَجِيءِ فِي الْغَضَبِ\u003c/h3\u003e\n\u003cp\u003eلم تُفاجئ أي من هذه الصور التمثيلية التلاميذ. فهذا هو ما كان يُتوقع من المسيا أن يفعله بأعداء إسرائيل. ويعبر يوحنا المعمدان عن التوقع اليهودي الشائع الذي شاركه فيه جميع التلاميذ في بادئ الأمر:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَجَابَ يُوحَنَّا الْجَمِيعَ قِائِلاً: «أَنَا أُعَمِّدُكُمْ بِمَاءٍ، وَلكِنْ يَأْتِي مَنْ هُوَ أَقْوَى مِنِّي، الَّذِي لَسْتُ أَهْلاً أَنْ أَحُلَّ سُيُورَ حِذَائِهِ. هُوَ سَيُعَمِّدُكُمْ بِالرُّوحِ الْقُدُسِ وَنَارٍ. الَّذِي رَفْشُهُ فِي يَدِهِ، وَسَيُنَقِّي بَيْدَرَهُ، وَيَجْمَعُ الْقَمْحَ إِلَى مَخْزَنِهِ، وَأَمَّا التِّبْنُ فَيُحْرِقُهُ بِنَارٍ لاَ تُطْفَأُ»». (لوقا ٣: ١٦، ١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن هذه الصورة لخلاص المسيا (يَجْمَعُ إِلَى مَخْزَنِهِ) ودينونته (فَيُحْرِقُهُ بِنَارٍ) لم تكن مختلفة عما وصفه يسوع. غير أن ما كان مفاجئاً، وعصياً على الفهم في البداية بالنسبة ليوحنا وللتلاميذ، هو أن هذا الغضب والدينونة من قبل المسيا لن يحدثا هنا والآن. فوجود فجوة زمنية شاسعة بين المجيء الأول والثاني لم يكن ضمن توقعاتهم، وظل أمراً يصعب استيعابه عملياً إلى أن بدأت تتضح إشارات يسوع المهمة التي أعطاها لهم.\u003c/p\u003e\n\u003cp\u003eوأية إشارات هي؟ يُصور يسوع العبد الرديء وهو يبرر إساءته لرفقائه العبيد قائلاً: «سَيِّدِي يُبْطِئُ قُدُومَهُ» (متى ٢٤: ٤٨). وفي مثل العذارى العشر، يقول يسوع: «وَفِيمَا أَبْطَأَ الْعَرِيسُ» (متى ٢٥: ٥). وفي مثل الوزنات، يقول يسوع: «وَبَعْدَ زَمَانٍ طَوِيل أَتَى سَيِّدُ أُولئِكَ الْعَبِيدِ وَحَاسَبَهُمْ» (متى ٢٥: ١٩). وفي مثل الأمناء العشرة، يقول يسوع إن الرجل الشريف النَّسَب «ذَهَبَ إِلَى كُورَةٍ بَعِيدَةٍ لِيَأْخُذَ لِنَفْسِهِ مُلْكًا وَيَرْجعَ» (لوقا ١٩: ١٢). وهو يقول هذا: «لأَنَّهُمْ كَانُوا يَظُنُّونَ أَنَّ مَلَكُوتَ اللهِ عَتِيدٌ أَنْ يَظْهَرَ فِي الْحَالِ» (لوقا ١٩: ١١). وعندما يصف بعض الأحداث التي تسبق مجيئه الثاني، يقول: «وَسَوْفَ تَسْمَعُونَ بِحُرُوبٍ وَأَخْبَارِ حُرُوبٍ. اُنْظُرُوا، لاَ تَرْتَاعُوا. لأَنَّهُ لاَ بُدَّ أَنْ تَكُونَ هذِهِ كُلُّهَا، وَلكِنْ لَيْسَ الْمُنْتَهَى بَعْدُ.» (متى ٢٤: ٦).\u003c/p\u003e\n\u003ch3\u003eفَكُّ أَلْغَاز الْمَنْظُورِ النَّبَوِيِّ لِمَجِيءِ يَسُوعَ\u003c/h3\u003e\n\u003cp\u003eلقد قدم يسوع إشارات مهمة مفادها أن ما توقعه يوحنا المعمدان والتلاميذ من حدوثه في مجيء واحد للمسيا، سيحدث في الواقع على مجيئين. وأن المجيء الثاني سيتأخر لأجل غير مسمى بحيث لا يعلم أحد اليوم أو الساعة إلا الله الآب (متى ٢٤: ٣٦). كان يسوع يفك لهم ألغاز \"المنظور النبوي\"، إلى حد ما، الذي أشرت إليه سابقاً، والذي يتحدث عن أحداث مستقبلية منفصلة ومتعددة كحزمة واحدة، دون تحديد الفترات الزمنية الفاصلة بينها — وكأننا ننظر إلى عدة سلاسل جبلية من بعيد فتبدو لنا سلسلة واحدة غير متمايزة.\u003ca href=\"#ch8-fn-2\"\u003e[٢]\u003c/a\u003e\u003c/p\u003e\n\u003ch3\u003eيَسُوعُ، الدَّيَّانُ وَالْمُنْقِذُ مِنَ الدَّيْنُونَةِ\u003c/h3\u003e\n\u003cp\u003eما رأيناه هو أن \"يوم الدينونة\"، أو \"يوم الغضب\"، سيكون هو يوم دينونة يسوع وغضب يسوع، متصرفاً بتعيين من الله الآب. لذلك، عندما يقول بولس إن يسوع هو «الَّذِي يُنْقِذُنَا مِنَ الْغَضَبِ الآتِي» (تسالونيكي الأولى ١: ١٠)، فلا ينبغي لنا أن نتصور الابن وهو ينقذنا من غضب الآب، بل يسوع يُنقذنا من غضبه هو، والذي هو أيضاً غضب الآب. فهو والآب واحد (يوحنا ١٠: ٣٠). والغضب الآتي هو \"غضبهما\" (رؤيا ٦: ١٧). ويسوع، متصرفاً بالنيابة عن الآب، هو المنقذ في مجيئه الثاني.\u003c/p\u003e\n\u003ch3\u003eمَحَبَّةُ ظُهُورِ الرَّبِّ — كَدَيَّانٍ\u003c/h3\u003e\n\u003cp\u003eقد يتساءل أحدهم: \"هل يجب علينا أن نحب ظهور الرب يسوع كمنقذ وكديان معاً؟\" إن الفكرة القائلة بأننا سنُنقذ من الغضب هي فكرة ثمينة. فنحن نعلم أننا نستحق الغضب. فقد «كُنَّا بِالطَّبِيعَةِ أَبْنَاءَ الْغَضَبِ كَالْبَاقِينَ أَيْضًا» (أفسس ٢: ٣). ومن النعمة المذهلة أنه عندما يحل غضب الله، لن نفنى. ولكن عندما نفكر في دينونة الله لـ «الَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَ... الَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ» (تسالونيكي الثانية ١: ٨)، فبمَ ينبغي لنا أن نشعر؟\u003c/p\u003e\n\u003cp\u003eينبغي لنا أن نصغي لنداء داود في المزمور الحادي والثلاثين وندع قلوبنا تسترشد بكلماته:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَحِبُّوا الرَّبَّ يَا جَمِيعَ أَتْقِيَائِهِ. الرَّبُّ حَافِظُ الأَمَانَةِ، وَمُجَازٍ بِكِثْرَةٍ الْعَامِلَ بِالْكِبْرِيَاءِ». (مزمور ٣١: ٢٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eنحن لا نبتهج بألم المُعاقبين في حد ذاته. بل نبتهج بعدل الله وبر المسيح. نبتهج لأن هذا الكون ليس مكاناً ينتصر فيه الشر، بل سيُقوَّم فيه كل اعوجاج، إما بالدينونة على صليب المسيح أو بالمجازاة العادلة في الجحيم.\u003c/p\u003e\n\u003cp\u003eنحن نتشجع الآن ونفرح بأننا لا نحمل العبء النهائي المتمثل في حاجتنا للانتقام لأنفسنا. ونبتهج بأننا نستطيع إرجاء الثقل المستحيل المتمثل في تسوية جميع الحسابات. فدينونة الله العادلة الآتية تجلب للنفس، حتى في الوقت الحاضر، تحرراً من حمل الضغائن ومن عبء الانتقام السام. وإليكم الطريقة التي يصف بها بولس التأثير المفرح لدينونة الله المستقبلية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لاَ تَنْتَقِمُوا لأَنْفُسِكُمْ أَيُّهَا الأَحِبَّاءُ، بَلْ أَعْطُوا مَكَانًا لِلْغَضَبِ، لأَنَّهُ مَكْتُوبٌ: «لِيَ النَّقْمَةُ أَنَا أُجَازِي يَقُولُ الرَّبُّ. فَإِنْ جَاعَ عَدُوُّكَ فَأَطْعِمْهُ. وَإِنْ عَطِشَ فَاسْقِهِ. لأَنَّكَ إِنْ فَعَلْتَ هذَا تَجْمَعْ جَمْرَ نَارٍ عَلَى رَأْسِهِ». لاَ يَغْلِبَنَّكَ الشَّرُّ بَلِ اغْلِبِ الشَّرَّ بِالْخَيْرِ». (رومية ١٢: ١٩-٢١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلذلك، نعم، ينبغي لنا أن نحب ظهور الرب، حتى عندما نفكر فيه كديان آتٍ. فاليقين المطلق بأنه يعلم كل ما يحتاج أن يُعلم وبأنه لن يحابي الأشرار، يحررنا لنحب أعداءنا ونترك كل القصاص للرب.\u003c/p\u003e\n\u003cp\u003eفكيف سيكون الحال إذن عندما يأتي يسوع في الغضب وفي الإنقاذ من الغضب؟ هذا هو السؤال الذي سنتناوله في الفصل التالي.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch8-ref-1\"\u003e[١]\u003c/a\u003e على سبيل المثال، عندما نطق إشعياء بكلمات المسيا التي اقتبسها يسوع في (لوقا ٤: ١٨-١٩)، لم يُميز بين \"سَنَةٍ مَقْبُولَةٍ لِلرَّبِّ\" وبين \"يَوْمِ انْتِقَامٍ لإِلَهِنَا\". لقد كتب: «رُوحُ السَّيِّدِ الرَّبِّ عَلَيَّ، لأَنَّ الرَّبَّ مَسَحَنِي لأُبَشِّرَ الْمَسَاكِينَ، أَرْسَلَنِي لأَعْصِبَ مُنْكَسِرِي الْقَلْبِ، لأُنَادِيَ لِلْمَسْبِيِّينَ بِالْعِتْقِ، وَلِلْمَأْسُورِينَ بِالإِطْلاَقِ. لأُنَادِيَ بِسَنَةٍ مَقْبُولَةٍ لِلرَّبِّ، وَبِيَوْمِ انْتِقَامٍ لإِلَهِنَا» (إشعياء ٦١: ١-٢). وعندما اقتبس يسوع هذه الكلمات كإتمام لخدمته، توقف قُبيل كلمات: \"وَبِيَوْمِ انْتِقَامٍ لإِلَهِنَا\". كان ذلك \"يوم الانتقام\" جزءاً من مجيء المسيا، غير أنه لم يكن ضمن مجيئه الأول. فما رآه إشعياء كحزمة واحدة من الأحداث انطوى على فجوة دامت قروناً من الزمان. وبالمثل، عندما تنبأ إشعياء بمجيء المسيح، رأى ميلاد الطفل وحُكم الملك كلمحة جبلية واحدة: «لأَنَّهُ يُولَدُ لَنَا وَلَدٌ وَنُعْطَى ابْنًا، وَتَكُونُ الرِّيَاسَةُ عَلَى كَتِفِهِ، وَيُدْعَى اسْمُهُ عَجِيبًا، مُشِيرًا، إِلهًا قَدِيرًا، أَبًا أَبَدِيًّا، رَئِيسَ السَّلاَمِ. لِنُمُوِّ رِيَاسَتِهِ، وَلِلسَّلاَمِ لاَ نِهَايَةَ عَلَى كُرْسِيِّ دَاوُدَ وَعَلَى مَمْلَكَتِهِ، لِيُثَبِّتَهَا وَيَعْضُدَهَا بِالْحَقِّ وَالْعَدْلِ، مِنَ الآنَ إِلَى الأَبَدِ. غَيْرَةُ رَبِّ الْجُنُودِ تَصْنَعُ هذَا» (إشعياء ٩: ٦-٧). هذا \"المنظور النبوي\"، كما أطلق عليه \"جورج إلدون لاد\"، مُعين على فهم كيف رأى كُتاب العهد الجديد العلاقة بين الأحداث المستقبلية القريبة والبعيدة. جورج إلدون لاد، لاهوت العهد الجديد (غراند رابيدز، ميشيغان: إيردمانز، ١٩٧٤)، ١٩٨. للمزيد حول \"المنظور النبوي\"، انظر الفصل السابع، الهامش ٢.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch8-ref-2\"\u003e[٢]\u003c/a\u003e انظر الفصل الثامن، الهامش ١.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhVTIdVsddJpBOVnr9nvS_-8tSfp0cQSkQ4ovFVhhYtJoL8o55he44Pnc4dxrm9yccIvul5wvEqHrq0yn__FnbZ3XLneWYmGT8d5Kw60aOJH9Z2CRLnSDIxKfXNMkuIXEuU_8fzMU4sHPjEGvQ30vyVjisrPJ5X6IkuTmr5hqzQf0BPhTbIfPgWyS5w0Yw/s2752/%D9%8A%D8%B3%D9%88%D8%B9_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD__%D8%A7%D9%84%D8%AF%D9%8A%D8%A7%D9%86_%D9%88%D8%A7%D9%84%D9%85%D9%86%D9%82%D8%B0.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhVTIdVsddJpBOVnr9nvS_-8tSfp0cQSkQ4ovFVhhYtJoL8o55he44Pnc4dxrm9yccIvul5wvEqHrq0yn__FnbZ3XLneWYmGT8d5Kw60aOJH9Z2CRLnSDIxKfXNMkuIXEuU_8fzMU4sHPjEGvQ30vyVjisrPJ5X6IkuTmr5hqzQf0BPhTbIfPgWyS5w0Yw/s600/%D9%8A%D8%B3%D9%88%D8%B9_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD__%D8%A7%D9%84%D8%AF%D9%8A%D8%A7%D9%86_%D9%88%D8%A7%D9%84%D9%85%D9%86%D9%82%D8%B0.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"1f:Tcccb,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل السابع\u003c/h2\u003e\n\u003cp\u003eسَنُكَمَّلُ عَقْلًا وَقَلْبًا وَجَسَدًا\u003c/p\u003e\n\u003cp\u003eشرحت في الفصلين الثالث والرابع بأن جوهر الأمر في المجيء الثاني سيكون مجد المسيح مُعظماً في تعجب شعبه. «مَتَى جَاءَ لِيَتَمَجَّدَ فِي قِدِّيسِيهِ وَيُتَعَجَّبَ مِنْهُ فِي جَمِيعِ الْمُؤْمِنِينَ» (تسالونيكي الثانية ١: ١٠). وبعبارة أخرى، يُمثل مجد المسيح الحقيقة الموضوعية العظمى لذلك الحدث العظيم، غير أنه بدون استجابة شعب الله المليئة بالدهشة، والعبادة، والمحبة، والتعجب، سيظل قصد الله الأسمى في التاريخ وا
