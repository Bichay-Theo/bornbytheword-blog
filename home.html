 تبرد محبتنا، بل لنثابر في الإيمان (الفصل ٢١). فعلى سبيل المثال، يكتب بطرس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَإِنَّمَا نِهَايَةُ كُلِّ شَيْءٍ قَدِ اقْتَرَبَتْ، فَتَعَقَّلُوا وَاصْحُوا لِلصَّلَوَاتِ. وَلكِنْ قَبْلَ كُلِّ شَيْءٍ، لِتَكُنْ مَحَبَّتُكُمْ بَعْضِكُمْ لِبَعْضٍ شَدِيدَةً، لأَنَّ الْمَحَبَّةَ تَسْتُرُ كَثْرَةً مِنَ الْخَطَايَا.» [بطرس الأولى ٤ : ٧-٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eتُظهر كلمة \"فـ\" (أو لذلك) الارتباط بين المجيء الثاني والصلاة. \"نِهَايَةُ كُلِّ شَيْءٍ قَدِ اقْتَرَبَتْ، [لذلك] صلوا!\" تعقلوا واصحوا (في الروح والجسد) لئلا تتراخوا عن ضرورة الصلاة.\u003c/p\u003e\n\u003cp\u003eولماذا يظن بطرس أن الصلاة بالغة الضرورة كلما اقتربت النهاية؟ هذا هو ما سمع يسوع يقوله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاحْتَرِزُوا لأَنْفُسِكُمْ لِئَلاَّ تَثْقُلَ قُلُوبُكُمْ فِي خُمَارٍ وَسُكْرٍ وَهُمُومِ الْحَيَاةِ، فَيُصَادِفَكُمْ ذلِكَ الْيَوْمُ بَغْتَةً. لأَنَّهُ كَالْفَخِّ يَأْتِي... فَاسْهَرُوا إِذًا وَتَضَرَّعُوا فِي كُلِّ حِينٍ، لِكَيْ تُحْسَبُوا أَهْلاً لِلنَّجَاةِ مِنْ جَمِيعِ هذَا الْمُزْمِعِ أَنْ يَكُونَ، وَتَقِفُوا قُدَّامَ ابْنِ الإِنْسَانِ.» [لوقا ٢١ : ٣٤- ٣٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eستطرح الأيام الأخيرة أمام المسيحيين تحديات لإيماننا لدرجة أننا سنحتاج إلى قوة استثنائية للنجاة من تأثيراتها المدمرة. «وَلكِنِ الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهذَا يَخْلُصُ.» [متى ٢٤ : ١٣].\u003c/p\u003e\n\u003cp\u003eلقد صمم الله كلا الأمرين، حضور الكنيسة في وقت النهاية وصلاة وقت النهاية، ليمد شعبه بالقوة على المثابرة عبر التهديدات الاستثنائية للأيام الأخيرة. «وَلكِنِ اعْلَمْ هذَا أَنَّهُ فِي الأَيَّامِ الأَخِيرَةِ سَتَأْتِي أَزْمِنَةٌ صَعْبَةٌ» [تيموثاوس الثانية ٣ : ١]. يتحد بطرس ويسوع ليقولا لنا: اصحوا لأجل الصلاة لكي تجتازوا هذه الصعوبات.\u003c/p\u003e\n\u003ch3\u003e\"ليأت ملكوتك\"\u003c/h3\u003e\n\u003cp\u003eإحدى الصلوات التي علمنا الرب يسوع أن نصليها هي: «لِيَأْتِ مَلَكُوتُكَ. لِتَكُنْ مَشِيئَتُكَ كَمَا فِي السَّمَاءِ كَذلِكَ عَلَى الأَرْضِ.» [متى ٦ : ١٠]. وتتضمن هذه الطلبة طبقات من المعاني، تماما كما أن هناك طبقات من المعاني في مجيء الملكوت.\u003ca href=\"#ch22-fn-1\"\u003e[١]\u003c/a\u003e يأتي الملكوت بصورة تدريجية مع تأسيس مُلك المسيح الخلاصي في قلوب أعداد متزايدة من الناس ([رومية ٥ : ٢١]؛ [رومية ١٤ : ١٧]؛ [كورنثوس الأولى ٤ : ٢٠]؛ [كولوسي ١ : ١٣]). غير أن الإتمام النهائي لـ \"لِيَأْتِ مَلَكُوتُكَ\" هو تأسيس ملكوت المسيح في السماوات الجديدة والأرض الجديدة ([كورنثوس الأولى ١٥ : ٢٤]؛ [تيموثاوس الثانية ٤ : ١]).\u003c/p\u003e\n\u003cp\u003eولذلك، أستنتج أن صلواتنا من أجل مجيء الملكوت هي صلوات لكي لا يكتفي الله بتأسيس مُلكه في قلوبنا بصورة أكمل فحسب، بل لكي يدفع أيضا بعمل خلاصه في الكرازة والإرساليات العالمية، ولكي يجلب التاريخ إلى ذروته في مجيء يسوع. ومن هنا فإن صلواتنا في وقت النهاية تشمل الصلاة لـ: «...رَبَّ الْحَصَادِ أَنْ يُرْسِلَ فَعَلَةً إِلَى حَصَادِهِ.» [متى - ٩ : ٣٨]، ولكي يطوي سجل التاريخ تماما ويأتي: «...مَارَانْ أَثَا [تعال أيها الرب]!» [كورنثوس الأولى ١٦ : ٢٢]. «...آمِينَ. تَعَالَ أَيُّهَا الرَّبُّ يَسُوعُ.» [رؤيا ٢٢ : ٢٠].\u003c/p\u003e\n\u003ch3\u003eطالبين سرعة مجيء اليوم: أنهِ الإرسالية\u003c/h3\u003e\n\u003cp\u003eسواء كنا نصلي من أجل التقدم التدريجي للكرازة العالمية أو من أجل مجيء الرب يسوع على السحاب، فإننا في الواقع نصلي لكي يتدخل الله ليجلب التاريخ إلى كماله. يقول يسوع في [متى ٢٤ : ١٤]: «وَيُكْرَزُ بِبِشَارَةِ الْمَلَكُوتِ هذِهِ فِي كُلِّ الْمَسْكُونَةِ شَهَادَةً لِجَمِيعِ الأُمَمِ. ثُمَّ يَأْتِي الْمُنْتَهَى.» لقد برهنت في الفصل السابع عشر بأن هذا العدد يعني أن المأمورية العظمى ستُطاع إلى انقضاء هذا الدهر الحاضر، وعندما تكتمل، سيرجع المسيح. ولذلك، تُعلمنا [متى ٢٤ : ١٤] أن كل تقدم للإنجيل هو في آن واحد تشجيع بأن الرب يقترب، وحافز لأن «...طَالِبِينَ سُرْعَةَ...» مجيئه [بطرس الثانية ٣ : ١٢] من خلال تكريس طاقة هائلة للكرازة العالمية.\u003c/p\u003e\n\u003cp\u003eأجد كلمات جورج إلدون لاد هذه مقنعة للغاية وهو يُلح في بيان تداعيات [متى ٢٤ : ١٤] على الكيفية التي ينبغي أن نعيش بها حتى يأتي يسوع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"هنا يكمن الدافع لإرساليتنا: الانتصار النهائي ينتظر اكتمال مهمتنا. «...ثُمَّ يَأْتِي الْمُنْتَهَى.» لا توجد آية أخرى في كلمة الله تقول: «...ثُمَّ يَأْتِي الْمُنْتَهَى.». متى سيرجع المسيح ثانية؟ عندما تنهي الكنيسة مهمتها. متى سينقضي هذا الدهر؟ عندما يُبشر العالم بأسره. «...وَمَا هِيَ عَلاَمَةُ مَجِيئِكَ وَانْقِضَاءِ الدَّهْرِ؟» [متى ٢٤ : ٣]. «… يُكْرَزُ بِبِشَارَةِ الْمَلَكُوتِ هذِهِ فِي كُلِّ الْمَسْكُونَةِ شَهَادَةً لِجَمِيعِ الأُمَمِ. ثُمَّ يَأْتِي الْمُنْتَهَى.» متى؟ حينئذ؛ عندما تُتم الكنيسة إرساليتها المعينة إلهيا.\"\u003ca href=\"#ch22-fn-2\"\u003e[٢]\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eولكن ماذا عن غموض اكتمال مهمة الإرساليات العالمية؟ نعم، نحن نعلم أن مشيئة الله هي أن المسيح قد اشترى: «...للهِ بِدَمِكَ مِنْ كُلِّ قَبِيلَةٍ وَلِسَانٍ وَشَعْبٍ وَأُمَّةٍ» [رؤيا ٥ : ٩]. ولكن ما هي هذه المجموعات العرقية المتنوعة؟ يجيب لاد بأن هذا الغموض ليس عائقا أمام ضرورة المهمة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"سيقول قائل: \"كيف لنا أن نعرف متى تكتمل الإرسالية؟ ما مدى قربنا من إنجاز المهمة؟ ... ما مدى قربنا من النهاية؟ ألا يؤدي هذا إلى تحديد مواعيد؟\" أُجيب: لا أعلم. الله وحده يعلم تعريف المصطلحات. لا أستطيع أن أُعرّف بدقة من هم \"جميع الأمم\". الله وحده يعلم المعنى الدقيق لـ \"يُبشر\". وهو وحده، الذي أخبرنا بأن بشارة الملكوت هذه ستُكرز في كل المسكونة شهادة لجميع الأمم، سيعلم متى يتحقق هذا الهدف. ولكنني لا أحتاج لأن أعلم. أنا أعلم أمرا واحدا فقط: لم يرجع المسيح بعد؛ ولذلك فإن المهمة لم تُنجز بعد. وعندما تُنجز، سيأتي المسيح. مسؤوليتنا ليست الإصرار على تحديد مصطلحات مهمتنا؛ بل مسؤوليتنا هي إكمالها. وطالما أن المسيح لا يرجع، فعملنا لم يُنجز. فلننهمك بالعمل ونكمل إرساليتنا.\"\u003ca href=\"#ch22-fn-3\"\u003e[٣]\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن كنا نحب ظهور الرب، فسنحب تقدم إرساليته نحو الاكتمال. وسنتشجع بوعده بأن الإنجيل سُيكرز به لجميع الأمم، أي جميع المجموعات العرقية («...قَبِيلَةٍ وَلِسَانٍ وَشَعْبٍ وَأُمَّةٍ...»)، وسنعتنق وصيته بأن: «...تَلْمِذُوا جَمِيعَ الأُمَمِ...» [متى ٢٨ : ١٩]. وسنسعى لمشاركة ضرورة ووضوح تحريض لاد: \"وطالما أن المسيح لا يرجع، فعملنا لم يُنجز. فلننهمك بالعمل ونكمل إرساليتنا.\"\u003c/p\u003e\n\u003ch3\u003eتعال، يا رب يسوع، تعال: ترنيمة للمسيح\u003c/h3\u003e\n\u003cblockquote\u003e\n\u003cp\u003eأَيُّهَا الْمَسِيحُ الْعَظِيمُ الْمَصْلُوبُ وَالْمُقَامُ، يَا مَنْ صَعِدْتَ، وَتَمْلِكُ، يَا رَبَّ الْجَمِيعِ، أَيُّهَا الْخَرُوفُ ذُو السِّيَادَةِ، يَا مَنْ ذُبِحْتَ مَرَّةً، أَمَامَكَ تَخِرُّ مَلاَئِكَةٌ لاَ تُحْصَى، ارْحَمْ، يَا مُخَلِّصُ، عُيُونَنَا، الْمَائِلَةَ جِدًّا لاِعْتِبَارِ الْعَالَمِ غَنِيمَةً، وَهَبْ أَنْ يَكُونَ ظُهُورُكَ، الْقَرِيبُ، مُحْيِيًا لِلْمَحَبَّةِ، وَمُوقِظًا لِلصَّرْخَةِ: تَعَالَ، يَا رَبُّ يَسُوعُ، تَعَالَ!\u003c/p\u003e\n\u003cp\u003eمُتَأَلِّقًا حِينَئِذٍ بِعَشَرَةِ آلاَفِ ضِعْفٍ فَوْقَ أَعْظَمِ مَشْهَدٍ عَلَى الأَرْضِ، هَبْنَا أَنْ نُعَايِنَ مَجْدَكَ وَأَنْ نَشْعُرَ بِجَمَالِهِ، وَعَظَمَتِهِ، وَقِيمَتِهِ، مَعَ جُيُوشِ الْمَلاَئِكَةِ الْمُشِعَّةِ فِي الْقُوَّةِ، تُرَافِقُ نُزُولَكَ، لِكَيْ نَرَى نَحْنُ، قَبْلَ ذلِكَ الْهُتَافِ الأَخِيرِ، وَنَصْرُخَ مِنَ الْقَلْبِ: تَعَالَ، يَا رَبُّ يَسُوعُ، تَعَالَ!\u003c/p\u003e\n\u003cp\u003eلاَ تَدَعْ عَبِيدَكَ يَرْتَدُّونَ خَوْفًا مِنْ ذلِكَ الْيَوْمِ الْعَظِيمِ ذِي نَارِ اللَّهِيبِ، حِينَ يَنَالُ أُولئِكَ الَّذِينَ اخْتَارُوا أَلاَّ يَهَابُوا اسْمَكَ مَا كَانُوا يَشْتَهُونَ، غَيْرَ أَنَّهُمْ لَمْ يَحْلُمُوا قَطُّ بِأَنَّهُ سَيَكُونُ مَكَانًا مُرَوِّعًا إِلَى هذَا الْحَدِّ، مَنْفِيِّينَ مِنْ أَمَامِ وَجْهِكَ. هَبْنَا، يَا مَسِيحُ، نَحْنُ الْمُعْتَقِينَ مِنَ الدَّيْنُونَةِ، أَنْ نَتَضَرَّعَ أَبَدًا بِلاَ خَوْفٍ: تَعَالَ، يَا رَبُّ يَسُوعُ، تَعَالَ!\u003c/p\u003e\n\u003cp\u003eأَسْرِعْ بِالْيَوْمِ الَّذِي سَنَسْمَعُكَ فِيهِ تَقُولُ: \"نِعِمَّا، يَا طِفْلِيَ الْعَزِيزُ\"، رَغْمَ أَنَّنَا مُنْحَنُونَ وَبِنَا عُيُوبٌ — ذلِكَ الْيَوْمُ، الصَّارِمُ، حِينَ يَحْتَرِقُ كُلُّ الْقَشِّ، نَرَى فِيهِ ابْتِسَامَتَكَ، الْوَجْهَ الْمُغَيِّرَ لِكُلِّ شَيْءٍ، ثُمَّ النِّعْمَةَ الأَبَدِيَّةَ: اللَّحْظَةَ الَّتِي فِيهَا نَحْنُ الْبَشَرَ السَّاقِطِينَ لَنْ نَسْقُطَ أَوْ نُخْطِئَ بَعْدُ أَبَدًا. تَعَالَ، يَا رَبُّ يَسُوعُ، تَعَالَ!\u003c/p\u003e\n\u003cp\u003eلِيُدَوِّ، يَا اَللهُ، بُوقُكَ سَرِيعًا. أَطْلِقْ، يَا مَسِيحُ، أَمْرَكَ الأَخِيرَ. تَكَلَّمْ، يَا رَئِيسَ الْمَلاَئِكَةِ، وَقُلْ لِلْقَمَرِ وَالشَّمْسِ أَنْ يَحْجِبَا وَجْهَيْهِمَا، وَلِلْبَرِّ وَالْبَحْرِ أَنْ يُسَلِّمَا لِلْمَسِيحِ عَرُوسَهُ، الْكَنِيسَةَ الْمُنْتَصِرَةَ الْمُقَامَةَ لِلْحَيَاةِ، نَعَمْ، فِي لَحْظَةٍ فِي طَرْفَةِ عَيْنٍ بِأَجْسَادٍ لَنْ تَمُوتَ أَبَدًا. تَعَالَ، يَا رَبُّ يَسُوعُ، تَعَالَ!\u003c/p\u003e\n\u003cp\u003eنَحْنُ نَجْرُؤُ، يَا مَسِيحُ، أَنْ نَرْجُوَ، مَعَ أَنَّنَا بِالْكَادِ نَسْتَطِيعُ إِدْرَاكَ ذلِكَ، أَنَّهَا تِلْكَ الَّتِي مُتَّ لأَجْلِهَا، سَتَتَبَوَّأُ بِشُكْرٍ مَقْعَدَهَا الاِسْتِثْنَائِيَّ، وَتَكُونُ حَبِيبَةَ وَلِيمَتِكَ الأَثِيرَةَ، بَيْنَمَا تَكْتَسِي أَنْتَ بِجَلاَلِكَ، وَإِذْ تَحْتَفِظُ بِالسِّيَادَةِ الْكَامِلَةِ عَلَى الْكُلِّ، تَصِيرُ أَنْتَ خَادِمَنَا فِي ذلِكَ الْيَوْمِ. تَعَالَ، يَا رَبُّ يَسُوعُ، تَعَالَ!\u003c/p\u003e\n\u003cp\u003eمَعَ أَنَّنَا الآنَ، يَا مَسِيحُ، كَمَا فِي مِرْآةٍ، نَرَى بِلُغْزٍ، إِلاَّ أَنَّ رُؤْيَتَكَ وَجْهًا لِوَجْهٍ هِيَ شَهْوَتُنَا. وَنَعَمْ، وَحَسْرَتَاهُ، إِنَّ مَحَبَّتَنَا ضَعِيفَةٌ، لكِنَّنَا نَحْتَضِنُ الرَّجَاءَ الْمُبَارَكَ بِأَنَّنَا سَنُشِعُّ بِبَهَاءٍ مِنْكَ كُلُّهُ إِلهِيٌّ، لأَنَّنَا سَنَكُونُ فِي ذلِكَ الْيَوْمِ الْعَظِيمِ مُكْتَفِينَ لِلْغَايَةِ، وَلَنْ نَقُولَ بَعْدُ، تَعَالَ، يَا رَبُّ يَسُوعُ، تَعَالَ.\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch22-ref-1\"\u003e[١]\u003c/a\u003e انظر مقدمة الجزء الثالث، \"الحياة بين ظهوري المسيح\"، لمناقشة المعاني المتنوعة التي يأتي بها ملكوت الله.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch22-ref-2\"\u003e[٢]\u003c/a\u003e جورج إلدون لاد، إنجيل الملكوت: دراسات كتابية في ملكوت الله (غراند رابيدز، ميشيغان: إيردمانز، ١٩٩٠)، مواقع ٢٠٨٤-٨٨، كيندل.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch22-ref-3\"\u003e[٣]\u003c/a\u003e لاد، إنجيل الملكوت، مواقع ٢٠٣٤-٤٩، كيندل.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh3JkOCd1bOUqGNIsClH5XfWTQIHLN1vn9z3CHZPFdP83_wLBNrwv9NlJQ9G8PxeZNQUY56CkGRtx0ThV4ntUH6jQYr5s-JptSJJYZImufHTjs5AXWyUfZKOoYP_lPPavfmSiH7Ygy-JzvSt5IdtkfVtgpFUX6muzwyCjwUIPomUWAkoGWqepsFWKgmzaI/s2752/%D8%B5%D9%84%D8%A7%D8%A9_%D9%88%D9%82%D8%AA_%D8%A7%D9%84%D9%86%D9%87%D8%A7%D9%8A%D8%A9_%D9%88%D8%A7%D9%84%D8%A5%D8%B1%D8%B3%D8%A7%D9%84%D9%8A%D8%A9_%D8%A7%D9%84%D8%B9%D8%A7%D9%84%D9%85%D9%8A%D8%A9.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh3JkOCd1bOUqGNIsClH5XfWTQIHLN1vn9z3CHZPFdP83_wLBNrwv9NlJQ9G8PxeZNQUY56CkGRtx0ThV4ntUH6jQYr5s-JptSJJYZImufHTjs5AXWyUfZKOoYP_lPPavfmSiH7Ygy-JzvSt5IdtkfVtgpFUX6muzwyCjwUIPomUWAkoGWqepsFWKgmzaI/s600/%D8%B5%D9%84%D8%A7%D8%A9_%D9%88%D9%82%D8%AA_%D8%A7%D9%84%D9%86%D9%87%D8%A7%D9%8A%D8%A9_%D9%88%D8%A7%D9%84%D8%A5%D8%B1%D8%B3%D8%A7%D9%84%D9%8A%D8%A9_%D8%A7%D9%84%D8%B9%D8%A7%D9%84%D9%85%D9%8A%D8%A9.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"11:T6490,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الحادي والعشرين\u003c/h2\u003e\n\u003cp\u003eاذهب إلى العمل، اذهب إلى الكنيسة\u003c/p\u003e\n\u003cp\u003eإن كانت الدعوة للوداعة في الأيام الأخيرة (الفصل العشرون) تبدو مألوفة بصورة غريبة، فقد يبدو هذا الفصل أكثر من ذلك. فنحن نتفهم اليقظة عندما يوشك العالم كما نعرفه على الانتهاء. ولكن الوداعة؟ تبدو وكأنها فضيلة لزمن أقل تقلبا. غير أن طريق يسوع ليس كطريقنا. وأفكاره ليست كأفكارنا. فقد تكون الوداعة مناقضة تماما لثقافة ذلك الزمان الخالي من المحبة [متى ٢٤ : ١٢] والعدائي [متى ٢٤ : ١٠] لدرجة أنه لا شيء قد يقدم شهادة أوضح على قوة المسيح منها. وبالمثل، قد يبدو الذهاب إلى العمل والذهاب إلى الكنيسة أمرا روتينيا جدا في مواجهة الاضطرابات الثقافية، بحيث يشهدان هما أيضا على محبة عميقة، وواثقة، ومسالمة لظهور الرب.\u003c/p\u003e\n\u003cp\u003eولذلك، يُعلِّم العهد الجديد بأن إجابة أخرى عن سؤال: كيف ينبغي لنا إذن أن نعيش؟ هي أن أولئك الذين يحبون ظهور الرب يذهبون إلى العمل. فنحن نؤدي عملنا بأمانة واجتهاد، متلهفين لأن نُوجد أمناء في دعواتنا المختلفة حين يأتي الرب. ويضع كل من يسوع وبولس تأكيدا جليا على هذا الأمر.\u003c/p\u003e\n\u003ch3\u003eالهستيريا والبطالة في تسالونيكي\u003c/h3\u003e\n\u003cp\u003eيعبر بولس عن نفسه بصراحة تامة بشأن قضية الذهاب إلى العمل هذه بينما ننتظر مجيء الرب، لأن العكس تماما كان يحدث في تسالونيكي. ويتناول بولس هذه المشكلة في رسالة تسالونيكي الثانية. أولا، دعونا نلاحظ فشل البعض في البقاء في وظائفهم المدرة للدخل. إليكم وصف بولس للوضع رده على هذا التقصير:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نُوصِيكُمْ أَيُّهَا الإِخْوَةُ، بِاسْمِ رَبِّنَا يَسُوعَ الْمَسِيحِ، أَنْ تَتَجَنَّبُوا كُلَّ أَخٍ يَسْلُكُ بِلاَ تَرْتِيبٍ، وَلَيْسَ حَسَبَ التَّعْلِيمِ الَّذِي أَخَذَهُ مِنَّا. إِذْ أَنْتُمْ تَعْرِفُونَ كَيْفَ يَجِبُ أَنْ يُتَمَثَّلَ بِنَا، لأَنَّنَا لَمْ نَسْلُكْ بِلاَ تَرْتِيبٍ بَيْنَكُمْ، وَلاَ أَكَلْنَا خُبْزًا مَجَّانًا مِنْ أَحَدٍ، بَلْ كُنَّا نَشْتَغِلُ بِتَعَبٍ وَكَدٍّ لَيْلاً وَنَهَارًا، لِكَيْ لاَ نُثَقِّلَ عَلَى أَحَدٍ مِنْكُمْ. لَيْسَ أَنْ لاَ سُلْطَانَ لَنَا، بَلْ لِكَيْ نُعْطِيَكُمْ أَنْفُسَنَا قُدْوَةً حَتَّى تَتَمَثَّلُوا بِنَا. فَإِنَّنَا أَيْضًا حِينَ كُنَّا عِنْدَكُمْ، أَوْصَيْنَاكُمْ بِهذَا: «أَنَّهُ إِنْ كَانَ أَحَدٌ لاَ يُرِيدُ أَنْ يَشْتَغِلَ فَلاَ يَأْكُلْ أَيْضًا». لأَنَّنَا نَسْمَعُ أَنَّ قَوْمًا يَسْلُكُونَ بَيْنَكُمْ بِلاَ تَرْتِيبٍ، لاَ يَشْتَغِلُونَ شَيْئًا بَلْ هُمْ فُضُولِيُّونَ. فَمِثْلُ هؤُلاَءِ نُوصِيهِمْ وَنَعِظُهُمْ بِرَبِّنَا يَسُوعَ الْمَسِيحِ أَنْ يَشْتَغِلُوا بِهُدُوءٍ، وَيَأْكُلُوا خُبْزَ أَنْفُسِهِمْ. أَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلاَ تَفْشَلُوا فِي عَمَلِ الْخَيْرِ.» [تسالونيكي الثانية ٣ : ٦-١٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبعض المؤمنين كانوا يسلُكون \"بلا ترتيب\" في بطالة [تسالونيكي الثانية ٣ : ٦]، «...لاَ يُرِيدُ أَنْ يَشْتَغِلَ...» [تسالونيكي الثانية ٣ : ١٠]، وأثبتوا أنهم \"متطفلون\" [تسالونيكي الثانية ٣ : ١١]، ويبدو أنهم كانوا يأكلون خبز الآخرين المكتسب بشق الأنفس \"مجانا\" [تسالونيكي الثانية ٣ : ٨]. لماذا كان هذا يحدث؟ يشرح بولس ذلك في [تسالونيكي الثانية ٢]. لقد تملك نوع من الهستيريا ببعض أعضاء الكنيسة لأنهم ظنوا: «...أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ.» [تسالونيكي الثانية ٢ : ٢]. لذا، يبدو أنهم فكروا قائلين: ما الجدوى من الذهاب إلى العمل؟ فالرب قريب إلى هذا الحد.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثُمَّ نَسْأَلُكُمْ أَيُّهَا الإِخْوَةُ مِنْ جِهَةِ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَاجْتِمَاعِنَا إِلَيْهِ، أَنْ لاَ تَتَزَعْزَعُوا سَرِيعًا عَنْ ذِهْنِكُمْ، وَلاَ تَرْتَاعُوا، لاَ بِرُوحٍ وَلاَ بِكَلِمَةٍ وَلاَ بِرِسَالَةٍ كَأَنَّهَا مِنَّا: أَيْ أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ. لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ، ابْنُ الْهَلاَكِ» [تسالونيكي الثانية ٢ : ١-٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأستخدم كلمة الهستيريا لأن بولس يقول إن بعضهم «...تَتَزَعْزَعُوا سَرِيعًا عَنْ ذِهْنِكُمْ...» [تسالونيكي الثانية ٢ : ٢] — وحرفيا، \"تتزلزلوا من عقولكم\" (σαλευθῆναι ὑμᾶς ἀπὸ τοῦ νοὸς - saleuthēnai hymas apo tou noos). كانوا يتصرفون بلا عقلانية، ظانين أن يوم الرب قد حضر بالفعل. ويكشف بولس خطأ تفكيرهم بالإشارة إلى أنه: «...لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ، ابْنُ الْهَلاَكِ،» [تسالونيكي الثانية ٢ : ٣]. بعبارة أخرى، لا يمكن ليوم الرب أن يكون حاضرا لأن الارتداد وإنسان الخطية القابلين للتمييز لم يظهرا بعد.\u003c/p\u003e\n\u003cp\u003eولذلك، أستنتج من تعليم بولس أننا، ونحن ننتظر رجوع الرب يسوع من السماء، ينبغي لنا أن نكون أمناء لدعواتنا الأرضية. ينبغي لنا أن نتجنب هستيريا وقت النهاية و«...لاَ تَفْشَلُوا فِي عَمَلِ الْخَيْرِ.» [تسالونيكي الثانية ٣ : ١٣]. سيكون هناك عمل صالح لنقوم به (مهنيا واجتماعيا وشخصيا) حتى مجيء الرب تماما. لن تنتهي واجباتنا الأرضية المعتادة حتى يظهر الرب. فالقاعدة إذن، حتى يأتي، هي: «وَكُلُّ مَا فَعَلْتُمْ، فَاعْمَلُوا مِنَ الْقَلْبِ، كَمَا لِلرَّبِّ لَيْسَ لِلنَّاسِ،» [كولوسي ٣ : ٢٣].\u003c/p\u003e\n\u003ch3\u003eطوبى لمن وجد في عمله\u003c/h3\u003e\n\u003cp\u003eإن هذا الالتزام الرسولي بأداء عملنا الأرضي بأمانة حتى يأتي يسوع يتأصل في حقيقة أن يسوع قد عَلّم الأمر عينه. ففي أكثر من مناسبة قدم لنا صورا للمجيء الثاني وارتباطه بعملنا. فعلى سبيل المثال، بعد أن أمر تلاميذه قائلا: «وَأَنْتُمْ مِثْلُ أُنَاسٍ يَنْتَظِرُونَ سَيِّدَهُمْ مَتَى يَرْجِعُ مِنَ الْعُرْسِ، حَتَّى إِذَا جَاءَ وَقَرَعَ يَفْتَحُونَ لَهُ لِلْوَقْتِ.» [لوقا ١٢ : ٣٦]، يسأل بطرس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَقَالَ لَهُ بُطْرُسُ: «يَارَبُّ، أَلَنَا تَقُولُ هذَا الْمَثَلَ أَمْ لِلْجَمِيعِ أَيْضًا؟» فَقَالَ الرَّبُّ: «فَمَنْ هُوَ الْوَكِيلُ الأَمِينُ الْحَكِيمُ الَّذِي يُقِيمُهُ سَيِّدُهُ عَلَى خَدَمِهِ لِيُعْطِيَهُمْ الْعُلُوفَةَ فِي حِينِهَا؟ طُوبَى لِذلِكَ الْعَبْدِ الَّذِي إِذَا جَاءَ سَيِّدُهُ يَجِدُهُ يَفْعَلُ هكَذَا! بِالْحَقِّ أَقُولُ لَكُمْ: إِنَّهُ يُقِيمُهُ عَلَى جَمِيعِ أَمْوَالِهِ.»» [لوقا ١٢ : ٤١-٤٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبدلا من الإجابة المباشرة عن سؤال بطرس: «...أَلَنَا تَقُولُ هذَا الْمَثَلَ أَمْ لِلْجَمِيعِ أَيْضًا؟»، يقرر يسوع المبدأ الذي ينطبق على الجميع، بمن فيهم بطرس: لقد أعطى السيد وكلاء أعماله عملا ليقوموا به أثناء غيابه. وهو يتوقع حين يعود أن يجدهم يؤدون بأمانة ما كلفهم بفعله (انظر أيضا [متى ٢٤ : ٤٢-٥١]).\u003c/p\u003e\n\u003cp\u003eإن هذا لتعليم محرر. فهو يعني أننا محررون من الحاجة إلى تركيز انتباهنا على علامات الأزمنة، حتى لو رأيناها تتكشف. من الجيد أن نكون مميزين روحيا لما يحدث مع اقتراب النهاية. غير أن كوننا حادي البصيرة في استشراف وقت النهاية ليس هو السمة الرئيسية التي يتطلبها السيد من وكلائه. فحين يقول السيد لعبده: \"نِعِمَّا\" ([متى ٢٥ : ٢١]، [٢٣])، فليس هذا لأن العبد قد لمح السيد في الأفق. بل لأن العبد كان \"أمينا\" في العمل الذي أُعطي ليقوم به — حتى النهاية تماما.\u003c/p\u003e\n\u003cp\u003eلذلك، وبكل تأكيد، ينبغي لنا أن نبقى مستيقظين وصاحين روحيا حتى النهاية. ولا ينبغي لأي عبد أمين أن ينجرف إلى الخمول والعمى الروحيين، لئلا: «...يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ فِي يَوْمٍ لاَ يَنْتَظِرُهُ وَفِي سَاعَةٍ لاَ يَعْرِفُهَا، فَيَقْطَعُهُ وَيَجْعَلُ نَصِيبَهُ مَعَ الْخَائِنِينَ.» [لوقا ١٢ : ٤٦]. لكن هذا السهر والصحو ليس في المقام الأول لأجل التنبؤ بقرب الرب؛ بل هو لأجل القيام بعمل الرب. فشعارنا هو أن نقول مع يسوع: «يَنْبَغِي أَنْ أَعْمَلَ أَعْمَالَ الَّذِي أَرْسَلَنِي مَا دَامَ نَهَارٌ. يَأْتِي لَيْلٌ حِينَ لاَ يَسْتَطِيعُ أَحَدٌ أَنْ يَعْمَلَ.» [يوحنا ٩ : ٤]. لذا وفيما نستيقظ في الصباح ونتوجه إلى أعمالنا اليومية ، فلتكن هناك محبة لظهور الرب في قلوبنا، وإدراك مفرح بأنه بينما يبطئ، فلدينا عمل لنقوم به.\u003c/p\u003e\n\u003ch3\u003eفيما يقترب اليوم، اذهب إلى الكنيسة\u003c/h3\u003e\n\u003cp\u003eوالأهم من الذهاب إلى العمل في أوقات النهاية هو الذهاب إلى الكنيسة. وبالأكثر على قدر ما نرى اليوم يقترب. يقول كاتب الرسالة إلى العبرانيين إنه كلما اقترب يوم المسيح، ينبغي لنا أن نكون أكثر اجتهادا في الاجتماع معا كشعب للمسيح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلْنُلاَحِظْ بَعْضُنَا بَعْضًا لِلتَّحْرِيضِ عَلَى الْمَحَبَّةِ وَالأَعْمَالِ الْحَسَنَةِ، غَيْرَ تَارِكِينَ اجْتِمَاعَنَا كَمَا لِقَوْمٍ عَادَةٌ، بَلْ وَاعِظِينَ بَعْضُنَا بَعْضًا، وَبِالأَكْثَرِ عَلَى قَدْرِ مَا تَرَوْنَ الْيَوْمَ يَقْرُبُ.» [عبرانيين ١٠ : ٢٤-٢٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e«...وَبِالأَكْثَرِ عَلَى قَدْرِ مَا تَرَوْنَ الْيَوْمَ يَقْرُبُ.» إن اليوم الذي يضعه نصب عينيه هو الحدث عينه المذكور في الإصحاح السابق: «هكَذَا الْمَسِيحُ أَيْضًا، بَعْدَمَا قُدِّمَ مَرَّةً لِكَيْ يَحْمِلَ خَطَايَا كَثِيرِينَ، سَيَظْهَرُ مَرَّةً ثَانِيَةً بِلاَ خَطِيَّةٍ لِلْخَلاَصِ لِلَّذِينَ يَنْتَظِرُونَهُ.» [عبرانيين ٩ : ٢٨]. إنه يوم مجيء المسيح.\u003c/p\u003e\n\u003cp\u003eومن الواضح أن كاتب العبرانيين كان يعتقد أن المؤمنين سيكونون قادرين على أن \"يَرَوْنَ\" (βλέπετε - blepete) اليوم يقترب. ومما لا شك فيه أن هناك في كل جيل علامات تشير إلى مجيء الرب. غير أن هذا لا يعني أنه كلما اقترب اليوم أكثر فأكثر، لن تكون هناك علامات أكثر وضوحا. لقد برهنت في الفصل السابع عشر أنه إلى جانب المؤشرات العامة لمجيء المسيح، ستكون هناك مقدمات قابلة للتمييز في النهاية المطلقة لهذا الدهر، تشير إلى قرب مجيء المسيح — كالارتداد وإنسان الخطية [تسالونيكي الثانية ٢ : ٣]. وبالنسبة لأولئك الذين يمتلكون أعينا أكثر تمييزا روحيا، فإن «...ذلِكَ الْيَوْمُ [لَنْ] يُدْرِكَكُمُ... كَلِصٍّ.» [تسالونيكي الأولى ٥ : ٤]. بل هم \"يَرَوْنَ الْيَوْمَ يَقْرُبُ.\" [عبرانيين ١٠ : ٢٥].\u003c/p\u003e\n\u003ch3\u003eلا علامات؟\u003c/h3\u003e\n\u003cp\u003eأعتقد أن بعض اللاهوتيين يبالغون في قضية أنه لن تكون هناك \"أية علامات\" على رجوع الرب الوشيك جدا. يقول سام ستورمز [Sam Storms]:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"[إن الباروسيا أو المجيء] سيقع في المستقبل في وقت لا يعلمه حتى الرب نفسه. ولن تشير أي علامات إلى ذلك اليوم. ولربما تحدث يسوع بهذه الطريقة ليمنعنا من التسرع في الاستنتاج بأن كل أزمة عالمية جديدة، أو حرب، أو زلزال كارثي، أو أي نوع آخر من الاضطرابات الوطنية أو الطبيعية هو العلامة الواضحة لرجوعه.\"\u003ca href=\"#ch21-fn-1\"\u003e[١]\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيستخلص ستورمز الاستنتاج بأنه لن تكون هناك علامات تشير إلى ذلك اليوم من كلمات مثل هذه:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَكَمَا كَانَتْ أَيَّامُ نُوحٍ كَذلِكَ يَكُونُ أَيْضًا مَجِيءُ ابْنِ الإِنْسَانِ. لأَنَّهُ كَمَا كَانُوا فِي الأَيَّامِ الَّتِي قَبْلَ الطُّوفَانِ يَأْكُلُونَ وَيَشْرَبُونَ وَيَتَزَوَّجُونَ وَيُزَوِّجُونَ، إِلَى الْيَوْمِ الَّذِي دَخَلَ فِيهِ نُوحٌ الْفُلْكَ، وَلَمْ يَعْلَمُوا حَتَّى جَاءَ الطُّوفَانُ وَأَخَذَ الْجَمِيعَ، كَذلِكَ يَكُونُ أَيْضًا مَجِيءُ ابْنِ الإِنْسَانِ.» [متى ٢٤ : ٣٧-٣٩]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eومن هذا يستنتج ما يلي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"لن تكون هناك كوارث عالمية غير مسبوقة أو مصائب منقطعة النظير توجه أنظار الناس إلى رجوع يسوع الوشيك. بل ستكون البشرية منغمسة في شؤون الحياة الروتينية. سيكون الأمر كما كان في أيام نوح. سيؤخذ العالم على حين غرة تماما بمجيء المسيح. سينخرط الناس في مشاغل الحياة العادية والروتينية: الزراعة، والصحبة، والزواج، إلخ (راجع [لوقا ١٧ : ٢٨-٣٠]؛ [تسالونيكي الأولى ٥ : ٣]). سيأتي يسوع في وقت من اللامبالاة الواسعة النطاق، والوضع الطبيعي المعتاد، والمساعي المادية، عندما يكون الجميع منخرطين تماما في السعي وراء شؤونهم وطموحاتهم الأرضية (راجع [بطرس الثانية ٣ : ٣-٤، ١٠]). سيحدث مجيئه في وقت غير متوقع على الإطلاق، وغير معلن على الإطلاق، بحيث سيفاجئ الناس في خضم روتينهم اليومي (انظر الأعداد ٤٠-٤١). متى سيأتي يسوع؟ سيأتي يسوع في وقت يكون فيه مجيئه أبعد شيء عن أذهان الناس!\"\u003ca href=\"#ch21-fn-2\"\u003e[٢]\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالمشكلة في هذا الاستنتاج هي أنه لا يميز بين غفلة عمى العالم وبين ترقب أبناء النور. فأحدهما سيؤخذ على حين غرة كما في فخ [لوقا ٢١ : ٣٤]. والآخر لن يدركه اليوم كلص [تسالونيكي الأولى ٥ : ٤]. ويوضح كل من يسوع وبولس هذا التمييز جليا بين أولئك العميان عن العلامات وأولئك الذين يبصرونها. يقول بولس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ أَنْتُمْ تَعْلَمُونَ بِالتَّحْقِيقِ أَنَّ يَوْمَ الرَّبِّ كَلِصٍّ فِي اللَّيْلِ هكَذَا يَجِيءُ. لأَنَّهُ حِينَمَا يَقُولُونَ: «سَلاَمٌ وَأَمَانٌ»، حِينَئِذٍ يُفَاجِئُهُمْ هَلاَكٌ بَغْتَةً، كَالْمَخَاضِ لِلْحُبْلَى، فَلاَ يَنْجُونَ. وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمْ ذلِكَ الْيَوْمُ كَلِصٍّ.» [تسالونيكي الأولى ٥ : ٢-٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eويقول يسوع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاحْتَرِزُوا لأَنْفُسِكُمْ لِئَلاَّ تَثْقُلَ قُلُوبُكُمْ فِي خُمَارٍ وَسُكْرٍ وَهُمُومِ الْحَيَاةِ، فَيُصَادِفَكُمْ ذلِكَ الْيَوْمُ بَغْتَةً. لأَنَّهُ كَالْفَخِّ يَأْتِي عَلَى جَمِيعِ الْجَالِسِينَ عَلَى وَجْهِ كُلِّ الأَرْضِ. فَاسْهَرُوا إِذًا وَتَضَرَّعُوا فِي كُلِّ حِينٍ، لِكَيْ تُحْسَبُوا أَهْلاً لِلنَّجَاةِ مِنْ جَمِيعِ هذَا الْمُزْمِعِ أَنْ يَكُونَ، وَتَقِفُوا قُدَّامَ ابْنِ الإِنْسَانِ.» [لوقا ٢١ : ٣٤-٣٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالعالم أعمى عن مجيء المسيح وسيختبره كـ \"فخ\". أما الساهرون فلن يكونوا عميانا ولن يقعوا في الفخ. بل \"تَرَوْنَ الْيَوْمَ يَقْرُبُ.\" [عبرانيين ١٠ : ٢٥].\u003c/p\u003e\n\u003ch3\u003eأسباب وقت النهاية للذهاب إلى الكنيسة\u003c/h3\u003e\n\u003cp\u003eأنا واثق من أنه يمكن كتابة كتاب بأكمله حول الأسباب التي تجعلنا نعطي الأولوية للاجتماع معا كلما اقترب اليوم. وسيتضمن هذا الكتاب تأملا في عشاء الرب، لأن بولس ربطه (كما فعل يسوع، [لوقا ٢٢ : ١٦]) بالمجيء الثاني: «فَإِنَّكُمْ كُلَّمَا أَكَلْتُمْ هذَا الْخُبْزَ وَشَرِبْتُمْ هذِهِ الْكَأْسَ، تُخْبِرُونَ بِمَوْتِ الرَّبِّ إِلَى أَنْ يَجِيءَ.» [كورنثوس الأولى ١١ : ٢٦]. غير أن السبب الوحيد المذكور في نص العبرانيين هو ليعظ ويشجع بعضنا بعضا: «...غَيْرَ تَارِكِينَ اجْتِمَاعَنَا كَمَا لِقَوْمٍ عَادَةٌ، بَلْ وَاعِظِينَ بَعْضُنَا بَعْضًا،...» [عبرانيين ١٠ : ٢٥]. وهذا الوعظ والتشجيع المتبادل، وفقا لـ [عبرانيين ٣ : ١٢-١٣]، يركز على منع الارتداد:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«اُنْظُرُوا أَيُّهَا الإِخْوَةُ أَنْ لاَ يَكُونَ فِي أَحَدِكُمْ قَلْبٌ شِرِّيرٌ بِعَدَمِ إِيمَانٍ فِي الارْتِدَادِ [ἀποστῆναι - apostēnai] عَنِ اللهِ الْحَيِّ. بَلْ عِظُوا أَنْفُسَكُمْ كُلَّ يَوْمٍ، مَا دَامَ يُدْعَى «الْيَوْمَ»، لِكَيْ لاَ يُقَسَّى أَحَدٌ مِنْكُمْ بِغُرُورِ الْخَطِيَّةِ.» [عبرانيين ٣ : ١٢-١٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعظوا وشجعوا بعضكم بعضا لئلا تسقطوا «...فِي الارْتِدَادِ [ἀποστῆναι - apostēnai] عَنِ اللهِ الْحَيِّ.» وهذا الارتداد، كما يقول بولس، هو سمة مميزة لـ \"الأزمنة الأخيرة\": « وَلكِنَّ الرُّوحَ يَقُولُ صَرِيحًا: إِنَّهُ فِي الأَزْمِنَةِ الأَخِيرَةِ يَرْتَدُّ [ἀποστήσονταί - apostēsontai] قَوْمٌ عَنِ الإِيمَانِ،...» [تيموثاوس الأولى ٤ : ١]. وكان يسوع قد سلط الضوء على هذا الخطر في الكنيسة مع حلول وقت النهاية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَحِينَئِذٍ يَعْثُرُ كَثِيرُونَ وَيُسَلِّمُونَ بَعْضُهُمْ بَعْضًا وَيُبْغِضُونَ بَعْضُهُمْ بَعْضًا. وَيَقُومُ أَنْبِيَاءُ كَذَبَةٌ كَثِيرُونَ وَيُضِلُّونَ كَثِيرِينَ. وَلِكَثْرَةِ الإِثْمِ تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ. وَلكِنِ الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهذَا يَخْلُصُ.» [متى ٢٤ : ١٠-١٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلذا، ومن بين جميع الأسباب التي قد تكون في فكر الله لضرورة استمرارنا في الاجتماع معا في الأيام الأخيرة، فإن السبب الذي تركز عليه رسالة العبرانيين هو الوعظ والتشجيع المتبادل لمنع خداع عدم الإيمان الذي يقود إلى الارتداد عن الله. أو بصياغة أخرى: لمساعدة محبتنا ألا تبرد، ولإبقائنا متقدين بتوقع مفرح ومحبة لظهور الرب.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch21-ref-1\"\u003e[١]\u003c/a\u003e سام ستورمز، ملكوت آت: البديل اللاألفي (فيرن، روس-شاير، المملكة المتحدة: مينتور، ٢٠١٣)، ٢٧٧-٧٨؛ التأكيد مضاف.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch21-ref-2\"\u003e[٢]\u003c/a\u003e ستورمز، ملكوت آت، ٢٧٨؛ التأكيد مضاف.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg_0IKSzYGnvHHWjmdhdaeCGQjPsFh-6rIMIXWK1jpQ5kLXvactKCn9gUUdw9iw2SxuzaAH3oSUKkIYf683hA3WGDmCdF0bqBpG6nEZDDtwS_M2e6mA9X4OoFyAPWtdEYEIzuREUlNfjYgOzKP6QLE3kDMUHRS29RlT_VhWE4UjpQaHr6OCx25KS6OBwUQ/s2752/%D8%A7%D9%84%D8%A3%D9%85%D8%A7%D9%86%D8%A9_%D9%81%D9%8A_%D8%A7%D9%84%D8%B9%D9%85%D9%84_%D9%88%D8%A7%D9%84%D8%B9%D8%A8%D8%A7%D8%AF%D8%A9.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg_0IKSzYGnvHHWjmdhdaeCGQjPsFh-6rIMIXWK1jpQ5kLXvactKCn9gUUdw9iw2SxuzaAH3oSUKkIYf683hA3WGDmCdF0bqBpG6nEZDDtwS_M2e6mA9X4OoFyAPWtdEYEIzuREUlNfjYgOzKP6QLE3kDMUHRS29RlT_VhWE4UjpQaHr6OCx25KS6OBwUQ/s600/%D8%A7%D9%84%D8%A3%D9%85%D8%A7%D9%86%D8%A9_%D9%81%D9%8A_%D8%A7%D9%84%D8%B9%D9%85%D9%84_%D9%88%D8%A7%D9%84%D8%B9%D8%A8%D8%A7%D8%AF%D8%A9.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"12:T44c4,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل العشرون\u003c/h2\u003e\n\u003cp\u003eعدل آت، ووداعة حاضرة\u003c/p\u003e\n\u003cp\u003eمن رحم حياة المحبة المتيقظة، وغير المرتاعة، والصابرة، والثابتة، والمفرحة لظهور الرب، ينبثق شغف للقداسة في حياتنا ليجعلنا نشبه الرب يسوع الذي نتوق إلى رؤيته. ونرى هذا في [يوحنا الأولى ٣ : ٢-٣]:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَيُّهَا الأَحِبَّاءُ، الآنَ نَحْنُ أَوْلاَدُ اللهِ، وَلَمْ يُظْهَرْ بَعْدُ مَاذَا سَنَكُونُ. وَلكِنْ نَعْلَمُ أَنَّهُ إِذَا أُظْهِرَ نَكُونُ مِثْلَهُ، لأَنَّنَا سَنَرَاهُ كَمَا هُوَ. وَكُلُّ مَنْ عِنْدَهُ هذَا الرَّجَاءُ بِهِ، يُطَهِّرُ نَفْسَهُ كَمَا هُوَ طَاهِرٌ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eتأمل الديناميكيات النفسية في هذين العددين. فعندما يقول: \"وَكُلُّ مَنْ عِنْدَهُ هذَا الرَّجَاءُ بِهِ\" فإنه يشير إلى الرجاء الذي لدينا لنكون مثل يسوع: \"إِذَا أُظْهِرَ نَكُونُ مِثْلَهُ... وَكُلُّ مَنْ عِنْدَهُ هذَا الرَّجَاءُ بِهِ يُطَهِّرُ نَفْسَهُ\".\u003c/p\u003e\n\u003cp\u003eلذا فإن المغزى هو أنك إن أردت حقا أن تكون مثله من خلال رؤيتك له حين يأتي، فإنك ستسعى لتكون مثله الآن. فمن النفاق أن تكون غير مبال بالنقاء والقداسة الآن بينما تدعي أنك تحب ظهور الرب. وعليه، فإن الدافع لأن تصبح الآن شخصا مشابها للمسيح، ونقيا، ومقدسا، ومحبا، ومضحيا بصورة جذرية، ينبع من الرجاء الشديد والشوق لأن يحدث ذلك حين يأتي. أو يمكن للرسول أن يقول إن الدافع لعيش حياة مقدسة ينبع من محبة ظهور الرب.\u003c/p\u003e\n\u003ch3\u003eالحتمية الأخلاقية للدمار الكوني\u003c/h3\u003e\n\u003cp\u003eيشير بطرس، في رسالته الثانية، إلى المجيء الثاني كحافز \"فِي سِيرَةٍ مُقَدَّسَةٍ وَتَقْوَى\" [بطرس الثانية ٣ : ١١]. وهو لا يركز على جمال المشابهة للمسيح، بل على هلاك كل ما لا يشبه المسيح. ثم يختتم استدلاله بإشارة إلى سماوات جديدة وأرض جديدة، حيث لا يسكن سوى البر [بطرس الثانية ٣ : ١٣]. وفي الواقع، هو لا يذكر قط بكلمات صريحة مجيء أو ظهور الرب يسوع في هذا السياق. غير أنه يشير إلى \"يوم الرب\" الذي يجيء \"كلص\" [بطرس الثانية ٣ : ١٠]، والذي يشير بوضوح إلى المجيء الثاني:\u003ca href=\"#ch20-fn-1\"\u003e[١]\u003c/a\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلكِنْ سَيَأْتِي كَلِصٍّ فِي اللَّيْلِ، يَوْمُ الرَّبِّ، الَّذِي فِيهِ تَزُولُ السَّمَاوَاتُ بِضَجِيجٍ، وَتَنْحَلُّ الْعَنَاصِرُ مُحْتَرِقَةً، وَتَحْتَرِقُ الأَرْضُ وَالْمَصْنُوعَاتُ الَّتِي فِيهَا. فَبِمَا أَنَّ هذِهِ كُلَّهَا تَنْحَلُّ، أَيَّ أُنَاسٍ يَجِبُ أَنْ تَكُونُوا أَنْتُمْ فِي سِيرَةٍ مُقَدَّسَةٍ وَتَقْوَى؟ مُنْتَظِرِينَ وَطَالِبِينَ سُرْعَةَ مَجِيءِ يَوْمِ الرَّبِّ، الَّذِي بِهِ تَنْحَلُّ السَّمَاوَاتُ مُلْتَهِبَةً، وَالْعَنَاصِرُ مُحْتَرِقَةً تَذُوبُ. وَلكِنَّنَا بِحَسَبِ وَعْدِهِ نَنْتَظِرُ سَمَاوَاتٍ جَدِيدَةً، وَأَرْضًا جَدِيدَةً، يَسْكُنُ فِيهَا الْبِرُّ. لِذلِكَ أَيُّهَا الأَحِبَّاءُ، إِذْ أَنْتُمْ مُنْتَظِرُونَ هذِهِ، اجْتَهِدُوا لِتُوجَدُوا عِنْدَهُ بِلاَ دَنَسٍ وَلاَ عَيْبٍ، فِي سَلاَمٍ.» [بطرس الثانية ٣ : ١٠-١٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eمن المرجح أن تركيز بطرس على زوال الأجرام السماوية والأرض يعود إلى أن المعلمين الكذبة، في وقت سابق من الأصحاح، كانوا ينكرون المجيء الثاني بناء على زعمهم بأن الكون المخلوق (السماوات والأرض) مستقر جدا بحيث لا يمكن تصور أي تغيير كارثي له: «وَقَائِلِينَ [المستهزئون]: «أَيْنَ هُوَ مَوْعِدُ مَجِيئِهِ؟ لأَنَّهُ مِنْ حِينَ رَقَدَ الآبَاءُ كُلُّ شَيْءٍ بَاق هكَذَا مِنْ بَدْءِ الْخَلِيقَةِ».» [بطرس الثانية ٣ : ٤]. لذا، عندما يصف بطرس تأثير \"يوم الرب\"، فإنه يركز على التأثيرات الكارثية في الطبيعة.\u003c/p\u003e\n\u003cp\u003eغير أن هدفه هو الإجابة عن سؤال: كيف ينبغي لنا إذن أن نعيش؟ ونرى منطقه حين يقول: \"فَبِمَا أَنَّ هذِهِ كُلَّهَا\" — أي \"الأَرْضُ وَالْمَصْنُوعَاتُ الَّتِي فِيهَا\" — \"تَنْحَلُّ، أَيَّ أُنَاسٍ يَجِبُ أَنْ تَكُونُوا أَنْتُمْ فِي سِيرَةٍ مُقَدَّسَةٍ وَتَقْوَى\" [بطرس الثانية ٣ : ١١]؟ كيف يفكر بطرس هنا؟\u003c/p\u003e\n\u003ch3\u003eالإثم يباد، والبر يبقى\u003c/h3\u003e\n\u003cp\u003eيبدو أنه يشارك بولس فهمه للعالم الطبيعي بأن الله: «أُخْضِعَتِ الْخَلِيقَةُ لِلْبُطْلِ... [ولـ] عُبُودِيَّةِ الْفَسَادِ» [رومية ٨ : ٢٠-٢١]. وهكذا، لا يقتصر الأمر على حاجة البشر الخطاة إلى التجديد من خلال عمل المسيح الخلاصي، بل إن الطبيعة أيضا تحتاج إلى التجديد. ويُصور بولس هذا التجديد لا بأنه يحدث بإبادة الله للخليقة والبدء من جديد بخليقة جديدة، بل بالأحرى بتحرير الله للخليقة الحالية من \"عبودية الفساد\". «لأَنَّ الْخَلِيقَةَ نَفْسَهَا أَيْضًا سَتُعْتَقُ مِنْ عُبُودِيَّةِ الْفَسَادِ إِلَى حُرِّيَّةِ مَجْدِ أَوْلاَدِ اللهِ.» [رومية ٨ : ٢١]. لا يذكر بولس كيف يحدث هذا التجديد والتطهير. غير أن بطرس يصوره بأنه يحدث من خلال النار.\u003c/p\u003e\n\u003cp\u003eولا أعتقد أنه يقصد أن الأجرام السماوية والأرض ستُباد بهذه النار بحيث تُخلق السماوات الجديدة والأرض الجديدة [بطرس الثانية ٣ : ١٣] من العدم. بل بالأحرى، وبما أن بطرس يبدو وكأنه يشارك بولس فهمه للخليقة، وبما أن بولس يقول: «لأَنَّ الْخَلِيقَةَ نَفْسَهَا أَيْضًا سَتُعْتَقُ مِنْ عُبُودِيَّةِ الْفَسَادِ [لا أن تُباد] إِلَى حُرِّيَّةِ مَجْدِ أَوْلاَدِ اللهِ.» [رومية ٨ : ٢١]، فإن \"زوال\" الأجرام السماوية، واحتراق وانحلال الأرض وما عليها من مصنوعات [بطرس الثانية ٣ : ١٠]، يشير على الأرجح إلى ما يحدث في حريق غابات مروع أو دمار بركاني. فنحن نقول إن الأرض، بكل ما فيها من أشجار ونباتات ومنشآت من صنع الإنسان، قد \"دُمرت\". ولكننا لا نقصد أن الأرض قد مُحيت من الوجود.\u003c/p\u003e\n\u003cp\u003eوهكذا، فإن استدلال بطرس حول كيفية عيشنا يسير على النحو التالي: إن دمار السماوات والأرض سيكون شاملا وتاما لدرجة أنه لن يبقى شيء سوى ما هو مقدس وتقي. ومن الناحية السلبية، سيُستهلك كل ما يعارض القداسة والتقوى. ومن الناحية الإيجابية، «...نَنْتَظِرُ سَمَاوَاتٍ جَدِيدَةً وَأَرْضًا جَدِيدَةً، يَسْكُنُ فِيهَا الْبِرُّ.» [بطرس الثانية ٣ : ١٣]. الإثم يُباد. والبر يبقى. ولذلك: «أَيَّ أُنَاسٍ يَجِبُ أَنْ تَكُونُوا أَنْتُمْ فِي سِيرَةٍ مُقَدَّسَةٍ وَتَقْوَى» [بطرس الثانية ٣ : ١١]؟ ويختتم بطرس بجلب كلا الدمار والتجديد إلى الذهن: «لِذلِكَ أَيُّهَا الأَحِبَّاءُ، إِذْ أَنْتُمْ مُنْتَظِرُونَ هذِهِ [دمار القديم وتأسيس الجديد]، اجْتَهِدُوا لِتُوجَدُوا عِنْدَهُ بِلاَ دَنَسٍ وَلاَ عَيْبٍ، فِي سَلاَمٍ.» [بطرس الثانية ٣ : ١٤].\u003c/p\u003e\n\u003ch3\u003eودعاء ونحن ننتظر العدل\u003c/h3\u003e\n\u003cp\u003eيستخلص الرسول بولس سمة شخصية محددة للإجابة عن سؤال بطرس: \"أَيَّ أُنَاسٍ يَجِبُ أَنْ تَكُونُوا أَنْتُمْ فِي سِيرَةٍ مُقَدَّسَةٍ وَتَقْوَى\" إن كان البر الكامل (والذي يشمل العدل) سيسود؟ وهو يجيب بأنه، في ضوء المجيء الثاني، ينبغي لنا أن نكون ودعاء. وهو يصنع هذا الرابط في [فيلبي ٤ : ٤-٧] و [رومية ١٢ : ١٩-٢١].\u003c/p\u003e\n\u003cp\u003eيقول في [فيلبي ٤ : ٥]: «لِيَكُنْ حِلْمُكُمْ مَعْرُوفًا عِنْدَ جَمِيعِ النَّاسِ. اَلرَّبُّ قَرِيبٌ.» وأنا أفهم هذا على أنه يعني أن حتمية وقرب مجيء الرب الإمكاني لهما تأثير يتمثل في جعلنا ودعاء (أو حلماء) عندما نفكر ونشعر بصورة صحيحة حيالهما.\u003ca href=\"#ch20-fn-2\"\u003e[٢]\u003c/a\u003e وأنا أدرك أن الترجمة الإنجليزية (ESV) تترجم (ἐπιεικὲς - epieikes) إلى \"تعقل\" أو \"عقلانية\" (Reasonableness) بدلا من \"وداعة\" أو \"حلم\" (Gentleness): \"ليكن تعقلكم معروفا عند جميع الناس\". غير أن بولس في [تيموثاوس الأولى ٣ : ٣] يضع هذه الكلمة صراحة في تضاد مع العنف: إذ يجب ألا يكون الأسقف «لاَ ضَرَّابٍ، …، بَلْ حَلِيمًا» (μὴ πλήκτην, ἀλλʼ ἐπιεικῆ - mē plēktēn, all’ epieikē). ونقيض العنيف هو بطبيعة الحال الوديع (أو الحليم) وليس العقلاني.\u003c/p\u003e\n\u003cp\u003eوبالمثل، توازي كلمة (ἐπιεικεῖς - epieikeis) كلمة (ἀμάχους - amachous) في [تيطس ٣ : ٢]، والتي تعني حرفيا \"غير مخاصمين\"؛ أي مسالمين. وهذا يصنع توازيا أنسب مع الوداعة (أو الحلم) منه مع العقلانية. ويمكننا أن نصيغ كلمات بولس لتيطس هكذا: «وَلاَ يَطْعَنُوا فِي أَحَدٍ، وَيَكُونُوا غَيْرَ مُخَاصِمِينَ، حُلَمَاءَ [ودعاء]، مُظْهِرِينَ كُلَّ وَدَاعَةٍ لِجَمِيعِ النَّاسِ.»\u003c/p\u003e\n\u003cp\u003eوهناك سبب آخر يجعلني أعتقد أن بولس رأى في الوداعة (أو الحلم) أثرا لمجيء الرب المنتظر، وهو طريقة استدلاله في [رومية ١٢ : ١٩-٢٠]:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لاَ تَنْتَقِمُوا لأَنْفُسِكُمْ أَيُّهَا الأَحِبَّاءُ، بَلْ أَعْطُوا مَكَانًا لِلْغَضَبِ، لأَنَّهُ مَكْتُوبٌ: «لِيَ النَّقْمَةُ أَنَا أُجَازِي يَقُولُ الرَّبُّ. فَإِنْ جَاعَ عَدُوُّكَ فَأَطْعِمْهُ. وَإِنْ عَطِشَ فَاسْقِهِ. لأَنَّكَ إِنْ فَعَلْتَ هذَا تَجْمَعْ جَمْرَ نَارٍ عَلَى رَأْسِهِ».»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eمن مظاهر الوداعة ألا تبادل شرا بشر، بل أن تصنع خيرا لعدوك. وهذا هو ما يدعو إليه بولس. والدافع لذلك هنا (وليس هو الدافع الوحيد) هو أنه ينبغي لنا أن نترك النقمة للرب. فالرب يعد قائلا: \"لِيَ النَّقْمَةُ أَنَا أُجَازِي\" [رومية ١٢ : ١٩]. وثقتنا في عدل الرب النهائي الحازم تعني أننا لسنا مضطرين لانتزاع العدالة من أعدائنا في هذه الحياة. بل يمكننا مبادلة الشر بالخير. يمكننا أن نكون ودعاء.\u003c/p\u003e\n\u003cp\u003eوالارتباط بمجيء الرب يكمن في أن المجيء الثاني هو الوقت الذي ستقع فيه نقمة الرب. ويوضح بولس هذا جليا في [تسالونيكي الثانية ١ : ٧-٨]: «...عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ،» وهكذا تُظهر طريقة بولس في الاستدلال في [رومية ١٢ : ١٩-٢٠] سببا واحدا يجعله يربط بين مجيء الرب في [فيلبي ٤ : ٤] وبين الدعوة للوداعة (أو الحلم) المسيحي. «لِيَكُنْ حِلْمُكُمْ مَعْرُوفًا عِنْدَ جَمِيعِ النَّاسِ. اَلرَّبُّ قَرِيبٌ.» فمجيئه سيسوي كل الحسابات بعدل ويُقوّم كل اعوجاج. ونحن أحرار لنترك النقمة له. نحن أحرار لنكون ودعاء (أو حلماء).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch20-ref-1\"\u003e[١]\u003c/a\u003e كما أوضحت في الفصل ٨، أنا لا أحاول في هذا الكتاب ترتيب كل الأحداث التي يُشار إليها كجزء من \"يوم الرب\". فبمثل هذا \"اليوم\"، أنا لا أشير إلى فترة من ٢٤ ساعة. بل يمكن لكلمة \"يوم\" أن تشير إلى فترة زمنية ممتدة. فعلى سبيل المثال: «...حِينَمَا يُرْفَعُ الْعَرِيسُ عَنْهُمْ، فَحِينَئِذٍ يَصُومُونَ فِي تِلْكَ الأَيَّامِ [ذلِكَ الْيَوْمِ في الأصل].» [مرقس ٢ : ٢٠]؛ (راجع [يوحنا ٨ : ١٥]؛ [يوحنا ١٦ : ٢٣]؛ [كورنثوس الثانية ٦ : ٢]؛ [أفسس ٦ : ١٣]؛ [عبرانيين ٨ : ٩]). في فكر الله، فإن الإطار الزمني الذي يُدعى \"يوما\" له مدة محددة. ولكن من وجهة نظرنا المحدودة، فإن مداه غير معلوم. ولذلك، يمكن لأحداث كثيرة أن تقع في غضون ذلك الوقت. وهكذا، عندما أستخدم العبارات الكتابية \"يوم الرب\"، أو \"يوم الدينونة\"، أو \"يوم الغضب\"، فإنني أترك مجالا في تلك الأيام لأحداث متنوعة، دون ترتيب تسلسلها أو تحديد مقدار الوقت الذي يمر بينها. وهكذا، وفي حالة إشارة بطرس إلى التجديد الكامل للسماوات والأرض، فأنا لا أحدد متى يحدث ذلك فيما يتعلق بأعمال \"يوم الرب\" الأخرى.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch20-ref-2\"\u003e[٢]\u003c/a\u003e للتعرف على معنى القرب، انظر الفصل ١٤.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhKHdBR2jz9OU-G1y8E-l09z-3YH4-LFA25OJ_7hNvmVN4xNL3yl2P2t4v_a754zANFADcf0amW1XH2QG2QjLNWG0YZEXQ8j3IwjpOIlbGxJXemTHsi_YEm2LvRp1MeSv8jsVcmrKNlD2okuQHJRFJ3Ta7QRay3qFuB8YJ3IsOZbIJAWOnxb08Isk1Fock/s2752/%D8%A3%D8%AE%D9%84%D8%A7%D9%82%D9%8A%D8%A7%D8%AA_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A_%D9%88%D8%A7%D9%84%D8%B9%D9%8A%D8%B4_%D8%A7%D9%84%D9%85%D9%82%D8%AF%D8%B3.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhKHdBR2jz9OU-G1y8E-l09z-3YH4-LFA25OJ_7hNvmVN4xNL3yl2P2t4v_a754zANFADcf0amW1XH2QG2QjLNWG0YZEXQ8j3IwjpOIlbGxJXemTHsi_YEm2LvRp1MeSv8jsVcmrKNlD2okuQHJRFJ3Ta7QRay3qFuB8YJ3IsOZbIJAWOnxb08Isk1Fock/s600/%D8%A3%D8%AE%D9%84%D8%A7%D9%82%D9%8A%D8%A7%D8%AA_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D8%AB%D8%A7%D9%86%D9%8A_%D9%88%D8%A7%D9%84%D8%B9%D9%8A%D8%B4_%D8%A7%D9%84%D9%85%D9%82%D8%AF%D8%B3.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"13:T48f4,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل التاسع عشر\u003c/h2\u003e\n\u003cp\u003eصابرون، فرحون، لا نخدع، ولا نرتاع\u003c/p\u003e\n\u003cp\u003eإن أحد الجوانب الحاسمة في مسيرتنا في الأيام الأخيرة هو أنه ينبغي لنا أن نكون متيقظين بشكل خاص للخداع. ويعود ذلك إلى أن الخداع الشيطاني، كما يوضح يسوع وبولس معا، سيتفاقم كلما اقتربت النهاية. يُسلط يسوع الضوء على هذا الخطر أولا عندما يسأله التلاميذ: «...وَمَا هِيَ عَلاَمَةُ مَجِيئِكَ وَانْقِضَاءِ الدَّهْرِ؟» [متى ٢٤ : ٣]. فكلماته الأولى، والمكررة، تتعلق بالخداع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«انْظُرُوا! لاَ يُضِلَّكُمْ أَحَدٌ. فَإِنَّ كَثِيرِينَ سَيَأْتُونَ بِاسْمِي قَائِلِينَ: أَنَا هُوَ الْمَسِيحُ! وَيُضِلُّونَ كَثِيرِينَ... وَيَقُومُ أَنْبِيَاءُ كَذَبَةٌ كَثِيرُونَ وَيُضِلُّونَ كَثِيرِينَ. وَلِكَثْرَةِ الإِثْمِ تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ. وَلكِنِ الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهذَا يَخْلُصُ... لأَنَّهُ سَيَقُومُ مُسَحَاءُ كَذَبَةٌ وَأَنْبِيَاءُ كَذَبَةٌ وَيُعْطُونَ آيَاتٍ عَظِيمَةً وَعَجَائِبَ، حَتَّى يُضِلُّوا لَوْ أَمْكَنَ الْمُخْتَارِينَ أَيْضًا. هَا أَنَا قَدْ سَبَقْتُ وَأَخْبَرْتُكُمْ.» [متى ٢٤ : ٤-٥، ١١-١٣، ٢٤-٢٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eومما لا شك فيه أن الخداع يطبع التاريخ بأسره منذ القرن الأول وحتى الآن. غير أن إشارة يسوع إلى تكاثر الإثم، وبرود محبة الكثيرين، والتحذير بالصبر \"إلى المنتهى\"، والوتيرة المتصاعدة للآيات والعجائب التي تكاد تضل المختارين — كل هذا يشير إلى تفاقم الشر الخادع في النهاية المطلقة لهذا الدهر. يبدو الأمر كأنه يبلغ الذروة. ومن هنا جاء تحذير يسوع الملح: «انْظُرُوا! لاَ يُضِلَّكُمْ أَحَدٌ.» [متى ٢٤ : ٤]. وهي طريقة أخرى للقول: \"ابقوا مستيقظين.\" \"كونوا متيقظين.\" أحبوا ظهور الرب أكثر من الإغراءات الخادعة التي يعرضها الأنبياء الكذبة والمسحاء الكذبة.\u003c/p\u003e\n\u003ch3\u003eالخداع والرمق الأخير للشر\u003c/h3\u003e\n\u003cp\u003eيربط بولس الخداع والآيات والعجائب الكاذبة بالرمق الأخير للشر عند ظهور إنسان الخطية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي مَجِيئُهُ بِعَمَلِ الشَّيْطَانِ، بِكُلِّ قُوَّةٍ، وَبِآيَاتٍ وَعَجَائِبَ كَاذِبَةٍ، وَبِكُلِّ خَدِيعَةِ الإِثْمِ، فِي الْهَالِكِينَ، لأَنَّهُمْ لَمْ يَقْبَلُوا مَحَبَّةَ الْحَقِّ حَتَّى يَخْلُصُوا. وَلأَجْلِ هذَا سَيُرْسِلُ إِلَيْهِمُ اللهُ عَمَلَ الضَّلاَلِ، حَتَّى يُصَدِّقُوا الْكَذِبَ، لِكَيْ يُدَانَ جَمِيعُ الَّذِينَ لَمْ يُصَدِّقُوا الْحَقَّ، بَلْ سُرُّوا بِالإِثْمِ.» [تسالونيكي الثانية ٢ : ١-١٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوالسبب الذي يجعلني أسمي هذا الرمق الأخير للشر هو أن بولس يقول في العدد ٨ إن هذا \"الأثيم\" الشيطاني والمخادع سيُباد في المجيء النهائي للرب يسوع. «وَحِينَئِذٍ سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ، وَيُبْطِلُهُ بِظُهُورِ مَجِيئِهِ.» [تسالونيكي الثانية ٢ : ٨]. لذا فإن الخداع الذي يُنبهنا إليه بولس هو الجهد الأخير تماما للشيطان لتدمير شعب المسيح.\u003c/p\u003e\n\u003cp\u003eإن العبارة الأخيرة في العدد ١٢ ذات مغزى عميق: «...سُرُّوا بِالإِثْمِ.» [تسالونيكي الثانية ٢ : ١٢]. ويقول إن هذا السرور هو البديل عن تصديق الحق. «...لَمْ يُصَدِّقُوا الْحَقَّ، بَلْ سُرُّوا بِالإِثْمِ.» [تسالونيكي الثانية ٢ : ١٢]. و\"تصديق الحق\" هذا يتضمن «...مَحَبَّةَ الْحَقِّ...» [تسالونيكي الثانية ٢ : ١٠] المذكورة في العدد ١٠. مما يعني أن الحماية العظمى ضد الخداع الشيطاني في الأيام الأخيرة لا تقتصر على مجرد الموافقة العقلية على الحق، بل هي محبة الحق. والمجد المستقبلي الكامن في قلب ذلك الحق هو ظهور ربنا يسوع. ولذلك، يحثنا بولس على محبة حق مجيئه — أن نحب ظهوره [تيموثاوس الثانية ٤ : ٨]. فكيف ينبغي لنا إذن أن نعيش في الأيام الأخيرة؟ سنعيش في حالة تأهب قصوى ضد الخداع. وما يكمن في صميم هذا التأهب ليس روح الخوف، بل روح المحبة — المحبة القلبية العميقة لظهور الرب.\u003c/p\u003e\n\u003ch3\u003eمتيقظون، لكن لا نرتاع\u003c/h3\u003e\n\u003cp\u003eإن العيش في حالة تأهب قصوى للخداع لا يعني العيش بروح الارتياع. فالمحبة، لا الارتياع، هي أفضل حماية ضد الخداع. ويسوع وبولس كلاهما يوضحان هذا جليا. وكما رأينا في الفصل ١٦، لا تُستخدم كلمتهما للتعبير عن الارتياع إلا في سياقين فقط يتعلقان بوقت النهاية في العهد الجديد، أحدهما عند بولس والآخر في تعليم يسوع — ولا ترد في أي موضع آخر. فبعد تحذيرنا مباشرة من الانخداع بالمسحاء الكذبة، يُحذر يسوع أيضا من الارتياع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَإِنَّ كَثِيرِينَ سَيَأْتُونَ بِاسْمِي قَائِلِينَ: أَنَا هُوَ الْمَسِيحُ! وَيُضِلُّونَ كَثِيرِينَ. وَسَوْفَ تَسْمَعُونَ بِحُرُوبٍ وَأَخْبَارِ حُرُوبٍ. اُنْظُرُوا، لاَ تَرْتَاعُوا [θροεῖσθε - throeisthe]. لأَنَّهُ لاَ بُدَّ أَنْ تَكُونَ هذِهِ كُلُّهَا، وَلكِنْ لَيْسَ الْمُنْتَهَى بَعْدُ.» [متى ٢٤ : ٥-٦]؛ (راجع [مرقس ١٣ : ٦-٧])\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eتعني كلمات \"لا بد أن تكون\" أن خطط الله التي لا تُقهر بل آخذة في التكشف. فالأمور ليست خارجة عن السيطرة. تيقظوا، ولكن لا ترتاعوا. وتعني كلمات \"ليس المنتهى بعد\" أنه ينبغي لنا أن نقاوم أية هستيريا تبالغ في فورية مجيء الرب. فالله الآب، وهو وحده، من سيقرر متى يأتي المنتهى، وهو ربنا ومخلصنا وصديقنا. وإن عيّن لنا مزيدا من الأشهر أو السنوات أو العقود لنثابر فيها، فسوف يمنحنا ما نحتاجه لنعيش في يقظة ولكن دون ارتياع — أي لنعيش في محبة ظهور الرب.\u003c/p\u003e\n\u003cp\u003eويستخدم بولس الكلمة ذاتها للتعبير عن الارتياع لتوضيح المغزى عينه: «ثُمَّ نَسْأَلُكُمْ أَيُّهَا الإِخْوَةُ... أَنْ لاَ تَتَزَعْزَعُوا سَرِيعًا عَنْ ذِهْنِكُمْ، وَلاَ تَرْتَاعُوا [θροεῖσθαι - throeisthai]... أَيْ أَنَّ يَوْمَ الْمَسِيحِ قَدْ حَضَرَ.» [تسالونيكي الثانية ٢ : ١-٢]. وهذا يطابق فعليا تحذير يسوع: «...اُنْظُرُوا، لاَ تَرْتَاعُوا [θροεῖσθε - throeisthe]... وَلكِنْ لَيْسَ الْمُنْتَهَى بَعْدُ.» [متى ٢٤ : ٦]. لا ينبغي لقلب المسيحي أن يكون عرضة للتكهنات حول أوقات النهاية. ولا ينبغي أن تجرفنا التنبؤات المثيرة الخالية من الأساس الكتابي الصلب. ولا ينبغي أن نُستدرج إلى أي جنون أو هوس، ولا إلى مخططات تُبنى على تنظير بشري حول علامات ليست دليلا أكيدا على قرب الرب الوشيك.\u003c/p\u003e\n\u003ch3\u003eالصبر، والثبات، والفرح\u003c/h3\u003e\n\u003cp\u003eتترقب النفس المسيحية مجيء الرب بتلهف ويقظة، وبلا ارتياع. ولكن أكثر من ذلك، فإن هذا التلهف المتيقظ لا يستبعد الارتياع فحسب، بل يشمل أيضا صبرا ثابتا ومسالما ومفرحا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَتَأَنَّوْا أَيُّهَا الإِخْوَةُ إِلَى مَجِيءِ الرَّبِّ. هُوَذَا الْفَلاَحُ يَنْتَظِرُ ثَمَرَ الأَرْضِ الثَّمِينَ، مُتَأَنِّيًا عَلَيْهِ حَتَّى يَنَالَ الْمَطَرَ الْمُبَكِّرَ وَالْمُتَأَخِّرَ. فَتَأَنَّوْا أَنْتُمْ وَثَبِّتُوا قُلُوبَكُمْ، لأَنَّ مَجِيءَ الرَّبِّ قَدِ اقْتَرَبَ. لاَ يَئِنَّ بَعْضُكُمْ عَلَى بَعْضٍ أَيُّهَا الإِخْوَةُ لِئَلاَّ تُدَانُوا. هُوَذَا الدَّيَّانُ وَاقِفٌ قُدَّامَ الْبَابِ. خُذُوا يَا إِخْوَتِي مِثَالاً لاحْتِمَالِ الْمَشَقَّاتِ وَالأَنَاةِ: الأَنْبِيَاءَ الَّذِينَ تَكَلَّمُوا بِاسْمِ الرَّبِّ. هَا نَحْنُ نُطَوِّبُ الصَّابِرِينَ...» [يعقوب ٥ : ٧-١١]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيشير يعقوب ثلاث مرات إلى «...مَجِيءِ الرَّبِّ.» [يعقوب ٥ : ٧]، «...مَجِيءَ الرَّبِّ...» [يعقوب ٥ : ٨]، و«...الدَّيَّانُ وَاقِفٌ قُدَّامَ الْبَابِ.» [يعقوب ٥ : ٩]. وشاغله الرئيسي هو دعوتنا إلى التأني (الصبر)، والاستعداد للتألم، والثبات. فحتى الألم لا ينبغي أن يُريعنا أو يُفقدنا اتزاننا بينما نحن ننتظر مجيء الرب بصبر وثبات وثقة.\u003c/p\u003e\n\u003cp\u003eوليس يعقوب وحده، بل يسوع وبولس أيضا يقولان إن الألم سيطبع الأيام الأخيرة. يقول يسوع: «حِينَئِذٍ يُسَلِّمُونَكُمْ إِلَى ضِيق وَيَقْتُلُونَكُمْ، وَتَكُونُونَ مُبْغَضِينَ مِنْ جَمِيعِ الأُمَمِ لأَجْلِ اسْمِي.» [متى ٢٤ : ٩]. ولكن حتى هذا يجب ألا يسبب لنا ارتياعا. يجب أن نواجه مثل هذا الألم بالصبر والثبات، عالمين أن «...الدَّيَّانُ وَاقِفٌ قُدَّامَ الْبَابِ.» [يعقوب ٥ : ٩].\u003c/p\u003e\n\u003cp\u003eويوضح بولس أن مثل هذه الآلام هي جزء من حكمة الله لكي: «...تُؤَهَّلُونَ لِمَلَكُوتِ اللهِ الَّذِي لأَجْلِهِ تَتَأَلَّمُونَ أَيْضًا.» [تسالونيكي الثانية ١ : ٥]. ثم يربط ذلك القصد الإلهي لألمنا بعدل الله عند المجيء الثاني:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«حَتَّى إِنَّنَا نَحْنُ أَنْفُسَنَا نَفْتَخِرُ بِكُمْ فِي كَنَائِسِ اللهِ، مِنْ أَجْلِ صَبْرِكُمْ وَإِيمَانِكُمْ فِي جَمِيعِ اضْطِهَادَاتِكُمْ وَالضِّيقَاتِ الَّتِي تَحْتَمِلُونَهَا، بَيِّنَةً عَلَى قَضَاءِ اللهِ الْعَادِلِ، أَنَّكُمْ تُؤَهَّلُونَ لِمَلَكُوتِ اللهِ الَّذِي لأَجْلِهِ تَتَأَلَّمُونَ أَيْضًا. إِذْ هُوَ عَادِلٌ عِنْدَ اللهِ أَنَّ الَّذِينَ يُضَايِقُونَكُمْ يُجَازِيهِمْ ضِيقًا، وَإِيَّاكُمُ الَّذِينَ تَتَضَايَقُونَ رَاحَةً مَعَنَا، عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ.» [تسالونيكي الثانية ١ : ٤-٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن قضاء الله عادل، حتى عندما يتضمن ألمنا، لأنه سيُجازي المضايق ويُريح المتضايق «...عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ... فِي نَارِ لَهِيبٍ.» [تسالونيكي الثانية ١ : ٧-٨]. فتوقعنا المتلهف ويقظتنا، ونحن ننتظر مجيء الرب، لا يرتاعان حتى في مواجهة الألم.\u003c/p\u003e\n\u003cp\u003eوفي الواقع، يتجاوز العهد الجديد بانتظام مجرد غياب الارتياع وحضور الصبر أثناء انتظارنا. فهو يدعونا حتى إلى الفرح في الألم من أجل المسيح ([متى ٥ : ١١-١٢]؛ [لوقا ٦ : ٢٣]؛ [أعمال الرسل ٥ : ٤١]؛ [رومية ٥ : ٣]؛ [فيلبي ٢ : ١٧]؛ [كولوسي ١ : ٢٤]؛ [يعقوب ١ : ٢]). ويربط بطرس هذا الفرح مباشرة بشوقنا لظهور مجد الرب:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e« أَيُّهَا الأَحِبَّاءُ، لاَ تَسْتَغْرِبُوا الْبَلْوَى الْمُحْرِقَةَ الَّتِي بَيْنَكُمْ حَادِثَةٌ، لأَجْلِ امْتِحَانِكُمْ، كَأَنَّهُ أَصَابَكُمْ أَمْرٌ غَرِيبٌ، بَلْ كَمَا اشْتَرَكْتُمْ فِي آلاَمِ الْمَسِيحِ، افْرَحُوا لِكَيْ تَفْرَحُوا فِي اسْتِعْلاَنِ مَجْدِهِ أَيْضًا مُبْتَهِجِينَ.» [بطرس الأولى ٤ : ١٢-١٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيجعل بطرس فرحنا في التألم مع المسيح شرطا لفرحنا عند استعلان مجده. افرح في آلامه الآن لكي تفرح في مجده حين يأتي. إن تزايد الاضطهاد في انقضاء الدهر يسير جنبا إلى جنب مع برود محبة الكثيرين تحت التأثير الجليدي للإثم [متى ٢٤ : ١٢]. غير أن المسيحيين لا يرتاعون. بل وأكثر من ذلك، بينما نتطلع إلى مجد ظهور الرب [بطرس الأولى ٤ : ١٣] وإلى إكليل البر [تيموثاوس الثانية ٤ : ٨]، فإننا نفرح. أي أننا نحب ظهور الرب بفرح يفوق وسائل راحة المساومة [مرقس ٨ : ٣٥]، ويفوق تجنب العار [مرقس ٨ : ٣٨]، عالمين أن «...الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهذَا يَخْلُصُ.» [متى ٢٤ : ١٣].\u003c/p\u003e\n\u003cp\u003eوحتى عندما يُحتم علينا الوقوف بجوار قبور من نحب، فإننا لا نحزن «... كَالْبَاقِينَ الَّذِينَ لاَ رَجَاءَ لَهُمْ.» [تسالونيكي الأولى ٤ : ١٣]. «لأَنَّ الرَّبَّ نَفْسَهُ بِهُتَافٍ، بِصَوْتِ رَئِيسِ مَلاَئِكَةٍ وَبُوقِ اللهِ، سَوْفَ يَنْزِلُ مِنَ السَّمَاءِ وَالأَمْوَاتُ فِي الْمَسِيحِ سَيَقُومُونَ أَوَّلاً.» [تسالونيكي الأولى ٤ : ١٦]. لن يكون الراقدون في أي موقف دوني فيما يتعلق بالاختبار المباشر لظهور الرب المجيد. «ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ،...» [تسالونيكي الأولى ٤ : ١٧].\u003c/p\u003e\n\u003cp\u003eولذلك، فحتى الموت لا يحيل تيقظ وقت النهاية فينا إلى ارتياع. نحن صابرون، وثابتون، وممتلئون بالرجاء. وفوق كل الإغراءات، ورغم كل الخسائر، نحن نحب ظهور الرب.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiBnxLZKt_YKUdfQQKBOWQFkDf6o50cDyy0lI-35PWDcyagEZrqC0hlQrig9PxHjS4KngrJ3u1JJ1Sj74XoeA-8l7YtS45y9d8JJ-LsXhhzqN5d5Rt8OeRBud0cC-wSiOVDXivGEqWoX-8ecdbVn9GyOEo9maVNxF_UCT0z2MyCI3CNaFNpiAkfXaMBw68/s2752/%D8%AF%D9%84%D9%8A%D9%84_%D8%A7%D9%84%D9%85%D8%A4%D9%85%D9%86_%D9%84%D9%84%D8%AB%D8%A8%D8%A7%D8%AA_%D9%88%D8%A7%D9%84%D9%8A%D9%82%D8%B8%D8%A9_%D8%A7%D9%84%D8%B1%D9%88%D8%AD%D9%8A%D8%A9.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiBnxLZKt_YKUdfQQKBOWQFkDf6o50cDyy0lI-35PWDcyagEZrqC0hlQrig9PxHjS4KngrJ3u1JJ1Sj74XoeA-8l7YtS45y9d8JJ-LsXhhzqN5d5Rt8OeRBud0cC-wSiOVDXivGEqWoX-8ecdbVn9GyOEo9maVNxF_UCT0z2MyCI3CNaFNpiAkfXaMBw68/s600/%D8%AF%D9%84%D9%8A%D9%84_%D8%A7%D9%84%D9%85%D8%A4%D9%85%D9%86_%D9%84%D9%84%D8%AB%D8%A8%D8%A7%D8%AA_%D9%88%D8%A7%D9%84%D9%8A%D9%82%D8%B8%D8%A9_%D8%A7%D9%84%D8%B1%D9%88%D8%AD%D9%8A%D8%A9.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"14:T7c0d,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالْجُزْءُ الثَّالِثُ\u003c/h2\u003e\n\u003cp\u003eكَيْفَ يَنْبَغِي لَنَا إِذًا أَنْ نَعِيشَ؟\u003cbr\u003e\nمُقَدِّمَةٌ لِلْجُزْءِ الثَّالِثِ\u003cbr\u003e\nالْحَيَاةُ بَيْنَ ظُهُورَيِ الْمَسِيحِ\u003c/p\u003e\n\u003cp\u003eنحن نعيش بين الظهور الأول والظهور الثاني ليسوع المسيح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«… وَلكِنَّهُ الآنَ قَدْ أُظْهِرَ مَرَّةً عِنْدَ انْقِضَاءِ الدُّهُورِ لِيُبْطِلَ الْخَطِيَّةَ بِذَبِيحَةِ نَفْسِهِ... هكَذَا الْمَسِيحُ أَيْضًا، بَعْدَمَا قُدِّمَ مَرَّةً لِكَيْ يَحْمِلَ خَطَايَا كَثِيرِينَ، سَيَظْهَرُ ثَانِيَةً... لِلْخَلاَصِ لِلَّذِينَ يَنْتَظِرُونَهُ.» [عبرانيين ٩ : ٢٦-٢٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلم يَرَ أنبياء العهد القديم بوضوح أن مجيء المسيا لتأسيس ملكوته الأبدي سيتضمن مجيئا أولا لتدشين ملكوته من خلال الموت والقيامة، ثم، بعد قرون عديدة، مجيئا ثانيا لبلوغ الملكوت كماله. فحتى بشارة الملاك لمريم لم توضح أن مُلك المسيح الأبدي على عرش داود سيُؤسس على مراحل وليس دفعة واحدة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَهَا أَنْتِ سَتَحْبَلِينَ وَتَلِدِينَ ابْنًا وَتُسَمِّينَهُ يَسُوعَ... وَيُعْطِيهِ الرَّبُّ الإِلهُ كُرْسِيَّ دَاوُدَ أَبِيهِ، وَيَمْلِكُ عَلَى بَيْتِ يَعْقُوبَ إِلَى الأَبَدِ، وَلاَ يَكُونُ لِمُلْكِهِ نِهَايَةٌ.» [لوقا ١ : ٣١-٣٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد أوقع يسوع أهل زمانه في حيرة حين قال، من ناحية: «لأَنْ هَا مَلَكُوتُ اللهِ دَاخِلَكُمْ.» [لوقا ١٧ : ٢١]، ثم: «عَادَ فَقَالَ مَثَلاً، لأَنَّهُمْ [كانوا خاطئين حين] كَانُوا يَظُنُّونَ أَنَّ مَلَكُوتَ اللهِ عَتِيدٌ أَنْ يَظْهَرَ فِي الْحَالِ.» [لوقا ١٩ : ١١]. كان ملكوت الله حاضرا بمعنى ما. ومع ذلك، وبمعنى ما، لم يكن حاضرا بل آتيا.\u003c/p\u003e\n\u003ch3\u003eتفرد الأخلاقيات المسيحية: قد حدث، وليس بعد\u003c/h3\u003e\n\u003cp\u003eإن هذه الحيرة تكمن في صميم تفرد المسيحية وفي كيفية عيشنا في هذا الدهر. لقد حدث بالفعل أمر مذهل ورائع جدا في تجسد ابن الله. ومع ذلك، هناك أمر مذهل ورائع لم يحدث بعد سيكمل ما بدأه المسيح على الأرض. لقد جاء الخلاص. والخلاص آت. نحن نسعى بجدية أخلاقية نحو خلاصنا الكامل في المستقبل، لأن الخلاص قد ضُمن لنا بالفعل في الماضي. فبفضل عمل المسيح في مجيئه الأول، نحن بالفعل مغفور لنا [كولوسي ١ : ١٤]، ومبررون [رومية ٥ : ١]، ومُتبنون [غلاطية ٤ : ٥-٦]، وآمنون [رومية ٨ : ٣٠] — وكل هذا بفضل اتحادنا بالمسيح من خلال الإيمان.\u003c/p\u003e\n\u003cp\u003eغير أن هذا الموقف البار المكتمل أمام الله لا يجعلنا سلبيين أو مستهترين. بل إنه الأرضية الصلبة التي نقف عليها ونحن نجاهد لأجل قداسة لا يرى أحد الرب بدونها [عبرانيين ١٢ : ١٤]. فالجهاد حقيقي لأن الخلاص النهائي ليس اختبارنا الحاضر بعد [رومية ١٣ : ١١]. غير أن الانتصار أكيد لأننا خلصنا بالفعل [أفسس ٢ : ٨-٩].\u003c/p\u003e\n\u003cp\u003eوهنا يعيش كل المسيحيين: بين الظهور الأول والظهور الثاني للمسيح. بين ما فعله لأجلنا، وما سيفعله لأجلنا. بين ما صار عليه لأجلنا، وما سيكون عليه بالكامل لأجلنا. بين \"قد حدث بالفعل\" و\"ليس بعد\". فعلى سبيل المثال:\u003c/p\u003e\n\u003cp\u003eنقول مع بولس: «لَيْسَ أَنِّي قَدْ نِلْتُ [القيامة] أَوْ صِرْتُ كَامِلاً، وَلكِنِّي أَسْعَى لَعَلِّي أُدْرِكُ الَّذِي لأَجْلِهِ أَدْرَكَنِي أَيْضًا الْمَسِيحُ يَسُوعُ.» [فيلبي ٣ : ١٢]. لقد أدركنا المسيح بالفعل، ولكننا لم ننته بعد من السعي نحو ملئه.\u003c/p\u003e\n\u003cp\u003eلقد أُقمنا بالفعل \"مع المسيح\". ولذلك، نحن: «فَاطْلُبُوا مَا فَوْقُ» [كولوسي ٣ : ١]، لأنها ليست في حوزتنا بعد للتمتع الأكمل.\u003c/p\u003e\n\u003cp\u003eلقد صُلب إنساننا العتيق بالفعل \"معه [مع المسيح]\". ولكن يجب علينا أن: «احْسِبُوا أَنْفُسَكُمْ أَمْوَاتًا عَنِ الْخَطِيَّةِ» [رومية ٦ : ٦، ١١] لأننا لسنا بعد تحت السيادة الكاملة لموتنا عن الخطية وحياتنا لله.\u003c/p\u003e\n\u003cp\u003eنحن \"في الحقيقة فطير [بالفعل]\". ولذلك، يجب علينا أن: «نَقُّوا مِنْكُمُ الْخَمِيرَةَ الْعَتِيقَةَ [التي لم تُستأصل بعد]» [كورنثوس الأولى ٥ : ٧].\u003c/p\u003e\n\u003cp\u003eلقد أنقذنا الله بالفعل «مِنْ سُلْطَانِ الظُّلْمَةِ، وَنَقَلَنَا إِلَى مَلَكُوتِ ابْنِ مَحَبَّتِهِ» [كولوسي ١ : ١٣]. وسيخلصنا الرب لملكوته السماوي: «وَيُخَلِّصَنِي لِمَلَكُوتِهِ السَّمَاوِيِّ.» [تيموثاوس الثانية ٤ : ١٨] لأننا لم نختبر كنوز الملكوت بالكامل بعد.\u003c/p\u003e\n\u003ch3\u003eالحياة بالمحبة بسبب نعمة الماضي والمستقبل\u003c/h3\u003e\n\u003cp\u003eتتجلى صلة حالة \"قد حدث - وليس بعد\" هذه بين ظهوري المسيح في الآتي: إننا نضع في الحسبان النظرة إلى الوراء نحو الظهور الأول للمسيح والنظرة إلى الأمام نحو الظهور الثاني. فكيفية عيشنا تُشكل وتُحكم بنعمة الله الماضية التي نعتز بها ونعمة الله المستقبلية التي نثق بها.\u003c/p\u003e\n\u003cp\u003eفعلى سبيل المثال: «نَحْنُ نُحِبُّهُ لأَنَّهُ هُوَ أَحَبَّنَا أَوَّلاً.» [يوحنا الأولى ٤ : ١٩]. ونحن نحب «مِنْ أَجْلِ الرَّجَاءِ الْمَوْضُوعِ لَكُمْ فِي السَّمَاوَاتِ» [كولوسي ١ : ٥]. فمحبتنا للآخرين تتشكل وتتأسس على محبة الله لنا في الماضي ومحبته لنا في المستقبل. ونحن مستعدون للتألم من أجل فعل الخير: «لأَنَّ الْمَسِيحَ أَيْضًا تَأَلَّمَ لأَجْلِنَا» [بطرس الأولى ٢ : ٢١]. ونحن مستعدون للتألم من أجل فعل الخير لكي: «تَرِثُوا بَرَكَةً» [بطرس الأولى ٣ : ٩]. فالنعمة الماضية المعتز بها والنعمة المستقبلية الموثوق بها تمنحاننا القوة للطاعة. \"قد حدث\" و\"ليس بعد\" هما دافعان حتميان في السلوك المسيحي.\u003c/p\u003e\n\u003cp\u003eولذلك، وبينما أركز في الجزء الثالث على التأثيرات العملية لظهور المسيح المستقبلي، لا تظنوا أنني غافل عن التأثيرات الثمينة والقوية والحتمية لما فعله المسيح بالفعل لأجلنا. فما من دافع مستقبلي سيكون له أي تأثير لطاعة تُعظم المسيح لو لم تكن معجزة الكفارة الهائلة بدم المسيح قد حدثت بالفعل. إن النفس المسيحية المغفور لها، والمبررة، والمُتبناة، والمسكونة بالروح القدس بالفعل، هي التربة الوحيدة التي يمكن لوعود المسيح أن تتأصل فيها وتثمر طاعة.\u003c/p\u003e\n\u003cp\u003eوينبغي أن يكون جليا، إذن، أن كل المواقف والكلمات والأفعال الممدوحة في العهد الجديد كان يمكن أن تكون موضوعا للجزء الثالث من هذا الكتاب. فكل التحريضات والتوبيخات والتحذيرات والوصايا والأمثلة الأخلاقية ينبغي أن تُنفذ في ضوء صليب المسيح وفي ضوء مجيئه الثاني.\u003c/p\u003e\n\u003cp\u003eلذا فإن إحدى الإجابات عن سؤال: \"كيف ينبغي لنا إذا أن نعيش؟\" ستكون: \"عِش بالطريقة التي يخبرك العهد الجديد بأسره أن تعيش بها،\" لأن العهد الجديد بأسره مكتوب في ضوء المجيء الثاني. فكيف سأحدد إذن مما سأناقشه؟ إجابتي هي أنني سأتناول المواقف والكلمات والسلوكيات المرتبطة صراحة بالمجيء الثاني للمسيح.\u003c/p\u003e\n\u003ch3\u003eالفصل الثامن عشر\u003c/h3\u003e\n\u003cp\u003eتيقظ وقت النهاية ومحبة ظهور المسيح\u003c/p\u003e\n\u003cp\u003eفي ختام الفصل السابع عشر، ذكرت أن شاغلنا الأول في الجزء الثالث سيكون التأثير الذي يُحدثه المجيء الثاني على ترقبنا ويقظتنا وانتباهنا. ومن هنا سنبدأ إذن.\u003c/p\u003e\n\u003ch3\u003eابقوا ساهرين — فأنتم لا تعرفون اليوم ولا الساعة\u003c/h3\u003e\n\u003cp\u003eماذا قصد يسوع بحديثه عن علاقتنا بالمجيء الثاني حين قال: \"اسهروا\" (γρηγορεῖτε - grēgoreite) [متى ٢٤ : ٤٢]، \"كونوا أنتم مستعدين\" (γίνεσθε ἕτοιμοι - ginesthe hetoimoi) [لوقا ١٢ : ٤٠]، \"اسهروا\" [وتضرعوا] (ἀγρυπνεῖτε - agrypneite) [لوقا ٢١ : ٣٦]، \"انظروا\" (βλέπετε - blepete) [مرقس ١٣ : ٢٣]، و\"احترزوا لأنفسكم\" (προσέχετε δὲ ἑαυτοῖς - prosechete de heautois) [لوقا ٢١ : ٣٤]؟ يمكننا الإجابة عن هذا من خلال نظرة موجزة على عدة نصوص مفتاحية. وسأبدأ بمثل العذارى العشر لأن معنى \"اسهروا\" يتضح بأجلى صورة هناك:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«حِينَئِذٍ يُشْبِهُ مَلَكُوتُ السَّمَاوَاتِ عَشْرَ عَذَارَى، أَخَذْنَ مَصَابِيحَهُنَّ وَخَرَجْنَ لِلِقَاءِ الْعَرِيسِ. وَكَانَ خَمْسٌ مِنْهُنَّ حَكِيمَاتٍ، وَخَمْسٌ جَاهِلاَتٍ. أَمَّا الْجَاهِلاَتُ فَأَخَذْنَ مَصَابِيحَهُنَّ وَلَمْ يَأْخُذْنَ مَعَهُنَّ زَيْتًا، وَأَمَّا الْحَكِيمَاتُ فَأَخَذْنَ زَيْتًا فِي آنِيَتِهِنَّ مَعَ مَصَابِيحِهِنَّ. وَفِيمَا أَبْطَأَ الْعَرِيسُ نَعَسْنَ جَمِيعُهُنَّ وَنِمْنَ. فَفِي نِصْفِ اللَّيْلِ صَارَ صُرَاخٌ: هُوَذَا الْعَرِيسُ مُقْبِلٌ، فَاخْرُجْنَ لِلِقَائِهِ! فَقَامَتْ جَمِيعُ أُولئِكَ الْعَذَارَى وَأَصْلَحْنَ مَصَابِيحَهُنَّ. فَقَالَتِ الْجَاهِلاَتُ لِلْحَكِيمَاتِ: أَعْطِينَنَا مِنْ زَيْتِكُنَّ فَإِنَّ مَصَابِيحَنَا تَنْطَفِئُ. فَأَجَابَتِ الْحَكِيمَاتُ قَائِلاتٍ: لَعَلَّهُ لاَ يَكْفِي لَنَا وَلَكُنَّ، بَلِ اذْهَبْنَ إِلَى الْبَاعَةِ وَابْتَعْنَ لَكُنَّ. وَفِيمَا هُنَّ ذَاهِبَاتٌ لِيَبْتَعْنَ جَاءَ الْعَرِيسُ، وَالْمُسْتَعِدَّاتُ دَخَلْنَ مَعَهُ إِلَى الْعُرْسِ، وَأُغْلِقَ الْبَابُ. أَخِيرًا جَاءَتْ بَقِيَّةُ الْعَذَارَى أَيْضًا قَائِلاَتٍ: يَا سَيِّدُ، يَا سَيِّدُ، افْتَحْ لَنَا! فَأَجَابَ وَقَالَ: اَلْحَقَّ أَقُولُ لَكُنَّ: إِنِّي مَا أَعْرِفُكُنَّ. فَاسْهَرُوا [γρηγορεῖτε - grēgoreite] إِذًا لأَنَّكُمْ لاَ تَعْرِفُونَ الْيَوْمَ وَلاَ السَّاعَةَ الَّتِي يَأْتِي فِيهَا ابْنُ الإِنْسَانِ.» [متى ٢٥ : ١-١٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن أكثر ما ينير الفهم في هذا المثل هو أن العذارى العشر جميعهن — الحكيمات والجاهلات — قد نمن أثناء انتظارهن للعريس. «نَعَسْنَ جَمِيعُهُنَّ وَنِمْنَ.» [متى ٢٥ : ٥]. كان ذلك ليكون عيبا لو كُن حارسات أو نواطير. غير أنه من الواضح أنه لم يكن عيبا بالنسبة لمجموعة العذارى، اللواتي كُلفن بمرافقة العريس إلى وليمة العرس، شريطة أن يستيقظن في الوقت المناسب لإتمام مسؤوليتهن. اتخذت العذارى الخمس الحكيمات خطوات لفعل ما كان متوقعا منهن. كان لديهن زيت كاف للترحيب. نهضن من نومهن عند النداء. أصلحن مصابيحهن، ولاقين العريس. أما العذارى الجاهلات ففشلن في توفير الزيت. ولم يُتممن ما كان متوقعا منهن.\u003c/p\u003e\n\u003cp\u003eلذلك، قد يبدو من الغريب أن ينتهي المثل بكلمات: «فَاسْهَرُوا [γρηγορεῖτε - grēgoreite] إِذًا لأَنَّكُمْ لاَ تَعْرِفُونَ الْيَوْمَ وَلاَ السَّاعَةَ» [متى ٢٥ : ١٣]. \"فاسهروا\" تعني حرفيا \"ابقوا مستيقظين\"، كما يُرى من الطريقة التي تُستخدم بها الكلمة في مقابل النوم في [تسالونيكي الأولى ٥ : ١٠]: «... حَتَّى إِذَا سَهِرْنَا [γρηγορῶμεν - grēgorōmen] أَوْ نِمْنَا [καθεύδωμεν - katheudōmen]». لكن هذا ليس غريبا، لأن يسوع لا يقصد أن طريقة بقائنا مستعدين لمجيئه هي بالبقاء مستيقظين جسديا. بل يقصد \"ابقوا مستيقظين\" بمعنى أن نكون منتبهين للواقع — لاسيما واقعه هو — ويقظين لدعوتنا ومسؤوليتنا. يقصد أنه ينبغي لنا أن نكون متيقظين روحيا وأخلاقيا، وصافي الذهن، وقادرين على التمييز. يقصد ألا نكون عرضة للحماقة العالمية، كألا نمتلك زيتا لمصابيح تعمل بالزيت حين تكون هذه هي مهمتنا. يقصد ألا نكون غافلين، كمن يمشي نائما وغافلا، عن عمل الله في العالم، أو عن خداع الشيطان.\u003c/p\u003e\n\u003cp\u003eوكما رأينا في الجزء الثاني (الفصل الخامس عشر)، فإن العبارة السببية في العدد ١٣، \"لأنكم لا تعرفون اليوم ولا الساعة\"، لا توحي بأن يسوع يُعلِّم بمجيء في أية لحظة. بل هي تُعلِّم بأمرين. أولا، لن يكون هناك وقت عند المجيء الثاني للنائمين روحيا ليغيروا حياتهم. لن يكون هناك وقت للنائم ليصلح كل ما كسره أثناء تعثره في ظلام السبات الروحي. فأي محاولة في اللحظة الأخيرة لإصلاح سريع لحياة عالمية اعتاد عليها طويلا ستكون محاولة مُرائية: لن تنبع من حياة روحية حقيقية، بل من مجرد دافع الخوف النفعي. وستتركه خارج الوليمة. «وَفِيمَا هُنَّ ذَاهِبَاتٌ لِيَبْتَعْنَ [الزيت] جَاءَ الْعَرِيسُ، وَالْمُسْتَعِدَّاتُ دَخَلْنَ مَعَهُ إِلَى الْعُرْسِ، وَأُغْلِقَ الْبَابُ.» [متى ٢٥ : ١٠].\u003c/p\u003e\n\u003cp\u003eالدرس الثاني الذي تُعلِّمه العبارة السببية (\"لأنكم لا تعرفون اليوم ولا الساعة\") هو أنك إن نمت روحيا، فلن تكون متيقظا لتمييز علامات قربه. ولهذا السبب لا يتطلب الأمر مجيئا في أية لحظة ليكون لهذا التحذير معنى. \"فاسهروا\" تعني أنك إن نمت روحيا، فلا يوجد أي سبب يجعلك تظن أنك ستكون متيقظا روحيا بعد ثلاث سنوات أو ثلاثين سنة من الآن، بينما يستخدم إنسان الخطية قوة شيطانية خارقة ليأسر النفوس النائمة [تسالونيكي الثانية ٢ : ٩-١٠]. \"لأنكم لا تعرفون اليوم ولا الساعة\" تعني هذا: إن أي افتراض بتأخر المسيح كذريعة للتهاون هو خطأ قاتل.\u003c/p\u003e\n\u003ch3\u003eكفخ مباغت للنفس المنغمسة في الخمار\u003c/h3\u003e\n\u003cp\u003eيتأكد هذا المغزى الأخير من الطريقة التي يتحدث بها يسوع عن الوكيل الحكيم والوكيل الجاهل في الصورة التالية للمجيء الثاني:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَمَنْ هُوَ الْوَكِيلُ الأَمِينُ الْحَكِيمُ الَّذِي يُقِيمُهُ سَيِّدُهُ عَلَى خَدَمِهِ لِيُعْطِيَهُمْ الْعُلُوفَةَ فِي حِينِهَا؟ طُوبَى لِذلِكَ الْعَبْدِ الَّذِي إِذَا جَاءَ سَيِّدُهُ يَجِدُهُ يَفْعَلُ هكَذَا! بِالْحَقِّ أَقُولُ لَكُمْ: إِنَّهُ يُقِيمُهُ عَلَى جَمِيعِ أَمْوَالِهِ. وَلكِنْ إِنْ قَالَ ذلِكَ الْعَبْدُ فِي قَلْبِهِ: إِنَّ سَيِّدِي يُبْطِئُ قُدُومَهُ، فَيَبْتَدِئُ يَضْرِبُ الْغِلْمَانَ وَالْجَوَارِيَ، وَيَأْكُلُ وَيَشْرَبُ وَيَسْكَرُ. يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ فِي يَوْمٍ لاَ يَنْتَظِرُهُ وَفِي سَاعَةٍ لاَ يَعْرِفُهَا، فَيَقْطَعُهُ وَيَجْعَلُ نَصِيبَهُ مَعَ الْخَائِنِينَ.» [لوقا ١٢ : ٤٢-٤٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذه صورة لرحيل يسوع إلى السماء بعد قيامته وتركه لتلاميذه على الأرض ليتمموا الخدمة التي أوكلها إليهم. ومن المرجح أنه يضع خدام الكلمة نصب عينيه حيث يقول إن السيد: \"يُقِيمُهُ عَلَى خَدَمِهِ لِيُعْطِيَهُمْ الْعُلُوفَةَ فِي حِينِهَا.\" غير أن المبدأ هنا ينطبق على جميع المسيحيين.\u003c/p\u003e\n\u003cp\u003eيُعلن الطوبى على الوكيل الأمين الذي يفعل ما عُين لفعله. فهو يطعم أهل البيت. ولا يُقال له شيء عن مجيء غير متوقع للسيد بينما يضطلع الوكيل بأمانة بواجباته. فليس لديه ما يخشاه، متى جاء السيد، لأنه يقوم بعمله المُعين.\u003c/p\u003e\n\u003cp\u003eولكن بعد ذلك يأتي التحذير. ماذا لو فسد قلب الوكيل وبدأ يفترض إبطاء السيد؟ \"إن سيدي يبطئ قدومه\" ماذا لو قاده هذا الافتراض إلى أن \"يأكل ويشرب ويسكر\"؟ يقول يسوع إن هذا السكر سيؤدي إلى أن يفاجئه رجوع السيد على حين غرة. «وَلكِنْ إِنْ قَالَ ذلِكَ الْعَبْدُ فِي قَلْبِهِ: سَيِّدِي يُبْطِئُ قُدُومَهُ... وَيَأْكُلُ وَيَشْرَبُ وَيَسْكَرُ. يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ فِي يَوْمٍ لاَ يَنْتَظِرُهُ…» [لوقا ١٢ : ٤٥-٤٦].\u003c/p\u003e\n\u003cp\u003eماذا ينبغي لنا أن نستنتج من هذا التحذير؟ المغزى ليس أن مجيئا غير متوقع وفي أية لحظة للسيد قد فات على الوكيل السكران. بل المغزى هو أن الوكيل الجاهل سكران عقليا وروحيا. لقد تخلى عن مشيئة السيد واعتنق مسار العالم المخدر. وهو الآن أعمى عما هو حقيقي روحيا. وسيفاجئه السيد حين يأتي، لأنه لا يوجد ما يدعو للظن بأنه \"سيفيق\" من سكره، لنقل، بعد خمس سنوات، أو خمسين عاما، حين يُضرب بالبوق. «يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ [السكران] فِي يَوْمٍ لاَ يَنْتَظِرُهُ» [لوقا ١٢ : ٤٦]. والدرس هو هذا: ابق متيقظا روحيا ومنشغلا بعمل السيد، لأنك إن استسلمت للسبات الروحي (أن كان نوما أو سكرا)، فستكون أعمى عن كل علامات الخطر، وستؤخذ في الدينونة بغتة وعلى حين غرة.\u003c/p\u003e\n\u003cp\u003eويقدم يسوع التصريح ذاته في [لوقا ٢١ : ٣٤-٣٥]:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاحْتَرِزُوا لأَنْفُسِكُمْ لِئَلاَّ تَثْقُلَ قُلُوبُكُمْ فِي خُمَارٍ وَسُكْرٍ وَهُمُومِ الْحَيَاةِ، فَيُصَادِفَكُمْ ذلِكَ الْيَوْمُ بَغْتَةً. لأَنَّهُ كَالْفَخِّ يَأْتِي...»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن المباغتة والمفاجأة لا تعودان إلى نظرة المجيء في أية لحظة. بل تعودان إلى التكاسل الروحي للقلب البشري المثقل والمتبلد بـ \"هموم الحياة\". فظهور المسيح يصبح فخا مباغتا ليس لأنه قد يحدث في أية لحظة، بل لأن العمي روحيا سيكونون عميانا عن مجيء المسيح حتى لو حدث بعد خمس سنوات من الآن، مع وجود تحذيرات خطيرة بين الحين والآخر. فالنوم الروحي، أو السكر، أو العمى، يُنذر بهلاك غير متوقع حتى لو كان ذلك غدا أو بعد عقد من الزمان.\u003c/p\u003e\n\u003ch3\u003eتحذير بولس للنائمين والسكارى\u003c/h3\u003e\n\u003cp\u003eيجمع الرسول بولس بين كلتا الصورتين اللتين يستخدمهما يسوع لتوضيح المغزى ذاته — صورة السهر [متى ٢٥ : ١٣] وصورة الصحو من السكر ([لوقا ١٢ : ٤٥]؛ [لوقا ٢١ : ٣٤]):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ أَنْتُمْ تَعْلَمُونَ بِالتَّحْقِيقِ أَنَّ يَوْمَ الرَّبِّ كَلِصٍّ فِي اللَّيْلِ هكَذَا يَجِيءُ. لأَنَّهُ حِينَمَا يَقُولُونَ: «سَلاَمٌ وَأَمَانٌ»، حِينَئِذٍ يُفَاجِئُهُمْ هَلاَكٌ بَغْتَةً، كَالْمَخَاضِ لِلْحُبْلَى، فَلاَ يَنْجُونَ. وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمْ ذلِكَ الْيَوْمُ كَلِصٍّ. جَمِيعُكُمْ أَبْنَاءُ نُورٍ وَأَبْنَاءُ نَهَارٍ. لَسْنَا مِنْ لَيْل وَلاَ ظُلْمَةٍ. فَلاَ نَنَمْ إِذًا [μὴ καθεύδωμεν - mē katheudōmen] كَالْبَاقِينَ، بَلْ لِنَسْهَرْ [γρηγορῶμεν - grēgorōmen] وَنَصْحُ [νήφωμεν - nēphōmen].» [تسالونيكي الأولى ٥ : ٢-٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيقول بولس إنه بالنسبة للبعض، سيكون يوم مجيء المسيح كمفاجأة اللص المدمرة. ولكن بالنسبة لآخرين، لن يكون كذلك. «وَأَمَّا أَنْتُمْ أَيُّهَا الإِخْوَةُ فَلَسْتُمْ فِي ظُلْمَةٍ حَتَّى يُدْرِكَكُمُ ذلِكَ الْيَوْمُ كَلِصٍّ» [تسالونيكي الأولى ٥ : ٤]. يكمن الفارق في ما إذا كنا في ظلمة أم نحن \"أبناء نهار\"، في ما إذا كنا نائمين أم مستيقظين روحيا، في ما إذا كنا سكارى أم صاحين روحيا. وهو لا يقول إن مباغتة اليوم ومفاجأته تعودان إلى رجوع المسيح في أية لحظة. بل تعودان إلى حالة روحية غافلة تقول: \"سلام وأمان\"، لأن تلك الحالة الروحية هي حالة \"ظلمة\" و\"نوم\" و\"سكر\".\u003c/p\u003e\n\u003ch3\u003eافتراض الإبطاء لأجل الخطية هو انتحار\u003c/h3\u003e\n\u003cp\u003eلذلك، أستنتج أن أمر يسوع المتكرر بأن نكون ساهرين، ومستعدين، ومنتبهين، ومحترزين، ومتيقظين ليس لأن المجيء الثاني سيفاجئ التلاميذ المطيعين، بل لأن السبات الروحي يؤدي إلى الغفلة عما يحدث في العالم، وبالتالي المفاجأة والوقوع في الفخ والهلاك. وتعمل حتمية عدم اليقين من وقت رجوع المسيح كتحذير لنا جميعا لنكون أحياء ومستيقظين وصاحين روحيا، لأن البديل هو حالة روحية ستكون عمياء عن العلامات ولن تتمكن من التعافي من السبات الشيطاني عندما «الْبَرْقَ... يُضِيءُ إِلَى مَا تَحْتَ السَّمَاءِ» [لوقا ١٧ : ٢٤]. إن أي افتراض بإبطاء المسيح لتبرير حياة العالم يضع القلب في حالة انتحار روحي.\u003c/p\u003e\n\u003cp\u003eحتى لو كنا مقتنعين بأنه يبعد ثلاث سنوات، أو خمس، أو ست (ولا يوجد لدينا أبدا مبرر لنظن أنه لابد أن يكون أبعد من ذلك)، فإن هذا القدر من القرب وحالة عدم اليقين يتضافران ليجعلانا أكثر انتباها ويقظة على نفوسنا وحياتنا. نحن ندرك أن الاستهتار الروحي سيجعل كل حساباتنا بلا معنى، لأننا سنكون عاجزين روحيا عن خوض المعركة الأخيرة لأجل اليقظة والاحتمال. ومن ناحية أخرى، ندرك أننا إن كنا متيقظين روحيا، وفي شركة مع المسيح، ونسلك في النور، فإننا سنميز «عَلاَمَاتِ الأَزْمِنَةِ» [متى ١٦ : ٣] وسنختبر مجيئه لا كلص يفاجئنا [تسالونيكي الأولى ٥ : ٤] بل كسيد رحيم وخادم [لوقا ١٢ : ٣٧].\u003c/p\u003e\n\u003ch3\u003eأن تكون متيقظا يعني أن تحب ظهور الرب\u003c/h3\u003e\n\u003cp\u003eطريقة أخرى لوصف غيرتنا لنكون مستيقظين وصاحين ومميزين روحيا هي القول بأننا نحب ظهور الرب [تيموثاوس الثانية ٤ : ٨]، أو أننا: \"نَنْتَظِرهُ\" ([عبرانيين ٩ : ٢٨]؛ راجع [كورنثوس الأولى ١ : ٧]؛ [فيلبي ٣ : ٢٠])، أو أننا: «فَأَلْقُوا رَجَاءَكُمْ بِالتَّامِّ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ.» [بطرس الأولى ١ : ١٣].\u003c/p\u003e\n\u003cp\u003eلعلكم تذكرون من الفصل الأول أنه في أعقاب دعوة بولس مباشرة لمحبة ظهور الرب في [تيموثاوس الثانية ٤ : ٨]، يُذكر ديماس كشخص أحب هذا العالم أكثر من محبته لظهور الرب. «لأَنَّ دِيمَاسَ قَدْ تَرَكَنِي إِذْ أَحَبَّ الْعَالَمَ الْحَاضِرَ» [تيموثاوس الثانية ٤ : ١٠]. وهذا هو ما يحذر منه يسوع. «فَاحْتَرِزُوا لأَنْفُسِكُمْ لِئَلاَّ تَثْقُلَ قُلُوبُكُمْ فِي خُمَارٍ وَسُكْرٍ وَهُمُومِ الْحَيَاةِ، فَيُصَادِفَكُمْ ذلِكَ الْيَوْمُ بَغْتَةً. لأَنَّهُ كَالْفَخِّ يَأْتِي...» [لوقا ٢١ : ٣٤-٣٥]. لقد سقط ديماس من محبة ظهور الرب يسوع ليرتمي في أحضان محبة هذا العالم. لقد أسكره العالم بأوهام أشياء أفضل.\u003c/p\u003e\n\u003cp\u003eلذا ففي كل نقاشنا حول وصايا يسوع بالسهر والصحو، كنا في الواقع نتحدث عن محبة ظهور الرب. فأن تكون مستيقظا ومنتبها روحيا يعني أن تكون واقعا في محبة مجيء الرب. والبديل هو السقوط في سبات محبة العالم والعمى عن أمجاد المسيح الآتي. وهذه هي الإجابة العظيمة عن كيف ينبغي لنا أن نعيش. ينبغي لنا أن نعيش في محبة ظهور المسيح. إن الحياة في محبة ظهور المسيح هي متعة ترقبية عظيمة. إنها قوة عظيمة للسلوك في الحرية من الخطية. إنها حماية عظيمة من الخداع في الأيام الأخيرة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEieUB7bQtogyoqkoBUSiwstOZ851JfZb6x7RaHCT-uehfgFU1f1LnrwErcpkAhoQYsYQlMLcbKDgAXg1tF2ryQy0gkx5zw98dbOtfKLkd_UhINl4tUbnrjfOGIAWUHktA1Oes81U3nDT8CIihKG3_0soTIcQLtZLcnC22T7oRZboB5bxzy9PwxK-lQPIEA/s2752/%D8%A7%D9%84%D8%B9%D9%8A%D8%B4_%D8%A8%D9%8A%D9%86_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A6%D9%8A%D9%86__%D8%A7%D9%84%D9%8A%D9%82%D8%B8%D8%A9_%D8%A7%D9%84%D8%B1%D9%88%D8%AD%D9%8A%D8%A9.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEieUB7bQtogyoqkoBUSiwstOZ851JfZb6x7RaHCT-uehfgFU1f1LnrwErcpkAhoQYsYQlMLcbKDgAXg1tF2ryQy0gkx5zw98dbOtfKLkd_UhINl4tUbnrjfOGIAWUHktA1Oes81U3nDT8CIihKG3_0soTIcQLtZLcnC22T7oRZboB5bxzy9PwxK-lQPIEA/s600/%D8%A7%D9%84%D8%B9%D9%8A%D8%B4_%D8%A8%D9%8A%D9%86_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A6%D9%8A%D9%86__%D8%A7%D9%84%D9%8A%D9%82%D8%B8%D8%A9_%D8%A7%D9%84%D8%B1%D9%88%D8%AD%D9%8A%D8%A9.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"15:T9e96,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل السابع عشر\u003c/h2\u003e\n\u003cp\u003eما الذي يجب أن يحدث قبل ظهور الرب؟\u003c/p\u003e\n\u003cp\u003eنأتي الآن إلى خطوتنا الثالثة في سعينا للإجابة عن التساؤل: هل يُعلِّم العهد الجديد بأن يسوع قد يأتي في أية لحظة؟ تتمثل هذه الخطوة الثالثة في بيان بعض الأحداث التي لم تقع بعد ويجب أن تحدث قبل مجيء المسيح.\u003c/p\u003e\n\u003cp\u003eيُظهر لنا الرسول بولس بصراحة تامة أنه من الصواب أن نميز الأحداث التي يجب أن تسبق مجيء الرب. فعندما واجه الهستيريا الظاهرية حول كون يوم الرب قد حضر بالفعل، أجاب قائلا: «لاَ يَخْدَعَنَّكُمْ أَحَدٌ عَلَى طَرِيقَةٍ مَا، لأَنَّهُ لاَ يَأْتِي إِنْ لَمْ يَأْتِ الارْتِدَادُ أَوَّلاً، وَيُسْتَعْلَنْ إِنْسَانُ الْخَطِيَّةِ، ابْنُ الْهَلاَكِ،» [تسالونيكي الثانية ٢ : ٣].\u003ca href=\"#ch17-fn-1\"\u003e[١]\u003c/a\u003e إجابة بولس في أيامه عن تساؤل: ما هي الأحداث التي لم تقع بعد ويجب أن تحدث قبل مجيء المسيح؟ هي إجابة ذات شقين: (١) يجب أن يأتي الارتداد، و(٢) يجب أن يُستعلن إنسان الخطية.\u003c/p\u003e\n\u003cp\u003eوهذان الحدثان لا يزالان في رحم المستقبل، وأنا أكتب هذا في خريف عام ٢٠٢١. ولا يتعامل بولس مع هذين الحدثين كأمور غامضة لدرجة يتعذر معها تمييزهما حين وقوعهما. فظهور إنسان الخطية سيكون حدثا عالميا مدويا، ولكنه وجيز:\u003ca href=\"#ch17-fn-2\"\u003e[٢]\u003c/a\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الْمُقَاوِمُ وَالْمُرْتَفِعُ عَلَى كُلِّ مَا يُدْعَى إِلهًا أَوْ مَعْبُودًا، حَتَّى إِنَّهُ يَجْلِسُ فِي هَيْكَلِ اللهِ كَإِلهٍ، مُظْهِرًا نَفْسَهُ أَنَّهُ إِلهٌ... وَحِينَئِذٍ سَيُسْتَعْلَنُ الأَثِيمُ، الَّذِي الرَّبُّ يُبِيدُهُ بِنَفْخَةِ فَمِهِ، وَيُبْطِلُهُ بِظُهُورِ مَجِيئِهِ.» [تسالونيكي الثانية ٢ : ٤، ٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبالنسبة لأي من أهل تسالونيكي ممن كانوا يميلون إلى الاعتقاد بأن إنسان الخطية هذا بعيد جدا في المستقبل، أو لأي منا اليوم ممن يميلون للاعتقاد بأنه بعيد في المستقبل، يضيف بولس هذا التحذير المذهل: «لأَنَّ سِرَّ الإِثْمِ الآنَ يَعْمَلُ فَقَطْ،» [تسالونيكي الثانية ٢ : ٧]. الآن يعمل — في القرن الأول، واليوم.\u003c/p\u003e\n\u003cp\u003eوهذا يشبه طريقة يوحنا في الحديث عن ضد المسيح: «أَيُّهَا الأَوْلاَدُ هِيَ السَّاعَةُ الأَخِيرَةُ. وَكَمَا سَمِعْتُمْ أَنَّ ضِدَّ الْمَسِيحِ يَأْتِي، قَدْ صَارَ الآنَ أَضْدَادٌ لِلْمَسِيحِ كَثِيرُونَ. مِنْ هُنَا نَعْلَمُ أَنَّهَا السَّاعَةُ الأَخِيرَةُ.» [يوحنا الأولى ٢ : ١٨]. لا يقول بولس: \"لقد أتى أناس خطية كثيرون\"، مع أنه كان بوسعه أن يقول ذلك. بل ما يقوله هو: \"سر الإثم الآن يعمل\".\u003c/p\u003e\n\u003cp\u003eوالمغزى هو هذا: إياك أن ترخي حبال يقظتك، ظانا أن إنسان الخطية (أو ضد المسيح) لا يزال بعيدا، لأن جوهر قوته الخادعة يعمل الآن بالفعل، وقد يخدعك لدرجة أنك ستكون غافلا تماما عن مهلكة وصوله.\u003c/p\u003e\n\u003cp\u003eدعني أقول هذا مرة أخرى: في اللحظة التي تظن فيها أن النهاية بعيدة جدا في المستقبل، قد يعمي سر الإثم الشيطاني عقلك بالخداع لدرجة أنك تعجز عن رؤية الوصول السريع لإنسان الخطية.\u003c/p\u003e\n\u003ch3\u003eارتداد آت\u003c/h3\u003e\n\u003cp\u003eإن \"الارتداد\" هو أيضا لا يزال في المستقبل. وهذا الحدث أقل تحديدا من ظهور إنسان يعلن نفسه إلها، غير أنه لا يمكن اختزاله في مجرد عملية تمتد لقرون من مواسم الارتداد. لقد آمن بولس بأن هذا الارتداد سيكون قابلا للتمييز بدرجة كافية تجعله قادرا على استخدام غيابه كدليل على أن يوم الرب لم يحضر بعد.\u003c/p\u003e\n\u003cp\u003eسيكون من الصحيح القول: \"لقد بدأ سر الارتداد بالفعل\"، تماما كما يقول بولس: \"سر الإثم الآن يعمل\". وفي الواقع، يتحدث بولس بهذه الطريقة عن انحراف قادم عن الإيمان الحقيقي. فهو يقول: «وَلكِنَّ الرُّوحَ يَقُولُ صَرِيحًا: إِنَّهُ فِي الأَزْمِنَةِ الأَخِيرَةِ يَرْتَدُّ قَوْمٌ عَنِ الإِيمَانِ، تَابِعِينَ أَرْوَاحًا مُضِلَّةً وَتَعَالِيمَ شَيَاطِينَ» [تيموثاوس الأولى ٤ : ١] وهو يتعامل مع هؤلاء الأشخاص كأنهم حاضرون بالفعل ويتصدى لضلالهم (٤ : ١-٥).\u003c/p\u003e\n\u003cp\u003eومرة أخرى يقول بولس: «وَلكِنِ اعْلَمْ هذَا أَنَّهُ فِي الأَيَّامِ الأَخِيرَةِ سَتَأْتِي أَزْمِنَةٌ صَعْبَةٌ، لأَنَّ النَّاسَ يَكُونُونَ مُحِبِّينَ لأَنْفُسِهِمْ، مُحِبِّينَ لِلْمَالِ... فَأَعْرِضْ عَنْ هؤُلاَءِ.» [تيموثاوس الثانية ٣ : ١-٢، ٥]. بعبارة أخرى، يرى بولس أن علامات النهاية حاضرة معنا بشكل أو بآخر دائما.\u003ca href=\"#ch17-fn-3\"\u003e[٣]\u003c/a\u003e ما سيختلف بشأن النهاية هو درجة الشر وكثافته. ويوضح بولس هذا بالإشارة إلى «الَّذِي يَحْجِزُ الآنَ» [تسالونيكي الثانية ٢ : ٧] أي الذي يقيد الشر حاليا، والذي سيُرفع من الوسط، مما سيفسح المجال لشر أعظم في النهاية.\u003c/p\u003e\n\u003cp\u003eإن حقيقة وجود مقدمات متكررة تاريخيا لأحداث وقت النهاية تعني أن معظم العلامات التي تسبق المجيء الثاني ليست من طبيعة تسمح بتحديد مدى قرب النهاية. فهي حقيقية، ولكنها غير دقيقة أيضا. والغاية منها هي بقاؤنا يقظين، مدركين أن الشرور المعتادة في التاريخ قد تتصاعد بسرعة بالغة لتتحول إلى الأحداث النهائية البالغة ذروتها.\u003c/p\u003e\n\u003ch3\u003eحروب وحرب أورشليم\u003c/h3\u003e\n\u003cp\u003eمع وضع ذلك نصب أعيننا، تأمل ما يقول يسوع إنه آت، والذي جاء معظمه بالفعل بطرق شتى. لقد برهنت بأن [متى ٢٤] لا ينبغي أن يُقصر على القرن الأول، بل إن جزءا كبيرا من الأعداد ٤-٣٥، وبانسجام مع تعليم بولس، يشير إلى انقضاء الدهر. ولا أختلف في أنه في [متى ٢٤] (ولاسيما الأعداد ١٥-٢٠)، يرى يسوع كارثة دمار أورشليم في عام ٧٠ م:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَمَتَى رَأَيْتُمْ «رِجْسَةَ الْخَرَابِ» الَّتِي قَالَ عَنْهَا دَانِيآلُ النَّبِيُّ قَائِمَةً فِي الْمَكَانِ الْمُقَدَّسِ، لِيَفْهَمِ الْقَارِئُ، فَحِينَئِذٍ لِيَهْرُبِ الَّذِينَ فِي الْيَهُودِيَّةِ إِلَى الْجِبَالِ، وَالَّذِي عَلَى السَّطْحِ فَلاَ يَنْزِلْ لِيَأْخُذَ مِنْ بَيْتِهِ شَيْئًا، وَالَّذِي فِي الْحَقْلِ فَلاَ يَرْجِعْ إِلَى وَرَائِهِ لِيَأْخُذَ ثِيَابَهُ. وَوَيْلٌ لِلْحَبَالَى وَالْمُرْضِعَاتِ فِي تِلْكَ الأَيَّامِ! وَصَلُّوا لِكَيْ لاَ يَكُونَ هَرَبُكُمْ فِي شِتَاءٍ وَلاَ فِي سَبْتٍ،» [متى ٢٤ : ١٥-٢٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن هذا الحدث الكارثي هو من نوع الأهوال التي طبعت التاريخ لألفي عام. ويدمجه يسوع في تصويره للأحداث المؤدية إلى المجيء النهائي لابن الإنسان، لأن الحياة في هذا الدهر ستتميز بدرجة أو بأخرى بهذا النوع من شر وقت النهاية طوال الطريق. إن الحروب ضد أورشليم هي مجرد تجل ملموس للتنبؤ العام:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَسَوْفَ تَسْمَعُونَ بِحُرُوبٍ وَأَخْبَارِ حُرُوبٍ. اُنْظُرُوا، لاَ تَرْتَاعُوا. لأَنَّهُ لاَ بُدَّ أَنْ تَكُونَ هذِهِ كُلُّهَا، وَلكِنْ لَيْسَ الْمُنْتَهَى بَعْدُ. لأَنَّهُ تَقُومُ أُمَّةٌ عَلَى أُمَّةٍ وَمَمْلَكَةٌ عَلَى مَمْلَكَةٍ، وَتَكُونُ مَجَاعَاتٌ وَأَوْبِئَةٌ وَزَلاَزِلُ فِي أَمَاكِنَ. وَلكِنَّ هذِهِ كُلُّهَا مُبْتَدَأُ الأَوْجَاعِ.» [متى ٢٤ : ٦-٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوحتى دمار أورشليم هو \"مبتدأ الأوجاع\". \"ولكن ليس المنتهى بعد\". لقد نُطقت هذه كلمات فوق ألف كارثة لا توصف واضطهادات مروعة خلال الألفي عام الماضية. وبالنسبة لأولئك الذين مروا بالكوارث، أو ماتوا فيها، فقد شعروا بالقوة الكاملة للشرور النهائية لهذا الدهر. لقد بدأت أوجاع مخاض وقت النهاية بالفعل.\u003c/p\u003e\n\u003cp\u003eغير أنه لا توجد طريقة لحساب كم عدد الزلازل [متى ٢٤ : ٧]، أو عدد المجاعات (٢٤ : ٧)، أو عدد الحروب (٢٤ : ٦)، أو عدد المسحاء الكذبة (٢٤ : ٥) أو الأنبياء الكذبة (٢٤ : ١٠)، أو مقدار الإثم أو برود المحبة (٢٤ : ١٢)، أو مدى شدة الضيقة (٢٤ : ٩، ٢١، ٢٩) التي ستشير بيقين إلى مدى قرب المجيء الثاني. دعني أقول ذلك مرة أخرى: معظم \"علامات\" النهاية التي يعطينا إياها يسوع هي من نوع الأحداث التي لا تخضع لتحديد المواعيد. فكميات وكثافات وتواترات مثل هذه الأحداث ليست مؤشرات دقيقة لمدى قرب مجيء الرب.\u003c/p\u003e\n\u003ch3\u003eأوجاع المخاض ليست بلا مغزى\u003c/h3\u003e\n\u003cp\u003eومما لا شك فيه أنه يجب علينا أن نطيع يسوع عندما يقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَمِنْ شَجَرَةِ التِّينِ تَعَلَّمُوا الْمَثَلَ: مَتَى صَارَ غُصْنُهَا رَخْصًا وَأَخْرَجَتْ أَوْرَاقَهَا، تَعْلَمُونَ أَنَّ الصَّيْفَ قَرِيبٌ. هكَذَا أَنْتُمْ أَيْضًا، مَتَى رَأَيْتُمْ هذَا كُلَّهُ فَاعْلَمُوا أَنَّهُ قَرِيبٌ عَلَى الأَبْوَابِ. اَلْحَقَّ أَقُولُ لَكُمْ: لاَ يَمْضِي هذَا الْجِيلُ حَتَّى يَكُونَ هذَا كُلُّهُ.» [متى ٢٤ : ٣٢-٣٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن إطاعة هذه الكلمات لا تورطنا في فعل ما قال يسوع إنه هو نفسه لم يكن يستطيع فعله، ألا وهو معرفة وقت مجيئه [متى ٢٤ : ٣٦]. ومع ذلك، يأمرنا يسوع أن ننظر إلى \"شجرة التين\". يأمرنا أن ننظر إلى \"هذا كله\" — أي أنواع الأحداث التي كانت تقع في الجيل التالي، وفي كل جيل تقريبا منذ ذلك الحين.\u003c/p\u003e\n\u003cp\u003eانظروا إليها. دعوا أي مقدار أو كمية أو كثافة أو تواتر ترونه في زمانكم ومكانكم يذكركم بأن هذه هي أوجاع مخاض النهاية. فأوجاع المخاض ليست بلا مغزى. دعوا المسحاء الكذبة، والحروب، والنزاعات العالمية، والمجاعات، والزلازل، والكراهية، والخيانات، والارتداد، والضيقة، تذكركم بأن النهاية قريبة — قريبة إمكانيا، قريبة شموليا، قريبة إلهيا.\u003ca href=\"#ch17-fn-4\"\u003e[٤]\u003c/a\u003e\u003c/p\u003e\n\u003ch3\u003eوعد انتصار الإرسالية\u003c/h3\u003e\n\u003cp\u003eماذا عن الوعد القائل: «وَيُكْرَزُ بِبِشَارَةِ الْمَلَكُوتِ هذِهِ فِي كُلِّ الْمَسْكُونَةِ شَهَادَةً لِجَمِيعِ الأُمَمِ. ثُمَّ يَأْتِي الْمُنْتَهَى.» [متى ٢٤ : ١٤]؟ هل يمكننا هذا من معرفة وقت مجيء يسوع؟\u003c/p\u003e\n\u003cp\u003eأولئك الذين يعتقدون أن الأحداث المتنبأ بها في [متى ٢٤ : ٤-٣٥] ينبغي أن تُقتصر على الأحداث المؤدية إلى عام ٧٠ م، يبرهنون بأن الإرسالية إلى الأمم المتنبأ بها في العدد ١٤ قد تحققت بحلول ذلك التاريخ.\u003ca href=\"#ch17-fn-5\"\u003e[٥]\u003c/a\u003e وأن \"المنتهى\" كان عام ٧٠ م. لقد برهنت باستفاضة في الفصل السادس عشر بأنني أرى من الخطأ قصر هذه الأحداث على القرن الأول. وفضلا عن تلك الحجج، تأمل ثلاث ملاحظات تتعلق بالوعد القائل بأن \"المنتهى\" سيأتي بعد أن ينتشر الإنجيل إلى الحد الذي يقصده الله.\u003c/p\u003e\n\u003ch4\u003e١. \"ثم يأتي المنتهى\"\u003c/h4\u003e\n\u003cp\u003eمن المرجح أن مصطلح \"المنتهى\" (\"ثم يأتي المنتهى\") يشير إلى الحقيقة ذاتها التي سأل عنها التلاميذ: «قُلْ لَنَا مَتَى يَكُونُ هذَا؟ وَمَا هِيَ عَلاَمَةُ مَجِيئِكَ وَانْقِضَاءِ الدَّهْرِ؟» [متى ٢٤ : ٣]. وجزء من إجابة يسوع هو أن الإنجيل سيصل إلى الأمم، \"ثم يأتي المنتهى\". غير أن المصطلح الذي استخدمه التلاميذ كان \"انقضاء الدهر\".\u003c/p\u003e\n\u003cp\u003eكان التلاميذ قد سمعوا يسوع يستخدم هذا المصطلح. ففي [متى ١٣ : ٣٦-٥٠]، على سبيل المثال، يظهر ثلاث مرات. وفي جميع الحالات الثلاث، يشير إلى وقت الدينونة الأ
