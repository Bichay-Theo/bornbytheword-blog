لفداء غير مكتمل.\u003c/p\u003e\n\u003cp\u003eوالسبب في ذلك يعود إلى أن قصد الله الأسمى يكمن في تعظيم مجد المسيح بأكمل صورة من خلال اكتفاء شعبه التام به. فقصدُهُ لا يقتصر على مجرد تزامن تمجيد ابنه مع سعادة شعبه، بل أن تكون سعادة شعبه قائمة على مجد المسيح، بحيث يشرق تمجيد المسيح بأبهى صوره في سعادة شعبه به. لقد صمم الله الفداء بحيث تبلغ سعادة الإنسان وتمجيد المسيح ملأهما تحديداً لأن سعادة الإنسان مؤسسة على مجد المسيح. سيتمجد المسيح أعظم تمجيد في شعبه لأن شعبه سيجد فيه أعظم اكتفاء.\u003c/p\u003e\n\u003ch3\u003eكيف لقديسين معاقين عاطفياً أن يتعجبوا كما ينبغي؟\u003c/h3\u003e\n\u003cp\u003eغير أننا لم نتطرق بعد إلى حقيقة أن استجابة شعب المسيح المليئة بالتعجب والعبادة والمحبة لا يمكن أن تبلغ ما ينبغي لها أن تكون، إن كان لزاماً علينا أن نلتقي بالرب في ذلك اليوم بقدراتنا العاطفية الضئيلة، والمصابة بعدوى الخطية، والضعيفة، والساقطة في حالتنا الحاضرة—حتى في حالتنا الحاضرة المفدية، والمبررة، والمقدسة جزئياً. فبالنظر إلى قتامة رؤيتنا الروحية الحالية، وحالة الشلل التي تعتري قدراتنا العاطفية، والفساد المتبقي في قلوبنا الساقطة، يستحيل أن يتلقى المسيح منا عند مجيئه ترحيباً لائقاً من التعجب والعبادة والمحبة. وتلك هي المعضلة التي سأتصدى لها في هذا الفصل.\u003c/p\u003e\n\u003cp\u003eولكن قبل الشروع في تناول هذه المعضلة، يجدر بنا أن ندرك أن المشكلة ذاتها قائمة فيما يتعلق بعدم اكتمال ما ورد في الفصلين الخامس والسادس. فقد تركزت فكرة الفصلين على أن نعمة ستُمنح للمؤمنين المسيحيين عند المجيء الثاني. «فَأَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ» (بطرس الأولى ١: ١٣). سيُوجد المسيحيون الحقيقيون بلا لوم في ذلك اليوم. وسيتجلى عمل الله التقديسي في حياتنا لتحويلنا من أناس متكبرين وأنانيين إلى أناس متواضعين ومحبين (وإن كنا غير كاملين) ليؤكد أصالة إيماننا بالمسيح واتحادنا به. وسيكون ذلك الاتحاد هو أساس النعمة لكوننا بلا لوم عند مجيئه.\u003c/p\u003e\n\u003cp\u003eلكن المعضلة، كما هو الحال في الفصلين الثالث والرابع، تتمثل في أنه ما من تابع للمسيح سيكتفي البتة بكونه بلا لوم عن طريق الاحتساب بفضل المسيح، ما لم نتغير أيضاً في القلب والعقل والجسد لنصبح بلا لوم خلواً من الخطية، ومحررين من كل شائبة وعائق يقف في طريق عبادتنا. ومما لا شك فيه أن حالة \"بلا لوم\" المحتسبة لنا بناءً على التبرير بالإيمان هي حالة مجيدة وثمينة، ولا رجاء لنا بدونها. غير أن قصد الله لا يتلخص في إبقاء شعبه يخطئ إلى الأبد ويكتفي بفرح نوال المغفرة واحتسابه بلا لوم. بل قصد الله هو أن ننتقل من كوننا خطاة مغفوراً لهم إلى أناس مغفور لهم وبلا خطية. وإن لم يتحقق هذا، فلن نتمكن أبداً من التمتع بالله وعبادته وتمجيده كما ينبغي.\u003c/p\u003e\n\u003cp\u003eذلك لأن جوهر الخطية عينه يتمثل في تفضيل أشياء أخرى على الله. فإن أردنا التمتع بالله وتمجيده كما ينبغي، وكما نشتهي، فلا يجب أن نُحتسب كاملين في المسيح فحسب، بل أن نُجعل كاملين—عقلاً وقلباً وجسداً—بواسطة المسيح. هذا التغيير سيحدث عند مجيء المسيح، وهو موضوع هذا الفصل.\u003c/p\u003e\n\u003ch3\u003eافتداء النفس والجسد\u003c/h3\u003e\n\u003cp\u003eإن أحد الأسباب المذهلة للعقول التي تدفعنا لمحبة مجيء المسيح هو أن جميع المسيحيين الراقدين سيقامون من الأموات بأجساد قيامتهم الجديدة (كورنثوس الأولى ١٥: ٢٣، ٤٣)، وأن جميع المسيحيين الأحياء عند مجيئه سيُغيرون ليكون لهم أجساد على صورة جسد قيامة المسيح المجيد (فيلبي ٣: ٢١). ليس هذا فحسب، بل إنه بالتزامن مع هذه المعجزة المادية المتمثلة في القيامة الجسدية والتغيير، سيحدث أيضاً تغيير أخلاقي وروحي للأحياء عند مجيئه (يوحنا الأولى ٣: ٢) بحيث لن نخطئ ثانية أبداً. أما بالنسبة لأولئك المؤمنين (بمن فيهم قديسو العهد القديم) الذين رقدوا قبل مجيء المسيح، فإن ذلك التغيير الروحي يحدث في محضر المسيح قبل المجيء الثاني (عبرانيين ١٢: ٢٣).\u003c/p\u003e\n\u003cp\u003eتُعد كل من القيامة الجسدية والتغيير الروحي أمرين حتميين لإتمام مقاصد الله القصوى. فشعبه يجب أن يجتاز في عملية التكميل الجسدي والأخلاقي معاً. وإن كان مجد المسيح سيُعظم في المجيء الثاني تعظيماً لائقاً في تعجب شعبه (تسالونيكي الثانية ١: ١٠)، فلا بد أن يُعتق تعجبهم هذا من فساد الخطية وقيودها؛ بل يجب أن يتغير ويُكمل. فالمسيح لا يستحق أقل من ذلك. ومما لا شك فيه أن مجد نعمة الله يشرق بجمال فائق في احتساب المؤمنين غير الكاملين أبراراً. ولكن في المسيح نعمة تفوق مجرد النعمة المبررة؛ فهناك أيضاً القوة المقتدرة للنعمة المُقدسة والمُطهرة (كورنثوس الأولى ١٥: ١٠؛ كورنثوس الثانية ٩: ٨؛ تسالونيكي الثانية ١: ١١–١٢). ولكي يتمجد المسيح في تعجبنا عند مجيئه، يجب أن تنتصر تلك النعمة أيضاً في تغييرنا الكامل. وإلا فإن خطيتنا ستشوه تعجبنا.\u003c/p\u003e\n\u003cp\u003eليس هذا فحسب، بل إنه لكي يتمجد المسيح تمجيداً لائقاً في شعبه عند المجيء الثاني، يجب أن تُمجد أجسادهم بطريقة تعكس مجد المسيح. فالأجساد التي تحمل عيوب البُطل وفساد السقوط (رومية ٨: ٢٠–٢١) لا يمكنها أبداً أن تعظم المسيح كما ينبغي. ولا يقتصر السبب في ذلك على أن إقامة أجسادنا وتكميلها سيمجد قوته «بِحَسَبِ عَمَلِ اسْتِطَاعَتِهِ أَنْ يُخْضِعَ لِنَفْسِهِ كُلَّ شَيْءٍ» (فيلبي ٣: ٢١). بل يعود السبب أيضاً إلى أن أجسادنا هي الأدوات التي صممها الله لعقولنا وقلوبنا، لكي تجعل تسبيحاتنا مسموعة وطاعة محبتنا مرئية. إن التضافر الذي صممه الله بين النفس والجسد (والذي بالكاد يستطيع العلم الحديث سبر أغواره) يستلزم أجساداً مفدية إلى جانب النفوس المفدية، إن كان لتسبيح نفوسنا وطاعتها أن تجد التعبير الجسدي الذي يستحقه المسيح.\u003c/p\u003e\n\u003cp\u003eلطالما وُجد معلمون كذبة يحتقرون الوجود الجسدي معتبرين إياه معيباً في جوهره وعبئاً يعيق الروح الإنسانية. غير أن النظرة الكتابية للجسد تختلف اختلافاً جذرياً. فالجسد ليس مجرد جزء من خليقة الله التي كانت \"حَسَنٌ جِدًّا\" قبل السقوط (تكوين ١: ٣١)، بل هو مُعد ليُقام، ويُكمل، ويُجعل جزءاً أبدياً من عبادتنا وطاعتنا. وكما هو الحال مع المسيح، سيمتلك شعب الله أجساداً مادية مُمجدة إلى الأبد. فإن كانت فكرتنا عن الأبدية تتمحور حول مستقبل لأرواح بلا أجساد في السماء، فينبغي لنا أن نمتحن نظرتنا هذه في ضوء التعليم الكتابي الذي يقرر أن السماء ستنزل إلى أرض جديدة حيث يعبد أناس متجسدون مسيحاً متجسداً (رؤيا ٢١: ١، ٢، ١٠).\u003c/p\u003e\n\u003cp\u003eوعليه، فإن التغيير الجسدي والروحي الذي يقع عند المجيء الثاني يُعد أمراً حتمياً لإتمام قصد الله الأسمى للخليقة. دعونا نتناول أولاً القيامة الجسدية ثم التغيير الأخلاقي لقلوبنا وعقولنا، وكلاهما يبلغ كماله عند المجيء الثاني للمسيح \u003ca href=\"#ch7-fn-1\"\u003e[١]\u003c/a\u003e.\u003c/p\u003e\n\u003ch3\u003eالمسيح أقام جسده، وسيقيم أجسادنا\u003c/h3\u003e\n\u003cp\u003eلقد واجه يسوع الصدوقيين الذين لم يؤمنوا بالقيامة. «وَجَاءَ إِلَيْهِ قَوْمٌ مِنَ الصَّدُّوقِيِّينَ، الَّذِينَ يَقُولُونَ لَيْسَ قِيَامَةٌ» (مرقس ١٢: ١٨). وكان رده عليهم واضحاً وصارماً: «أَلَيْسَ لِهذَا تَضِلُّونَ، إِذْ لاَ تَعْرِفُونَ الْكُتُبَ وَلاَ قُوَّةَ اللهِ؟» (١٢: ٢٤). لم يكتفِ يسوع بالإيمان بقيامة الأموات، بل كان يعلم يقيناً أن الله الآب قد أعطاه السلطان لإتمامها. «لأَنَّهُ كَمَا أَنَّ الآبَ لَهُ حَيَاةٌ فِي ذَاتِهِ، كَذلِكَ أَعْطَى الابْنَ أَيْضًا أَنْ تَكُونَ لَهُ حَيَاةٌ فِي ذَاتِهِ، وَأَعْطَاهُ سُلْطَانًا أَنْ يَدِينَ أَيْضًا، لأَنَّهُ ابْنُ الإِنسَانِ» (يوحنا ٥: ٢٦، ٢٧). وهكذا، استطاع يسوع أن يقول: «أَنَا هُوَ الْقِيَامَةُ» (يوحنا ١١: ٢٥). وهو يعد بأنه سيقيم شعبه من الأموات في اليوم الأخير:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«كُلُّ مَا يُعْطِينِي الآبُ فَإِلَيَّ يُقْبِلُ، وَمَنْ يُقْبِلْ إِلَيَّ لاَ أُخْرِجْهُ خَارِجًا. لأَنِّي قَدْ نَزَلْتُ مِنَ السَّمَاءِ، لِكَيْ لاَ أَعْمَلَ مَشِيئَتِي، بَلْ مَشِيئَةَ الَّذِي أَرْسَلَنِي. وَهذِهِ مَشِيئَةُ الآبِ الَّذِي أَرْسَلَنِي: أَنَّ كُلَّ مَا أَعْطَانِي لاَ أُتْلِفُ مِنْهُ شَيْئًا، بَلْ أُقِيمُهُ فِي الْيَوْمِ الأَخِيرِ. لأَنَّ هذِهِ هِيَ مَشِيئَةُ الَّذِي أَرْسَلَنِي: أَنَّ كُلَّ مَنْ يَرَى الابْنَ وَيُؤْمِنُ بِهِ تَكُونُ لَهُ حَيَاةٌ أَبَدِيَّةٌ، وَأَنَا أُقِيمُهُ فِي الْيَوْمِ الأَخِيرِ.» (يوحنا ٦: ٣٧–٤٠؛ راجع العدد ٥٤)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد صرح يسوع بأنه هو نفسه مَن سيقيم شعبه من الأموات، تماماً كما صرح بأنه سيقيم جسده هو من القبر. «لَيْسَ أَحَدٌ يَأْخُذُهَا مِنِّي، بَلْ أَضَعُهَا أَنَا مِنْ ذَاتِي. لِي سُلْطَانٌ أَنْ أَضَعَهَا وَلِي سُلْطَانٌ أَنْ آخُذَهَا أَيْضًا» (يوحنا ١٠: ١٨). «انْقُضُوا هذَا الْهَيْكَلَ، وَفِي ثَلاَثَةِ أَيَّامٍ أُقِيمُهُ» (يوحنا ٢: ١٩). وهذا لا يناقض تصريح يسوع المتكرر بأنه \"يقوم\" من الأموات بقدرة الله (متى ١٦: ٢١؛ ١٧: ٢٣؛ ٢٠: ١٩).\u003c/p\u003e\n\u003cp\u003eلقد اشترك الثالوث بأسره في قيامة يسوع، بما في ذلك الروح القدس: «وَإِنْ كَانَ رُوحُ الَّذِي أَقَامَ يَسُوعَ مِنَ الأَمْوَاتِ سَاكِنًا فِيكُمْ، فَالَّذِي أَقَامَ الْمَسِيحَ مِنَ الأَمْوَاتِ سَيُحْيِي أَجْسَادَكُمُ الْمَائِتَةَ أَيْضًا بِرُوحِهِ السَّاكِنِ فِيكُمْ» (رومية ٨: ١١). والاستنتاج الطبيعي هنا هو أن الله سيقيمنا \"بواسطة الروح\"، كما أقام يسوع \"بواسطة الروح\".\u003c/p\u003e\n\u003ch3\u003eمقامون بفعل الثالوث لننال جسداً مثل جسد الابن\u003c/h3\u003e\n\u003cp\u003eوبناءً على ذلك، نكتشف أن المسيحيين يُقامون من الأموات ليس فقط بواسطة الروح (رومية ٨: ١١)، بل بفعل الله (الآب) والمسيح (الابن):\u003c/p\u003e\n\u003cp\u003e«وَلكِنَّ الْجَسَدَ لَيْسَ لِلزِّنَا بَلْ لِلرَّبِّ، وَالرَّبُّ لِلْجَسَدِ. وَاللهُ قَدْ أَقَامَ الرَّبَّ، وَسَيُقِيمُنَا نَحْنُ أَيْضًا بِقُوَّتِهِ.» (كورنثوس الأولى ٦: ١٣، ١٤)\u003c/p\u003e\n\u003cp\u003e«فَإِنَّ سِيرَتَنَا نَحْنُ هِيَ فِي السَّمَاوَاتِ، الَّتِي مِنْهَا أَيْضًا نَنْتَظِرُ مُخَلِّصًا هُوَ الرَّبُّ يَسُوعَ الْمَسِيحِ، الَّذِي سَيُغَيِّرُ شَكْلَ جَسَدِ تَوَاضُعِنَا لِيَكُونَ عَلَى صُورَةِ جَسَدِ مَجْدِهِ، بِحَسَبِ عَمَلِ اسْتِطَاعَتِهِ أَنْ يُخْضِعَ لِنَفْسِهِ كُلَّ شَيْءٍ.» (فيلبي ٣: ٢٠، ٢١)\u003c/p\u003e\n\u003cp\u003eترتبط قيامة المسيح بقيامتنا في كلا النصين. فالرابط في (كورنثوس الأولى ٦: ١٤) يعود إلى أن الله هو من يُتمم كلا القيامتين. والرابط في (فيلبي ٣: ٢٠، ٢١) جاء ليوضح أن أجساد قيامتنا ستكون على صورة جسد قيامة المسيح. فسبب كلا القيامتين سيكون واحداً—وهو الله. وتأثير كلا القيامتين سيكون واحداً—أي «عَلَى صُورَةِ جَسَدِ مَجْدِهِ» (σύμμορφον τῷ σώματι τῆς δόξης αὐτοῦ). ويؤكد بولس أن قيامتنا وقيامة المسيح هما جزء من حصاد عظيم واحد. «وَلكِنِ الآنَ قَدْ قَامَ الْمَسِيحُ مِنَ الأَمْوَاتِ وَصَارَ بَاكُورَةَ الرَّاقِدِينَ» (كورنثوس الأولى ١٥: ٢٠). فباكورة الثمار تُحدد الحصاد بأكمله وتضمنه.\u003c/p\u003e\n\u003cp\u003eكان جسد قيامة المسيح جسداً مادياً حقيقياً، وكان مشابهاً لجسده قبل القيامة بدرجة كافية تجعله معروفاً، وملموساً، وقادراً على أكل السمك. «اُنْظُرُوا يَدَيَّ وَرِجْلَيَّ: إِنِّي أَنَا هُوَ! جُسُّونِي وَانْظُرُوا، فَإِنَّ الرَّوحَ لَيْسَ لَهُ لَحْمٌ وَعِظَامٌ كَمَا تَرَوْنَ لِي. [...] فَنَاوَلُوهُ جُزْءًا مِنْ سَمَكٍ مَشْوِيٍّ، وَشَيْئًا مِنْ شَهْدِ عَسَلٍ. فَأَخَذَ وَأَكَلَ قُدَّامَهُمْ» (لوقا ٢٤: ٣٩، ٤٢، ٤٣). هكذا ستكون أجساد قيامتنا مادية تماماً.\u003c/p\u003e\n\u003ch3\u003eسنقام في مجيئه\u003c/h3\u003e\n\u003cp\u003eمتى يحدث هذا؟ سيحدث عند المجيء الثاني للمسيح. ويمكننا رؤية ذلك في ثلاثة نصوص. يقول بولس في (كورنثوس الأولى ١٥: ٢٢، ٢٣): «لأَنَّهُ كَمَا فِي آدَمَ يَمُوتُ الْجَمِيعُ، هكَذَا فِي الْمَسِيحِ سَيُحْيَا الْجَمِيعُ. وَلكِنَّ كُلَّ وَاحِدٍ فِي رُتْبَتِهِ: الْمَسِيحُ بَاكُورَةٌ، ثُمَّ الَّذِينَ لِلْمَسِيحِ فِي مَجِيئِهِ». \"فِي مَجِيئِهِ\". هذا هو الوقت الذي سيُقام فيه الذين ينتمون إليه. وهذه ليست القيامة العامة لجميع البشر، بل للمسيحيين وحدهم \u003ca href=\"#ch7-fn-2\"\u003e[٢]\u003c/a\u003e.\u003c/p\u003e\n\u003cp\u003eوالنص الثاني الذي يحدد قيامتنا عند المجيء الثاني هو (فيلبي ٣: ٢٠، ٢١): «فَإِنَّ سِيرَتَنَا نَحْنُ هِيَ فِي السَّمَاوَاتِ، الَّتِي مِنْهَا أَيْضًا نَنْتَظِرُ مُخَلِّصًا هُوَ الرَّبُّ يَسُوعَ الْمَسِيحِ، الَّذِي سَيُغَيِّرُ شَكْلَ جَسَدِ تَوَاضُعِنَا لِيَكُونَ عَلَى صُورَةِ جَسَدِ مَجْدِهِ، بِحَسَبِ عَمَلِ اسْتِطَاعَتِهِ AN يُخْضِعَ لِنَفْسِهِ كُلَّ شَيْءٍ». فحين يأتي المخلص، ستتغير أجساد المسيحيين. ولا يفرق بولس هنا بين أجساد المسيحيين الأحياء عند مجيء الرب وأجساد المسيحيين الذين رقدوا. فكلاهما سينال أجساداً جديدة على صورة جسد المسيح المجيد.\u003c/p\u003e\n\u003cp\u003eأما النص الثالث الذي يحدد قيامتنا عند المجيء الثاني، فيُظهر اهتمام بولس الخاص بالمسيحيين الذين رقدوا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَإِنَّنَا نَقُولُ لَكُمْ هذَا بِكَلِمَةِ الرَّبِّ: إِنَّنَا نَحْنُ الأَحْيَاءَ الْبَاقِينَ إِلَى مَجِيءِ الرَّبِّ، \u003ca href=\"#ch7-fn-3\"\u003e[٣]\u003c/a\u003e لاَ نَسْبِقُ الرَّاقِدِينَ. لأَنَّ الرَّبَّ نَفْسَهُ بِهُتَافٍ، بِصَوْتِ رَئِيسِ مَلاَئِكَةٍ وَبُوقِ اللهِ، سَوْفَ يَنْزِلُ مِنَ السَّمَاءِ وَالأَمْوَاتُ فِي الْمَسِيحِ سَيَقُومُونَ أَوَّلاً. ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ، وَهكَذَا نَكُونُ كُلَّ حِينٍ مَعَ الرَّبِّ». (تسالونيكي الأولى ٤: ١٥–١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eكان هدف بولس الرعوي المباشر هنا هو تشجيع أولئك الذين فقدوا أحباء مسيحيين بالموت. لقد كان الترقب الفرح للمجيء الثاني رجاءً بارزاً للمؤمنين لدرجة أنه قد أثير التساؤل: هل سيفوت المؤمنين الراقدين الظهور المجيد للمسيح في يوم مجيئه؟ ومن الدلالة بمكان أن بولس لم يختر تعزيتهم بحقيقة (فيلبي ١: ٢٣)، القائلة بأن «أَنْطَلِقَ وَأَكُونَ مَعَ الْمَسِيحِ، ذَاكَ أَفْضَلُ جِدًّا». ولم يعزهم بحقيقة (كورنثوس الثانية ٥: ٨)، القائلة: «نَتَغَرَّبَ عَنِ الْجَسَدِ وَنَسْتَوْطِنَ عِنْدَ الرَّبِّ». فذلك لم يكن ما كان يتساءل عنه الأحباء الباقون.\u003c/p\u003e\n\u003cp\u003eلقد تساءلوا: وماذا عن المجيء الثاني؟ ماذا عن الظهور المجيد للرب—ذلك النزول المذهل على السحاب، والهتاف، وصوت رئيس الملائكة، وبوق الله، والرب نفسه، شخصياً، وحاضراً، ومرئياً، ليبرر في لحظة واحدة كل عمل إيماني خاض غمار الحرب؟ ماذا عن كل ذلك? هل سيكون أحباؤنا مشاركين بالكامل في ذلك اليوم؟ إن أحد دوافعي لكتابة هذا الكتاب هو أن العديد من المسيحيين اليوم سيجدون تعليم بولس الرعوي هنا غريباً عن طريقة تفكيرهم. فهم لن يشاركوا أهل تسالونيكي قلقهم بشأن المشاركة في مجيء الرب، بل سيكتفون بمعرفة أن التغرب عن الجسد يعني الاستيطان عند الرب (كورنثوس الثانية ٥: ٨).\u003c/p\u003e\n\u003cp\u003eغير أن بولس يجتهد ليوضح أن الراقدين لن يكونوا في أي موقف أدنى فيما يختص باختبار المجد الكامل لذلك اليوم العظيم. وهو ينفي أن يكون للأحياء عند مجيء المسيح أي أفضلية على الراقدين. ولتوضيح ذلك جلياً، يركز على قيامة أجساد الذين رقدوا. والمجيء الثاني للمسيح هو الوقت الذي سيحدث فيه ذلك:\u003c/p\u003e\n\u003cp\u003e«إِنَّنَا نَحْنُ الأَحْيَاءَ الْبَاقِينَ إِلَى مَجِيءِ الرَّبِّ، لاَ نَسْبِقُ الرَّاقِدِينَ. [...] الأَمْوَاتُ فِي الْمَسِيحِ سَيَقُومُونَ أَوَّلاً. ثُمَّ نَحْنُ الأَحْيَاءَ الْبَاقِينَ سَنُخْطَفُ جَمِيعًا مَعَهُمْ فِي السُّحُبِ لِمُلاَقَاةِ الرَّبِّ فِي الْهَوَاءِ». (تسالونيكي الأولى ٤: ١٥–١٧)\u003c/p\u003e\n\u003cp\u003eهذا الترحيب المذهل من قِبل ملايين من شعب الله، عبر كافة العصور، سيشترك فيه كل مؤمن. ولتحقيق هذه الغاية، سيُقام جميع الراقدين عند مجيئه.\u003c/p\u003e\n\u003ch3\u003eإكمال تقدم الأرض وكمالات السماء\u003c/h3\u003e\n\u003cp\u003eلكن تركيزنا في هذا الفصل لا ينصب على أحداث مجيء الرب بقدر ما ينصب على تأثيرات هذه الأحداث في تغيير المؤمنين. فاهتمامنا يتمحور حول تمجيدنا للمسيح عند مجيئه بطريقة تليق بعظمته وجماله وقيمته. وهذا لا يمكن أن يحدث ما لم تتغير أجسادنا ونفوسنا. فقتامة رؤيتنا الروحية، وضعف عواطفنا، والفساد المتبقي في قلوبنا الساقطة يجب أن يتغير إن كان للمسيح أن يتمجد في تعجبنا كما ينبغي (تسالونيكي الثانية ١: ١٠). لقد فسد الجسد والنفس معاً بسبب السقوط، ولذا يجب أن يُفديا. يبدأ هذا الفداء في هذه الحياة من خلال موت يسوع وقيامته. يبدأ فينا بالولادة الجديدة، وغفران الخطايا، والتبرير، والتقديس المستمر. ولكنه يبلغ كماله عند مجيء المسيح.\u003c/p\u003e\n\u003cp\u003eحتى أفراح المؤمنين الراقدين في محضر المسيح، ورغم كونها أعظم من أي شيء عُرف في هذه الحياة (فيلبي ١: ٢٣)، إلا أنها تظل غير مكتملة. فتلك الأفراح قد صُممت لتفيض في تعبير مادي من خلال أجساد مجيدة بتسبيح متقد وطاعة فرحة. ورغم أن جوهر تسبيحنا وطاعتنا هو داخلي، إلا أن كماله خارجي. ورغم أن أمجاد المسيح الروحية هي المصدر الأسمى لفرحنا، إلا أن التجليات المادية لتلك الأمجاد من خلال الخليقة المادية، بما في ذلك جسده المجيد والعالم الجديد، هي جزء من خطة الله للتمجيد الأكمل لابنه.\u003c/p\u003e\n\u003cp\u003eإن تكميل أرواحنا في السماء بعد الموت، وقبل المجيء الثاني، هو اختبار عظيم ومجيد ومفرح يتجاوز بمسافات شاسعة أي فرح في هذا العالم الحاضر. تصف رسالة العبرانيين القديسين في السماء بأنهم «أَرْوَاحِ أَبْرَارٍ مُكَمَّلِينَ» (عبرانيين ١٢: ٢٣). فالمؤمنون بيسوع لن يخطئوا ثانية قط بعد الموت؛ بل سنُكمل روحياً وأخلاقياً. ولذلك، قال بولس: «لِيِ اشْتِهَاءٌ أَنْ أَنْطَلِقَ وَأَكُونَ مَعَ الْمَسِيحِ» (فيلبي ١: ٢٣)، أو حين قال: «وَنُسَرُّ بِالأَوْلَى أَنْ نَتَغَرَّبَ عَنِ الْجَسَدِ وَنَسْتَوْطِنَ عِنْدَ الرَّبِّ» (كورنثوس الثانية ٥: ٨).\u003c/p\u003e\n\u003cp\u003eغير أن هذه لم تكن طِلبته العظمى—أي أن يكون روحاً بلا جسد وبلا خطية في السماء مع المسيح. إن ذلك الاختبار الخالي من الخطية مع المسيح في السماء سيكون أفضل بكثير من أي اختبار على الأرض، بل أفضل بصورة مجيدة. غير أنه ليس الهدف النهائي. وليس هو الأفضل في قصد الله، ولا يمثل كمال الفداء. فعندما كان بولس يئن تحت وطأة بؤس هذا الدهر الساقط، لم يكن يحلم في المقام الأول بالهروب من جسد متألم، بل كان يصبو في المقام الأول إلى جسد مفدي: «وَلَيْسَ هكَذَا فَقَطْ، بَلْ نَحْنُ الَّذِينَ لَنَا بَاكُورَةُ الرُّوحِ، نَحْنُ أَنْفُسُنَا أَيْضًا نَئِنُّ فِي أَنْفُسِنَا، مُتَوَقِّعِينَ التَّبَنِّيَ فِدَاءَ أَجْسَادِنَا» (رومية ٨: ٢٣). وكان هذا التوقع المتلهف منصباً على المجيء الثاني.\u003c/p\u003e\n\u003ch3\u003eسبق تعييننا لنكون مشابهين لابن الله — جسدياً\u003c/h3\u003e\n\u003cp\u003eمنذ الأزل، كانت خطة الله هي أن يُمدح مجد نعمته (أفسس ١: ٤–٦) من خلال قلوب وأجساد شعب مفدي. لقد خطط أن يكون هذا التسبيح النابع من القلب والمُعبر عنه جسدياً لائقاً بعظمة ابنه. وقد ضمن هذا التسبيح اللائق من خلال سبق تعيينه لشعبه ليكونوا مشابهين للمسيح—ليعكسوا مجد ابنه ويشتركوا فيه. «لأَنَّ الَّذِينَ سَبَقَ فَعَرَفَهُمْ سَبَقَ فَعَيَّنَهُمْ لِيَكُونُوا مُشَابِهِينَ صُورَةَ ابْنِهِ، لِكَيْ يَكُونَ هُوَ بِكْرًا بَيْنَ إِخْوَةٍ كَثِيرِينَ» (رومية ٨: ٢٩). هذه المشابهة للابن هي التي تمكّن المسيحيين من عكس مجد المسيح وتسبيحه كما ينبغي.\u003c/p\u003e\n\u003cp\u003eلم تُستخدم هذه الكلمة \"مشابهين\" (συμμόρφους) إلا في موضع واحد آخر في العهد الجديد. «نَنْتَظِرُ مُخَلِّصًا هُوَ الرَّبُّ يَسُوعَ الْمَسِيحِ، الَّذِي سَيُغَيِّرُ شَكْلَ جَسَدِ تَوَاضُعِنَا لِيَكُونَ مُشَابِهًا [σύμμορφον] لِجَسَدِ مَجْدِهِ، بِحَسَبِ عَمَلِ اسْتِطَاعَتِهِ أَنْ يُخْضِعَ لِنَفْسِهِ كُلَّ شَيْءٍ» (فيلبي ٣: ٢٠–٢١). وهذا يعني إذن أن مشابهة صورة الابن للمُعيّنين سلفاً في (رومية ٨: ٢٩) تتضمن مشابهة جسد المسيح. كان هذا جزءاً من الخطة الأزلية العظيمة، لأنه بدون أجساد مجيدة كجسد المسيح، لن يكون بوسعنا أن نعكس مجد المسيح أو نعبر عنه كما ينبغي.\u003c/p\u003e\n\u003ch3\u003eسنضيء كالشمس عند مجيء المسيح\u003c/h3\u003e\n\u003cp\u003eعند ظهور المسيح، سيصبح جسد أحقر المؤمنين، وأشدهم دمامة، وأكثرهم تشوهاً، وأشدهم إعاقة، وأكثرهم احتقاراً ونبذاً، على صورة جسد المسيح المجيد. كيف سيكون ذلك؟ إليكم صورة المسيح المُقام كما رسمتها لنا كلمات الرسول يوحنا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَالْتَفَتُّ لأَنْظُرَ [...] شِبْهُ ابْنِ إِنْسَانٍ، مُتَسَرْبِلاً بِثَوْبٍ إِلَى الرِّجْلَيْنِ، وَمُتَمَنْطِقًا عِنْدَ ثَدْيَيْهِ بِمِنْطَقَةٍ مِنْ ذَهَبٍ. وَأَمَّا رَأْسُهُ وَشَعْرُهُ فَأَبْيَضَانِ كَالصُّوفِ الأَبْيَضِ كَالثَّلْجِ، وَعَيْنَاهُ كَلَهِيبِ نَارٍ. وَرِجْلاَهُ شِبْهُ النُّحَاسِ النَّقِيِّ كَأَنَّهُمَا مَحْمِيَّتَانِ فِي أَتُونٍ. وَصَوْتُهُ كَصَوْتِ مِيَاهٍ كَثِيرَةٍ. وَمَعَهُ فِي يَدِهِ الْيُمْنَى سَبْعَةُ كَوَاكِبَ، وَسَيْفٌ مَاضٍ ذُو حَدَّيْنِ يَخْرُجُ مِنْ فَمِهِ، وَوَجْهُهُ كَالشَّمْسِ وَهِيَ تُضِيءُ فِي قُوَّتِهَا». (رؤيا ١: ١٢–١٦)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعندما يقول بولس إننا سنكون مشابهين صورة الابن (رومية ٨: ٢٩)، وسنتغير ليكون لنا جسد كجسد المسيح المجيد (فيلبي ٣: ٢١)، فهو يقصد، على أقل تقدير، ما قصده يسوع حين قال: «حِينَئِذٍ يُضِيءُ الأَبْرَارُ كَالشَّمْسِ فِي مَلَكُوتِ أَبِيهِمْ» (متى ١٣: ٤٣). تصور عامة المسيحيين ممن تعرفهم، وتخيلهم يتلألأون كالشمس—بسطوع قاهر لا تقوى على التفرس فيه إلا بأعين قيامة جديدة. ويطلب منا سي. إس. لويس أن نتخيل هذا الأمر، بالنسبة للمؤمنين وغير المؤمنين على حد سواء، وما قد يُحدثه من تأثير على حياتنا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إنه لأمر جلل... أن نعي أن أبلد إنسان وأقله إثارة للاهتمام قد تتحدث إليه، ربما يصبح يوماً ما كائناً لو رأيته الآن لتعرضت لتجربة عاتية تدفعك لسجود العبادة له، أو ربما يصبح مرعباً وفساداً بدرجة لا يمكن أن تقابلها في هذه الحياة، إلا في أسوأ الكوابيس. فطوال اليوم، نحن نساعد بعضنا البعض، بدرجة ما، للوصول إلى إحدى هاتين الوجهتين. وفي ضوء هذه الاحتمالات، وبكل ما يصحبها من مهابة وحذر لائقين، ينبغي لنا أن ندير كافة تعاملاتنا مع بعضنا البعض، كل الصداقات، كل علاقات المحبة، كل أشكال اللعب، وكل شؤون السياسة. لا يوجد أناس عاديون. لم يحدث قط أن تحدثت إلى مجرد كائن فانٍ. فالأمم، والثقافات، والفنون، والحضارات—هذه كلها فانية، وحياتها مقارنة بحياتنا كحياة حشرة. غير أننا نمازح، ونعمل مع، ونتزوج، ونتجاهل، ونستغل كائنات خالدة—إما أهوالاً خالدة، أو أمجاداً أبدية». \u003ca href=\"#ch7-fn-4\"\u003e[٤]\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003eمثل المسيح — أحياء إلى أبد الآبدين\u003c/h3\u003e\n\u003cp\u003eلن تقتصر أجسادنا الجديدة على كونها مجيدة بصورة تفوق الخيال فحسب، بل ستكون خالدة أيضاً. لأن المسيح خالد. «وَكُنْتُ مَيْتًا، وَهَا أَنَا حَيٌّ إِلَى أَبَدِ الآبِدِينَ» (رؤيا ١: ١٨). «عَالِمِينَ أَنَّ الْمَسِيحَ بَعْدَمَا أُقِيمَ مِنَ الأَمْوَاتِ لاَ يَمُوتُ أَيْضًا. لاَ يَسُودُ عَلَيْهِ الْمَوْتُ بَعْدُ» (رومية ٦: ٩). ونحن مُعينون لنكون مثله. لذا يقول يسوع: «وَكُلُّ مَنْ كَانَ حَيًّا وَآمَنَ بِي فَلَنْ يَمُوتَ إِلَى الأَبَدِ» (يوحنا ١١: ٢٦). «أَنَّ اللهَ أَعْطَانَا حَيَاةً أَبَدِيَّةً، وَهذِهِ الْحَيَاةُ هِيَ فِي ابْنِهِ» (يوحنا الأولى ٥: ١١).\u003c/p\u003e\n\u003ch3\u003eأجساد الأحياء لا بد أن تتغير جذرياً\u003c/h3\u003e\n\u003cp\u003eهذا الجسد الجديد الخالد في القيامة سيكون مختلفاً جذرياً عن الجسد الذي يُدفن ليرقد في الأرض، أو الجسد الذي يكون حياً عند مجيء يسوع. وسواء كنا أحياءً أم راقدين عند مجيء يسوع، فإننا سنجتاز تغييراً عميقاً. فبولس حريص على أن يطمئن الأحياء عند مجيء الرب بأنهم سيختبرون تغييراً لا يقل شأناً عن تغيير الراقدين. ولهذا السبب يقول: «هُوَذَا سِرٌّ أَقُولُهُ لَكُمْ: لاَ نَرْقُدُ كُلُّنَا، وَلكِنَّنَا كُلَّنَا نَتَغَيَّرُ» (كورنثوس الأولى ١٥: ٥١). بعبارة أخرى، حتى الأحياء سيتغيرون. فليس الأموات وحدهم من يحتاجون إلى التغيير (بالنظر إلى التحلل الواضح الذي يخضعون له)، بل كل المؤمنين يحتاجون إلى تغيير جذري.\u003c/p\u003e\n\u003cp\u003eإن الأجساد التي نمتلكها الآن ليست ممجدة. لكنها ستكون كذلك. بل ينبغي لها أن تكون كذلك، وإلا فلن نكون مؤهلين لمجد السماوات الجديدة والأرض الجديدة. ويعرض بولس التجديد الجذري للجسد \"المتغير\"—أي جسد القيامة، الذي قال إن الأحياء سيحصلون عليه أيضاً:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هكَذَا أَيْضًا قِيَامَةُ الأَمْوَاتِ: يُزْرَعُ فِي فَسَادٍ وَيُقَامُ فِي عَدَمِ فَسَادٍ. يُزْرَعُ فِي هَوَانٍ وَيُقَامُ فِي مَجْدٍ. يُزْرَعُ فِي ضَعْفٍ وَيُقَامُ فِي قُوَّةٍ. يُزْرَعُ جِسْمًا حَيَوَانِيًّا وَيُقَامُ جِسْمًا رُوحَانِيًّا». (كورنثوس الأولى ١٥: ٤٢–٤٤)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعديم فساد. مجيد. قوي. روحاني. إن عبارة \"جسم روحاني\" ليست تناقضاً لفظياً. فقد أوضح يسوع جلياً أنه لم يكن مجرد \"روح\" حين أُقيم من الأموات. «فَإِنَّ الرُّوحَ لَيْسَ لَهُ لَحْمٌ وَعِظَامٌ كَمَا تَرَوْنَ لِي» (لوقا ٢٤: ٣٩). فكلمة روحاني لا تعني أثيرياً وخالياً من الجسد. بل تعني أنه مهيأ بطريقة غامضة لمستوى جديد من الوجود، حيث غيّر الروح القدس كل طبيعة مادية لتكون مسكناً مثالياً له، بقدرات تفوق قدرتنا الحالية على التخيل. فبعد قيامته، بدا يسوع وكأنه يأتي ويذهب بطرق تتحدى أي تفسير (لوقا ٢٤: ٣١؛ يوحنا ٢٠: ٢٦). وهكذا سيكون \"جسمنا الروحاني\" عصياً على التفسير بالنسبة لنمط تفكيرنا الحاضر.\u003c/p\u003e\n\u003ch3\u003eالتشبه بالمسيح هو أمر أخلاقي كما هو جسدي\u003c/h3\u003e\n\u003cp\u003eعلى الرغم من أن (فيلبي ٣: ٢٠–٢١) و(كورنثوس الأولى ١٥: ٥٠–٥٣) يركزان على تغيير أجسادنا عند مجيء المسيح، إلا أن هذا التغيير سيشمل أيضاً قلوبنا وعقولنا. وكان هذا الأمر ضمنياً بلا شك في (رومية ٨: ٢٩): «لأَنَّ الَّذِينَ سَبَقَ فَعَرَفَهُمْ سَبَقَ فَعَيَّنَهُمْ لِيَكُونُوا مُشَابِهِينَ صُورَةَ ابْنِهِ، لِكَيْ يَكُونَ هُوَ بِكْرًا بَيْنَ إِخْوَةٍ كَثِيرِينَ». إن غاية الله ليست خلق نسخ جسدية متطابقة. بل غايته هي إيجاد رؤى مشتركة للواقع، وتقييمات مشتركة للحق والجمال والعظمة والقيمة—ولاسيما رؤية مشتركة لله والمحبة له. بعبارة أخرى، فإن غاية الله من تغييرنا لمشابهة المسيح، والخلو من الخطية، هي غاية جسدية وروحية في آن واحد.\u003c/p\u003e\n\u003cp\u003eيبلغ هذا التغيير الروحي ذروته عند المجيء الثاني، حيث نُكمل تكميلاً تاماً. يبدأ التغيير في هذه الحياة. «وَنَحْنُ جَمِيعًا نَاظِرِينَ مَجْدَ الرَّبِّ بِوَجْهٍ مَكْشُوفٍ، كَمَا فِي مِرْآةٍ، نَتَغَيَّرُ إِلَى تِلْكَ الصُّورَةِ عَيْنِهَا، مِنْ مَجْدٍ إِلَى مَجْدٍ» (كورنثوس الثانية ٣: ١٨). ثم، إن متنا، تُكمل أرواحنا في السماء في محضر المسيح (عبرانيين ١٢: ٢٣). وعند مجيء المسيح، يكتمل التغيير. فهو يكمل أجسادنا ويرد أرواحنا المكملة إلى جسدها المقام، حيث تجد غرضها المكتمل في التعبير المرئي والمسموع والملموس.\u003c/p\u003e\n\u003cp\u003eنرى اكتمال نفوسنا المغيرة عند مجيء المسيح في (يوحنا الأولى ٣: ١–٣) و(كولوسي ٣: ٣–٥).\u003c/p\u003e\n\u003ch3\u003eمتى أظهر، نكون مثله\u003c/h3\u003e\n\u003cp\u003eأولاً، تأمل ما ورد في (يوحنا الأولى ٣: ١–٣):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أُنْظُرُوا أَيَّةَ مَحَبَّةٍ أَعْطَانَا الآبُ حَتَّى نُدْعَى أَوْلاَدَ اللهِ! مِنْ أَجْلِ هذَا لاَ يَعْرِفُنَا الْعَالَمُ، لأَنَّهُ لاَ يَعْرِفُهُ. أَيُّهَا الأَحِبَّاءُ، الآنَ نَحْنُ أَوْلاَدُ اللهِ، وَلَمْ يُظْهَرْ بَعْدُ مَاذَا سَنَكُونُ. وَلكِنْ نَعْلَمُ أَنَّهُ إِذَا أُظْهِرَ نَكُونُ مِثْلَهُ، لأَنَّنَا سَنَرَاهُ كَمَا هُوَ. وَكُلُّ مَنْ عِنْدَهُ هذَا الرَّجَاءُ بِهِ، يُطَهِّرُ نَفْسَهُ كَمَا هُوَ طَاهِرٌ». (يوحنا الأولى ٣: ١–٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eمن المذهل أنه كما يحدث التغيير التدريجي في هذه الحياة من خلال \"النظر إلى مجد الرب\" (ولاسيما في إنجيله، كورنثوس الثانية ٣: ١٨؛ ٤: ٤–٦)، كذلك سيحدث تغيير لحظي عندما ننظر الله في مجيء ابنه، يسوع المسيح.\u003c/p\u003e\n\u003cp\u003eصحيح أن عبارة \"إِذَا أُظْهِرَ\" تشير بصورة طبيعية جداً إلى \"الله\" في هذه الفقرة، وليس إلى المسيح أولاً. لكن يوحنا أخبرنا بما قاله يسوع: «اَلَّذِي رَآنِي فَقَدْ رَأَى الآبَ» (يوحنا ١٤: ٩). ونحن نعلم أن يوحنا أشار إلى المجيء الثاني ليسوع في (يوحنا الأولى ٢: ٢٨) بالكلمات ذاتها التي يستخدمها للإشارة إلى ظهور الله في (يوحنا الأولى ٣: ٢) («إِذَا أُظْهِرَ»، ἐὰν φανερωθῇ). وعليه، فمن المرجح أن يوحنا في رسالته الأولى (٣: ٢) يشير إلى المجيء الثاني باعتباره إعلاناً للمسيح المُقام، ولله فيه.\u003c/p\u003e\n\u003cp\u003eعندما نراه وجهاً لوجه، \"نَكُونُ مِثْلَهُ\". سيكتمد التغيير حين تكتمل رؤية مجد المسيح. والسبب الذي يجعلني أعتقد أن هذا التغيير يتضمن التغيير الأخلاقي والروحي لقلوبنا وعقولنا يكمن في الطريقة التي يربط بها يوحنا بين العددين الثاني والثالث. فبعد أن يشير إلى رجائنا في رؤية المسيح عند مجيئه وتغييرنا إلى شبهه، يقول يوحنا: «وَكُلُّ مَنْ عِنْدَهُ هذَا الرَّجَاءُ بِهِ، يُطَهِّرُ نَفْسَهُ كَمَا هُوَ طَاهِرٌ» (يوحنا الأولى ٣: ٣). والمنطق الكامن هنا هو: إن كنا نرجو أن نتغير لنكون مثله عند مجيئه، فإننا سنسعى جاهدين نحو ذلك التغيير الآن. والتغيير الذي يسميه هنا هو الطهارة. وأستنتج من ذلك، بالتالي، أن التغيير الذي سيكتمل عند المجيء الثاني هو تغيير أخلاقي وجسدي في آن واحد. سنُعتق من كل عيب جسدي وأخلاقي وروحي.\u003c/p\u003e\n\u003ch3\u003eستظهرون معه في المجد\u003c/h3\u003e\n\u003cp\u003eويعبر بولس عن المنطق ذاته في (كولوسي ٣: ٣–٥):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ قَدْ مُتُّمْ وَحَيَاتُكُمْ مُسْتَتِرَةٌ مَعَ الْمَسِيحِ فِي اللهِ. مَتَى أُظْهِرَ الْمَسِيحُ حَيَاتُنَا، فَحِينَئِذٍ تُظْهَرُونَ أَنْتُمْ أَيْضًا مَعَهُ فِي الْمَجْدِ. فَأَمِيتُوا أَعْضَاءَكُمُ الَّتِي عَلَى الأَرْضِ: الزِّنَا، النَّجَاسَةَ، الْهَوَى، الشَّهْوَةَ الرَّدِيَّةَ، الطَّمَعَ الَّذِي هُوَ عِبَادَةُ الأَوْثَانِ». (كولوسي ٣: ٣–٥)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعندما يأتي المسيح، سيُظهر المؤمنون على حقيقتهم التي هم عليها فعلاً. فالخليقة جمعاء تنتظر هذا، كما يقول بولس في (رومية ٨: ١٩): «لأَنَّ انْتِظَارَ الْخَلِيقَةِ يَتَوَقَّعُ اسْتِعْلاَنَ أَبْنَاءِ اللهِ». في ذلك اليوم، سنُمجد كما هو مجيد. ثم، في الرابط بين العددين الرابع والخامس من الإصحاح الثالث من رسالة كولوسي، يأتي ذات المنطق الوارد في (يوحنا الأولى ٣: ٢، ٣): ولذلك، وبما أنكم ستُمجدون تجميداً تاماً عند مجيء المسيح، فأميتوا النجاسة (كولوسي ٣: ٥). بعبارة أخرى، بما أنكم مُعيّنون لتُكملوا في الطهارة عند مجيء المسيح، فاسعوا للخلاص من كل نجاسة الآن. مما يعني أن ظهور المسيح في المجد سيُحدث كمالاً لشعبه، لا يقتصر على الجانب الجسدي فحسب بل يمتد ليشمل الجانب الأخلاقي أيضاً. وما كان تدريجياً في هذه الحياة، سيكتمل عند ظهور الرب.\u003c/p\u003e\n\u003ch3\u003eإزالة كل عائق يمنع التعجب\u003c/h3\u003e\n\u003cp\u003eختاماً، أعود إلى المعضلة التي طُرحت في مستهل هذا الفصل. إن كان جوهر الأمر عند مجيء المسيح يتمثل في تعظيم مجد المسيح في تعجب شعبه (تسالونيكي الثانية ١: ١٠)، فكيف سيكون هذا التعجب لائقاً بعظمة المسيح إن كانت ملكاتنا للتعجب مشلولة بسبب قتامة رؤيتنا الروحية، وضعف عواطفنا، والفساد المتبقي في قلوبنا الساقطة؟ وكيف لنا أن نتعجب من مجد النعمة المُبررة والمُقدسة إن كانت خطايانا مجرد مغفورة ولم تُمحَ وتُزال بالكلية؟\u003c/p\u003e\n\u003cp\u003eتكمن الإجابة في أننا: «كُلَّنَا نَتَغَيَّرُ، فِي لَحْظَةٍ فِي طَرْفَةِ عَيْنٍ، عِنْدَ الْبُوقِ الأَخِيرِ. فَإِنَّهُ سَيُبَوَّقُ، فَيُقَامُ الأَمْوَاتُ عَدِيمِي فَسَادٍ، وَنَحْنُ نَتَغَيَّرُ» (كورنثوس الأولى ١٥: ٥١، ٥٢). سنكون مشابهين للمسيح مشابهة تامة. وسيشمل ذلك قلوباً بلا خطية وأجساداً بلا عيب. فلن يُعاق أي من قدراتنا على التعجب بسبب القتامة، أو الضعش، أو الخطية، أو العوائق الجسدية. ولن يكون هناك أي قيد على فرح العبادة. ولن يكون هناك أي قيد على التعبير الجسدي لتلك العبادة. سيكون مجد المسيح هو الحقيقة الأسمى في ذلك اليوم، وسوف يتمجد في الفرح غير المقيد لتعجبنا.\u003c/p\u003e\n\u003cp\u003eلذلك، لا داعي لأن نقلق بشأن أوجه القصور التي تثقل كاهلنا الآن، كما لو كانت ستحبط فرحنا وتسبيحنا في ذلك اليوم. فهي لن تفعل. هذا وعد مجيد. وهو سبب آخر لمحبة ظهور الرب.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch7-ref-1\"\u003e[١]\u003c/a\u003e سيتضح بنهاية هذا الفصل ما أقصده باكتمال تغييرنا الأخلاقي عند المجيء الثاني، على الرغم من أن أرواح الذين يموتون في الرب \"تُكمل\" في السماء عند موتهم (عبرانيين ١٢: ٢٣).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch7-ref-2\"\u003e[٢]\u003c/a\u003e في بعض الأحيان يُتحدث عن القيامة في الكتاب المقدس دون إيضاح الفوارق الزمنية بين وقت إقامة المؤمنين وغير المؤمنين أو وقت دينونة الجميع. على سبيل المثال، يقول يسوع في (يوحنا ٥: ٢٨، ٢٩): «لاَ تَتَعَجَّبُوا مِنْ هذَا، فَإِنَّهُ تَأْتِي سَاعَةٌ فِيهَا يَسْمَعُ جَمِيعُ الَّذِينَ فِي الْقُبُورِ صَوْتَهُ، فَيَخْرُجُونَ: الَّذِينَ فَعَلُوا الصَّالِحَاتِ إِلَى قِيَامَةِ الْحَيَاةِ، وَالَّذِينَ عَمِلُوا السَّيِّئَاتِ إِلَى قِيَامَةِ الدَّيْنُونَةِ». أعتقد أن هذا النص، شأنه شأن العديد من النصوص الأخرى، يضغط الأحداث المستقبلية التي تفصل بينها فترات زمنية، تماماً كما تبدو سلاسل الجبال من منظور بعيد وكأنها جبل واحد. هذا المنظور النبوي شائع في الكتاب المقدس ويساعدنا على فهم كيف تُعامل الأحداث البعيدة والقريبة أحياناً كرؤية واحدة. انظر الفصل الثامن، الهامش ١.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch7-ref-3\"\u003e[٣]\u003c/a\u003e عندما يقول بولس: \"نَحْنُ الأَحْيَاءَ\"، فهو لا يُعلم بأنه يوقن أن المجيء الثاني سيحدث في حياته. ونحن نعلم ذلك لأنه في الأصحاح التالي يقول: «الَّذِي مَاتَ لأَجْلِنَا، حَتَّى إِذَا سَهِرْنَا أَوْ نِمْنَا نَحْيَا جَمِيعًا مَعَهُ» (تسالونيكي الأولى ٥: ١٠). في كلا النصين، يصور نفسه على أنه قد يكون في عِداد الأحياء. غير أنه يعلم أنه قد لا يكون كذلك، كما ذكر في (٥: ١٠).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch7-ref-4\"\u003e[٤]\u003c/a\u003e سي. إس. لويس (مفكر ولاهوتي مسيحي بريطاني، مؤلف الدفاعيات المسيحية الكلاسيكية)، كتاب \"ثقل المجد\".\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi7V8l03QMct4U_r5kDS-xsc4fJjK9lcpa9667ALZXqMipbQ7kAE-tn2WOO0Bv2c9BkAsg-FizkNXRbEVf7z7X_YdMGi1bKcuYyvMph2-u5jSjELhmP0hRs7eOl_Pz1Fe-K9uQfbp3qvvRBYOSELt2XbC_tci_6c1YXqS1ITvhpbHiKMcI67mSn38NCgNw/s2752/%D8%AA%D9%85%D8%AC%D9%8A%D8%AF_%D9%83%D8%A7%D9%85%D9%84__%D8%B9%D9%82%D9%84%D8%A7%D9%8B_%D9%88%D9%82%D9%84%D8%A8%D9%8B%D8%A7_%D9%88%D8%AC%D8%B3%D8%AF%D9%8B%D8%A7.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi7V8l03QMct4U_r5kDS-xsc4fJjK9lcpa9667ALZXqMipbQ7kAE-tn2WOO0Bv2c9BkAsg-FizkNXRbEVf7z7X_YdMGi1bKcuYyvMph2-u5jSjELhmP0hRs7eOl_Pz1Fe-K9uQfbp3qvvRBYOSELt2XbC_tci_6c1YXqS1ITvhpbHiKMcI67mSn38NCgNw/s600/%D8%AA%D9%85%D8%AC%D9%8A%D8%AF_%D9%83%D8%A7%D9%85%D9%84__%D8%B9%D9%82%D9%84%D8%A7%D9%8B_%D9%88%D9%82%D9%84%D8%A8%D9%8B%D8%A7_%D9%88%D8%AC%D8%B3%D8%AF%D9%8B%D8%A7.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"20:Tbdb9,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل السادس\u003c/h2\u003e\n\u003cp\u003eهل سنكون بلا لوم عند مجيء المسيح؟\u003c/p\u003e\n\u003cp\u003eوعدَ بطرسُ في الفصل السابق بأن النعمة سيُؤتى بها إلى شعب المسيح عند مجيئه الثاني (١ بطرس ١: ١٣)، حيث سيتولى المسيحُ نفسه تقديمها. وسنخلصُ من الغضب في ذلك اليوم (١ تسالونيكي ١: ١٠)، ليس بمقتضى استحقاقنا، بل بنعمة الله—وتحديداً النعمة اللازمة لذلك اليوم. ومع ذلك، فقد أرشدنا بطرس لاستخدام وسائط لنكون ممتلئين بالرجاء ومستعدين لذلك اليوم—لا سيما وسيلة البقاء يقظين ونشطين ذهنياً تجاه المسيح ووعوده الثمينة.\u003c/p\u003e\n\u003cp\u003eويُصرح الرسول بولس بوضوح أكبر بأنه يتعين على المسيحيين استخدام وسائط للاستعداد للمجيء الثاني. والواقع أنه يفعل ذلك بطريقة قد تبعث على القلق؛ إذ قد تبدو كلماته وكأنها تقوض الخلاص النهائي بالنعمة من خلال الإيمان. فهو يتحدث عن تهيئنا لذلك اليوم بأسلوب يجعل محبة بعضهم لظهوره تتزعزع بشيء من عدم اليقين.\u003c/p\u003e\n\u003ch3\u003eأنقياء وبلا لوم ليوم المسيح\u003c/h3\u003e\n\u003cp\u003eوأضع نصب عيني هذه المقاطع الثلاثة على وجه الخصوص:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَهَذَا أُصَلِّيهِ: أَنْ تَزْدَادَ مَحَبَّتُكُمْ أَكْثَرَ فَأَكْثَرَ فِي الْمَعْرِفَةِ وَفِي كُلِّ فَهْمٍ، حَتَّى تُمَيِّزُوا الأُمُورَ الْمُتَخَالِفَةَ، لِكَيْ تَكُونُوا مُخْلِصِينَ وَبِلاَ عَثْرَةٍ إِلَى يَوْمِ الْمَسِيحِ، مَمْلُوئِينَ مِنْ ثَمَرِ الْبِرِّ الَّذِي بِيَسُوعَ الْمَسِيحِ لِمَجْدِ اللهِ وَحَمْدِهِ.» (فيلبي ١: ٩-١١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَالرَّبُّ يُنْمِيكُمْ وَيَزِيدُكُمْ فِي الْمَحَبَّةِ بَعْضَكُمْ لِبَعْضٍ وَلِلْجَمِيعِ، كَمَا نَحْنُ أَيْضًا لَكُمْ، لِكَيْ يُثَبِّتَ قُلُوبَكُمْ بِلاَ لَوْمٍ فِي الْقَدَاسَةِ، أَمَامَ اللهِ أَبِينَا فِي مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ مَعَ جَمِيعِ قِدِّيسِيهِ.» (١ تسالونيكي ٣: ١٢-١٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَإِلَهُ السَّلاَمِ نَفْسُهُ يُقَدِّسُكُمْ بِالتَّمَامِ. وَلْتُحْفَظْ رُوحُكُمْ وَنَفْسُكُمْ وَجَسَدُكُمْ كَامِلَةً بِلاَ لَوْمٍ عِنْدَ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ.» (١ تسالونيكي ٥: ٢٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوندرك جميعاً تمام الإدراك أننا سنحمل معنا نقائص وتقصيراً إلى يوم المسيح، ومع ذلك يتعامل بولس مع كوننا بلا لوم في ذلك اليوم باعتباره معتمداً بشكل ما على تغيير حقيقي في حياتنا هنا والآن. وتجعل هذه المقاطع الثلاثة من كوننا بلا لوم أمام المسيح غاية لعمل الله التقديسي في حياتنا عبر زيادة محبتنا للآخرين. فيصلي بولس لكي يصنع الله تغييراً حقيقياً في حياتنا لكي نوجد بلا لوم عند مجيء المسيح. ويبدو أن هذا يقوض سلامنا وطمأنينتنا، إذ لا يبدو أن أحداً منا سيتغير لدرجة تؤهله لأن يُدعى بلا لوم في ذلك اليوم. فتأمل معي عن كثب في كل نص من هذه النصوص.\u003c/p\u003e\n\u003ch3\u003eفيلبي ١: ٩-١١\u003c/h3\u003e\n\u003cp\u003eيصلي بولس في فيلبي ١: ٩-١١، وهذا يعني أنه يرى الله هو الفاعل الذي سيصنع ما يطلبه منه، أي أن يجعلنا أنقياء وبلا لوم ليوم المسيح. وتجعل هذه النصوص كوننا بلا لوم معتمداً بشكل ما على عمل الله التقديسي في حياتنا. وهكذا، فمهما بلغ حجم مشاركتنا في العمل، يظل الله هو العامل الحاسم في هذه النصوص، وبولس يصلي لكي يعمل الله. فالصلاة هي إحدى وسائل الاستعداد للمجيء الثاني.\u003c/p\u003e\n\u003cp\u003eولكن لكي يؤهلنا الله ليوم المسيح، فإنه يجعل محبتنا تزداد أكثر فأكثر in كل فهم ومعرفة (١: ٩). ثم تأتي في العدد ١٠ الكلمات البالغة الأهمية التي تربط التغييرات العملية في حياتنا بطهارتنا وكوننا بلا لوم في يوم المسيح. وتلك الكلمات الرابطة هي \"حتى... لكي\". فيصلي بولس لكي ينمي الله محبتنا بفهم «حَتَّى تُمَيِّزُوا [εἰς τὸ δοκιμάζειν] الأُمُورَ الْمُتَخَالِفَةَ، لِكَيْ [ἵνα] تَكُونُوا مُخْلِصِينَ وَبِلاَ عَثْرَةٍ». ويُظهر هذان الرابطان أن كوننا بلا لوم في يوم المسيح هو قصد الله من التغييرات العملية التي يصنعها في حياتنا—أي أن تزداد محبتنا بفهم لكي نميز الأمور المتخالفة.\u003c/p\u003e\n\u003cp\u003eفكيف يرتبط كوننا بلا لوم في يوم المسيح بحقيقة التبرير بالإيمان؟ يعلمنا العهد الجديد أنه بسبب اتحادنا بالمسيح بالإيمان، نلنا براً محتسباً (رومية ٤: ٤-١٢؛ ٢ كورنثوس ٥: ٢١؛ فيلبي ٣: ٨-٩). لكن ما يركز عليه بولس هنا يبدو في حالة تعارض مع البر المحتسب. إذ يقول بولس إن المسيحيين سيوجدون أنقياء وبلا لوم في يوم المسيح لأن الله قد صنع محبة مغيِّرة حقيقية في عقولهم وقلوبهم. فهو يربط بين كوننا بلا لوم أمام المسيح وازدياد محبتنا. فكيف يرتبط هذا بتبريرنا؟\u003c/p\u003e\n\u003ch3\u003e١ تسالونيكي ٣: ١١-١٣\u003c/h3\u003e\n\u003cp\u003eوالنص الثاني الذي ينبغي لنا تأمله عن كثب هو ١ تسالونيكي ٣: ١١-١٣. وتتطابق الفكرة فيه تماماً مع فكرة فيلبي ١: ٩-١١. وهنا أيضاً يصلي بولس صلاة ثنائية الاتجاه؛ فهو يخاطب المسيحيين (\"أنتم\")، لكنه يطلب من الله أن يعمل «وَالرَّبُّ يُنْمِيكُمْ وَيَزِيدُكُمْ...». وما يطلبه من الله هو أن يجعل المؤمنين «يَزِيدُونَ فِي الْمَحَبَّةِ بَعْضُهُمْ لِبَعْضٍ وَلِلْجَمِيعِ» (١ تسالونيكي ٣: ١٢). ثم تأتي تلك الكلمات البالغة الأهمية التي توضح الصلة المنطقية بين محبة المؤمنين للآخرين وكونهم بلا لوم عند مجيء المسيح: \"لكي\". فيصلي بولس لكي يفيض الرب بمحبتهم للآخرين «لِكَيْ يُثَبِّتَ قُلُوبَكُمْ بِلاَ لَوْمٍ فِي الْقَدَاسَةِ، أَمَامَ اللهِ أَبِينَا فِي مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ».\u003c/p\u003e\n\u003cp\u003eو\"اللا لوم في القداسة\" هذا هو قصد عمل الله التقديسي لكي يجعلنا نحب الآخرين حباً حقيقياً. وتلك المحبة يستخدمها الله، بطريقة ما، ليثبتنا بلا لوم في القداسة عند المجيء الثاني. ومرة أخرى، سنكون بحاجة للإجابة عن السؤال حول كيفية ارتباط هذه الصلة بين القلوب المغيَّرة بالمحبة واللا لوم النهائي بالتبرير بالإيمان.\u003c/p\u003e\n\u003ch3\u003e١ تسالونيكي ٥: ٢٣\u003c/h3\u003e\n\u003cp\u003eوالنص الثالث الجدير بالتأمل هو ١ تسالونيكي ٥: ٢٣. وللمرة الثالثة، نجد صلاة ثنائية الاتجاه: «وَإِلَهُ السَّلاَمِ نَفْسُهُ يُقَدِّسُكُمْ». فيطلب بولس من الله أن يعمل عملاً مغيراً في المؤمنين. ولا تُذكر المحبة هذه المرة، بل ينتقل بولس مباشرة من عمل الله إلى كوننا بلا لوم: «وَإِلَهُ السَّلاَمِ نَفْسُهُ يُقَدِّسُكُمْ بِالتَّمَامِ. وَلْتُحْفَظْ رُوحُكُمْ وَنَفْسُكُمْ وَجَسَدُكُمْ كَامِلَةً بِلاَ لَوْمٍ عِنْدَ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ». وثمة حقيقتان مهمتان لغرضنا هنا؛ الأولى أن فعل الله هو عمل تقديس لا تبرير: «وإله السلام نفسه يقدسكم بالتمام»، والأخرى أن بولس يشير إلى \"حفظنا\" [τηρηθείη] بلا لوم عند مجيء ربنا. ويبدو لي أن هذين الفعلين، \"يقدس\" و\"يُحفظ\"، متوازيان في ذهن بولس (نفس الزمن ونفس الصيغة)، وأن عملية التقديس (التي تجعلنا بلا لوم) وعملية الحفظ بلا لوم تجريان بالتزامن، أي الآن. فهل يعني هذا أننا بلا لوم بالفعل بمعنًى ما، وأن عمل الله في جعلنا بلا لوم (بمعنًى آخر) يحفظنا على هذا النحو إلى يوم المسيح؟\u003c/p\u003e\n\u003ch3\u003eحيرة\u003c/h3\u003e\n\u003cp\u003eما لم أكن مخطئاً، فإن العديد من المسيحيين الجادين يقعون في حيرة إزاء هذا النوع من التعليم الكتابي الذي رأيناه في هذه النصوص الثلاثة (فيلبي ١: ٩-١١؛ ١ تسالونيكي ٣: ١١-١٣؛ ٥: ٢٣). فكيف يمكن لبولس أن يعلّم أننا لا نبلغ الكمال في هذه الحياة، ومع ذلك سنكون بلا لوم في الطهارة والقداسة عند المجيء الثاني للمسيح لأن الله يجعلنا أناساً محبين حقاً؟ كيف يمكنه القول: «لَيْسَ أَنِّي قَدْ نِلْتُ أَوْ صِرْتُ كَامِلاً، وَلَكِنِّي أَسْعَى لَعَلِّي أُدْرِكُ الَّذِي لأَجْلِهِ أَدْرَكَنِي أَيْضًا الْمَسِيحُ يَسُوعُ» (فيلبي ٣: ١٢)، ومع ذلك يقرر أن طريقة عيشنا هنا والآن ستؤول بنا إلى أن نوجد بلا لوم في يوم المسيح؟\u003c/p\u003e\n\u003cp\u003eوثمة حل لهذه الحيرة، يكمن في العلاقة بين التبرير بالإيمان والثمر المؤكِّد للإيمان، وهو المحبة. وأرجو، كما قال بطرس، أن تمنطقوا أحقاء ذهنكم، وتتابعوا معي هذه السلسلة الفكرية الدقيقة.\u003c/p\u003e\n\u003ch3\u003eمُصالحون لأجل اللا لوم\u003c/h3\u003e\n\u003cp\u003eوثمة نص لبولس يعينني على اتخاذ الخطوة الأولى، وهو كولوسي ١: ٢١-٢٣:\u003c/p\u003e\n\u003cp\u003e«وَأَنْتُمُ الَّذِينَ كُنْتُمْ قَبْلاً أَجْنَبِيِّينَ وَأَعْدَاءً فِي الْفِكْرِ، فِي الأَعْمَالِ الشِّرِّيرَةِ، قَدْ صَالَحَكُمُ الآنَ فِي جَسَدِ بَشَرِيَّتِهِ بِالْمَوْتِ، لِكَيْ يُضْضِرَكُمْ قِدِّيسِينَ وَبِلاَ لَوْمٍ وَبِلاَ شَكْوَى أَمَامَهُ، إِنْ ثَبَتُّمْ عَلَى الإِيمَانِ، مَتَأَسِّسِينَ وَرَاسِخِينَ وَغَيْرَ مُنْتَقِلِينَ عَنْ رَجَاءِ الإِنجِيلِ...» (كولوسي ١: ٢١-٢٣)\u003c/p\u003e\n\u003cp\u003eوهنا نجد ذات التطلع إلى كوننا بلا لوم كما رأينا سابقاً. وصحيح أن المجيء الثاني، أو يوم المسيح، لم يُذكر صراحة هنا، إلا أن عبارة «لِكَيْ يُضْضِرَكُمْ... أَمَامَهُ»، وحقيقة معالجة بولس لقضية اللا لوم ذاتها، تجعل من شبه المؤكد أنه يضع نصب عينيه الفكرة ذاتها التي أرادها في النصوص الثلاثة التي تأملناها—أي اللا لوم في يوم مجيء الرب.\u003c/p\u003e\n\u003cp\u003eولكن هنا نلمح اختلافاً صارخاً؛ فالكلمات الرابطة منطقياً («لِكَيْ يُضْضِرَكُمْ قِدِّيسِينَ وَبِلاَ لَوْمٍ...»—وهو مصدر مأول يفيد الغرض [παραστῆαι]) لا تربط كوننا بلا لوم بعمل الله التقديسي في جعلنا أكثر محبة، بل بعمل المسيح المصالح على الصليب. ويسير حبل الأفكار هكذا: لقد صالحنا المسيح مع الله على الصليب، والأثر الذي يرمي المسيح إلى تحقيقه من تلك المصالحة هو أن يحضرنا في يوم المسيح قديسين وبلا لوم وبلا لوم. وهكذا فإن كوننا بلا لوم في ذلك اليوم يعود إلى عمل المسيح المصالح على الصليب. أو يمكن القول إنه يعود لعمل الله التبريري، لأن تلك هي الطريقة التي يُصالح بها الخطاة مع الله—باحتسابهم أبراراً، أي بالتبرير.\u003c/p\u003e\n\u003cp\u003eوبعبارة أخرى، لا ينصب التركيز في كولوسي ١: ٢١-٢٣ بالدرجة الأولى على أن الله يعمل فينا ليجعلنا بلا لوم في يوم المسيح \u003ca href=\"#footnote-1\"\u003e[١]\u003c/a\u003e. بل النقطة الأساسية هي أنه عمل لأجلنا في موت المسيح ليجعلنا بلا لوم في يوم المسيح. فكوننا بلا لوم عند مجيء المسيح—أياً كان معناه—سيعود إلى حقيقة أن المسيح قد صالحنا مع الله بموته. لقد تم هذا الأمر وانتهى. فالمصالحة ليست عملية تدريجية كالتقديس، بل حدثت على الصليب. فبموته، امتص يسوع غضب الله نيابة عنا، والآن لا دينونة البتة، بل هناك مصالحة وقبول وغفران وتبنٍّ—إلى الأبد (قارن رومية ٥: ٨-١٠؛ ٨: ١-٣). وإن وقف أحد أمام المسيح بلا لوم عند مجيئه، فسيعود ذلك إلى موت يسوع الذي صالحنا مع الله.\u003c/p\u003e\n\u003ch3\u003eمُصالحون بإيمان يثبت\u003c/h3\u003e\n\u003cp\u003eثم يستمر الشرح اللاهوتي؛ فنلاحظ وجود شرط مقترن بهذا الوعد في كولوسي ١: ٢٣. إذ ستقف بلا لوم أمام المسيح عند مجيئه: «إِنْ ثَبَتُّمْ عَلَى الإِيمَانِ، مُتَأَسِّسِينَ وَرَاسِخِينَ وَغَيْرَ مُنْتَقِلِينَ عَنْ رَجَاءِ الإِنجِيلِ».\u003c/p\u003e\n\u003cp\u003eوهذا ما علّمه بولس وسائر الرسل: فالإيمان المصالح الحقيقي—الإيمان المُبرر والمُخلص—ليس مجرد وهج عابر في لحظة الاهتداء، بل هو إيمان يثبت ويصبر. فـ«الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهَذَا يَخْلُصُ» (متى ١٠: ٢٢). و«لأَنَّنَا قَدْ صِرْنَا شُرَكَاءَ الْمَسِيحِ، إِنْ تَمَسَّكْنَا بِبَدَاءةِ الثِّقَةِ ثَابِتَةً إِلَى النِّهَايَةِ» (العبرانيين ٣: ١٤). وإذا رُفِض في النهاية ما بدا للوهلة الأولى إيماناً مخلصاً، يمكن الاستنتاج بأن ذلك الإيمان كان زائفاً ولا يمثل دليلاً على الولادة الثانية.\u003c/p\u003e\n\u003cp\u003eونلمس هذا في الطريقة التي تحدث بها يوحنا عن أولئك الذين بدا أنهم مسيحيون لكنهم ارتدوا عن الإيمان: «مِنَّا خَرَجُوا، لَكِنَّهُمْ لَمْ يَكُونُوا مِنَّا، لأَنَّهُمْ لَوْ كَانُوا مِنَّا لَبَقُوا مَعَنَا. لَكِنْ لِيُظْهَرُوا أَنَّهُمْ لَيْسُوا جَمِيعُهُمْ مِنَّا» (١ يوحنا ٢: ١٩). وكون المرء \"ليس منا\" يعني أنه لم يولد ولادة ثانية حقيقية، لأن «كُلُّ مَنْ يُؤْمِنُ أَنَّ يَسُوعَ هُوَ الْمَسِيحُ فَقَدْ وُلِدَ مِنَ اللهِ» (١ يوحنا ٥: ١).\u003c/p\u003e\n\u003cp\u003eوحينما يقول بولس في كولوسي ١: ٢٢-٢٣ إن المصالحين مع الله سيقفون أمام المسيح بلا لوم «إِنْ ثبتُّمْ عَلَى الإِيمَانِ»، فهو لا يلمح إلى إمكانية نوال المرء لإيمان مخلِّص حقيقي ثم يفقده بعد ذلك. بل يقرر أن الإيمان الثابت ضروري بحق للخلاص النهائي، وأن من يرتدون عن الإيمان لم يولدوا ولادة ثانية حقيقية قط—ولم يتصالحوا مع الله تصالحاً حقيقياً قط.\u003c/p\u003e\n\u003ch3\u003eالإيمان المخلّص يحمل ثمر المحبة المؤكِّد للإيمان\u003c/h3\u003e\n\u003cp\u003eوالآن، ما الذي يربط ضرورة الإيمان الثابت بكوننا بلا لوم في يوم المسيح؟ الرابط هو أن الإيمان المخلص هو الإيمان الذي يثمر محبة للصديق والعدو على السواء. والمحبة، كما أظهر بولس، هي الطريقة التي يحضرنا بها الله بلا لوم في يوم المسيح: «وَالرَّبُّ يُنْمِيكُمْ وَيَزِيدُكُمْ فِي الْمَحَبَّةِ... لِكَيْ يُثَبِّتَ قُلُوبَكُمْ بِلاَ لَوْمٍ... فِي مَجِيءِ رَبِّنَا...» (١ تسالونيكي ٣: ١٢-١٣).\u003c/p\u003e\n\u003cp\u003eوإذا كان الإيمان المخلّص حقيقياً، فإنه يغيرنا. وهذا هو تعليم العهد الجديد بأكمله. والتغيير هو في جوهره تحول القلب المتكبر الأناني إلى قلب متواضع محب. ويصف بولس الإيمان بأنه أصل المحبة في المسيحي: «لأَنَّهُ فِي الْمَسِيحِ يَسُوعَ لاَ الْخِتَانُ يَنْفَعُ شَيْئًا وَلاَ الْغُرْلَةُ، بَلِ الإِيمَانُ الْعَامِلُ بِالْمَحَبَّةِ» (غلاطية ٥: ٦). فالإيمان الذي يوحدنا بالمسيح، الذي هو برنا، يُثبت حقيقته بكونه \"عاملاً بالمحبة\". وثمر محبة الناس ليس هو شجرة الثقة بالمسيح، لكنه الثمر الذي يظهر بالتأكيد أن الشجرة حية وحقيقية.\u003c/p\u003e\n\u003cp\u003eإن غاية بولس السلوكية العظمى في المؤمنين هي المحبة التي تنبع من قلب مؤمن. فـ«غَايَةُ الْوَصِيَّةِ فَهِيَ الْمَحَبَّةُ مِنْ قَلْبٍ طَاهِرٍ... وَإِيمَانٍ بِلاَ رِيَاءٍ» (١ تيموثاوس ١: ٥). وصاغ يعقوب الفكرة ذاتها بقوله: «هَكَذَا الإِيمَانُ أَيْضا، إِنْ لَمْ يَكُنْ لَهُ أَعْمَالٌ، مَيِّتٌ فِي ذَاتِهِ» (يعقوب ٢: ١٧). وأكد الرسول يوحنا على الفكرة ذاتها بقوله: «نَحْنُ نَعْلَمُ أَنَّنَا قَدِ انْتَقَلْنَا مِنَ الْمَوْتِ إِلَى الْحَيَاةِ، لأَنَّنَا نُحِبُّ الإِخْوَةَ» (١ يوحنا ٣: ١٤).\u003c/p\u003e\n\u003cp\u003eومن ثم، فإن المحبة في حياة المؤمن هي دليل حاسم لا يقبل التفاوض على الإيمان المخلص. وحينما يصلي بولس (في فيلبي ١: ٩-١١ و١ تسالونيكي ٣: ١١-١٣) لكي يصنع الله هذه المحبة في حياة المؤمنين، فهو يطلب من الله أن يثبت المؤمنين في إيمانهم الحقيقي. وبدون هذه المحبة المؤكِّدة للإيمان، فإن أي \"إيمان\" نملكه ليس إيماناً مخلصاً: «وَإِنْ كَانَ لِي كُلُّ الإِيمَانِ حَتَّى أَنْقُلَ الْجِبَالَ، وَلَكِنْ لَيْسَتْ لِي مَحَبَّةٌ، فَلَسْتُ شَيْئًا» (١ كورنثوس ١٣: ٢).\u003c/p\u003e\n\u003cp\u003eتؤكد المحبة أن إيماننا هو إيمان مخلص وحقيقي، يوحدنا بالمسيح الذي هو برنا الكامل. ويصرح بطرس بفكرة \"التثبيت\" في ٢ بطرس ١: ١٠: «لِذَلِكَ بِالأَكْثَرِ اجْتَهِدُوا أَيُّهَا الإِخْوَةُ أَنْ تَجْعَلُوا دَعْوَتَكُمْ وَاخْتِيَارَكُمْ ثَابِتَيْنِ. لأَنكُمْ إِذَا فَعَلْتُمْ ذَلِكَ، لَنْ تَزِلُّوا أَبَدًا». والصفات التي يشير إليها تبلغ ذروتها في العدد ٧ بالمحبة. فالمحبة هي ثمرة الإيمان (غلاطية ٥: ٦؛ ١ تيموثاوس ١: ٥)، وبالتالي فهي تأكيد الإيمان—ووراء ذلك، تأكيد دعوتنا واختيارنا.\u003c/p\u003e\n\u003cp\u003eغير أن المحبة لا تعني الكمال. فالرسالة ذاتها التي تطلب المحبة صراحة كبرهان على ولادتنا الثانية هي الرسالة ذاتها التي تؤكد صراحة أن المؤمنين ليسوا بلا خطية. فيقول يوحنا في رسالته الأولى: «نَحْنُ نَعْلَمُ أَنَّنَا قَدِ انْتَقَلْنَا مِنَ الْمَوْتِ إِلَى الْحَيَاةِ، لأَنَّنَا نُحِبُّ الإِخْوَةَ. مَنْ لاَ يُحِبَّ أَخَاهُ يَبْقَ فِي الْمَوْتِ... وَمَنْ لاَ يُحِبُّ لَمْ يَعْرِفِ اللهَ» (١ يوحنا ٣: ١٤؛ ٤: ٨). لكن يوحنا يقرر في الرسالة ذاتها: «إِنْ قُلْنَا: إِنَّهُ لَيْسَ لَنَا خَطِيَّةٌ نُضِلُّ أَنْفُسَنَا وَلَيْسَ الْحَقُّ فِينَا. إِنِ اعْتَرَفْنَا بِخَطَايَانَا فَهُوَ أَمِينٌ وَعَادِلٌ، حَتَّى يَغْفِرَ لَنَا خَطَايَانَا وَيُطَهِّرَنَا مِنْ كُلِّ إِثْمٍ» (١ يوحنا ١: ٨-٩). ولذلك، فإن الدليل الحاسم للإيمان الذي يصلي بولس لأجله ليس محبة خالية من الخطية، بل محبة حقيقية تظهر أصالة الإيمان المخلص—محبة غير كاملة تؤكد الإيمان بمخلص كامل، يُحسب كماله براً لنا.\u003c/p\u003e\n\u003ch3\u003eكمال بلا لوم تؤكده محبة غير كاملة\u003c/h3\u003e\n\u003cp\u003eوالآن يمكننا العودة إلى النصوص الثلاثة المقلقة (فيلبي ١: ٩-١١؛ ١ تسالونيكي ٣: ١١-١٣؛ ٥: ٢٣) واقتراح حل لهذه الحيرة. واقتراحي هو أن كون المسيحيين بلا لوم في يوم المسيح، وهو ما يصلي بولس لأجله، يشير إلى الكمال الخالي من الخطية الذي نلناه بالتبرير بالإيمان. إنه \"لا لوم\" محتسب من كمال بلا خطية، نملكه بسبب اتحادنا بالمسيح بالإيمان. لكن هذا \"اللا لوم\" الخالي من الخطية لا يكون حقيقياً إلا إذا تأكد في حياة المؤمن عبر تحول حقيقي من الأنانية المتكبرة إلى المحبة المتواضعة. وهذا يعني أن بولس يصلي لأجل المحبة في قلوب المؤمنين لأنها تؤكد إيمانهم المخلص، وتؤكد اتحادهم بالمسيح وبالتالي حسابهم بلا لوم عبر احتساب كمالاته لهم.\u003c/p\u003e\n\u003cp\u003eماذا عن كلمات الربط الجوهرية التي ركزنا عليها سابقاً؟ المحبة، «لِكَيْ تَكُونُوا مُخْلِصِينَ وَبِلاَ عَثْرَةٍ إِلَى يَوْمِ الْمَسِيحِ» (فيلبي ١: ٩-١٠). المحبة، «لِكَيْ يُثَبِّتَ قُلُوبَكُمْ بِلاَ لَوْمٍ فِي الْقَدَاسَةِ... فِي مَجِيءِ رَبِّنَا» (١ تسالونيكي ٣: ١٢-١٣). وصلاة أن يقدسكم الله لكي تُحفظوا بلا لوم عند مجيء المسيح (١ تسالونيكي ٥: ٢٣).\u003c/p\u003e\n\u003cp\u003eواقتراحي هو أن هذه الروابط تبين أن المحبة الحقيقية والعملية والمُعاشة هي ضرورة حاسمة لا غنى عنها لكي نوجد بلا لوم في يوم المسيح. وليس هذا لأن \"لا لوم\" ذلك اليوم يكمن في تلك المحبة؛ فمحبتنا ليست هي طهارتنا أو تبريرنا. بل تؤكد محبتنا \"اللا لوم\" الذي نملكه لأن إيماننا يوحدنا بالمسيح الذي يصالحنا مع الله وهو بلا لوم. فالإيمان الحقيقي عامل بالمحبة (غلاطية ٥: ٦)، ومن ثم فإن المحبة هي التأكيد الضروري للإيمان. والإيمان يوحدنا بالمسيح الذي هو برنا الكامل؛ ولذلك تؤكد المحبة كوننا بلا لوم، ولا وجود \"للا لوم\" بدونها. ومن ثم لا يصلي بولس لأجل أمر اختياري أو هامشي، بل يصلي لأجل ما هو ضروري لنقف قدام ابن الإنسان. فلا بد من وجود محبة حقيقية، وإن كانت غير كاملة فينا، لتؤكد \"لا لوم\" حقيقياً وكاملاً في المسيح.\u003c/p\u003e\n\u003ch3\u003eتوضيح فكرة التأكيد من حياة الملك سليمان\u003c/h3\u003e\n\u003cp\u003eوللقراء الذين قد يجدون صعوبة في تصور الفرق بين خلاص مؤكَّد وخلاص مسبَّب، دعوني أقدم صورة من حياة الملك سليمان. تذكروا القصة التي أحضرت فيها زانيتان طفلاً إلى سليمان، وكل منهما تزعم أن الطفل لها (١ الملوك ٣: ١٦-٢٧). وطلبتا من الملك أن يقضي بينهما. فقال الملك أن يؤتى بسيف ويُقسم الولد الحي نصفين، ويُعطى نصف لواحدة ونصف للأخرى. فصرخت الأم الحقيقية: «اسْتَمِعْ يَا سَيِّدِي. أَعْطُوهَا الْوَلَدَ الْحَيَّ وَلاَ تُمِيتُوهُ» (١ الملوك ٣: ٢٦). فقال سليمان: «أَعْطُوا الْوَلَدَ الْحَيَّ لِهَذِهِ وَلاَ تُمِيتُوهُ فَإِنَّهَا أُمُّهُ» (١ الملوك ٣: ٢٧).\u003c/p\u003e\n\u003cp\u003eفما الذي كان سليمان يبحث عنه في \"يوم القضاء\" هذا؟ لم يكن يبحث عن أفعال تخلق أو تسبب الأمومة، بل كان يبحث عن أفعال تؤكد الأمومة. وإذ وقفت المرأتان أمامه، كانت حقيقة الأمومة قائمة بالفعل ولم تكن موضع شك. فالقضاء لم يخلق الأمومة، ولم يكن لأي فعل تصنعه أي من المرأتين أن يخلق الأمومة.\u003c/p\u003e\n\u003cp\u003eوفي اليوم الذي يُدان فيه المسيحيون، لا يبحث الله عن أعمال تشتري صفحنا في ساحة قضائه، بل يبحث عن أعمال تبرهن على أننا ننعم بالفعل بصفحه وغفرانه. فثمن صفحنا كان دم يسوع، الكافي مرة واحدة وإلى الأبد لتغطية جميع خطايانا. والوسيلة التي نملك بها هذا الغفران هي الإيمان—الإيمان وحده. أما الأعمال التي ستُعرض فستؤكد الإيمان لأن «الإِيمَانَ أَيْضًا بِلاَ أَعْمَالٍ مَيِّتٌ» (يعقوب ٢: ٢٦).\u003c/p\u003e\n\u003ch3\u003eلماذا لا نكون بلا لوم على غرار الشيوخ؟\u003c/h3\u003e\n\u003cp\u003eوثمة سؤال جوهري قد يطرحه أحدهم عليّ: لماذا تجعل الأمر معقداً إلى هذا الحد؟ ألا تدرك أن الكلمات الدالة على \"بلا لوم\" تُستخدم جميعاً في العهد الجديد للإشارة إلى أناس غير كاملين في هذا العالم، حتى قبل المجيء الثاني؟ فلماذا لا يشير \"اللا لوم\" عند المجيء الثاني ببساطة إلى المسيحيين بالطريقة ذاتها التي تشير بها الكلمة في مواضع أخرى إلى المسيحيين (غير الكاملين) الآن؟ ولماذا تصر على أن \"اللا لوم\" أمام المسيح عند مجيئه يشير إلى \"اللا لوم\" المحتسب لنا في اتحادنا بالمسيح؟\u003c/p\u003e\n\u003cp\u003eوهذا سؤال وجيه للغاية لأن مقدمته صحيحة؛ فاللا لوم والكلمات المرتبطة به تُنسب إلى مسيحيين غير كاملين في هذه الحياة. فعلى سبيل المثال، القداسة أمر لا غنى لنا عنه الآن، وإلا «لَنْ يَرَى أَحَدٌ الرَّبَّ» (العبرانيين ١٢: ١٤). وعلى المسيحيين أن يكونوا «بِلاَ لَوْمٍ، وَبُسَطَاءَ، أَوْلاَدًا للهِ بِلاَ عَيْبٍ فِي وَسَطِ جِيلٍ مُعَوَّجٍ وَمُلْتَوٍ» (فيلبي ٢: ١٥). وعلى الناس أن يخدموا كشمامسة فقط «إِنْ كَانُوا بِلاَ لَوْمٍ» (١ تيموثاوس ٣: ١٠). و«يَجِبُ أَنْ يَكُونَ الأُسْقُفُ بِلاَ لَوْمٍ كَوكِيلِ اللهِ» (تيطس ١: ٧) \u003ca href=\"#footnote-2\"\u003e[٢]\u003c/a\u003e. وكان بولس يسعى دائماً ليكون له «دَائِمًا ضَمِيرٌ بِلاَ عَثْرَةٍ مِنْ نَحْوِ اللهِ وَالنَّاسِ» (أعمال ٢٤: ١٦). وكان زكريا وأَلِيصَابَات سالكين في وصايا الرب وأحكامه «بِلاَ لَوْمٍ» (لوقا ١: ٦). وقال بولس لأهل تسالونيكي: «أَنْتُمْ شُهُودٌ... كَيْفَ بِقَدَاسَةٍ وَبِرٍّ وَبِلاَ لَوْمٍ كَانَتْ سِيرَتُنَا عِنْدَكُمْ أَنْتُمُ الْمُؤْمِنِينَ» (١ تسالونيكي ٢: ١٠).\u003c/p\u003e\n\u003cp\u003eوالسؤال المطروح عليّ إذن هو: لماذا لا تظن أن \"اللا لوم\" عند مجيء المسيح يشير إلى هذا النوع من \"اللا لوم\" غير الكامل، بدلاً من لا لوم كامل نملكه بالاتحاد بالمسيح؟ من الواضح أن \"اللا لوم\" المشار إليه في الفقرة السابقة لا يعني الكمال، بل يعني شيئاً مثل \"الخلو من اللوم الفاضح في العالم، مع عادة ناضجة إلى حد ما في تسوية الحسابات سريعاً بالاعتراف بالخطية، والسلوك في نصرة واضحة على التجربة\". فلماذا لا نفترض أن هذا هو ما يطلبه بولس حين يصلي لكي نكون \"بلا لوم\" في يوم المسيح (فيلبي ١: ١٠؛ ١ تسالونيكي ٣: ١٣； ٥: ٢٣)؟\u003c/p\u003e\n\u003cp\u003eولهذه الإجابة شقان؛ الأول أنه ليس كل المسيحيين في الواقع \"بلا لوم على نحو غير كامل\" بالمعنى المطلوب، على سبيل المثال، من الشيوخ والشمامسة. والثاني أن بولس يعد بأن الله سيتكفل بأن يقف جميع المسيحيين، وليس بعضهم فقط، بلا لوم أمام المسيح عند مجيئه.\u003c/p\u003e\n\u003ch4\u003e١. عند مجيء المسيح، ليس كل المسيحيين يملكون مؤهلات الشيوخ من اللا لوم\u003c/h4\u003e\n\u003cp\u003eفمن غير المرجح أن يقول بولس إن الشمامسة (١ تيموثاوس ٣: ١٠) والشيوخ (تيطس ١: ٧) يجب أن يكونوا \"بلا لوم\" لكي يتأهلوا كمسؤولين في الكنيسة، لو كان جميع المؤمنين بلا لوم بالفعل. وعلاوة على ذلك، يصور بولس بعض المعلمين المسيحيين وهم يصلون إلى يوم دينونة المسيح ويخسرون أعمالهم لأنهم بنوا على أساس المسيح باختراعات وتعاليم بشرية لم تبنِ كنيسة مقدسة ومعافاة حقاً. ويقرر بولس أن هؤلاء المسيحيين سيخلصون «وَلَكِنْ كَمَا بِنَارٍ»، لكن ما بنوه سيحترق، وسيعانون خسارة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلَكِنْ إِنْ كَانَ أَحَدٌ يَبْنِي عَلَى هَذَا الأَسَاسِ: ذَهَبًا، فِضَّةً، حِجَارَةً كَرِيمَةً، خَشَبًا، عُشْبًا، قَشًّا، فَعَمَلُ كُلِّ وَاحِدٍ سَيَصِيرُ ظَاهِرًا لأَنَّ الْيَوْمَ سَيُبَيِّنُهُ. لأَنَّهُ بِنَارٍ يُسْتَعْلَنُ، وَسَتَمْتَحِنُ النَّارُ عَمَلَ كُلِّ وَاحِدٍ مَا هُوَ. إِنْ بَقِيَ عَمَلُ أَحَدٍ قَدْ بَنَاهُ عَلَيْهِ فَسَيَأْخُذُ أُجْرَةً. إِنِ احْتَرَقَ عَمَلُ أَحَدٍ فَسَيَخْسَرُ، وَأَمَّا هُوَ فَسَيَخْلُص... وَلَكِنْ كَمَا بِنَارٍ.» (١ كورنثوس ٣: ١٢-١٥)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوسنتناول هذا النص بمزيد من التفصيل في الفصل الحادي عشر، غير أن النقطة المهمة الآن هي أنني لا أظن أن بولس قد يصف هؤلاء المعلمين بأنهم \"بلا لوم\" في يوم المسيح بالمعنى لمؤهلات الشيوخ والسلوك في النضج. ولكن بما أنهم يخلصون، فنحن نعلم أنهم يقفون أمام المسيح \"بلا لوم\" بمعنى حسابهم أبراراً لأجل المسيح. لقد اختبروا ولادة ثانية حقيقية، وكان لديهم إيمان أصيل، وميزت محبة الناس حياتهم الخدمية. لكن خدماتهم كانت معيبة بشكل ملحوظ، وأعمتهم جوانب من قلوبهم غير الكاملة عن إبصار حماقة البناء بالخشب والعشب والقش.\u003c/p\u003e\n\u003ch4\u003e٢. وعود مجيدة تعيننا على محبة ظهور الرب\u003c/h4\u003e\n\u003cp\u003eوإليك الشق الآخر من إجابتي عن سبب ظني أن \"اللا لوم\" في يوم المسيح يشير إلى لا لوم كامل في المسيح، تؤكده محبة غير كاملة فينا. فالرسول بولس يعد بأن الله سيتكفل بتحقيق هذا \"اللا لوم\" لجميع المسيحيين، وأمانته ذاتها تضمن ذلك. وهذا يمثل تشجيعاً عظيماً لمحبة ظهور الرب.\u003c/p\u003e\n\u003cp\u003eفبعد صلاته لكي يقدس الله المؤمنين ويحفظهم بلا لوم من كل جهة وفي كل جانب من كيانهم (الروح والنفس والجسد)، يقرر بولس، بحديث يحمل تشجيعاً هائلاً لنا، أن أمانة الله ستتكفل تماماً بتحقيق ذلك:\u003c/p\u003e\n\u003cp\u003e«...وَإِلَهُ السَّلاَمِ نَفْسُهُ يُقَدِّسُكُمْ بِالتَّمَامِ. وَلْتُحْفَظْ رُوحُكُمْ وَنَفْسُكُمْ وَجَسَدُكُمْ كَامِلَةً بِلاَ لَوْمٍ عِنْدَ مَجِيءِ رَبِّنَا يَسُوعَ الْمَسِيحِ. أَمِينٌ هُوَ الَّذِي يَدْعُوكُمُ الَّذِي سَيَفْعَلُ أَيْضًا.» (١ تسالونيكي ٥: ٢٣-٢٤)\u003c/p\u003e\n\u003cp\u003eوهذا وعد مجيد مصمم ليعيننا على محبة ظهور الرب. فالله سيحفظكم بلا لوم \u003ca href=\"#footnote-3\"\u003e[٣]\u003c/a\u003e! وسيحدث هذا يقيناً، وسيجري حفظكم. ستقفون أمام المسيح عند مجيئه بلا لوم أو شائبة؛ ليس لأنكم كاملون في ذواتكم أو في خدمتكم، بل لأنكم محفوظون في المسيح يسوع، وكشوف حسابه من الكمال تُحسب لكم. فتقديسكم يؤكد إيمانهم، وإيمانكم هو الأداة التي بها أنتم في المسيح. وهذا أمر مضمون؛ والله سيفعله.\u003c/p\u003e\n\u003ch3\u003eثقة المدعوين عند مجيء المسيح\u003c/h3\u003e\n\u003cp\u003eويقدم لنا بولس الوعد الراسخ ذاته بقوة أكبر في ١ كورنثوس ١: ٧-٩:\u003c/p\u003e\n\u003cp\u003e«...وَأَنْتُمْ مُتَوَقِّعُونَ اسْتِعْلاَنِ رَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِي سَيُثْبِتُكُمْ أَيْضًا إِلَى النِّهَايَةِ بِلاَ لَوْمٍ فِي يَوْمِ رَبِّنَا يَسُوعَ الْمَسِيحِ. أَمِينٌ هُوَ اللهُ الَّذِي بِهِ دُعِيتُمْ إِلَى شَرِكَةِ ابْنِهِ يَسُوعَ الْمَسِيحِ رَبِّنَا.» (١ كورنثوس ١: ٧-٩)\u003c/p\u003e\n\u003cp\u003eوبعبارة أخرى، فإن صلوات بولس لكي تزداد محبتنا لنوجد بلا لوم في يوم المسيح (فيلبي ١: ١٠؛ ١ تسالونيكي ٣: ١٣) ستُستجاب! فالله سيحضرنا إلى يوم المسيح بلا لوم. وهذا وعد لجميع المسيحيين الحقيقيين، وليس لبعضهم فقط (مثل الناضجين أو المؤهلين لمسؤولية الشيوخ). ويأتي هذا الوعد بقوة تفوق تلك التي في ١ تسالونيكي ٥: ٢٤ لأن بولس لا يكتفي بتأسيسه على أمانة الله فحسب، بل يربطه أيضاً بدعوتنا. ونحن نعلم كيف يفكر بولس: «وَالَّذِينَ سَبَقَ فَعَيَّنَهُمْ فَهَؤُلاَءِ دَعَاهُمْ أَيْضًا. وَالَّذِينَ دَعَاهُمْ فَهَؤُلاَءِ بَرَّرَهُمْ أَيْضًا. وَالَّذِينَ بَرَّرَهُمْ فَهَؤُلاَءِ مَجَّدَهُمْ أَيْضًا» (رومية ٨: ٣٠). وبعبارة أخرى، فبربط هذا الوعد بدعوتنا، يُعلن بولس أنه أمر يقيني مطلقاً. ويمكننا أن نضيف حلقة أخرى إلى سلسلة اليقين هذه: \"والذين دعاهم سيثبتهم أيضاً بلا لوم في يوم المسيح\".\u003c/p\u003e\n\u003ch3\u003eسيكمل ما قد بدأه\u003c/h3\u003e\n\u003cp\u003eويؤكد بولس على الوعد ذاته في فيلبي ١: ٦: «وَاثِقًا بِهَذَا عَيْنِهِ أَنْ الَّذِي بَدَأَ فِيكُمْ عَمَلاً صَالِحًا يُكَمِّلُ إِلَى يَوْمِ يَسُوعَ الْمَسِيحِ». فالعمل الذي بدأه الله في كل مؤمن حقيقي هو عمل الإيمان والمحبة والقداسة. وسيواصل هذا العمل في جميع مختاريه بلا زلل، وسيكمل عمل التقديس إلى الحد الذي يقدم فيه جميع المؤمنين دليلاً في يوم المسيح على أن إيمانهم حقيقي وأنهم يقفون كاملين في المسيح يسوع.\u003c/p\u003e\n\u003ch3\u003eجلال الحافظ\u003c/h3\u003e\n\u003cp\u003eوأضيف وعداً آخر من يهوذا إلى هذه الوعود الإلهية المقوية للرجاء:\u003c/p\u003e\n\u003cp\u003e«وَالْقَادِرُ أَنْ يَحْفَظَكُمْ غَيْرَ عَاثِرِينَ، وَيُوقِفَكُمْ أَمَامَ مَجْدِهِ بِلاَ عَيْبٍ فِي الابْتِهَاجِ، الإِلهُ الْحَكِيمُ الْوَحِيدُ مُخَلِّصُنَا، لَهُ الْمَجْدُ وَالْعَظَمَةُ وَالْقُدْرَةُ وَالسُّلْطَانُ، الآنَ وَإِلَى كُلِّ الدُّهُورِ. آمِينَ.» (يهوذا ٢٤-٢٥)\u003c/p\u003e\n\u003cp\u003eورغم أن هذا المقطع جاء في قالب تسبحة، لا وعد مباشر، إلا أنه يحمل قوة الوعد. فيهوذا يحتفل بمجد حفظ الله لنا وإيقافنا بلا عيب، وتلك هي الطريقة ذاتها التي يصف بها المسيحيين في مطلع رسالته: «يَهُوذَا، عَبْدُ يَسُوعَ الْمَسِيحِ، وَأَخُو يَعْقُوبَ، إِلَى الْمَدْعُوِّينَ الْمُقَدَّسِينَ فِي اللهِ الآبِ، وَالْمَحْفُوظِينَ لِيَسُوعَ الْمَسِيحِ» (يهوذا ١). أي المحفوظين بقوة الله. فهذه هي هويتنا: مدعوون ومحفوظون، ومَن يدعوهم الله يحفظهم أيضاً.\u003c/p\u003e\n\u003cp\u003eوتسمو تسبحة يهوذا الختامية بذكر \"المجد والعظمة والقدرة والسلطان\" لله، محتفية بعمله المزدوج الصريح: حفظنا غير عاثرين وإيقافنا بلا عيب أمام حضرة مجده بابتهاج عظيم. سيفعل ذلك يقيناً؛ فبولس يؤسس الوعد على أمانة الله، ويهوذا يؤسسه على مجده وعظمته وسلطانه وقدرته. فمجد الله يضمن حفظ مدعويه—ولأي غاية؟ \"للا لوم\" والابتهاج عند مجيء المسيح.\u003c/p\u003e\n\u003ch3\u003eضمير مستريح ومحبة ملتهبة لظهور المسيح\u003c/h3\u003e\n\u003cp\u003eإن إجابتي عن تساؤل لماذا أظن أن \"اللا لوم\" الذي يصلي بولس لنناله عند مجيء المسيح يشير إلى كمال المسيح المحتسب لنا، لا إلى ذلك \"اللا لوم\" غير الكامل المطلوب مثلاً من الشيوخ والشمامسة، تكمن في أن: (١) ليس كل المسيحيين الحقيقيين سيملكون ذلك \"اللا لوم\" العملي عند مجيء المسيح، ومع ذلك (٢) وُعد جميع المؤمنين الحقيقيين بأن يقدمهم الله بلا لوم في ذلك اليوم.\u003c/p\u003e\n\u003cp\u003eومن ثم، فإن تلك المقاطع التي وصفتها بالمقلقة والمحيرة (فيلبي ١: ٩-١١؛ ١ تسالونيكي ٣: ١١-١٣； ٥: ٢٣) لا ينبغي أن تقلقنا أو تحيرنا، بل بالأحرى يجب أن تلهب محبتنا لظهور المسيح. فهي تظهر لنا كيف ينبغي أن نصلي (مع بولس) لكي يعمل الله على زيادة محبتنا في قلوبنا، الأمر الذي يؤكد حقيقة أن المسيح قد دعانا إلى ملكوته، كما ترشدنا إلى وعود الله المتعددة بأنه سيثبت مدعويه بلا لوم يقيناً في يوم المسيح.\u003c/p\u003e\n\u003cp\u003e«أَمِينٌ هُوَ الَّذِي يَدْعُوكُمُ الَّذِي سَيَفْعَلُ أَيْضًا» (١ تسالونيكي ٥: ٢٤). و«الَّذِي بَدَأَ فِيكُمْ عَمَلاً صَالِحًا يُكَمِّلُ إِلَى يَوْمِ يَسُوعَ الْمَسِيحِ» (فيلبي ١: ٦). وإن مجد الله وعظمته وقدرته وسلطانه تضمن حفظ مدعويه من العثور والسقوط في عدم الإيمان، وايقافهم بلا عيب أمام حضرة مجد المسيح بابتهاج عظيم (يهوذا ٢٤).\u003c/p\u003e\n\u003cp\u003eوصلاتي هي أن نصدق هذه الوعود، ونتوق لرجاء ذلك الابتهاج، ونحب ظهور الرب.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-1\"\u003e[١]\u003c/a\u003e لا أستبعد من ذلك فكرة أن عمل الله المصالح (والمبرر) على الصليب يتضمن قصد الله بأن يفيض بوعد العهد الجديد ليعمل فينا ذلك \"اللا لوم\" العملي في حياتنا اليومية (إرميا ٣١: ٣٣؛ حزقيال ٣٦: ٢٧؛ لوقا ٢٢: ٢٠).\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-2\"\u003e[٢]\u003c/a\u003e هذه الكلمة المترجمة \"بلا لوم\" هي الكلمة ذاتها المترجمة \"بلا لوم\" في ١ تيموثاوس ٣: ١٠، والمترجمة \"بلا لوم\" في ١ كورنثوس ١: ٨، وتستخدم مع كلمة \"بلا عيب\" في كولوسي ١: ٢٢.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref-3\"\u003e[٣]\u003c/a\u003e نعم، جاءت الكلمة في اليونانية كظرف (بلا لوم/على نحو منزه عن اللوم)، لا كصفة (بلا لوم). وتترجمها معظم النسخ كصفة—مثل نسخة (ESV) التي اقتبستُ منها—لأن المعنى الظرفي يبدو غريباً بعض الشيء. وبوصفه ظرفاً، فإنه يُعَدل صفة أو فعلاً؛ فالصفة التي يمكن أن يعدلها هي \"كاملة\" («روحكم ونفسكم وجسدكم كاملة»)، والفعل الذي يمكن أن يُعَدله هو \"تُحفظ\". وكلا الأمرين يبدو غريباً: \"تُحفظ على نحو منزه عن اللوم\" أو \"كاملة على نحو منزه عن اللوم\". والأول يشير إلى أن الله يعمل بلا لوم، بينما الثاني يشير إلى أن كمال الروح والنفس والجسد يجب أن يُنظر إليه في إشارة إلى خلوها من اللوم. ولست متأكداً كيف يعمل الظرف هنا. ومن التفاصيل التي تجعل هذا النص غريباً بعض الشيء هي الإشارة إلى \"الجسد\" باعتباره \"بلا لوم\". ولكن كون (ἀμέμπτως) ظرفاً قد يعيننا على عدم التعثر في تلك الغرابة؛ فبولس لا يصف الجسد بصفة \"بلا لوم\" كما تفعل معظم التراجم. وبناءً عليه، أستنتج أن الفكرة العامة هي أن الله سيعمل بطريقة تجعلنا، بأكمل صورة ممكنة (ὁλόκληρον)، غير مُعرّضين لأي لوم بأي حال من الأحوال.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjI9Xk1d_vhNwG7TA4GaI8SriaMfan25rP6UngZEgmDRPj8vZDR7l7GC75pBly12G51yMJMlLtQ_73_cNV_eT6e2ZvRTrMjc3MKluh8dsWbpTd0JuWNtcxvWKNTt6WWmuACXNY7CdigmstRYWqC_tpjN9PuudPDGu3l1UOMGo4TNWRdY60VaBQEh45b2Zc/s2752/%D8%A8%D9%84%D8%A7_%D9%84%D9%88%D9%85_%D8%B9%D9%86%D8%AF_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjI9Xk1d_vhNwG7TA4GaI8SriaMfan25rP6UngZEgmDRPj8vZDR7l7GC75pBly12G51yMJMlLtQ_73_cNV_eT6e2ZvRTrMjc3MKluh8dsWbpTd0JuWNtcxvWKNTt6WWmuACXNY7CdigmstRYWqC_tpjN9PuudPDGu3l1UOMGo4TNWRdY60VaBQEh45b2Zc/s600/%D8%A8%D9%84%D8%A7_%D9%84%D9%88%D9%85_%D8%B9%D9%86%D8%AF_%D8%A7%D9%84%D9%85%D8%AC%D9%8A%D8%A1.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"21:T8f60,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الخامس\u003c/h2\u003e\n\u003cp\u003eالنعمة التي يُؤتى بها إليكم عند استعلان المسيح\u003c/p\u003e\n\u003cp\u003eحينما يجيء المسيح ثانية في مجد أبيه وبصحبته ملايين الملائكة، سيحل يوم حساب كوني عظيم. «هُوَذَا يَأْتِي مَعَ السَّحَابِ، وَسَتَنْظُرُهُ كُلُّ عَيْنٍ، وَالَّذِينَ طَعَنُوهُ، وَيَنُوحُ عَلَيْهِ جَمِيعُ قَبَائِلِ الأَرْضِ» (رؤيا ١: ٧). وسيكون هذا الحدث مروعاً ومغايراً تماماً لكل ما شهده تاريخ العالم، حتى إننا سنُصعق جميعاً ونكاد لا نصدق أعيننا. ومن المخاوف التي قد تساور قلوبنا بحق، حتى في يومنا هذا، التساؤل التالي: هل ستكون هناك نعمة وسط هذا الرعب؟ وتتمثل غاية هذا الفصل في إظهار إجابة عن هذا التساؤل، إجابة من شأنها أن تلهب محبتنا لظهور الرب.\u003c/p\u003e\n\u003ch3\u003eوصية بالرجاء في النعمة\u003c/h3\u003e\n\u003cp\u003eتتخلل رسالتي بطرس إشارات متكررة إلى المجيء الثاني للمسيح (١ بطرس ١: ٥، ٧، ١٣؛ ٢: ١٢؛ ٤: ٧، ١٢-١٣؛ ٥: ١، ٤؛ ٢ بطرس ١: ١٦-١٩؛ ٢: ٩؛ ٣: ١-١٣). فقد عَده أمراً بالغ الأهمية للمؤمنين في عصره، رغم إدراكه للاحتمال العجيب بأن هذا المجيء قد يكون في مستقبل بعيد، إذ «أَنَّ يَوْمًا وَاحِدًا عِنْدَ الرَّبِّ كَأَلْفِ سَنَةٍ، وَأَلْفَ سَنَةٍ كَيَوْمٍ وَاحِدٍ» (٢ بطرس ٣: ٨). وتُعد إحدى أكثر عباراته شمولاً وبعثاً للرجاء المفرح بشأن المجيء الثاني هي ما ورد في ١ بطرس ١: ١٣، والتي تضع أحد أعمق الأسس لمحبتنا لظهور المسيح: «فَأَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ».\u003c/p\u003e\n\u003ch3\u003eسياق الانتظار، وعدم الرؤية، والمحبة\u003c/h3\u003e\n\u003cp\u003eولوضع هذه الوصية في سياقها، يُقرر بطرس في ١ بطرس ١: ٥ أن المؤمنين الآن هم «بِقُوَّةِ اللهِ مَحْرُوسُونَ، بِإِيمَانٍ، لِخَلاَصٍ مُسْتَعَدٍّ أَنْ يُعْلَنَ فِي الزَّمَانِ الأَخِيرِ». و\"الزمان الأخير\" هو وقت مجيء يسوع. ويُجلي بطرس هذا المعنى بعددَدين لاحقين، حينما يخبر المؤمنين أن آلامهم الحاضرة هي كنار تنقية، ستمحصهم لمجيء يسوع. فهم يُمتحنون «لِكَيْ تَكُونَ تَزْكِيَةُ إِيمَانِكُمْ، وَهِيَ أَثْمَنُ مِنَ الذَّهَبِ الْفَانِي، مَعَ أَنَّهُ يُمْتَحَنُ بِالنَّارِ، تُوجَدُ لِلْمَدْحِ وَالْكَرَامَةِ وَالْمَجْدِ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ» (١ بطرس ١: ١٧). وهذا الاستعلان هو مجيء المسيح، جالب «لخَلاَصٍ مُسْتَعَدٍّ أَنْ يُعْلَنَ فِي الزَّمَانِ الأَخِيرِ».\u003c/p\u003e\n\u003cp\u003eيُحب بطرس وصف مجيء المسيح بأنه \"استعلان يسوع المسيح\" (١ بطرس ١: ٥، ١٣؛ ٤: ١٣؛ ٥: ١). فهذا يذكر قراءه بأنهم، في الوقت الحاضر، لا يقدرون أن \"يروا\" يسوع، لكنه في يوم مجيئه سيُستعلن، وسيرونه. لقد رأى بطرس نفسه يسوع، ويحرص على إخبارنا بذلك، إذ كان \"شَاهِدًا لآلاَمِ الْمَسِيحِ\" (١ بطرس ٥: ١). ورغم ذلك، فهو يشاطر الآن عموم المسيحيين ضرورة التحلي بالصبر، إذ يجب عليهم أن ينتظروا من يحبونه: «الَّذِي وَإِنْ لَمْ تَرَوْهُ تُحِبُّونَهُ. ذلِكَ وَإِنْ كُنْتُمْ لاَ تَرَوْنَهُ الآنَ لكِنْ تُؤْمِنُونَ بِهِ، فَتَبْتَهِجُونَ بِفَرَحٍ لاَ يُنْطَقُ بِهِ وَمَجِيدٍ» (١ بطرس ١: ٨).\u003c/p\u003e\n\u003cp\u003eوفي حالة عدم رؤية يسوع المؤقتة هذه، يرمي بطرس إلى إثارة رجاء المؤمنين لكي تغدو محبتهم ليسوع محبة لظهوره أيضاً. فيشير إلى الأنبياء الذين «تَنَبَّأُوا عَنِ النِّعْمَةِ» التي ستأتي لشعب الله عبر «الآلاَمِ الَّتِي لِلْمَسِيحِ، وَالأَمْجَادِ الَّتِي بَعْدَهَا» (١ بطرس ١: ١٠-١١). لقد أتت النعمة (في آلام المسيح)، وكانت النعمة آتية (في أمجاد المسيح). بل إن الملائكة أنفسهم يشتهون أن يطَّلعوا على أعمال نعمة الله العظيمة (١ بطرس ١: ١٢).\u003c/p\u003e\n\u003ch3\u003eأساس عميق للمحبة\u003c/h3\u003e\n\u003cp\u003eثم يُضيف بطرس قائلاً: «لِذلِكَ مَنْطِقُوا أَحْقَاءَ ذِهْنِكُمْ صَاحِينَ، فَأَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ» (١ بطرس ١: ١٣). وهذا هو الإعلان الذي قلت إنه يضع أحد أعمق الأسس لمحبتنا لظهور المسيح. فذلك الأساس العميق هو نعمة الله. فحينما يُستعلن المسيح من السماء، سيختبر شعبه ذلك الحدث باعتباره نعمة. وكل ما سيجري لهم في ذلك اليوم سيرتكز على هذا الأساس: النعمة.\u003c/p\u003e\n\u003ch3\u003eمجد النعمة\u003c/h3\u003e\n\u003cp\u003eلقد رسخت كلمة النعمة بقوة في الفهم المسيحي حتى إن بطرس لم يُعرّفها في رسائله. غير أنه يَحْسُن بنا ألا نتجاوز معناها على عجل، وكأن مجدها معروف ومُحسوس لدى الجميع. ففي العهد الجديد، يجعل الرسول بولس هذا المصطلح جلياً ومجيداً. فمن أصل ١٢٤ مرة استُخدمت فيها كلمة النعمة في العهد الجديد، وردت ٨٤ مرة في كتابات بولس.\u003c/p\u003e\n\u003cp\u003eتتمثل نعمة الله، في جوهرها، في ميله وعمله لمنح الخلاص لأناس يستحقون دينونته. بعبارة أخرى، نعمة الله هي صنع الخير، ليس لمن لا يستحقونه فحسب، بل لمن يستحقون نقيضه. فكل البشر قد أخطأوا (رومية ٣: ٩، ٢٣). ولذلك، فنحن لسنا مجرد غير مستحقين للخير، بل مستحقون للعقاب. نحن نستحق غضب الله. فنحن «بِالطَّبِيعَةِ أَبْنَاءَ الْغَضَبِ كَالْبَاقِينَ أَيْضًا» (أفسس ٢: ٣). ولو كانت صفة الله الوحيدة هي العدل الصارم، لهلكنا جميعاً. ففي خطيتنا وذنبنا، نحن مُعرضون لعقاب أبدي (متى ٢٥: ٤٦؛ ٢ تسالونيكي ١: ٩). وأي عذاب يقل عن الجحيم هو أقل مما نستحقه.\u003c/p\u003e\n\u003cp\u003eغير أن عدل الله ليس صِفته الوحيدة. فرجاء الجنس البشري يكمن في أنه «حَيْثُ كَثُرَتِ الْخَطِيَّةُ ازْدَادَتِ النِّعْمَةُ جِدًّا. حَتَّى كَمَا مَلَكَتِ الْخَطِيَّةُ فِي الْمَوْتِ، هكَذَا تَمْلِكُ النِّعْمَةُ بِالْبِرِّ، لِلْحَيَاةِ الأَبَدِيَّةِ، بِيَسُوعَ الْمَسِيحِ رَبِّنَا» (رومية ٥: ٢٠-٢١). «لأَنَّهُ قَدْ ظَهَرَتْ نِعْمَةُ اللهِ الْمُخَلِّصَةُ، لِجَمِيعِ النَّاسِ» (تيطس ٢: ١١). لقد مهدت النعمة طريقاً لإعلاء عدل الله، بينما يُبرر الخطاة المذنبون—بشكل مذهل—عوضاً عن إدانتهم. إذ نحن «مُتَبَرِّرِينَ مَجَّانًا بِنِعْمَتِهِ بِالْفِدَاءِ الَّذِي بِيَسُوعَ الْمَسِيحِ» (رومية ٣: ٢٤). التبرير أمام الله هو هبة مجانية. وهذا هو صَنيع النعمة.\u003c/p\u003e\n\u003cp\u003eوقد أضحى هذا ممكناً لأن المسيح صار لعنة لأجلنا (غلاطية ٣: ١٣). وسُمِّر صك دَيننا على صليبه (كولوسي ٢: ١٤). فالله «جَعَلَ الَّذِي لَمْ يَعْرِفْ خَطِيَّةً، خَطِيَّةً لأَجْلِنَا، لِنَصِيرَ نَحْنُ بِرَّ اللهِ فِيهِ» (٢ كورنثوس ٥: ٢١). والآن، «الَّذِينَ يَنَالُونَ فَيْضَ النِّعْمَةِ وَعَطِيَّةَ الْبِرِّ، سَيَمْلِكُونَ فِي الْحَيَاةِ بِالْوَاحِدِ يَسُوعَ الْمَسِيحِ!» (رومية ٥: ١٧). ويُدعى هذا النوال إيماناً. «فَإِذْ قَدْ تَبَرَّرْنَا بِالإِيمَانِ لَنَا سَلاَمٌ مَعَ اللهِ بِرَبِّنَا يَسُوعَ الْمَسِيحِ» (رومية ٥: ١).\u003c/p\u003e\n\u003cp\u003eإن نعمة الله تُمثل أساساً عميقاً لرجائنا حتى إن جذورها تمتد إلى الأزل. فالله «خَلَّصَنَا... لاَ بِمُقْتَضَى أَعْمَالِنَا، بَلْ بِمُقْتَضَى الْقَصْدِ وَالنِّعْمَةِ الَّتِي أُعْطِيَتْ لَنَا فِي الْمَسِيحِ يَسُوعَ قَبْلَ الأَزْمِنَةِ الأَزَلِيَّةِ» (٢ تيموثاوس ١: ٩). فالنعمة التي خلصتنا قد وُهبت لنا قبل الخليقة. ويصف بولس هذا في رسالة أفسس: «إِذْ سَبَقَ فَعَيَّنَنَا لِلتَّبَنِّي بِيَسُوعَ الْمَسِيحِ لِنَفْسِهِ، حَسَبَ مَسَرَّةِ مَشِيئَتِهِ، لِمَدْحِ مَجْدِ نِعْمَتِهِ» (أفسس ١: ٥-٦). بعبارة أخرى، كان قصد الله الأزلي من تعيينه المسبق لشعبه للتبني هو أن نمدح مجد نعمته. كانت تلك خطة الله للدهور قبل أن تبدأ الدهور: مدح مجد نعمة الله.\u003c/p\u003e\n\u003cp\u003eولما كانت جذور النعمة الأعمق ضاربة في الأزل الماضي، يسعنا أن نتيقن أنها ستحملنا بفرح إلى الأبدية المستقبلية. فالله «أَحَبَّنَا، وَأَعْطَانَا عَزَاءً أَبَدِيًّا وَرَجَاءً صَالِحًا بِالنِّعْمَةِ» (٢ تسالونيكي ٢: ١٦). عزاء أبدياً بالنعمة. ستتكفل النعمة بألا يفشل عزاؤنا ورجاؤنا البتة. «حَتَّى إِذَا تَبَرَّرْنَا بِنِعْمَتِهِ، نَصِيرُ وَرَثَةً حَسَبَ رَجَاءِ الْحَيَاةِ الأَبَدِيَّةِ» (تيطس ٣: ٧). وستجلب تلك الحياة تجلياً لا ينتهي لأبعاد جديدة ومُشبعة من النعمة: «لِيُظْهِرَ فِي الدُّهُورِ الآتِيَةِ غِنَى نِعْمَتِهِ الْفَائِقَ، بِاللُّطْفِ عَلَيْنَا فِي الْمَسِيحِ يَسُوعَ» (أفسس ٢: ٧). وسيستغرق اكتمال فرحنا دهوراً أبدية، إذ إن هناك غنى فائقاً للنعمة. وهكذا، فإن أبدية حياتنا في المسيح، المتجددة دائماً والتي لا يعتريها الملل قط، ترتكز على هبة نعمة الله التي لا تنضب. نعمة أبدية. نعمة من الأزل الماضي إلى الأبدية المستقبلية.\u003c/p\u003e\n\u003ch3\u003eأطلق العنان لمخيلتك\u003c/h3\u003e\n\u003cp\u003eنعود الآن إلى ١ بطرس ١: ١٣: «فَأَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ». فمن بين عشرات الحقائق التي كان بوسع بطرس إيرادها عما سيأتينا عند استعلان المسيح، فإنه يقول: \"النِّعْمَةِ الَّتِي يُؤْتَى بِهَا إِلَيْكُمْ\". ويا لها من بشارة مفرحة للمتعثرين والشاكين والمهمومين أمثالنا.\u003c/p\u003e\n\u003cp\u003eأطلق العنان لمخيلتك قليلاً لتتصور كيف ستكون تلك الساعة.\u003c/p\u003e\n\u003cp\u003eنحن لا نعلم بتفصيل أو دقة كيف ستكون لحظة مجيئه. غير أن أدنى محاولة لتخيلها تغمرنا بالرهبة. فجأة، سيتبدد كل شك بشأن حقيقته تبدداً تاماً. وسيحل محله يقين قاطع. ولن يكون هناك أي شيء—أي شيء على الإطلاق—خيالياً في الأمر. بل ستكون حقيقة مجردة. وللمرة الأولى في حياتنا، سيحل العيان محل الإيمان بما لا يُرى. وسيكون حجم الحدث من العِظم بحيث نشعر وكأن قلوبنا ستنفجر. ولن نملك في ذواتنا أي قدرات لسبر أغوار هذا الحدث. وسيجعلنا نقف مذهولين.\u003c/p\u003e\n\u003cp\u003eإن الهوة اللامتناهية بين كماله وقداسته الممزوجين بقوته الجبارة من جهة، وضعفنا البالغ الضآلة، وشرنا الأخلاقي، وحياتنا التافهة المبتذلة من جهة أخرى، ستكون جلية ومروعة بشكل كاسح. وسيُستعلن «مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ، مُعْطِيًا نَقْمَةً لِلَّذِينَ لاَ يَعْرِفُونَ اللهَ، وَالَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ رَبِّنَا يَسُوعَ الْمَسِيحِ» (٢ تسالونيكي ١: ٧-٨). فليس في تلك الساعة ما يبعث على الدفء أو الطمأنينة. بل ستجلب رعباً وعقاباً صارمين لكل مَن هُم خارج المسيح. وستؤذن بنهاية كل أناة إلهية تجاه أولئك الذين لم يؤمنوا بالإنجيل.\u003c/p\u003e\n\u003ch3\u003eإن كان ثمة رجاء، فسيكون نعمة، نعمة شخصية\u003c/h3\u003e\n\u003cp\u003eفي تلك اللحظة، سيكون لدينا رجاء واحد: النعمة. ولن يخالجنا أي فكر بالاستحقاق. ولا فكر بالجدارة أو بأننا أفضل قليلاً من الآخرين. بل لن ينتابنا سوى شعور بالانكشاف المطلق وعجز تام عن النطق، كما لو ضُبطت متلبساً بجرم لطالما أفلتّ منه لسنوات. فلا ملجأ. ولا مهرب. ولا عذر. وإن كان ثمة رجاء، فسيكون هو النعمة. لذلك يوجز بطرس في كلمة واحدة ما يُؤتى به \"إليكم\" عند استعلان المسيح: النعمة.\u003c/p\u003e\n\u003cp\u003e\"إليكم\". مَن هُم المخاطبون بكلمة \"إليكم\" في العدد ١٣؟ إنهم أولئك الذين ولدهم الله «ثَانِيَةً لِرَجَاءٍ حَيٍّ، بِقِيَامَةِ يَسُوعَ» (١ بطرس ١: ٣)، والذين هم «بِقُوَّةِ اللهِ مَحْرُوسُونَ، بِإِيمَانٍ، لِخَلاَصٍ مُسْتَعَدٍّ أَنْ يُعْلَنَ فِي الزَّمَانِ الأَخِيرِ» (١ بطرس ١: ٥)، والذين نُقِّي إيمانهم المُختبر عبر الألم (١ بطرس ١: ٧)، والذين يحبون المسيح غير المرئي ويثقون به (١ بطرس ١: ٨).\u003c/p\u003e\n\u003cp\u003eوبالنسبة لهم، لن يكون يوم المسيح يوماً مهلكاً. بل سيكون يوماً مُفعماً بالنعمة. نعمة شخصية. وأقول نعمة شخصية نظراً لتعبير بطرس غير المألوف القائل إن النعمة \"يُؤتَى بِهَا إِلَيْكُمْ\". فهو لا يقول إن النعمة \"آتية إليكم\"، بل بالأحرى «يُؤتَى بِهَا إِلَيْكُمْ» (τὴν φερομένην ὑμῖν χάριν). فثمة مَن يأتي بها. وهي لا تظهر هكذا بمعزل عن شخص كأنها غلاف جوي أو حالة مزاجية. بل تأتي بين يدي يسوع. أو ربما من الأفضل القول: في قلب يسوع. إذ يأتي يسوع حاملاً في طياته توجهاً مُنْعِماً تجاه شعبه.\u003c/p\u003e\n\u003cp\u003eلن يكون ذلك اليوم المهيب حدثاً مجرداً من الطابع الشخصي يُقتصر على الصدمة والرهبة. بل سيكون شخصياً للغاية. وبطرق لا تدركها أفهامنا، سيتعامل معنا الإله المتجسد المُقام بصفة شخصية. فهو يعرف أسماءنا. وسيُتعامل معنا كأحباء. «لاَ أَتْرُكُكُمْ يَتَامَى. إِنِّي آتِي إِلَيْكُمْ» (يوحنا ١٤: ١٨). وإن انزلقنا إلى التفكير بأنه آتٍ بسيف ليذبحنا، فإن كلمة بطرس تأتي لتقويم فكرنا: كلا، فبالنسبة لنا نحن المنتظرين بشوق، يوجد في يده وفي قلبه نعمة. النعمة يُؤتى بها إليكم.\u003c/p\u003e\n\u003ch3\u003eمَنْطِقُوا أَحْقَاءَكُمْ وَكُونُوا صَاحِينَ\u003c/h3\u003e\n\u003cp\u003eليس مستغرباً أن يسبق بطرس وصية «فَأَلْقُوا رَجَاءَكُمْ بِالتَّمَامِ عَلَى النِّعْمَةِ» باسمي فاعل ليُظهر لنا ما سيلزم لإبقاء هذا الرجاء حياً ماثلاً أمام أذهاننا. فبطرس يقول حرفياً: «مَنْطِقُوا أَحْقَاءَ ذِهْنِكُمْ [ἀναζωσάμενοι τὰς ὀσφύας τῆς διανοίας ὑμῶν] صَاحِينَ»، فألقوا رجاءكم بالتمام على النعمة \u003ca href=\"#footnote-1\"\u003e[١]\u003c/a\u003e. في اسم الفاعل الأول، يصورهم بطرس مرتدين أثواباً طويلة، ولكي يتمكنوا من الركض دون أن يتعثروا، كان لزاماً عليهم أن ينحنوا ويسحبوا الجزء الخلفي من الثوب من بين أرجلهم ويثبتوه في حزامهم من الأمام لتشكيل ما يشبه السروال حول أحقائهم.\u003c/p\u003e\n\u003cp\u003eويؤكد بطرس أن هذا هو ما يتعين عليكم فعله بأذهانكم. بعبارة أخرى، افعلوا كل ما يتطلبه الأمر لإبقاء الذهن نشطاً ومتجاوباً ويقظاً عند التعاطي مع الحقيقة الروحية—بل وعند التعاطي مع كل حقيقة. إذ سيحتاج الذهن إلى أن يُمَنْطَق للعمل إن كان له أن يقبض على حقيقة النعمة، ويبقيها نصب عينيه، ويذوق مجدها كما ينبغي، ويستشعر ملء الرجاء، وألا يتزعزع حين يستشعر اقتراب مجيء ابن الإنسان.\u003c/p\u003e\n\u003cp\u003eويؤكد اسم الفاعل الثاني على ذات الفكرة الأساسية: \"كونوا صَاحِينَ\" (νήφοντες). فالسكر يُبلد الحواس فلا يغدو الذهن حاد الإدراك أو سريع التجاوب كما ينبغي له أن يكون. وهو ما يضعنا في خطر العجز عن الرؤية بوضوح أو التصرف بحكمة. فالغاية هي: إن كان هناك وعد مجيد بأن النعمة يُؤتَى بها إلينا عند مجيء المسيح، فلن ينفعنا هذا الوعد إن كانت أذهاننا سَكْرَى بالعالم. فلن نراها، ولن نؤمن بها.\u003c/p\u003e\n\u003cp\u003eيُبتغي بطرس للمؤمنين أن يمتلكوا توقعاً متأهباً، ويقظاً، وحياً لمجيء الرب. فاسم الفاعل \"يُؤتَى بها\" (φερομένην) جاء بصيغة الحاضر، لا المستقبل. فهو يقول: النعمة \"يُؤتَى بِهَا إِلَيْكُمْ\"، وليس \"سيُؤتَى بها إليكم\". والقصد من ذلك تذكيرنا بأن النعمة في طريقها إلينا. وسواء أكانت النعمة ستصل في غضون أشهر أم قرون، فليس هذا هو الجوهر. فبطرس منفتح على كلا الاحتمالين (١ بطرس ٤: ١٧؛ ٢ بطرس ٣: ٨). وليست دعوتنا أن نتكهن بمدى اقترابها، بل أن نُعمل أذهاننا بخفة ويقظة لكي \"نُلقي رجاءنا بالتمام\" على نعمة المجيء الثاني.\u003c/p\u003e\n\u003cp\u003eبعبارة أخرى، يدرك بطرس تمام الإدراك أن الله يدعو شعبه لاستخدام وسائل من أجل الاستعداد لمجيء المسيح. وما أعنيه بـ \"الاستعداد\"، في هذا السياق، هو إبقاء رجائك حياً وقوياً وفاعلاً لكي يصيغ حياتك. وما أعنيه بـ \"الوسائل\" هو الإشارة إلى الوصيتين: \"مَنْطِقُوا أَحْقَاءَ ذِهْنِكُمْ\"، و\"كونوا صَاحِينَ\". وأتساءل إن كان أي من القراء النبهاء يميز جذور هاتين الوسيلتين في تعاليم يسوع؟\u003c/p\u003e\n\u003ch3\u003eمنطَقة الأحقاء واليقظة في تعاليم يسوع\u003c/h3\u003e\n\u003cp\u003eلقد استعان يسوع بكل من منطَقة الأحقاء واليقظة كإرشادات لكيفية الاستعداد للمجيء الثاني. ففي لوقا ١٢: ٤٠، يقول يسوع: «فَكُونُوا أَنْتُمْ إِذًا مُسْتَعِدِّينَ، لأَنَّهُ فِي سَاعَةٍ لاَ تَظُنُّونَ يَأْتِي ابْنُ الإِنْسَانِ». ولوضع هذا الاستعداد في صورة جلية، يشبّه يسوع مجيئه بسيد يعود إلى بيته من حفل زفاف. فهل سيكون عبيده مستعدين لفتح الباب له؟ لذا، يقول لهم:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لِتَكُنْ أَحْقَاؤُكُمْ مُمَنْطَقَةً [ὑμῶν αἱ ὀσφύες περιεζωσμέναι] وَسُرُجُكُمْ مُوقَدَةً، وَأَنْتُمْ مِثْلُ أُنَاسٍ يَنْتَظِرُونَ سَيِّدَهُمْ مَتَى يَرْجعُ مِنَ الْعُرْسِ، حَتَّى إِذَا جَاءَ وَقَرَعَ يَفْتَحُونَ لَهُ لِلْوَقْتِ» (لوقا ١٢: ٣٥-٣٦).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد استخدم الإنجيل هنا كلمة (περιεζωσμέναι) التي تعني \"يُمَنْطِق حول\" عوضاً عن (ἀναζωσάμενοι) التي تعني \"يُمَنْطِق إلى الأعلى\"، كما وردت في ١ بطرس ١: ١٣، وذلك لوجود حرف جر مختلف مُلحق بكلمة المنطَقة (ζώννυμι). غير أن كلمة الأحقاء (ὀσφῦς) هي ذاتها في كلا الموضعين، والفكرة هي ذاتها بوضوح. فإن أردت أن تكون متيقظاً، تفعل ما يتوقعه منك سيدك ومستعداً لمجيئه، فيلزم لذهنك وقلبك أن يكونا \"مُتأهبين للعمل\". لقد أرسى يسوع هذه الفكرة من خلال مثل (سيد يعود إلى بيته). بينما أرسى بطرس الفكرة من خلال استعارة (ذهن يُحفظ يقظاً ونشطاً).\u003c/p\u003e\n\u003cp\u003eوبالمثل، استعان يسوع، كبطرس، باليقظة لتصوير حالة البقاء على استعداد لمجيئه. فصور المجيء الثاني كسيد يعود إلى ضيعته بعد تأخير (لوقا ١٢: ٤٥)، ليجد وكيله متمماً لدعوته—أو لا. وما الذي قد يمنعه من ذلك؟ السكر:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَقَالَ الرَّبُّ: ««فَمَنْ هُوَ الْوَكِيلُ الأَمِينُ الْحَكِيمُ الَّذِي يُقِيمُهُ سَيِّدُهُ عَلَى خَدَمِهِ لِيُعْطِيَهُمُ الْعُلُوفَةَ فِي حِينِهَا؟ طُوبَى لِذلِكَ الْعَبْدِ الَّذِي إِذَا جَاءَ سَيِّدُهُ يَجِدُهُ يَفْعَلُ هكَذَا! بِالْحَقِّ أَقُولُ لَكُمْ: إِنَّهُ يُقِيمُهُ عَلَى جَمِيعِ أَمْوَالِهِ. وَلكِنْ إِنْ قَالَ ذلِكَ الْعَبْدُ فِي قَلْبِهِ: سَيِّدِي يُبْطِئُ قُدُومَهُ، فَيَبْتَدِئُ يَضْرِبُ الْغِلْمَانَ وَالْجَوَارِيَ، وَيَأْكُلُ وَيَشْرَبُ وَيَسْكَرُ. يَأْتِي سَيِّدُ ذلِكَ الْعَبْدِ فِي يَوْمٍ لاَ يَنْتَظِرُهُ وَفِي سَاعَةٍ لاَ يَعْرِفُهَا، فَيَقْطَعُهُ وَيَجْعَلُ نَصِيبَهُ مَعَ الْخَائِنِينَ.» (لوقا ١٢: ٤٢-٤٦).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوالغاية هي: إن من الغباء المطلق اتخاذ \"تباطؤ\" يسوع ذريعة لنصير متهاونين بأذهاننا. فالسكر هو صورة للغيبوبة الذهنية. ولو لم يكن الوكيل مخموراً، لما باغت مجيء السيد ذهنه. واليقظة هي صورة للحيوية الذهنية في خدمة السيد. وبهذه الطريقة، يكون المرء دائماً مستعداً، بل ومتشوقاً لمجيء الرب. لأن يسوع «يُقِيمُهُ عَلَى جَمِيعِ أَمْوَالِهِ» (لوقا ١٢: ٤٤). وسنشارك يسوع في ملكيته وحكمه لكل الأشياء.\u003c/p\u003e\n\u003cp\u003eويطلق يسوع ناقوس الخطر بشأن السكر مجدداً في ارتباطه بالمجيء الثاني. فبعد قوله إن «ابْنِ الإِنْسَانِ آتِيًا فِي سَحَابَةٍ بِقُوَّةٍ وَمَجْدٍ كَثِيرٍ» (لوقا ٢١: ٢٧)، يحذر يسوع تلاميذه قائلاً:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَاحْتَرِزُوا لأَنْفُسِكُمْ لِئَلاَّ تَثْقُلَ قُلُوبُكُمْ فِي خُمَارٍ وَسُكْرٍ وَهُمُومِ الْحَيَاةِ، فَيُصَادِفَكُمْ ذلِكَ الْيَوْمُ بَغْتَةً. لأَنَّهُ كَالْفَخِّ يَأْتِي عَلَى جَمِيعِ السَّاكِنِينَ عَلَى وَجْهِ كُلِّ الأَرْضِ. اِسْهَرُوا إِذًا وَتَضَرَّعُوا فِي كُلِّ حِينٍ، لِكَيْ تُحْسَبُوا أَهْلاً لِلنَّجَاةِ مِنْ جَمِيعِ هذَا الْمُزْمِعِ أَنْ يَكُونَ، وَتَقِفُوا قُدَّامَ ابْنِ الإِنْسَانِ» (لوقا ٢١: ٣٤-٣٦).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوها نحن نسمع مجدداً ما أسميته بالـ \"وسائل\" التي يطلب منا يسوع وبطرس استخدامها لتهيئة أنفسنا لمجيء الرب: «احْتَرِزُوا لأَنْفُسِكُمْ... اِسْهَرُوا إِذًا وَتَضَرَّعُوا». وهذا هو النقيض التام لكون المرء «مُثَقَّل القلَب في خُمَارٍ وَسُكْرٍ وَهُمُومِ الْحَيَاةِ». فنحن مدعوون لليقظة الذهنية والروحية بينما ننتظر الرب.\u003c/p\u003e\n\u003ch3\u003eمُمَنْطَقون وصاحون من أجل النجاة\u003c/h3\u003e\n\u003cp\u003eترمي هذه الوسائل إلى معونتنا على عيش حياة \"تنجو\" من الهلاك وتَثبت مقبولة قدام ابن الإنسان: «اِسْهَرُوا إِذًا وَتَضَرَّعُوا فِي كُلِّ حِينٍ، لِكَيْ تُحْسَبُوا أَهْلاً لِلنَّجَاةِ مِنْ جَمِيعِ هذَا الْمُزْمِعِ أَنْ يَكُونَ، وَتَقِفُوا قُدَّامَ ابْنِ الإِنْسَانِ» (لوقا ٢١: ٣٦). ولا تعني كلمة النجاة هذه أننا لن نختبر أحكام الله التي ستحل بالعالم في نهاية الزمان، بل تعني أننا، حتى من وسط هذه الأحكام، سنُنقذ من آثارها المهلكة نهائياً. فكلمة \"النجاة\" في لوقا ٢١: ٣٦ (ἐκφυγεῖν) استُخدمت مرتين في كتابات لوقا، وفي كلتيهما تعني الخروج سالماً من أزمة قائمة عوضاً عن الحماية من دخول الأزمة من الابتداءً (أعمال ١٦: ٢٧؛ ١٩: ١٦).\u003c/p\u003e\n\u003cp\u003eويشير بطرس إلى الفكرة ذاتها في ١ بطرس ٤: ١٧-١٩:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ الْوَقْتُ لابْتِدَاءِ الْقَضَاءِ مِنْ بَيْتِ اللهِ. فَإِنْ كَانَ أَوَّلاً مِنَّا، فَمَا هِيَ نِهَايَةُ الَّذِينَ لاَ يُطِيعُونَ إِنْجِيلَ اللهِ؟ وَ«إِنْ كَانَ الْبَارُّ بِالْجُهْدِ يَخْلُصُ، فَالْفَاجِرُ وَالْخَاطِئُ أَيْنَ يَظْهَرَانِ؟» فَإِذًا، الَّذِينَ يَتَأَلَّمُونَ بِحَسَبِ مَشِيئَةِ اللهِ، فَلْيَسْتَوْدِعُوا أَنْفُسَهُمْ كَمَا لِخَالِقٍ أَمِينٍ فِي عَمَلِ الْخَيْرِ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفالمسيحيون لا ينجون من أحكام نهاية الزمان الإلهية بمعنى عدم خوض الألم البتة. بل ننجو من الآثار المهلكة للألم عبر اختباره كتنقية لا كعقاب. وتلك هي فكرة بطرس حينما يشير إلى هذه الآلام في الأصحاح الأول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«الَّذِي بِهِ تَبْتَهِجُونَ، مَعَ أَنَّكُمُ الآنَ —إِنْ كَانَ يَجبُ— تُحْزَنُونَ قَلِيلاً بِتَجَارِبَ مُتَنَوِّعَةٍ، لِكَيْ تَكُونَ تَزْكِيَةُ إِيمَانِكُمْ، وَهِيَ أَثْمَنُ مِنَ الذَّهَبِ الْفَانِي، مَعَ أَنَّهُ يُخْتَبَرُ بِالنَّارِ، تُوجَدُ لِلْمَدْحِ وَالْكَرَامَةِ وَالْمَجْدِ عِنْدَ اسْتِعْلاَنِ يَسُوعَ الْمَسِيحِ» (١ بطرس ١: ٦-٧).\u003c/p\u
