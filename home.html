 هو ابن داود ورب داود في آن واحد، كما أعلن هو بنفسه (متى ٢٢: ٤٢-٤٥).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eرعوياً، الدعوة لدخول الملكوت ليست دعوة لتحسين سلوكي أو شعور بالندم، بل هي \"إنذار نهائي\" بتغيير \"الولاء السياسي\".\u003c/strong\u003e التوبة (Metanoia) هنا تتجاوز الأسف العاطفي؛ إنها \u003cstrong\u003eثورة في الذهن وتغيير كامل للاتجاه\u003c/strong\u003e يعيد تشكيل رؤية الإنسان للوجود، وبناءً عليه، يُنقل الولاء من مملكة الذات إلى مملكة المسيح. إنها تعني خلع أي سيد -بما فيهم \"الذات\"- عن عرش القلب، وتوجيه الحياة لتقديم ولاء مطلق للملك الجديد يسوع. الكنيسة هي \"مجتمع الملكوت\" وسفارته على الأرض. هذا هو الثمن الباهظ للجنسية السماوية: الاستسلام الكامل لسيادة الله المطلقة.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eهوامش:\u003c/strong\u003e\u003cbr\u003e\n[١] مفهوم \"الآن وليس بعد\" (Already/Not Yet) هو مفهوم محوري في الإسخاتولوجي (علم الأخرويات) وسوف نأتي إلى تفصيله في مقال قادم ضمن هذه السلسلة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjPNqbrFVMv75N_IEA-RRv0CyRLFZYOnJwFVVfjG6vnFBcgB_7ea4-yYVuu8dTVVts241MFoYfrCECYYmgCjuJSfheoh-gZoKHY60wJOYnB_sww-V_rZWCXRFjZmdMjqiTJPWUwTQ4zbYd2RbArvntveF-EWsGi9mSJtHMRt41yVZNEVA81KopWqNxF5cc/s1024/unnamed%20(54).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjPNqbrFVMv75N_IEA-RRv0CyRLFZYOnJwFVVfjG6vnFBcgB_7ea4-yYVuu8dTVVts241MFoYfrCECYYmgCjuJSfheoh-gZoKHY60wJOYnB_sww-V_rZWCXRFjZmdMjqiTJPWUwTQ4zbYd2RbArvntveF-EWsGi9mSJtHMRt41yVZNEVA81KopWqNxF5cc/s320/unnamed%20(54).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4a:Tdce,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eاعتراف الخيانة العظمى: عندما تتحدى العملة الإيمان\u003c/h2\u003e\n\u003cp\u003eسلسلة \"أصداء المعنى الأول\" - إعادة تأسيس للمفاهيم الكتابية\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكَ إِنِ اعْتَرَفْتَ بِفَمِكَ بِالرَّبِّ يَسُوعَ، وَآمَنْتَ بِقَلْبِكَ أَنَّ اللهَ أَقَامَهُ مِنَ الأَمْوَاتِ، خَلَصْتَ.» (رومية ١٠: ٩)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eتاريخياً، لم يكن الدينار الروماني في القرن الأول مجرد أداة تجارية، بل كان أخطر وسيلة دعاية لاهوتية سياسية للإمبراطورية.\u003c/strong\u003e العُملة التي كانت في جيب كل شخص (دينار تيبيريوس) كانت تحمل على وجهها الأمامي نقشاً صريحاً باللاتينية يعلن ألوهية القيصر: (TI CAESAR DIVI AVG F AVGVSTVS)، أي \"تيبيريوس قيصر، ابن أوغسطس الإلهي\". في هذا السياق، لم يكن لقب \"رب\" (Kyrios) مجرد لقب احترام، بل كان لقب قيصر الحصري الذي يملك السلطة الإلهية المطلقة على العالم.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eسياسياً، روّجت الإمبراطورية لنفسها على أنها المصدر الوحيد لـ \"السلام الروماني\" (Pax Romana) وضامنة الأرزاق.\u003c/strong\u003e الوجه الخلفي للعملة كان يصور \"السلام\" كإلهة، ويحمل لقب القيصر كـ \"الحبر الأعظم\" (Pontifex Maximus)، أي الوسيط الأعلى بين الآلهة والبشر الذي يضمن خصوبة الأرض وتوفر الحبوب. كانت الرسالة واضحة: \"قيصر هو الرب لأنه هو من يطعمك ويحميك\". الولاء لقيصر كان الثمن المطلوب مقابل \"الخبز والأمان\".\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eلاهوتياً، في مواجهة هذا الطغيان، لم يكن اعتراف المسيحيين الأوائل: \"يسوع هو الرب\" (Iēsous Kyrios) مجرد همسة روحية في مخدع الصلاة، بل كان \"إعلان خيانة عظمى\" سياسية ودينية هزت أركان روما.\u003c/strong\u003e أكثر من ذلك، فبالنسبة للوجدان اليهودي، كانت كلمة \"الرب\" (Kyrios) هي اللقب المقدس المستخدم في الترجمة اليونانية للعهد القديم كبديل لاسم الجلالة \"يهوه\". فكان هذا الاعتراف يعني أن يسوع هو التجسد المنظور لإله إسرائيل الواحد، وهو في نفس الوقت الحاكم الأوحد للعالم بدلاً من قيصر. هذا الاعتراف كان يعني ببساطة سحب الولاء المطلق من القيصر ومنحه للمسيح المصلوب والمقام. كان يعني القول علناً: \"تلك الصورة على العملة كاذبة؛ يسوع، وليس قيصر، هو ابن الله الحقيقي، وهو صانع السلام الحقيقي بدمه، وهو الوسيط الوحيد والرازق\". لقد كان هذا الاعتراف هو السبب المباشر لاستشهاد الآلاف الذين أقروا أن \"يسوع هو الرب\" ورفضوا استبدال كلمة واحدة، مفضلين الموت على أن يقولوا \"قيصر هو الرب\".\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4b:T1480,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eصدام الغايات: بين نفعية الإنسان ومجد الله في المسيح\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e٣٩ فَتِّشُوا الْكُتُبَ لأَنَّكُمْ تَظُنُّونَ [١] أَنَّ لَكُمْ فِيهَا حَيَاةً أَبَدِيَّةً. وَهِيَ الَّتِي تَشْهَدُ لِي. ٤٠ وَلاَ تُرِيدُونَ أَنْ تَأْتُوا إِلَيَّ لِتَكُونَ لَكُمْ حَيَاةٌ. (يوحنا ٥)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيقف الضمير الإنساني في مواجهة النص الكتابي أمام مفترق طرقٍ؛ فإما أن ينحني لجلال الله أو أن يحاول ترويض النص لخدمة أهدافه الخاصة. إن الصراع الذي فجره السيد المسيح مع الفريسيين لم يكن على \"مصدر\" الكلمة، بل على \"الغاية\" منها. لقد سقط الفريسيون في فخ \"اللاهوت النفعي\"؛ حيث فتشوا الكتب بحثاً عن \"ضمانات\" و\"استحقاقات دينية\"، محولين الوحي من كونه إعلاناً لمجد الله إلى أداةٍ للحصول على \"بركة\" شخصية. هذا الانحراف هو أصل كل \"ارتداد روحي\"؛ حين يصبح الله \"وسيلة\" والإنسان (وراحته) هو \"الغاية\".\u003c/p\u003e\n\u003cp\u003eإن القصد الإلهي من إعطاء الكلمة يرتفع فوق رغبات الإنسان المحدودة؛ فالله لم يتنفس بالوحي (Theopneustos) [٢] ليعطينا دليلاً للنجاح الأرضي أو ليجيب على تساؤلاتنا النفعية عن \"البركة\" المجرّدة، بل ليمجد غنى نعمته في خلاص الخاطئ من خلال ابنه المتجسد. هذا هو الصدام الحاد: الإنسان يفتح الكتاب ليبحث عن \"نفسه\" (تعزيته، إرشاده، بركته)، بينما الله قدّم الكتاب ليعلن عن \"المسيح\" (جلاله، بره، فدائه). إن قراءة الكلمة بهدف \"الانتفاع\" دون \"الخضوع\" هي محاولة لسرقة مجد الله وتحويله إلى سلعة استهلاكية؛ فالبركة الحقيقية ليست شيئاً نحصل عليه بترديد آيات البركة أو الوعود، بل هي \"شخصٌ\" نلتقي به من خلال الإعلان المكتوب.\u003c/p\u003e\n\u003cp\u003eتشخيص حالة القلب حين يقرأ، يكشف عن هوة سحيقة؛ فالقارئ النفعي يريد \"الحياة\" في الكتب، لكنه لا يريد \"المخلص\" الذي تشهد له الكتب. هو يريد \"الوعود\" دون \"صاحب الوعود\"، و\"النتائج\" دون \"التبعية\". إن الله يكسر هذا الكبرياء الإنساني بتأكيده أن الكلمة هي واسطة نعمة [٣] تهدف أولاً لتمجيد سيادته من خلال توبة الخاطئ - كسر مشيئته - وخضوعه للمسيح. الشفاء لا يأتي بمنح الخاطئ ما يطلبه من \"راحة\"، بل بمواجهته بفقره الروحي وعجزه، ليجد في المسيح وحده \"البركة العظمى\" التي هي المصالحة مع جلال الله. إن كل قراءة لا تضع مجد الله في المسيح غايةً قصوى لها، هي قراءة نفعية فريسيّة، تفتش الحروف وتفقد الروح [٤].\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eهوامش:\u003c/strong\u003e\u003cbr\u003e\n[١] تظنون (δοκεῖτε): تشير إلى \"الاعتقاد الذاتي\" الذي يفتقر لليقين الإلهي؛ فالفريسيون بنوا نظامهم على \"ظن\" أن المعرفة الذهنية هي صك أمان أوتوماتيكي (Ex Opere Operato).\u003cbr\u003e\n[٢] نفس الله (Theopneustos): الربط بين الوحي والحياة يقتضي أن تكون \"الغاية\" من الكلمة متفقة مع \"طبيعة\" قائلها؛ وبما أن الله لا يعمل إلا لمجد ذاته، فإن كلمته تهدف بالضرورة لمجد نعمته في المسيح.\u003cbr\u003e\n[٣] واسطة نعمة (Means of Grace): الكلمة هي القناة التي يستخدمها الروح القدس ليس لتحقيق رغباتنا، بل لتحويلنا إلى صورة المسيح لمجد الآب.\u003cbr\u003e\n[٤] يكمن الفشل الروحي في \"استخدام\" الله؛ فالخاطئ يريد \"خلاصاً\" يريحه، والله يعطي \"خلاصاً\" يقدسه ويُمجده؛ والتصادم ينحل فقط عند التوبة عن القراءة النفعية.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhG6G5Zmj-UbNWUz9-59Ey1_Lf2uBmCiNh2UqszvDXx9Iqnej3ClX0ugCpxuUvv692yi8Ph4F9aoEOeJjnilrrK9QyAZkCym5y6AvTEQ4uVcZWXaq21epD8nYpM2ckYpC-GsR81aLY6vscXE_oA_tHIYgUtommz5nkopVrv1S55VQ3fhsBWYF3FXeCIcwQ/s1024/unnamed%20(53).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhG6G5Zmj-UbNWUz9-59Ey1_Lf2uBmCiNh2UqszvDXx9Iqnej3ClX0ugCpxuUvv692yi8Ph4F9aoEOeJjnilrrK9QyAZkCym5y6AvTEQ4uVcZWXaq21epD8nYpM2ckYpC-GsR81aLY6vscXE_oA_tHIYgUtommz5nkopVrv1S55VQ3fhsBWYF3FXeCIcwQ/s320/unnamed%20(53).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4c:T1b9f,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالتوافق بين كلمة الله المكتوبة والكلمة المتجسد\u003c/h2\u003e\n\u003cp\u003eدراسة في وحدة المصدر وفاعلية الأداة السيادية\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e٣٩ فَتِّشُوا الْكُتُبَ لأَنَّكُمْ تَظُنُّونَ [١] أَنَّ لَكُمْ فِيهَا حَيَاةً أَبَدِيَّةً. وَهِيَ الَّتِي تَشْهَدُ لِي. ٤٠ وَلاَ تُرِيدُونَ أَنْ تَأْتُوا إِلَيَّ لِتَكُونَ لَكُمْ حَيَاةٌ. (يوحنا ٥)\u003c/p\u003e\n\u003cp\u003e١٢ لأَنَّ كَلِمَةَ اللهِ حَيَّةٌ وَفَعَّالَةٌ وَأَمْضَى مِنْ كُلِّ سَيْفٍ ذِي حَدَّيْنِ، وَخَارِقَةٌ إِلَى مَفْرَقِ النَّفْسِ وَالرُّوحِ وَالْمَفَاصِلِ وَالْمِخَاخِ، وَمُمَيِّزَةٌ أَفْكاَرَ الْقَلْبِ وَنِيَّاتِهِ. ١٣ وَلَيْسَتْ خَلِيقَةٌ غَيْرَ ظَاهِرَةٍ قُدَّامَهُ، بَلْ كُلُّ شَيْءٍ عُرْيَانٌ وَمَكْشُوفٌ لِعَيْنَيْ ذلِكَ الَّذِي مَعَهُ أَمْرُنَا. (عبرانيين ٤)\u003c/p\u003e\n\u003cp\u003e١٨ شَاءَ فَوَلَدَنَا بِكَلِمَةِ الْحَقِّ لِكَيْ نَكُونَ بَاكُورَةً مِنْ خَلاَئِقِهِ. (يعقوب ١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلا يمكن الفصل بين الأداة (الكلمة المكتوبة) والمصدر (شخص المسيح). لا يمكن فصل الكلمة عن قائلها؛ فلا يوجد تضاد بين قول المسيح إن الحياة ليست في \"الكتب\" ذاتها وبين وصف الرسل للكلمة بأنها \"حية\" و\"وسيلة للولادة\". الحقيقة اللاهوتية هي أن الكلمة ليست حية في ذاتها بطريقة مستقلة عن قائلها، بل هي حية لأنها \"نفس الله\" (Theopneustos): «كُلُّ الْكِتَابِ هُوَ مُوحًى بِهِ مِنَ اللهِ، وَنَافِعٌ لِلتَّعْلِيمِ وَالتَّوْبِيخِ، لِلتَّقْوِيمِ وَالتَّأْدِيبِ الَّذِي فِي الْبِرِّ» (٢ تيموثاوس ٣: ١٦) [٢]. وقوتها مستمدة من اتحادها بالروح القدس الذي يشهد للمسيح. إن المسيح في يوحنا ٥ لم يقلل من شأن الكتب، بل فضح منهجية \"القراءة الوثنية\" التي تحول النص إلى غاية في ذاته دون الوصول إلى الشخص الذي تدور حوله كل صفحة.\u003c/p\u003e\n\u003cp\u003eوفي رسالة يعقوب (١: ١٨): «شَاءَ فَوَلَدَنَا بِكَلِمَةِ الْحَقِّ» [٣]، نلاحظ أن المشيئة هي مشيئة الآب وهو الذي ولدنا، لكن الواسطة أو الوعاء أو \"الرحم\" الذي بواسطته تتم الولادة هو الكلمة. فالكلمة هنا ليست هي الوالد، بل هي واسطة الولادة والأداة السيادية التي اختارها الله لإعطاء الميلاد الجديد للإنسان. إن الكلمة في (عبرانيين ٤: ١٢) و(يعقوب ١: ١٨) تُفهم بوصفها \"الأداة المُسببة\" للتبكيت والولادة الثانية. فعندما نرى أن الكلمة \"حَيَّةٌ وَفَعَّالَةٌ... وَخَارِقَةٌ... وَمُمَيِّزَةٌ\" في الآية ١٢، نلاحظ كيف ينتقل النص سريعاً في الآية ١٣ ليقول: «...بَلْ كُلُّ شَيْءٍ عُرْيَانٌ وَمَكْشُوفٌ لِعَيْنَيْ ذلِكَ الَّذِي مَعَهُ أَمْرُنَا»؛ فهو لا يفصل دور الكلمة في الفحص والتمييز عن عيني الله الذي كل شيء مكشوف أمامه.\u003c/p\u003e\n\u003cp\u003eفالكلمة تكشف لنا ما يراه الله فينا؛ ذلك لأنها صوت الله الحي الصادر عنه، وليست كلمات باردة. المسيح هو \"الحياة\"، والكلمة هي \"القناة\" التي تنقل هذه الحياة إلينا؛ فمن يقرأ الكتب ويرفض المسيح، هو كمن يحدق في خريطة الكنز ويرفض السير في الطريق الموضح فيها. إن خطر \"الفريسية المعاصرة\" يكمن في تحويل دراسة الكتاب المقدس إلى ترف عقلي أو روتين يومي جاف، تماماً كما فعل سامعو المسيح. إن فحص الكتب دون الخضوع لسلطان المسيح هو قراءة لـ \"الحرف الذي يقتل\" [٤]. لكي تكون الكلمة \"فعالة\" في حياتك، يجب أن تقترب منها ليس كباحث عن معلومات، بل كخاطئ يبحث عن المخلص. فالكلمة تلدنا ثانية لأنها تحمل بذرة الإنجيل، وتخترق أعماقنا لأنها تحمل سلطة الديان؛ لذا، فإن القراءة الصحيحة هي التي تنتهي دائماً بالسجود عند قدمي الكلمة المتجسد.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eهوامش:\u003c/strong\u003e\u003cbr\u003e\n[١] يستخدم يوحنا في ٥: ٣٩ الفعل اليوناني \"δοκεῖτε\" (تظنون)، وهو مفتاح لفهم النقد الموجه للفريسيين. المسيح هنا ينقد \"الظن\" الفريسي بأن مجرد امتلاك الوحي يمنح الحياة أوتوماتيكياً (Ex Opere Operato).\u003cbr\u003e\n[٢] مصطلح \"موحى به من الله\" (٢ تيموثاوس ٣: ١٦) يأتي من الكلمة اليونانية \"θεόπνευστος\" (Theopneustos)، والتي تعني حرفياً \"نفس الله\". بما أن الله حي، فإن \"نفسه\" المكتوب يحمل بالضرورة صفة الحياة والقدرة على الخلق والتبكيت.\u003cbr\u003e\n[٣] في تدبير الخلاص، تعمل الكلمة كبذرة (Logos)؛ وهي الإنجيل الذي هو \"قوة الله للخلاص\" والواسطة السيادية للولادة الجديدة.\u003cbr\u003e\n[٤] يجب الحذر من تحويل اللاهوت إلى جفاف روحي. الكلمة \"فعالة\" ليس عندما تُحفظ كمعلومات، بل عندما يُسمح لها بتشريح النوايا والأفكار تحت سلطان المسيح.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgX2pCNF1OgKN5qJBeH50rkzrq5RYqgJjc_YTJc9Lx1cGEoHGvZlXwO58QJMnmAdMTPzGUzINRawMEYURfyehDgipW5cRPIzRI6gsDCmyGmns2ZbVdbOzLMwRsOibDF54CRyIDa9c1PZz4GHHhEut8FAaComQtlc_MvnEXfWj468z-z_ABOcpTUcMJzKk0/s1024/unnamed%20(52).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgX2pCNF1OgKN5qJBeH50rkzrq5RYqgJjc_YTJc9Lx1cGEoHGvZlXwO58QJMnmAdMTPzGUzINRawMEYURfyehDgipW5cRPIzRI6gsDCmyGmns2ZbVdbOzLMwRsOibDF54CRyIDa9c1PZz4GHHhEut8FAaComQtlc_MvnEXfWj468z-z_ABOcpTUcMJzKk0/s320/unnamed%20(52).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4d:T15b9,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eمغالطة «أداة التعريف»: هل كان الكلمة «إلهاً» أم هو «الله»؟\u003c/h2\u003e\n\u003cp\u003eتُعد هذه المغالطة واحدة من أدق المسائل النحوية التي أُسيء استخدامها، وهي المتعلقة بغياب \"أداة التعريف\" في بداية إنجيل يوحنا. ففي قوله: «وَكَانَ الْكَلِمَةُ اللهَ» (يوحنا ١: ١)، يلاحظ الدارس لليونانية أن كلمة «الله» (Theos) جاءت مجردة من أداة التعريف، مما دفع البعض للاستنتاج -عن غير قصد أو ربما لغرض عقائدي، كما هي الحال عند شهود يهوه- أن المسيح هنا ليس هو \"الله\" ذاته، بل هو \"إله\" نكرة، أو كائن يحمل بعض الصفات الإلهية الثانوية.\u003c/p\u003e\n\u003cp\u003eلكن الفحص الأكاديمي الرصين، لاسيما عند الدكتور د. أ. كارسون والقس الدكتور غسان خلف، يكشف لنا أن هذا الغياب ليس ثغرة في لاهوت المسيح، بل هو \"صمام أمان\" لغوي وضعه الوحي بدقة مذهلة.\u003c/p\u003e\n\u003cp\u003eجوهر الكيان لا مجرد الوصف. تكمن قوة النص في اختيار يوحنا لكلمة (Theos) كاسم يعبر عن الجوهر، وليس كصفة عارضة. ففي اللغة اليونانية، لو أراد يوحنا أن يصف \"الكلمة\" بأنه مجرد كائن سامٍ بخصائص \"إلهية\" (كما يُوصَف الذهب بأنه ذهبي)، كان يمكنه استخدام الصفة المشتقة \"إلهي\" (Theios) حيث إن الكلمة متوفرة في اللغة اليونانية. لكنه اختار الاسم الجوهري (Theos)، ليقطع الطريق على أي تأويل يقلل من شأن ألوهية \"الكلمة\"؛ فالمسيح ليس \"شبيهاً بالله\"، بل هو الله في جوهره وكيانه.\u003c/p\u003e\n\u003cp\u003eحكمة غياب \"أل\" التعريف. قد يتساءل البعض، استناداً إلى النص اليوناني: لماذا إذن لم يقل يوحنا \"وكان الكلمة الـ الله\" (أي بإضافة أداة التعريف اليونانية ho قبل Theos)؟\u003c/p\u003e\n\u003cp\u003eوهنا يجب الانتباه إلى فارق لغوي هام: فبينما اسم \"الله\" في العربية هو اسم علم معرف بذاته ولا يقبل \"أل\" التعريف، فإن كلمة \"Theos\" في اليونانية تعني \"إله\" بشكل عام، وعند الإشارة إلى الله الخالق، فإنها عادة ما تُعرَّف بأداة التعريف. وغياب هذه الأداة في النص اليوناني هو الذي خلق هذه المغالطة.\u003c/p\u003e\n\u003cp\u003eتظهر براعة النحو في خدمة إظهار الحق. يوضح الدكتور غسان خلف أن قواعد النحو اليوناني تقضي بسقوط أداة التعريف عن \"الخبر\" إذا تقدم على \"الفعل\"، وذلك للتركيز على النوعية والطبيعة (qualitative force). أيضاً، يوضح كارسون أن إضافة أداة التعريف هنا كانت ستؤدي إلى \"تداخل الأقانيم\"؛ فلو قال يوحنا إن \"الكلمة\" هو \"الـ الله\" (بالتعريف المطلق)، لصار المعنى أن الكلمة هو نفسه \"الآب\". وهذا يتناقض مع الشطر السابق من الآية: «وَكَانَ الْكَلِمَةُ عِنْدَ اللهِ»، الذي يثبت وجود \"الكلمة\" في علاقة متمايزة مع الآب منذ الأزل.\u003c/p\u003e\n\u003cp\u003eدقة الوحي في حماية الحق. إن غياب أداة التعريف في هذا الموضع يحقق توازناً فريداً؛ فهو يثبت أن المسيح هو \"الله\" حقاً من حيث الجوهر والطبيعة (qualitative identity)، وفي الوقت ذاته يحفظ لنا التمايز بين الابن والآب. إن التلاعب بهذا النص لجعله ينطق بكلمة \"إله نكرة\" ليس مجرد خطأ نحوي، بل هو هدم للمنطق الذي بُني عليه الإنجيل كله؛ فالذي جاء ليخلصنا لا بد أن يكون هو الخالق ذاته، وليس مجرد وكيل أو وسيط بصفات سامية.\u003c/p\u003e\n\u003cp\u003eخلاصة القول: إن استقامة الكلمة تظهر في احترامنا لأدواتها اللغوية. إن حذف أداة التعريف في يوحنا ١: ١ هو حارس عقائدي يمنع خلط الأقانيم من جهة، ويؤكد مساواة الابن للآب في الجوهر من جهة أخرى. نحن لا نعبد إلهاً ثانوياً، بل نعبد \"الله الكلمة المتجسد\" الذي شهد عنه الإنجيل بدقة متناهية أنه \"هو الله\".\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhvU8xrUw6K4PRApH0rGnxOXhNa7FXbkJgnXyPJ5nxR4_3N4mzrGB5KsfJAFLaypK9C8IQUMirAjQ9lKQAit1tkgySLj-KRwFh3Ca-2R9CWYuQyj8nKsL3hazs9kAYjaEtg2Ka-Xt2h682N-nK3LB1fVjOcm7bRA7re1-531w_HmY1PJ1wKXTpbFBBAKGQ/s1024/unnamed%20(24).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhvU8xrUw6K4PRApH0rGnxOXhNa7FXbkJgnXyPJ5nxR4_3N4mzrGB5KsfJAFLaypK9C8IQUMirAjQ9lKQAit1tkgySLj-KRwFh3Ca-2R9CWYuQyj8nKsL3hazs9kAYjaEtg2Ka-Xt2h682N-nK3LB1fVjOcm7bRA7re1-531w_HmY1PJ1wKXTpbFBBAKGQ/s320/unnamed%20(24).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4e:T19c7,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eمغالطة «الزمن الماضي»: بين الطمأنينة والنمو المستمر\u003c/h2\u003e\n\u003cp\u003eفي كثير من الأحيان، عندما يرغب الواعظ في منح المستمعين جرعة من الطمأنينة، أو إثبات أن بركة معينة (كالشفاء أو التقديس) قد تمت وانتهت ولا تحتاج إلى أي مجهود، قد يلجأ -بحسن نية- إلى ما يعتبره دليلاً حاسماً فيقول: \"يا أحبائي، النص اليوناني هنا يستخدم زمن (Aorist). وهذا الزمن يشير لحدث تم مرة واحدة وإلى الأبد (Once and for all)، فلا داعي للقلق أو المحاولة، الأمر قد حُسم!\"\u003c/p\u003e\n\u003cp\u003eهذا الطرح، وإن كان دافعه نبيلاً لزرع اليقين في القلوب، إلا أنه من الناحية الأكاديمية يمثل \"التباساً لغوياً\" ينبهنا إليه علماء العهد الجديد مثل د. أ. كارسون؛ لأنه يعتمد على قاعدة نحوية غير دقيقة قد تقودنا دون قصد إلى نتائج لاهوتية حساسة، مثل التقليل من أهمية الجهاد الروحي اليومي.\u003c/p\u003e\n\u003cp\u003eالحقيقة اللغوية تكمن في أن كلمة (Aorist) في اليونانية مشتقة من a-oristos، وتعني حرفياً \"غير المُحَدَّد\". هذا الزمن لا يخبرنا شيئاً عن \"طبيعة الحدث\" أو مدته الزمنية، بل يكتفي بالإشارة إلى أن الحدث قد وقع كحقيقة. ولتقريب الصورة، يستخدم اللغويون تشبيهاً رائعاً:\u003c/p\u003e\n\u003cp\u003eالزمن المضارع (Present): يشبه \"الفيديو\"؛ يريك الحدث وهو يجري، ويبرز الاستمرارية والحركة.\u003cbr\u003e\nالزمن الماضي البسيط (Aorist): يشبه \"الصورة الفوتوغرافية\" (Snapshot)؛ يجمّد الحدث ليقدمه لك ككتلة واحدة (إطار واحد)، ليخبرك أنه \"حدث\"، لكنه لا يخبرك كم استغرق، ولا ينفي استمرارية نتائجه.\u003c/p\u003e\n\u003cp\u003eموضع الالتباس يحدث عندما ننظر إلى \"الصورة الفوتوغرافية\" ونستنتج منها أن الحدث استغرق \"ثانية واحدة\" وانتهى أثره للأبد. الصورة لا تقول ذلك؛ الصورة توثق وقوع الحدث فقط.\u003c/p\u003e\n\u003cp\u003eأقوى دليل يوضح أن الـ Aorist لا يعني بالضرورة \"لحظة واحدة خاطفة\"، هو استخدام الوحي لهذا الزمن لوصف أحداث استغرقت عقوداً. في (يوحنا ٢: ٢٠)، قال اليهود:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فِي سِتٍّ وَأَرْبَعِينَ سَنَةً بُنِيَ (oikodomēthē) هذَا الْهَيْكَلُ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالملاحظة الهامة هنا أن الفعل \"بُنِيَ\" جاء في صيغة Aorist! لو كانت القاعدة القائلة بأن هذا الزمن يعني \"المرة الواحدة الخاطفة\" صحيحة دائماً، لكان المعنى أن الهيكل نزل من السماء جاهزاً في لحظة! لكن الواقع التاريخي يؤكد أن البناء استمر ٤٦ سنة من العمل الشاق. استخدم يوحنا الـ Aorist هنا ليلخص العملية الطويلة كلها في \"حقيقة واحدة مكتملة\".\u003c/p\u003e\n\u003cp\u003eنصل هنا إلى التطبيق اللاهوتي العملي. قد يقع البعض في هذا الالتباس عند تفسير نصوص مثل قول بولس في (١ كورنثوس ٦: ١١):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لكِنِ اغْتَسَلْتُمْ، بَلْ قُدِّسْتُمْ (hēgiasthēte)، بَلْ تَبَرَّرْتُمْ بِاسْمِ الرَّبِّ يَسُوعَ وَبِرُوحِ إِلَهِنَا».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eحيث جاء الفعل \"قُدِّسْتُمْ\" في زمن Aorist، فيستنتج البعض: \"إذن التقديس تمّ في لحظة الإيمان وانتهى الأمر، ولا حاجة لجهاد أو نمو في القداسة\".\u003c/p\u003e\n\u003cp\u003eلضبط هذا الفهم، وحتى لا نختلط بين التقديس المقامي (الوضعي الفوري) والتقديس العملي (التدريجي)، دعونا نتأمل الآية التي تضع التوازن الدقيق:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ بِقُرْبَانٍ وَاحِدٍ قَدْ أَكْمَلَ إِلَى الأَبَدِ الْمُقَدَّسِينَ» (عبرانيين ١٠: ١٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالحل في دقة اليونانية: «أكمل» (Teteleōken) في صيغة Perfect: أي العمل اكتمل نهائياً مرة واحدة. أما «الْمُقَدَّسِينَ» (tous hagiazomenous) فهو Present Participle: أي \"الذين يُقَدَّسون\"، \"الذين هم في طور التقديس المستمر\".\u003c/p\u003e\n\u003cp\u003eالخلاصة: الطمأنينة الحقيقية تتكون من صورتين متكاملتين:\u003c/p\u003e\n\u003cp\u003eنحن \u003cstrong\u003eمقدسون\u003c/strong\u003e فورياً ومقامياً بفضل دم المسيح (Aorist في ١ كو ٦: ١١).\u003cbr\u003e\nنحن \u003cstrong\u003eنتقدس\u003c/strong\u003e تدريجياً وعملياً بعمل الروح القدس المستمر (Present في عب ١٠: ١٤).\u003c/p\u003e\n\u003cp\u003eرسالة أخيرة للمؤمن المجاهد: لا تدع تفسيراً لغوياً غير دقيق يسلبك ديناميكية الحياة المسيحية، ولا يوهمك أن الجهاد دليل ضعف. إن استمرارك في الجهاد والنمو (أي: استمرار التقديس) هو بالذات الدليل القاطع على أنك قد نلت الكمال في المسيح. الكمال المسيحي ليس التوقف عن المسير، بل أن تكون في الطريق الصحيح وتظل تسير.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGvNyJiK3MVXo6PWUhxbKoTdU8d0FWUVIVN3rmIXpivYpxwlbM_xUAvMNobrb_OAPrui10gC6kBHGXcQooic_RIAcTLvX2NICTZkZqeYOs0Ztz-hRJLIpg8sAlQWqyUZMSvhtCzK0iIugMyI3CF02armS0vAA_UfuHIHWyh6n3nWztAXU04yuPGgEaB-Y/s1024/unnamed%20(20).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiGvNyJiK3MVXo6PWUhxbKoTdU8d0FWUVIVN3rmIXpivYpxwlbM_xUAvMNobrb_OAPrui10gC6kBHGXcQooic_RIAcTLvX2NICTZkZqeYOs0Ztz-hRJLIpg8sAlQWqyUZMSvhtCzK0iIugMyI3CF02armS0vAA_UfuHIHWyh6n3nWztAXU04yuPGgEaB-Y/s320/unnamed%20(20).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4f:T1e4c,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eهل العقيدة اختراع غربي؟\u003c/h2\u003e\n\u003cp\u003eتحليل مغالطة \"ربط اللغة بالذهنية\" (The Linkage of Language and Mentality)\u003c/p\u003e\n\u003cp\u003eمن أكثر الأفكار انتشاراً في الدراسات اللاهوتية خلال القرن الماضي، والتي لا تزال تتردد أصداؤها في العظات حتى اليوم، هي فكرة وجود فجوة أو شرخ عميق بين \"الذهنية العبرية\" و\"الذهنية اليونانية\". ونحن نرى تطبيقاً لهذا اليوم في محاولة الفصل بين ما يُسمى \"اللاهوت الشرقي التأملي\" و\"اللاهوت الغربي الفكري النظامي\".\u003c/p\u003e\n\u003cp\u003eيقول الافتراض المزعوم: \"الذهنية العبرية (الشرقية) هي ذهنية حركية، ملموسة، وتركز على العلاقات والأفعال. بينما الذهنية اليونانية (الغربية) هي ذهنية جامدة، مجردة، وتركز على الفلسفة والتعريفات الذهنية. ولذلك، لكي نفهم الكتاب المقدس، يجب أن نتخلص من الفكر اليوناني الجامد ونعود للبساطة العبرية أو الشرقية الدافئة\".\u003c/p\u003e\n\u003cp\u003eهذا الطرح يبدو جذاباً جداً لأنه يدعو للعودة إلى \"الجذور\" و\"البساطة\"، ولكنه في كثير من الأحيان يُستخدم كغطاء لـ الكسل الذهني؛ حيث يتعامل الواعظ مع المستمع على أنه \"بسيط\" ولا ينبغي إرهاق ذهنه بالمسائل اللاهوتية العميقة، مكتفياً بالاسترسال في التأملات العاطفية بدلاً من بذل المجهود الذهني لفهم الحقائق. لكنه من الناحية المنهجية يقع في مغالطة خطيرة يسميها د. أ. كارسون (استناداً إلى جيمس بار): مغالطة ربط اللغة بالذهنية.\u003c/p\u003e\n\u003ch3\u003e١. وهم التقسيم القسري\u003c/h3\u003e\n\u003cp\u003eتقوم هذه المغالطة على افتراض غير علمي بأن بنية اللغة \"تُجبر\" المتحدث بها على طريقة تفكير معينة. فيدّعون أن العهد القديم لا يحتوي على \"حقائق تقريرية\" (حقائق عقائدية محددة وثابتة) لأنه مكتوب بالعبرية التي تميل للارتباط بواقع الحياة والعلاقات. ويدّعون أن العقائد المسيحية المحددة (مثل طبيعة المسيح والثالوث) هي نتاج \"التفكير اليوناني\" الدخيل.\u003c/p\u003e\n\u003cp\u003eالرد المنهجي: يؤكد كارسون أن هذا التقسيم مصطنع. فاللغة العبرية قادرة تماماً على التعبير عن حقائق مجردة وعقائد ثابتة، واللغة اليونانية قادرة تماماً على التعبير عن المشاعر والعلاقات الدافئة. الفرق الذي نلاحظه بين العهدين ليس نابعاً من \"اللغة\"، بل من \"نوع الأدب\". العهد القديم يغلب عليه القصص والشعر (لذا يبدو ملموساً)، بينما العهد الجديد (خاصة الرسائل) يغلب عليه التعليم والشرح (لذا يبدو منطقياً). الله استخدم اللغتين ليوصل حقاً واحداً.\u003c/p\u003e\n\u003ch3\u003e٢. دراسة حالة: مفهوم \"الحق\" (بين الأمانة والعقيدة)\u003c/h3\u003e\n\u003cp\u003eلتبسيط الصورة، دعنا نطبق ذلك على كلمة \"الحق\": في العبرية (Emeth): غالباً ما ترتبط بالأمانة، الثقة، والثبات في العلاقات. في اليونانية (Aletheia): غالباً ما ترتبط بالواقع، كشف الحقيقة، وصحة المعلومة (حقائق تقريرية).\u003c/p\u003e\n\u003cp\u003eأصحاب المغالطة يقولون: \"كلمة الحق في العهد القديم تشير للأمانة الشخصية والوفاء (عبري)، وليس حقائق تقريرية (يوناني)\". وهم بهذا يضعون العهد القديم في تضاد مفتعل مع العهد الجديد، وكأنهم يرفضون استخلاص الحقائق العقائدية منه. الدليل المضاد: عندما ترجم اليهود أنفسهم العهد القديم إلى اليونانية (الترجمة السبعينية)، استخدموا الكلمة اليونانية (Aletheia) لترجمة الكلمة العبرية (Emeth) في مئات المواضع! لم يشعر المترجمون اليهود بأي صراع حضاري أو ذهني. كانوا يدركون أن \"الحق\" يشمل الجانبين معاً.\u003c/p\u003e\n\u003ch3\u003e٣. خطورة رفض \"الحقائق التقريرية\"\u003c/h3\u003e\n\u003cp\u003eهنا نصل لصلب المشكلة اللاهوتية. الهدف الخفي وراء الترويج لهذه المغالطة هو تسخيف \"الحقائق التقريرية\" (Declarative Truths). كثيراً ما نسمع شعارات مثل: «أريد المسيح وكفى، لا أريد تفاصيل ترهق ذهني! البساطة حلوة!». يحاول هؤلاء القول بأن الإيمان المسيحي هو مجرد \"لقاء شخصي\" مع الله ولا يحتاج إلى \"عقائد محددة واضحة\".\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eالوحي المقدس يرفض هذا الفصل. عندما قال المسيح: «أَنَا هُوَ... الْحَقُّ» (يوحنا ١٤: ٦)، كان يجمع المجدين معاً: هو الحق كشخص أمين يمكن الوثوق به (الجانب العلائقي)، وهو الحق كإعلان إلهي وحيد وصادق يُبطل ما عداه (الجانب التقريري).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eالجانب الروحي: لا يمكننا أن نحظى بعلاقة حقيقية مع الله دون معرفة حقائق تقريرية صحيحة عنه. هل يمكن أن تنشأ ثقة بلا معرفة؟ كيف نثق في شخص (علاقة) لا نعرف عنه معلومات صادقة (عقيدة)؟ المعرفة الصحيحة هي الوقود الذي يشعل نار المحبة والثقة في القلب.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالخلاصة: لاهوت متكامل لذهن متكامل\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eإن العلاقة التعبدية الروحية ليست حالة شرقية في تضاد مع الحالة الغربية، ولا قلباً ضد العقل. الله اختار أن يوحي بكلمته في سياقات متنوعة ليقدم إيماناً يشبع الكيان الإنساني كله. نحن نحتاج إلى \"الحقائق التقريرية\" لتضبط عقولنا (العقيدة السليمة)، ونحتاج إلى \"الأمانة العلاقية\" لتشعل قلوبنا (التقوى الحية). فلنحذر من أي تعليم يسلبنا \"دقة العقيدة\" بحجة أنها \"فكر يوناني\"؛ فالمسيحية الحقة هي عناق بين الحق والحياة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi8uTCrTod3N8z_wAdD_CMQNxc_WoLwpFsFgJCYqAvvR_i7yO5EARuLESlBjCnX_ov2qbp5PjG-ZpqSmOydnaK3SsiEH1ACxSBtgZfBPbdUs_xP6EOGRg04WOlnN-dFtkjuekNz-xV9Y5kIiqLg1PGVWPpf_TXTSAQbsRyFFjUJRM_L2yHBIHoTp6MWX5Y/s1024/unnamed%20(17).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi8uTCrTod3N8z_wAdD_CMQNxc_WoLwpFsFgJCYqAvvR_i7yO5EARuLESlBjCnX_ov2qbp5PjG-ZpqSmOydnaK3SsiEH1ACxSBtgZfBPbdUs_xP6EOGRg04WOlnN-dFtkjuekNz-xV9Y5kIiqLg1PGVWPpf_TXTSAQbsRyFFjUJRM_L2yHBIHoTp6MWX5Y/s320/unnamed%20(17).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"50:Tfce,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eكلمة «سر» (Mysterion): بين طقوس الغموض وإعلان النعمة\u003c/h2\u003e\n\u003cp\u003eتحليل مغالطة \"إسقاط المعاني الخارجية\" (Uncontrolled Parallelism)\u003c/p\u003e\n\u003cp\u003eعندما يجد الباحث كلمة يونانية استخدمها الرسول بولس، ويجد نفس الكلمة مستخدمة في أدبيات الديانات الوثنية المعاصرة له، قد يقع في فخ \"إسقاط المعنى الخارجي الوثني\" على النص الكتابي. اليوم، نسلط الضوء على واحدة من أهم هذه الكلمات: كلمة \"سر\" (باليونانية: Mysterion).\u003c/p\u003e\n\u003cp\u003eفي القرن الأول، كانت \"الديانات السرية\" تقوم على \"أسرار\" باطنية وطقوس خفية لا تُمنح إلا للنخبة \"المستنيرة\". وعندما استخدم بولس كلمة (Mysterion)، ظن البعض أنه يحاكي تلك الديانات. لكن هذا خطأ منهجي فادح؛ لأننا حكمنا على الكلمة من السياق الوثني وتجاهلنا تعريف بولس لها من داخل كتاباته. التشابه هنا هو في اللفظ، أما العقيدة فمختلفة جذرياً.\u003c/p\u003e\n\u003cp\u003eلقد استخدم بولس اللفظة الشائعة، لكنه ملأها بمعنى مختلف تماماً؛ ففي الفكر الوثني، السر معلومة يجب أن تظل مخفية، أما في الفكر الكتابي، فالسر هو خطة الله التي كانت مخفية قديماً ولكنها الآن أُعلنت وكُشفت لجميع الأمم بلا استثناء.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eيقول بولس في (كولوسي ١: ٢٦): «الْسِّرِّ الْمَكْتُومِ مُنْذُ الدُّهُورِ وَمُنْذُ الأَجْيَالِ، لكِنَّهُ الآنَ قَدْ أُظْهِرَ لِقِدِّيسِيهِ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإذن، كلمة \"سر\" في القاموس المسيحي لا تعني \"الغموض\" (Mystery)، بل تعني \"الإعلان\" (Revelation). إنه سر لم يعد سراً لأنه انفتح أمام العالم أجمع بفعل النعمة السيادية. السر ليس كوداً معقداً، بل هو شخص: «الْمَسِيحُ فِيكُمْ رَجَاءُ الْمَجْدِ» (كولوسي ١: ٢٧).\u003c/p\u003e\n\u003cp\u003eتأمل في عظمة هذا الإعلان؛ لقد انتهى الاحتكار الروحي الذي عرفته الديانات النخبوية. في الإنجيل، انفتح السر للبسطاء قبل الحكماء، وأعظم سر في الكون هو أن الله القدوس يسكن في الإنسان المؤمن، وهي الحقيقة التي تمنحنا \"رجاء المجد\".\u003c/p\u003e\n\u003cp\u003eالمسيحية ليس لديها أسرار تخفيها، بل لدينا \"سر\" ننادي به من فوق السطوح. الفرح المسيحي يكمن في أن الله فتح خزانة أسراره الأزلية، فوجدنا داخلها \"المسيح\"، وقدمه لنا مجاناً. عندما نقرأ كلمة \"سر\" عند بولس، لا يجب أن يتبادر إلى أذهاننا \"الغموض\"، بل \"الامتياز\"؛ امتياز العيش في الزمن الذي أشرق فيه نور مجد الله لجميع الناس.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh2jk8OKpicxy0o2XTe02lUClmuXqlJ7gYBpssRBpssJPQXwGARW8VEOSM3b9z4f1tk5jzP62G-PQXKO9E0q1uFS58PvHQv0EfVEpBxJLAZJXXefjS7UDoq5htzMLP9YxUs0smM9EfvAOSAFZtZ3tE3RFMnclgkD_xLUrp2nqRR-r1RsMcUczDXsHayuHU/s960/599744503_122093410857181837_5848662183577605354_n.jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh2jk8OKpicxy0o2XTe02lUClmuXqlJ7gYBpssRBpssJPQXwGARW8VEOSM3b9z4f1tk5jzP62G-PQXKO9E0q1uFS58PvHQv0EfVEpBxJLAZJXXefjS7UDoq5htzMLP9YxUs0smM9EfvAOSAFZtZ3tE3RFMnclgkD_xLUrp2nqRR-r1RsMcUczDXsHayuHU/s320/599744503_122093410857181837_5848662183577605354_n.jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"51:T1d47,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e«إكليسيا»: هل هي فعلاً \"جماعة المدعوين للخروج\"؟\u003c/h2\u003e\n\u003cp\u003eبين الوهم اللغوي والحقيقة الكتابية\u003c/p\u003e\n\u003cp\u003eمن التفسيرات الشائعة التي نسمعها كثيراً في الأوساط الكنسية، والتي تبدو جذابة وعميقة، هو القول بأن كلمة \"كنيسة\" في اليونانية (Ekklesia) مشتقة من شقين: (Ek) وتعني \"خارجاً\"، و(Kaleo) وتعني \"يدعو\". وبناءً على ذلك، يُستنتج أن معنى كلمة \"كنيسة\" هو: \"جماعة المؤمنين الذين دعاهم الله للخروج من العالم\".\u003c/p\u003e\n\u003cp\u003eرغم أن هذا المفهوم اللاهوتي - الانفصال عن العالم - صحيح كتابياً، إلا أن الاستدلال اللغوي الذي بُني عليه خاطئ تماماً من الناحية الأكاديمية، ويوقعنا في فخ مغالطتين منهجيتين حذر منهما علماء التفسير مثل د. أ. كارسون. دعونا نحلل هاتين المغالطتين لنفهم المعنى الدقيق.\u003c/p\u003e\n\u003ch3\u003e١. الفخ الأول: مغالطة الجذر اللغوي (The Root Fallacy)\u003c/h3\u003e\n\u003cp\u003eتكمن المغالطة الأولى في افتراض أن معنى الكلمة مخبأ في الأصل الذي اشتقت منه، وليس في استخدامها الشائع في زمن كتابة النص. في زمن العهد الجديد، كانت كلمة Ekklesia مصطلحاً مدنياً وسياسياً شائعاً، يُستخدم للإشارة إلى أي \"تجمُّع\" أو \"اجتماع لمجلس المدينة\"، ولم تكن تحمل في طياتها أي دلالة لاهوتية حول \"الخروج الروحي من العالم\".\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالدليل في سفر أعمال الرسل ١٩:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eفي قصة الشغب الذي حدث في أفسس، عندما ثار الصناع الوثنيون ضد بولس وصرخوا لساعتين \"عظيمة هي أرطاميس الأفسسيين\"، وصف لوقا البشير هذا \"الغوغاء\" والمحفل الفوضوي بنفس الكلمة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّ ٱلْمَحْفِلَ (tē ekklēsia) كَانَ مُضْطَرِباً» (أعمال ١٩: ٣٢).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلو طبقنا التفسير الاشتقاقي الشائع هنا، لصار المعنى: \"لأن جماعة المدعوين للخروج من العالم (المقدسين) كانت تصرخ: عظيمة هي أرطاميس!\". هذا مستحيل. إن استخدام لوقا للكلمة هنا يثبت أن Ekklesia في حد ذاتها تعني مجرد \"تجمُّع\" أو \"حشد\"، سواء كان هذا الحشد يسبح الله أو يعبد الأوثان.\u003c/p\u003e\n\u003ch3\u003e٢. الفخ الثاني: نقل المعنى الكلي (Illegitimate Totality Transfer)\u003c/h3\u003e\n\u003cp\u003eالمغالطة الثانية تحدث عندما يأخذ المفسر المعنى اللاهوتي المتطور للكنيسة (كجسد المسيح وعروسه) الذي تبلور في رسائل العهد الجديد، ويقوم بإسقاطه قسراً على كل مرة تظهر فيها الكلمة، حتى في نصوص العهد القديم (الترجمة السبعينية).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالدليل من الترجمة السبعينية:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eاستخدم المترجمون اليهود للعهد القديم كلمة Ekklesia لترجمة الكلمة العبرية \"قاهال\" (جماعة). ولأن الكلمة تعني \"تجمعاً\" فقط، فقد وردت أحياناً في سياقات سلبية. يقول داود النبي في المزمور:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَبْغَضْتُ جَمَاعَةَ (Ekklesia) ٱلْأَثَمَةِ» (مزمور ٢٦: ٥).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإذا طبقنا \"نقل المعنى الكلي\" هنا، سنجعل داود يقول: \"أبغضتُ كنيسة المسيح، المكونة من الأثمة!\". هذه كارثة تفسيرية. الكلمة هنا مجرد \"وعاء\" لغوي، والسياق وحده هو الذي يحدد ما إذا كان هذا الوعاء يحوي \"قديسين\" أم \"أثمة\".\u003c/p\u003e\n\u003ch3\u003e٣. الخلاصة: لاهوت صحيح، استدلال خاطئ\u003c/h3\u003e\n\u003cp\u003eنحن نؤمن يقيناً أن المؤمنين \"مدعوون\" وأنهم \"ليسوا من هذا العالم\". هذا حق كتابي راسخ نستقيه من نصوص صريحة وواضحة، مثل قول المسيح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لَوْ كُنْتُمْ مِنَ الْعَالَمِ لَكانَ الْعَالَمُ يُحِبُّ خَاصَّتَهُ. وَلكِنْ لأَنَّكُمْ لَسْتُمْ مِنَ الْعَالَمِ، بَلْ أَنَا اخْتَرْتُكُمْ مِنَ الْعَالَمِ، لِذلِكَ يُبْغِضُكُمُ الْعَالَمُ» (يوحنا ١٥: ١٩).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأو قول بولس الرسول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إِلَى جَمِيعِ الْمَوْجُودِينَ فِي رُومِيَةَ، أَحِبَّاءَ اللهِ، مَدْعُوِّينَ قِدِّيسِينَ» (رومية ١: ٧).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eنحن نبني عقيدتنا على هذه النصوص الواضحة، ولا نستنبطها من اشتقاق لغوي وهمي لكلمة Ekklesia. الدرس المنهجي: الكنيسة ليست مقدسة بسبب اسمها اليوناني، ولا بسبب جذر الكلمة. الكنيسة مقدسة لسبب واحد فقط هو هوية \"من\" تجتمع حوله. إنها Ekklesia (تجمُّع) بشري، يتحول إلى \"جسد المسيح\" المقدس فقط عندما يكون المسيح هو رأس هذا الاجتماع.\u003c/p\u003e\n\u003cp\u003eملاحظة ختامية: خطورة \"الترميز اللاهوتي\"\u003c/p\u003e\n\u003cp\u003eما حدث مع كلمة Ekklesia هو نفس ما رأيناه سابقاً مع كلمتي \"أغابي\" و\"فيليو\". إنه فخ \"الترميز والتقنين\" (Codification). يحدث هذا عندما يكون اللاهوت في ذهن الواعظ صحيحاً جداً، فيحاول \"صبه\" بالكامل داخل كلمة واحدة، لتتحول هذه الكلمة إلى \"رمز كودي\" مشحون بكل هذا اللاهوت، بغض النظر عن سياقها. علينا أن نتذكر دائماً القاعدة الذهبية: الحق العقائدي يُبنى على السياقات الكبرى (Macro-Contexts) —أي الجمل والفقرات وتعليم الكتاب ككل— ولا يُبنى أبداً على \"جذور الكلمات\" أو الاشتقاقات اللغوية المنفصلة. المعنى في السياق، لا في القاموس.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjl0cilktzEMitcb6_vhj8_W55KPNKdReo97TGqYYKHBZXZHBqHKayadrlTd9OJMgRXRYayj5NpZXLHnkRSxV7AmXlMZTQxMw33EDL1a49qFcib4MtpLGpKgNzYPReJ0FtEBFqySBjXFz1CPDnGGNTxXPTNeeEX3Q-kFJyHTNxR8chjAZqsF77WHHqKTME/s960/600341009_903566498900571_250697378092933820_n.jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjl0cilktzEMitcb6_vhj8_W55KPNKdReo97TGqYYKHBZXZHBqHKayadrlTd9OJMgRXRYayj5NpZXLHnkRSxV7AmXlMZTQxMw33EDL1a49qFcib4MtpLGpKgNzYPReJ0FtEBFqySBjXFz1CPDnGGNTxXPTNeeEX3Q-kFJyHTNxR8chjAZqsF77WHHqKTME/s320/600341009_903566498900571_250697378092933820_n.jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"52:T1a68,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eقوة الإنجيل والديناميت!\u003c/h2\u003e\n\u003cp\u003eتشريح مغالطة لغوية شائعة في تفسير كلمة «قوة»\u003c/p\u003e\n\u003cp\u003eمن منا لم يسمع في عظة حماسية ذلك التفسير الشائع لقول الرسول بولس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنِّي لَسْتُ أَسْتَحِي بِإِنْجِيلِ الْمَسِيحِ، لأَنَّهُ قُوَّةُ اللهِ لِلْخَلاَصِ لِكُلِّ مَنْ يُؤْمِنُ» (رومية ١: ١٦)؟\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيقف الواعظ بحماسة ويشرح أن الكلمة اليونانية الأصلية هي «دوناميس» (dynamis)، ثم يضيف: «ومن هذه الكلمة اشتققت كلمة \"ديناميت\" في اللغات الحديثة، فالإنجيل إذن هو ديناميت الله الذي يفجر صخور الخطية ويهدم حواجزها!».\u003c/p\u003e\n\u003cp\u003eيبدو هذا التشبيه جذاباً، لكنه في الحقيقة يقلل من عظمة عمل الله بدلاً من أن يمجده. إن فهم «قوة الله» الحقيقية يتطلب أن نترك فكرة الديناميت جانباً، وننظر إلى الحدث الأعظم في التاريخ: القبر الفارغ وقيامة المسيح.\u003c/p\u003e\n\u003cp\u003eهذا التفسير يقع في مغالطة تفسيرية معروفة تُسمى «المفارقة الدلالية التاريخية» (أو الإسقاط الزمني الدلالي)، وهي خطأ يحدث عندما نُسقط معنى حديثاً على نص قديم كُتب في عصر مختلف تماماً.\u003c/p\u003e\n\u003ch3\u003eالحقيقة التاريخية والخطأ المنهجي\u003c/h3\u003e\n\u003cp\u003eالحقيقة التاريخية بسيطة: الديناميت اختراع حديث، ابتكره العالم السويدي ألفريد نوبل في عام ١٨٦٧م، وسماه بهذا الاسم مستلهماً الكلمة اليونانية «دوناميس» التي تعني «قوة». لكن هذا الاختراع لم يكن موجوداً في القرن الأول الميلادي، عصر كتابة الرسائل الرسولية.\u003c/p\u003e\n\u003cp\u003eالخطأ المنهجي: يكمن في أن الرسول بولس لم يكن يفكر مطلقاً في «الديناميت» عندما كتب كلمة «دوناميس». في زمنه، كانت هذه الكلمة تعني ببساطة: القدرة، الاستطاعة، القوة الفاعلة. لم تكن تحمل أي دلالة على المتفجرات أو الانفجارات. إن فرض معنى معاصر على نص قديم هو جوهر هذه المغالطة، وهو يشبه أن نقرأ في النص الكتابي معنىً لم يكن موجوداً أصلاً في ذهن الكاتب الملهَم بالروح القدس.\u003c/p\u003e\n\u003ch3\u003eالحقيقة اللاهوتية: قوة القيامة لا قوة الدمار\u003c/h3\u003e\n\u003cp\u003eالفرق ليس تاريخياً ولغوياً فقط، بل لاهوتياً جوهرياً، يتعلق بنوع القوة التي يعلنها الوحي الإلهي. ففي حين أن قوة الديناميت تؤدي إلى الموت والهدم والتمزيق، وهي طاقة عمياء تسبب الفوضى والتدمير، إلا أن قوة «دوناميس» الكتابية تؤدي إلى الحياة والخلق والسيادة، وهي عمل عاقل وسيادي ومحيي.\u003c/p\u003e\n\u003cp\u003eيُعرِّف الكتاب المقدس هذه القوة تعريفاً مذهلاً في رسالة أفسس:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَمَا هِيَ عَظَمَةُ قُدْرَتِهِ الْفَائِقَةُ نَحْوَنَا نَحْنُ الْمُؤْمِنِينَ، حَسَبَ عَمَلِ شِدَّةِ قُوَّتِهِ الَّذِي عَمِلَهُ فِي الْمَسِيحِ، إِذْ أَقَامَهُ مِنَ الأَمْوَاتِ، وَأَجْلَسَهُ عَنْ يَمِينِهِ فِي السَّمَاوِيَّاتِ» (أفسس ١: ١٩-٢٠).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيا لعظمة هذه القوة! إنها ليست انفجاراً يهدم، بل معجزة سيادية أقامت المسيح من بين الأموات، وكسرت سلطان الموت الفعلي، «بِقُوَّةِ حَيَاةٍ لَا تَزُولُ» (عبرانيين ٧: ١٦). لكي يكون عندك تصور لمدى عظمة هذه القوة، تصور جسداً ميتاً مثخناً بالجراح يقوم من الموت لحياة لا يقترب منها الموت بعد. وليس هذا فحسب، بل إن قيامة هذا الجسد فتحت الباب لملايين الملايين من المخلصين لكي ينالوا القيامة الروحية في الزمان الحاضر، ونفس نوع القيامة الجسدية في اليوم الأخير، حين «سَيُغَيِّرُ جَسَدَ تَوَاضُعِنَا لِيَكُونَ عَلَى صُورَةِ جَسَدِ مَجْدِهِ» (فيلبي ٣: ٢١).\u003c/p\u003e\n\u003cp\u003eالديناميت يحول الأحياء إلى أموات، أما قوة الله في الإنجيل فتحول الأموات روحياً إلى أحياء، وتبني ملكوتاً جديداً من الخليقة الجديدة.\u003c/p\u003e\n\u003ch3\u003eالخلاصة: احترام الكلمة المقدسة في سياقها\u003c/h3\u003e\n\u003cp\u003eإن الإيمان بالوحي اللفظي الكامل للكتاب المقدس يدعونا إلى احترام الكلمات بمعانيها التي كانت سارية في زمن كتابتها. المغالطات اللغوية تحول الإعلان الواضح عن قوة الله المتجلية في قيامة المسيح وانتصاره على الموت إلى مجرد لعبة اشتقاقية سطحية.\u003c/p\u003e\n\u003cp\u003eفلنثق أن إنجيل المسيح يحمل في طياته قوة القيامة الحقيقية، تلك القوة التي لا تقاومها خطية، ولا يقف أمامها حتى الموت نفسه. هذه هي قوة الله للخلاص، لكل من يؤمن.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiOAAM-NMy4KqUfxWNCjfga1YLwBCyxI0gUsjcEiTIO6CSfVZfo9Lm_uiwsAo_uVk7S0jLwxwFGgV7G5Rwvbfhu-p9SuSiV451_EWqP68aVveEzFEFB7eN5kKknpRrbOEaw6VZQcvGFSZj1pXnvFFYguai8LbG2JN4gZsmntPQ3O4iIUVAUJNV87zkUHR8/s960/597933203_902788505645037_6355382121241548254_n.jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiOAAM-NMy4KqUfxWNCjfga1YLwBCyxI0gUsjcEiTIO6CSfVZfo9Lm_uiwsAo_uVk7S0jLwxwFGgV7G5Rwvbfhu-p9SuSiV451_EWqP68aVveEzFEFB7eN5kKknpRrbOEaw6VZQcvGFSZj1pXnvFFYguai8LbG2JN4gZsmntPQ3O4iIUVAUJNV87zkUHR8/s320/597933203_902788505645037_6355382121241548254_n.jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"53:T234b,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eأغابي وفيليو: المغالطة اللغوية مقابل النعمة المُرَمِّمة\u003c/h2\u003e\n\u003cp\u003eلعلها واحدة من أشهر القصص التي سمعناها جميعاً وتأثرنا بها. على شاطئ بحيرة طبرية، عند الفجر، يسأل المسيح المُقام بطرس ثلاث مرات: \"يا سمعان بن يونا، أتحبني؟\".\u003c/p\u003e\n\u003cp\u003eالتفسير الشائع، والذي يبدو عميقاً جداً للوهلة الأولى، يعتمد على تمييز لغوي حاد في اليونانية بين كلمتي \"محبة\":\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003e١. \u003cstrong\u003eأغابي (Agapaō):\u003c/strong\u003e التي يقدمها الكثير من الوعاظ على أنها المحبة الإلهية الفائقة، العقلانية، وغير المشروطة.\u003c/li\u003e\n\u003cli\u003e٢. \u003cstrong\u003eفيليو (Phileō):\u003c/strong\u003e والتي يقدمونها على أنها المحبة الأخوية، العاطفية، أو الصداقة البشرية.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eتقول العظة الشهيرة إن المعنى يكمن في أنَّ يسوع سأل بـ \"أغابي\" (هل تحبني حباً إلهياً؟)، فيجيب بطرس بضعف بـ \"فيليو\" (يا رب، أنا فقط أحبك كصديق أو بمستوى محبة أدنى من أغابي). يكرر يسوع الطلب بـ \"أغابي\"، ويكرر بطرس العجز بـ \"فيليو\". أخيراً، \"ينزل\" يسوع لمستوى بطرس ويسأله في المرة الثالثة بـ \"فيليو\"، وهنا حزن بطرس.\u003c/p\u003e\n\u003cp\u003eتبدو القصة مؤثرة درامياً، لكن هل هذا ما قصده الإنجيل حقاً؟ أم أننا أمام ما يسميه العالم اللاهوتي د. أ. كارسون \"مغالطة تفسيرية\" كبرى؟\u003c/p\u003e\n\u003ch3\u003eالحقيقة الكتابية: الكتاب يفسر نفسه\u003c/h3\u003e\n\u003cp\u003eعندما نغوص في كلمة الله، نجد أن الروح القدس يستخدم غنى اللغة اليونانية ليعبر عن الحق الإلهي بجمال وتنوع، لكن دون وضع حواجز وهمية ومفتعلة بين الكلمات المترادفة. لكي نفهم قصد الوحي في حوار بطرس، علينا أن نرى كيف استخدم يوحنا نفسه هاتين الكلمتين في مواضع أخرى من إنجيله:\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eأولاً: محبة الله الآب للابن (الدليل القاطع)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eهل يمكن لأي لاهوتي أن يشك في كمال وعظمة محبة الآب للابن؟ بالطبع لا. ومع ذلك، يستخدم إنجيل يوحنا الكلمتين بالتبادل التام لوصف هذه المحبة الكاملة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eفي (يوحنا ٣: ٣٥): «الآبُ يُحِبُّ (أغابي) الابْنَ».\u003cbr\u003e\nفي (يوحنا ٥: ٢٠): «لأَنَّ الآبَ يُحِبُّ (فيليو) الابْنَ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإذا قبلنا التفسير الشائع بأن \"فيليو\" هي محبة \"بشرية\" أو \"أقل مستوى\"، فسنقع في خطأ عقائدي جسيم، وهو القول بأن محبة الآب للابن في الإصحاح الخامس \"ناقصة\"! حاشا. إذن، استخدام الوحي للكلمتين لوصف أعظم حب في الوجود (حب الآب للابن) يؤكد لنا أن الكلمتين في قاموس يوحنا هما مترادفتان تعبران عن المحبة العميق والحقيقية، وأن التغيير بينهما هو من باب التنويع البلاغي وليس تغيير المعنى الجوهري.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eثانياً: سياق رد الاعتبار (العدد ٣ هو المفتاح)\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eعندما نقرأ النص بخشوع، نجد أن التركيز ليس على \"امتحان مفردات لغوية\"، بل على \"الشفاء الروحي\". الوحي يسلط الضوء على تكرار السؤال ثلاث مرات، ليقابل إنكار بطرس ثلاث مرات.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«حَزِنَ بُطْرُسُ لأَنَّهُ قَالَ لَهُ ثَالِثَةً: أَتُحِبُّنِي؟» (يوحنا ٢١: ١٧).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلم يقل النص إنه حزن لأن يسوع \"غير الكلمة\" أو نزل بمستوى المحبة، بل حزن لأن السؤال تكرر \"ثَالِثَةً\". الرقم ٣ هنا هو المفتاح؛ بطرس أنكر سيده ثلاث مرات أمام جمر النار، والآن سيده يرد له الاعتبار ثلاث مرات أمام جمر النار أيضاً.\u003c/p\u003e\n\u003ch3\u003eالمعنى الأعمق: النعمة التي تُرمم\u003c/h3\u003e\n\u003cp\u003eالتفسير القائم على التفريق اللغوي المفتعل يحول النص إلى \"اختبار لغوي\" فشل فيه بطرس، وكأن الرب يوبخه على نوعية محبته. لكن التفسير الكتابي السليم الذي لا يفتعل فروقات وهمية، يقدم لنا مسيحاً أعظم: المسيح الذي يقبل محبة بطرس الصادقة كما هي، ويرمم كسر قلبه. الدرس ليس في الفرق بين أغابي وفيليو، بل في الفرق بين \"الإنكار\" السابق و\"الإقرار\" الحالي.\u003c/p\u003e\n\u003ch3\u003eتشريح منهجي: كيف تُصنع تصنيفات لاهوتية وهمية؟\u003c/h3\u003e\n\u003cp\u003eيشرح د. كارسون في كتابه \"المغالطات التفسيرية\" أننا غالباً ما نقع في فخ \"الترميز اللاهوتي\" عبر آلية تتكون من أربع خطوات متتالية تصنع وهماً بالحقيقة:\u003c/p\u003e\n\u003cp\u003e١. \u003cstrong\u003eالخطوة الأولى: الشحن الدلالي غير المبرر:\u003c/strong\u003e يقوم الواعظ باختيار كلمة يونانية معينة ويفرغها من معناها اللغوي المرن، ثم يقوم \"بشحنها\" بمعنى لاهوتي كامل. هو هنا لا يترجم الكلمة، بل يحولها إلى \"وعاء\" لمفهوم عقائدي، بينما الكلمة اليونانية لا تشير لكل هذه الأفكار اللاهوتية.\u003c/p\u003e\n\u003cp\u003e٢. \u003cstrong\u003eالخطوة الثانية: خلق التضاد المفتعل:\u003c/strong\u003e لكي يثبت المفهوم اللاهوتي الذي ألبسه للكلمة الأولى، يذهب لكلمة مرادفة لها ويحملها بمعنى معاكس أو أدنى. في اللغة الطبيعية الحقيقية، الكلمتان تتداخلان، لكن المفسر هنا يخلق \"جداراً فاصلاً\" بينهما لا وجود له في القاموس الحقيقي.\u003c/p\u003e\n\u003cp\u003e٣. \u003cstrong\u003eالخطوة الثالثة: البناء على التباين المفتعل:\u003c/strong\u003e الآن، وبدلاً من تفسير \"النص\" كما هو في سياقه، يقوم الواعظ بتفسير \"التباين\" الذي صنعه هو بيده. ويصبح محور العظة هو \"الصراع بين الكلمتين\" وليس \"سياق النص\".\u003c/p\u003e\n\u003cp\u003e٤. \u003cstrong\u003eالخطوة الرابعة: الترميز والتقنين:\u003c/strong\u003e تتحول هذه الكلمات في ذهن المستمعين إلى \"شيفرات تقنية\". بمجرد أن يسمع المؤمن كلمة \"أغابي\" يقفز ذهنه فوراً للمعنى اللاهوتي المشحون، متجاهلاً تماماً أن نفس الكلمة قد استخدمت في الكتاب المقدس لتؤدي معاني مختلفة؛ كما في (يوحنا ٣: ١٩): \u003cstrong\u003e«أَحَبَّ (أغابي) النَّاسُ الظُّلْمَةَ»\u003c/strong\u003e.\u003c/p\u003e\n\u003ch3\u003eالخلاصة\u003c/h3\u003e\n\u003cp\u003eإن خطورة هذه الطريقة تكمن في أنها تجعلنا نقرأ \"لاهوتنا النظامي\" الذي في عقولنا ونسقطه داخل النصوص بدلاً من استخراجه منها. اللغة اليونانية كانت لغة يستخدمها الناس في حياتهم العامة (Koine)، وليست لغة شيفرات سرية. الحفاظ على مبدأ \"الكتاب المقدس وحده\" يعني أن نخضع لسلطان السياق الذي وضعه الروح القدس، لا لسلطان القواميس التي نؤلفها نحن عبر تضخيم الفروقات اللغوية.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhjhYm5eyYb2trFbqOf5s0gLVyUDZ4QRMg-H7vV6BkHY_SSR-w0BSd6FTvl4nGXJvx_KgPJnajQWQ1q0-UptjLQsj4id87hlRrLVp6_UzjK3CRyao4CSF3YOoO_cPE36nV2CwN5jk1vorWeRZCVv6uKBbzstyVsdKbnHquaaZCSOaxjrKAUAILRVSsdKZo/s960/601449082_122093407971181837_8805182961504802178_n.jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhjhYm5eyYb2trFbqOf5s0gLVyUDZ4QRMg-H7vV6BkHY_SSR-w0BSd6FTvl4nGXJvx_KgPJnajQWQ1q0-UptjLQsj4id87hlRrLVp6_UzjK3CRyao4CSF3YOoO_cPE36nV2CwN5jk1vorWeRZCVv6uKBbzstyVsdKbnHquaaZCSOa nt-size: 1.6em; } #piper-book-container .footnotes { margin-top: 60px; padding-top: 20px; border-top: 1px solid #ccc; font-size: 0.9em; color: #666; } #piper-book-container .poetry-box { text-align: center; font-style: italic; line-height: 2.2; margin: 30px 0; color: #444; font-size: 1.1em; } @media (max-width: 600px) { #piper-book-container h1.main-title { font-size: 2em; } #piper-book-container .book-toc ul { grid-template-columns: 1fr; } }\u003c/p\u003e\n\u003ch1\u003eرؤية يسوع المسيح والتمتع به\u003c/h1\u003e\n\u003ch3\u003eبقلم: القس جون بايبر\u003c/h3\u003e\n\u003ch3\u003eفهرس الكتاب\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e\u003ca href=\"#intro\"\u003eكلمة إلى القارئ\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch1\"\u003e١. رؤية مجد الله\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch2\"\u003e٢. يسوع هو مجد الله\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch3\"\u003e٣. الأسد والخروف\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch4\"\u003e٤. بهجة يسوع المسيح\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch5\"\u003e٥. قوة يسوع المسيح\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch6\"\u003e٦. حكمة يسوع المسيح\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch7\"\u003e٧. تشويه سمعة يسوع\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch8\"\u003e٨. أوجاع يسوع المسيح\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch9\"\u003e٩. ذبيحة يسوع المسيح\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch10\"\u003e١٠. مراحم يسوع المسيح\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch11\"\u003e١١. جانب الشِدة\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch12\"\u003e١٢. قيامة يسوع المسيح\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#ch13\"\u003e١٣. المجيء الثاني\u003c/a\u003e\u003c/li\u003e\n\u003cli\u003e\u003ca href=\"#conc\"\u003eالخاتمة: كيف نثق به؟\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\u003chr\u003e\n\u003ch2\u003eكلمة إلى القارئ\u003c/h2\u003e\n\u003cp\u003eمن هو يسوع المسيح؟ هذا هو السؤال الذي سأحاول الإجابة عنه في هذا الكتاب، وهدفي أن لا تظل محايدًا تجاه يسوع المسيح؛ فهذا الحياد سيكون له عواقب وخيمة. إن رؤية يسوع المسيح والتمتع به هي أهم رؤية وتمتع ستقوم بهما على الإطلاق، إذ إن أبديتك تتوقف عليهما. لذا هدفي هو أن تراه كحقيقة راسخة وتتمتع به بفرح عظيم.\u003c/p\u003e\n\u003cp\u003eعندما أتحدث عن رؤية يسوع المسيح، لا أعني الرؤية المادية بأعين الجسد، بل بعيني قلبك. عندما كان يسوع قُبيل مغادرته هذا العالم والعودة إلى الله الآب، قال: «بَعْدَ قَلِيلٍ لاَ تُبْصِرُونَنِي» و«تُبْصِرُونَ ابْنَ الإِنْسَانِ... آتِيًا فِي سَحَابِ السَّمَاءِ» (يوحنا ١٦: ١٦؛ مرقس ١٤: ٦٢). في ذلك الوقت، كان الناس يرونه بأعينهم الجسدية. لكن الآن، يقول الكتاب المقدس إننا نسلك بالإيمان لا بالعيان (٢ كورنثوس ٥: ٧). فيسوع ليس هنا لنراه جسديًا، إنه في السماء إلى أن يعود مرة ثانية ليراه الجميع.\u003c/p\u003e\n\u003cp\u003eلكن الكتاب المقدس يقول إنه يمكننا أن نرى يسوع بطريقة أخرى؛ إنه يتحدث عن «مُسْتَنِيرَةً عُيُونُ أَذْهَانِكُمْ» (أفسس ١: ١٨). يتحدث عن رؤية «إِنَارَةِ إِنْجِيلِ مَجْدِ الْمَسِيحِ، الَّذِي هُوَ صُورَةُ اللهِ» (٢ كورنثوس ٤: ٤). يسوع نفسه تحدث عن نوعين من الرؤية؛ قال عن الجموع غير المدركة: «لأَنَّهُمْ مُبْصِرُونَ لاَ يُبْصِرُونَ» (متى ١٣: ١٣). نوع من الرؤية بالأعين الجسدية، والآخر بالأعين الروحية. عندما نرى بأعيننا الروحية، نرى حقيقة يسوع المسيح وجماله وقيمته كما هي في الحقيقة. وهكذا، قد يرى شخص أعمى اليوم المسيح بصورة أوضح من الكثير من المبصرين.\u003c/p\u003e\n\u003cp\u003eيمكن للجميع قراءة حياة يسوع و«رؤية» الصور التي رسمتها كلمات من عرفوه، لكن ليس الجميع يرى حقيقته وجماله وقيمته اللانهائية. بعضهم يرى مجرد أسطورة، وبعضهم يرى حماقة، وبعضهم يرى عثرة. هم «مُبْصِرُونَ لاَ يُبْصِرُونَ». إنه كما لو أن طفلًا أمامه منظرٌ رائع الجمال لكنه يحول نظره مفضلًا أن ينظر إلى مجلته المصورة.\u003c/p\u003e\n\u003cp\u003eالتمتع بيسوع المسيح هو التجاوب مع هذا النوع الثاني من الرؤية. عندما ترى شيئًا كحقيقة وجمال وقيمة، فإنك تتمتع به؛ أي أنك تعتز به وتحبه وتوقره وتقدره. الرؤية الروحية والتمتع الروحي مترابطان ارتباطًا وثيقًا لدرجة أنه من الإنصاف أن نقول: إذا لم تتمتع بالمسيح، فأنت لم ترَ المسيح كما هو. إذا لم تقدره فوق كل شيء، فأنت لم تدرك قيمته الحقيقية.\u003c/p\u003e\n\u003cp\u003eغاية هذا الكتاب هي مساعدتك على رؤية يسوع المسيح والتمتع به. الطريقة الوحيدة لحدوث ذلك هي أن تستخدم عينيك وأذنيك الجسديتين لترى أو تسمع الشهادات عن يسوع المسيح التي نقلها من عرفوه عندما كان هنا. لهذا السبب، تتخلل هذه الفصول اقتباسات من الكتاب المقدس. ليس كلامي هو الذي يهم، بل كلام الله؛ هو قد شهد لابنه، وشهادته مقنعة. ليمنحكم الله أعينًا لتبصروا وقلوبًا لتبتهجوا.\u003c/p\u003e\n\u003ch2\u003eالفصل الأول\u003c/h2\u003e\n\u003ch3\u003eرؤية مجد الله والتمتع به\u003c/h3\u003e\n\u003cp\u003eاَلسَّمَاوَاتُ تُحَدِّثُ بِمَجْدِ اللهِ (مزمور ١٩: ١)\u003c/p\u003e\n\u003cp\u003eلأَنَّ اللهَ الَّذِي قَالَ: ’أَنْ يُشْرِقَ نُورٌ مِنْ ظُلْمَةٍ‘، هُوَ الَّذِي أَشْرَقَ فِي قُلُوبِنَا، لإِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ. (كورنثوس الثانية ٤: ٦)\u003c/p\u003e\n\u003ch4\u003eالهدف الأسمى ليسوع المسيح\u003c/h4\u003e\n\u003cp\u003eالكون المخلوق كله يدور حول المجد. أعمق اشتياق في القلب البشري وأعمق معنى للسماء والأرض يتلخص في هذا: \"مجد الله\". لقد خُلق الكون ليُظهر هذا المجد، وخُلقت أنت لتراه وتتمتع به. لا شيء أقل من ذلك يكفي. ولأننا أبدلنا \"مَجْدَ اللهِ الَّذِي لاَ يَفْنَى\" بأمور أخرى (رومية ١: ٢٣)، يعاني العالم من الفوضى والخلل كما هو عليه الآن.\u003c/p\u003e\n\u003cp\u003e\"السَّمَاوَاتُ تُحَدِّثُ بِمَجْدِ اللهِ\" (مزامير ١٩: ١). هذا هو السبب في وجود الكون كله. كل شيء يتعلق بالمجد. تلسكوب هابل الفضائي يرسل صورًا بالأشعة تحت الحمراء لمجرات بعيدة ربما تبعد اثني عشر مليار سنة ضوئية (١١٥٬٨٧٢٬٤٨٠ تريليون كيلومتر). حتى داخل مجرة درب التبانة، هناك نجوم عظيمة تتحدى الوصف، مثل \"إيتا كارينا\"، التي تتألق بقوة خمسة ملايين مرة ضعف قوة الشمس.\u003c/p\u003e\n\u003cp\u003eأحيانًا ينزعج الناس من هذا الاتساع الهائل مقارنة بضآلة الإنسان؛ إذ إن هذه المقارنة تجعلنا صغارًا بصورة لا نهائية. لكن معنى هذا الاتساع لا يتعلق بنا بشكل أساسي، إنه يتعلق بالله. \"السَّمَاوَاتُ تُحَدِّثُ بِمَجْدِ اللهِ\"، كما يقول الكتاب المقدس. السبب في \"إهدار\" الكثير من الفضاء على كون يأوي حفنة من البشر هو لتوضيح حقيقة عن خَالقنا، وليس عنا. \"ارْفَعُوا إِلَى الْعَلاَءِ عُيُونَكُمْ وَانْظُرُوا، مَنْ خَلَقَ هذِهِ؟ مَنِ الَّذِي يُخْرِجُ بِعَدَدٍ جُنْدَهَا، يَدْعُو كُلَّهَا بِأَسْمَاءٍ؟ لِكَثْرَةِ الْقُوَّةِ وَكَوْنِهِ شَدِيدَ الْقُدْرَةِ لاَ يُفْقَدُ أَحَدٌ.\" (إشعياء ٤٠: ٢٦).\u003c/p\u003e\n\u003cp\u003eأعمق اشتياق في القلب البشري هو أن يعرف ويتمتع بمجد الله. لقد خُلقنا لهذا. \"آتِي بِبَنِيَّ مِنْ بَعِيدٍ، وَبِبَنَاتِي مِنْ أَقْصَى الأَرْضِ. بِكُلِّ مَنْ دُعِيَ بِاسْمِي وَلِمَجْدِي خَلَقْتُهُ وَجَبَلْتُهُ وَصَنَعْتُهُ.\" (إشعياء ٤٣: ٦-٧). أن تراه، أن تتمتع به، وأن تُظهره؛ هذا هو السبب الذي لأجله وُجدت. إن المساحات الشاسعة لهذا الكون هي بيانٌ \"لِكيْ يُبَيِّنَ غِنَى مَجْدِهِ عَلَى آنِيَةِ رَحْمَةٍ قَدْ سَبَقَ فَأَعَدَّهَا لِلْمَجْدِ\" (رومية ٩: ٢٣). العين الجسدية خُلقت لتهمس للعين الروحية: \"هذا الكون ليس هو أشواق نفسك، بل مَنْ خلقه\". قال بولس: \"نَفْتَخِرُ عَلَى رَجَاءِ مَجْدِ اللهِ\" (رومية ٥: ٢). أو بمزيد من الدقة، أنت \"مُعدٌّ سلفاً للمجد\"؛ لهذا خُلقت — \"لِكيْ يُبَيِّنَ غِنَى مَجْدِهِ عَلَى آنِيَةِ رَحْمَةٍ قَدْ سَبَقَ فَأَعَدَّهَا لِلْمَجْدِ\" (رومية ٩: ٢٣).\u003c/p\u003e\n\u003cp\u003eالشوق والأنين في قلوبنا هو أنينٌ لهذا المجد. لكننا نكتمه \"وَلَمْ يَسْتَحْسِنُوا أَنْ يُبْقُوا اللهَ فِي مَعْرِفَتِهِمْ\" (رومية ١: ٢٨). لذلك سقطت الخليقة كلها في الفوضى. وأوضح مثال في الكتاب المقدس لهذه الفوضى هو اضطراب حياتنا الجنسية؛ إذ يوضح بولس أن استبدال مجد الله بأشياء أخرى هو السبب الجذري للاضطراب الجنسي. عندما نستبدل المجد بما هو أدنى، يسلمنا الله لانحطاط يعكس بؤسنا؛ لقد استبدلنا الثمين بالرخيص.\u003c/p\u003e\n\u003cp\u003eالفكرة هي: لقد خُلقنا لنعرف ونثمن مجد الله فوق كل شيء، وعندما نستبدل هذا الكنز بصور — صورة الإنسان الفاني — يختل كل شيء. شمس مجد الله خُلقت لتتألق في مركز نفوسنا، وعندما تكون في مكانها، تبقى كل كواكب حياتنا في مداراتها الصحيحة. شفاء نفوسنا يبدأ بإعادة مجد الله إلى مكانه السيادي.\u003c/p\u003e\n\u003cp\u003eكلنا جياع لمجد الله، لا لذواتنا. لا أحد يذهب إلى \"الأخدود العظيم\" (Grand Canyon) ليزيد من تقديره لذاته، بل لتذوب الذات أمام روعته؛ فهناك شفاء في تأمل جلاله أعظم من تأمل ذواتنا. لا شيء أكثر سخرية من إنسان يحيا على ذرة تُدعى الأرض، يقف أمام المرآة محاولاً إيجاد قيمته بتعظيم ذاته. هذا هو \"إنجيل العالم الحديث\"، لكنه ليس إنجيل المسيح. في ظُلمة الانكفاء على الذات، أشرقت \"إِنَارَةُ إِنْجِيلِ مَجْدِ الْمَسِيحِ، الَّذِي هُوَ صُورَةُ اللهِ\" (٢ كورنثوس ٤: ٤). إنجيل المسيح محوره مجد المسيح، لا أنت. وحتى في خلاصك، الفضل يرجع لرحمته التي مكنتك أن تتمتع به وتمجده إلى الأبد.\u003c/p\u003e\n\u003cp\u003eما هو أعظم ما يمكن أن يفعله يسوع ليظهر محبته لك؟ ما هو هدفه النهائي والخير الأسمى للإنجيل؟ هل هو الفداء، أم التبرير، أم التبني؟ أليست هذه كلها وسائل لغاية أسمى؟ شيء نهائي طلبه يسوع من الآب لأجلك: \"أَيُّهَا الآبُ أُرِيدُ أَنَّ هؤُلاَءِ الَّذِينَ أَعْطَيْتَنِي يَكُونُونَ مَعِي حَيْثُ أَكُونُ أَنَا، لِيَنْظُرُوا مَجْدِي الَّذِي أَعْطَيْتَنِي\" (يوحنا ١٧: ٢٤).\u003c/p\u003e\n\u003cp\u003eإنجيل المسيح هو \"إِنْجِيلُ مَجْدِ الْمَسِيحِ\" لأن غايته أن ترى وتتمتع بمجده، ومجد المسيح هو عين مجد الله. \"الَّذِي، وَهُوَ بَهَاءُ مَجْدِهِ، وَرَسْمُ جَوْهَرِهِ\" (عبرانيين ١: ٣). \"الَّذِي هُوَ صُورَةُ اللهِ غَيْرِ الْمَنْظُورِ\" (كولوسي ١: ١٥). عندما يشرق نور الإنجيل في قلبك، فهو \"لإِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ\" (٢ كورنثوس ٤: ٦). وهذا النوع من \"الرؤية\" هو الشفاء الحقيقي؛ إذ \"وَنَحْنُ جَمِيعًا نَاظِرِينَ مَجْدَ الرَّبِّ بِوَجْهٍ مَكْشُوفٍ... نَتَغَيَّرُ إِلَى تِلْكَ الصُّورَةِ عَيْنِهَا، مِنْ مَجْدٍ إِلَى مَجْدٍ\" (٢ كورنثوس ٣: ١٨).\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الآب، أبو المجد، هذه صرخة قلوبنا: أن نتغيَّر من مجد إلى مجد، حتى نصل في القيامة إلى صورة تشبه تماماً صورة ابنك يسوع المسيح ربنا. حتى ذلك الحين، نشتاق أن ننمو في النعمة وفي معرفة مجده. نريد أن نراه بوضوح كما نرى الشمس، وأن نتمتع به بعمق كما نتمتع بأعز مسراتنا. أيها الإله الرحيم، أَمِلْ قلوبنا إلى كلمتك وعجائب مجدك، وافطمنا عن الهوس بالتفاهات. أنر أذهاننا لنرى مجد ابنك في الإنجيل. نؤمن أنك وحدك صاحب المجد، فأعِنْ عدم إيماننا، واغفر تشتت عواطفنا. ارحمنا من أجل المسيح، وأتمم فينا رغبتك لإظهار مجد نعمتك. باسم يسوع نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الثاني\u003c/h2\u003e\n\u003ch3\u003eيسوع هو مجد الله\u003c/h3\u003e\n\u003ch4\u003eلاهوت يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eلم يأتِ المسيح إلى عالمنا ليجعلك عظيمًا، بل وُجدت أنت لتتمتع بتمجيده. إن فكرة هذا الكتاب هي أن معرفة أمجاد المسيح هي غاية في ذاتها، وليست وسيلة لغيرها. فالمسيح ليس مَجيدًا لكي تصبح أنت ثريًا أو موفور الصحة، بل المسيح مَجيد لكي تجد استمتاعك وكفايتك فيه وحده، سواء كنت غنيًا أو فقيرًا، مريضًا أو صحيحًا.\u003c/p\u003e\n\u003cp\u003eإن المجد الأول الذي تقوم عليه كل الأمجاد الأخرى هو الوجود الأزلي للمسيح. إذا تأملت في هذا الحق كما ينبغي، فسيكون طوق النجاة الذي يرفع سفينة نفسك الغارقة. إن الوجود الأزلي هو، بلا شك، أعظم سر على الإطلاق. تأمل في هذه الحقيقة المطلقة: ارجع إلى الأزل قبل بداية الأزمان، حيث لم يكن هناك \"شيء\" على الإطلاق. هناك تجد شخصًا واحدًا له كرامة الوجود أولاً وإلى الأبد. شخص لم يتكوَّن، لم يُخلق، ولم يتطوَّر؛ بل هو موجود على الدوام. لمن ينتمي هذا المجد الفريد المطلق؟ والإجابة هي: المسيح، الشخص الذي يعرفه العالم باسم يسوع الناصري.\u003c/p\u003e\n\u003cp\u003eالرسول يوحنا، الذي دوّن آخر سفر في الكتاب المقدس، تلقى الإعلان الحاسم، فهو ينقل عن الله قوله: «أَنَا هُوَ الأَلِفُ وَالْيَاءُ، الْبِدَايَةُ وَالنِّهَايَةُ» يَقُولُ الرَّبُّ الْكَائِنُ وَالَّذِي كَانَ وَالَّذِي يَأْتِي، الْقَادِرُ عَلَى كُلِّ شَيْءٍ (رؤيا ١: ٨). المتحدث هنا ليس المسيح [في هذا الموضع]، بل هو الله القدير الذي يدعو نفسه \"الأَلِفُ وَالْيَاءُ\" — الحرفان الأول والأخير في الأبجدية. وفي أي أبجدية، لا يمكن أن تنطق الحرف الذي يسبق الألف — أي لا وجود لأي شيء قبل الألف — ولا يمكن الحديث عن شيء بعد الياء. هكذا هو الحال مع الله؛ لا يوجد \"قبل\" الله ولا \"بعد\" الله. إنه موجود بشكل أزلي، بغض النظر عن مدى رجوعك إلى الأزل أو تقدمك إلى الأبد. إنه الحقيقة السرمدية المطلقة، له وحده مجد الوجود أولاً ودائمًا.\u003c/p\u003e\n\u003cp\u003eهذا هو المعنى الأساسي لاسمه في العهد القديم، \"يهوه\". إنه مبني على الفعل \"يكون\". عندما سأل موسى الله عن اسمه، «قَالَ اللهُ لِمُوسَى: أَهْيَهْ الَّذِي أَهْيَهْ. وَقَالَ: هَكَذَا تَقُولُ لِبَنِي إِسْرَائِيلَ: أَهْيَهْ أَرْسَلَنِي إِلَيْكُمْ» (خروج ٣: ١٤) — وحرفياً تعني (أَهْيَهْ = أنا كائن). ويُفسر الله لنا هذا الاسم \"أَهْيَهْ\" في نبوة إشعياء على أنه يعني الحقيقة الأزلية في الماضي والمستقبل: «أَنْتُمْ شُهُودِي، يَقُولُ الرَّبُّ... لِكَيْ تَعْلَمُوا وَتُؤْمِنُوا بِي وَتَفْهَمُوا أَنِّي أَنَا هُوَ. قَبْلِي لَمْ يُصَوَّرْ إِلهٌ، وَبَعْدِي لاَ يَكُونُ» (إشعياء ٤٣: ١٠).\u003c/p\u003e\n\u003cp\u003eويجعل الله هذا واضحًا في إشعياء ٤٤: ٦: «هكَذَا يَقُولُ الرَّبُّ مَلِكُ إِسْرَائِيلَ وَفَادِيهِ، رَبُّ الْجُنُودِ: أَنَا الأَوَّلُ وَأَنَا الآخِرُ، وَلاَ إِلهَ غَيْرِي». ومرة أخرى في إشعياء ٤٨: ١٢: «اِسْمَعْ لِي يَا يَعْقُوبُ، وَإِسْرَائِيلُ الَّذِي دَعَوْتُهُ: أَنَا هُوَ. أَنَا الأَوَّلُ وَأَنَا الآخِرُ». هذا هو اسمه: \"يهوه\" — الذي هو موجود بشكل أزلي مُطلق ولا يوجد من ينافسه أو يشاركه في ذلك. له الكرامة الفريدة والمجد الوحيد أن يكون موجودًا دائمًا عندما لم يكن هناك شيء آخر، ولا يستطيع أي شيء أن يوجد بعده. هذا ما يعنيه أن يكون الله هو الله.\u003c/p\u003e\n\u003cp\u003eما علاقة هذا بالمسيح، الذي نعرفه باسم يسوع الناصري؟ الرد هو كل ما سبق ذكره. فقد أورد الرسول يوحنا قول المسيح قرب نهاية سفر الرؤيا: «وَهَا أَنَا آتٍ سَرِيعًا... أَنَا الأَلْفُ وَالْيَاءُ، الأَوَّلُ وَالآخِرُ، الْبِدَايَةُ وَالنِّهَايَةُ... أَنَا يَسُوعُ، أَرْسَلْتُ مَلاَكِي لأَشْهَدَ لَكُمْ بِهَذِهِ الأُمُورِ عَنِ الْكَنَائِسِ» (رؤيا ٢٢: ١٢-١٣، ١٦). هنا المسيح هو المتحدث وليس الله الآب. ولا يمكن لاثنين أن يكونا \"الألف والياء\" ما لم يكونا واحدًا في الجوهر. لا يمكن لاثنين أن يكونا \"الأول والآخِر\" بشكل أزلي ما لم يكونا واحدًا. ومع ذلك، يقول المسيح يسوع إن له نفس الكرامة والمجد الخاص بالله القدير.\u003c/p\u003e\n\u003cp\u003eأيضًا، نَسَبَ المسيحُ إلى نفسِهِ اسمَ اللهِ الفريدَ المَجيدَ، \"أنا كائن\": «قَالَ لَهُمْ يَسُوعُ: الْحَقَّ الْحَقَّ أَقُولُ لَكُمْ: قَبْلَ أَنْ يَكُونَ إِبْرَاهِيمُ أَنَا كَائِنٌ» (يوحنا ٨: ٥٨). ويقول يسوع لتلاميذه قرب نهاية حياته على الأرض: «أَقُولُ لَكُمُ الآنَ قَبْلَ أَنْ يَكُونَ، حَتَّى مَتَى كَانَ تُؤْمِنُونَ أَنِّي أَنَا هُوَ» (يوحنا ١٣: ١٩). لا يمكن لإنسان أن يقول عن نفسه شيئًا أعظم من هذا؛ فإما أن يكون هذا صحيحًا، أو أنه تجديف. هذا القول يجعل المسيح إما أن يكون هو الله أو أن يكون مجدفًا.\u003c/p\u003e\n\u003cp\u003eلقد عرف يوحنا من هو يسوع، فكتب: «فِي الْبَدْءِ كَانَ الْكَلِمَةُ، وَالْكَلِمَةُ كَانَ عِنْدَ اللهِ، وَكَانَ الْكَلِمَةُ اللهَ... وَالْكَلِمَةُ صَارَ جَسَدًا... وَرَأَيْنَا مَجْدَهُ، مَجْدًا كَمَا لِوَحِيدٍ مِنَ الآبِ» (يوحنا ١: ١، ١٤). يسوع المسيح، \"الكلمة\"، \"مولود\" وليس مخلوقًا — مولود من الآب أزليًا. أقنومان يظهران كإله واحد — الابن \"مولود\" من الآب، لاهوت واحد وجوهر واحد. هذا سر عظيم، وهو الحق الذي أعلنه الله عن نفسه.\u003c/p\u003e\n\u003cp\u003eعرف الرسول بولس أيضًا المجد الفريد الذي للمسيح: «وَمِنْهُمُ الْمَسِيحُ حَسَبَ الْجَسَدِ، الْكَائِنُ عَلَى الْكُلِّ إِلهًا مُبَارَكًا إِلَى الأَبَدِ. آمِينَ» (رومية ٩: ٥). ومع ذلك، «الَّذِي إِذْ كَانَ فِي صُورةِ اللهِ، لَمْ يَحْسِبْ خُلْسَةً أَنْ يَكُونَ مُعَادِلاً للهِ. لكِنَّهُ أَخْلَى نَفْسَهُ، آخِذًا صُورةَ عَبْدٍ، صَائِرًا فِي شِبْهِ النَّاسِ» (فيلبي ٢: ٦-٧). لذلك، «فَإِنَّهُ فِيهِ يَحِلُّ كُلُّ مِلْءِ اللاَّهُوتِ جَسَدِيًّا» (كولوسي ٢: ٩). ونحن المسيحيون ننتظر الآن «الرَّجَاءَ الْمُبَارَكَ وَظُهُورَ مَجْدِ اللهِ الْعَظِيمِ وَمُخَلِّصِنَا يَسُوعَ الْمَسِيحِ» (تيطس ٢: ١٣).\u003c/p\u003e\n\u003cp\u003eلهذا السبب، يقول كاتب رسالة العبرانيين إن جميع الملائكة يسجدون للمسيح؛ فهو يُعبد من جميع الملائكة كإله: «وَلْتَسْجُدْ لَهُ كُلُّ مَلاَئِكَةِ اللهِ» (عبرانيين ١: ٦). فهو خالق كل شيء، وهو نفسه الله: «وَأَمَّا عن الابْنِ: كُرْسِيُّكَ يَا أَللهُ إِلَى دَهْرِ الدُّهُورِ... وَأَنْتَ يَا رَبُّ فِي الْبَدْءِ أَسَّسْتَ الأَرْضَ، وَالسَّمَاوَاتُ هِيَ عَمَلُ يَدَيْكَ» (عبرانيين ١: ٨، ١٠). وهكذا يشهد الآب على لاهوت الابن «الَّذِي، وَهُوَ بَهَاءُ مَجْدِهِ، وَرَسْمُ جَوْهَرِهِ، وَحَامِلٌ كُلَّ الأَشْيَاءِ بِكَلِمَةِ قُدْرَتِهِ» (عبرانيين ١: ٣).\u003c/p\u003e\n\u003cp\u003eيسوع المسيح هو خالق الكون، هو الألف والياء، الأول والآخِر. يسوع المسيح ليس له بداية أبداً، إنه الحقيقة الأزلية، وله المجد الفريد أن يكون موجوداً أولاً ودائماً. لقد تمتع الآب أزلياً بـ «بَهَاءُ مَجْدِهِ، وَرَسْمُ جَوْهَرِهِ» في شخص ابنه.\u003c/p\u003e\n\u003cp\u003eإن رؤية هذا المجد والتمتع به هو الهدف من خلاصنا: «أَيُّهَا الآبُ أُرِيدُ أَنَّ هؤُلاَءِ الَّذِينَ أَعْطَيْتَنِي يَكُونُونَ مَعِي حَيْثُ أَكُونُ أَنَا، لِيَنْظُرُوا مَجْدِي الَّذِي أَعْطَيْتَنِي» (يوحنا ١٧: ٢٤). إن الابتهاج بهذا المجد والشبع به إلى الأبد هو الهدف من خلقك والغاية من فدائك.\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الآب الأزلي، يا من لم يكن لك بداية ولن تكون لك نهاية، أنت الألف والياء. نؤمن بهذا لأنك كشفته لنا. تتهلل قلوبنا بالامتنان لأنك فتحت عيوننا لنعرف أن يسوع المسيح هو ابنك، الإله الأزلي، المولود منك غير المخلوق، وأنك والابن إله واحد. نرتعد ونحن نتكلم بهذه الحقائق المجيدة خوفاً من التقصير في حقك بكلمات ضعيفة، لكن يجب أن ننسب إليك المجد ونُسبِّحك. عارٌ علينا إن صمتنا، فالحجارة نفسها ستصرخ. نشكرك لأنك جعلتنا نتذوق ونرى مجد يسوع المسيح ابنك. آه أيها الآب! نشتاق أن نعرفه أكثر. انزع من أذهاننا الأفكار الضئيلة عن المسيح، واشبع أنفسنا بروح المسيح وبكل عظمته. وسِّع قدراتنا لنستمتع بك في كل ما أنت لنا فيه، وعندما يعجز اللحم والدم عن الإدراك، ثبِّت انتباهنا وعواطفنا على جمال ابنك المجيد، وامنحنا أن نصبح صدى لمجده في هذا العالم، سواء كنا في غنى أو فقر، في مرض أو صحة. باسم يسوع نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الثالث\u003c/h2\u003e\n\u003ch3\u003eالأسد والخروف\u003c/h3\u003e\n\u003ch4\u003eكمال يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eنعجب بالأسد بسبب قوته الجبارة ومظهره الملكي. أما الخروف فيُعجبنا بسبب وداعته وتواضعه. لكن الأكثر إثارة للعجب هو خروف يشبه الأسد وأسد يشبه الخروف. ما يجعل المسيح مجيدًا، كما لاحظ جوناثان إدواردز قبل أكثر من ٢٥٠ عامًا، هو \"اقتران رائع لكمالات متنوعة\".\u003c/p\u003e\n\u003cp\u003eعلى سبيل المثال، نحن نعجب بالمسيح لتساميه، لكن الأكثر إثارة للإعجاب هو أن تسامي عظمته ممزوج بخضوعه لله. نندهش منه لأن عدالته الثابتة مُلطفة بالرحمة. جلاله مُكَلَّل بالوداعة. في مساواته مع الله الآب، له تقوى عميقة لله. على الرغم من أنه كإنسان يستحق كل الخير، فقد كان صبورًا في تحمل الشر. سيادته على العالم كانت مكسوة بروح الطاعة والخضوع. أفحم الكتبة المتكبرين بحكمته، لكنه كان بسيطًا بما يكفي ليحبه الأطفال. كان بإمكانه تهدئة العاصفة بكلمة، لكنه لم يضرب السامريين بالبرق كما لم ينزل نفسه عن الصليب. مجد المسيح ليس أمرًا بسيطًا. إنه اجتماع لصفات متنوعة للغاية في شخص واحد. نراه في سفر الرؤيا في العهد الجديد: \"’…هُوَذَا قَدْ غَلَبَ الأَسَدُ الَّذِي مِنْ سِبْطِ يَهُوذَا، أَصْلُ دَاوُدَ، لِيَفْتَحَ السِّفْرَ وَيَفُكَّ خُتُومَهُ السَّبْعَةَ‘\" (رؤيا ٥: ٥).\u003c/p\u003e\n\u003cp\u003eهنا المسيح الأسد المنتصر، جاهز ليفتح كتاب التاريخ. لكن ماذا نرى في الآية التالية؟ \"’وَرَأَيْتُ فَإِذَا فِي وَسَطِ الْعَرْشِ وَالْحَيَوَانَاتِ الأَرْبَعَةِ وَفِي وَسَطِ الشُّيُوخِ خَرُوفٌ قَائِمٌ كَأَنَّهُ مَذْبُوحٌ، لَهُ سَبْعَةُ قُرُونٍ وَسَبْعُ أَعْيُنٍ، هِيَ سَبْعَةُ أَرْوَاحِ اللهِ الْمُرْسَلَةُ إِلَى كُلِّ الأَرْضِ.‘\" (رؤيا ٥: ٦). إذن الأسد هو خروف — كائن ضعيف وغير مؤذٍ ومتواضع، يُسهل افتراسه، ويُجزّ صوفه، ويُذبح وهو صامت. هكذا المسيح هو أسد يشبه الخروف. أسد يهوذا انتصر لأنه كان مستعدًا أن يقوم بدور الخروف. دخل إلى أورشليم في أحد الشعانين كملك في طريقه إلى العرش، وخرج من أورشليم يوم الجمعة العظيمة كخروف في طريقه إلى الذبح. طرد اللصوص من الهيكل كأسد. ثم في نهاية الأسبوع، قدم عنقه الجليل للسكين، وذبحوا أسد يهوذا كخروف، كذبيحة.\u003c/p\u003e\n\u003cp\u003eلكن أي نوع من الخراف هو؟ يقول رؤيا ٥: ٦ إن الخروف \"قَائِمٌ كَأَنَّهُ مَذْبُوحٌ، لَهُ سَبْعَةُ قُرُونٍ\". لاحظ أمرين. أولاً، الخروف \"قَائِم\". ليس متهاويًا في دمه على الأرض كما كان من قبل في الصليب. نعم، لقد ذُبح. لكنه الآن قائم — قائم في أقرب مكان بجوار عرش الله. ثانيًا، للخروف سبعة قرون. القرن رمز للقوة والسلطان في سفر الرؤيا (١٢: ٣؛ ١٣: ١؛ ١٧: ٣، ١٢)، وكذلك في العهد القديم (تثنية ٣٣: ١٧؛ مزمور ١٨: ٢؛ ١١٢: ٩). والرقم سبعة يرمز إلى الكمال والتمام. إذن، هذا ليس خروفًا عاديًا. إنه حي من الموت، وهو في كمال وتمام القوة — كمال التواضع ممزوج بكمال القدرة والقوة. إنه، في الواقع، خروف كالأسد. نرتعد ونحن نراه في رؤيا ٦: ١٦، حيث يصرخ الناس إلى الجبال والصخور: \"’اسْقُطِي عَلَيْنَا وَأَخْفِينَا …عَنْ غَضَبِ الْخَرُوفِ،‘\". ونراه في رؤيا ١٧: ١٤: \"’هؤُلَاءِ سَيُحَارِبُونَ الْخَرُوفَ، وَالْخَرُوفُ يَغْلِبُهُمْ، لأَنَّهُ رَبُّ الأَرْبَابِ وَمَلِكُ الْمُلُوكِ‘\".\u003c/p\u003e\n\u003cp\u003eإذن، المسيح هو أسد يشبه الخروف وخروف يشبه الأسد. هذا هو مجده — أنه \"اقتران رائع لكمالات متنوعة\". يضيء هذا الاقتران المجيد أكثر لأنه يتوافق تمامًا مع تعبنا وآلامنا وفي نفس الوقت اشتياقنا إلى العظمة. قال يسوع: \"’تَعَالَوْا إِلَيَّ يَا جَمِيعَ الْمُتْعَبِينَ وَالثَّقِيلِي الأَحْمَالِ، وَأَنَا أُرِيحُكُمْ. اِحْمِلُوا نِيرِي عَلَيْكُمْ وَتَعَلَّمُوا مِنِّي، لأَنِّي وَدِيعٌ وَمُتَوَاضِعُ الْقَلْبِ، فَتَجِدُوا رَاحَةً لِنُفُوسِكُمْ.‘\" (متى ١١: ٢٨-٢٩). وداعة المسيح وتواضعه الشبيهان بالخروف تأسرنا في تعبنا. ولذلك نحبه. لو كان يدعو الأقوياء، ليأسنا من المجيء إليه.\u003c/p\u003e\n\u003cp\u003eلكن صفة الوداعة وحدها لن تكون مجيدة. وداعة الأسد الشبيه بالخروف وتواضعه يصبحان رائعين إلى جانب السلطان الأزلي اللامحدود للخروف الشبيه بالأسد. هذا وحده يناسب شوقنا إلى العظمة. نعم، نحن بشرٌ محدودون ومائتون وثقيلو الأحمال. لكن هناك، على الأقل من حين لآخر، حلم يلتهب في كل قلب بأن تكون حياتنا ذات أهمية عظيمة. من أجل هذا الحلم قال يسوع: \"’دُفِعَ إِلَيَّ كُلُّ سُلْطَانٍ فِي السَّمَاءِ وَعَلَى الأَرْضِ، فَاذْهَبُوا وَتَلْمِذُوا جَمِيعَ الأُمَمِ ... وَهَا أَنَا مَعَكُمْ كُلَّ الأَيَّامِ إِلَى انْقِضَاءِ الدَّهْرِ‘\" (متى ٢٨: ١٨-٢٠). الخروف الشبيه بالأسد يدعونا لنتشجع بسلطانه المطلق على كل الوجود. ويذكرنا أنه، بكل هذا السلطان، سيكون معنا إلى انتهاء الدهر. هذا ما نشتاق إليه — نشتاق إلى بطل، قائد لا يُقهر. نحن بشر محدودون ومائتون لكن طبيعتنا ليست بسيطة. فعلى الرغم من بؤسنا، فإن لدينا اشتياق للمجد. نحن ضعفاء، لكننا نحلم بصنع العجائب. نحن عابرون وحياتنا مؤقتة، لكن الأبدية مكتوبة في قلوبنا.\u003c/p\u003e\n\u003cp\u003eمجد المسيح يسطع أكثر لأن اقتران كمالاته المتنوعة يتوافق تمامًا مع طبيعتنا المعقدة. في وقت ما، كان هذا الأسد الشبيه بالخروف مظلومًا ومُعذبًا ومسحوقًا. \"كَشَاةٍ تُسَاقُ إِلَى الذَّبْحِ، وَكَنَعْجَةٍ صَامِتَةٍ أَمَامَ جَازِّيهَا فَلَمْ يَفْتَحْ فَاهُ\" (إشعياء ٥٣: ٧). لكن في اليوم الأخير، لن يكون الأمر كذلك. الأسد الشبيه بالخروف سيصبح خروفًا يشبه الأسد، وبجلال وعظمة ملكية سيأخذ مكانه على شاطئ بحيرة النار، حيث أعداؤه غير التائبين \"سَيُعَذَّبُونَ... أَمَامَ الْمَلاَئِكَةِ الْقِدِّيسِينَ وَأَمَامَ الْخَرُوفِ... إِلَى أَبَدِ الآبِدِينَ\" (رؤيا ١٤: ١٠-١١).\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الإله القدير الرحيم، نحن نتهلل بانعكاس قوتك ورحمتك في ابنك، ربنا يسوع المسيح. نفرح بقوته الشبيهة بالأسد وبحنانه وداعته الشبيهة بالخروف. تتشجع قلوبنا بهذا المزيج الذي لا مثيل له من الكمالات. نطمئن لأنه لا يوجد مثله، وأنه ليس مجرد إنسان مثل الآخرين. امنحنا، في لا مبالاتنا، أن نرتعد أمام أسد يهوذا وأن نتواضع تحت قداسته الشديدة. وامنحنا، في انكسارنا وخوفنا، أن نأخذ شجاعتنا من الخروف الشبيه بالأسد. آه، كم نحتاج إلى المسيح بكماله! افتح أعيننا لنرى كمال تفوقه. انزع الصور الباهتة والمشوهة عن ابنك التي تضعف عبادتنا وتعيق طاعتنا. لتثبت قوة الأسد ومحبة الخروف إيماننا بالمسيح حتى لا يتزعزع. حررنا من الأحلام الصغيرة والمغامرات الخجولة والخطط المترددة. شجعنا. قوِّنا. اجعلنا نحب بمحبة شديدة متواضعة. أهِّلنا لنشارك ثقة أسد يهوذا التي أعطته، أن يرضى بإرادته أن يموت كخروف ويقوم من الأموات لفرح أبدي. في كل ذلك، امنح الجميع أن يروا مجد المسيح وأن يُسبح من خلاله. باسم يسوع نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الرابع\u003c/h2\u003e\n\u003ch3\u003eفرحٌ أبديٌّ لا يُقهر\u003c/h3\u003e\n\u003ch4\u003eبهجة يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eإذا أنقذك أحدهم من تيارات البحر وأمواجه العاتية، فلن يهمك إذا كان كئيبًا. لن يهمك حالته النفسية عندما تعانق عائلتك على الشاطئ. لكن الأمر مختلفٌ تمامًا مع الخلاص الذي يقدمه يسوع. المسيح لم يخلِّصك لأجل عودتك إلى عائلتك، بل خلَّصك لتكون له. إذا كان كئيبًا، سيكون خلاصنا حزينًا، ولن يكون ذلك خلاصًا عظيمًا.\u003c/p\u003e\n\u003cp\u003eيسوع نفسه — وكل ما هو الله لنا فيه — هو مكافأتك العظيمة، وليس أقل من ذلك. \"’أَنَا هُوَ خُبْزُ الْحَيَاةِ. مَنْ يُقْبِلْ إِلَيَّ فَلاَ يَجُوعُ، وَمَنْ يُؤْمِنْ بِي فَلاَ يَعْطَشُ أَبَدًا‘\" (يوحنا ٦: ٣٥؛ انظر أيضًا يوحنا ٧: ٣٧). في المقام الأول، الخلاص ليس مغفرة الخطايا فحسب، لكن الغاية القصوى من الخلاص هي الشركة مع يسوع (١ كورنثوس ١: ٩). المغفرة تزيل كل العوائق لكي تتحقق هذه الشركة. إذا لم تكن هذه الشركة مُمتعةً ومُشبعةً تمامًا، فلن يكون هذا خلاصًا عظيمًا. إذا كان المسيح كئيبًا، أو حتى هادئًا ببرود، فستكون الأبدية تنهيدةً طويلةً جدًا.\u003c/p\u003e\n\u003cp\u003eلكن مجد يسوع ونعمته أنه كان، وسيظل دائمًا، مُبهجًا ومُفرحًا إلى الأبد. أقول إن هذا مجده، لأنه لا مجد في الكآبة. وأقول إن هذه نعمته، لأن أفضل ما يُقدمه لنا هو فرحه. \"’كَلَّمْتُكُمْ بِهذَا لِكَيْ يَثْبُتَ فَرَحِي فِيكُمْ وَيُكْمَلَ فَرَحُكُمْ.‘\" (يوحنا ١٥: ١١؛ انظر أيضًا يوحنا ١٧: ١٣). لن يكون من كمال نعمة يسوع أن يُزيد فرحك بشكلٍ لا نهائيٍّ ثم يتركك دون أن يعطيك فرحه هو. لأن قدراتك على الفرح محدودةٌ جدًا. لذا فإن المسيح لا يقدّم نفسه فقط كموضوعٍ إلهيٍّ لفرحك، بل يصبّ فيك قدرته على الفرح، حتى تتمتع به بفرح الله نفسه. هذا هو المجد، وهذه هي النعمة.\u003c/p\u003e\n\u003cp\u003eليس من المجد أن تكون كئيبًا. لذلك لم يكن المسيح كئيبًا أبدًا. منذ الأزل، كان متلألئًا بهجة الله اللانهائية. تحدثت حكمة الله في سفر الأمثال ٨: ٣٠: \"’كُنْتُ عِنْدَهُ صَانِعًا، وَكُنْتُ كُلَّ يَوْمٍ لَذَّتَهُ، فَرِحَةً دَائِمًا قُدَّامَهُ.‘\". المسيح الأزلي، المساوي لله الآب والعامل بقدرته في خلق الكون، كان دائمًا فرحًا أمام الله ودائمًا بهجة الله. نرى هذا مرتين أخريين في العهد الجديد.\u003c/p\u003e\n\u003cp\u003eفي عبرانيين ١: ٨-٩، يتحدث الله الآب إلى الابن، وليس إلى الملائكة: \"’كُرْسِيُّكَ يَا أَللهُ إِلَى دَهْرِ الدُّهُورِ… أَحْبَبْتَ الْبِرَّ وَأَبْغَضْتَ الإِثْمَ. مِنْ أَجْلِ ذلِكَ مَسَحَكَ اللهُ إِلهُكَ بِزَيْتِ الابْتِهَاجِ أَكْثَرَ مِنْ شُرَكَائِكَ‘\". يسوع المسيح هو الكائن الأكثر بهجةً وفرحًا في الكون. بهجته تفوق بهجة جميع ملائكة السماء. إنه يعكس تمامًا الفرح والبهجة اللانهائية، المقدسة، غير القابلة للزوال التي لله أبيه.\u003c/p\u003e\n\u003cp\u003eمرةً أخرى، في أعمال الرسل ٢: ٢٥-٢٨، يفسر بطرس المزمور ١٦ ويقول عن المسيح: \"’كُنْتُ أَرَى الرَّبَّ أَمَامِي فِي كُلِّ حِينٍ، أَنَّهُ عَنْ يَمِينِي، لِكَيْ لاَ أَتَزَعْزَعَ. لِذلِكَ سُرَّ قَلْبِي وَتَهَلَّلَ لِسَانِي… لأَنَّكَ لَنْ تَتْرُكَ نَفْسِي فِي الْهَاوِيَةِ وَلاَ تَدَعَ قُدُّوسَكَ يَرَى فَسَادًا… وَستَمْلأُنِي سُرُورًا مَعَ وَجْهِكَ.‘\". المسيح القائم من الأموات قاهرٌ ظلمة الموت وبقوة سرور وبهجة الله ذاته. مجد المسيح هو بهجته الأبدية في حضور الله الآب وفرحه الذي لا يزول.\u003c/p\u003e\n\u003cp\u003eلكن إذا كانت الكآبة ليست مجدًا، فإن السطحية وعدم الجدية ليستا من المجد أيضًا. الفرح الخالي من الهم في حفلٍ راقصٍ لا يتساوى مع الفرح الذي لا يُقهر وأنت تتعذب في المعتقل بدون ذنب. الأول تافه، والثاني منتصر. الأول سطحي، أما الثاني مملوءٌ بالمجد. هناك ابتسامةٌ مُصطنعةٌ لم تعرف الألم أبدًا. وهذه لا تصنع راعيًا صالحًا أو مخلِّصًا عظيمًا. لكن المسيح هو مخلِّصٌ عظيم. لذلك، كان ينبوع الغبطة الذي لا يُقهر — يسوع — أيضًا \"رَجُلُ أَوْجَاعٍ وَمُخْتَبِرُ الْحَزَنِ\" (إشعياء ٥٣: ٣). \"’نَفْسِي حَزِينَةٌ جِدًّا حَتَّى الْمَوْتِ. اُمْكُثُوا ههُنَا وَاسْهَرُوا مَعِي‘\" (متى ٢٦: ٣٨). \"رَئِيسُ الْكَهَنَةِ الأَعْظَمُ\" يسوع ليس عاجزًا عن التعاطف مع ضعفاتنا، لأنه كإنسان \"مُجَرَّبٌ فِي كُلِّ شَيْءٍ مِثْلُنَا، بِلاَ خَطِيَّةٍ.\" (عبرانيين ٤: ١٤-١٥). بكى مع الذين بكوا (يوحنا ١١: ٣٥) وفرح مع الذين فرحوا (لوقا ١٠: ١٧، ٢١). كان جائعًا (متى ٤: ٢)، وكان مرهقًا (يوحنا ٤: ٦)، وخُذل (متى ٢٦: ٥٦)، وخانوه (متى ٢٦: ٤٥)، وجُلد (متى ٢٧: ٢٦)، وسُخر منه واستُهزئ به (متى ٢٧: ٣١)، وصُلب (متى ٢٧: ٣٥).\u003c/p\u003e\n\u003cp\u003eالفرح الذي لا يُقهر لا يعني أنه ليس هناك إلا الفرح. هل كان يسوع إذن منقسمًا، ممزقًا بين الفرح والحزن؟ هل يمكن أن تُضطرب نفسٌ لها هذا المجد الأبدي؟ نعم، اضطربت نفسه، لكن لم تكن مُمزقةً أو مُرتبكة. كان الموقف معقدًا، لكن نفس يسوع لم تكن مُرتبكة أو تتنازعها الأفكار. كانت هناك نغماتٌ متباينةٌ في موسيقى نفسه، لكن النتيجة كانت سيمفونيةً رائعةً. كان تدبيراً معقداً لقائدٍ عسكريٍّ بارع، قد يسمح للعدو بانتصاراتٍ ثانويةٍ مؤقتةٍ وظاهرية، فقط ليُحقق نصرًا أعظم في النهاية. هذا ليس علامةً على الارتباك في ذهن القائد. قد يبدو كذلك لمن يرون جزءًا صغيرًا من ميدان المعركة. لكن هنا مجده. قد يكون هناك آلاف العواصف في المحيط، لكن من ارتفاع مئة ميلٍ في الجو، فهو يبدو كأنه كتلةٌ هادئةٌ، عميقةٌ، مجيدةٌ من المياه.\u003c/p\u003e\n\u003cp\u003eخلال آلامه في بستان جثسيماني وصليب الجلجثة، كان يسوع مدعومًا بفرحٍ لا يُقهر. \"’الَّذِي مِنْ أَجْلِ السُّرُورِ الْمَوْضُوعِ أَمَامَهُ، احْتَمَلَ الصَّلِيبَ مُسْتَهِينًا بِالْخِزْيِ، فَجَلَسَ فِي يَمِينِ عَرْشِ اللهِ‘\" (عبرانيين ١٢: ٢). وما هو هذا الفرح والسرور العظيم الذي كان يملأه؟ كان فرح وسرور استقبال العبادة من أولئك الذين مات من أجلهم ليجعلهم فرحين مبتهجين بالله. الراعي الصالح يفرح بخروفٍ واحدٍ ضال (متى ١٨: ١٣). فكم بالحري فرحه بملايين لا تُحصى من المفديين!\u003c/p\u003e\n\u003cp\u003eهل في هذا درسٌ لنا عن كيفية تحملنا للألم؟ هل لاحظت أننا لسنا مدعوين فقط للتمثل بالرب في آلامه، لكن أيضًا التمثل بفرحه وهو يجتاز فيها؟ قال بولس لأهل تسالونيكي: \"’وَأَنْتُمْ صِرْتُمْ مُتَمَثِّلِينَ... بِالرَّبِّ، إِذْ قَبِلْتُمُ الْكَلِمَةَ فِي ضِيقٍ كَثِيرٍ، بِفَرَحِ الرُّوحِ الْقُدُسِ،‘\" (١ تسالونيكي ١: ٦). كان فرح الرب في الضيق هو الذي ملأ هذه الكنيسة الشابة.\u003c/p\u003e\n\u003cp\u003eهذه دعوةٌ لنا الآن في أيامنا هذه. هل سنحتضن الألم من أجل المسيح؟ ليس عدم الفرح، بل الألم. هل سنستجيب للدعوة في عبرانيين ١٣: ١٣ \"’فَلْنَخْرُجْ إِذًا إِلَيْهِ خَارِجَ الْمَحَلَّةِ حَامِلِينَ عَارَهُ‘\"؟ الإجابة ستتوقف على ما إذا كانت مدينة الله أكثر جاذبيةً لك من مدينة الإنسان. هل ستجيب: \"’لَيْسَ لَنَا هُنَا مَدِينَةٌ بَاقِيَةٌ، لكِنَّنَا نَطْلُبُ الْعَتِيدَةَ.‘\" (عبرانيين ١٣: ١٤)؟ أم ستتشبث بلذات مصر العابرة (عبرانيين ١١: ٢٥-٢٦)؟ لأولئك الذين ذاقوا فرح يسوع، لا شيء أكثر جاذبيةً من الرجاء الأعظم بسماع كلمته الأخيرة: \"’ نِعِمَّا أَيُّهَا الْعَبْدُ الصَّالِحُ وَالأَمِينُ! كُنْتَ أَمِينًا فِي الْقَلِيلِ فَأُقِيمُكَ عَلَى الْكَثِيرِ. اُدْخُلْ إِلَى فَرَحِ سَيِّدِكَ.‘\" (متى ٢٥: ٢١). مدينة الله هي مدينة الفرح. وهذا الفرح هو فرح المسيح الذي لا يُقهر.\u003c/p\u003e\n\u003ch4\u003eصلاة\u003c/h4\u003e\n\u003cp\u003eأيها الآب، إنه لعزاءٌ عظيمٌ لنا أنك وابنك يسوع لستما سطحيين ولا كئيبين. نحن نتهلل ونفرح بحقيقة أنك تستطيع أن تكون مبهجًا بشكلٍ لانهائيٍّ وفي نفس الوقت أنت مهتمٌّ بآلامنا. نقف مندهشين بأن نور فرح يسوع يصنع قوس قزح في دموعه. نشتاق أن نكون هكذا. نريد أن نكون أقوياء وثابتين في فرح إيماننا. لكننا لا نريد أن نكون غافلين عن خطورة خطايانا أو ألم معاناة الآخرين. يا إلهنا، أكمل فينا قصد ابنك يسوع عندما وعد بأن فرحه سيكون فينا وأن فرحنا سيكون كاملاً. اجعل ثمر الروح — الفرح — يزدهر في حياتنا. أشبعنا في الصباح بحبك الثابت حتى نتهلل ونفرح بك. أيقظ نفوسنا النائمة من سبات الفتور. انزع فتور قلوبنا. أشعل شعلة الغيرة لمجد اسمك. فليحل المسيح في قلوبنا بفرحه الذي لا يُقهر حتى نتغيَّر يومًا بعد يوم لنصير مشابهين لصورته البهيجة. واجعلنا ملجأً مُنعشًا ومُبهجًا لعالمٍ يائسٍ يبحث عن الفرح ولا يجده، وهو لا يعلم أنه جائعٌ لمجد بهجة وفرح الله في يسوع المسيح. باسمه نصلي، آمين.\u003c/p\u003e\n\u003ch2\u003eالفصل الخامس\u003c/h2\u003e\n\u003ch3\u003eالموج والريح لا يزالان يعرفان صوته\u003c/h3\u003e\n\u003ch4\u003eقوة يسوع المسيح\u003c/h4\u003e\n\u003cp\u003eفي يوليو ١٩٩٥، تجمَّعنا أنا وزوجتي نويل واثنان من أطفالنا على الأرض، بعيدًا عن النوافذ، تحت المسار المباشر لإعصار إيرين في بينساكولا، فلوريدا. هوت شجرة صنوبر عتيقة رائعة، مُحطِّمة زاوية غرفة نومنا أثناء سقوطها. خلال هدوء عين الإعصار، خرجنا إلى الخارج الذي كان ساكنًا تمامًا لنشاهد الدمار. وبعد حوالي عشرين دقيقة، اضطررنا للاختباء مجددًا مع مرور الجانب الخلفي للإعصار، الذي هدم المداخن وسحق السيارات تحت أغصان أشجار البلوط العملاقة التي تزيد أعمارها عن مئة عامٍ.\u003c/p\u003e\n\u003cp\u003eسارَ اللهُ على الشاطئِ، فما تحمَّلتْ أرجلُنا رمالًا لاسعةً.\u003cbr\u003e\nخطا اللهُ نحوَ البرِّ، فنثرَ النخيلُ سَعَفَهُ في دربِهِ.\u003cbr\u003e\nمضى اللهُ في الأرضِ، تساقطتْ أشجارُ البلوط خاشعةً أمامَهُ.\u003cbr\u003e\nوقفَ اللهُ ونفخ، وكنا نحن في زاويةٍ خائفينَ من مواجهةِ جلالِهِ.\u003c/p\u003e\n\u003cp\u003eكانت لحظة مؤثرة مليئة بالعبادة في مواجهة قوة سيادية عاتية لا يمكن الوقوف أمامها. كانت الخسائر مؤلمة، وإن كانت لا شيء مقارنة بدمار إعصار ميتش في هندوراس عام ١٩٩٨، الذي أودى بحياة عشرة آلاف شخص—والذي بدوره كان صغيرًا مقارنة بالإعصار الذي قتل مئة وإحدى وثلاثين ألفًا في بنغلاديش في ٣٠ أبريل ١٩٩١، وترك تسعة ملايين بلا مأوى. تحت أنقاض مثل هذه الرياح، لديك خياران: إما أن تسجد وتعبد أو تجدف وتلعن. الريح هي التي قتلت أبناء أيوب العشرة. \"’وَإِذَا رِيحٌ شَدِيدَةٌ جَاءَتْ مِنْ عَبْرِ الْقَفْرِ وَصَدَمَتْ زَوَايَا الْبيتِ الأَرْبَعَ، فَسَقَطَ عَلَى الْغِلْمَانِ فَمَاتُوا‘\" (أيوب ١: ١٩). عندما أُضيفت القروح إلى ذلك، قالت امرأة أيوب: \"’بَارِكِ اللهَ وَمُتْ‘\" (أيوب ٢: ٩). لكن رد أيوب على موت أبنائه كان مختلفًا: \"’فَقَامَ أَيُّوبُ وَمَزَّقَ جُبَّتَهُ، وَجَزَّ شَعْرَ رَأْسِهِ، وَخَرَّ عَلَى الأَرْضِ وَسَجَدَ، وَقَالَ... الرَّبُّ أَعْطَى وَالرَّبُّ أَخَذَ، فَلْيَكُنِ اسْمُ الرَّبِّ مُبَارَكًا‘\" (أيوب ١: ٢٠-٢١). وعندما أُضيفت القروح إلى حزنه، قال لزوجته: \"’أَالْخَيْرَ نَقْبَلُ مِنْ عِنْدِ اللهِ، وَالشَّرَّ لاَ نَقْبَلُ؟‘\" (أيوب ٢: ١٠).\u003c/p\u003e\n\u003cp\u003eالأمران كلاهما كانا من فعل الله، وليس واحدًا فقط، ورأى أيوب أن الموقفين مَقاماً للسجود وعبادة الله. لاحقًا في سفر أيوب، يقول أليهو بوضوح: \"’مِنَ الْجَنُوبِ تَأْتِي الأَعْصَارُ،… فَهِيَ مُدَوَّرَةٌ مُتَقَلِّبَةٌ بِإِدَارَتِهِ، لِتَفْعَلَ كُلَّ مَا يَأْمُرُ بِهِ عَلَى وَجْهِ الأَرْضِ الْمَسْكُونَةِ، سَوَاءٌ كَانَ لِلتَّأْدِيبِ أَوْ لأَرْضِهِ أَوْ لِلرَّحْمَةِ يُرْسِلُهَا. اُنْصُتْ إِلَى هذَا يَا أَيُّوبُ، وَقِفْ وَتَأَمَّلْ بِعَجَائِبِ اللهِ.‘\" (أيوب ٣٧: ٩-١٤). مزمور ٢٩ يتأمل ويَحتفي بهذه العجيبة، أي العاصفة الرعدية. \"’إِلهُ الْمَجْدِ أَرْعَدَ… صَوْتُ الرَّبِّ بِالْقُوَّةِ. صَوْتُ الرَّبِّ بِالْجَلاَلِ. صَوْتُ الرَّبِّ مُكَسِّرُ الأَرْزِ... صَوْتُ الرَّبِّ... وَيَكْشِفُ الْوُعُورَ، وَفِي هَيْكَلِهِ الْكُلُّ قَائِلٌ: ’مَجْدٌ‘.‘\" (مزمور ٢٩: ٣-٥، ٩). إن الله يتمجد بإظهار ذراعه القوية في الريح والرعد. \"’أَنَّ الرَّبَّ عَظِيمٌ… كُلَّ مَا شَاءَ الرَّبُّ صَنَعَ فِي السَّمَاوَاتِ وَفِي الأَرْضِ… الصَّانِعُ بُرُوقًا لِلْمَطَرِ. الْمُخْرِجُ الرِّيحَ مِنْ خَزَائِنِهِ.‘\" (مزمور ١٣٥: ٥-٧). \"’سَبِّحِي الرَّبَّ مِنَ الأَرْذِ، يَا أَيَّتُهَا التَّنَانِينُ وَكُلَّ اللُّجَجِ. النَّارُ وَالْبَرَدُ، الثَّلْجُ وَالضَّبَابُ، الرِّيحُ الْعَاصِفَةُ الصَّانِعَةُ كَلِمَتَهُ،‘\" (مزمور ١٤٨: ٧-٨). كان إسحاق واتس يقف بقدميه على الأرض ورأسه في السماء عندما كتب: \"يرتفعُ السحابُ وتعصفُ الريحُ، الكلُّ بأمرٍ من عرشِكَ العليِّ\".\u003c/p\u003e\n\u003cp\u003eلذلك، ليس من الغريب أنه عندما جاء المسيح إلى العالم، انحنت الطبيعة كلها ل
