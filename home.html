ئم يحددان الطريق لهذا المسار. إليكم الطريقة التي حاولتُ بها تصوير اللذة والخطر في العالم المادي في كتابي \"جوع إلى الله\": لماذا خلق الله الخبز وصمم البشر يحتاجون إليه من أجل الحياة؟ كان يمكنه أن يخلق حياة لا تحتاج إلى طعام. هو الله. كان يمكنه فعل ذلك بأي طريقة يسرُّ بها. لماذا الخبز؟ ولماذا الجوع والعطش؟ إجابتي بسيطة للغاية: لقد خلق الخبز لكي يكون لدينا فكرة عما هو عليه ابن الله عندما يقول: «أَنَا هُوَ خُبْزُ الْحَيَاةِ. مَنْ يُقْبِلْ إِلَيَّ فَلاَ يَجُوعُ، وَمَنْ يُؤْمِنْ بِي فَلاَ يَعْطَشُ أَبَداً» (يوحنا ٦ : ٣٥). وخلق إيقاع العطش والارتواء لكي يكون لدينا فكرة عما هو عليه الإيمان بالمسيح. لم يكن الله مضطراً لخلق كائنات تحتاج للطعام والماء، ولديها قدرات على تذوق أطعمة ممتعة. ولكن الإنسان ليس مركز الكون، الله هو المركز. وكل شيء، كما يقول بولس، هو «مِنْهُ وَبِهِ وَلَهُ كُلُّ الأَشْيَاءِ. لَهُ الْمَجْدُ إِلَى الأَبَدِ. آمِينَ» (رومية ١١ : ٣٦). «له» تعني أن كل شيء موجود ليلفت الانتباه إليه ويجلب الإعجاب به. وفي (كولوسي ١ : ١٦)، يقول بولس بشكل أكثر تحديداً إن «الْكُلَّ بِهِ وَلَهُ قَدْ خُلِقَ». لذلك خُلق الخبز لمجد المسيح. وخُلق الجوع والعطش لمجد المسيح. وخُلق الصوم لمجد المسيح. وهو ما يعني أن الخبز يعظم المسيح بطريقتين: من خلال أكله مع الشكر لصلاحه، ومن خلال التخلي عنه بدافع الجوع لله ذاته. عندما نأكل، نتذوق رمز طعامنا السماوي — خبز الحياة. وعندما نصوم نقول: «أنا أحب الحقيقة فوق الرمز». وفي قلب القديس، كل من الأكل والصوم هما عبادة. كلاهما يعظم المسيح. كلاهما يرسل القلب — شاكراً ومتشوقاً — إلى المعطي. ولكل منهما مكانه المحدد ولكل منهما خطره. خطر الأكل هو أن نقع في حب العطية؛ وخطر الصوم هو أن نقلل من شأن العطية ونفتخر بقوة إرادتنا [٧].\u003c/p\u003e\n\u003cp\u003eفرح انسيابي بلا فواصل في الله وفي عطاياه\u003c/p\u003e\n\u003cp\u003eولكن عندما يحررنا إنجيل يسوع المسيح لنرى ونتمتع بمجد الله فوق كل شيء، يُفتح الطريق لنا لنختبر فرحاً انسيابياً بلا فواصل في الله وعطاياه. نحن قادرون على رؤية كل عطية كشعاع من شمس مجد الله. كل فرح في الشعاع يمتد صعوداً إلى ينبوع النور وينتهي هناك. لا يصبح أي شيء مخلوق منافساً لله بل إعلاناً عنه فقط. لذلك يمكننا القول إنَّ كل فرح في الأشياء المخلوقة، بالنسبة للعقل الذي حرره الإنجيل، هو انسيابي وبلا فواصل مع الفرح في الله. لا يمكننا قول ذلك عن غير المؤمن، الذي يبتهج بالعديد من الأشياء ذاتها التي يبتهج بها المؤمن. يمكننا أن نقول للمؤمن: إن فرحك بطفلك، إذا اختبرته بشكل صحيح، هو فرح بالله. والشخص الذي نال الميلاد الثاني سيسمع هذا ويشعر بما تقصده ويفرح ويعمق تلك التجربة. ولكن الشخص الذي لم ينل الميلاد الثاني لن يكون لديه أدنى فكرة عما تتحدث عنه. الفرح بالطفل بالنسبة له هو فرح بالطفل، وليس بالله. هذه مأساة كبيرة، وسبب آخر يجعلنا نكرز بالإنجيل ونوضح ما نعنيه عندما نقول، الله هو الإنجيل.\u003c/p\u003e\n\u003cp\u003eوعد وقوة الروح وخطرهما\u003c/p\u003e\n\u003cp\u003eمن المحتم في عالم مادي ساقط أن تكثر الاختبارات والتجارب. يأتي الإنجيل بقوة عظيمة للخلاص — ليحررنا من كل شيء يمنعنا من رؤية الله والتلذذ به فوق كل شيء. لذلك فإن القوة هي عطية صالحة من عطايا الإنجيل. ولكن حتّى القوة يمكن أن تكون خادعة، والله غيور ألا نحب القوة الروحية أكثر منه هو ذاته. بل إنَّ الله سيستخدم حتّى القوة الروحية الفائقة للطبيعة ليختبر ما إذا كان هو ذاته مَن نحب أم عطية القوة. تأمل في هذا الاختبار المذهل في (تثنية ١٣ : ١ - ٣):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إِذَا قَامَ فِي وَسَطِكَ نَبِيٌّ أَوْ حَالِمٌ حُلْماً، وَأَعْطَاكَ آيَةً أَوْ أُعْجُوبَةً، وَلَوْ حَدَثَتِ الآيَةُ أَوِ الأُعْجُوبَةُ الَّتِي كَلَّمَكَ عَنْهَا قَائِلاً: لِنَذْهَبْ وَرَاءَ آلِهَةٍ أُخْرَى لَمْ تَعْرِفْهَا وَنَعْبُدْهَا، فَلاَ تَسْمَعْ لِكَلاَمِ ذَلِكَ النَّبِيِّ أَوِ الْحَالِمِ ذَلِكَ الْحُلْمِ، لأَنَّ الرَّبَّ إِلَهَكُمْ يَمْتَحِنُكُمْ لِكَيْ يَعْلَمَ هَلْ تُحِبُّونَ الرَّبَّ إِلَهَكُمْ مِنْ كُلِّ قُلُوبِكُمْ وَمِنْ كُلِّ أَنْفُسِكُمْ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبعبارةٍ أخرى، ليس العالم المادي وحده هو الذي يُغرينا لنحب العطية فوق المعطي. فالعالم الروحي له المخاطر ذاتها. فمحبة الآيات والعجائب قد تحل محل محبة الله مثلها مثل أي شيء مادي. يجب أن يحذرنا هذا من التركيز الخاطئ على المعجزات في قيادة الناس إلى المسيح. من الممكن الوقوع في خطأ سيمون الساحر؛ لقد سُحر بقوة بطرس الفائقة للطبيعة وأرادها، ولكنه كان في الواقع «فِي مَرَارَةِ الْمُرِّ وَرِبَاطِ الظُّلْمِ» (أعمال ٨ : ٢٣). أنا لا أنكر المكانة الصحيحة للمعجزات، حتّى اليوم. لقد صرح لوقا بذلك بوضوح في (أعمال ١٤ : ٣): «الرَّبَّ... الَّذِي كَانَ يَشْهَدُ لِكَلِمَةِ نِعْمَتِهِ، وَيُعْطِي أَنْ تُجْرَى آيَاتٌ وَعَجَائِبُ». مثل كل عطايا الله، تشهد الآيات والعجائب لطبيعة الله وصفاته، وخاصة نعمته. ولكن، كما هو الحال مع العطايا المادية، قد تغري العطايا الإعجازية قلوبنا لنتعلق بها بدلاً من الله. ولهذا السبب يجب أن نستمر في التأكيد على أنَّ الله هو الإنجيل.\u003c/p\u003e\n\u003cp\u003eالرابط القاتل بين القوة الروحية واللذة الجسدية\u003c/p\u003e\n\u003cp\u003eأظهر يسوع مدى ارتباط اللذات المادية بالآيات والعجائب الروحية. بعد أن أطعم يسوع الخمسة آلاف بخمسة أرغفة شعير وسمكتين، جاءت الجموع تبحث عن يسوع. ولكن يسوع لم يرَ تلمذة حقيقية في قلوبهم. قال: «الْحَقَّ الْحَقَّ أَقُولُ لَكُمْ: أَنْتُمْ تَطْلُبُونَنِي لَيْسَ لأَنَّكُمْ رأَيْتُمْ آيَاتٍ، بَلْ لأَنَّكُمْ أَكَلْتُمْ مِنَ الْخُبْزِ فَشَبِعْتُمْ» (يوحنا ٦ : ٢٦). بعبارةٍ أخرى، لقد فاتهم المغزى من المعجزة. كان المغزى هو مساعدتهم على رؤية عظمة المسيح وعبادته. ولكن ما رأوه كان مجرد معجزة. وهم آمنوا حقاً بالمعجزة. ولكن هذا النوع من الإيمان لا يكرم المسيح. الشيطان آمن بالمعجزة أيضاً، وارتعد. الناس آمنوا، وأرادوا وضعها قيد الاستخدام لأغراضهم الطبيعية المحضة. الإنجيل لا يقدم إضافة للحياة الطبيعية، بل يقدم مجد الله المُشبع تماماً في وجه المسيح. كل ما يُشير إلى الله ليس هو الله هي أمور ثمينة وخطرة في آن واحد. يمكنها أن تقودنا إلى الله أو تغرينا لذاتها. قد تكون طعاماً أو زواجاً أو كنيسة أو معجزات. كل هذه البركات تحمل رسائل حب من الله. ولكن ما لم نؤكد باستمرار أنَّ الله ذاته هو الإنجيل، فسوف يقع الناس في حب \"ساعي البريد\" — سواء كان اسمه غفران الخطايا أو الحياة الأبدية أو السماء أو الخدمة أو المعجزات أو العائلة أو الطعام.\u003c/p\u003e\n\u003cp\u003eلقد غرسنا وتداً في الأرض في زفافنا: الله فوق الكل\u003c/p\u003e\n\u003cp\u003eهناك بعض التصريحات المذهلة في الكتاب المقدس لتحمينا من هذا الخطأ. أحد التصريحات المفضلة لدي — جزئياً لأنه قُرئ في زفافنا عام ١٩٦٨ — هو (حبقوق ٣ : ١٧ - ١٨): «فَمَعَ أَنَّهُ لاَ يُزْهِرُ التِّينُ، وَلاَ يَكُونُ حَمْلٌ فِي الْكُرُومِ. يَكْذِبُ عَمَلُ الزَّيْتُونَةِ، وَالْحُقُولُ لاَ تُصْنِعُ طَعَاماً. يَنْقَطِعُ الْغَنَمُ مِنَ الْحظِيرَةِ، وَلاَ بَقَرَ فِي الْمَذَاوِدِ، فَإِنِّي أَبْتَهِجُ بِالرَّبِّ وَأَفْرَحُ بِإِلَهِ خَلاَصِي». ما الذي يمكن أن يكون أوضح هنا من أنَّ الله ذاته هو أثمن من الحياة وكل الخير الأرضي الذي تمنحه الحياة؟ إنَّ هدف هذا الكتاب هو إظهار أنَّ أعظم خير تمَّ شراؤه والوعد به من خلال الإنجيل هو خبرة معرفة الله والتمتع به في يسوع المسيح.\u003c/p\u003e\n\u003cp\u003eمحبةُ اللهِ التي تسند الحياة أفضل من الحياة\u003c/p\u003e\n\u003cp\u003eقال داودُ الشيء ذاته في (مزمور ٦٣ : ١ - ٣): «يَا اَللهُ، إِلهِي أَنْتَ. إِلَيْكَ أُبَكِّرُ. عَطِشَتْ إِلَيْكَ نَفْسِي، يَشْتَاقُ إِلَيْكَ جَسَدِي فِي أَرْضٍ نَاشِفَةٍ وَيَابِسَةٍ بِلاَ مَاءٍ، لِكَيْ أُبْصِرَ قُوَّتَكَ وَمَجْدَكَ. كَمَا قَدْ رَأَيْتُكَ فِي قُدْسِكَ. لأَنَّ رَحْمَتَكَ أَفْضَلُ مِنَ الْحَيَاةِ. شَفَتَايَ تُسَبِّحَانِكَ». ما هو أكثر لفتاً للانتباه هو قوله: «لأَنَّ رَحْمَتَكَ أَفْضَلُ مِنَ الْحَيَاةِ». والسببُ في أنَّ هذا لافت جداً هو أنَّ هذه \"الرحمة\" ذاتها يُحتفى بها مراراً في المزامير لأنها تنقذ وتحمي وتحفظ وتهزم العدو. إنَّها أصل مئة بركة أرضية. ولكن عندما يتأمل داودُ في كل العطايا الأرضية لمحبة الله الثابتة، يقول إنَّ المحبة ذاتها هي «أفضل من الحياة» — الحياة التي يتم فيها التمتع بكل هذه العطايا الأرضية. أفهم أنَّ هذا يعني أنَّ الله الذي يحبه هو أفضل من كل عطايا حبه.\u003c/p\u003e\n\u003cp\u003e«مَعَكَ لاَ أُرِيدُ شَيْئاً فِي الأَرْضِ»\u003c/p\u003e\n\u003cp\u003eهذه هي العقليةُ التي كانت لدى المرنم آساف عندما صلى بهذه الكلمات التي تلهج بتعظيم الله بشكل عميق: «بِرَأْيِكَ تَهْدِينِي، وَبَعْدُ إِلَى مَجْدٍ تَأْخُذُنِي. مَنْ لِي فِي السَّمَاءِ؟ وَمَعَكَ لاَ أُرِيدُ شَيْئًا فِي الأَرْضِ. قَدْ فَنِيَ لَحْمِي وَقَلْبِي. صَخْرَةُ قَلْبِي وَنَسِيبِي اللهُ إِلَى الدَّهْرِ» (مزمور ٧٣ : ٢٤ - ٢٦). ليس هناك شيء في السماء أو على الأرض أرغب فيه بجانبك يا الله. يجب أن يعني هذا، أولاً، أنه إذا فُقد كل شيء جيد آخر، فسيظل آساف يفرح بالله. ويجب أن يعني، ثانياً، أنه في كل الأشياء الجيدة الأخرى على الأرض وفي السماء ومن خلالها، يرى آساف الله ويحبه. كل شيء مرغوب فيه لأجل ما يُعلنه عن الله. لقد صاغ القديس أغسطينوس [٨] الأمر هكذا: «إنه يحبك قليلاً جداً ذاك الذي يحب أي شيء معك ولا يحبه لأجلك» [٩]. يسوعُ صاغ الأمر هكذا: «مَنْ أَحَبَّ أَباً أَوْ أُمّاً أَكْثَرَ مِنِّي فَلاَ يَسْتَحِقُّنِي، وَمَنْ أَحَبَّ ابْناً أَوِ ابْنَةً أَكْثَرَ مِنِّي فَلاَ يَسْتَحِقُّنِي» (متى ١٠ : ٣٧). يجب أن يكون يسوع هو الكنز الأسمى لحياتنا، إذا كنا تلاميذ حقيقيين ليسوع. مات يسوع لأجلنا وقام ثانية ليجعل من الممكن لنا أن نراه ونتلذذ به فوق كل شيء بفرح أبدي. هذا هو الخير العظيم الذي يهدف الإنجيل إلى تحقيقه. لذلك فإن أولئك المتشبعين بعمق بالإنجيل يتحدثون مثل الرسول بولس: «لَكِنْ مَا كَانَ لِي رِبْحاً، فَهَذَا قَدْ حَسِبْتُهُ مِنْ أَجْلِ الْمَسِيحِ خَسَارَةً. بَلْ إِنِّي أَحْسِبُ كُلَّ شَيْءٍ أَيْضاً خَسَارَةً مِنْ أَجْلِ فَضْلِ مَعْرِفَةِ الْمَسِيحِ يَسُوعَ رَبِّي» (فيلبي ٣ : ٧ - ٨).\u003c/p\u003e\n\u003cp\u003eالله هو العطية العظمى للإنجيل في وفوق كافة العطايا الأخرى\u003c/p\u003e\n\u003cp\u003eما كنت أحاول إظهاره في هذا الفصل والفصول السابقة هو أنه على الرغم من أنَّ الإنجيل قد اشترى ووعد بالعديد من العطايا الصالحة، من الأكثر روحانية إلى الأكثر مادية، إلا أنَّ الله ذاته هو الخير الأقصى الموعود به في الإنجيل. إذا لم نرَ ونتذوق ذلك الخير الأعظم فوق كل شيء آخر وفي كل شيء آخر، فنحن لم نعرف بعد لماذا الخبر السار هو سار حقاً. لقد عبر جوناثان إدواردز بقوة عظيمة عن هذا الحق المتمثل في أنَّ الله ذاته هو فرحنا الأسمى وهو الفرح الحقيقي والدائم في كل الأفراح الأخرى:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إنَّ المفديين كل خيرهم في الله. الله ذاته هو الخير العظيم الذي أُحضروا لامتلاكه والتمتع به من خلال الفداء. هو الخير الأسمى، ومجموع كل ذلك الخير الذي اشتراه المسيح. الله هو ميراث القديسين؛ هو نصيب نفوسهم. الله هو ثروتهم وكنزهم، طعامهم، حياتهم، مسكنهم، زينتهم وإكليلهم، وكرامتهم ومجدهم الأبدي. ليس لديهم في السماء إلا الله؛ هو الخير العظيم الذي يُستقبل عنده المفديون عند الموت، والذي سيقومون إليه في نهاية العالم. الرب الإله، هو نور أورشليم السماوية؛ وهو \"نهر ماء حياة\" الذي يجري، وشجرة الحياة التي تنبت \"في وسط فردوس الله\". إن كمالات الله المجيدة وجماله ستكون هي ما سيمتع عقول القديسين إلى الأبد، ومحبة الله ستكون وليمتهم الأبدية. إن المفديين سيتمتعون بالفعل بأشياء أخرى؛ سيتمتعون بالملائكة، وسيتمتعون ببعضهم البعض: ولكن ذلك الذي سيتمتعون به في الملائكة، أو في بعضهم البعض، أو في أي شيء آخر مهما كان، والذي سيمنحهم اللذة والسعادة، سيكون هو ما سيُرى من الله فيهم» [١٠].\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003e[الهوامش]\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e[١] جوناثان إدواردز (١٧٠٣–١٧٥٨): واعظ أمريكي إصلاحي وفيلسوف، ويُعدُّ من أبرز اللاهوتيين في تاريخ الكنيسة.\u003c/p\u003e\n\u003cp\u003e[٢] جوناثان إدواردز، \"المشاعر الدينية\"، في: أعمال جوناثان إدواردز، المجلد ٢، تحرير جُون سميث (نيو هيفن، كونيتيكت: مطبعة جامعة ييل، ١٩٥٩)، ٢٤٧.\u003c/p\u003e\n\u003cp\u003e[٣] المرجع السابق، ٢٥٠ - ٢٥١.\u003c/p\u003e\n\u003cp\u003e[٤] جُون بَايبَر، \"عندما لا أرغب في الله: كيف تحارب لأجل الفرح\" (ويتون، إلينوي: كروس واي بوكس، ٢٠٠٤)، ١٧٥ - ٢٠٦.\u003c/p\u003e\n\u003cp\u003e[٥] جُون أُويِن (١٦١٦–١٦٨٣): لاهوتي بيوريتاني إنجليزي بارز، عُرف بلقب \"أطلس اللاهوت المصلح\".\u003c/p\u003e\n\u003cp\u003e[٦] جُون أُويِن، \"تأملات وأحاديث في مجد المسيح في شخصه، ووظيفته، ونعمته\"، في: أعمال جُون أُويِن، المجلد ١ (إدنبرة: بانر أوف تروث، ١٩٦٥)، ٢٧٥.\u003c/p\u003e\n\u003cp\u003e[٧] جُون بَايبَر، \"جوع إلى الله: الرغبة في الله من خلال الصلاة والصوم\" (ويتون، إلينوي: كروس واي بوكس، ١٩٩٧)، ٢١.\u003c/p\u003e\n\u003cp\u003e[٨] القديس أغسطينوس (٣٥٤–٤٣٠): أسقف هيبو وأحد أهم آباء الكنيسة الغربية، مؤلف كتاب \"الاعترافات\" و\"مدينة الله\".\u003c/p\u003e\n\u003cp\u003e[٩] مقتبس من \"اعترافات القديس أوغسطينوس\" (X, 40)، في: وثائق الكنيسة المسيحية، تحرير هنري بيتنسون (لندن: مطبعة جامعة أكسفورد، ١٩٦٧)، ٥٤.\u003c/p\u003e\n\u003cp\u003e[١٠] جوناثان إدواردز، \"الله متمجد في اعتماد الإنسان\"، في: أعمال جوناثان إدواردز، المجلد ١٧، تحرير مارك فالفيك (نيو هيفن، كونيتيكت: مطبعة جامعة ييل، ١٩٩٩)، ٢٠٠.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1ReSAhckL-9lbPQ46zJaweF6WXtJ-Heixq_dihEJedhhpIYuiAHKt5eN5up8LOxIPCToT4qb1ZjesmvSXSSnN3RbOMfR4ky_hqcteI3-_j1-l46ls5VROFn1nB8zyThpLvOIHPRghKkV_AOr1PUechK40TyEokVKl_Nwu6ZsBjb34I504OnvKEKNJHQ/s2752/10.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgz1ReSAhckL-9lbPQ46zJaweF6WXtJ-Heixq_dihEJedhhpIYuiAHKt5eN5up8LOxIPCToT4qb1ZjesmvSXSSnN3RbOMfR4ky_hqcteI3-_j1-l46ls5VROFn1nB8zyThpLvOIHPRghKkV_AOr1PUechK40TyEokVKl_Nwu6ZsBjb34I504OnvKEKNJHQ/s600/10.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"3a:T7166,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل التاسع: الإنجيل — عطية الله ذاته فوق وفي كافة عطاياه التي تخلص والتي تؤلم\u003c/h2\u003e\n\u003cp\u003eالخط الفاصل بين الشكر الذي يعتز بالله والوثنية التي تعتز بالعطية\u003c/p\u003e\n\u003cp\u003eإنَّ السُّؤالَ الذي أطرحه في هذا الفصل وفي الفصل الذي يليه هو: كيف ترتبطُ كلُّ العطايا التي تتدفقُ إلينا من الإنجيل بالله بوصفه العطيةَ القصوى والأهمَّ للإنجيل؟ إنَّ التحديَ في هذين الفصلين يكمنُ في السيرِ على خطٍّ دقيقٍ بين التقليلِ من شأنِ عطايا الله وبين تحويلِ عطايا الله إلى إلهٍ. إنَّه الخطُّ الفاصلُ بين الشكرِ الذي يعتزُّ بالله والوثنيةِ التي تعتزُّ بالعطيةِ. إنَّ الحقَّ الذي سأحاولُ تقديمه هو أنَّ كافّةَ عطايا الله قد أُعطيت لأجلِ إعلانِ المزيدِ من مجدِ الله، بحيث يكونُ الاستخدامُ الصحيحُ لها هو ألا تجعلَ أشواقنا تستقرُّ عليها، بل أن تجعلها تعبرُ من خلالها لتستقرَّ على الله وحده.\u003c/p\u003e\n\u003cp\u003eما أعنيه باستقرارِ أشواقنا هو أنَّ رغباتِ قلوبنا تجدُ نقطةَ نهايتها — هدفها ومستقرّها — في الله وحده، حتّى وإن كانت، إذا جاز التعبيرُ، تمتطي ألفَ عطيةٍ لتصلَ إلى الله. قال أوغسطينوس: «لأَنَّكَ خَلَقْتَنَا لِنَفْسِكَ، وَقَلْوبُنَا لاَ تَهْدَأُ حَتَّى تَسْتَقِرَّ فِيكَ» [١]. إنَّ عدمَ الاستقرارِ هذا هو أمرٌ حسنٌ حين نجدُ أنفسنا نبتهجُ بواحدةٍ من عطايا الله. إنَّ عطايا الله يجبُ أن يُتمتَّعَ بها، سواءٌ كانت العطيةُ هي الخلاصَ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مَحْفُوظٌ فِي السَّمَاوَاتِ لأَجْلِكُمْ، أَنْتُمُ الَّذِينَ بِقُوَّةِ اللهِ مَحْرُوسُونَ بِإِيمَانٍ، لِخَلاَصٍ مُسْتَعِدٍّ أَنْ يُعْلَنَ فِي الزَّمَانِ الأَخِيرِ» (١ بطرس ١ : ٤ - ٥).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأو الطعامَ «آمِرِينَ أَنْ يُمتَنَعَ عَنْ أَطْعِمَةٍ قَدْ خَلَقَهَا اللهُ لِتُتَنَاوَلَ بِالشُّكْرِ مِنَ الْمُؤْمِنِينَ وَعَارِفِي الْحَقِّ» (١ تيموثاوس ٤ : ٣ ؛ ٦ : ١٧). ولكن إذا استقرَّت أشواقنا هناك، فإنَّنا نصيرُ عبدةَ أوثانٍ. لذا فإنَّ الهدفَ من هذا الفصل ومن الفصل الذي يليه هو أن نبيّنَ من الكتاب المقدس كيف أنَّ العطايا التي اشتراها المسيحُ بدمه — ويمكن للمرءِ أن يسمّيها عطايا الإنجيل — تشيرُ بعيداً عن نفسها إلى عطية الإنجيل العظمى الوحيدة، الله ذاته.\u003c/p\u003e\n\u003cp\u003eعطية الإنجيل في الاختيار\u003c/p\u003e\n\u003cp\u003eتأمَّل أولاً في عطايا الله التي تتنوعُ والتي تأتي إلينا في إتمامِ خلاصنا. كيف نفرحُ بها؟ إنَّ الاختيارَ هو واحدٌ من أولى عطايا الإنجيل، حتّى وإن كان قد سبقَ موتَ المسيح في الأزل. فالخروفُ الذي هو بلا عيبٍ، يسوعُ المسيحُ، الذي ذُبح لأجل خطايانا، كان معروفاً سابقاً قبل تأسيس العالم (١ بطرس ١ : ٢٠). وبسببِ هذا، أعطانا اللهُ نعمةً في المسيح قبل بدءِ الدهور (٢ تيموثاوس ١ : ٩). ولذلك، يقولُ بولسُ: «إِذْ سَبَقَ فَعَيَّنَنَا لِلتَّبَنِّي بِيَسُوعَ الْمَسِيحِ لِنَفْسِهِ» (أفسس ١ : ٥). لقد كان هذا الاختيارُ هو قصدُ الله لتبنّينا وجعلنا مقدسين وبلا لومٍ قدامه في المحبة.\u003c/p\u003e\n\u003cp\u003eكيف إذن نفرحُ بهذه العطية التي تذهلُ والتي اشتراها المسيحُ بدمه، عطية الاختيار؟ يقدّمُ بولسُ الإجابةَ في (أفسس ١ : ٦):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لِمَدْحِ مَجْدِ نِعْمَتِهِ، الَّتِي أَنْعَمَ بِهَا عَلَيْنَا فِي الْمَحْبُوبِ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإنَّ هدفَ الله في اختيارنا هو أن ننبهرَ بمجدِ نعمته وأن نُعظّمَه. بعبارةٍ أخرى، إنَّ الهدفَ من اختيارنا هو أن تظهرَ النعمةُ كأمرٍ مجيدٍ، وأن نراها ونتذوقها ونترنمَ بتسابيحها. إنَّ مجدَ النعمةِ هو مجدُ الله الذي يعملُ بنعمةٍ. لذلك فإنَّ الهدفَ من الاختيار هو أن نرى اللهَ ونتذوقه في عمله الذي يُخلّصُ والذي يتسمُ بالنعمةِ في الاختيار. إنَّ غايةَ الاختيار، ونعمِ الإنجيل، هي أن نكون فَرِحِينَ في مدحِ نعمةِ الله.\u003c/p\u003e\n\u003cp\u003eكيف نفرحُ بعطية الإنجيل في التجسد؟\u003c/p\u003e\n\u003cp\u003eلكي يشتريَ اللهُ عطيةَ الاختيار، كان على الله أن يرسلَ ابنه إلى العالم كإنسانٍ ليموتَ في مكاننا ويحتملَ غضبَ الله ويُتمّمَ البرَّ الذي فشلنا في القيام به. إنَّ دخولَ ابنِ الله هذا إلى العالم يسمّى \"التجسُّدَ\". وهو عطيةٌ عظيمةٌ من الله لم نكن نستحقها. ومثلَ الاختيار، كان التجسُّدُ نتيجةً وشرطاً لموت المسيح الكفاري. لقد كان نتيجةً بمعنى أنَّ الله سبقَ فرأى ما سيفعله في الجلجثةِ بموتِ ابنه ليبررَ فعلَ إذلالِ ابنه الذي يبدو غير عادلٍ في ثلاثٍ وثلاثين سنةً من إخلاءِ الذات الإلهي. إنَّ موتَ المسيح كان سيحققُ صدقَ برِّ الله في إرسالِ المسيح وتعريضه للمحدودية والضيق. هذا التبريرُ الذي اشتراه المسيحُ بدمه سيجعلُ من الممكنِ لله أن يكون عادلاً ومبرراً للخطاةِ الذين يؤمنون به (رومية ٣ : ٢٤ - ٢٦).\u003c/p\u003e\n\u003cp\u003eكيف إذن نفرحُ بعطية التجسُّد؟ يجيبُ بولسُ في (رومية ١٥ : ٨ - ٩): «وَأَقُولُ: إِنَّ يَسُوعَ الْمَسِيحَ قَدْ صَارَ خَادِماً لِلْخِتَانِ مِنْ أَجْلِ صِدْقِ اللهِ، حَتَّى يُثَبِّتَ مَوَاعِيدَ الآبَاءِ. وَأَمَّا الأُمَمُ فَمَجَّدُوا اللهَ مِنْ أَجْلِ الرَّحْمَةِ». النقطةُ هنا هي أنَّ تجسُّدَ المسيح كعبدٍ للربِّ كان عرضاً جميلاً للرحمة. وتلك الرحمةُ كانت إعلاناً لغنى مجدِ الله. إنَّ استجابتنا لعرضِ الرحمةِ الذي يعلنُ المجدَ هو أن نجعلَ قلبنا يمتطي شعاعَ الرحمة إلى حضرة الله وهناك نرى ونتمتعُ بمجدِ الله.\u003c/p\u003e\n\u003cp\u003eلقد أوضحَ بولسُ النقطةَ ذاتها في (فيلبي ٢ : ٦ - ١١). إذا اختصرنا هذه الجملَ حتّى نصلَ إلى بدايتها ونهايتها، فسنتمكنُ من رؤية السبب الأقصى للتجسُّد بوضوحٍ. تقولُ الآياتُ إنَّ المسيحَ «صَارَ فِي شِبْهِ النَّاسِ... وَأَطَاعَ حَتَّى الْمَوْتَ مَوْتَ الصَّلِيبِ... لِكَيْ يَعْتَرِفَ كُلُّ لِسَانٍ أَنَّ يَسُوعَ الْمَسِيحَ هُوَ رَبٌّ لِمَجْدِ اللهِ الآبِ». إنَّ الهدف الأقصى للتجسُّد كان أنَّه من خلال المسيح يرى الناسُ سيادةَ المسيح ومجدَ الله. إنَّ قصةَ حياةِ المسيح الذي تجسد وموته وقيامته برُمَّتها كانت أسطعَ شعاعٍ للمجد أشرق يوماً من بهاء الله.\u003c/p\u003e\n\u003cp\u003eالمصالحةُ والفرحُ\u003c/p\u003e\n\u003cp\u003eلقد تعاملنا بالفعل في الفصل الثالث مَعَ التبرير بالإيمان وغفرانِ الخطايا. وقد أوضحنا أنَّ هذه هي عطايا الإنجيل التي تهدفُ إلى إزالةِ العوائق التي بيننا وبين الله. وهي ليست أخباراً سارةً في حدِّ ذاتها ولذاتها. بل هي تجعلُ المصالحةَ بين الخطاة وإلهٍ قدوسٍ ممكنةً. وهذه المصالحةُ تعيدنا إلى بيتنا، إلى الله. إنَّ تركيزَ المصالحة هو أنَّنا قد نستمتعُ الآن بحضرة الله دون دينونةٍ.\u003c/p\u003e\n\u003cp\u003eلذلك، بعد أن قال بولسُ في (رومية ٥ : ١٠ - ١١) إنَّنا «قَدْ صُولِحْنَا مَعَ اللهِ بِمَوْتِ ابْنِهِ»، استطرد قائلاً: «وَلَيْسَ ذَلِكَ فَقَطْ، بَلْ نَفْتَخِرُ أَيْضاً بِاللهِ، بِرَبِّنَا يَسُوعَ الْمَسِيحِ، الَّذِي نِلْنَا بِهِ الآنَ الْمُصَالَحَةَ». إنَّ الهدف من هذه المصالحة ليس تضامناً آمناً وكئيباً. بل الهدفُ هو أنَّنا «نَفْرَحُ بِاللهِ مِنْ خِلاَلِ رَبِّنَا يَسُوعَ الْمَسِيحِ». إنَّ الله هو بؤرةُ المصالحة. إنَّ فَرَحَ المصالحة هو فَرَحٌ بالله. لذلك عندما نكرزُ بإنجيل المصالحة، لا يجبُ أن يكون التركيزُ على مجرد إزالةِ العداء، بل وصول للفَرَح بالله.\u003c/p\u003e\n\u003cp\u003eالمسيح نزفَ لكي يتمَّ إحضارنا بالقرب من الله\u003c/p\u003e\n\u003cp\u003eسواءٌ فكّر المرءُ في عمل المسيح بوصفه إتماماً للمصالحة، أو الاسترضاء، أو وفاء للعقاب، أو الفداء، أو التبرير، أو غفران الخطايا، أو التحرير، فإنَّ الهدف منها جميعاً يتلخصُ في العطية القصوى التي هي الله ذاته. إنَّ (١ بطرس ٣ : ١٨) هي أوضحُ تصريحٍ لذلك: «فَإِنَّ الْمَسِيحَ أَيْضاً تَأَلَّمَ مَرَّةً وَاحِدَةً مِنْ أَجْلِ الْخَطَايَا، الْبَارُّ مِنْ أَجْلِ الأَثَمَةِ، لِكَيْ يُقَرِّبَنَا إِلَى اللهِ». وتُعدُّ (أفسس ٢ : ١٣ - ١٨) هي التصريحَ التالي الأكثر صراحةً لهذا الحقِّ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فِي الْمَسِيحِ يَسُوعَ، أَنْتُمُ الَّذِينَ كُنْتُمْ قَبْلاً بَعِيدِينَ، صِرْتُمْ قَرِيبِينَ بِدَمِ الْمَسِيحِ... لِيُصَالِحَ الاِثْنَيْنِ فِي جَسَدٍ وَاحِدٍ مَعَ اللهِ بِالصَّلِيبِ... لأَنَّ بِهِ لَنَا كِلَيْنَا قُدُوماً فِي رُوحٍ وَاحِدٍ إِلَى الآبِ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأفضلُ عطية من الله: أن نكون مأخوذين بالله إلى الأبد\u003c/p\u003e\n\u003cp\u003eهذا أمرٌ حاسمٌ يجبُ رؤيته. يبدو أنَّ كثيراً من الناس يعتنقون الخبرَ السارَّ دون أن يعتنقوا الله. لا يوجد دليلٌ مؤكدٌ على أنَّ لدينا قلباً جديداً لمجرد أنَّنا نريد الهروبَ من الجحيم. فهذه رغبةٌ طبيعيةٌ تماماً، وليست رغبةً فوق طبيعيةٍ. إنَّ الأمرَ لا يتطلبُ قلباً جديداً لتريدَ الراحة النفسية التي يوفرها الغفرانُ، أو إزالة غضب الله، أو ميراث الدهر الآتي. فكلُّ هذه الأشياء يمكن فهمها دون أيِّ تغييرٍ روحيٍّ. لستَ بحاجةٍ لأن تُولدَ ثانيةً لتريدَ هذه الأشياء؛ فالشياطينُ تريدها.\u003c/p\u003e\n\u003cp\u003eليس من الخطأ أن تريدها؛ بل من الحماقة ألا تفعل ذلك. ولكنَّ الدليلَ على أنَّنا قد تغيرنا هو أنَّنا نريد هذه الأشياء لأنَّها تأتي بنا إلى التمتُّع بالله. هذا هو أعظمُ شيءٍ مات المسيحُ لأجله. هذا هو الخيرُ الأعظمُ في الخبر السارِّ. لقد خُلقنا بطريقةٍ تجعلُ مجده يظهرُ من خلال فَرَحنا به. إنَّ إنجيل المسيح هو الخبرُ السارُّ بأنَّه على حساب حياة ابن الله، قد فعل اللهُ كلَّ ما هو ضروريٌّ ليبهرنا بما سيجعلنا سعداء إلى الأبد وبشكلٍ متزايدٍ باستمرارٍ — أي ذاته [٢].\u003c/p\u003e\n\u003cp\u003eتمامُ الإنجيل: الاندهاشُ بالمسيح القدير\u003c/p\u003e\n\u003cp\u003eإنَّ استكمالَ خلاصنا عند المجيء الثاني للمسيح قد تأمَّن بدم المسيح وكُرزَ به في الإنجيل. فموتُ المسيح وقيامته أعطياه سلطاناً على الموت نيابةً عن جميع من هم له. «كُنْتُ مَيْتاً، وَهَا أَنَا حَيٌّ إِلَى أَبَدِ الآبِدِينَ! آمِينَ. وَلِي مَفَاتِيحُ الْهَاوِيَةِ وَالْمَوْتِ» (رؤيا ١ : ١٨). هناك صلةٌ لا تنفصمُ بين نُصرة المسيح على الموت ونُصرتنا نحن على الموت. «وَإِنْ كَانَ رُوحُ الَّذِي أَقَامَ يَسُوعَ مِنَ الأَمْوَاتِ سَاكِناً فِيكُمْ، فَالَّذِي أَقَامَ الْمَسِيحَ مِنَ الأَمْوَاتِ سَيُحْيِي أَجْسَادَكُمُ الْمَائِتَةَ أَيْضاً» (رومية ٨ : ١١).\u003c/p\u003e\n\u003cp\u003eوعندما يأتي المسيحُ ليقيمنا من الأموات، فإنَّه «سَيُغَيِّرُ شَكْلَ جَسَدِ تَوَاضُعِنَا لِيَكُونَ عَلَى صُورَةِ جَسَدِ مَجْدِهِ». وسيُعزفُ لحنُ النصر العظيم: «\"ابْتُلِعَ الْمَوْتُ إِلَى غَلَبَةٍ\". \"أَيْنَ شَوْكَتُكَ يَا مَوْتُ؟ أَيْنَ غَلَبَتُكِ يَا هَاوِيَةُ؟\" أَمَّا شَوْكَةُ الْمَوْتِ فَهِيَ الْخَطِيَّةُ، وَقُوَّةُ الْخَطِيَّةِ هِيَ النَّامُوسُ. وَلَكِنْ شُكْراً لِلَّهِ الَّذِي يُعْطِينَا الْغَلَبَةَ بِرَبِّنَا يَسُوعَ الْمَسِيحِ» (١ كورنثوس ١٥ : ٥٤ - ٥٧).\u003c/p\u003e\n\u003cp\u003eولكن ما الذي سيكونُ بؤرةَ التركيز في ساعة التمام العظيمة هذه؟ تقدّمُ (٢ تسالونيكي ١ : ٧ - ١٠) إجابةً واضحةً. سيكونُ التركيزُ على مجد المسيح، وسوف نندهشُ به. «عِنْدَ اسْتِعْلاَنِ الرَّبِّ يَسُوعَ مِنَ السَّمَاءِ مَعَ مَلاَئِكَةِ قُوَّتِهِ، فِي نَارِ لَهِيبٍ... مَتَى جَاءَ لِيَتَمَجَّدَ فِي قِدِّيسِيهِ وَيُتَعَجَّبَ مِنْهُ فِي جَمِيعِ الْمُؤْمِنِينَ». إنَّ الهدف من مجيئه هو أنَّه «سيتمجد في قديسيه» و«يُتعجّب منه بين جميع الذين آمنوا».\u003c/p\u003e\n\u003cp\u003eالحياةُ الأبديةُ: تمديدُ وتكميلُ مَسَرَّاتِ معرفة الله\u003c/p\u003e\n\u003cp\u003eبالطبع، هذا الحدثُ المجيدُ هو بدايةٌ كما هو تتميمٌ. إنَّه بدايةُ الحياة الأبدية. صحيحٌ أنَّنا قد أُعطينا بالفعل عطيةَ الحياة الأبدية من خلال الإيمان بالمسيح. «الَّذِي يُؤْمِنُ بِالاِبْنِ لَهُ حَيَاةٌ أَبَدِيَّةٌ» (يوحنا ٣ : ٣٦). لاحظ زمن المضارع؛ نحن نملك، وليس فقط سنملك، حياةً أبديةً. «وَأَنَا أُعْطِيهَا حَيَاةً أَبَدِيَّةً، وَلَنْ تَهْلِكَ إِلَى الأَبَدِ، وَلاَ يَخْطَفُهَا أَحَدٌ مِنْ يَدِي» (يوحنا ١٠ : ٢٨).\u003c/p\u003e\n\u003cp\u003eولكن من الصحيح أيضاً أنَّ ملءَ الحياة الأبدية يبدأُ عند القيامة. قال يسوعُ: «إِنْ لَيْسَ أَحَدٌ تَرَكَ بَيْتًا أَوْ وَالِدَيْنِ... إِلاَّ وَيَأْخُذُ فِي هَذَا الزَّمَانِ أَضْعَافاً كَثِيرَةً، وَفِي الدَّهْرِ الآتِي الْحَيَاةَ الأَبَدِيَّةَ» (لوقا ١٨ : ٢٩ - ٣٠). ملءُ الحياة الأبدية يبدأُ في الدهر الآتي. إنَّ الحياة الأبدية هي واحدةٌ من أثمن عطايا الإنجيل. يخبرنا يسوعُ في صلاته في (يوحنا ١٧ : ٣): «وَهَذِهِ هِيَ الْحَيَاةُ الأَبَدِيَّةُ: أَنْ يَعْرِفُوكَ أَنْتَ الإِلَهَ الْحَقِيقِيَّ وَحْدَكَ وَيَسُوعَ الْمَسِيحَ الَّذِي أَرْسَلْتَهُ». بعبارةٍ أخرى، إنَّ عطية الإنجيل التي تسمّى الحياة الأبدية هي تمديدٌ وتكميلٌ لمَسَرَّاتِ معرفة الله وابنه يسوع المسيح.\u003c/p\u003e\n\u003cp\u003eالإنجيل اشترى كلَّ الأشياء التي هي جيدة لنا\u003c/p\u003e\n\u003cp\u003eقد نسمّي هذه العطايا عطايا الإنجيل التي تخلص: الاختيار، التجسُّد، التبرير، المصالحة، التقديس، الحياة الأبدية، إلخ. ولكنَّ هناك عطايا أخرى. لقد أطلق الإنجيلُ سراح رحمة الله القديرة بحيث تتدفقُ إلينا آلافُ العطايا الأخرى من قلب الله. إنَّني أفكّرُ في نصٍّ مثل (رومية ٨ : ٣٢): «اَلَّذِي لَمْ يُشْفِقْ عَلَى ابْنِهِ، بَلْ بَذَلَهُ لأَجْلِنَا أَجْمَعِينَ، كَيْفَ لاَ يَهْبُنَا أَيْضاً مَعَهُ كُلَّ شَيْءٍ؟». وهذا يعني أنَّ جوهر الإنجيل هو الضمانُ بأنَّ «كلَّ شيءٍ» سيُعطى لنا. الله يأخذُ «كلَّ الأشياء» ويجعلها تخدمُ خيرنا الأقصى (رومية ٨ : ٢٨).\u003c/p\u003e\n\u003cp\u003eالإنجيل يضمنُ أنَّ كلَّ احتياج حقيقي سيسدَّد\u003c/p\u003e\n\u003cp\u003eقارن هذا مع (فيلبي ٤ : ١٩): «فَيُمْلأُ إِلَهِي كُلَّ احْتِيَاجِكُمْ بِحَسَبِ غِنَاهُ فِي الْمَجْدِ فِي الْمَسِيحِ يَسُوعَ». كلُّ احتياج! هل يعني هذا أنَّنا لن نمرَّ أبداً بأوقاتٍ عصيبةٍ؟ يبدو أنَّ الأمرَ ليس كذلك. فقبل سبع آياتٍ قال بولسُ: «أَعْرِفُ أَنْ أَتَّضِعَ وَأَعْرِفُ أَنْ أَسْتَفْضِلَ. فِي كُلِّ شَيْءٍ وَفِي جَمِيعِ الأَحْوَالِ قَدْ تَدَرَّبْتُ أَنْ أَشْبَعَ وَأَنْ أَجُوعَ، وَأَنْ أَسْتَفْضِلَ وَأَنْ أَنْقُصَ». أستنتجُ من هذا أنَّه بالنسبة للمسيحيين، فإنَّ كلَّ ما نحتاجه — لكي نفعل مشيئة الله ونعظّمه — سيتمُّ توفيره. ووفقاً لـ (رومية ٨ : ٣٢)، فقد تأمَّن هذا بواسطة الإنجيل.\u003c/p\u003e\n\u003cp\u003eكلُّ شيء لكم، بما في ذلك الموت\u003c/p\u003e\n\u003cp\u003e«فَإِنِّي مُتَيَقِّنٌ أَنَّهُ لاَ مَوْتَ وَلاَ حَيَاةَ... تَقْدِرُ أَنْ تَفْصِلَنَا عَنْ مَحَبَّةِ اللهِ الَّتِي فِي الْمَسِيحِ يَسُوعَ رَبِّنَا» (رومية ٨ : ٣٨ - ٣٩). استمع إلى الطريقة التي يقول بها بولسُ ذلك في (١ كورنثوس ٣ : ٢١ - ٢٣): «إِذًا لاَ يَفْتَخِرَنَّ أَحدٌ بِالنَّاسِ! فَإِنَّ كُلَّ شَيْءٍ لَكُمْ: أَبَوْلُسُ أَمْ أَبُلُّوسُ أَمْ صَفَا أَمِ الْعَالَمُ أَمِ الْحَيَاةُ أَمِ الْمَوْتُ... كُلُّ شَيْءٍ لَكُمْ، وَأَمَّا أَنْتُمْ فَلِلْمَسِيحِ، وَالْمَسِيحُ لِلهِ». كلُّ شيء لكم — بما في ذلك الموت!\u003c/p\u003e\n\u003cp\u003eالموتُ هو \"لنا\" — خادمنا. إنَّ حقيقة كوننا «أكثر من منتصرين» تعني أنَّ الموت لا يكتفي بالاستلقاء ميتاً عند أقدامنا بعد المعركة — بل يُؤخذ أسيراً ويُجبر على خدمتنا. ويجيبُ بولسُ في (فيلبي ١ : ٢١): «لأَنَّ لِيَ الْحَيَاةَ هِيَ الْمَسِيحُ وَالْمَوْتُ هُوَ رِبْحٌ». لماذا يكون الموتُ ربحاً؟ «لِيَ اشْتِهَاءٌ أَنْ أَنْطَلِقَ وَأَكُونَ مَعَ الْمَسِيحِ، ذَاكَ أَفْضَلُ جِدًّا». إنَّ الوجود مع المسيح بعد الموت هو «أفضل جداً» من البقاء على الأرض.\u003c/p\u003e\n\u003cp\u003eكيف استعدَّ جُون أُويِن للموت\u003c/p\u003e\n\u003cp\u003eحين كان جُون أُويِن، أعظمُ لاهوتيٍّ وراعٍ في إنجلترا، يحتضرُ في عام ١٦٨٣، كان تركيزه بالكامل على مجد المسيح. كان عنوان كتابه الأخير \"تأملات في مجد المسيح\". وبحسب فهمه، فإنَّ أفضل طريقةٍ للاستعداد للموت كانت عبر التأمل في ذلك المجد: «إذا كان فَرَحنا المستقبليُّ سيتكون من الوجود حيث هو، ومعاينة مجده، فأيُّ استعدادٍ يمكن أن يكون أفضل لذلك من التأمل المستمر السابق في ذلك المجد في الإعلان الذي قُدّم في الإنجيل» [٣].\u003c/p\u003e\n\u003cp\u003eوَيِلْيَام بَاين، محرر كتاب أُويِن، زاره قرب النهاية وسجل أنَّ أُويِن قال له: «يا أخ بَاين، لقد جاء أخيراً اليوم الذي طال انتظاره، والذي سأرى فيه المجد بطريقةٍ أخرى غير التي فعلتها سابقاً أو كنت قادراً على فعلها في هذا العالم» [٤].\u003c/p\u003e\n\u003cp\u003eعطايا الإنجيل الأكثر إيلاماً وتطهيراً\u003c/p\u003e\n\u003cp\u003eبسبب الإنجيل، يعدُ اللهُ بأن «يهبنا كلَّ شيء» مع المسيح (رومية ٨ : ٣٢). ويتبينُ أنَّ \"كل شيء\" تشملُ ليس فقط الأشياء الممتعة بل والأشياء الرهيبة مثل الشدة، والضيق، والاضطهاد، والجوع، والعري، والخطر، والسيف، والموت. هذه كلها عطايا من عطايا الإنجيل اشتراها لنا دم المسيح. الإجابةُ هي أنَّه في السيادة الرحيمة للمسيح، والمدعومة بدمه، تحققُ هذه الآلامُ الخيرَ الأعظمَ للإنجيل، وهو رؤية وتذوق لله في المسيح يكون أكثر نقاءً وأصالةً وإشباعاً عميقاً.\u003c/p\u003e\n\u003cp\u003eقصد الإنجيل من آلام بولس — وآلامنا\u003c/p\u003e\n\u003cp\u003eيظهر لنا بولسُ هذا في عدة مواضع. على سبيل المثال، في (٢ كورنثوس ١ : ٨ - ٩) يصفُ قصد الله في آلامه الرهيبة في أسيا: «لِكَيْ لاَ نَكُونَ مُتَّكِلِينَ عَلَى أَنْفُسِنَا بَلْ عَلَى اللهِ الَّذِي يُقِيمُ الأَمْوَاتَ». لقد كان ألمُ بولس مقصوداً من الله لإبقائه قريباً من الله. وبالمثل في (٢ كورنثوس ١٢ : ٧ - ١٠) يشرحُ بولسُ كيف رفض المسيحُ إزالة ألمه: «فَقَالَ لِي: \"تَكْفِيكَ نِعْمَتِي، لأَنَّ قُوَّتِي فِي الضُّعْفِ تُكْمَلُ\"». إنَّ هدف الإنجيل ليس راحتي الفورية. بل هدفه هو أن أكون محباً للمسيح وشغوفاً بمجده لدرجة أنَّه عندما يمكن لألمي أن يسلط الضوء على قيمته، سأحتمل ذلك «بسرور».\u003c/p\u003e\n\u003cp\u003eالإيمان يتذوقُ ما يعظّم المسيح ويعتنقه\u003c/p\u003e\n\u003cp\u003eكيف يرتبط الإيمانُ بالمسيح بالفَرَح بالمسيح؟ يجب أن يتوفر في الإيمان الذي يخلّصُ وجود تذوق لما يعظّمُ المسيح ويعتنقه. ماذا يعني أن تثق في شخصٍ يقول: «مَنْ يُؤْمِنُ بِي فَلاَ يَعْطَشُ أَبَداً» (يوحنا ٦ : ٣٥)؟ أو، بعبارةٍ أخرى، ماذا يعني أن تثق في شخصٍ يقول: «جمالي ومجدي هما أعمقُ شبعٍ لنفسك»؟ هذا يعني أنَّ الثقة يجب أن تتذوق وتعتنق ذلك الشبع.\u003c/p\u003e\n\u003cp\u003eمليونُ رحمةٍ إنجيليةٍ، ولكن لا شيءَ منها جيدٌ بدون الله. إنَّ النقطة هي أنَّ الإنجيل قد أطلق العنان لمليون رحمةٍ على شعب المسيح، ولكن لا شيءَ منها هو خبرٌ سارٌّ في حدِّ ذاته ولذاته. إنَّها جميعاً جيدةٌ بالقدر الذي تجعل فيه الخيرَ العظيم الوحيد ممكناً — أي معرفة الله والتمتع به. لذلك، يجب أن يُكرز بالإنجيل ويُصدق ويُعاش بوصفه «إِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ» (٢ كورنثوس ٤ : ٦). هذا هو ما أعنيه بقولي إنَّ الله هو الإنجيل.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003e[الهوامش]\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e[١] القديس أوغسطينوس، \"اعترافات القديس أوغسطينوس\" (نيويورك: واشنطن سكوير برس، ١٩٦٢)، ١.\u003c/p\u003e\n\u003cp\u003e[٢] الفقرتان السابقتان مبنيتان على الفصل ٢٢، \"تألم المسيح ومات ليأتي بنا إلى الله\"، في: جُون بَايبَر، \"آلام يسوع المسيح\" (ويتون، إلينوي: كروس واي بوكس، ٢٠٠٤)، ٦٢ - ٦٣.\u003c/p\u003e\n\u003cp\u003e[٣] جُون أُويِن، \"تأملات وأحاديث في مجد المسيح\"، في: \"أعمال جُون أُويِن\"، المجلد ١ (إدنبرة: بانر أوف تروث، ١٩٦٥)، ٢٧٥.\u003c/p\u003e\n\u003cp\u003e[٤] بِيتَر تُون، \"رجل دولة الله: حياة وعمل جُون أُويِن\" (١٩٧١؛ إعادة طبع، يوجين، أوريغون: ويبف آند ستوك، ٢٠٠٥)، ١٦١.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjp5bZ840yxcOabcayqsZGLiEv5FH56IHaUYFFpAy705qtx01dOy84eHXiZ7DWN98EfGPb_gDSrB2tf67hSn_rnZroOK6yejyJg0HTz6gxbDwiyY5gIy9_wFEO6fLN2gHsHEzWRuigMFJL0-WFIwge6sJ8JDJxIxEiSf5S_NgWgV7sQjK6G-u8jWtyd23A/s2752/09.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjp5bZ840yxcOabcayqsZGLiEv5FH56IHaUYFFpAy705qtx01dOy84eHXiZ7DWN98EfGPb_gDSrB2tf67hSn_rnZroOK6yejyJg0HTz6gxbDwiyY5gIy9_wFEO6fLN2gHsHEzWRuigMFJL0-WFIwge6sJ8JDJxIxEiSf5S_NgWgV7sQjK6G-u8jWtyd23A/s600/09.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"3b:T6cec,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الثامن: الإنجيل - مَجْدُ الْمَسِيحِ كَأَسَاسٍ لِلاِنْسِحَاقِ الَّذِي يُعَظِّمُ الْمَسِيحَ\u003c/h2\u003e\n\u003cp\u003eتتجلى حقيقة كون الله هو ذاته جوهر الإنجيل وعطاؤه الأسمى من النظر إلى الانسحاق والاتضاع الذي ينشأ في قلب المؤمن بالإنجيل. ذلك الانسحاق الذي يوقظه الإنجيل في النفس هو أمر مذهل حقاً. إنَّ أولئك الذين تعاملوا بعمق مع خطيتهم في ضوء الإنجيل يعرفون تلك المفارقة المتمثلة في أنَّ خبر الغفران السار يوقظ ألم الندم بقدر ما يوقظ فرح التحرر. وحدَهُ الفرح المصطنع هو الذي لا يمر بالحزن على الخطية في طريقه إلى فرح نوال الغفران.\u003c/p\u003e\n\u003cp\u003eإنَّ أحد الأسباب التي تجعل العديد من المسيحيين يبدون بلا فرح بنوال الغفران من خلال الإنجيل هو أنهم لم ينكسروا بسبب خطيتهم؛ فهم لم ييأسوا، ولم يتصارعوا مع مقت الذات، ولم يحزنوا على خطيتهم بسبب قبحها الأخلاقي، بل حزنوا فقط بسبب مشاعر الذنب والخوف من آلام الجحيم. والسؤال المطروح أمامنا في هذا الفصل هو: كيف يُظهر الانسحاق الذي يوقظه الإنجيل حقيقة أنَّ رؤية والابتهاج بمجد المسيح هما الخير النهائي والأهم للإنجيل؟\u003c/p\u003e\n\u003cp\u003eجُونَاثَان إِدْوَارْدِز يُعِينُنِي مَرَّةً أُخْرَى\u003c/p\u003e\n\u003cp\u003eهنا أيضاً - لقد حصلتُ على عون عظيم من جوناثان إدواردز [١]. إنَّ أعظم درس تعلمته من إدواردز هو أنَّ الله يظهر في أبهى صور جماله وقيمته عندما يراه شعبه بوضوح في الإنجيل ويبتهجون به فوق كل شيء آخر. بكلمات أخرى: يتمجد الله فينا بأقصى درجة عندما نكون نحن أكثر شبعاً به. [٢] وهذا يعني أنك لن تضطر أبداً للاختيار بين فرحك الأعظم وبين مجد الله الأسمى.\u003c/p\u003e\n\u003cp\u003eوالسؤال هنا هو: كيف يرتبط هذا بأحزان الحياة المسيحية الضرورية، ولا سيما حزن الانسحاق الذي يوقظه الإنجيل؟ كيف يرتبط إنجيل مجد الله في وجه المسيح (٢ كورنثوس ٤ : ٦) بحزن الانسحاق؟ أو لنجعل السؤال أكثر دقة: كيف يرتبط الفرح بمجد الله في الإنجيل بحزن الندم على الخطية الذي يوقظه الإنجيل؟ إذا كان الخير العظيم للإنجيل هو الابتهاج بمجد الله في الإنجيل، فكيف يمكنه أيضاً أن ينتج حزناً؟ بطرح هذا السؤال، نضع استنتاجاتنا السابقة محل الاختبار؛ فإذا كنا على المسار الصحيح بشأن الله والإنجيل، فيجب أن تكون النتيجة هي تأكيد هذه الاستنتاجات.\u003c/p\u003e\n\u003cp\u003eالْحُزْنُ يَنْبُعُ مِنْ رُؤْيَةِ الْمَجْدِ الْمُشْبِعِ لِلكُلِّ\u003c/p\u003e\n\u003cp\u003eفي وعظة من عام ١٧٢٣، بعنوان \"لذة التقوى\"، [٣] تناول إدواردز السؤال التالي: كيف ترتبط مركزية الابتهاج بمجد الله في الإنجيل بألم الانسحاق الذي يوقظه الإنجيل؟ إليك البصيرة الجوهرية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ثمة توبة عن الخطية: فرغم أنَّ الحزن العميق على الخطية هو ما يطلبه الله كضرورة للخلاص، إلا أنَّ طبيعته ذاتها تنطوي بالضرورة على لذة. فالتوبة عن الخطية هي حزن ينبع من رؤية سمو الله ورحمته، أنَّ إدراك السمو أو الرحمة لا بد أن يولد بالضرورة وبشكل لا يمكن تجنبه لذة في ذهن الناظر. فمن المستحيل أن يرى أي شخص أي شيء يبدو له سامياً ولا ينظر إليه بلذة، ومن المستحيل أن يتأثر برحمة الله ومحبته، واستعداده لأن يرحمنا ويحبنا، ولا يتأثر بلذة عند التفكير في ذلك؛ وهذا هو ذات التأثر الذي يولد توبة حقيقية. ومهما بدا الأمر متناقضاً، فالحقيقة هي أنَّ التوبة حزن حلو، بحيث إنه كلما زاد هذا الحزن، زادت اللذة». [٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا أمر مذهل وحقيقي. ما يقوله هو أنه لكي تقود الناس إلى حزن التوبة والانسحاق، يجب أن تقودهم أولاً لرؤية مجد الله ككنزهم ولذتهم. هذا هو ما يحدث في الإنجيل. فالإنجيل هو استعلان «إِنَارَةِ إِنْجِيلِ مَجْدِ الْمَسِيحِ، الَّذِي هُوَ صُورَةُ اللهِ» (٢ كورنثوس ٤ : ٤). والحزن الحقيقي على الخطية يظهر من خلال الإنجيل على حقيقته. إنَّ حزن الانسحاق الحقيقي هو حزن على عدم امتلاك الله ككنزنا المُشبع للكل. ولكن لكي نحزن على عدم الابتهاج بالله، يجب أن نرى الله ككنزنا وفرحنا. ولكي نحزن على عدم التمتع بالله، لا بد أن يكون قد صار لذة لنا.\u003c/p\u003e\n\u003cp\u003eبُذُورُ اللَّذَّةِ تُعْطِي ثَمَرَ الْحُزْنِ\u003c/p\u003e\n\u003cp\u003eكيف حدث هذا؟ كيف صار الله ككنزنا المشبع للكل؟ لقد حدث ذلك من خلال الإنجيل؛ فالإنجيل أعلن مجد الله في المسيح. لقد رأينا ذلك، واستيقظنا على جماله وقيمته. زُرعت بذور اللذة، والثمر الذي أنتجته كان حزناً — حزناً لأننا لفترة طويلة لم نبتهج بمجده أبداً. وبشكل مفارق، يعني هذا أنَّ التوبة والانسحاق الحقيقيين القائمين على الإنجيل تسبقهما يقظة التلذذ بالله. فلكي تبكي بصدق على عدم امتلاك الله ككنزك، لا بد أن يكون قد صار ثميناً عندك. الإنجيل يوقظ الحزن على الخطية من خلال إيقاظ التلذذ بالله.\u003c/p\u003e\n\u003cp\u003eكَيْفَ كَسَرَ دِيفِيد بْرَايْنِرْد قُلُوبَ الْهُنُودِ وَجَعَلَهُمْ مَسْرُورِينَ\u003c/p\u003e\n\u003cp\u003eبعد ستة وعشرين عاماً من إلقائه وعظة \"لذة التقوى\"، نشر جوناثان إدواردز مذكرات ديفيد براينرد [٥]، المرسل الشاب إلى الهنود الأمريكيين الذي توفي عام ١٧٤٧ عن عمر يناهز التاسعة والعشرين. وقد انتهز هذه الفرصة ليوضح من واقع الحياة ما علّمه عن العلاقة بين مجد الإنجيل وحزن الانسحاق.\u003c/p\u003e\n\u003cp\u003eفي ٩ أغسطس ١٧٤٥، وعظ براينرد للهنود في \"كروسويكسانغ\" بنيو جيرسي، وسجل هذه الملاحظة: «كَانَتْ هُنَاكَ دُمُوعٌ كَثِيرَةٌ بَيْنَهُمْ بَيْنَمَا كُنْتُ أَتَحَدَّثُ عَلانِيَةً... تأثر البعض كثيراً بكلمات قليلة قيلت لهم بطريقة قوية، مما جعل الأشخاص يصرخون بمرارة في النفس، رغم أنني لم أنطق بكلمة ترهيب واحدة، بل على العكس، وضعتُ أمامهم ملء وكفاية استحقاقات المسيح، واستعداده لتخليص كل من يأتون إليه؛ وبناءً على ذلك حثثتهم على المجيء دون تأخير». [٦]\u003c/p\u003e\n\u003cp\u003eومرة أخرى في ٣٠ نوفمبر من ذلك العام نفسه، وعظ عن نص (لوقا ١٦ : ١٩ - ٢٦) المتعلق بالغني ولعازر. «تركت الكلمة انطباعات قوية على الكثيرين في الاجتماع، ولا سيما بينما كنت أتحدث عن فرح لعازر \"فِي حِضْنِ إِبْرَاهِيمَ\" [لوقا ١٦ : ٢٢]. وقد استطعتُ أن أدرك أنَّ هذا أثر فيهم أكثر بكثير مما قلته عن بؤس الغني وعذاباته. وهكذا كان الأمر معهم عادة... لقد بدوا دائماً تقريباً متأثرين بالحقائق المعزية أكثر من تأثرهم بالحقائق المرهبة في كلمة الله. ما سبب حزناً للكثيرين منهم تحت وطأة التبكيت، هو أنهم وجدوا أنهم معوذون، ولا يستطيعون الحصول على سعادة الأتقياء». [٧]\u003c/p\u003e\n\u003cp\u003eهذا هو بالضبط ما كان إدواردز يعظ به قبل اثنين وعشرين عاماً. يبدو الأمر غريباً جداً في البداية؛ إذ يجب على المرء أن يتذوق سعادة رؤية والابتهاج بالله في الإنجيل قبل أن يتمكن من الحزن بصدق على عدم امتلاك المزيد من تلك السعادة. لا يوجد تناقض بين ضرورة الحزن على الخطية وضرورة رؤية والابتهاج بمجد الله في الإنجيل. فعذوبة رؤية الله في الإنجيل هي شرط مسبق للحزن التَّقي على ازدراء تلك العذوبة لفترة طويلة.\u003c/p\u003e\n\u003cp\u003eالْحُزْنُ الْقَائِمُ عَلَى الْفَرَحِ وَحْدَهُ هُوَ مَا يُكْرِمُ اللهَ\u003c/p\u003e\n\u003cp\u003eإنَّ مدلول هذه الحقيقة بالنسبة للكرازة بالإنجيل هو ضرورة إظهار الله نفسه كأسمى خبر سار في الإنجيل. فإذا لم يستيقظ الناس على قيمة الله وجمال مجده في وجه المسيح، فإنَّ حزن انسحاقهم لن يعود إلى فشلهم في الاعتزاز بالله وتثمين مجده، بل سيعود إلى الخوف من الجحيم، أو حماقة سلوكهم السابق، أو ضياع حياتهم. ولكن لا يوجد أي من أسس الانسحاق هذه، في حد ذاته، يُعدُّ إكراماً لله.\u003c/p\u003e\n\u003cp\u003eمَا هِيَ الْمَحَبَّةُ الْمُنَزَّهَةُ عَنِ الْغَرَضِ؟\u003c/p\u003e\n\u003cp\u003eالتلذذ باللهِ ذَاتِهِ قد يثير اعتراض شخص يعرف القليل عن جوناثان إدواردز، قائلاً: \"إنَّ طريقتك في الحديث عن الإنجيل لا تبدو أمينة للطريقة التي تحدث بها إدواردز؛ فأنت تتحدث عن الاعتزاز والتذوق وتثمين الله في الإنجيل، وهذه الكلمات توحي برغبة قوية في إيجاد اللذة أو السعادة في الله. لكن إدواردز تحدث عن محبة \"منزهة عن الغرض\" لله. فهل أنت حقاً أمين لإدواردز وللرسول بولس في الطريقة التي تتحدث بها عن الاستجابة للإنجيل؟\".\u003c/p\u003e\n\u003cp\u003eرداً على هذا السؤال الوجيه أقول: صحيح أنَّ إدواردز استخدم مصطلح \"المحبة المنزهة عن الغرض\" في الإشارة إلى الله. «يجب أن أترك الأمر لكل فرد ليحكم بنفسه... فيما يتعلق بالجنس البشري، كم هو قليل وجود هذه المحبة المنزهة عن الغرض لله، هذا التأثر الإلهي النقي، في العالم». [٨] «لا توجد محبة أخرى تسمو فوق المبدأ الأناني بقدر ما تسمو المحبة المسيحية، فلا توجد محبة حرة ومنزهة عن الغرض مثلها. فالله يُحَب لذاته ولأجل ذاته». [٩]\u003c/p\u003e\n\u003cp\u003eولكن المفتاح لفهم معناه يوجد في هذا الاقتباس الأخير؛ فالمحبة المنزهة عن الغرض لله هي محبة الله \"لذاته ولأجل ذاته\". بكلمات أخرى، استخدم إدواردز مصطلح \"المحبة المنزهة عن الغرض\" ليعني المحبة التي تبتهج بالله لعظمته وجماله، ولتمييزها عن المحبة التي تبتهج فقط بعطايا الله. فالمحبة المنزهة عن الغرض ليست محبة بلا لذة، بل هي محبة تكمن لذتها في الله نفسه.\u003c/p\u003e\n\u003cp\u003eالاِسْتِمْتَاعُ الْعَذْبُ الْمُنَزَّه عَنِ الْغَرَضِ\u003c/p\u003e\n\u003cp\u003eفي الواقع، كان إدواردز يقول إنه لا توجد محبة لله لا تتضمن ابتهاجاً بالله. ومن ثم، إذا كانت هناك محبة منزهة عن الغرض لله، فهناك ابتهاج منزه عن الغرض بالله. وهذا هو بالضبط ما فكر فيه؛ فعلى سبيل المثال، يقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«كما هو الحال مع محبة القديسين، كذلك هو الحال مع فرحهم، وابتهاجهم الروحي ولذتهم: فالأساس الأول لذلك ليس أي اعتبار أو تصور لمصلحتهم في الأمور الإلهية؛ بل هو يتكون في المقام الأول من الاستمتاع العذب الذي تحظى به عقولهم في معاينة... الجمال الإلهي والمقدس لهذه الأشياء، كما هي في حد ذاتها». [١٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبكلمات أخرى، يقول إنَّ \"ابتهاجهم الروحي\" ليس له أساس في \"مصلحتهم في الأمور الإلهية\". وهذا يعني: أنَّ ابتهاجهم بالله لا يقوم على العطايا التي يمنحها إياهم بخلاف ذاته. هذا هو معنى \"المصلحة أو الغرض\". ومن ثم فإنَّ ابتهاجهم بالله \"منزه عن الغرض\". ومع ذلك، فهو يتكون من \"الاستمتاع العذب\" لنفوسهم. وهكذا فإنَّ المحبة \"المنزهة عن الغرض\" لله هي \"الاستمتاع العذب\" أو فرح معرفة الله ذاته. [١١] وهذا هو ما يقدمه الإنجيل عندما يعلن «إِنَارَةَ إِنْجِيلِ مَجْدِ الْمَسِيحِ، الَّذِي هُوَ صُورَةُ اللهِ» (٢ كورنثوس ٤ : ٤). وهذا هو ما يجب —بشكل مفارق— أن يسبق وينتج حزن الانسحاق الَّذي يُعَظِّم المسيح.\u003c/p\u003e\n\u003cp\u003eعكس الشعور بالانتصار الوهمي: حَزَانَى وَلَكِنْ دَائِماً فَرِحُونَ\u003c/p\u003e\n\u003cp\u003eإنَّ أحد أسباب تناول طبيعة وأساس الانسحاق المسيحي في هذا الفصل هو أنه يمكنني من التحذير ضد \"الشعور بالانتصار الوهمي\" (Triumphalism). أنا أدرك أنه عندما أستخدم لغة التثمين والكنز والابتهاج والاعتزاز والشبع بمجد الله في وجه المسيح، فقد يبدو الأمر للبعض وكأن كل الانكسار والمعاناة والألم والحزن قد تُرِكوا وراء ظهر المؤمن. وهذا ليس صحيحاً؛ فالمسيحي لا يتجاوز أبداً معركة الخطية الساكنة فيه. [١٢] فالحياة ليست مجرد فرح يطغى على الحزن؛ الحياة معركة من أجل الفرح في وسط الحزن. [١٣] إنَّ الراية التي ترفرف فوق حياتي وفوق هذا الكتاب هي شعار بولس المليء بالمفارقة في (٢ كورنثوس ٦ : ١٠): «كَحَزَانَى وَنَحْنُ دَائِماً فَرِحُونَ».\u003c/p\u003e\n\u003cp\u003eرأى جوناثان إدواردز مجد الله في الإنجيل بوضوح أكثر من معظمنا، واختبر كَوْنه مأخوذاً بشركة مع الله من خلال الإنجيل. [١٤] ولكنه ترك لنا أيضاً واحداً من أجمل الأوصاف لما ينتجه مجد الله في الإنجيل في حياة المؤمن؛ فقد أظهر أنَّ الرؤية المأخوذة بالله والمسيح في الإنجيل لا تجعل الشخص جسوراً متكبراً — بل تجعله وديعاً. إنها تنتج فرحاً منكسر القلب.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«كُلُّ تَأْثِيرَاتِ النِّعْمَةِ الَّتِي هِيَ رَائِحَةٌ طَيِّبَةٌ لِلْمَسِيحِ، وَالَّتِي تَمْلأُ نَفْسَ الْمَسِيحِيِّ بِعُذُوبَةٍ وَعِطْرٍ سَمَاوِيَّيْنِ، هِيَ تَأْثِيرَاتٌ مُنْكَسِرَةُ الْقَلْبِ. فَالْمَحَبَّةُ الْمَسِيحِيَّةُ الْحَقِيقِيَّةُ، سَوَاءٌ لِلهِ أَوْ لِلنَّاسِ، هِيَ مَحَبَّةٌ مُتَوَاضِعَةٌ مُنْكَسِرَةُ الْقَلْبِ. إِنَّ أَشْوَاقَ الْقِدِّيسِينَ، مَهْمَا كَانَتْ مُخْلِصَةً، هِيَ أَشْوَاقٌ مُتَوَاضِعَةٌ: وَرَجَاؤُهُمْ رَجَاءٌ مُتَوَاضِعٌ؛ وَفَرَحُهُمْ، حَتَّى عِنْدَمَا يَكُونُ \"فَرَحٍ لاَ يُنْطَقُ بِهِ وَمَجِيدٍ\"، هُوَ فَرَحٌ مُتَوَاضِعٌ مُنْكَسِرُ الْقَلْبِ، وَيَتْرُكُ الْمَسِيحِيَّ أَكْثَرَ مَسْكَنَةً بِالرُّوحِ، وَأَكْثَرَ شَبَهاً بِطِفْلٍ صَغِيرٍ، وَأَكْثَرَ مَيْلاً إِلَى تَوَاضُعٍ عَامٍّ فِي السُّلُوكِ». [١٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eتَرْكُ الشَّيْطَانِ طليقاً: ثَمَنُ إِظْهَارِ عظمة الْمَسِيحِ في الواقع\u003c/p\u003e\n\u003cp\u003eإنَّ الله عازم جداً على إعلان مجد المسيح المصلوب في الإنجيل، وإنتاج مسيحيين متطابقين مع محبة المسيح التي تفرغ الذات (٢ كورنثوس ٣ : ١٨)، لدرجة أنه لا يجعل الصليب الاستعلان المركزي لمجده في هذا الدهر فحسب، بل يترك الشيطان أيضاً في العالم ليعظم قوة وحكمة وجمال الوداعة.\u003c/p\u003e\n\u003cp\u003eهل تساءلت يوماً لماذا لا يَسحق الله الشيطان وجنوده ببساطة ويمحوهم من الوجود الآن؟ [١٦] إنه لمن الغريب أنَّ الله، الذي له حقوق سيادية مطلقة على الشيطان، عدوه اللدود، يسمح له بإلحاق كل هذا الضرر. الله يملك الحق والقدرة على طرحه في بحيرة النار، وسيفعل الله ذلك يوماً ما ويقضي على الشيطان تماماً (رؤيا ٢٠ : ٣، ١٠). لن يكون ذلك ظلماً للشيطان، كما لن يكون ظلماً لو فعل ذلك اليوم. فلماذا لا يفعل، بالنظر إلى كل هذا البؤس الذي يسببه الشيطان؟\u003c/p\u003e\n\u003cp\u003eهل لأن هناك فرصة لأن يتوب إبليس وملائكته؟ كلا. فهم غير قابلين للفداء. قال يسوع إنَّ «النَّارِ الأَبَدِيَّةِ [قد] أُعِدَّتْ لإِبْلِيسَ وَمَلاَئِكَتِهِ» (متى ٢٥ : ٤١). وكتب يهوذا، أنَّ الملائكة الساقطين «حَفِظَهُمْ إِلَى دَيْنُونَةِ الْيَوْمِ الْعَظِيمِ بِقُيُودٍ أَبَدِيَّةٍ تَحْتَ الظَّلاَمِ» (يهوذا ٦).\u003c/p\u003e\n\u003cp\u003eلماذا إذاً يسمح الله للشيطان بالبقاء؟ نجد المفتاح في تذكر أنَّ الشيطان يكره الإنجيل. «إِلهُ هذَا الدَّهْرِ [الشيطان] قَدْ أَعْمَى أَذْهَانَ غَيْرِ الْمُؤْمِنِينَ، لِئَلاَّ تُضِيءَ لَهُمْ إِنَارَةُ إِنْجِيلِ مَجْدِ الْمَسِيحِ» (٢ كورنثوس ٤ : ٤). هذا دليل على سبب إعطاء الله للشيطان كل هذا الحبل المرخى؛ فهدف الله هو تعظيم مجد المسيح من خلال الإنجيل.\u003c/p\u003e\n\u003cp\u003eبكلمات أخرى، قصد الله هو هزيمة الشيطان بطريقة لا تمجد قوة المسيح الخام فحسب، بل تمجد أيضاً جماله وقيمته وجاذبيته الفائقة. كان بإمكان المسيح ببساطة أن يمارس قوته السيادية ويقضي على الشيطان بشكل نهائي؛ وكان ذلك سيمجد قوة المسيح بالفعل. ولكن ذلك لم يكن ليعرض بوضوح قيمة يسوع الفائقة على الشيطان؛ ولم يكن ليعرض الجمال والقوة لوداعة المسيح وتواضعه ومسكنته ومحبته التي تفرغ الإنسان من الذات. إنَّ هدف الإنجيل هو وضع مجد المسيح المصلوب قيد العرض، وإخزاء الشيطان بملايين الناس الذين «يَرْجِعُوا مِنْ ظُلُمَاتٍ إِلَى نُورٍ، وَمِنْ سُلْطَانِ الشَّيْطَانِ إِلَى اللهِ» (أعمال الرسل ٢٦ : ١٨) ويهجرون أكاذيب الشيطان تفضيلاً لجمال المسيح في الإنجيل. [١٧]\u003c/p\u003e\n\u003cp\u003eإنَّ هذه الطريقة في هزيمة الشيطان مكلفة أكثر من مجرد سحقه؛ فالمسيح تألم من أجل هذا الانتصار، والعالم يتألم. ولكن قيم الله لا تُحسب بهذه السهولة. فلو أباد المسيح كل الشياطين الآن (وهو ما يستطيع فعله)، لَبَدت قوته المطلقة مجيدة، ولكن جماله وقيمته الفائقة لم تكن لتشرق بذاك السطوع الذي تشرق به عندما يرفض شعب الله ما يقدمه الشيطان، ويثقون في دم المسيح وبره، ويبتهجون بمجد يسوع الأعظم المُعلن في الإنجيل.\u003c/p\u003e\n\u003cp\u003eالشَّيْطَانُ يَنْسَحِبُ عِنْدَمَا يَكُونُ اللهُ هُوَ الإِنْجِيلُ\u003c/p\u003e\n\u003cp\u003eهذا يعني أنَّ فحوى هذا الكتاب مهمة بشكل مذهل لله. فالله يهدف إلى أن يُرى مجده ويُبتهج به في الإنجيل بوضوح تام لدرجة تنكسر معها قوة الشيطان، ويصبح جلياً للكل أنَّ عذوبة المسيح المصلوب أقوى من إغراءات الشيطان. ليس بالأمر الهين أن نفشل في إظهار الله كأعظم عطية للإنجيل؛ فهذا يصب في مصلحة إبليس ويناقض قصد الله في كسر قوة الشيطان من خلال استعلان جمال المسيح الفائق في الإنجيل.\u003c/p\u003e\n\u003cp\u003eلذا دعونا نعظ بالإنجيل ونعيشه بحيث نُظهر المسيح. دعونا نحمل السلاح ونهزم إبليس بكوننا جسورين ومسرورين بالمجد الفائق لابن الله! أنا لا أقول إنَّ الأمر سهل؛ فهو مكلف للغاية. إنَّ طريق المحبة الذي يمتد من صليب المسيح إلى مجد المسيح هو طريق تضحية. وجمال المسيح الفائق على الشيطان والخطية يُرى بأفضل صورة عندما نكون مستعدين للتألم من أجله. إنَّ واحدة من أعظم الضربات ضد قوة الظلمة تأتي من دم الشهداء: «وَهُمْ غَلَبُوهُ [الشيطان!] بِدَمِ الْخَرُوفِ وَبِكَلِمَةِ شَهَادَتِهِمْ، وَلَمْ يُحِبُّوا حَيَاتَهُمْ حَتَّى الْمَوْتِ» (رؤيا ١٢ : ١١). هذا هو نوع الحياة الذي ينمو من رؤية الله بصفته الإنجيل.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003e[الهوامش]\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e[١] جوناثان إدواردز: واعظ أمريكي إصلاحي، فيلسوف اليقظة الكبرى الأولى، مؤلف \"المشاعر الدينية\".\u003c/p\u003e\n\u003cp\u003e[٢] جوناثان إدواردز، \"متنوعات\"، في أعمال جوناثان إدواردز، المجلد ١٣، تحرير توماس شيفر (مطبعة جامعة ييل، ١٩٩٤)، ٤٩٥.\u003c/p\u003e\n\u003cp\u003e[٣] جوناثان إدواردز، \"لذة التقوى\"، في عظات جوناثان إدواردز: قارئ (نيو هافن، كونيتيكت: مطبعة جامعة ييل، ١٩٩٩)، ١٥.\u003c/p\u003e\n\u003cp\u003e[٤] المرجع السابق، ١٨ - ١٩. وانظر أيضاً: المشاعر الدينية، المجلد ٢، ٣٠١.\u003c/p\u003e\n\u003cp\u003e[٥] ديفيد براينرد: مرسل بيوريتاني شهير للهنود الأمريكيين، يُعدُّ قدوة في التقوى الشخصية.\u003c/p\u003e\n\u003cp\u003e[٦] جوناثان إدواردز، حياة ديفيد براينرد، المجلد ٧، تحرير نورمان بيتيت (١٩٨٥)، ٣١٠.\u003c/p\u003e\n\u003cp\u003e[٧] المرجع السابق، ٣٤٢.\u003c/p\u003e\n\u003cp\u003e[٨] جوناثان إدواردز، الخطية الأصلية، المجلد ٣، تحرير كلايد هولبروك (١٩٧٠)، ١٤٤.\u003c/p\u003e\n\u003cp\u003e[٩] جوناثان إدواردز، المحبة وثمارها، المجلد ٨، تحرير بول رامزي (١٩٨٩)، ٢٦٤.\u003c/p\u003e\n\u003cp\u003e[١٠] إدواردز، المشاعر الدينية، ٢٤٩.\u003c/p\u003e\n\u003cp\u003e[١١] نورمان فيرينغ، فكر جوناثان إدواردز الأخلاقي في سياقه البريطاني (١٩٨١)، ١٦١.\u003c/p\u003e\n\u003cp\u003e[١٢] جون أوين: لاهوتي بيوريتاني إنجليزي، عُرف بكتاباته العميقة عن معركة المؤمن مع الخطية الساكنة.\u003c/p\u003e\n\u003cp\u003e[١٣] انظر كتاب: جون بايبر، عندما لا أشتاق إلى الله (٢٠٠٤).\u003c/p\u003e\n\u003cp\u003e[١٤] جوناثان إدواردز: مختارات ممثلة، تحرير كلارنس فاوست وتوماس جونسون (١٩٣٥)، ٦٩.\u003c/p\u003e\n\u003cp\u003e[١٥] جوناثان إدواردز، المشاعر الدينية، ٣٤٨ - ٣٤٩.\u003c/p\u003e\n\u003cp\u003e[١٦] جون بايبر، الحياة كالبخار (٢٠٠٤)، ٧٧ - ٨١.\u003c/p\u003e\n\u003cp\u003e[١٧] تعظيم عدل الله في الدينونة ورحمة الله للذين ينجون.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi5yoHBID5IgYmqtZYavTYhD8XGEKUZzmvocWq0Q0Xnb5SRveZxYibLjcawizokC92kTq-yKyKjz06E2a2hQf3mnYTNvr-5Yvn5IcSE39KKcFAMh1Vy-OpmEX6cnqzZmaN7PCEaX2R7e_I2K93JPHvG61zDA3BlwVcEcwtYRFiVweoygFXqXtROrXfnMqM/s2752/08.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi5yoHBID5IgYmqtZYavTYhD8XGEKUZzmvocWq0Q0Xnb5SRveZxYibLjcawizokC92kTq-yKyKjz06E2a2hQf3mnYTNvr-5Yvn5IcSE39KKcFAMh1Vy-OpmEX6cnqzZmaN7PCEaX2R7e_I2K93JPHvG61zDA3BlwVcEcwtYRFiVweoygFXqXtROrXfnMqM/s600/08.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"3c:T548b,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل السادس: الإنجيل — مَجْدُ الْمَسِيحِ فِي الْكِرَازَةِ وَالإِرْسَالِيَّاتِ وَالتَّقْدِيسِ\u003c/h2\u003e\n\u003cp\u003eالإنجيل هو استعلان مَجْدِ المسيح الذي هو صورة الله. إنه العرض المُصادِق لذاته لنور معرفة مَجْدِ الله في وجه المسيح. والخير الأعظم في الإنجيل هو عطية رؤية والابتهاج بمَجْدِ الله في المسيح إلى الأبد. وهذا أمر بالغ الأهمية إذا أردنا استخدام الإنجيل كتابياً في الكرازة، والإرساليات، وخدمة الكنيسة لتقديس القديسين. إن قداسة الشعب المسيحي وتغيير الهالكين يتوقفان على رؤية والابتهاج بمَجْدِ الله في الإنجيل.\u003c/p\u003e\n\u003cp\u003eعِبْءُ إِدْوَارْدِز مِنْ أَجْلِ غَيْرِ الْمُؤْمِنِينَ الأُمِّيِّينَ\u003c/p\u003e\n\u003cp\u003eقلما تفوق عقلٌ على عقل جوناثان إدواردز [١] في عظمة النشاط الذهني والإبداع والبصيرة والشمولية. ومع ذلك، كان لدى إدواردز عبء كبير تجاه عامة الناس في نيو إنجلاند، وتجاه الهنود الحمر على الحدود، وتجاه المسلمين عبر البحار. وهو يشير إلى أن هؤلاء الناس ببساطة لن يتمكنوا من الوصول إلى إيمان حقيقي راسخ بالإنجيل إذا لم يتمكنوا من الوصول إليه عبر إدراك روحي لمجد الله المُصادِق لذاته فيه.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«ما لم يتمكن البشر من الوصول إلى اقتناع ويقين مَعقول وصلب بحق الإنجيل، من خلال أدلته الداخلية، بالطريقة التي تحدثنا عنها، أي برؤية مَجْدِهِ؛ فإنه من المستحيل على أولئك الأميين، وغير المطلعين على التاريخ، أن يكون لديهم أي يقين شامل وفعال على الإطلاق». [٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eويمضي إدواردز إلى أبعد من ذلك وهو يتأمل في قلة عدد الأشخاص الذين يصلون إلى الإيمان من خلال الحجج الأكاديمية للصحة التاريخية للكتاب المقدس: «لكن الإنجيل لم يُعطَ للمتعلمين فقط. فهناك على الأقل تسعة عشر من كل عشرين، إن لم يكن تسعة وتسعون من كل مائة، ممن كُتبت لهم الأسفار المقدسة، غير قادرين على أي يقين أو اقتناع فعال بالسلطان الإلهي للأسفار المقدسة، من خلال تلك الحجج التي يستخدمها المتعلمون». [٣]\u003c/p\u003e\n\u003cp\u003eوكم يكون الوضع أسوأ بالنسبة لأولئك الذين \"تربوا على الوثنية\" وليس لديهم معرفة بتاريخ العالم، ناهيك عن الكتاب المقدس. فإذا كنا نعتقد أن اليقين الحقيقي واليقين الروحي يجب أن ينتظرا الحجة التاريخية، فإن هذا «سوف يجعل نشر الإنجيل بينهم أمراً صعباً للغاية». [٤]\u003c/p\u003e\n\u003cp\u003eنَوْعُ الإِيمَانِ الَّذِي يَصْمُدُ أَمَامَ التَّعْذِيبِ لاَ يَقُومُ عَلَى الاحْتِمَالاَتِ\u003c/p\u003e\n\u003cp\u003eوحتى لو تمكن الناس من الوصول إلى شعور باحتمالية قوية بأن الإنجيل حق بناءً على الاستدلالات التاريخية، فإن هذا لن يكفي لسند الشخص في المعاناة والتعذيب. ففي القرون الماضية، كان هناك العديد من القديسين المتألمين، بما في ذلك النساء والأطفال الذين لم يتلقوا تعليماً، والذين عاشوا في أزمنة من الظلمة الروحية العظيمة؛ ومع ذلك، كم هي رائعة قصص تسليمهم لأنفسهم للموت. وبالنظر إلى هؤلاء الآلاف من القديسين، يلاحظ إدواردز:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لكي يكون لديهم يقين، واضح وجلي ومؤكد، لدرجة كافية لحثهم، بجرأة على بيع الكل، والمخاطرة بثقة وبلا خوف بخسارة كل الأشياء، وبتحمل أشد العذابات المستمرة لفترة طويلة، ودوس العالم تحت أقدامهم، وحسبان كل الأشياء نفاية من أجل المسيح، فإن الدليل الذي يمكنهم الحصول عليه من التاريخ لا يمكن أن يكون كافياً... فبعد كل ما قاله المتعلمون لهم، ستظل هناك شكوك لا حصر لها في أذهانهم». [٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلذلك، من المهم جداً للكرازة والإرساليات أن نفهم أن الإيمان المُخلص الحقيقي يرتكز على رؤية روحية لمجد الله في الإنجيل. وهذا سيكون له تأثير هائل على الطريقة التي نفكر بها في الإرساليات والكرازة. وسيكون التأثير الأساسي هو التأكد من أن المُرسل والكارز هما شخصان روحيان يريان ويبتهجان بمجد الله في وجه المسيح.\u003c/p\u003e\n\u003cp\u003eأكرز بِالْقِصَّةِ الْقَدِيمَةِ وَصَلِّ لِأَجْلِ الرُّوحِ\u003c/p\u003e\n\u003cp\u003eبالطبع، هذا لا يعني أننا لن نكرز بالقصة القديمة؛ بل سنخبر بها ونخبر بها جيداً. فمركز الإنجيل هو سرد أحداث موت المسيح وقيامته. إنه خبر! ثم هناك شرح لما حققه هذا الموت وهذه القيامة من غفران الخطايا ورجاء الحياة الأبدية. وفي كل هذا هناك الهدف والصلاة بأن يشرق مَجْدُ المسيح من خلال ذلك، لأن هذا المجد هو ما يجب أن يُرى لكي يكون للإيمان أساس صلب ومُخلص. يجب على الروح القدس أن يقوم بعمله الواهب للحياة، والفاتح للعين، والمزيل للعمى، والمعلن للمجد. إن الروح والكلمة كلاهما جوهريان.\u003c/p\u003e\n\u003cp\u003eمُعَايَنَةُ مَجْدِ الْمَسِيحِ فِي الإِنْجِيلِ لِأَجْلِ أن نصَّيْر مُقَدَّسِينَ\u003c/p\u003e\n\u003cp\u003eالإنجيل مركزي ليس فقط في التجديد والميلاد الجديد ولكن أيضاً في التحويل المستمر للمؤمنين. إن فهم الغرض الحاسم للإنجيل بصفته استعلان مَجْدِ المسيح هو المفتاح الكتابي للقداسة المسيحية. وهذا يتضح في سياق (٢ كورنثوس ٤ : ٤-٦)، الذي كان أساسياً لكل تفكيرنا في هذا الكتاب.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَنَحْنُ جَمِيعاً نَاظِرِينَ مَجْدَ الرَّبِّ بِوَجْهٍ مَكْشُوفٍ، كَمَا فِي مِرْآةٍ، نَتَغَيَّرُ إِلَى تِلْكَ الصُّورَةِ عَيْنِهَا، مِنْ مَجْدٍ إِلَى مَجْدٍ، كَمَا مِنَ الرَّبُّ الرُّوحِ» (٢ كورنثوس ٣ : ١٨).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلاحظ ثلاثة أمور:\u003c/p\u003e\n\u003cp\u003e١) الطريق إلى التشبه بالمسيح هو \"النظر إلى مَجْدِ الرب\". فالمعاينة تعني الصيرورة؛ نحن نتغير «إِلَى تِلْكَ الصُّورَةِ» التي للرب عن طريق تثبيت انتباهنا على مَجْدِهِ. وبالنظر إلى كل ما رأيناه في الآيات التي تلي (٢ كورنثوس ٤ : ٤-٦)، فلا نشك في كيفية \"نظرنا لمجد الرب\" ومن هو الرب. الرب هو المسيح، وهو صورة الله (٤ : ٤). أو يمكننا القول، الرب هو الله مَرئياً في وجه المسيح (٤ : ٦). والطريقة التي \"ننظر بها لمجد الرب\" هي في «إِنْجِيلِ مَجْدِ الْمَسِيحِ».\u003c/p\u003e\n\u003cp\u003eكيف يأتي هذا التحويل إلى صورة المسيح؟ في نهاية الآية ١٨ يقول بولس إنه يأتي «مِنَ الرَّبِّ الرُّوحِ». وهذا يصف، بكلمات مختلفة، ما رأيناه بالفعل في (٢ كورنثوس ٤ : ٦): أن الله «أَشْرَقَ فِي قُلُوبِنَا، لإِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ». هذه هي الطريقة التي يجري بها الروح القدس تغييره المستمر فينا؛ فهو لا يغيرنا مباشرة، بل يغيرنا بتمكيننا من رؤية مَجْدِ المسيح.\u003c/p\u003e\n\u003cp\u003eالرُّوحُ يُحَلِّقُ فِي نَسَقٍ وَاحِدٍ خَلْفَ الإِنْجِيلِ الْمُعَظِّمِ لِلْمَسِيحِ\u003c/p\u003e\n\u003cp\u003eهذا أمر بالغ الأهمية لفهمه؛ فهو يظهر مدى تعظيم الروح القدس للمسيح. إنه لن يقوم بعمله التقديسي باستخدام قوته الإلهية المباشرة؛ بل سيقوم به فقط بجعل مَجْدِ المسيح هو السبب المباشر له. في الكرازة، يفتح الروح القدس عيون الخطاة ليروا مَجْدِ المسيح الذي يُكرز به بأمانة في الإنجيل. الروح القدس، يمكننا القول، يحلق في تشكيل مثالي خلف نفاثة الإنجيل المُعظم للمسيح. إنه يقوم بعمله المعجزي في فتح القلب ليجعل المسيح يُرى ويُبتهج به كما يُكرز به في الإنجيل. [٦] لقد أُرسل الروح ليمجد ابن الله (يوحنا ١٦ : ١٤)، ولن يخلص أحداً بمعزل عن جذب انتباههم إلى مَجْدِ الابن في الإنجيل.\u003c/p\u003e\n\u003cp\u003eهكذا هو الحال مع التقديس. نحن نتغير إلى صورة المسيح بالرؤية والابتهاج [٧] الثابتين بمجد المسيح. هذا هو عمل الروح: أن يسلط نور الحق على مَجْدِ المسيح لكي نراه بما هو عليه حقاً، أي ثمين بلا حدود. إن عمل الروح القدس في تغييرنا ليس بالعمل مباشرة على عاداتنا السيئة، بل بجعلنا نُعجب بيسوع المسيح لدرجة أن العادات الآثمة تبدو غريبة ومقززة. لذلك، إذا أهملنا مَجْدِ الله في المسيح بصفته العطية العظمى للإنجيل، فإننا نشل عمل التقديس في الكنيسة.\u003c/p\u003e\n\u003cp\u003eنَحْنُ نَمْتَصُّ مَا نَعْجَبُ بِهِ\u003c/p\u003e\n\u003cp\u003e٢) تفترض ديناميكيات التحول الشخصي في (٢ كورنثوس ٣ : ١٨) أننا نتغير إلى ما نعجب به ونثبت انتباهنا عليه. «نَاظِرِينَ مَجْدَ الرَّبِّ... نَتَغَيَّرُ إِلَى تِلْكَ الصُّورَةِ عَيْنِهَا». نحن نعلم أن الأمر كذلك من الخبرة. فالنظر الطويل مع الإعجاب ينتج تغييراً. فمن أبطالك تكتسب الإيماءات والعبارات ونبرات الصوت وتعبيرات الوجه والعادات والمسالك والقناعات والمعتقدات. وكلما كان البطل أكثر إثارة للإعجاب وكلما كان إعجابك أكثر كثافة، كان تحولك أكثر عمقاً. وفي حالة يسوع، هو مثير للإعجاب بلا حدود، وإعجابنا يرتفع إلى أسمى عبادة مطلقة. لذلك، عندما نعاينه كما ينبغي، يكون التغيير عميقاً.\u003c/p\u003e\n\u003cp\u003eنَحْنُ نَتَغَيَّرُ بِدَرَجَاتٍ\u003c/p\u003e\n\u003cp\u003e٣) التغيير الذي يأتي من معاينة مَجْدِ المسيح في الإنجيل يحدث تدريجياً. «نَاظِرِينَ مَجْدَ الرَّبِّ... نَتَغَيَّرُ إِلَى تِلْكَ الصُّورَةِ عَيْنِهَا، مِنْ مَجْدٍ إِلَى مَجْدٍ». إن الحديث عن التغيير بمصطلحات \"المجد\" يظهر أن التمجيد المسيحي يبدأ عند التجديد، وليس عند الموت أو القيامة. وفي الحقيقة، في ذهن بولس، التقديس هو المرحلة الأولى من التمجيد. [١٠]\u003c/p\u003e\n\u003cp\u003eلذلك، يجب أن نفكر في الحياة المسيحية على أنها تطابق أكثر فأكثر مع شخص المسيح المجيد. وبينما نعاينه، نأتي أيضاً للمشاركة أكثر فأكثر في إدراك المسيح الروحي للآب وللعالم. نأتي أكثر فأكثر لرؤية قيمة الله بالطريقة التي يرى بها المسيح عظمة الله. وبما نعاين مَجْدِ المسيح في الإنجيل ونبتهج بطهارته، نأتي لرؤية الخطية كأمر مقزز، والخلاص كأمر مهيب. لا نعود نرى الناس «حَسَبَ الْجَسَدِ» (٢ كورنثوس ٥ : ١٦)، بل بمحبة «تَصْبِرُ عَلَى كُلِّ شَيْءٍ، وَتُصَدِّقُ كُلَّ شَيْءٍ، وَتَرْجُو كُلَّ شَيْءٍ، وَتحتَمِلُ كُلَّ شَيْءٍ» (١ كورنثوس ١٣ : ٧). [١١]\u003c/p\u003e\n\u003cp\u003eمِنْ دَرَجَةٍ إِلَى أُخْرَى نُحِبُّ كَالْمَسِيحِ\u003c/p\u003e\n\u003cp\u003eبينما يتغير إدراكنا الروحي لكل الأشياء بإبقاء المسيح في نظرنا الثابت، يصبح تطابقنا مع المسيح عملياً للغاية. فسلوكنا يتغير. قال يسوع: «وَصِيَّةً جَدِيدَةً أَنَا أُعْطِيكُمْ: أَنْ تُحِبُّوا بَعْضُكُمْ بَعْضاً. كَمَا أَحْبَبْتُكُمْ أَنَا تُحِبُّونَ أَنْتُمْ أَيْضاً بَعْضُكُمْ بَعْضاً» (يوحنا ١٣ : ٣٤-٣٥). وبينما نعاين مَجْدِ الرب في الإنجيل، يصبح مَجْدُ كمالاته الأخلاقية أكثر فأكثر هو رغبتنا وخبرتنا، خاصة مَجْدِ محبته لأعدائه. فبينما نثبت انتباه عقلنا وعاطفة قلبنا على مَجْدِ محبة المسيح، نصبح أكثر فأكثر مُحبين.\u003c/p\u003e\n\u003cp\u003eمِنْ مَجْدٍ إِلَى مَجْدٍ دَاخِلِيّاً، لاَ خَارِجِيّاً — بَعْدُ\u003c/p\u003e\n\u003cp\u003eهذا التحول التدريجي من مَجْدٍ إلى مَجْدٍ ليس صحيحاً بالنسبة لأجسادنا المادية في هذا الدهر. فرغم أن الله يشفي شعبه من وقت لآخر، إلا أن خبرة جميع المسيحيين هي الشيخوخة التدريجية والضعف والموت. وبولس حريص على الإشارة إلى أن هذا الفناء الخارجي يتزامن مع تجديد داخلي من مَجْدٍ إلى مَجْدٍ بينما نثبت نظرنا على مَجْدِ المسيح. وهذا يصبح صريحاً في (٢ كورنثوس ٤ : ١٦-١٨):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لِذلِكَ لاَ نَفْشَلُ، بَلْ وَإِنْ كَانَ إِنْسَانُنَا الْخَارِجُ يَفْنَى، فَالدَّاخِلُ يَتَجَدَّدُ يَوْماً فَيَوْماً. لأَنَّ خِفَّةَ ضِيْقَتِنَا الْوَقْتِيَّةَ تُنْشِئُ لَنَا أَكْثَرَ فَأَكْثَرَ ثِقَلَ مَجْدٍ أَبَدِيّاً. وَنَحْنُ غَيْرُ نَاظِرِينَ إِلَى الأَشْيَاعِ الَّتِي تُرَى، بَلْ إِلَى الَّتِي لاَ تُرَى».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن أوجه التوازي بين هذا النص و(٢ كورنثوس ٣ : ١٨) تعليمية؛ فكوننا \"نتجدد يوماً فيوماً\" هو جزء من كوننا \"نتغير... من مَجْدٍ إلى مَجْدٍ\". والنظر \"إلى التي لا ترى\" يتضمن \"ناظرين مَجْدَ الرب\" — لأن \"مَجْدَ الرب\" في ذهن بولس يقع في فئة \"الأشياء التي لا تُرى\" بالعين المادية العادية. [١٣] فرؤية مَجْدِ المسيح غير المرئي في الإنجيل هي المفتاح للتحويل الداخلي. ومع ذلك، فإن هذا التغيير الداخلي هو الخطوة الأولى في التغيير الكامل، بما في ذلك تجديد أجسادنا.\u003c/p\u003e\n\u003cp\u003eالرُّؤْيَةُ الْكَامِلَةُ سَتَعْنِي التَّغْيِيرَ الْكَامِل\u003c/p\u003e\n\u003cp\u003eهذا التمجيد الملموس النهائي ليس منفصلاً عن معاينة مَجْدِ الرب. ففقط بمعاينة مَجْدِ الرب نُحفظ على الطريق الذي يؤدي إلى المسيح المُمجد. هناك «قَدَاسَةٍ الَّتِي بِدُونِهَا لَنْ يَرَى أَحَدٌ الرَّبَّ» (عبرانيين ١٢ : ١٤). وتلك القداسة هي تغييرنا «مِنْ مَجْدٍ إِلَى مَجْدٍ»، وهذا يحدث بإبقاء نظرنا ثابتاً على مَجْدِ المسيح في الإنجيل. ولكن الرابط بين معاينة مَجْدِ الله في وجه المسيح والتغير المادي والنهائي يظل صحيحاً في النهاية أيضاً. وهذا مُعبر عنه في (١ يوحنا ٣ : ٢):\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَيُّهَا الأَحِبَّاءُ، الآنَ نَحْنُ أَوْلاَدُ اللهِ، وَلَمْ يُظْهِرْ بَعْدُ مَاذَا سَنَكُونُ. وَلكِنْ نَعْلَمُ أَنَّهُ إِذَا أُظْهِرَ نَكُونُ مِثْلَهُ، لأَنَّنَا سَنَرَاهُ كَمَا هُوَ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلاَ إِنْجِيلَ وَلاَ خَلاَصَ حَيْثُ لاَ يُظْهَرُ مَجْدُ اللهِ وَيُرى\u003c/p\u003e\n\u003cp\u003eالتشديد الطاغي في هذه الأفكار الكتابية هو على مَجْدِ الله المشرق في وجه المسيح من خلال الإنجيل. إن غرض الإنجيل —سواء أحداثه المركزية في \"الجمعة العظيمة\" والقيامة، أو الكرازة بها في العالم— هو جعل مَجْدِ الله في المسيح هو الأساس والوسيلة لكل خلاص وتقديس وتمجيد. فلا يوجد إنجيل حيث لا يُظهر مَجْدُ الله في المسيح. ولا يوجد خلاص من خلال الإنجيل حيث لا يُرى مَجْدُ الله في المسيح.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003e[الهوامش]\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e[١] جوناثان إدواردز: واعظ أمريكي إصلاحي، فيلسوف اليقظة الكبرى الأولى، مؤلف \"المشاعر الدينية\".\u003c/p\u003e\n\u003cp\u003e[٢] Jonathan Edwards, Religious Affections, in The Works of Jonathan Edwards, vol. 2 (New Haven, Conn.: Yale University Press, 1959), 303.\u003c/p\u003e\n\u003cp\u003e[٣] المرجع السابق، ٣٠٤.\u003c/p\u003e\n\u003cp\u003e[٤] المرجع السابق.\u003c/p\u003e\n\u003cp\u003e[٥] المرجع السابق، ٣٠٣.\u003c/p\u003e\n\u003cp\u003e[٦] انظر أعمال الرسل ١٦ : ١٤: «ففتح الرَّبُّ قَلْبَهَا لِتُصْغِيَ إِلَى مَا كَانَ يَقُولُهُ بُولُسُ».\u003c/p\u003e\n\u003cp\u003e[٧] الرؤية (المعاينة) في اللاهوت المصلح لا يمكن أن تكون حيادية بل يصحبها ابتهاج قلبي بالضرورة.\u003c/p\u003e\n\u003cp\u003e[٨] John Piper, When I Don’t Desire God (Wheaton, Ill.: Crossway Books, 2004).\u003c/p\u003e\n\u003cp\u003e[٩] John Piper, Future Grace (Sisters, Ore.: Multnomah, 1995).\u003c/p\u003e\n\u003cp\u003e[١٠] رومية ٨ : ٣٠؛ القفز من التبرير للتمجيد دليل لاهوتي على اعتبار التقديس مرحلة أولى من التمجيد.\u003c/p\u003e\n\u003cp\u003e[١١] يوحنا ١٧ : ١، ٤؛ يوحنا ١٢ : ٢٧-٢٨.\u003c/p\u003e\n\u003cp\u003e[١٢] عبرانيين ٦ : ٥؛ تذوق قوات الدهر الآتي.\u003c/p\u003e\n\u003cp\u003e[١٣] ٢ كورنثوس ٥ : ٧؛ الإيمان هو وسيلة رؤية ما لا يرى عياناً.\u003c/p\u003e\n\u003cp\u003e[١٤] \"الهاء\" في \"مثله\" تعود لاهوتياً على الله الآب المستعلن في ابنه المسيح.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjrCVKMbZ28wWZzmjwcmsUDcFIGCXfcSjG4ad7Ig1k6ulr9Q2WQSnF1uRFDDNhhzN9rNFJb4_CbymrCIfpMiDCx7LOopArZFhnqdvp4h8FuT_MkVCRMerKahiG6ucu8aCLvUO-N54flkcw9MV7MIjx8rgzYFOPybFARkSc3M2PsmOw48jw0wO-dCcdKNcY/s2752/06.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjrCVKMbZ28wWZzmjwcmsUDcFIGCXfcSjG4ad7Ig1k6ulr9Q2WQSnF1uRFDDNhhzN9rNFJb4_CbymrCIfpMiDCx7LOopArZFhnqdvp4h8FuT_MkVCRMerKahiG6ucu8aCLvUO-N54flkcw9MV7MIjx8rgzYFOPybFARkSc3M2PsmOw48jw0wO-dCcdKNcY/s600/06.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"3d:T5f90,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الخامس: الإنجيل — مُؤيَّداً بِمَجْدِهِ، الشهادة الداخلية للروح القدس\u003c/h2\u003e\n\u003cp\u003eمَجْدُ اللهِ فِي الإِنْجِيلِ وَالشهادة الدَّاخِلِيَّةُ لِلرُّوحِ\u003c/p\u003e\n\u003cp\u003eإنَّ مَجْدَ اللهِ في الإنجيلِ لهُ أهميّةٌ بَالغَةٌ بطُرقٍ قد لا نُدرِكُها للوهلةِ الأولى. فعلى سَبيلِ المِثَال، يمنحُ مَجْدُ اللهِ في الإنجيلِ صلاحيّةً وقوَّةً \"مُصادِقَةً لذاتِها\" لكلمةِ الإنجيل، حتى بالنسبةِ لأبسطِ الأشخاص. كيفَ يَصِلُ المرءُ إلى إيمانٍ رَاسخٍ وثابتٍ لا يتزعزعُ في إنجيلِ المسيح؟ بالنسبةِ للملايينِ من عامَّةِ الناسِ على مرِّ القرون، الذين لم يَمْتلكوا سبيلاً للوصولِ إلى الحُججِ المنطقيّةِ لعلمِ الدفاعيات، كانَ الإنجيلُ هو الطريقَ إلى ثقةٍ أكيدةٍ ورصينةٍ لا يتزعزعُ في المسيح. كيفَ يمكنُ أن يكونَ هذا؟ وما هو أساسُ مِثْلِ هذا الإيمان؟ أليسَ هو الإعلانَ في الإنجيلِ عن \"مَجْدِ اللهِ المُصادِقِ لذاتِهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ\"؟ إنَّ التأمُّلَ في هذا السؤالِ وبعلاقتِهِ بالعقيدةِ التاريخيّةِ لـ \"الشهادةِ الداخليّةِ للروحِ القدسِ\" سيُسلطُ مزيداً من الضوءِ على قيمة وجمالِ الحقيقةِ القائلةِ بأنَّ مَجْدَ اللهِ هو السُّطوعُ الأسمى للإنجيل.\u003c/p\u003e\n\u003cp\u003eالإِيمَانُ النَّاشِئُ عَنْ شهادةِ الرُّوحِ لَيْسَ اعْتِبَاطِيّاً\u003c/p\u003e\n\u003cp\u003eإنَّ استعلانَ عظمةِ مَجْدِ اللهِ في الإنجيلِ هو أحدُ الأسبابِ التي تَجعلُ الإيمانَ بالإنجيلِ بناءً على الشهادةِ الداخليّةِ للروحِ القدسِ أمراً ليسَ اعتباطيّاً أو غيرَ عقلانيٍّ. فأحياناً عندما نَسمعُ أنَّ الروحَ القدسَ يُمكّننا من الإيمانِ بالإنجيلِ، أو أنَّ الروحَ يَشهدُ لحقِّ الإنجيلِ، يَنشأُ في أذهانِنا تصوُّرٌ بأنَّ صلاحيّةَ الإنجيلِ تعتمدُ على مَعلوماتٍ جديدةٍ يُقدّمها الروحُ. ولكن ليسَ هذا هو المقصودُ بالشهادةِ الداخليّةِ للروحِ. ويمكنُنا أن نَرى ذلكَ من خلالِ الطريقةِ التي فكَّرَ بها كلٌّ من جون كالفن [١] وجوناثان إدواردز في هذا الأمرِ.\u003c/p\u003e\n\u003cp\u003eالرُّوحُ هُوَ مَنْ يُؤيِّدُ الكَلِمَةَ لاَ الكَنِيسَة\u003c/p\u003e\n\u003cp\u003eبينما كانَ جون كالفن يتأمَّلُ في أساسِ ثقتِنا بالإنجيلِ، فزِعَ من كَوْنِ الكنيسةِ الرومانيةِ الكاثوليكيةِ قد جعلتْ سُلطانَ الكلمةِ معتمداً على سُلطانِ الكنيسةِ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«يسودُ خطأٌ خبيثٌ للغايةِ مفادُهُ أنَّ للأسفارِ المقدَّسةِ ثقلاً بقدرِ ما تمنحهُ إيَّاها موافقةُ الكنيسةِ. وكأنَّ حقَّ اللهِ الأزليَّ الذي لا يُنتهكُ يَعتمِدُ على قرارِ بَشرٍ! ... ومع ذلك، إذا كان الأمرُ كذلك، فماذا سيحدثُ للضمائرِ البائسةِ التي تَنشدُ طمأنينةً راسخةً بالحياةِ الأبديّةِ إذا كانتْ كلُّ الوعودِ بها تَقومُ وتعتمدُ فقط على حُكْمِ بَشرٍ؟» [٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eكيفَ لنا إذاً أن نَعرفَ بيقينٍ أنَّ الإنجيلَ هو كلمةُ اللهِ؟ كيفَ نتأكدُ، ليسَ فقط من أنَّ هذهِ الأشياءَ قد حدثتْ، بل من أنَّ المعنى الكتابيَّ الذي أُعطيَ لأحداثِ الإنجيلِ العظيمةِ هو المعنى الحقيقيُّ —معنى الله؟ يُتابعُ كالفن:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إنَّ شهادةَ الروحِ هي أسمى من كلِّ عقلٍ. فكما أنَّ اللهَ وحدهُ هو شاهدٌ كُفؤٌ لذاتِهِ في كلمتِهِ، كذلكَ فإنَّ الكلمةَ لن تَجدَ قَبولاً في قلوبِ البشرِ ما لم تُختمْ بالشهادةِ الداخليّةِ للروحِ. لذا، فإنَّ الروحَ ذاتهُ الذي تَكلَّمَ بأفواهِ الأنبياءِ لا بدَّ أن يَنفذَ إلى قلوبِنا ليُقنعَنا بأنهم أعلنوا بأمانةٍ ما أُمِروا به إلهيّاً... لأنهم يظلونَ متذبذبينَ بينَ شُكوكٍ كثيرةٍ ما لم يُنِر أذهانَهم!» [٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعَظَمَةُ اللهِ الَّتِي لاَ تُخْطِئُهَا العَيْنُ وَالظَّاهِرَةُ فِي الكَلِمَة\u003c/p\u003e\n\u003cp\u003eولكن كيفَ يحدثُ هذا الإقناعُ؟ هل يُخبرُنا الروحُ بحقيقةٍ جديدةٍ —أَيْ هَمْسَةٍ تقولُ: \"هذا الكتابُ حقٌّ\"؟ هل نَسمعُ صوتاً؟ ليستْ هذهِ هي الطريقةُ التي يحدثُ بها الأمرُ. إنَّ مَجْدَ اللهِ في الإنجيلِ لا يحتاجُ إلى شاهدٍ آخرَ من ذلكَ النوعِ. كيفَ تعملُ إذاً الشهادةُ الداخليّةُ للروحِ بالاقترانِ مع مَجْدِ اللهِ في الإنجيلِ؟ ماذا يفعلُ الروحُ؟\u003c/p\u003e\n\u003cp\u003eالإجابةُ ليستْ في أنَّ الروحَ يُعطينا إعلاناً إضافيّاً لِمَا هو مَوجودٌ في الأسفارِ المقدَّسةِ، بل في أنَّهُ يوقظُنا، كما من بينِ الأمواتِ، لنرى ونتذوَّقَ الواقعَ الإلهيَّ لمجدِ المسيحِ في الإنجيلِ. (تذكَّر الرؤيةَ في ٢ كورنثوس ٤ : ٤، ٦). هذهِ الرؤيةُ تُصادِقُ على الإنجيلِ بصفتِهِ كلمةَ اللهِ نفسِهِ. يقولُ كالفن: «إنَّ أبانا السماويَّ، بإعلانِ عَظَمتِهِ [في الإنجيل]، يرفعُ التوقيرَ للأسفارِ المقدَّسةِ فوقَ مَجالِ الجَدَلِ». [٤] هذا هو المفتاحُ عند كالفن: شهادةُ اللهِ للإنجيلِ هي الإعلانُ المُباشرُ والمنيعُ والواهبُ للحياةِ للذهنِ عن عَظَمةِ اللهِ الظاهرةِ في الكلمةِ ذاتِها —وليس في إعلانٍ جديدٍ عنها.\u003c/p\u003e\n\u003cp\u003eلقد اقتربنا من قمة تجربةِ الشهادةِ الداخليّةِ للروحِ. وإليك الكلماتِ التي ستأخذُنا إلى عُمقٍ أكبرَ:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لذلك، وإذِ استَنرنا بقوَّتِهِ [الروح]، فإنَّنا لا نُؤمِنُ بحُكمِنا الخاصِّ ولا بحُكمِ أيِّ شخصٍ آخرَ بأنَّ الأسفارَ المقدَّسةَ هي من اللهِ؛ بل فوقَ الحُكمِ البشريِّ نُؤكدُ بيقينٍ تامٍّ (تماماً كما لو كنَّا نَتفرَّسُ في عَظَمَةِ اللهِ ذاتِهِ) أنَّها تَدفقَتْ إلينا من فمِ اللهِ نفسِهِ بواسطةِ خدمةِ بَشرٍ». [٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eشهادةُ اللهِ هِيَ عَطِيَّةُ الحَيَاةِ، وَبِالتَّالِي الرُّؤْيَة\u003c/p\u003e\n\u003cp\u003eهذا أمر مذهل؛ فهو يقولُ إنَّ اقتناعهُ بعظمةِ اللهِ في الأسفارِ المقدَّسةِ —أَيْ مَجْدَ اللهِ في الإنجيل— لا يَقومُ على أيِّ حُكمٍ بَشريّ، ولا حتى حُكمهِ هو. ماذا يَقصدُ؟ بينما كنتُ أُصارعُ فَهْمَ هذا، سَلَّطتْ كلماتُ الرسولِ يوحنا الضوءَ الأكثرَ فِائدةً على ما يُحاولُ كالفن شرحَهُ. إليكَ الكلماتِ الجوهريّةَ من ١ يوحنا ٥ : ٦-١١:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَالرُّوحُ هُوَ الَّذِي يَشْهَدُ، لأَنَّ الرُّوحُ هُوَ الْحقُّ... إِنْ كُنَّا نَقْبَلُ شَهَادَةَ النَّاسِ، فَشَهَادَةُ اللهِ [= الروح] أَعْظَمُ، لأَنَّ هذِهِ هِيَ شَهَادَةُ اللهِ الَّتِي قَدْ شَهِدَ بِهَا عَنِ ابْنِهِ... وَهذِهِ هِيَ الشَّهَادَةُ: أَنَّ اللهَ أَعْطَانَا حَيَاةً أَبَدِيَّةً، وَهذِهِ الْحَيَاةُ هِيَ فِي ابْنِهِ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبكلماتٍ أخرى، \"شهادةُ اللهِ\"، أي الشهادةُ الباطنيّةُ للروحِ، هي أعظمُ من أيِّ شهادةِ بَشريّةٍ —بما في ذلك، حتى شهادةُ حُكمِنا الخاصّ. وما هي شهادةُ اللهِ تلك؟ هي ليستْ مجردَ كلمةٍ تُسلَّمُ لحُكمِنا للتفكُّرِ فيها، لأنَّ اقتناعَنا حينئذٍ سيعتمدُ على تفكيرِنا نحن. فما هي إذاً؟ الآية ١١ هي المفتاح: «وَهذِهِ هِيَ الشَّهَادَةُ: أَنَّ اللهَ أَعْطَانَا حَيَاةً أَبَدِيَّةً». أفهمُ من ذلكَ أنَّ اللهَ يَشهدُ لنا عن واقعِهِ وواقعِ ابنِهِ والإنجيلِ بإعطائِنا حياةً من بينِ الأمواتِ، حتى نحيا لمجدهِ المُصادِقِ لذاتِهِ في الإنجيلِ. في تلك اللحظةِ، لا نَستنتجُ من مقدماتٍ إلى نتائج؛ بل نرى أنَّنا استيقظنا، ولا يوجدُ حتى حُكْمٌ بَشريٌّ سابقٌ لنتكئَ عليهِ. عندما استيقظَ لعازرُ في القبرِ بدعوةِ أو \"شهادةِ\" المسيحِ، عرفَ دونَ مَنطقٍ أنَّهُ حيٌّ وأنَّ هذه الدعوةَ هي التي أيقظتْهُ.\u003c/p\u003e\n\u003cp\u003eلذا عندما سُئِلَ كالفن عن كيفيّةِ التأكُّدِ من نُبوعِ الإنجيلِ من اللهِ دونَ مَرسمومِ الكنيسةِ، أجابَ بدهشةٍ: «كأنَّ شخصاً يَسألُ: من أينَ سنتعلَّمُ التمييزَ بين النورِ والظلمةِ، والأبيضِ والأسودِ، والحلوِ والمر؟ حقاً، تُظهرُ الأسفارُ المقدَّسةُ دليلاً واضحاً على حقيقةِ ذاتِها تماماً كما تفعلُ الأشياءُ البيضاءُ والسوداءُ بلونها، أو الأشياءُ الحلوةُ والمُرّةُ بطعمِها». [٦]\u003c/p\u003e\n\u003cp\u003eالإِنْجِيلُ المُعَظِّمُ للهِ مُصَادِقٌ لِذَاتِهِ\u003c/p\u003e\n\u003cp\u003eوهكذا، فإنَّ الشهادةَ الداخليّةَ للروحِ القدسِ، التي تُقنعنا بصدقِ الإنجيلِ، ليستْ إضافةَ مَعلوماتٍ جديدةٍ لِمَا هو مَوجودٌ في الإنجيلِ. بل هي نفسُ ما يصفهُ بولس في ٢ كورنثوس ٤ : ٦: «لأَنَّ اللهَ الَّذِي قَالَ: «أَنْ يُشْرِقَ نُورٌ مِنْ ظُلْمَةٍ»، هُوَ الَّذِي أَشْرَقَ فِي قُلُوبِنَا، لإِنَارَةِ مَعْرِفَةِ مَجْدِ اللهِ فِي وَجْهِ يَسُوعَ الْمَسِيحِ». بكلماتٍ أخرى، نحنُ نُمكَّنُ بالروحِ من رؤيةِ ما هو مَوجودٌ بالفعلِ في الإنجيلِ. هناك نورٌ حقيقيٌّ ومجدٌ إلهيٌّ حقيقيٌّ واضح. إنَّهُ يَحملُ مُصادقتَهُ الخاصّةَ.\u003c/p\u003e\n\u003cp\u003eإليكَ الطريقةُ التي يَصيغُ بها جي. آي. باكر [٧] الأمرَ: «يؤكدُ كالفن أنَّ الأسفارَ المقدَّسةَ مُصادِقةٌ لذاتِها من خلالِ الشهادةِ الباطنيّةِ للروحِ القدسِ. ما هي هذه \"الشهادةُ الباطنيّة\"؟ ليستْ نوعاً خاصّاً من الخبرةِ، ولا إعلاناً جديداً خاصّاً، ولا \"قراراً\" وجوديّاً، بل هي عملُ استنارةٍ حيثُ، من خلالِ وسيطِ الشهادةِ اللفظيّةِ [الكلمة]، تَنفتحُ عيونُ الروحِ العمياء، ويتمُّ التعرُّفُ على الحقائقِ الإلهيّةِ والإيمان بها. ويقولُ كالفن إنَّ هذا التعرُّفَ مِحوريٌّ ولا يَقبلُ التحليلَ تماماً مثلَ إدراكِ لونٍ أو طعمٍ بحاسّةِ جسديّةٍ». [٨]\u003c/p\u003e\n\u003cp\u003eبناءً عليه، فإنَّ عقيدةَ الشهادةِ الداخليّةِ للروحِ صحيحةٌ لأنَّ الإنجيلَ هو استعلانُ مَجدِ المسيحِ الذي هو صورةُ اللهِ. فإذا قَلَّلنا من عَظَمةِ اللهِ بصفتِه الخيرَ الأعظمَ في الخبرِ السارّ، فإنَّنا نُجرّدُ الإنجيلَ من أساسِ الإيمانِ المخلِّصِ. ويصبحُ هذا الأمرُ أكثرَ وضوحاً عند جوناثان إدواردز وهو يُصارعُ كيفيّةَ امتلاكِ الأشخاصِ العاديينَ لإيمانٍ لا يتزعزعُ يَصلُ بهم حتى إلى الاستشهادِ.\u003c/p\u003e\n\u003cp\u003eأَسَاسُ إِيمَانِنَا يَجِبُ أَنْ يَكُونَ مَعْقُولاً\u003c/p\u003e\n\u003cp\u003eشارك جوناثان إدواردز كالفن اقتناعهُ بشأنِ أساسِ إيمانِنا بالإنجيلِ؛ وهو مَجْدُ اللهِ الذي تراهُ عيونُ القلبِ كعظمةٍ مُصادِقةٍ لذاتِها. ولكنَّ إدواردز يُشدِّدُ على أنَّ الاقتناعَ بحقِّ الإنجيلِ لا بدَّ أن يكونَ مَعقولاً وروحيّاً في آنٍ واحدٍ. مَجْدُ اللهِ في الإنجيلِ هو المفتاحُ لكليهما. يقولُ إدواردز إنَّ المشاعرَ الدينيّةَ لا قيمةَ لها «ما لم يكن اقتناعُهم اقتناعاً أو يقيناً مَعقولاً». [٩]\u003c/p\u003e\n\u003cp\u003e«أعني باليقينِ المَعقول، يقيناً قائماً على دليلٍ حقيقيّ، أو بناءً على ما يُعدُّ سَبباً صَحيحاً أو أساساً عادلاً لليقينِ. قد يَمتلكُ البشرُ قناعةً قويّةً بأنَّ الدينَ المسيحيَّ حقٌّ، بينما لا تَقومُ قناعتُهم هذهِ على دليلٍ على الإطلاقِ، بل تَماماً على التربيةِ وآراءِ الآخرينَ؛ كما أنَّ الكثيرينَ من المؤمنين بأديان أخرى [١٠] لديهم قناعةُ قويّةٌ بصِدقِ الدينِ الذي يؤمنون به، لأنَّ آباءَهم وجيرانَهم وأمَّتهم يُؤمنونَ بهِ. إنَّ ذلكَ الإيمانَ بحقيقةِ الدينِ المسيحي، المبنيَّ على ذاتِ الأسسِ التي يَقومُ عليها إيمانُ أي شخص آخر بدينه، هو نَفسُ النوعِ من الإيمانِ». [١١]\u003c/p\u003e\n\u003cp\u003eأحدُ اهتماماتي الرئيسيّةِ في كتابةِ هذا الكتابِ هو أنَّ الكثيرينَ يَعترفونَ بالإيمانِ بالمسيحِ بهذهِ الطريقةِ. هذا ليسَ إيماناً مؤسَّساً على مَجدِ المسيحِ ذاتِهِ، بل على التقليدِ أو التعليمِ أو آراءِ الآخرينَ. وإذا كان الأمرُ كذلك، فإنَّ الإيمانَ ليسَ إيماناً مُخلِّصاً.\u003c/p\u003e\n\u003cp\u003eالأسَاسُ المَعْقُولُ لِلإِيمَانِ يَجِبُ أَنْ يَكُونَ رُوحِيّاً\u003c/p\u003e\n\u003cp\u003eلكي يكونَ الإيمانُ وثمرُهُ \"نعمة حقيقية\"، أي مُخلِّصاً، يقولُ إدواردز: «من الضروري، ليسَ فقط أن يكونَ الإيمانُ... مَعقولاً، بل أيضاً أن يكونَ إيماناً أو يقيناً روحيّاً». [١٢] لأنَّ \"السببَ الصحيحَ\" لا بُدَّ أن يَنبعَ من رؤيةٍ روحيّةٍ —أَيْ مُمكَّنةٍ بالروحِ القدس— لمجدِ اللهِ في الإنجيلِ.\u003c/p\u003e\n\u003cp\u003e«إنَّ اليقينَ الروحيَّ بصِدقِ عظمةِ الإنجيلِ، هو ذلكَ اليقينُ الناشئُ عن امتلاكِ مَنظورٍ أو إدراكٍ روحيٍّ لتلكَ الأمورِ في الذهنِ. وهذا واضحٌ أيضاً من الأسفارِ المقدَّسةِ، التي تُصوّرُ غالباً أنَّ الإيمانَ المخلِّصَ بواقعِ وألوهيةِ الأمورِ المعروضةِ والمُقَدَّمةِ لنا في الإنجيلِ، يَنبعُ من إنارةِ روحِ اللهِ للذهنِ». [١٣]\u003c/p\u003e\n\u003cp\u003eويستشهدُ إدواردز بالآية ٦ من ٢ كورنثوس ٤ ويُعلقُ عليها: «لا شيءَ يمكنُ أن يكونَ أوضحَ من أنَّ الإيمانَ المخلِّصَ بالإنجيلِ يُتحدَّثُ عنهُ هنا، بواسطةِ الرسولِ، كنتيجة لإنارةِ الذهنِ لمُعاينةِ المجدِ الإلهيِّ للأمورِ التي يَعرضُها». [١٤]\u003c/p\u003e\n\u003cp\u003eمَجْدُ اللهِ هُوَ مَا تَهْدِفُ أَحْدَاثُ الإِنْجِيلِ وَوُعُودُهُ لإِظْهَارِه\u003c/p\u003e\n\u003cp\u003eوهكذا، يُشدِّدُ كلٌّ من جون كالفن وجوناثان إدواردز على أنَّ الإيمانَ المُخلِّصَ بالإنجيلِ لا بدَّ أن يَقومَ على رؤيةٍ مُمكَّنةٍ بالروحِ لمجدِ اللهِ في وَجْهِ المسيحِ. لذلك، فإنَّ مَجْدَ اللهِ في وَجْهِ المسيحِ —أي مَجْدَ المسيحِ الذي هو صورةُ الله— هو أمرٌ جَوهريٌّ للإنجيلِ. إنَّهُ ليسَ أمراً هامشيّاً أو يمكنُ الاستغناءُ عنهُ. يُسمّي بولسُ الإنجيلَ بـ «إِنْجِيلِ مَجْدِ الْمَسِيحِ». وهذا المجدُ هو ما صُمِّمتْ أحداثُ الإنجيلِ لتكشفَ عنهُ.\u003c/p\u003e\n\u003cp\u003eإنَّ رؤيةَ مَجْدِ اللهِ في المسيحِ في الإنجيلِ أمرٌ جَوهريٌّ للتغيير (التجديد). ويَضغطُ إدواردز بكلِّ قوتِهِ في هذا الصددِ: «عندما يتغيّرُ البشرُ، فإنَّهم يُدعون، كما لو كان الأمرُ، من منطقةٍ إلى أخرى، من منطقةِ الظلمةِ إلى أرضِ النورِ... في التجديد، يُؤتى بهم ليروا الحقائق الروحيّةَ. تلك الأمورُ التي لم يَسمعوا عنها قبلَ ذلك إلا بسماعِ الأذنِ، يُؤتى بهم الآن لرؤيتِها: رؤيةُ اللهِ، ورؤيةُ المسيحِ، ورؤيةُ الخطيةِ والقداسةِ، ورؤيةُ طريقِ الخلاصِ، ورؤيةُ العالَمِ الروحيِّ غيرِ المنظورِ... إنَّهم الآن مُقتنعونَ بكيانِ اللهِ، بطريقةٍ مختلفةٍ عما كانوا عليهِ من قبلُ... ليسَ بمجردِ المَنطقِ [١٦] تُثبَّتُ تلكَ الأمورُ لديهم؛ بل هُم مُقتنعونَ بأنها حقيقة، لأنهم يَرونها كذلكَ». [١٧]\u003c/p\u003e\n\u003cp\u003eوالآن لِنُشدِّد على أنَّ هذهِ الأمورَ الإلهيّةَ الجوهريّةَ تُرى في الإنجيلِ. ففي أحداثِ الإنجيلِ المُتمثلةِ في صَلْبِ المسيحِ وقيامتِهِ يشرقُ مَجْدُ اللهِ بأكبرِ قَدْرٍ من السطوعِ. لذا، من المهمِّ بشكلٍ خاصٍّ أن نُفكّرَ في الإنجيلِ بمصطلحاتِ استعلانِ مَجْدِ اللهِ. يقولُ جوناثان إدواردز: «والآن، فإنَّ مَجْدَ الذاتِ الإلهيّةِ المميَّزَ لهُ أسطعُ ظهورٍ وتجلٍّ في الأمورِ المُعلنة لنا في الإنجيلِ، والعقائدِ المُعَلَّمَةِ فيه، والكلمةِ المنطوقةِ به، والمشوراتِ والأفعالِ والأعمالِ الإلهيّةِ المُعلنةِ فيه». [١٨]\u003c/p\u003e\n\u003cp\u003eإنَّ أهميّةَ رؤيةِ مَجْدِ المسيحِ في الإنجيلِ ستصبحُ أكثرَ وضوحاً وإلحاحاً إذا تأمَّلنا كيفَ تؤثرُ هذه الحقيقةُ على مَهمةِ الكرازةِ والإرساليّاتِ. وهذا هو موضوعُ الفصلِ القادمِ.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003e[الهوامش]\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e[١] فيمَا يلي، أعتمدُ على ما كتبتهُ في \"The Divine Majesty of the Word\" في كتاب The Legacy of Sovereign Joy (Wheaton, Ill.: Crossway Books, 2000), 115-142.\u003c/p\u003e\n\u003cp\u003e[٢] John Calvin, Institutes of the Christian Religion, 2 vols., ed. John T. McNeill, trans. Ford Lewis Battles (Philadelphia: Westminster Press, 1960), 1:75 (I.vii.1).\u003c/p\u003e\n\u003cp\u003e[٣] المرجع السابق، ٧٩ (I.vii.4).\u003c/p\u003e\n\u003cp\u003e[٤] المرجع السابق، ٩٢ (I.viii.13).\u003c/p\u003e\n\u003cp\u003e[٥] المرجع السابق، ٨٠ (I.vii.5).\u003c/p\u003e\n\u003cp\u003e[٦] المرجع السابق، ٧٦ (I.vii.2).\u003c/p\u003e\n\u003cp\u003e[٧] جي. آي. باكر: لاهوتي بريطاني-كندي إصلاحي، مؤلف \"معرفة الله\".\u003c/p\u003e\n\u003cp\u003e[٨] J. I. Packer, “Calvin the Theologian,” in John Calvin: A Collection of Essays (Grand Rapids, Mich.: Eerdmans, 1966), 166.\u003c/p\u003e\n\u003cp\u003e[٩] Jonathan Edwards, Religious Affections, in The Works of Jonathan Edwards, ed. John E. Smith, vol. 2 (New Haven, Conn.: Yale University Press, 1959), 295.\u003c/p\u003e\n\u003cp\u003e[١٠] \"المحمدي\" (Mahometan) هو مصطلح تاريخي قديم للإشارة إلى المسلم، استخدمه إدواردز في سياق المقارنة.\u003c/p\u003e\n\u003cp\u003e[١١] Edwards, Religious Affections, 295.\u003c/p\u003e\n\u003cp\u003e[١٢] المرجع السابق.\u003c/p\u003e\n\u003cp\u003e[١٣] المرجع السابق، ٢٩٦.\u003c/p\u003e\n\u003cp\u003e[١٤] المرجع السابق، ٢٩٨.\u003c/p\u003e\n\u003cp\u003e[١٥] يستشهدُ إدواردز بـ لوقا ١٠ : ٢١-٢٢؛ يوحنا ٦ : ٤٠؛ ١٧ : ٦-٨؛ متى ١٦ : ١٦-١٧؛ غلاطية ١ : ١٤-١٦. المرجع السابق، ٢٩٧.\u003c/p\u003e\n\u003cp\u003e[١٦] \"المَنطق\" (ratiocination) هنا معناه أن الحُجَّة واحدة والدليل مباشر عبر المجد الإلهي. المرجع السابق، ٢٩٨.\u003c/p\u003e\n\u003cp\u003e[١٧] Jonathan Edwards, “Christians a Chosen Generation,” in Works, vol. 17, ed. Mark Valeri (New Haven, Conn.: Yale University Press, 1999), 322.\u003c/p\u003e\n\u003cp\u003e[١٨] Edwards, Religious Affections, 300.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhLYIFc5QcgsW022_aDn-p4JZkgtSbCR8qY8R4orKxTKcOqDIiyvjp7CuZ6E8CiAYrjs_FQcaa7UJHK-7VUjMp5PhR2H8HLssGq6QOWzsCgw3sj9BiK7MB_8wFXvgJMYw_-8syAV2vtDNqpBDQAy5192vNJ9mh7epcm5D_bP1YefSXbGLpREKXa791vaq4/s2752/05.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhLYIFc5QcgsW022_aDn-p4JZkgtSbCR8qY8R4orKxTKcOqDIiyvjp7CuZ6E8CiAYrjs_FQcaa7UJHK-7VUjMp5PhR2H8HLssGq6QOWzsCgw3sj9BiK7MB_8wFXvgJMYw_-8syAV2vtDNqpBDQAy5192vNJ9mh7epcm5D_bP1YefSXbGLpREKXa791vaq4/s600/05.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"3e:Taa30,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الثالث: الإنجيل - \"هوذا إلهكم!\"\u003c/h2\u003e\n\u003cp\u003eفي الفصل السابق، استعرضنا المعنى الكتابي الأوسع للإنجيل؛ وقد اشتمل ذلك على وجود الإله الحي، ودخوله إلى التاريخ بسلطان سيادي على كل الأشياء، بصفته ملك إسرائيل المنتظر منذ أمد بعيد ورب الكون. هذا الملك هو يسوع المسيح، المسيا، والمخلص؛ الذي تمم رجاء العهد القديم في \"ابن داود\"، ومات من أجل خطايانا، وقُبر، وقام ثانية منتصراً على الشيطان والموت والجحيم. لقد وعد بأن يكون روحه القدوس معنا ليعيننا. وبناءً على موته وقيامته، يَعد الإنجيل بخلاص عظيم: شفاء نهائي من الأمراض، وتحرر من الظلم، وسلام مع الله ومع الآخرين المؤمنين، وتبرير بالإيمان بمعزل عن أعمال الناموس، وغفران الخطايا، وتغيير إلى صورة المسيح، وحياة أبدية، واحتواء عالمي لكل الشعوب من جميع الأمم في هذا الخلاص.\u003c/p\u003e\n\u003cp\u003eتألم المسيح لكي يقربنا إلى الله\u003c/p\u003e\n\u003cp\u003eغير أن النقطة الجوهرية التي طرحناها هي أن الخير النهائي والأسمى للإنجيل ليس مشمولاً في تلك المجموعة من عطايا الإنجيل. إن هدفي في هذا الكتاب هو أن أوضح قدر استطاعتي أن الوعاظ يمكنهم الوعظ بهذه الجوانب العظيمة للإنجيل، ومع ذلك لا يقودون الناس أبداً إلى هدف الإنجيل. يمكن للوعاظ أن يقولوا العشرات من الأمور الحقيقية والرائعة عن الإنجيل دون أن يوجهوا الناس إلى حيث يقود الإنجيل.\u003c/p\u003e\n\u003cp\u003eيمكن للناس أن يسمعوا الإنجيل يُكرز به، أو يقرأوه في أناجيلهم، دون أن يدركوا الغاية النهائية للإنجيل التي تجعل الخبر السار ساراً حقاً. إن ما يجعل كل أحداث \"الجمعة العظيمة\" والقيامة، وكل الوعود التي تضمنها، أخباراً سارة هو أنها تقودنا إلى الله.\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَإِنَّ الْمَسِيحَ أَيْضاً تَأَلَّمَ مَرَّةً وَاحِدَةً مِنْ أَجْلِ الْخَطَايَا، الْبَارُّ مِنْ أَجْلِ الأَثَمَةِ، لِكَيْ يُقَرِّبَنَا إِلَى اللهِ» (١ بطرس ٣ : ١٨).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوعندما نصل إلى هناك، فإن الله ذاته هو من سيُشبع نفوسنا إلى الأبد. وكل شيء آخر في الإنجيل مقصود به إظهار مجد الله وإزالة كل عقبة فيه (مثل غضبه على الخطية) وفينا (مثل تمردنا) حتى نتمكن من الابتهاج به إلى الأبد. الله هو الإنجيل؛ أي أنه هو ما يجعل الخبر السار ساراً. ولا يمكن لأي شيء أقل من ذلك أن يجعل الإنجيل خبراً ساراً. إن الله هو العطية النهائية والعليا التي تجعل الخبر السار ساراً، وإلى أن يستخدم الناس الإنجيل للوصول إلى الله، فإنهم يستخدمونه بشكل خاطئ.\u003c/p\u003e\n\u003cp\u003eالتبرير يتعامل مع أعظم مشكلاتنا\u003c/p\u003e\n\u003cp\u003eقبل أن نقدم الأدلة الكتابية لهذا الادعاء، دعوني أحاول إظهار كيف يمكن لبعض أكثر
