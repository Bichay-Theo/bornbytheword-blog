ث الأول. لقد كان، ولا يزال، من الصحيح القول إن الباروسيا قريب — والواقع أن هذا، بعيدا عن كونه خطأ محرجا من جانب يسوع أو الكنيسة الأولى، هو جزء أساسي من إيمان الكنيسة. فمنذ التجسد والناس يعيشون في الأيام الأخيرة.\u003ca href=\"#ch14-fn-2\"\u003e[٢]\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003ch3\u003eإبطاء ليس بإبطاء\u003c/h3\u003e\n\u003cp\u003eإن جذور التفكير الشمولي حول الأحداث المستقبلية تمتد في العهد القديم. فمرارا وتكرارا، تحدث الأنبياء عن يوم الرب على أنه \"قريب\" بينما كانوا في الواقع يرون أحداثا تفصل بينها فترات زمنية غير معلومة. لقد كانوا يتحدثون شموليا. كانوا يرون القريب والبعيد كشيء واحد:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلْوِلُوا لأَنَّ يَوْمَ الرَّبِّ قَرِيبٌ، قَادِمٌ كَخَرَابٍ مِنَ الْقَادِرِ عَلَى كُلِّ شَيْءٍ.» [إشعياء ١٣ : ٦]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«جَمَاهِيرُ جَمَاهِيرُ فِي وَادِي الْقَضَاءِ، لأَنَّ يَوْمَ الرَّبِّ قَرِيبٌ فِي وَادِي الْقَضَاءِ.» [يوئيل ٣ : ١٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَإِنَّهُ قَرِيبٌ يَوْمُ الرَّبِّ عَلَى كُلِّ الأُمَمِ. كَمَا فَعَلْتَ يُفْعَلُ بِكَ. عَمَلُكَ يَرْتَدُّ عَلَى رَأْسِكَ.» [عوبديا ١ : ١٥]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«قَرِيبٌ يَوْمُ الرَّبِّ الْعَظِيمِ. قَرِيبٌ وَسَرِيعٌ جِدًّا.» [صفنيا ١ : ١٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوإن جربنا القول بأن هذه الوعود غير دقيقة لأن جوانب من يوم الرب قد تباطأت، فإن حبقوق يقدم لنا ما يلجم افتراضنا. لقد تكلم الرب على لسان حبقوق بكلمات تحذرنا من التحدث بغير حكمة عن أن عمل الرب يتباطأ. فقال:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّ الرُّؤْيَا بَعْدُ إِلَى الْمِيعَادِ، وَفِي النِّهَايَةِ تَتَكَلَّمُ وَلاَ تَكْذِبُ. إِنْ تَوَانَتْ فَانْتَظِرْهَا لأَنَّهَا سَتَأْتِي إِتْيَانًا وَلاَ تَتَأَخَّرُ.» [حبقوق ٢ : ٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eمن الأمور الملفتة للنظر في هذه الكلمات أنها تقر بإبطاء من وجهة نظر معينة، وهو ليس بإبطاء من وجهة نظر أخرى. فالترجمة الحرفية تقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eلأن الرؤيا بعد إلى الميعاد؛ تسرع نحو الغاية ولا تكذب. إن توانت [אִם־יִתְמַהְמָה֙ - im yitmahmah - Though it tarries]، فانتظرها؛ لأنها ستأتي إتيانا، ولن تتأخر [לֹ֥א יְאַחֵֽר - lo ye'acher - It will not delay]. [حبقوق ٢ : ٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eقد تتوانى. ولكنها لن تتأخر. قد تتوانى، ولكنها لن تتوانى (هكذا تترجمها نسخة الملك جيمس: \"وإن توانت فانتظرها؛ لأنها ستأتي إتيانا، ولن تتوانى\"). وفي الواقع، في توانيها هذا، هي تسرع نحو الغاية. فماذا تعني هذه التصريحات المتناقضة ظاهريا؟ أعتقد أنها تعني أنه من منظور الإنسان، قد يبدو وصول مستقبل الله بطيئا. ولكن من منظور الله، فإنه موقوت بدقة بالغة لدرجة أنه يمكن القول إنه يسرع (على الرغم من البطء المتصور)؛ والواقع أنه لا يوجد أي تأخير على الإطلاق.\u003c/p\u003e\n\u003cp\u003eعندما نظر الأنبياء والرسل شموليا إلى مستقبل الله، علموا أن كل جزء مما رأوه كان له \"ميعاد\"، وأنه كان يسرع نحو الغاية. قد يبدو، من وجهة نظر بشرية، أنه يتوانى، ولكنه في الحقيقة لم يكن يتوانى. بل كان — ولا يزال — قريبا. قريبا شموليا.\u003c/p\u003e\n\u003ch3\u003eقريب إلهيا\u003c/h3\u003e\n\u003cp\u003eثالثا، يقصد الرسل أن يسوع قريب إلهيا.\u003c/p\u003e\n\u003cp\u003eأي أنه من المنظور الإلهي، فإن الوقت بين مجيء يسوع الأول ومجيئه الثاني هو وقت قصير جدا. يطرح الرسول بطرس هذا المعنى لكلمة قريب في رده على المستهزئين الذين سخروا، في أيامه، من حقيقة مرور وقت طويل دون رجوع الرب. فهو يقول:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«عَالِمِينَ هذَا أَوَّلاً: أَنَّهُ سَيَأْتِي فِي آخِرِ الأَيَّامِ قَوْمٌ مُسْتَهْزِئُونَ، سَالِكِينَ بِحَسَبِ شَهَوَاتِ أَنْفُسِهِمْ، وَقَائِلِينَ: «أَيْنَ هُوَ مَوْعِدُ مَجِيئِهِ؟ لأَنَّهُ مِنْ حِينَ رَقَدَ الآبَاءُ كُلُّ شَيْءٍ بَاق هكَذَا مِنْ بَدْءِ الْخَلِيقَةِ».» [بطرس الثانية ٣ : ٣-٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبعد تذكير المستهزئين بأن التاريخ ليس راكدا كما يظنون (في ضوء الخليقة والطوفان والدينونة الأخيرة، [بطرس الثانية ٣ : ٥-٧])، يطرح بعد ذلك الأساس لما أسميه قريب إلهيا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَلكِنْ لاَ يَخْفَ عَلَيْكُمْ هذَا الشَّيْءُ الْوَاحِدُ أَيُّهَا الأَحِبَّاءُ: أَنَّ يَوْمًا وَاحِدًا عِنْدَ الرَّبِّ كَأَلْفِ سَنَةٍ، وَأَلْفَ سَنَةٍ كَيَوْمٍ وَاحِدٍ. لاَ يَتَبَاطَأُ الرَّبُّ عَنْ وَعْدِهِ كَمَا يَحْسِبُ قَوْمٌ التَّبَاطُّؤَ، لكِنَّهُ يَتَأَنَّى عَلَيْنَا، وَهُوَ لاَ يَشَاءُ أَنْ يَهْلِكَ أُنَاسٌ، بَلْ أَنْ يُقْبِلَ الْجَمِيعُ إِلَى التَّوْبَةِ.» [بطرس الثانية ٣ : ٨-٩]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيوجه العدد ٩ رسالته إلى موقفنا ومفرداتنا: لا تطلقوا على إبطاء الله الهادف اسم \"تباطؤ\". أطلقوا عليه \"تأن\" (أو طول أناة). لا تستهزئوا بتوقيت الله وكأن وعده بالمجيء السريع كان خرافة [بطرس الثانية ١ : ١٦]. بل عوضا عن ذلك، اشكروا لأن وعده بالرحمة وطول الأناة يجري إتمامه على أكمل وجه.\u003ca href=\"#ch14-fn-3\"\u003e[٣]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eولسند تحذيره بشأن موقفنا ومفرداتنا، يطرح بطرس مفهوم \"قريب إلهيا\": «أَنَّ يَوْمًا وَاحِدًا عِنْدَ الرَّبِّ كَأَلْفِ سَنَةٍ، وَأَلْفَ سَنَةٍ كَيَوْمٍ وَاحِدٍ.» ولفهم قوة هذه الفكرة بالكامل، قد يحسب أحد المستهزئين الأمر هكذا: بافتراض أن بطرس كتب هذه الرسالة بعد ثلاثين عاما من صعود يسوع إلى السماء، فإن تلك الأعوام الثلاثين تمثل ٣ بالمائة من ألف عام. وبما أن ألف عام هي \"كَيَوْمٍ وَاحِدٍ\"، فهذا يعني أن ٠.٧٢ ساعة (٠.٠٣ × ٢٤ ساعة في اليوم) قد مرت منذ رحيل يسوع. خمس وأربعون دقيقة ليست تأخيرا طويلا. أو، من منظور القرن الحادي والعشرين، فإن يومين ليسا تأخيرا طويلا.\u003c/p\u003e\n\u003cp\u003eوجوهريا، يطرح بطرس سر علاقة الله بالزمن. فالكتاب المقدس ليس كتابا تمهيديا في نظرية النسبية لأينشتاين. وهو لا يغوص في العلاقة العلمية بين المكان والزمان.\u003ca href=\"#ch14-fn-4\"\u003e[٤]\u003c/a\u003e غير أن بولس يقول بعبارة مثيرة للتأمل: «الَّتِي سَبَقَ اللهُ فَعَيَّنَهَا قَبْلَ الدُّهُورِ [الأزمنة] لِمَجْدِنَا» [كورنثوس الأولى ٢ : ٧]؛ (راجع [تيموثاوس الثانية ١ : ٩]؛ [تيطس ١ : ٢]). وبعبارة أخرى، بمعنى ما، كان الله موجودا قبل \"الدهور\"، أي قبل الزمن. ويوحي لنا بطرس بأن هذه العلاقة السرية بين الله والزمن ينبغي أن تجعلنا بطيئين في الاستهزاء بتوقيت نبواته. فإذا قال يسوع والرسل إن مجيء المسيح \"قريب\" أو \"اقترب\" أو \"على الأبواب\" أو \"سريعا\"، وهم يقرون بأنهم لا يعلمون متى سيأتي، فينبغي لنا أن ندرك حقيقة أن المنظور الإلهي هو جزء مما يمنح كلماتهم معناها. فيسوع قريب إلهيا.\u003c/p\u003e\n\u003ch3\u003eظهوره قريب بثلاثة معان على الأقل\u003c/h3\u003e\n\u003cp\u003eلذلك أستنتج أنه إذا أخذنا بعين الاعتبار المؤشرات التي يقدمها لنا يسوع والرسل، فلن نلومهم لحديثهم عن مجيء الرب بأنه قريب أو سريع أو اقترب. وسنأخذ بعين الاعتبار الفرضية المتفق عليها بأن أيا منهم لم يكن يعلم متى سيرجع يسوع. ومع وضع هذا المؤشر نصب أعيننا، سننتبه لتحذير يسوع ضد أي افتراض بالإبطاء كموقف خطير [متى ٢٤ : ٤٨]؛ (وما يوازيه في [لوقا ١٢ : ٤٥])، وسنستنتج أن المجيء الثاني قريب إمكانيا. وسننتبه للمنظور النبوي في العهدين القديم والجديد الذي يرى \"الأيام الأخيرة\" (بما في ذلك مجيء المسيح الأول والثاني) ككل موحد قد بدأ بالفعل، وسنستنتج أن يسوع قريب شموليا. وسنأخذ تذكير بطرس على محمل الجد بأن ألف سنة عند الله كَيَوْمٍ وَاحِدٍ، وسنستنتج أن يسوع قريب إلهيا.\u003c/p\u003e\n\u003cp\u003eوهو ما يقودنا الآن إلى التساؤل: ما الذي تقتضيه هذه النظرة للقرب، إن كان لها أي مقتضى، بشأن ما إذا كان يسوع قد يأتي في أية لحظة؟ وهذا هو محور الفصول ١٥-١٧.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch14-ref-1\"\u003e[١]\u003c/a\u003e. انظر الفصل الثامن، الهامش ١.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch14-ref-2\"\u003e[٢]\u003c/a\u003e. سي. إي. بي. كرانفيلد، الإنجيل بحسب القديس مرقس (كامبريدج، المملكة المتحدة: مطبعة جامعة كامبريدج، ١٩٥٩)، ٤٠٨.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch14-ref-3\"\u003e[٣]\u003c/a\u003e. إن فهمي للتصريح القائل بأن الله «يَتَأَنَّى عَلَيْنَا، وَهُوَ لاَ يَشَاءُ أَنْ يَهْلِكَ أُنَاسٌ، بَلْ أَنْ يُقْبِلَ الْجَمِيعُ إِلَى التَّوْبَةِ.» [بطرس الثانية ٣ : ٩] هو أن عبارة \"عَلَيْنَا\" تعني عليكم أنتم المؤمنين، وضمنيا، جميع المؤمنين — جميع المختارين [بطرس الثانية ١ : ١٠]. ولذلك، فإن كلمة \"أُنَاسٌ\" (أو أيٌّ Any في الإنجليزية) في عبارة \"لاَ يَشَاءُ أَنْ يَهْلِكَ أُنَاسٌ\" تتحدد بمعاني كلمات \"الله يتأنى علينا\". ومن هنا، فإن الله \"لا يشاء أن يهلك أيٌّ [منكم]\" — أي \"أيٌّ منكم أيها المختارون\". فالمعضلة في تفسير قصد بطرس على أن الله يؤخر المجيء الثاني لأنه يشاء أن يخلص جميع البشر هي أنه كلما تأخر المجيء، كلما هلك أناس أكثر، لأنه في كل جيل هناك الكثيرون ممن لا يتوبون. والله ليس جاهلا بهذه الحقيقة. ولذلك، فإن منطق العدد سينهار لو كان يقصد \"جميع البشر\"، لأن منطق العدد هو أن الإبطاء يعود إلى الرغبة الإلهية في ألا يهلك أحد.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch14-ref-4\"\u003e[٤]\u003c/a\u003e. يشير بن ويذرنجتون إلى أن نظرية النسبية ينبغي، على الأقل، أن تجعلنا متواضعين وتمنعنا من استخدام إدراكنا الهش لمعنى الزمن لإصدار أحكام على النبوات الكتابية: \"يشير العديد من العلماء إلى أن 'الزمن، في الواقع، مرن ويمكن تمديده وتقليصه بالحركة'. ليس هذا فحسب، بل 'إن الزمن يمر حقا بشكل أسرع في الفضاء، حيث تكون جاذبية الأرض أضعف'. باختصار، الزمان والمكان والجاذبية أمور مترابطة ومعتمدة على بعضها البعض... والآن، هذا في حد ذاته يجب أن يدفعنا جميعا للتوقف والتأمل. فإدراكنا الخاص لمرور الزمن أو حساب الزمن لا يمثل أساسا صلبا أو موثوقا لإصدار حكم واثق حول صحة المفاهيم الأخروية التي علمها يسوع وبولس... إن ما تعلمناه عن الزمن من نظرية النسبية مقترنا باستكشاف الفضاء يشير إلى أنه بما أن الزمان والمكان والجاذبية أمور مترابطة، ومهما كان ما قد يقال خلاف ذلك، فإن الأبدية أو السماء لابد أن تكون مختلفة تماما عن الأرض فيما يتعلق بمسألة الزمن برمتها. وقد يثبت أيضا أنه من الحق أن الكاتب الكتابي قد قال أكثر مما أدرك عندما أشار إلى أن 'يَوْمًا وَاحِدًا عِنْدَ الرَّبِّ كَأَلْفِ سَنَةٍ، وَأَلْفَ سَنَةٍ كَيَوْمٍ وَاحِدٍ' [بطرس الثانية ٣ : ٨].\" بن ويذرنجتون الثالث، يسوع وبولس ونهاية العالم: دراسة مقارنة في أخرويات العهد الجديد (داونرز جروف، إلينوي: مطبعة إنترڤارسيتي، ١٩٩٢)، ٢٣٣-٣٤.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh-2RAHvbW5c8Wmn8r44gLvDcbyldH2FyAWXnMALespwCDax6meibhphpoNGR-7siqMoh4dZ7qkEuhdYDnJ9YsbPXdhsP7e4aLVEpvIpHY0mdwAh2zjwrt5jLKWnDdt6McUlQibjbU-Cdz_71Cz5DO8osRT1Xgc4QhmkH1pFDB69QxkJL_K5wwa-PR4F2c/s2752/%D8%A7%D9%84%D8%A3%D8%A8%D8%B9%D8%A7%D8%AF_%D8%A7%D9%84%D8%AB%D9%84%D8%A7%D8%AB%D8%A9_%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD_%D8%B3%D8%B1%D9%8A%D8%B9%D8%A7%D9%8B.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh-2RAHvbW5c8Wmn8r44gLvDcbyldH2FyAWXnMALespwCDax6meibhphpoNGR-7siqMoh4dZ7qkEuhdYDnJ9YsbPXdhsP7e4aLVEpvIpHY0mdwAh2zjwrt5jLKWnDdt6McUlQibjbU-Cdz_71Cz5DO8osRT1Xgc4QhmkH1pFDB69QxkJL_K5wwa-PR4F2c/s600/%D8%A7%D9%84%D8%A3%D8%A8%D8%B9%D8%A7%D8%AF_%D8%A7%D9%84%D8%AB%D9%84%D8%A7%D8%AB%D8%A9_%D9%84%D9%85%D8%AC%D9%8A%D8%A1_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD_%D8%B3%D8%B1%D9%8A%D8%B9%D8%A7%D9%8B.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"19:T8062,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالجزء الثاني\u003c/h2\u003e\n\u003cp\u003eوقت ظهوره\u003cbr\u003e\nمقدمة للجزء الثاني\u003cbr\u003e\nالوقت ومحبة ظهور المسيح\u003c/p\u003e\n\u003cp\u003eإن السؤال الذي أحاول الإجابة عليه في الجزء الثاني هو: كيف ينبغي لنا أن نفكر بشأن وقت ظهور يسوع؟ وما يوجهني هو سؤال محدد: ما مدى أهمية هذا الأمر في مساعدتنا على محبة ظهور الرب؟ بالطبع، قد لا تتطابق أحكامي حول هذا السؤال مع أحكامكم. غير أنني آمل أن تكون مفيدة، بقدر ما تبلغه.\u003c/p\u003e\n\u003cp\u003eإن محبة ظهور المسيح تتعمق لا برؤية أسباب ما يجعله رائعا فحسب، بل وأيضا بتذليل العقبات وتصحيح المفاهيم الخاطئة. ومن باب القياس، تتعمق محبتي لزوجتي بتذكر صفاتها الشخصية الثمينة، ولكن أيضا بفهم أعمق للرسالة التي قد تكتبها إن كانت (مثل يسوع) ستمضي بعيدا لفترة طويلة.\u003c/p\u003e\n\u003cp\u003eسأحاول أن أقول ما يكفي لكيلا تتعطل محبتنا لمجيء المسيح بسبب حيرة مفرطة حول متى سيأتي. وأقول حيرة مفرطة لأنني أعتقد أن بعض الحيرة حول التعليم الكتابي بشأن وقت مجيء الرب هو أمر حتمي. أقول هذا كملاحظة من خبرتي ومن قراءتي لتاريخ التفسير.\u003c/p\u003e\n\u003cp\u003eعلى حد علمي، لم أتحدث قط إلى أي مسيحي — عالما كان أم عاميا — إلا وكان في حيرة من أمره بشأن نص كتابي ما حول المجيء الثاني. ولا أرى أي فترة في تاريخ الكنيسة كان فيها إجماع على تحديد العلامات التي تسبق المجيء الثاني أو على الإطار الزمني للأحداث المرتبطة بالمجيء الثاني نفسه. من الناحية العملية، إذن، يبدو لي أنه ينبغي علي أن أحاول قول ما من شأنه مساعدتنا على محبة رجوع الرب، ومساعدتنا على أن نعيش حياتنا بنوع اليقظة والترقب الذي يمدحه الكتاب المقدس.\u003c/p\u003e\n\u003cp\u003eلذا فإن الأسئلة الثلاثة التي سأحاول الإجابة عليها في الجزء الثاني هي: ١. هل علّم يسوع بأنه سيرجع في غضون جيل واحد؟ ٢. ماذا يقصد العهد الجديد بأن يسوع سيأتي سريعا؟ ٣. هل يُعلّم العهد الجديد بأن يسوع قد يأتي في أية لحظة؟\u003c/p\u003e\n\u003ch2\u003eهل علّم يسوع بأنه سيرجع في غضون جيل واحد؟\u003c/h2\u003e\n\u003cp\u003eسيكون من الصعب أن نحب ظهور المسيح لو كان مقيدا أخلاقيا بوعده بمجيئه ضمن إطار زمني كان يجهله. انتبهوا جيدا لكيفية طرحي للمعضلة. أنا لا أسأل في المقام الأول عما إذا كان يسوع قد ارتكب خطأ. فذلك بحد ذاته سيكون سيئا بما فيه الكفاية. بل أسأل عما إذا كان خطؤه يستوجب اللوم الأخلاقي. بعبارة أخرى، ليس السؤال مجرد: \"هل أخطأ في توقيت رجوعه؟\" بل: \"هل تجاسر وتنبأ بما لم يكن في وضع يسمح له بالتنبؤ به؟\"\u003c/p\u003e\n\u003cp\u003eأطرح المعضلة على هذا النحو بسبب ما يقوله يسوع في [متى ٢٤ : ٣٦]، وهي واحدة من أهم الجمل في الكتاب المقدس حول وقت المجيء الثاني: «وَأَمَّا ذلِكَ الْيَوْمُ وَتِلْكَ السَّاعَةُ فَلاَ يَعْلَمُ بِهِمَا أَحَدٌ، وَلاَ مَلاَئِكَةُ السَّمَاوَاتِ، إِلاَّ أَبِي وَحْدَهُ». ومما لا شك فيه أنه من الأسرار الغامضة أن يجهل يسوع، الإله-الإنسان، أمرا يعلمه الله الآب. غير أن هذا هو ما قاله. مما يعني أنه لو تنبأ بوقت مجيئه وهو لا يعلم وقته، فهو أمر غير أخلاقي. وسيكون من الصعب محبة ظهوره.\u003c/p\u003e\n\u003cp\u003eهناك ثلاثة نصوص من الكتاب المقدس (مع شواهدها الموازية) تثير هذا السؤال. وسأتناولها واحدا تلو الآخر.\u003c/p\u003e\n\u003ch3\u003eبعضهم لا يذوقون الموت قبل أن يروا مجيئه\u003c/h3\u003e\n\u003cp\u003eأولا هو التنبؤ بمجيء المسيح قبل أن يذوق بعض معاصريه الموت. وهو يرد في كل إنجيل من الأناجيل الثلاثة الأولى:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«اَلْحَقَّ أَقُولُ لَكُمْ: إِنَّ مِنَ الْقِيَامِ ههُنَا قَوْمًا لاَ يَذُوقُونَ الْمَوْتَ حَتَّى يَرَوُا ابْنَ الإِنْسَانِ آتِيًا فِي مَلَكُوتِهِ. وَبَعْدَ سِتَّةِ أَيَّامٍ أَخَذَ يَسُوعُ بُطْرُسَ وَيَعْقُوبَ وَيُوحَنَّا أَخَاهُ وَصَعِدَ بِهِمْ إِلَى جَبَل عَال مُنْفَرِدِينَ.» [متى ١٦ : ٢٨ - ١٧ : ١]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَقَالَ لَهُمُ: «الْحَقَّ أَقُولُ لَكُمْ: إِنَّ مِنَ الْقِيَامِ ههُنَا قَوْمًا لاَ يَذُوقُونَ الْمَوْتَ حَتَّى يَرَوْا مَلَكُوتَ اللهِ قَدْ أَتَى بِقُوَّةٍ». وَبَعْدَ سِتَّةِ أَيَّامٍ أَخَذَ يَسُوعُ بُطْرُسَ وَيَعْقُوبَ وَيُوحَنَّا، وَصَعِدَ بِهِمْ إِلَى جَبَل عَال مُنْفَرِدِينَ وَحْدَهُمْ. وَتَغَيَّرَتْ هَيْئَتُهُ قُدَّامَهُمْ.» [مرقس ٩ : ١-٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«حَقًّا أَقُولُ لَكُمْ: إِنَّ مِنَ الْقِيَامِ ههُنَا قَوْمًا لاَ يَذُوقُونَ الْمَوْتَ حَتَّى يَرَوْا مَلَكُوتَ اللهِ. وَبَعْدَ هذَا الْكَلاَمِ بِنَحْوِ ثَمَانِيَةِ أَيَّامٍ، أَخَذَ بُطْرُسَ وَيُوحَنَّا وَيَعْقُوبَ وَصَعِدَ إِلَى جَبَل لِيُصَلِّيَ.» [لوقا ٩ : ٢٧-٢٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفي هذه النصوص الثلاثة، وحده [متى ١٦ : ٢٨] يذكر المجيء الثاني صراحة («حَتَّى يَرَوُا ابْنَ الإِنْسَانِ آتِيًا»). ويشير مرقس ولوقا فقط إلى مجيء الملكوت. ولكن جميعهم يشيرون على الأرجح إلى الحدث ذاته. تقول الأناجيل الثلاثة كلها إن مجيء الملكوت سيراه «قَوْمًا» من «الْقِيَامِ ههُنَا» قبل أن يذوقوا الموت. ثم، في جميع الأناجيل الثلاثة، يتبع هذا القول تجلي يسوع على الجبل.\u003c/p\u003e\n\u003ch3\u003eالجبل حيث رأوا\u003c/h3\u003e\n\u003cp\u003eتلك الحقيقة — المتمثلة في التجاور بين كلمات يسوع والتجلي — هي أمر بالغ الأهمية لفهم ما قصده يسوع. أعتقد أنه قصد أن بطرس ويعقوب ويوحنا لن يذوقوا الموت قبل أن يروا على الجبل لمحة مسبقة للمجيء الثاني للمسيح. فهؤلاء هم الثلاثة الذين صعدوا معه إلى الجبل. واعتبر يسوع إعلان جلاله ومجده على الجبل بمثابة إرهاص لمجيئه في انقضاء هذا الدهر:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَتَغَيَّرَتْ هَيْئَتُهُ قُدَّامَهُمْ، وَأَضَاءَ وَجْهُهُ كَالشَّمْسِ، وَصَارَتْ ثِيَابُهُ بَيْضَاءَ كَالنُّورِ. وَإِذَا مُوسَى وَإِيلِيَّا قَدْ ظَهَرَا لَهُمْ يَتَكَلَّمَانِ مَعَهُ. فَجَعَلَ بُطْرُسُ يَقُولُ لِيَسُوعَ: «يَارَبُّ، جَيِّدٌ أَنْ نَكُونَ ههُنَا! فَإِنْ شِئْتَ نَصْنَعْ هُنَا ثَلاَثَ مَظَالَّ: لَكَ وَاحِدَةً، وَلِمُوسَى وَاحِدَةً، وَلإِيلِيَّا وَاحِدَةً». وَفِيمَا هُوَ يَتَكَلَّمُ إِذَا سَحَابَةٌ نَيِّرَةٌ ظَلَّلَتْهُمْ، وَصَوْتٌ مِنَ السَّحَابَةِ قَائِلٌ: «هذَا هُوَ ابْنِي الْحَبِيبُ الَّذِي بِهِ سُرِرْتُ. لَهُ اسْمَعُوا». وَلَمَّا سَمِعَ التَّلاَمِيذُ سَقَطُوا عَلَى وُجُوهِهِمْ وَخَافُوا جِدًّا. فَجَاءَ يَسُوعُ وَلَمَسَهُمْ وَقَالَ: «قُومُوا، وَلاَ تَخَافُوا». فَرَفَعُوا أَعْيُنَهُمْ وَلَمْ يَرَوْا أَحَدًا إِلاَّ يَسُوعَ وَحْدَهُ.» [متى ١٧ : ٢-٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبالإضافة إلى التجاور المباشر للتجلي مع قول يسوع عن مجيئه (أو مجيء الملكوت)، ثمة سبب آخر لتفسير التجلي باعتباره إرهاصا للمجيء الثاني. فبطرس، الذي كان على الجبل مع يسوع أثناء التجلي، يتعامل مع هذا الاختبار في رسالته الثانية باعتباره لمحة مسبقة أو تصديقا أوليا للمجيء الثاني:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«للأَنَّنَا لَمْ نَتْبَعْ خُرَافَاتٍ مُصَنَّعَةً، إِذْ عَرَّفْنَاكُمْ بِقُوَّةِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَمَجِيئِهِ، بَلْ قَدْ كُنَّا مُعَايِنِينَ عَظَمَتَهُ. لأَنَّهُ أَخَذَ مِنَ اللهِ الآبِ كَرَامَةً وَمَجْدًا، إِذْ أَقْبَلَ عَلَيْهِ صَوْتٌ كَهذَا مِنَ الْمَجْدِ الأَسْنَى: «هذَا هُوَ ابْنِي الْحَبِيبُ الَّذِي أَنَا سُرِرْتُ بِهِ». وَنَحْنُ سَمِعْنَا هذَا الصَّوْتَ مُقْبِلاً مِنَ السَّمَاءِ، إِذْ كُنَّا مَعَهُ فِي الْجَبَلِ الْمُقَدَّسِ.» [بطرس الثانية ١ : ١٦-١٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيعتبر بطرس شهادة عيانه للتجلي كدليل على أن نبوءته عن «قُوَّةِ رَبِّنَا يَسُوعَ الْمَسِيحِ وَمَجِيئِهِ» ليست خرافة. إن مصطلح «قُوَّةِ... وَمَجِيئِهِ» للرب في العدد ١٦ هو إشارة إلى المجيء الثاني، وهو ما سيتناوله بطرس مرة أخرى في الأصحاح الثالث. وكلمة مجيء هي الكلمة المعتادة للمجيء الثاني في العهد الجديد (باروسيا parousia). وتُستخدم كلمة قوة لوصف مجيء يسوع الثاني في [متى ٢٤ : ٣٠]: «وَيُبْصِرُونَ ابْنَ الإِنْسَانِ آتِيًا عَلَى سَحَاب السَّمَاءِ بِقُوَّةٍ وَمَجْدٍ كَثِيرٍ.»\u003c/p\u003e\n\u003cp\u003eوأستنتج من ذلك إذن، أنه في فهم بطرس، كان ما رآه على جبل التجلي بمثابة عربون أو إرهاص لمجيء يسوع الثاني. وهذا يعني إذن، أن أولئك الذين لن «يَذُوقُونَ الْمَوْتَ» قبل أن يروا «ابْنَ الإِنْسَانِ آتِيًا فِي مَلَكُوتِهِ» [متى ١٦ : ٢٨] كانوا بطرس ويعقوب ويوحنا. لقد رأوا مجيء يسوع وحكمه الملوكي قد أُرهص به وتصدق عليه في التجلي.\u003c/p\u003e\n\u003cp\u003eوإذا عدنا خطوة إلى الوراء متسائلين عن السبب الذي دفع يسوع لاختيار تقديم مثل هذه اللمحة المسبقة لمجيئه، فإن أحد الإجابات هو أنه أراد أن تكون هناك شهادة رسولية استثنائية للواقع المجيد وغير الخرافي لمجيئه المستقبلي. لقد أراد أن يكون لشهادتهم مذاق الواقعية لكي يكون تذوقنا لرجاء ظهور المسيح حلوا. وبعبارة أخرى، لقد فعل ذلك لكي نحب ظهور الرب.\u003c/p\u003e\n\u003ch3\u003eقبل أن يمضي هذا الجيل\u003c/h3\u003e\n\u003cp\u003eثانيا هو تنبؤ يسوع بأنه «لاَ يَمْضِي هذَا الْجِيلُ حَتَّى يَكُونَ هذَا كُلُّهُ.» وفيما يلي النصوص الموازية التي دفعت البعض للاعتقاد بأن يسوع تنبأ برجوعه الخاص في غضون جيل واحد:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هكَذَا أَنْتُمْ أَيْضًا، مَتَى رَأَيْتُمْ هذِهِ الأَشْيَاءَ صَائِرَةً، فَاعْلَمُوا أَنَّهُ قَرِيبٌ عَلَى الأَبْوَابِ. اَلْحَقَّ أَقُولُ لَكُمْ: لاَ يَمْضِي هذَا الْجِيلُ حَتَّى يَكُونَ هذَا كُلُّهُ.» [مرقس ١٣ : ٢٩-٣٠]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هكَذَا أَنْتُمْ أَيْضًا، مَتَى رَأَيْتُمْ هذَا كُلَّهُ فَاعْلَمُوا أَنَّهُ قَرِيبٌ عَلَى الأَبْوَابِ. اَلْحَقَّ أَقُولُ لَكُمْ: لاَ يَمْضِي هذَا الْجِيلُ حَتَّى يَكُونَ هذَا كُلُّهُ.» [متى ٢٤ : ٣٣-٣٤]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هكَذَا أَنْتُمْ أَيْضًا، مَتَى رَأَيْتُمْ هذِهِ الأَشْيَاءَ صَائِرَةً، فَاعْلَمُوا أَنَّ مَلَكُوتَ اللهِ قَرِيبٌ. اَلْحَقَّ أَقُولُ لَكُمْ: إِنَّهُ لاَ يَمْضِي هذَا الْجِيلُ حَتَّى يَكُونَ الْكُلُّ.» [لوقا ٢١ : ٣١-٣٢]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيقول كل من مرقس ومتى إنه عندما نرى «هذَا كُلَّهُ» صائرا، يمكننا أن نعلم «أَنَّهُ قَرِيبٌ». وهذا يعني أن «هذِهِ الأَشْيَاءَ» لا يمكن أن تتضمن المجيء الفعلي للرب، لأنه عندما تحدث «هذِهِ الأَشْيَاءَ»، يكون الرب قريبا فقط، وليس حاضرا. ولذا فلا يُعلّم أي من هذه النصوص أن يسوع سيرجع في غضون جيل واحد. فماذا تُعلّم إذن؟\u003c/p\u003e\n\u003ch3\u003eأوجاع مخاض الدهر الآتي\u003c/h3\u003e\n\u003cp\u003eإنها تؤكد منظور العهد الجديد بأكمله المتمثل في أننا، وبدءا من مجيء يسوع، قد صرنا نعيش في «الأَيَّامِ الأَخِيرَةِ». «كَلَّمَنَا فِي هذِهِ الأَيَّامِ الأَخِيرَةِ فِي ابْنِهِ» [عبرانيين ١ : ٢]؛ (راجع [أعمال الرسل ٢ : ١٧]؛ [تيموثاوس الثانية ٣ : ١-٥]؛ [يعقوب ٥ : ٣]؛ [بطرس الثانية ٣ : ٣]). ومنذ الجيل الأول للكنيسة وحتى انقضاء الدهر عند مجيء يسوع، ستتميز «الأَيَّامِ الأَخِيرَةِ» بـ «أَوْجَاعِ» المخاض [متى ٢٤ : ٨]؛ [مرقس ١٣ : ٨] للكمال النهائي. وبعبارة أخرى، فإن «هذِهِ الأَشْيَاءَ» التي تحدث في غضون جيل واحد هي أنواع الاضطرابات التي تميز جميع الأيام الأخيرة من التجسد إلى المجيء الثاني.\u003c/p\u003e\n\u003cp\u003eفعلى سبيل المثال، بعد ذكر المسحاء الكذبة، والحروب، وأخبار الحروب، وقيام أمة على أمة، والمجاعات، والزلازل [متى ٢٤ : ٥-٧]، يقول يسوع: «وَلكِنَّ هذِهِ كُلَّهَا مُبْتَدَأُ الأَوْجَاعِ.» [متى ٢٤ : ٨]. «وَلكِنْ لَيْسَ الْمُنْتَهَى بَعْدُ.» [متى ٢٤ : ٦]. إن عبارة «هذِهِ كُلَّهَا» في العدد ٨ هي العبارة عينها المستخدمة في العدد ٣٤: «لاَ يَمْضِي هذَا الْجِيلُ حَتَّى يَكُونَ هذَا كُلُّهُ.» بعبارة أخرى، إن «هذِهِ الأَشْيَاءَ» تحدث بالفعل في غضون جيل واحد، غير أنها ليست سوى مبتدأ الأوجاع، التي ستميز التاريخ بأسره، ثم تبلغ ذروتها في النهاية تماما. ويمكن للمرء أن يسمع هذه الذروة في [متى ٢٤ : ١٢-١٣]: «وَلِكَثْرَةِ الإِثْمِ تَبْرُدُ مَحَبَّةُ الْكَثِيرِينَ. وَلكِنِ الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهذَا يَخْلُصُ.»\u003c/p\u003e\n\u003cp\u003eلهذا السبب ولأسباب أخرى سنراها، أفهم [متى ٢٤ : ١-٤٤] (والنصوص الموازية) على أنها تتنبأ بأحداث ستقع في غضون جيل واحد، بما في ذلك خراب أورشليم في عام ٧٠ ميلاديا، وأحداث ستقع طوال تاريخ الكنيسة، وصولا إلى أحداث ستبلغ ذروتها في انقضاء الدهر قُبيل رجوع يسوع. فعلى سبيل المثال، يجعل نص لوقا الموازي خراب أورشليم صريحا: «وَمَتَى رَأَيْتُمْ أُورُشَلِيمَ مُحَاطَةً بِجُيُوشٍ، فَحِينَئِذٍ اعْلَمُوا أَنَّهُ قَدِ اقْتَرَبَ خَرَابُهَا.» [لوقا ٢١ : ٢٠].\u003c/p\u003e\n\u003cp\u003eغير أنني أعتقد أنه من الخطأ تفسير نبوات يسوع حول المستقبل في [متى ٢٤] (والنصوص الموازية) على أنها تشير فقط إلى دمار أورشليم في عام ٧٠ ميلاديا والأحداث المؤدية إليه. بل إن قصد يسوع هو أن نرى الأحداث المحيطة بعام ٧٠ ميلادية كإرهاصات لأهوال وقت النهاية. فهي جزء من مبتدأ أوجاع المخاض.\u003c/p\u003e\n\u003ch3\u003eالقريب والبعيد في \"المنظور النبوي\"\u003c/h3\u003e\n\u003cp\u003eلقد سبق ووصفنا هذه الطريقة في النظر إلى النبوة الكتابية، مُطلقين عليها مع جورج إلدون لاد \u003ca href=\"#fn1\"\u003e[١]\u003c/a\u003e مصطلح \"المنظور النبوي\". مما يعني أن الأحداث البعيدة تُرى مُرْهَصاً بها في الأحداث القريبة، والأحداث القريبة تُرى كلمحات مسبقة للأحداث البعيدة. ويمتد هذا المنظور عبر الأجزاء النبوية من الكتاب المقدس. وإليكم مرة أخرى خلاصة لاد لـ [متى ٢٤] و[مرقس ١٣] و[لوقا ٢١] في ضوء هذا المنظور النبوي، كما رأينا في الفصل التاسع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003eمن مجمل تعليمه، يتضح أمر واحد: لقد تحدث يسوع عن سقوط أورشليم وعن مجيئه الأخروي معا. وقد اقترح كرانفيلد \u003ca href=\"#fn2\"\u003e[٢]\u003c/a\u003e أن التاريخي والأخروي قد امتزجا في منظور يسوع الخاص، وأن الحدث الأخروي الأخير يُرى من خلال \"شفافية\" الحدث التاريخي المباشر. وقد طبق المؤلف الحالي هذه الأطروحة على أنبياء العهد القديم ووجد أن هذه النظرة المقربة للمستقبل هي أحد العناصر الأساسية في المنظور النبوي. في عاموس، يوم الرب هو حدث تاريخي [عاموس ٥ : ١٨-٢٠] وأخروي [عاموس ٧ : ٤]؛ [عاموس ٨ : ٨-٩]؛ [عاموس ٩ : ٥]. ويصف إشعياء يوم افتقاد بابل التاريخي وكأنه يوم الرب الأخروي [إشعياء ١٣]. ويصف صفنيا يوم الرب [صفنيا ١ : ١٤] ككارثة تاريخية على يد عدو غير مسمى [صفنيا ١ : ١٠-١٢، ١٦-١٧]؛ [صفنيا ٢ : ٥-١٥]؛ ولكنه يصفه أيضا بعبارات كارثة عالمية يُفنى فيها كل كائن من على وجه الأرض [صفنيا ١ : ٢-٣] حتى لا يبقى شيء [صفنيا ١ : ١٨]. إن هذه الطريقة في النظر إلى المستقبل تعبر عن الرأي القائل إن \"الأخروي يتجلى في أزمات التاريخ. فالأحداث الإلهية في التاريخ هي، إن جاز التعبير، بروفات للدينونة الأخيرة، والتجسدات المتتابعة لضد المسيح هي إرهاصات للتركيز الأسمى الأخير لتمرد إبليس قبل النهاية\". \u003ca href=\"#fn3\"\u003e[٣]\u003c/a\u003e\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأعتقد أن هذا الرأي صحيح. وأحد تداعياته هو أننا لسنا مضطرين للاختيار بين الإتمامات في القرن الأول والإتمامات النهائية في وقت النهاية. \u003ca href=\"#fn4\"\u003e[٤]\u003c/a\u003e ونحن بالتأكيد لسنا مضطرين للقول إن يسوع قد أخطأ حين تنبأ بمجيئه النهائي في غضون جيل واحد.\u003c/p\u003e\n\u003ch3\u003eالمرور بكل مدن إسرائيل\u003c/h3\u003e\n\u003cp\u003eثالثا، يتنبأ يسوع في [متى ١٠ : ٢٣]: «وَمَتَى طَرَدُوكُمْ فِي هذِهِ الْمَدِينَةِ فَاهْرُبُوا إِلَى الأُخْرَى. فَإِنِّي الْحَقَّ أَقُولُ لَكُمْ: لاَ تُكَمِّلُونَ مُدُنَ إِسْرَائِيلَ حَتَّى يَأْتِيَ ابْنُ الإِنْسَانِ.»\u003c/p\u003e\n\u003cp\u003eيُعد نص [متى ١٠ : ٢٣] أكثر النصوص إثارة للحيرة حول مجيء ابن الإنسان. فهل تعني هذه الكلمات أن يسوع تنبأ بأنه سيرجع قبل أن ينهي التلاميذ بشارتهم للمنطقة الجغرافية التي يسكنها بشكل رئيسي شعب إسرائيل؟ قد يتبادر إلى ذهن المرء، للوهلة الأولى، أن يفكر على هذا النحو بمنطقية.\u003c/p\u003e\n\u003cp\u003eغير أن الأمر ليس بهذه البساطة. فمن ناحية، لا تشير كلمة إسرائيل في إنجيل متى بحد ذاتها إلى منطقة جغرافية. فقد استُخدمت الكلمة اثنتي عشرة مرة في إنجيل متى في عبارات مثل: «شَعْبِي إِسْرَائِيلَ» [متى ٢ : ١٦]، «أَرْضِ إِسْرَائِيلَ» [متى ٢ : ٢٠]، «بَيْتِ إِسْرَائِيلَ» [متى ١٠ : ٦]، «إِلهَ إِسْرَائِيلَ» [متى ١٥ : ٣١]، «أَسْبَاطِ إِسْرَائِيلَ» [متى ١٩ : ٢٨]، «بَنِي إِسْرَائِيلَ» [متى ٢٧ : ٩]، و«مَلِكُ إِسْرَائِيلَ» [متى ٢٧ : ٤٢]. فهل يعنى مصطلح «مُدُنَ إِسْرَائِيلَ» بوضوح مدنا أو بلدات في منطقة جغرافية معينة يحددها شعب إسرائيل؟ أم قد يحمل معنى أوسع؟ هل يمكن أن يعني: \"مدن شعب إسرائيل\" أو \"المدن التي يسكن فيها إسرائيل\"؟ هل يمكن أن يتحدث يسوع بصورة فضفاضة، أو حتى مجازية، عن شعب إسرائيل المشتت في الخارج والذي سيكون بحاجة إلى الإنجيل حتى يأتي ابن الإنسان؟\u003c/p\u003e\n\u003cp\u003eومن ناحية أخرى، هل يشير منطق العدد في المقام الأول إلى مدن للكرازة أم مدن للجوء؟ لاحظ أن العبارة التي تبدأ بـ \"فإنّ\" (أو لأن) تُحاجج بأنه ستكون هناك دائما مدينة أخرى للجوء حتى يأتي ابن الإنسان: «وَمَتَى طَرَدُوكُمْ فِي هذِهِ الْمَدِينَةِ فَاهْرُبُوا إِلَى الأُخْرَى. فَإِنِّي الْحَقَّ أَقُولُ لَكُمْ: لاَ تُكَمِّلُونَ مُدُنَ إِسْرَائِيلَ حَتَّى يَأْتِيَ ابْنُ الإِنْسَانِ.» هذا هو تفسير هيرمان ريدربوس \u003ca href=\"#fn5\"\u003e[٥]\u003c/a\u003e — المتمثل في أنه على الرغم من أن التلاميذ سيظلون مضطهدين حتى النهاية تماما، إلا أنه سيكون هناك دائما مكان يمكنهم اللجوء إليه. \u003ca href=\"#fn6\"\u003e[٦]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eومن ناحية ثالثة، يشير لاد إلى أن الفقرة التي يختتمها [متى ١٠ : ٢٣]: \"تتطلع بوضوح إلى ما هو أبعد من الإرسالية المباشرة للاثني عشر إلى إرساليتهم المستقبلية في العالم\". فعلى سبيل المثال، يقول العدد الذي يسبقه مباشرة: «وَتَكُونُونَ مُبْغَضِينَ مِنَ الْجَمِيعِ مِنْ أَجْلِ اسْمِي. وَلكِنَّ الَّذِي يَصْبِرُ إِلَى الْمُنْتَهَى فَهذَا يَخْلُصُ.» [متى ١٠ : ٢٢]. ويستنتج لاد: \"لا يقول العدد الحالي أكثر من أن إرسالية تلاميذ يسوع إلى إسرائيل ستستمر حتى مجيء ابن الإنسان. ويشير إلى أنه على الرغم من عماها، فإن الله لم يتخلّ عن إسرائيل. فشعب الله الجديد يجب أن يكون له اهتمام بإسرائيل حتى تأتي النهاية.\" \u003ca href=\"#fn7\"\u003e[٧]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eثمة تفسيرات أخرى لـ [متى ١٠ : ٢٣]. \u003ca href=\"#fn8\"\u003e[٨]\u003c/a\u003e ولا أمتلك قناعة واضحة أو قوية حول أي من هذه التفسيرات هو الصحيح. إن ما يوجهني في مثل هذه المواقف هو (١) ثقتي في يسوع كما هو مقدم في الأناجيل، وتحديدا، أنه جدير بالثقة ولن يتنبأ بإطار زمني لمجيئه قال إنه يجهله [متى ٢٤ : ٣٦]؛ و(٢) حقيقة أن اللغة النبوية غالبا ما تكون مرنة زمنيا ومجازية؛ و(٣) أن النصوص الكتابية الأخرى الأكثر وضوحا توفر إرشادا عندما تحيرنا النصوص الغامضة. وفي هذه الحالة، على سبيل المثال، أعتقد أن هناك بالفعل مستقبلا لإسرائيل العرقية، ورجاء في تجديدها في هذا الدهر [رومية ١١ : ١٥-٣٢]، ودعوة لكرازة يهودية مستمرة في كل «مدنها». \u003ca href=\"#fn9\"\u003e[٩]\u003c/a\u003e وهناك تصريح يسوع: «اَلسَّمَاءُ وَالأَرْضُ تَزُولاَنِ وَلكِنَّ كَلاَمِي لاَ يَزُولُ.» [متى ٢٤ : ٣٥]. وبعبارة أخرى، أعتقد أننا نحن من سنكون مخطئين إن ظننا أن يسوع قد أخطأ في مثل هذه النقطة الحاسمة حول مستقبل إرساليته.\u003c/p\u003e\n\u003ch3\u003eليس في غضون جيل واحد\u003c/h3\u003e\n\u003cp\u003eعندما نتراجع خطوة للوراء عن هذه المجموعات الثلاث من النصوص، والتي فهمها البعض على أنها تلمح إلى أن يسوع تنبأ بالمجيء الثاني وانقضاء الدهر في غضون جيل واحد، فإن استنتاجي هو أن يسوع لم يُعلّم بأنه سيرجع في غضون جيل واحد. ولذلك، ومهما كانت الحيرات الأخرى التي قد تعكر صفو مياه محبتنا لظهوره، فليس من الضروري أن تكون هذه الحيرة من بينها. ولكن، قد يتساءل أحدهم، ألا يتحدث العهد الجديد مرارا وتكرارا عن المجيء الثاني كحدث سيقع قريبا؟ نعم. وإلى هذا السؤال نتحول في الفصل التالي.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref1\"\u003e[١]\u003c/a\u003e جورج إلدون لاد: لاهوتي أمريكي معمداني، عُرف بدفاعه القوي عن لاهوت \"الملكوت الحاضر والمستقبلي\" في دراسات العهد الجديد.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref2\"\u003e[٢]\u003c/a\u003e سي. إي. بي. كرانفيلد: لاهوتي بريطاني مصلح وخبير في العهد الجديد، اشتهر بتعليقاته التفسيرية العميقة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref3\"\u003e[٣]\u003c/a\u003e جورج إلدون لاد، لاهوت العهد الجديد.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref4\"\u003e[٤]\u003c/a\u003e يقدم سام ستورمز [لاهوتي أمريكي إصلاحي معاصر] حجة مفادها أن [متى ٢٤ : ٤-٣١] تشير \"بشكل مباشر وأساسي\" إلى الأحداث المؤدية إلى عام ٧٠ ميلاديا وما شمله. غير أنه يستنتج بعد ذلك قائلا: \"إن حجتي... لا تستبعد بالضرورة احتمال أن يكون انقضاء الدهر أيضا، على الأقل بشكل غير مباشر، في الأفق. فمن المحتمل جدا أن الأحداث المستقبلية المرتبطة بالمجيء الثاني للمسيح يُرْهَص بها بدمار الهيكل والمدينة... ولذلك، فإن رأيي هو أن نمط الأحداث التي جرت في الفترة من ٣٣-٧٠م... قد تعمل كإرهاص محلي وجزئي للأحداث العالمية والكلية المرتبطة بالمجيء ونهاية التاريخ.\" يمكنك أن تسمع في عباراته حالة من عدم اليقين. الفارق بين وجهة نظري ووجهة نظر ستورمز ذو شقين: الأول، أنه يرى مجرد احتمال أن [متى ٢٤ : ٤-٣١] ترهص بأحداث في نهاية الدهر، بينما أعتقد أنا أن هناك أدلة جيدة على أن كل من متى وبولس فهما تعليم يسوع على أنه يضع النهاية الأخيرة في الأفق بوضوح.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref5\"\u003e[٥]\u003c/a\u003e هيرمان ريدربوس: لاهوتي هولندي إصلاحي، اشتهر بأعماله المؤثرة حول لاهوت بولس الرسول وملكوت الله.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref6\"\u003e[٦]\u003c/a\u003e هيرمان ريدربوس، مجيء الملكوت.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref7\"\u003e[٧]\u003c/a\u003e جورج إلدون لاد، لاهوت العهد الجديد. وبالمثل، يستنتج أنتوني أ. هيكيما [لاهوتي إصلاحي معروف بمؤلفاته في الأخرويات]، الكتاب المقدس والمستقبل.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref8\"\u003e[٨]\u003c/a\u003e على سبيل المثال، يُحاجج د. أ. كارسون بأن \"مجيء ابن الإنسان\" هنا يشير إلى مجيئه في الدينونة ضد اليهود، متوجا بسقوط أورشليم ودمار الهيكل.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ref9\"\u003e[٩]\u003c/a\u003e انظر جون بايبر، \"خمسة أسباب تجعلني أعتقد أن [رومية ١١ : ٢٦] تعني تجديدا مستقبليا لإسرائيل\".\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh6TCFCpo-qHKeQ18hM8h4XdKSiPfvrxgLhyouxCTIIA8KzTLhgfptYF6GQVch9tgCaLN9sxpi-lnx5miIv51Vps8P8IO7a_pcQJN2aDN7EQhxbTYGfrLAuYu6Rg-vqAnoDKFAmCGHgb6QZCac9lV6BtVSvue93rpIqcDHHi60BA-qbz3tCzpwwCIjeYoQ/s2752/%D9%85%D8%AA%D9%89_%D9%8A%D8%B9%D9%88%D8%AF_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD_%D9%88%D8%A7%D9%84%D9%85%D9%86%D8%B8%D9%88%D8%B1_%D8%A7%D9%84%D9%86%D8%A8%D9%88%D9%8A.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh6TCFCpo-qHKeQ18hM8h4XdKSiPfvrxgLhyouxCTIIA8KzTLhgfptYF6GQVch9tgCaLN9sxpi-lnx5miIv51Vps8P8IO7a_pcQJN2aDN7EQhxbTYGfrLAuYu6Rg-vqAnoDKFAmCGHgb6QZCac9lV6BtVSvue93rpIqcDHHi60BA-qbz3tCzpwwCIjeYoQ/s600/%D9%85%D8%AA%D9%89_%D9%8A%D8%B9%D9%88%D8%AF_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD_%D9%88%D8%A7%D9%84%D9%85%D9%86%D8%B8%D9%88%D8%B1_%D8%A7%D9%84%D9%86%D8%A8%D9%88%D9%8A.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"1a:Tae51,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الثاني عشر\u003c/h2\u003e\n\u003cp\u003eفرح الشركة الشخصية مع الخادم ذي السيادة\u003c/p\u003e\n\u003cp\u003eإن فرح الشركة الشخصية مع يسوع في أجساد قيامتنا الجديدة سيكون فرحا فائقا يتجاوز بمسافات شاسعة أي شيء كنا قادرين عليه في هذه الحياة. فلقد سبق وعرض يسوع في خدمته الأرضية فرحه الخاص على أتباعه. «كَلَّمْتُكُمْ بِهذَا لِكَيْ يَثْبُتَ فَرَحِي فِيكُمْ وَيُكْمَلَ فَرَحُكُمْ.» [يوحنا ١٥ : ١١]. «وَأَتَكَلَّمُ بِهذَا فِي الْعَالَمِ لِيَكُونَ لَهُمْ فَرَحِي كَامِلاً فِيهِمْ.» [يوحنا ١٧ : ١٣]. كان فرح يسوع في أسمى صوره فرحا أبديا بمحبته لأنه: «أُحِبُّ الآبَ» [يوحنا ١٤ : ٣١]. ولذا فإن الاشتراك في فرح يسوع يعني الاشتراك في فرح الابن بالآب. ويعني أيضا الاشتراك في فرح الآب بالابن (كما سنرى لاحقا). ولهذا السبب سيكون الفرح كاملا. غير أن يسوع كان يعلم أن ملء الفرح هذا لن يبلغ ذروته في حدود هذه الحياة الأرضية.\u003c/p\u003e\n\u003cp\u003eولذلك، فقد صلى لأجلنا [يوحنا ١٧ : ٢٠] لكي نمنح في المستقبل قدرات فائقة للطبيعة للتمتع بالشركة معه بأقصى ما يمكن لكائن مخلوق أن يبلغه. لقد صلى: «أَيُّهَا الآبُ الْبَارُّ،... وَعَرَّفْتُهُمُ اسْمَكَ وَسَأُعَرِّفُهُمْ، لِيَكُونَ فِيهِمُ الْحُبُّ الَّذِي أَحْبَبْتَنِي بِهِ، وَأَكُونَ أَنَا فِيهِمْ.» [يوحنا ١٧ : ٢٥-٢٦]. هذا وعد بأننا لن نترك لقدراتنا الذاتية في محبة ابن الله والتمتع به. بل سنمنح محبة الآب للابن. «لِيَكُونَ فِيهِمُ الْحُبُّ الَّذِي أَحْبَبْتَنِي بِهِ». سنكون قادرين على الاشتراك في سرور الآب بابنه. «هذَا هُوَ ابْنِي الْحَبِيبُ الَّذِي بِهِ سُرِرْتُ.» [متى ٣ : ١٧]. «سُرِرْتُ» بنفس الطريقة التي يسر بها إله غير محدود بابن مجيد وثمين إلى أقصى حد.\u003c/p\u003e\n\u003ch3\u003eرجاؤنا في التمتع بالمسيح بتمتع الله عينه\u003c/h3\u003e\n\u003cp\u003eهذا الرجاء رائع، لاسيما عندما ندرك مدى التمزق والقصور الذي يعتري عواطفنا الآن. فجميعنا يعلم أن محبتنا ليسوع، وما يرافقها من فرح، هي محبة ضعيفة بصورة تبعث على الرثاء مقارنة بما يستحقه. فعواطفنا في العلاقة التي تربطنا به تقصر كثيرا عما نعلم أنها يجب أن تكون عليه. فما هو إذن رجاؤنا في نوال فرح لائق عندما نراه وجها لوجه في أجسادنا الممجدة عند مجيئه؟\u003c/p\u003e\n\u003cp\u003eإن رجاءنا هو أن الفرح الذي ذقناه في هذه الحياة [بطرس الأولى ٢ : ٣] سيتحقق بقدرة فائقة للطبيعة تفوق كل خيال. وهذا هو ما صلى يسوع لأجله. وهذا هو ما سيحدث. سيسكب الله محبته الخاصة للمسيح فينا. وسنتمتع بالمسيح بتمتع الله عينه. صحيح أن فرحنا بيسوع، حتى الآن، هو عمل الله — الله الروح القدس. ففرحنا بالله وبابنه يعود إلى حضور الروح القدس في حياتنا، والذي يخلق فينا القدرة على السرور بالله وبالمسيح [رومية ١٤ : ١٧]؛ [رومية ١٥ : ١٣]؛ [تسالونيكي الأولى ١ : ١٦].\u003c/p\u003e\n\u003cp\u003eلكن عندما يصلي يسوع في [يوحنا ١٧ : ٢٦]، فهو يطلب ما هو أكثر من ذلك. لقد عرفنا الله الآن بدرجة ما. واستيقظت فينا المحبة والفرح. هذه هي الولادة الجديدة. غير أن يسوع يعد الآن بأنه سيمضي إلى ما هو أبعد: سيعلن الله بطرق جديدة لم يسبق تخيلها، وستكون النتيجة أن محبة الله ذاته للابن ستصبح بصورة أكمل هي محبتنا نحن للابن، بحيث نكون قادرين على التمتع بالمسيح بالنقاء والكثافة اللذين ينبغي لنا أن نتمتع بهما. ولن نكون مشلولين بعالميتنا الحاضرة وفسادنا المتبقي، ولا بقيود الجسد الساقط.\u003c/p\u003e\n\u003ch3\u003eازدياد الفرح بعد الموت\u003c/h3\u003e\n\u003cp\u003eهذا المستوى الجديد من الفرح في الله، والذي سنمتلكه في الشركة مع المسيح، سيختبر جزئيا عند الموت (إن لم يكن المسيح قد عاد بعد)، ثم بصورة أكمل عند المجيء الثاني. يقول بولس في [فيلبي ١ : ٢٣]: «لِيَ اشْتِهَاءٌ أَنْ أَنْطَلِقَ وَأَكُونَ مَعَ الْمَسِيحِ، ذَاكَ أَفْضَلُ جِدًّا.» فبمجرد أن نموت، ستكمل أرواحنا فورا في محضر المسيح [عبرانيين ١٢ : ٢٣]. ولن تعيق طبيعتنا الارضية ولا الفساد بعد ذلك عواطف قلوبنا تجاه يسوع. وستكون شركتنا معه في السماء أكثر مباشرة مما كانت عليه هنا. ولهذا السبب يقول بولس إن الموت سيكون «أَفْضَلُ جِدًّا». ففرح تلك الشركة سيفوق أي شيء عرفناه هنا على الأرض.\u003c/p\u003e\n\u003cp\u003eغير أن الشركة مع يسوع بدون جسد ليست هي الرجاء النهائي أو الأسمى للمؤمن المسيحي. يمنحنا بولس لمحة عن رجائنا النهائي في [كورنثوس الثانية ٥]. فهو من ناحية، يكرر جوهر ما ورد في [فيلبي ١ : ٢٣] قائلا: «فَنَثِقُ وَنُسَرُّ بِالأَوْلَى أَنْ نَتَغَرَّبَ عَنِ الْجَسَدِ وَنَسْتَوْطِنَ عِنْدَ الرَّبِّ.» [كورنثوس الثانية ٥ : ٨]. هذا «أَفْضَلُ جِدًّا». غير أنه من ناحية أخرى، يئن من تجرده من جسده وكونه عريانا، في حين أنه يفضل بالأحرى أن يلبس فوقه جسد قيامته: «فَإِنَّنَا نَحْنُ الَّذِينَ فِي الْخَيْمَةِ [جسدنا المائت] نَئِنُّ مُثْقَلِينَ، إِذْ لَسْنَا نُرِيدُ أَنْ نَخْلَعَهَا [نكون بلا جسد] بَلْ أَنْ نَلْبَسَ فَوْقَهَا [جسد قيامتنا]، لِكَيْ يُبْتَلَعَ الْمَائِتُ مِنَ الْحَيَاةِ.» [كورنثوس الثانية ٥ : ٤]. ولا بد أن يعني هذا أن حالة «أَفْضَلُ جِدًّا» المتمثلة في الموت والوجود مع المسيح [فيلبي ١ : ٢٣] يتجاوزها ما هو أفضل بمسافات شاسعة ألا وهو أن نلبس جسدا جديدا عند مجيء المسيح.\u003c/p\u003e\n\u003cp\u003eوأستنتج من هذا أن تمتعنا بشركة يسوع عند مجيئه سيكون أعظم من تمتعنا بشركته في الفترة بين موتنا والمجيء الثاني. وسيعود هذا الفرح الأعظم جزئيا إلى حقيقة أننا سنتواصل معه في أجساد قيامتنا. ويعود جزء من سبب عزو فرحنا الأعظم إلى امتلاك أجساد جديدة إلى أن حواسنا الجسدية الجديدة والممجدة ستكون قوية بدرجة تفوق تصورنا الحالي، بحيث سنتمكن من خلالها من إدراك والتعبير عن أبعاد شخص المسيح وعمله بطرق كانت مستحيلة في السابق. وسبب آخر يجعل فرحنا بيسوع أعظم حين نمتلك أجسادا ممجدة هو أن التداخل بين أجسادنا الروحية الممجدة [كورنثوس الأولى ١٥ : ٤٤] وأرواحنا الممجدة سيكون أوثق ومترابطا بطريقة تفوق الخيال مقارنة بما عليه أرواحنا وأجسادنا الآن.\u003c/p\u003e\n\u003ch3\u003e«اُدْخُلْ إِلَى فَرَحِ سَيِّدِكَ»\u003c/h3\u003e\n\u003cp\u003eوبغض النظر عن كيفية محاولتنا لتفسير ذلك، يوضح يسوع جليا أننا عند مجيئه سندخل في اختبار جديد للفرح يسميه هو الدخول إلى فرحه الخاص. ففي مثل الوزنات، يصور يسوع نفسه عائدا إلى الأرض كإنسان سافر وسلم أمواله لعبيده. وحين يدعوهم للحساب ويمنحهم المكافآت بحسب عملهم الأمين، يقول للعبيد الأمناء:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«نِعِمَّا أَيُّهَا الْعَبْدُ الصَّالِحُ وَالأَمِينُ! كُنْتَ أَمِينًا فِي الْقَلِيلِ فَأُقِيمُكَ عَلَى الْكَثِيرِ. اُدْخُلْ إِلَى فَرَحِ سَيِّدِكَ.» [متى ٢٥ : ٢١، ٢٣].\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا هو اكتمال القصد المعبر عنه في [يوحنا ١٥ : ١١]: «كَلَّمْتُكُمْ بِهذَا لِكَيْ يَثْبُتَ فَرَحِي فِيكُمْ وَيُكْمَلَ فَرَحُكُمْ.» فعند المجيء الثاني، يواصل يسوع ويكمل القصد الذي بدأه في حياتنا في هذا الدهر: ادخل إلى ذلك الفرح عينه — فرحي، فرح سيدك. وأخيرا سيكون كاملا.\u003c/p\u003e\n\u003ch3\u003eالشركة الشخصية تفرح بالشخص وبأفراحه\u003c/h3\u003e\n\u003cp\u003eإن سألنا: هل سيكون فرحنا في ذلك اليوم هو الفرح بيسوع نفسه، أم بفرح يسوع الآب؟ فالإجابة هي كلاهما معا. سنختبر فرح الآب بالابن كفرحنا نحن [يوحنا ١٧ : ٢٦]. أي أننا سنتمتع بيسوع نفسه بشيء من الكثافة التي يتمتع بها أبوه. وسنختبر فرح الابن بالآب كفرحنا نحن [متى ٢٥ : ٢١].\u003c/p\u003e\n\u003cp\u003eغير أن السؤال مضلل أيضا: هل سيكون فرحنا في ذلك اليوم هو الفرح بيسوع، أم فرح يسوع بآبيه؟ إنه مضلل لأننا عندما نتحدث عن التمتع بيسوع نفسه، فإننا نقصد شركة حقيقية وشخصية معه. وما هي الشركة الشخصية إن لم تكن مشاركة كل واحد للآخر فيما يحبه؟ ولذلك، يفترض السؤال ثنائية زائفة. فعندما نفرح بالشركة الشخصية مع يسوع نفسه، فإننا نفرح بأفراحه.\u003c/p\u003e\n\u003ch3\u003eأهو أمر مذهل لدرجة تمنعه من أن يكون شخصيا؟\u003c/h3\u003e\n\u003cp\u003eلدينا سبب وجيه للاعتقاد بأن فرح المجيء الثاني يتضمن فرح الشركة الشخصية. ونحن بحاجة للتذكير بهذا الأمر، لأن التركيز في الفصول السابقة انصب بقوة على جلال الرب وعظمة حدث المجيء الثاني، بكل ما يصاحبه من بوق الله، وهتاف، وصوت رئيس ملائكة، وملايين الملائكة، وقوة عظيمة، وبروق، ومجد هائل، وقيامة ملايين المسيحيين، وتغيير الأجساد، ومنح المكافآت. قد يبدو كل هذا كحدث ضخم للغاية بحيث لا يتبقى فيه مكان لعلاقة شخصية، أو لشركة شخصية.\u003c/p\u003e\n\u003cp\u003eغير أن العهد الجديد يمنعنا من الوقوع في هذا الخطأ. تأمل، على سبيل المثال، نصا مألوفا من إنجيل يوحنا يشير إلى المجيء الثاني للمسيح. أحيانا يغفل تركيز هذا النص على العلاقة الشخصية مع يسوع بسبب التركيز الخاطئ على الذهاب للسماء:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لاَ تَضْطَرِبْ قُلُوبُكُمْ. أَنْتُمْ تُؤْمِنُونَ بِاللهِ فَآمِنُوا بِي. فِي بَيْتِ أَبِي مَنَازِلُ كَثِيرَةٌ، وَإِلاَّ فَإِنِّي كُنْتُ قَدْ قُلْتُ لَكُمْ. أَنَا أَمْضِي لأُعِدَّ لَكُمْ مَكَانًا، وَإِنْ مَضَيْتُ وَأَعْدَدْتُ لَكُمْ مَكَانًا آتِي أَيْضًا وَآخُذُكُمْ إِلَيَّ، حَتَّى حَيْثُ أَكُونُ أَنَا تَكُونُونَ أَنْتُمْ أَيْضًا.» [يوحنا ١٤ : ١-٣]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eكان يسوع قد أخبر التلاميذ للتو أنه ماضٍ [يوحنا ١٣ : ٣٦]. فاضطربوا لذلك. والآن يخبرهم بألا يضطربوا: «لاَ تَضْطَرِبْ قُلُوبُكُمْ.» ويحثهم على استبدال القلوب المضطربة بقلوب ملؤها الإيمان: «أَنْتُمْ تُؤْمِنُونَ بِاللهِ فَآمِنُوا بِي» [يوحنا ١٤ : ١]. ثقوا بي. ثقوا بأبي. ثم يسند إيمانهم بثلاث حجج على الأقل، تشير جميعها إلى علاقة شخصية عند المجيء الثاني.\u003c/p\u003e\n\u003cp\u003e١. لا تضطربوا، بل ثقوا بي، لأن أبي لديه منازل كثيرة في بيته، وسيكون لكل واحد منكم منزل. «فِي بَيْتِ أَبِي مَنَازِلُ كَثِيرَةٌ، وَإِلاَّ فَإِنِّي كُنْتُ قَدْ قُلْتُ لَكُمْ. أَنَا أَمْضِي لأُعِدَّ لَكُمْ مَكَانًا.» [يوحنا ١٤ : ٢] لا ينصب التركيز هنا على العزلة — كل واحد في منزله الخاص. بل ينصب على عدم استبعاد أي شخص بسبب ضيق الأماكن المتاحة. ولذا فإن التركيز يتضمن اهتماما شخصيا بكل تلميذ. هناك منازل «كَثِيرَةٌ». وهذا يعني أن لك مكانا. فلا معنى للتشديد على المنازل الكثيرة إن كان الجميع سيتواجدون في غرفة واحدة. المغزى هو المساحة الشخصية، والاهتمام الشخصي. التركيز ليس على العزلة الفردية بل على الاعتبار الشخصي.\u003c/p\u003e\n\u003cp\u003e٢. لا تضطربوا، بل ثقوا بي، لأنني أنا نفسي ذاهب لأعد مسكنكم مع الله. «فِي بَيْتِ أَبِي مَنَازِلُ كَثِيرَةٌ، وَإِلاَّ فَإِنِّي كُنْتُ قَدْ قُلْتُ لَكُمْ. أَنَا أَمْضِي لأُعِدَّ لَكُمْ مَكَانًا، وَإِنْ مَضَيْتُ وَأَعْدَدْتُ لَكُمْ مَكَانًا...» [يوحنا ١٤ : ٢-٣] مرتين يقول يسوع: «أَنَا أَمْضِي لأُعِدَّ لَكُمْ مَكَانًا.» فماذا يعني ذلك؟ لا أعتقد أنه يعني أن السماء تعاني من فوضى تحتاج إلى ترتيب. ولا يعني أن مسكن الله قيد الإنشاء. إن إعداد مكان يمكن فيه لكل تلميذ أن يتمتع بالقرب من الله يعني إعداد إمكانية اقتراب الخطاة من الله. إعداد مكان يعني توفير مكان وإتاحته. يبدو الأمر وكأن رجلا كريما وجدك نائما في الشارع فقال لك: تعال، سأعد لك مكانا، ثم دفع ثمن غرفتك في الفندق.\u003c/p\u003e\n\u003cp\u003eحين يقول يسوع: «أَنَا أَمْضِي لأُعِدَّ»، فهو يعني: أنا ذاهب إلى الصليب صباح الغد، ثم خارجا من القبر بعد ثلاثة أيام. هذا هو عمل الإعداد العظيم. هكذا ستتمكنون من السكنى مع الله. سأحمل خطاياكم صباح الغد [بطرس الأولى ٢ : ٢٤]. سأصير لعنة لأجلكم صباح الغد [غلاطية ٣ : ١٣]. سأضمن تبريركم صباح الغد [رومية ٥ : ١٩]. ولهذا السبب ينصب التركيز في العدد ٦ على: «أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ.» «أَنَا أَمْضِي لأُعِدَّ لَكُمْ مَكَانًا» تعني أنني أصنع طريقا للتلاميذ الخطاة ليكون لهم مساكن شخصية في بيت الله.\u003c/p\u003e\n\u003cp\u003e٣. لا تضطربوا، بل ثقوا بي، لأنني أنا نفسي سأكون مسكنكم، وسأفعل كل ما يلزم لأضمن تمتعكم به. «وَإِنْ مَضَيْتُ وَأَعْدَدْتُ لَكُمْ مَكَانًا آتِي أَيْضًا وَآخُذُكُمْ إِلَيَّ، حَتَّى حَيْثُ أَكُونُ أَنَا تَكُونُونَ أَنْتُمْ أَيْضًا.» [يوحنا ١٤ : ٣] هذا العدد بمثابة صاعقة من التوضيح. فإلى هنا، كان يتحدث عن بيت، ومنازل، ومكان. والآن تتهاوى كل تلك الصور ليقول: في الواقع، إن غاية إعدادي هي أن «آخُذُكُمْ إِلَيَّ». وغايتي من كل إعدادي هي أنه «حَتَّى حَيْثُ أَكُونُ أَنَا تَكُونُونَ أَنْتُمْ أَيْضًا». وفجأة، لا يصبح يسوع هو معد الطريق فحسب، بل هو الوجهة ذاتها. هذا العدد يغير كل شيء. لقد أصبح كل شيء شخصيا. وأصبحت غاية مجيئه الآن هي الشركة الشخصية: «آتِي أَيْضًا وَآخُذُكُمْ إِلَيَّ.» وهكذا سيكمل فرحهم [يوحنا ١٥ : ١١].\u003c/p\u003e\n\u003ch3\u003eبيت الآب والمنازل\u003c/h3\u003e\n\u003cp\u003eكان يجب أن ينبهنا دليلان إلى أن هذا كان آتيا، أي أن يسوع سيكون هو مسكننا. أولا، إشارته إلى «بَيْتِ أَبِي» في [يوحنا ١٤ : ٢] كان ينبغي أن تذكرنا بالموضع الوحيد الآخر في هذا الإنجيل الذي يتحدث فيه يسوع عن «بَيْتِ أَبِي». فعندما طرد الصيارفة من الهيكل، قال: «ارْفَعُوا هذِهِ مِنْ ههُنَا! لاَ تَجْعَلُوا بَيْتَ أَبِي بَيْتَ تِجَارَةٍ!» [يوحنا ٢ : ١٦]. ثم ربط يسوع فورا الهيكل كمسكن لله بنفسه. فقال: «انْقُضُوا هذَا الْهَيْكَلَ، وَفِي ثَلاَثَةِ أَيَّامٍ أُقِيمُهُ... وَأَمَّا هُوَ فَكَانَ يَقُولُ عَنْ هَيْكَلِ جَسَدِهِ.» [يوحنا ٢ : ١٩، ٢١]. لذا عندما نقرأ في [يوحنا ١٤ : ١] أن في بيت الآب مساكن شخصية كثيرة لتلاميذ يسوع، لعلنا نتساءل: هل يقصد أن يسوع هو ذلك البيت — أن يسوع هو المكان الذي يسكن فيه الله، وحيث يمكن لكل تلميذ أن يسكن معه؟\u003c/p\u003e\n\u003cp\u003eثانيا، إن الكلمة المترجمة منازل (μοναὶ) في [يوحنا ١٤ : ٢] تعني مكان سكنى. قد يكون غرفة، أو قد يكون طريقة أخرى للسكنى أو الثبات. وهي الصيغة الاسمية من الفعل يثبت أو يقيم (μένω). وليست هذه بكلمة شائعة. بل لم تستخدم إلا مرة واحدة أخرى في العهد الجديد، وتحديدا في هذا الأصحاح عينه من إنجيل يوحنا حيث يقول يسوع: «إِنْ أَحَبَّنِي أَحَدٌ يَحْفَظْ كَلاَمِي، وَيُحِبُّهُ أَبِي، وَإِلَيْهِ نَأْتِي، وَعِنْدَهُ نَصْنَعُ مَنْزِلاً» [يوحنا ١٤ : ٢٣]. غير أنه كثيرا ما يصف الفعل يثبت، في هذا الإنجيل، يسوع بصفته مسكننا: «اُثْبُتُوا فِيَّ وَأَنَا فِيكُمْ. كَمَا أَنَّ الْغُصْنُ لاَ يَقْدِرُ أَنْ يَأْتِيَ بِثَمَرٍ مِنْ ذَاتِهِ إِنْ لَمْ يَثْبُتْ فِي الْكَرْمَةِ، كَذلِكَ أَنْتُمْ أَيْضًا إِنْ لَمْ تَثْبُتُوا فِيَّ.» [يوحنا ١٥ : ٤].\u003c/p\u003e\n\u003cp\u003eكان هذان الدليلان يهيئاننا لصاعقة التوضيح في [يوحنا ١٤ : ٣]. فالبيت، والمنازل، والمكان كانت كلها تدور حول يسوع نفسه. «وَإِنْ مَضَيْتُ وَأَعْدَدْتُ لَكُمْ مَكَانًا آتِي أَيْضًا وَآخُذُكُمْ إِلَيَّ، حَتَّى حَيْثُ أَكُونُ أَنَا تَكُونُونَ أَنْتُمْ أَيْضًا.» وبعبارة أخرى، أنا هو منزلكم في بيت الآب. وكان إعداد هذا المنزل لكم يعني أن أموت لأجلكم وأقوم ثانية لتتمكنوا من الدخول، ولأكون أنا المسكن المجيد.\u003c/p\u003e\n\u003ch3\u003eليس ليأخذنا إلى السماء، بل إلى نفسه\u003c/h3\u003e\n\u003cp\u003eيتعين علينا تصحيح سوء فهم لـ [يوحنا ١٤ : ١-٤]. فأحيانا يستخدم هذا النص لإثبات أنه عندما يعود يسوع، سيأخذ شعبه إلى وطنهم في السماء. \u003ca href=\"#ch12-fn-1\"\u003e[١]\u003c/a\u003e ولكنه لا يقول ذلك. بل يقول: «آتِي أَيْضًا وَآخُذُكُمْ إِلَيَّ، حَتَّى حَيْثُ أَكُونُ أَنَا تَكُونُونَ أَنْتُمْ أَيْضًا.» وأين سيكون عندما يأتي؟ سنلاقيه في الهواء ونرحب به على الأرض لتأسيس ملكوته. \u003ca href=\"#ch12-fn-2\"\u003e[٢]\u003c/a\u003e وهكذا سنكون كل حين مع الرب [تسالونيكي الأولى ٤ : ١٦-١٧].\u003c/p\u003e\n\u003cp\u003eإن ما يركز عليه هذا النص في [يوحنا ١٤] بشأن المجيء الثاني ليس بابا جديدا للوصول إلى السماء، بل وصولا جديدا إلى المسيح. «آخُذُكُمْ إِلَيَّ.» وكأن يسوع يقول: لذلك، ثقوا بي. أنا قادم لأجلكم. وستكونون معي إلى الأبد. فمجيء المسيح ليس مجرد مشهد بهيج فحسب؛ بل هو ترحيب شخصي. وهذا الترحيب هو في أسمى صوره ترحيب به نفسه. وإلى جانب العديد من الأسرار الأخرى حول مستقبل يفوق الخيال، لا نحتاج إلى شرح كيف سيتواصل يسوع شخصيا مع ملايين البشر. فتلك ستكون أيام اكتشاف، لا أيام خيبة أمل. فالمذخر في يسوع المسيح هو جميع كنوز الحكمة والعلم [كولوسي ٢ : ٣]. ولن يستحيل عليه شيء يتوافق مع كلمته. ولن يفسد شيء فرح الشركة الشخصية مع يسوع.\u003c/p\u003e\n\u003ch3\u003eفرح مجيئه يشبه فرح وليمة العرس\u003c/h3\u003e\n\u003cp\u003eسيكون لفرح هذه الشركة بعد مفاجئ يكاد لا يصدق، بعد يقلب التوقعات العقلانية المعتادة، بل وحتى التوقعات الكتابية، رأسا على عقب. دعوني أتناول الأمر بصورة غير مباشرة. يتعلق أحد أوجه عدم التوقع بالطريقة التي يرتبط بها مجيء يسوع بوليمة العرس. عادة ما نفكر في التصوير الوارد في [متى ٢٥ : ١-١٢]، حيث يشبه المجيء الثاني بمجيء عريس إلى وليمة عرسه. ويهدف هذا، على أقل تقدير، إلى إيصال رسالة مفادها أنه سيكون حدثا يبعث على فرح عظيم. ولكن يجب أن نكون حذرين ألا نضغط التفاصيل لتعني أن المسيح قادم، في هذا التصوير، ليتزوج عروسه الكنيسة. فهناك عشاء عرس الخروف حيث تكون العروس هي شعب الله المتسربل بأعمال بارة [رؤيا ١٩ : ١٧-١٩]؛ [رؤيا ٢١ : ٢، ٩]. غير أن الولائم التي يصورها يسوع عند مجيئه الثاني لا تهدف إلى تصوير ذلك العشاء. \u003ca href=\"#ch12-fn-3\"\u003e[٣]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eفعلى سبيل المثال، عندما يأتي العريس في [متى ٢٥ : ١]، لا تصور الكنيسة المطيعة كعروس بل كخمس عذارى حكيمات هن خادمات للعريس، ينتظرن للترحيب به في الوليمة. وتتضح غاية المثل في العدد ١٣: «فَاسْهَرُوا إِذًا لأَنَّكُمْ لاَ تَعْرِفُونَ الْيَوْمَ وَلاَ السَّاعَةَ.» ولا تبلغ القصة ذروتها بحفل زفاف، أو حتى بتقديم عروس، بل بكلمات: «وَالْمُسْتَعِدَّاتُ دَخَلْنَ مَعَهُ إِلَى الْعُرْسِ، وَأُغْلِقَ الْبَابُ.» [متى ٢٥ : ١٠]. الغاية هي الاستعداد المتلهف لمجيء الرب، في سياق من الفرح الاحتفالي.\u003c/p\u003e\n\u003cp\u003eتلك هي الصورة النمطية والمتوقعة التي يألفها الكثيرون: مجيء يسوع يشبه مجيء عريس إلى حفل زفاف. والمغزى من هذه الصورة هو الفرح. ففي معظم الثقافات، تعد حفلات الزفاف وولائمها من أسعد الاحتفالات التي نختبرها. وهكذا ينبغي لنا أن نفكر في المجيء الثاني للمسيح.\u003c/p\u003e\n\u003ch3\u003eبعد لا يمكن تصوره للفرح عند مجيئه\u003c/h3\u003e\n\u003cp\u003eغير أن المفاجأة تأتي بعد ذلك في [لوقا ١٢ : ٣٥-٣٨]:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لِتَكُنْ أَحْقَاؤُكُمْ مُمَنْطَقَةً وَسُرُجُكُمْ مُوقَدَةً، وَأَنْتُمْ مِثْلُ أُنَاسٍ يَنْتَظِرُونَ سَيِّدَهُمْ مَتَى يَرْجِعُ مِنَ الْعُرْسِ، حَتَّى إِذَا جَاءَ وَقَرَعَ يَفْتَحُونَ لَهُ لِلْوَقْتِ. طُوبَى لأُولئِكَ الْعَبِيدِ الَّذِينَ إِذَا جَاءَ سَيِّدُهُمْ يَجِدُهُمْ سَاهِرِينَ. اَلْحَقَّ أَقُولُ لَكُمْ: إِنَّهُ يَتَمَنْطَقُ وَيُتْكِئُهُمْ وَيَتَقَدَّمُ وَيَخْدِمُهُمْ. وَإِنْ أَتَى فِي الْهَزِيعِ الثَّانِي أَوْ أَتَى فِي الْهَزِيعِ الثَّالِثِ وَوَجَدَهُمْ هكَذَا، فَطُوبَى لأُولئِكَ الْعَبِيدِ.» [لوقا ١٢ : ٣٥-٣٨]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلا يصور المجيء الثاني هنا كعريس آت إلى وليمة عرس، بل كسيد راجع من وليمة عرس. وفجأة تنقلب الأمور رأسا على عقب. لا يقدم أي تفسير، غير أن يسوع يصور آتيا من وليمة عرس. لذا أفترض أن المغزى هو أنه ممتلئ سلفا بالفرح والاحتفال عند مجيئه. فهو لا يأتي من الحزن إلى الفرح، بل من فرح إلى فرح.\u003c/p\u003e\n\u003cp\u003eونتساءل عما سينقلب رأسا على عقب أيضا في هذه الصورة. فالأشخاص الذين ينتظرون «سَيِّدَهُمْ» يدعون عبيدا. والنقطة الأولى في القصة هي أن نكون مثلهم. «لِتَكُنْ أَحْقَاؤُكُمْ مُمَنْطَقَةً وَسُرُجُكُمْ مُوقَدَةً، وَأَنْتُمْ مِثْلُ أُنَاسٍ يَنْتَظِرُونَ سَيِّدَهُمْ مَتَى يَرْجِعُ…» [لوقا ١٢ : ٣٥-٣٦]. وبعبارة أخرى، افعلوا بطاعة قلبية ما كلفكم السيد بفعله. وفي هذه الحالة، ابقوا ساهرين لكي تتمكنوا من فتح الباب له حين يأتي. فالأمر بأن تكون أحقاؤنا «مُمَنْطَقَةً» (أي مستعدين للعمل) يعني يقظة متلهفة للقيام دائما بشؤون السيد. وحقيقة أن المشهد يصور عبيدا ستزيد من قوة البعد المفاجئ لفرحنا.\u003c/p\u003e\n\u003cp\u003eثم يخبرنا يسوع لماذا ينبغي أن نكون يقظين جدا لنوجد عاملين مشيئة السيد — لأن ذلك سيثمر طوبى وبركة. «طُوبَى لأُولئِكَ الْعَبِيدِ الَّذِينَ إِذَا جَاءَ سَيِّدُهُمْ يَجِدُهُمْ سَاهِرِينَ.» [لوقا ١٢ : ٣٧]. طوبى! ثم يلقي يسوع بمفاجأته. ظننا أن لدينا فكرة عما سيكون عليه الفرح عند المجيء الثاني حين نصبح جزءا من أهل بيت يسوع الحميمين. فحتى لو دعينا عبيدا، فنحن نعلم أننا لن نكون عبيدا بأي معنى مألوف، لأنه قد دعانا أبناء [رومية ٨ : ١٦] وأحباء [يوحنا ١٥ : ١٥]. لكن يسوع يخبرنا الآن بشيء عن فرح ذلك البيت يتحدى كل التوقعات.\u003c/p\u003e\n\u003ch3\u003eالابن ذو السيادة كخادم مائدة\u003c/h3\u003e\n\u003cp\u003eسيطلب المالك، السيد، منا نحن — العبيد (وهو يستخدم الكلمة لتعزيز المفارقة) — أن نجلس على مائدة العشاء كضيوف له، لأنه سيتمنطق للعمل ويخدمنا! إن كلمة «يَتَمَنْطَقُ» هي الكلمة ذاتها الواردة في [لوقا ١٢ : ٣٥]، حيث طلب من العبيد أن تكون أحقاؤهم «مُمَنْطَقَةً» للعمل. مما يعني أن يسوع يعكس الأدوار عن قصد. يطلب منا الجلوس كأهل للبيت، بينما يأخذ هو دور العبد ليخدمنا.\u003c/p\u003e\n\u003cp\u003eوسيقدم يسوع توضيحا للتلمذة بعد خمسة إصحاحات [لوقا ١٧ : ١٧-١٠] يقول فيه جوهريا: ليس هذا ما يفعله السادة. ولا ينبغي لأي عبد أن يتوقعه: «وَمَنْ مِنْكُمْ لَهُ عَبْدٌ يَحْرُثُ أَوْ يَرْعَى، يَقُولُ لَهُ إِذَا دَخَلَ مِنَ الْحَقْلِ: تَقَدَّمْ سَرِيعًا وَاتَّكِئْ. بَلْ أَلاَ يَقُولُ لَهُ: أَعِدَّ مَا أَتَعَشَّى بِهِ، وَتَمَنْطَقْ وَاخْدِمْنِي حَتَّى آكُلَ وَأَشْرَبَ، وَبَعْدَ ذلِكَ تَأْكُلُ وَتَشْرَبُ أَنْتَ؟ فَهَلْ لِذلِكَ الْعَبْدِ فَضْلٌ لأَنَّهُ فَعَلَ مَا أُمِرَ بِهِ؟ لاَ أَظُنُّ. كَذلِكَ أَنْتُمْ أَيْضًا، مَتَى فَعَلْتُمْ كُلَّ مَا أُمِرْتُمْ بِهِ فَقُولُوا: إِنَّنَا عَبِيدٌ بَاطَّالُونَ، لأَنَّنَا إِنَّمَا عَمِلْنَا مَا كَانَ يَجِبُ عَلَيْنَا.»\u003c/p\u003e\n\u003cp\u003eالسادة لا يخدمون عبيدهم. بل ولا يشكرونهم. فما الذي كان بوسع يسوع أن يقوله أكثر من ذلك ليجعل سلوكه عند مجيء ابن الإنسان أكثر إذهالا للعقول؟ ولا تخطئوا الفهم، فـ [لوقا ١٢ : ٣٧] هو وصف للمجيء المجيد لابن الإنسان. فبعد ثلاثة أعداد، يختتم يسوع قائلا: «فَكُونُوا أَنْتُمْ إِذًا مُسْتَعِدِّينَ، لأَنَّهُ فِي سَاعَةٍ لاَ تَظُنُّونَ يَأْتِي ابْنُ الإِنْسَانِ.» [لوقا ١٢ : ٤٠]. كان يسوع قد صور سلفا جلال المجيء الثاني الباهر. فقد قال: «مَتَى جَاءَ بِمَجْدِهِ وَمَجْدِ الآبِ وَالْمَلاَئِكَةِ الْقِدِّيسِينَ.» [لوقا ٩ : ٢٦]. إن هذا المنتصر المجيد وصاحب السيادة على كل الأعداء سيأتي ليجلس عبيده (الذين سيعاملون كسادة) على المائدة وسيربط نفسه بثياب العبد ويخدمهم.\u003c/p\u003e\n\u003ch3\u003eخدمة العبد المتألم أولا، ثم خدمة العبد الممجد\u003c/h3\u003e\n\u003cp\u003eثم أضف تعليم يسوع هذا من [لوقا ٢٢ : ٢٥-٢٧]:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مُلُوكُ الأُمَمِ يَسُودُونَهُمْ، وَالْمُتَسَلِّطُونَ عَلَيْهِمْ يُدْعَوْنَ مُحْسِنِينَ. وَأَمَّا أَنْتُمْ فَلَيْسَ هكَذَا، بَلِ الْكَبِيرُ فِيكُمْ لِيَكُنْ كَالأَصْغَرِ، وَالْمُتَقَدِّمُ كَالْخَادِمِ. لأَنْ مَنْ هُوَ أَكْبَرُ؟ أَلَّذِي يَتَّكِئُ أَمِ الَّذِي يَخْدِمُ؟ أَلَيْسَ الَّذِي يَتَّكِئُ؟ وَلكِنِّي أَنَا بَيْنَكُمْ كَالَّذِي يَخْدِمُ.»\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eربما ظننا أن نموذج يسوع كخادم سينتهي بانتهاء خدمته الأرضية هذه. أليس هذا ما يبدو أن [فيلبي ٢ : ٦-٩] تشير إليه؟ «الَّذِي إِذْ كَانَ فِي صُورَةِ اللهِ، لَمْ يَحْسِبْ خُلْسَةً أَنْ يَكُونَ مُعَادِلاً ِللهِ. لكِنَّهُ أَخْلَى نَفْسَهُ، آخِذًا صُورَةَ عَبْدٍ، صَائِرًا فِي شِبْهِ النَّاسِ. وَإِذْ وُجِدَ فِي الْهَيْئَةِ كَإِنْسَانٍ، وَضَعَ نَفْسَهُ وَأَطَاعَ حَتَّى الْمَوْتَ مَوْتَ الصَّلِيبِ. لِذلِكَ رَفَّعَهُ اللهُ أَيْضًا، وَأَعْطَاهُ اسْمًا فَوْقَ كُلِّ اسْمٍ»\u003c/p\u003e\n\u003cp\u003eأولا يأتي التواضع وخدمة العبد خلال التجسد؛ ثم تأتي مكافأة الترفيع بعد القيامة. أليس كذلك؟ نعم. ولكنه ليس بهذه البساطة. يمنعنا [لوقا ١٢ : ٣٧] من هذا التبسيط المفرط. فملك الملوك، وخالق العالم، وبهاء مجد الله، وحامل كل الأشياء بكلمة قدرته [تيموثاوس الأولى ٦ : ١٥]؛ [عبرانيين ١ : ٢-٣] سيتخذ صورة عبد عند مجيئه الثاني ويجعل فرحنا بوليمته فرحا مذهلا تدمع له العيون وتعقد له الألسنة وتهتز له الرؤوس عجبا. النموذج هو هذا: ألم ثم مجد [بطرس الأولى ١ : ١١]؛ [بطرس الأولى ٥ : ١]. أو بالأحرى، النموذج هو هذا: خدمة العبد المتألم أولا، ثم خدمة العبد الممجد.\u003c/p\u003e\n\u003ch3\u003eمفارقة أبدية\u003c/h3\u003e\n\u003cp\u003eلا تحبط تعجبك بالحيرة حول كيف سيتماشى هذا مع نار اللهيب التي تجلب النقمة على الأعداء [تسالونيكي الثانية ١ : ١]، أو مع توزيع المكافآت [متى ١٦ : ٢٧]. فالمنظور النبوي للكتاب المقدس يسمح ليوم الرب بأن يستغرق من الوقت ما يلزم لإتمام كل ما يعتزم الله فعله.\u003ca href=\"#ch12-fn-4\"\u003e[٤]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eوفي الواقع، أعتقد أنه سيكون من الخطأ اعتبار ما جاء في [لوقا ١٢ : ٣٧] مجرد حدث. «إِنَّهُ يَتَمَنْطَقُ وَيُتْكِئُهُمْ وَيَتَقَدَّمُ وَيَخْدِمُهُمْ.» فهذه الكلمات لا تنطبق على مأدبة قصيرة واحدة، يعود المسيح بعدها لارتداء درعه، ليكون مجرد الملك المحارب إلى أبد الآبدين.\u003c/p\u003e\n\u003cp\u003eكلا. المغزى هو أن مجد المسيح كان دائما، وسيكون دائما، من ذلك النوع من المجد الذي يجمع بين التميزات المتنوعة، بل والمتناقضة ظاهريا. فمجده ليس أحادي اللون. بل هو متنوع بصورة مبهرة. وموسيقى عظمته ليست مجرد نغمة أحادية بل توافق هائل وعميق. فهو يمزج، وسيمزج دائما، بين الجلال والوداعة، بين مخافة الله والمساواة مع الله، بين الطاعة والسيادة، بين الربوبية والعبودية، بين التسامي والحميمية، بين العدل والرحمة. وسيكون مكانه مألوفا دائما في أردية الملك وفي منشفة العبد على حد سواء.\u003c/p\u003e\n\u003cp\u003eوهناك سبب لذلك. وهو يكمن في جذور سعادتنا عندما يأتي المسيح. المعطي هو من ينال المجد. وسيكون هو دائما معطي النعمة، وسنكون نحن دائما المعتمدين على النعمة. سنكون دائما المستفيدين من النعمة. ولن نكون أبدا محسنين إلى الله. سيكون له دائما مجد الاكتفاء الذاتي وإمداد الجميع بالكل. سيكون هو دائما الينبوع الذي لا ينضب، ونحن العطاش. سيكون هو الخبز الحي، ونحن الجياع. هو الراعي، ونحن الخراف. هو الشمس، ونحن القمر. هو الطبيب الحافظ للصحة، ونحن المرضى المعتمدون عليه دائما.\u003c/p\u003e\n\u003cp\u003eوهذه طريقة أخرى للقول إن مصيرنا، من الأزل إلى الأبد، ليس مجرد تسبيح مجد الله، بل «لِمَدْحِ مَجْدِ نِعْمَتِهِ» [أفسس ١ : ١٦]. فذروة مجده هي فيضان نعمته. ولن يتنازل الله أبدا عن مجد تنزهه عن الاحتياج. ولن يكون مدينا لنا أبدا. وإن فقدت صوابك للحظة وتساءلت عما إذا كان هذا خبرا سارا، فدع هذه الكلمة من [أفسس ٢ : ٦-٧] ترد إليك رشدك: «وَأَقَامَنَا مَعَهُ، وَأَجْلَسَنَا مَعَهُ فِي السَّمَاوَاتِ فِي الْمَسِيحِ يَسُوعَ، لِيُظْهِرَ فِي الدُّهُورِ الآتِيَةِ غِنَى نِعْمَتِهِ الْفَائِقَ، بِاللُّطْفِ عَلَيْنَا فِي الْمَسِيحِ يَسُوعَ.»\u003c/p\u003e\n\u003cp\u003eعندما قال يسوع إنه عند المجيء الثاني، فإن ابن الإنسان «يَتَمَنْطَقُ وَيُتْكِئُهُمْ وَيَتَقَدَّمُ وَيَخْدِمُهُمْ»، لم يكن يصف استثناء ليوم واحد، بل نموذجا للأبدية. فسيتطلب الأمر كل الدهور الآتية لكي يستنفد المسيح علينا غنى نعمته الفائق باللطف علينا. وهذا هو معنى \"الفائق\" الذي لا يقاس.\u003c/p\u003e\n\u003ch3\u003eشركة شخصية مع الخادم ذي السيادة\u003c/h3\u003e\n\u003cp\u003eلذا أستنتج أن مجد المجيء الثاني سيتضمن روعة الشركة الشخصية مع المسيح. وسيكون لهذه الشركة الشخصية بعد عظيم يفوق الوصف: سيكون حميميا ومتساميا في آن واحد. فسيأخذنا إليه [يوحنا ١٤ : ٣]. وفي تلك الشركة، سيأخذنا في اختبارات من جلال الخادم سيتطلب التمتع بها بالكامل أبدية بأسرها.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch12-ref-1\"\u003e[١]\u003c/a\u003e. يحاجج بعض المفسرين بأن كلمات يسوع: «آتِي أَيْضًا»، تشير إلى رجوعه بعد ثلاثة أيام من القبر. على سبيل المثال، روبرت إتش. غوندري، تعليق على العهد الجديد: شروحات آية بآية مع ترجمة حرفية (بيبودي، ماساتشوستس: هندريكسون، ٢٠١٠)، ٤٢٩. ولكن بسبب الكلمات التي يستخدمها يسوع، أجد من الصعب استبعاد الإشارة إلى المجيء الثاني. وبالنظر إلى المعاني المتعددة الطبقات التي يقصدها يوحنا بانتظام، قد يكون \"ألفورد\" قريبا من الحقيقة في محاولته الجمع بين الأمرين: \"لكي نفهم هذا، يجب أن نضع في اعتبارنا ما يسميه شتير بحق 'منظور' النبوة. إن مجيء الرب ثانية ليس عملا مفردا، كقيامته، أو نزول الروح، أو مجيئه الشخصي الثاني، أو المجيء الأخير للدينونة؛ بل هو المجموع المعقد لكل هذه الأشياء، والذي ستكون نتيجته أخذه لشعبه إليه ليكونوا حيثما هو. إن فعل ἔρχομαι (آتي)، يبدأ (في العدد ١٨) في قيامته، ويستمر (في العدد ٢٣) في الحياة الروحية (انظر أيضا الأصحاح ١٦: ٢٢ وما يليه)، كإعداد لهم للمكان المعد؛ ويتقدم أكثر عندما يؤخذ كل واحد بالموت ليكون معه [فيلبي ١ : ٢٣]؛ ويكتمل بالكامل في مجيئه في المجد، عندما يكونون إلى الأبد معه [تسالونيكي الأولى ٤ : ١٧] في حالة القيامة المكملة.\" هنري ألفورد، العهد الجديد اليوناني لألفورد: تعليق تفسيري ونقدي (غراند رابيدز، ميشيغان: غارديان بريس، ١٩٧٦)، ١: ٨٤٩-٥٠.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch12-ref-2\"\u003e[٢]\u003c/a\u003e. انظر على وجه الخصوص الفصلين الثامن والتاسع.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch12-ref-3\"\u003e[٣]\u003c/a\u003e. لا يقدم مثل وليمة العرس في [متى ٢٢ : ١-١٤] كتصوير للمجيء الثاني. والصورة لا تتناسب مع وليمة عرس يكون فيها يسوع هو العريس والتلاميذ هم العروس، لأن التلاميذ الذين يتجددون ويأتون إلى الوليمة هم ضيوف في الوليمة. وهم ليسوا العروس. إنه مثل عن أنواع الأسباب الدنيوية التي يستخدمها الناس للابتعاد عن السخاء الفياض لدعوات الملكوت.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch12-ref-4\"\u003e[٤]\u003c/a\u003e. انظر الفصل الثامن، الهامش ١.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgbzDtpyptfaHSD1rWYBlDvPyKO_MTMJD9NbRMwOJYRvLAP-_9RCWsSUDjxZMw63PycVMR0kQ-W-pLmKHLtf-e6rITtYEySwdWiGkBTkBJRacvHO7Dj4qQt98mRwG5xO0-WFvzeveBaOWgGvhuK5UuP1-9DXzak4SUVHWll32dyr-bEzF0lj2Gx0Rjt_u0/s2752/%D8%A7%D9%84%D9%81%D8%B1%D8%AD_%D8%A7%D9%84%D8%A3%D8%A8%D8%AF%D9%8A_%D9%88%D8%A7%D9%84%D8%B4%D8%B1%D9%83%D8%A9_%D9%85%D8%B9_%D8%A7%D9%84%D8%B3%D9%8A%D8%AF.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgbzDtpyptfaHSD1rWYBlDvPyKO_MTMJD9NbRMwOJYRvLAP-_9RCWsSUDjxZMw63PycVMR0kQ-W-pLmKHLtf-e6rITtYEySwdWiGkBTkBJRacvHO7Dj4qQt98mRwG5xO0-WFvzeveBaOWgGvhuK5UuP1-9DXzak4SUVHWll32dyr-bEzF0lj2Gx0Rjt_u0/s600/%D8%A7%D9%84%D9%81%D8%B1%D8%AD_%D8%A7%D9%84%D8%A3%D8%A8%D8%AF%D9%8A_%D9%88%D8%A7%D9%84%D8%B4%D8%B1%D9%83%D8%A9_%D9%85%D8%B9_%D8%A7%D9%84%D8%B3%D9%8A%D8%AF.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"1b:T7a89,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الحادي عشر\u003c/h2\u003e\n\u003cp\u003eالْفَرَحُ بِرَجَاءِ نَوَالِ مُكَافَآتٍ مُتَبَايِنَةٍ\u003c/p\u003e\n\u003cp\u003eأعود إلى التساؤل الذي طرحناه في بداية الفصل العاشر: عندما يعلم المسيحيون أنه عند مجيء يسوع «حِينَئِذٍ يُجَازِي كُلَّ وَاحِدٍ حَسَبَ عَمَلِهِ» (متى ١٦: ٢٧)، وأنه لن ينال كل مسيحي المدح ذاته، كأن يُقال له: «نِعِمَّا أَيُّهَا الْعَبْدُ الصَّالِحُ وَالأَمِينُ»، فكيف يساعدنا هذا الخبر على محبة ظهور الرب؟ لدي ست إجابات عن هذا التساؤل — ست ملاحظات حول الاختبار المسيحي للمكافآت المتباينة عند ظهور المسيح.\u003c/p\u003e\n\u003ch3\u003e١. لاَ دَيْنُونَةَ\u003c/h3\u003e\n\u003cp\u003eسيختبر كل مسيحي حقيقي — مهما بلغ عدم كماله — يوم المكافآت، وخسارة المكافآت، بثقة مفرحة بأنه: «لاَ شَيْءَ مِنَ الدَّيْنُونَةِ الآنَ عَلَى الَّذِينَ هُمْ فِي الْمَسِيحِ يَسُوعَ» (رومية ٨: ١). هذه هي الصخرة العظيمة التي سيُقام عليها احتفال المكافآت. لا دينونة. «اَلَّذِي يُؤْمِنُ بِهِ لاَ يُدَانُ» (يوحنا ٣: ١٨).\u003c/p\u003e\n\u003cp\u003eومهما كان شكل تلك النار التي ستحرق أفكارنا وأعمالنا المعيبة (كورنثوس الأولى ٣:١٥)، فإننا سنكون واثقين بثقة أعمق موهوبة لنا من الله في ذلك اليوم — ألا وهي أننا نمشي وسط هذه النار ونحن نرتدي الغطاء المقاوم للنار المتمثل في بر المسيح. ففي وسط النار، سنرنم ترنيمة من \"الأصحاح الثامن العظيم\": «مَنْ سَيَشْتَكِي عَلَى مُخْتَارِي اللهِ؟ اَللهُ هُوَ الَّذِي يُبَرِّرُ. مَنْ هُوَ الَّذِي يَدِينُ؟ اَلْمَسِيحُ هُوَ الَّذِي مَاتَ، بَلْ بِالْحَرِيِّ قَامَ أَيْضًا، الَّذِي هُوَ أَيْضًا عَنْ يَمِينِ اللهِ، الَّذِي أَيْضًا يَشْفَعُ فِينَا.» (رومية ٨: ٣٣، ٣٤).\u003c/p\u003e\n\u003cp\u003eولن نُسلب اتزاننا عندما نتذكر كلمات يسوع: «اَلْحَقَّ الْحَقَّ أَقُولُ لَكُمْ: إِنَّ مَنْ يَسْمَعُ كَلاَمِي وَيُؤْمِنُ بِالَّذِي أَرْسَلَنِي فَلَهُ حَيَاةٌ أَبَدِيَّةٌ، وَلاَ يَأْتِي إِلَى دَيْنُونَةٍ، بَلْ قَدِ انْتَقَلَ مِنَ الْمَوْتِ إِلَى الْحَيَاةِ.» (يوحنا ٥: ٢٤). فلن نقول: \"آه، كلا، انظروا: ها نحن نأتي إلى الدينونة. لقد ضللنا يسوع.\" بل سنعرف المعنى الحقيقي لكلمات يسوع. فعبارة \"لاَ يَأْتِي إِلَى دَيْنُونَةٍ\" تعني \"لا يأتي إلى دينونة كمذنب، ولا يأتي إلى دينونة كإدانة.\" وسنعرف أن الدينونة لأجل المكافآت تجري على صخرة دينونة التبرير السابقة: فنحن سلفاً «قَدِ انْتَقَلْنَا مِنَ الْمَوْتِ إِلَى الْحَيَاةِ» (يوحنا ٥: ٢٤؛ راجع يوحنا الأولى ٣: ١٤).\u003c/p\u003e\n\u003ch3\u003e٢. كُلُّ صَلاَحٍ مَأْجُورٌ\u003c/h3\u003e\n\u003cp\u003eسنُذهل في ذلك اليوم بنعمة الله الغامرة وهو يكافئنا على كل عمل صالح فعلناه في حياتنا الإيمانية. يشجع بولس العبيد قائلاً: «خَادِمِينَ بِنِيَّةٍ صَالِحَةٍ كَمَا لِلرَّبِّ، لَيْسَ لِلنَّاسِ. عَالِمِينَ أَنْ مَهْمَا عَمِلَ كُلُّ وَاحِدٍ مِنَ الْخَيْرِ [ἐάν τι ποιήσῃ ἀγαθόν] فَذلِكَ يَنَالُهُ مِنَ الرَّبِّ» (أفسس ٦: ٧، ٨). لقد أدرجت النص اليوناني بين قوسين فقط لأحتفي بالوضوح الذي لا يقبل اللبس لهذا الوعد المذهل. دع هذا الحق يتغلغل فيك. إن كل عمل صالح فعلته — بل كل خير على الإطلاق — مسجل في السماء ليُكافأ عليه كما ينبغي في يوم المسيح.\u003c/p\u003e\n\u003cp\u003eوبناءً على وقت تجديدك في المسيح وعمرك حين تموت، فإن ذلك سيعني آلافاً مؤلفة من الأعمال الصالحة في حياتك التي ستنال مكافأة عنها. ولئلا تظن أنني أبالغ في تقدير مدى اتساع هذا الوعد، تأمل كلمات يسوع هذه: «وَمَنْ سَقَى أَحَدَ هؤُلاَءِ الصِّغَارِ كَأْسَ مَاءٍ بَارِدٍ فَقَطْ بِاسْمِ تِلْمِيذٍ، فَالْحَقَّ أَقُولُ لَكُمْ إِنَّهُ لاَ يُضِيعُ أَجْرَهُ» (متى ١٠: ٤٢). أليست النقطة المحورية في هذا الوعد هي القيمة التي تبدو ضئيلة لكأس الماء؟ أنا أدرك أن الكأس تُعطى \"بِاسْمِ تِلْمِيذٍ\". غير أن التضمين الأوسع لهذه الكلمات هو أن الله يكافئ أصغر الأفعال التي تنبع من قلب يكرم المسيح.\u003c/p\u003e\n\u003cp\u003eدعوني أطيل الوقوف هنا للحظة، نظراً لأن تداعيات هذا الأمر عميقة وشاملة. إن أحد أسباب تخلي الكثير من الناس عن التزاماتهم (في الزواج، أو تربية الأبناء، أو الصداقات، أو الوظائف، إلخ) يعود إلى كوننا مدعوين لمبادلة الشر بالخير في كثير من الأحيان، دون أن يدري أحد بذلك. فنحن نحاول أن نحب الناس جيداً — كشريك الحياة مثلاً — فيرد هو أو ترد هي بلامبالاة أو بسلبية، ربما لآلاف المرات، على مدار عقود. لست أتحدث هنا عن حالات الانتهاك المروعة. بل أتحدث عن أنواع من خيبات الأمل، والإحباطات، والضيق، والغيظ، والندم التي يتعامل معها ٩٥ بالمائة منا في علاقاتنا. والمغزى الذي أرمي إليه هو هذا: إن مئات أو آلاف المحاولات لفعل الصواب في مواجهة الجحود المستمر (من ابن، أو زوج، أو صديق، أو زميل) غالباً ما تمر دون أن يلاحظها أحد على الأرض، ولكنها مرئية ومسجلة عند الله في السماء. وبطرق لا يمكننا تخيلها، ستعود إلينا هذه الأفعال، صغيرة كانت أم كبيرة، بمكافآت تجعلنا نقول بفرح غامر: \"لقد كان الأمر يستحق العناء.\" «مَهْمَا عَمِلَ كُلُّ وَاحِدٍ مِنَ الْخَيْرِ فَذلِكَ يَنَالُهُ مِنَ الرَّبِّ» (أفسس ٦: ٨). وهذا يصدق بغض النظر عن كم النقائص التي ستحترق. إنه لأمر مذهل حقاً!\u003c/p\u003e\n\u003ch3\u003e٣. لاَ أَلَمَ أَمِينًا بِلَا مُكَافَأَةٍ\u003c/h3\u003e\n\u003cp\u003eوتتضمن المكافآت المتنوعة في يوم المسيح مقادير متباينة من التعويض المجيد عن الألم. ويحضر في ذهني هنا ثلاثة أنواع من الألم: ألم الضعف الجسدي والمرض، وألم الاضطهاد، والألم المتكبد في خدمة الآخرين.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eمُكَافَآتٌ عَنْ أَلَمِ الضَّعْفِ الْجَسَدِيِّ وَالْمَرَضِ\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لِذلِكَ لاَ نَفْشَلُ، بَلْ وَإِنْ كَانَ إِنْسَانُنَا الْخَارِجُ يَفْنَى، فَالدَّاخِلُ يَتَجَدَّدُ يَوْمًا فَيَوْمًا. لأَنَّ خِفَّةَ ضِيقَتِنَا الْوَقْتِيَّةَ تُنْشِئُ لَنَا أَكْثَرَ فَأَكْثَرَ ثِقَلَ مَجْدٍ أَبَدِيًّا. وَنَحْنُ غَيْرُ نَاظِرِينَ إِلَى الأَشْيَاءِ الَّتِي تُرَى، بَلْ إِلَى الَّتِي لاَ تُرَى. لأَنَّ الَّتِي تُرَى وَقْتِيَّةٌ، وَأَمَّا الَّتِي لاَ تُرَى فَأَبَدِيَّةٌ» (كورنثوس الثانية ٤: ١٦-١٨).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eليس هذا اضطهاداً. بل هو التقدم في العمر، أو الضعف الناجم عن المرض، أو وهن الإعاقة. ولا يُدعى كل المسيحيين لاحتمال القدر ذاته من الألم بهذه الطريقة. فأي تعزية تُرجى لمن يتألم حتى النهاية — حين لا يتبقى من الحياة على الأرض ما يمكن للمرء أن ينتفع فيه من التأثيرات التقديسية للألم؟ تأتي إجابة بولس: ما من ألم مسيحي يذهب سدى. فهو \"يُنْشِئُ لَنَا... ثِقَلَ مَجْدٍ أَبَدِيًّا\". وبعبارة أخرى، ثمة ارتباط حقيقي بين ألمنا هنا ومقادير المجد التي سنعرفها هناك. سيكافئ الله المتألم المسيحي بناءً على ألمه. وستتباين هذه المكافآت تبايناً هائلاً، وسيقفز فرحاً أولئك الذين تألموا أقل حين يرون أن مكافآت الذين تألموا أكثر تفوق مكافآتهم.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eمُكَافَآتٌ عَنْ أَلَمِ الاضْطِهَادِ\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«طُوبَى لَكُمْ إِذَا عَيَّرُوكُمْ وَطَرَدُوكُمْ وَقَالُوا عَلَيْكُمْ كُلَّ كَلِمَةٍ شِرِّيرَةٍ، مِنْ أَجْلِي، كَاذِبِينَ. اِفْرَحُوا وَتَهَلَّلُوا، لأَنَّ أَجْرَكُمْ عَظِيمٌ فِي السَّمَاوَاتِ، فَإِنَّهُمْ هكَذَا طَرَدُوا الأَنْبِيَاءَ الَّذِينَ قَبْلَكُمْ» (متى ٥: ١١-١٢).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eمن الممكن تفسير هذا على أنه يعني ببساطة أن جميع المسيحيين ينتظرون مكافأة عظيمة — ألا وهي الحياة الأبدية — ولذا ينبغي للمضطهدين أن يتشجعوا. غير أنني لا أعتقد أن هذا هو ما يعنيه يسوع. فحين يدعونا للفرح في خضم اضطهادات محددة، وحين يشير إلى الاختبار المميز للأنبياء، أعتقد أن يسوع يبتغي القول: \"هناك مكافآت مميزة لاضطهادات مميزة.\"\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eمُكَافَآتٌ عَنِ الأَلَمِ الْمُتَكَبَّدِ فِي خِدْمَةِ الآخَرِينَ\u003c/strong\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«بَلْ إِذَا صَنَعْتَ ضِيَافَةً فَادْعُ: الْمَسَاكِينَ، الْجُدْعَ، الْعُرْجَ، الْعُمْيَ، فَيَكُونَ لَكَ الطُّوبَى إِذْ لَيْسَ لَهُمْ حَتَّى يُكَافُوكَ، لأَنَّكَ تُكَافَى فِي قِيَامَةِ الأَبْرَارِ» (لوقا ١٤: ١٣، ١٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eيعد يسوع بأنه في القيامة — عند مجيئه في المجد — سيكون إنكار الذات، أو المشقة، أو الألم الذي تكبدناه في محاولة خدمة أناس لم يتمكنوا من مكافأتنا في هذه الحياة، أحد العوامل التي سيأخذها في الحسبان عند منح مكافآته. لا يقتصر المغزى هنا على أن جميع المسيحيين سينالون الحياة الأبدية، والتي ستكون تعويضاً وافراً عن كل تضحية. بل يمتد المغزى لأبعد من ذلك: لقد رأيت أن عملك الصالح لا يمكن أن يُكافأ في هذه الحياة، ووثقت في وعد يسوع بأن المكافأة التي فقدتها هنا ستُرد إليك في القيامة. وستُرد حتماً.\u003c/p\u003e\n\u003ch3\u003e٤. اخْتِبَارُ الْخَسَارَةِ بِلَا خَطِيَّةٍ\u003c/h3\u003e\n\u003cp\u003eسوف نختبر جميعاً مقادير معتبرة من المكافآت المفقودة عندما تلتهم نيران الدينونة أفكارنا وتعاليمنا وكلماتنا وأفعالنا المعيبة (كورنثوس الأولى ٣: ١٤، ١٥)، غير أن هذا سيكون خيراً لنا. سيكون هو ما نحتاج إليه. وسنختبر هذا التأديب كأشخاص بلا خطية قد كُملوا إما عند الموت (عبرانيين ١٢: ٢٣) أو عند رؤية المسيح في مجيئه (يوحنا الأولى ٣: ٢). وبدون أن تملأنا الخطية بالشفقة على الذات، سوف ننتفع من هذا التأديب كما ينبغي.\u003c/p\u003e\n\u003cp\u003eلقد أشار بولس إلى ما أقصده حين قال: «لأَنَّ الْحُزْنَ الَّذِي بِحَسَبِ مَشِيئَةِ اللهِ يُنْشِئُ تَوْبَةً لِخَلاَصٍ بِلاَ نَدَامَةٍ» (كورنثوس الثانية ٧: ١٠). كان يشير إلى اختبار في هذه الحياة، بينما قلوبنا غير كاملة. فكيف سيكون إذن اختبار الخسارة كمسيحيين كاملين وبلا خطية في محضر المسيح؟ سينظر كل واحد منا إلى الوراء متأملاً في حياته وسيدرك أنه في كل نقطة تقريباً، كان بوسعه أن يكون وكيلاً أكثر أمانة على ما ائتمنه المسيح عليه. ولن تكون مجرد نار هينة تلك التي ستحرق نقائص حياتنا. ولكن فيما نتأمل بعقول وقلوب مطهرة في معنى هذا، سيكون هناك ندم بلا خطية — فلا شفقة على الذات، ولا تذمر، ولا إهمال للنعمة، ولا انعدام للفرح. سيكون ندمنا خلواً من أي ألم مدمر. سيكون ندماً بنّاءً. وسيخدم كثافة شكرنا المذهل بأنه: «إِنْ كَانَ الْبَارُّ بِالْجَهْدِ يَخْلُصُ» (بطرس الأولى ٤: ١٨). لا يسعنا أن نتصور، غير أننا سنختبر، محدودية فرحنا الناجمة عن الخسارة في المكافآت — وهي محدودية بلا خطية ولا إدانة. ستكون سعتنا للفرح أصغر، غير أننا سنكتفي أبدياً بطرق الله الحكيمة والرحيمة.\u003c/p\u003e\n\u003ch3\u003e٥. مُكَافَأَتُكَ الأَعْظَمُ سَتَكُونُ جُزْءًا مِنْ فَرَحِي\u003c/h3\u003e\n\u003cp\u003eإن الخير الذي يصيب الآخرين في يوم المسيح، حين تُوزع المكافآت، سيكون جزءاً من فرحي. ومما لا يقبل اللبس أن الدينونة في ذلك اليوم ستكون فردية بامتياز. (لاحظ كلمة \"كل واحد\" في متى ١٦: ٢٧، وكورنثوس الأولى ٣: ٨، ورؤيا ٢٢: ١٢). غير أنه من الخطأ الجسيم أن نخطئ ونظن أن القديسين في ذلك اليوم سيستغرقون في التركيز على ذواتهم. فلن نكون كذلك. ومكافآت الآخرين ستكون جزءاً عظيماً من فرحنا في ذلك اليوم.\u003c/p\u003e\n\u003cp\u003eيلمح بولس إلى هذا الاختبار مرات عدة. فعلى سبيل المثال: «لأَنْ مَنْ هُوَ رَجَاؤُنَا وَفَرَحُنَا وَإِكْلِيلُ افْتِخَارِنَا؟ أَمْ لَسْتُمْ أَنْتُمْ أَيْضًا أَمَامَ رَبِّنَا يَسُوعَ الْمَسِيحِ فِي مَجِيئِهِ؟ لأَنَّكُمْ أَنْتُمْ مَجْدُنَا وَفَرَحُنَا» (تسالونيكي الأولى ٢: ١٩، ٢٠). لاحظ أن بولس يشير صراحة إلى اختباره عند مجيء المسيح. ومهما كانت المكافآت التي قد يفقدها بولس في نيران تلك الدينونة، فهو لا يركز عليها. بل يركز على حقيقة أن المؤمنين في تسالونيكي سيكونون هناك برفقته. وفيما يُكملون ويُكافأون، سيصبح فرحهم هو فرحه.\u003c/p\u003e\n\u003cp\u003eوبالمثل، فهو يحث المؤمنين في فيلبي قائلاً: «مُتَمَسِّكِينَ بِكَلِمَةِ الْحَيَاةِ، لافْتِخَارِي فِي يَوْمِ الْمَسِيحِ، بِأَنِّي لَمْ أَسْعَ بَاطِلاً وَلاَ تَعِبْتُ بَاطِلاً.» (فيلبي ٢: ١٦). ومرة أخرى، يتجه نظره إلى المجيء الثاني — \"يَوْمِ الْمَسِيحِ\". ورجاؤه هو أنه في ذلك اليوم، سيكون المؤمنون في فيلبي هم افتخاره. أي أنهم سيكونون ثمرة أمانته، وما سيصيبهم في ذلك اليوم سيضاعف مكافأته من المسيح.\u003c/p\u003e\n\u003cp\u003eوهكذا سيكون الحال معنا جميعاً، بدرجة أو بأخرى. فإن عشت حياة الإيمان بيسوع وسعيت لتشكيل حياتك حول كلمته، فسيكون هناك عدد من الناس ممن تأثروا بحياتك يفوق ما تدركه الآن. وأقصد بذلك طرقاً في غاية الصغر والبساطة لا تعلم بها الآن. فربما دفَعتهم كلمة تفوهت بها إلى التصرف بصورة أفضل مما كانوا ليفعلوا لولاها. وربما حفزهم صنيع صنعته على اتخاذ قرار صالح في حياتهم. إن كل هذه المئات من التأثيرات الصالحة في حياة الآخرين ستُعلن في اليوم الأخير. وستكون هي افتخارك وفرحك.\u003c/p\u003e\n\u003ch3\u003e٦. سَعَةٌ مُتَزَايِدَةٌ لِلْفَرَحِ فِي اللهِ\u003c/h3\u003e\n\u003cp\u003eختاماً، ومهما كان الشكل الخارجي الذي ستتخذه، فإن جوهر كل مكافأة سيكون عبارة عن سعة متزايدة للفرح في الله. وسيكون الاختبار الجماعي لهذا التنوع الهائل من السعادة الكاملة خالية من الكبرياء أو الحسد، بل سيتلألأ بانسجام أبدي، حيث سيتحقق بمجد بالغ أن: «وَإِنْ كَانَ عُضْوٌ وَاحِدٌ يُكَرَّمُ، فَجَمِيعُ الأَعْضَاءِ تَفْرَحُ مَعَهُ» (كورنثوس الأولى ١٢: ٢٦).\u003c/p\u003e\n\u003cp\u003eإن ما يدفعني، أنا وكثيرون غيري في تاريخ الكنيسة، لاعتبار أن جوهر المكافآت هو سعات متباينة للسعادة، هو أن تنوعنا في الأبدية لن ينبع من كون بعض القديسين يمتلكون سعادة مشوشة بينما يمتلك آخرون سعادة كاملة، لأن كل المسيحيين موعودون بفرح في الله، خالٍ من الألم والخطية، إلى الأبد:\u003ca href=\"#ch11-fn-1\"\u003e[١]\u003c/a\u003e\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هُوَذَا مَسْكَنُ اللهِ مَعَ النَّاسِ، وَهُوَ سَيَسْكُنُ مَعَهُمْ، وَهُمْ يَكُونُونَ لَهُ شَعْبًا، وَاللهُ نَفْسُهُ يَكُونُ مَعَهُمْ إِلهًا لَهُمْ. وَسَيَمْسَحُ اللهُ كُلَّ دَمْعَةٍ مِنْ عُيُونِهِمْ، وَالْمَوْتُ لاَ يَكُونُ فِي مَا بَعْدُ، وَلاَ يَكُونُ حُزْنٌ وَلاَ صُرَاخٌ وَلاَ وَجَعٌ فِي مَا بَعْدُ، لأَنَّ الأُمُورَ الأُولَى قَدْ مَضَتْ… وَلاَ تَكُونُ لَعْنَةٌ مَا فِي مَا بَعْدُ. وَعَرْشُ اللهِ وَالْخَرُوفِ يَكُونُ فِيهَا، وَعَبِيدُهُ يَخْدِمُونَهُ» (رؤيا ٢١: ٣، ٤؛ ٢٢: ٣).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eغير أنه يبدو أن الأدوار أو الوظائف المتباينة للقديسين في الدهر الآتي لن تُختبر كمكافآت إن لم يكن لها أي أثر على سعادة اختبارنا لله. وعلاوة على ذلك، يشير وصف بولس للقيامة إلى تنوعات في المجد تبدو وكأنها توحي بانعكاسات أعظم أو أقل لمجد الله، والتي سنختبرها كفرح أعظم أو أقل. «مَجْدُ الشَّمْسِ شَيْءٌ، وَمَجْدُ الْقَمَرِ شَيْءٌ آخَرُ، وَمَجْدُ النُّجُومِ شَيْءٌ آخَرُ. لأَنَّ نَجْمًا يَمْتَازُ عَنْ نَجْمٍ فِي الْمَجْدِ. هكَذَا أَيْضًا قِيَامَةُ الأَمْوَاتِ» (كورنثوس الأولى ١٥: ٤١، ٤٢). ولذلك، أستنتج أن جوهر المكافآت في يوم المسيح هو أنه، في حين سيكون كل مسيحي ممجد سعيداً سعادة كاملة، فإن سعاتنا للسعادة ستكون متباينة.\u003c/p\u003e\n\u003cp\u003eوإن كنا نمضي في المسار الصحيح، فإن التساؤل يصبح: كيف يُشكل مثل هذا التنوع الشاسع مستقبلاً جميلاً؟ وكيف يساعدنا على محبة ظهور الرب، عندما يطلق هو العنان لكل هذا التنوع المذهل من السعادة الكاملة؟ لا أعرف وصفاً لجمال هذا المستقبل أفضل من وصف جوناثان إدواردز في عظته حول (رومية ٢: ١٠). فهو يعبر لنا أولاً عن الحقيقة الكتابية المتمثلة في أن سعادة القديسين في الأبدية ستكون كاملة، وغير منقطعة، وأبدية في كل شخص ممجد:\u003ca href=\"#ch11-fn-2\"\u003e[٢]\u003c/a\u003e\u003c/p\u003e\n\u003cp\u003eإن سعادة القديسين هذه لن يعتريها أي انقطاع أبداً. ولن يشوبها أي شائبة؛ ولن تأتي أية غيمة لتحجب نورهم؛ ولن يكون هناك قط ما يُبرّد محبتهم. لن تنضب أنهار المسرة، وسيبقى مجد الله والمسيح ومحبتهما كما هما إلى الأبد، ولن ينقطع تجليهما. لن تدخل إلى هناك خطية أو فساد البتة، ولا تجربة لتعكر صفو طوباويتهم: لن تبرد المحبة الإلهية في القديسين قط، ولن يكون هناك أي تذبذب في أي منهم، ولن تفتر ملكات القديسين عن ممارستها البتة؛ ولن يسأموا أبداً، وسيبقى تذوقهم لتلك المسرات في أوج ذروته إلى الأبد، ولن يكل ذلك المجتمع المجيد من تسبيحات الهللويّا الخاصة بهم. وأعمالهم، وإن كانت بالغة النشاط والحيوية، ستُؤدى بسهولة تامة؛ فلن يكل القديسون من المحبة، والتسبيح، والمخافة، كما لا تكل الشمس أبداً من الإشراق.\u003c/p\u003e\n\u003cp\u003eثم تأتي الصورة المجيدة لكيفية كون هذه السعادة متباينة، غير أنها خالصة وكاملة، بين ملايين القديسين، اختباراً جماعياً مثالياً لجسد المسيح:\u003c/p\u003e\n\u003cp\u003eسيكون مجد القديسين في الأعالي متناسباً إلى حد ما مع سموهم في القداسة والأعمال الصالحة هنا. سيكافئ المسيح الجميع بحسب أعمالهم... ولن يثبط من سعادة أولئك الذين يمتلكون درجات أدنى من السعادة والمجد، وجود آخرين متقدمين في المجد فوقهم: لأن الجميع سيكونون سعداء سعادة تامة، وسيكون كل واحد مكتفياً اكتفاءً تاماً. فكل إناء يُلقى في هذا المحيط من السعادة سيكون ممتلئاً، وإن كانت هناك بعض الأواني التي تكبر غيرها بكثير؛ ولن يكون هناك شيء كالحسد في السماء، بل ستسود المحبة الكاملة في المجتمع بأسره. إن أولئك الذين لم يبلغوا من المجد مبلغ غيرهم، لن يحسدوا من هم أعلى منهم، بل سيكنون لهم محبة عظيمة وقوية ونقية لدرجة أنهم سيفرحون بسعادتهم الفائقة؛ فمحبتهم لهم ستكون من القوة بحيث سيفرحون لكونهم أكثر سعادة منهم؛ وبذلك، وعوضاً عن تثبيط سعادتهم هم، فإن ذلك سيزيدها. وسيرون أنه من اللائق أن يكون أولئك الذين كانوا الأكثر سمواً في أعمال البر هم الأكثر ارتفاعاً في المجد؛ وسيفرحون بإتمام ما هو أحق بأن يتم... أما أولئك الأعلى في المجد، فبقدر ما سيكونون الأكثر جمالاً، سيكونون الأكثر امتلائاً بالمحبة: وكما سيتفوقون في السعادة، سيتفوقون بشكل متناسب في الإحسان الإلهي ومحبة الآخرين... وإلى جانب ذلك، فإن أولئك الذين سيتفوقون في المجد سيتفوقون أيضاً في التواضع. هنا في هذا العالم، يُعد أولئك الذين يعلون على الآخرين أهدافاً للحسد، لأن... الآخرين يتصورونهم متعالين؛ غير أن الأمر لن يكون كذلك في السماء، بل إن أولئك القديسين في السماء الذين يتفوقون في السعادة سيتفوقون أيضاً... في التواضع. إن القديسين في السماء أكثر تواضعاً من القديسين على الأرض، وكلما صعدنا بينهم زاد التواضع؛ فأعلى مراتب القديسين، الذين يعرفون الله أكثر من غيرهم، يرون الفارق الشاسع بينهم وبين الله بأجلى صورة، وبالتالي هم الأقل شأناً نسبياً في أعين أنفسهم، ولذا هم الأكثر تواضعاً. إن رفعة البعض في السماء فوق البقية ستكون أبعد ما تكون عن التقليل من السعادة التامة والفرح الكامل للبقية الذين هم أدنى منهم، بل بالأحرى سيكونون أكثر سعادة بسبب ذلك؛ وسيكون الاتحاد في مجتمعهم من القوة بحيث سيكونون شركاء في سعادة بعضهم البعض. حينئذٍ سيتحقق بكماله ما أُعلن في (كورنثوس الأولى ١٢: ٢٦): «وَإِنْ كَانَ عُضْوٌ وَاحِدٌ يُكَرَّمُ، فَجَمِيعُ الأَعْضَاءِ تَفْرَحُ مَعَهُ».\u003c/p\u003e\n\u003cp\u003eوكما هو الحال مع العديد من الأسرار الأخرى، قد نحتاج لأن نترك بين يدي الله كلياً كيف لنا أن نتصور الطريقة التي ستُحفظ بها الاختلافات في السعادة لملايين وملايين السنين بينما نكتشف معاً المزيد والمزيد من أمجاد المسيح وتفوقاته. وأنا سعيد بترك هذا السر هناك. فقد أُعلن لنا ما يكفي لكي ننشغل جيداً بالتأمل والفرح فيما نعرفه، بدلاً من التبرم بشأن ما يستأثر الله به لنفسه (تثنية ٢٩: ٢٩).\u003c/p\u003e\n\u003ch3\u003eلِنُحِبَّ ظُهُورَهُ\u003c/h3\u003e\n\u003cp\u003eوفي ضوء هذه الملاحظات الست، أكرر التساؤل: هل يسعنا أن نتطلع بفرح وبلا خوف إلى وقت الدينونة هذا عند ظهور المسيح؟ الإجابة هي نعم. سيفعل يسوع كل شيء حسناً. ولا يوجد لدى شعبه ما يجعلهم يرتدون عنه خوفاً. فحتى \"خسائرنا\" ستُقدس وتأخذنا إلى اختبارات جديدة لنعمة الله. وهكذا سيتحقق: «لِكَيْ يَتَمَجَّدَ اسْمُ رَبِّنَا يَسُوعَ الْمَسِيحِ فِيكُمْ، وَأَنْتُمْ فِيهِ، بِنِعْمَةِ إِلهِنَا وَالرَّبِّ يَسُوعَ الْمَسِيحِ» (تسالونيكي الثانية ١: ١٢).\u003c/p\u003e\n\u003cp\u003eوصلاتي هي أن نصدق هذه الوعود، ونتوق لرجاء ذلك الابتهاج، ونحب ظهور الرب.\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eالهوامش:\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch11-ref-1\"\u003e[١]\u003c/a\u003e للاطلاع على المراجع اللاهوتية التاريخية حول تنوع درجات المكافآت والسعادة الأبدية، انظر: أغسطينوس، \u003cem\u003eالثالوث الأقدس\u003c/em\u003e؛ توما الأكويني، \u003cem\u003eالخلاصة اللاهوتية\u003c/em\u003e؛ \u003cem\u003eالاعتراف الأرثوذكسي للكنيسة الشرقية\u003c/em\u003e؛ فيليب شاف، \u003cem\u003eقانون إيمان العالم المسيحي\u003c/em\u003e؛ روبرت غوندري، \u003cem\u003eتعليق على العهد الجديد\u003c/em\u003e.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"#ch11-ref-2\"\u003e[٢]\u003c/a\u003e جوناثان إدواردز، \u003cem\u003eأعمال جوناثان إدواردز\u003c/em\u003e، المجلد ٢، ص ٩٠٢.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh9EKIqRbprr115ozmW912w3FfgXOQ0aT5OSAks49g7N1oIPChMim0RLhLPRWCpKc1UFKO_RHJ5fuLtHznATuoM1o9UZOPzULidTvR7dQregGyWHEZQGWZs0MNq97O_oxbzWRuk61mvaRl8XLs9J9cwGCwFzaZqTUzyrgIM46ITzPptO17l1PjrxtQ5GZs/s2752/%D8%A3%D9%81%D8%B1%D8%A7%D8%AD_%D8%A7%D9%84%D9%85%D9%83%D8%A7%D9%81%D8%A2%D8%AA_%D8%B9%D9%86%D8%AF_%D8%B8%D9%87%D9%88%D8%B1_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh9EKIqRbprr115ozmW912w3FfgXOQ0aT5OSAks49g7N1oIPChMim0RLhLPRWCpKc1UFKO_RHJ5fuLtHznATuoM1o9UZOPzULidTvR7dQregGyWHEZQGWZs0MNq97O_oxbzWRuk61mvaRl8XLs9J9cwGCwFzaZqTUzyrgIM46ITzPptO17l1PjrxtQ5GZs/s600/%D8%A3%D9%81%D8%B1%D8%A7%D8%AD_%D8%A7%D9%84%D9%85%D9%83%D8%A7%D9%81%D8%A2%D8%AA_%D8%B9%D9%86%D8%AF_%D8%B8%D9%87%D9%88%D8%B1_%D8%A7%D9%84%D9%85%D8%B3%D9%8A%D8%AD.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"1c:Ta3e7,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل العاشر\u003c/h2\u003e\n\u003cp\u003eمُجَازَاةُ كُلِّ وَاحِدٍ حَسَبَ عَمَلِهِ\u003c/p\u003e\n\u003cp\u003eأحاول في هذا الفصل والفصل الذي يليه أن أجيب عن سؤال: كيف تساعدنا الدينونة بحسب الأعمال عند مجيء الرب على محبة ظهوره؟ وللإجابة عن هذا السؤال، ينبغي لنا أن نوضح وجود مثل هذه الدينونة عند مجيء يسوع، وكيفية توظيف أعمالنا في ذلك اليوم. وسنطرح في الفصل العاشر سؤالاً: هل تُوظف الأعمال لتأكيد إيماننا؟ وهل تنال مكافآت؟ ثم في الفصل الحادي عشر، يتعين علينا الإجابة عن سؤال: في ضوء مثل هذه الدينونة، كيف تساعدنا هذه الحقيقة على محبة ظهور الرب؟\u003c/p\u003e\n\u003ch3\u003eهَلْ يَنْبَغِي لَنَا أَنْ نَفْرَحَ أَمْ نَخَافَ؟\u003c/h3\u003e\n\u003cp\u003eعندما يعلم المسيحيون من يسوع أنه عند مجيئه: «يُجَازِي كُلَّ وَاحِدٍ حَسَبَ عَمَلِهِ» (متى ١٦: ٢٧)، فهل نميل إلى محبة ظهوره بسبب هذا الخبر؟ أم أنه يجعلنا نرتد عن مجيئه خوفاً؟ وماذا عن كلماته في (رؤيا ٢٢: ١٢): «وَهَا أَنَا آتِي سَرِيعًا وَأُجْرَتِي مَعِي لأُجَازِيَ كُلَّ وَاحِدٍ كَمَا يَكُونُ عَمَلُهُ»؟ هل يُعد هذا سبباً للفرح بمجيء الرب؟ بولس يشير إلى الحدث ذاته عندما يقول: «لأَنَّهُ لاَ بُدَّ أَنَّنَا جَمِيعًا نُظْهَرُ أَمَامَ كُرْسِيِّ الْمَسِيحِ، لِيَنَالَ كُلُّ وَاحِدٍ مَا كَانَ بِالْجَسَدِ بِحَسَبِ مَا صَنَعَ، خَيْرًا كَانَ أَمْ شَرًّا» (كورنثوس الثانية ٥: ١٠
