أوجه \"جوهرة الإنجيل\" لمعاناً أن تستحوذ على انتباهنا لدرجة تمنعنا من رؤية مجد الله المنعكس من الجوهرة بأكملها. لنأخذ \"التبرير\" على سبيل المثال. قليل من أوجه الإنجيل هي أثمن عندي من هذا الوجه. لقد كتبت كتاباً كاملاً لأبين لماذا تعتبر عقيدة التبرير بالإيمان قلب الإنجيل، ولماذا تتضمن احتساب بر المسيح لنا بالإيمان وحده بمعزل عن أعمال الناموس [٢]. لن أخوض في هذا الدفاع هنا إلا للاقتباس من بعض الأصوات المشهود لها؛ فعلى سبيل المثال، كتب جي. سي. بيركاور [٣]: \"إن الاعتراف بالتبرير الإلهي يلمس حياة الإنسان في صميمها، عند نقطة علاقته بالله. إنه يشكل كرازة الكنيسة، ووجود حياة الإيمان وتقدمها، وجذر الأمان البشري ومنظور الإنسان للمستقبل\" [٤].\u003c/p\u003e\n\u003cp\u003eإن الحاجة الأكثر جوهرية للإنسان التي يعالجها الإنجيل تتم معالجتها من خلال عطية التبرير. نحن لسنا مجرد منفصلين عن الله، بل نحن تحت غضبه (يوحنا ٣ : ٣٦؛ رومية ١ : ١٨؛ ٥ : ٩؛ غلاطية ٣ : ١٠). وهذا يعني أن ما يجب أن يتغير بشكل جذري هو غضب الله تجاهنا بسبب خطيتنا التي تهين الله (رومية ٣ : ٢٣). نحن لسنا قادرين على تغيير الله، ولا يمكننا سداد ديننا الخاص: «الأَخُ لَنْ يَفْدِيَ الإِنْسَانَ فِدَاءً، وَلاَ يُعْطِيَ اللهَ كَفَّارَةً عَنْهُ» (مزامير ٤٩ : ٧). لذلك، في رحمته العظيمة، تدخل الله ليقدم المسيح كفارة لغضب الله نفسه (رومية ٣ : ٢٥). لقد امتص المسيح اللعنة التي استحقناها (غلاطية ٣ : ١٣): «الَّذِي حَمَلَ هُوَ نَفْسُهُ خَطَايَانَا فِي جَسَدِهِ عَلَى الْخَشَبَةِ» (١ بطرس ٢ : ٢٤).\u003c/p\u003e\n\u003cp\u003eالتبادل العظيم\u003c/p\u003e\n\u003cp\u003eولكن لم تُحسب خطايانا له فحسب، بل حُسب بره لنا أيضاً. وقد سُمي هذا \"التبادل العظيم\". فعلى سبيل المثال، يكتب جي. آي. باكر [٥]: \"يعلن القاضي أن الخطاة المذنبين محصنون ضد العقاب وأبرار في عينيه. إن التبادل العظيم ليس خيالاً قانونياً، ولا تظاهراً تعسفياً، ولا مجرد لعبة كلمات من جانب الله، بل هو إنجاز مكلف\" [٦]. إن النص الكتابي لهذا \"التبادل العظيم\" هو ٢ كورنثوس ٥ : ٢١:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّهُ جَعَلَ الَّذِي لَمْ يَعْرِفْ خَطِيَّةً، خَطِيَّةً لأَجْلِنَا، لِنَصِيرَ نَحْنُ بِرَّ اللهِ فِيهِ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوهكذا فإن للتبرير هذين الجانبين: إزالة الخطية لأن المسيح يحمل لعنتنا، واحتساب البر لأننا في المسيح، وبره يُحسب لنا [٧]. وبناءً على ذلك، يعرف كالفن [٨] التبرير بأنه: \"القبول الذي يقبلنا الله به في رضاه كرجال أبرار. ونقول إنه يتكون من غفران الخطايا واحتساب بر المسيح\" [٩]. وبالمثل، أكد لوثر [١٠] (الذي سمى عقيدة التبرير بأنها الإيمان الذي يحدد ما إذا كانت الكنيسة تقف أم تسقط [١١]) على هذين الجانبين من التبرير: \"أخذ المسيح كل خطايانا عليه، ومات من أجلها على الصليب\"، و\"هم أبرار لأنهم يؤمنون بالمسيح، الذي يغطيهم بره ويُحتسب لهم\" [١٢].\u003c/p\u003e\n\u003cp\u003eالتبرير هو قلب الإنجيل، وليس خيره الأسمى\u003c/p\u003e\n\u003cp\u003eلذلك، اعتبر البروتستانت عقيدة التبرير (بالنعمة وحدها، من خلال الإيمان وحده، على أساس دم المسيح وبره وحده، لمجد الله وحده، كما تُعلم بسلطان نهائي للكتاب المقدس وحده) أنها \"قلب الإنجيل الكتابي\" [١٣]. وأنا أتفق مع هذا الحكم. ويسرني أن أسمي التبرير قلب الإنجيل. لكن اللغة المجازية (مثل \"قلب\" و\"مركز\") غامضة؛ فماذا تعني؟ بكلمة \"قلب\" أعني أن التبرير يعالج المشكلة الرئيسية بين الله والإنسان بشكل مباشر (انظر أعلاه) ويصبح، بناءً على ذلك، المصدر المستمر لكل بركات الإنجيل الأخرى.\u003c/p\u003e\n\u003cp\u003eهذا يعطي صبغة خاصة للسؤال الجوهري في هذا الكتاب: لماذا يعتبر التبرير خبراً ساراً؟ ما هو الجيد في التبرير بالإيمان وحده؟ أو بشكل أوسع، لماذا يعتبر الإنجيل، الذي يقع التبرير بالإيمان في قلبه، خبراً ساراً؟ نادراً ما يُطرح هذا السؤال، لأن نوال الغفران عن خطايانا وتبرئتنا في المحكمة من جرائم تستوجب الموت واعتبارنا أبراراً أمام إله قدوس هو موقف مفرح بوضوح لدرجة يبدو معها التساؤل \"لماذا هو خبر سار؟\" سؤالاً غير لائق.\u003c/p\u003e\n\u003cp\u003eلكنني أعتقد أننا يجب أن نطرح هذا السؤال بإصرار؛ لأن الإجابة عليه مهمة بشكل لا نهائي. يجب مطالبة كل شخص بالإجابة على السؤال: \"لماذا يعد غفران خطاياك خبراً ساراً لك؟\" \"لماذا يعد وقوفك باراً في قاعة محكمة ديان الكون خبراً ساراً لك؟\". والسبب في ضرورة طرح هذا السؤال هو وجود إجابات تبدو كتابية لكنها تتجاهل تماماً عطية الله ذاته. قد يجيب شخص: \"الغفران خبر سار لأنني لا أريد الذهاب إلى الجحيم\". أو قد يجيب آخر: \"الغفران خبر سار لأن الضمير المذنب شيء فظيع، وأشعر براحة كبيرة عندما أؤمن أن خطاياي قد غُفرت\". أو قد يجيب ثالث: \"أريد الذهاب إلى السماء\". لكن يجب علينا حينئذٍ أن نسأل لماذا يريدون الذهاب إلى السماء. قد يجيبون: \"لأن البديل مؤلم\". أو \"لأن زوجتي الراحلة هناك\". أو \"لأنه سيكون هناك سماء جديدة وأرض جديدة حيث يسود العدل والجمال أخيراً في كل مكان\".\u003c/p\u003e\n\u003cp\u003eما الخطأ في هذه الإجابات؟ من الصحيح أنه لا ينبغي لأحد أن يرغب في الذهاب إلى الجحيم. والغفران يريح الضمير المذنب بالفعل. وفي السماء سنعود إلى أحبائنا الذين ماتوا في المسيح، وسنهرب من آلام الجحيم ونتمتع بعدل وجمال الأرض الجديدة. كل هذا حقيقي. إِذاً، ما الخطأ في تلك الإجابات؟ الخطأ فيها هو أنها لا تعامل الله بصفته الخير النهائي والأسمى للإنجيل. إنها لا تعبر عن رغبة عليا في أن نكون مع الله. لم يُذكر الله حتى؛ بل ذُكرت عطاياه فقط. هذه العطايا ثمينة، لكنها ليست الله. وهي ليست الإنجيل إذا لم يُعتز بالله نفسه بصفته العطية الأسمى للإنجيل. أي أنه إذا لم يكن الله هو الكنز بصفته العطية النهائية للإنجيل، فلن تكون أي من عطاياه إنجيلاً أو خبراً ساراً. وإذا كان الله هو الكنز بصفته العطية ذات القيمة الأسمى في الإنجيل، فعندئذٍ سنتمتع بكل العطايا الأخرى الأقل أيضاً.\u003c/p\u003e\n\u003cp\u003eالتبرير ليس غاية في حد ذاته. ولا غفران الخطايا، ولا احتساب البر. ولا الهرب من الجحيم، ولا دخول السماء، ولا التحرر من الأمراض، ولا العتق من العبودية، ولا الحياة الأبدية، ولا العدل، ولا الرحمة، ولا جماليات عالم خالٍ من الألم. لا شيء من أوجه \"جوهرة الإنجيل\" هذه هو الخير الرئيسي أو الهدف الأسمى للإنجيل. شيء واحد فقط هو الغاية: رؤية الله ذاته والابتهاج به، والتغير إلى صورة ابنه حتى نبتهج بجمال وقيمة الله غير المحدودين ونظهرهما أكثر فأكثر [١٤].\u003c/p\u003e\n\u003cp\u003eلماذا أريد أن يُغفر لي؟\u003c/p\u003e\n\u003cp\u003eتأمل في هذا التشبيه لما أحاول قوله. هب أنني استيقظت في الصباح، وبينما كنت أسير نحو الحمام تعثرت ببعض غسيل زوجتي الذي تركته ملقى على أرضية الردهة. بدلاً من مجرد نقل الغسيل بنفسي وافتراض الخير فيها، كان رد فعلي مبالغاً فيه تماماً وتلفظت بشيء قاصٍ جداً لزوجتي بينما كانت تستيقظ لتوها. نهضت هي، ووضعت الغسيل في مكانه، ونزلت إلى الطابق السفلي قبلي. كان بإمكاني أن أدرك من خلال الصمت ومن ضميري أن علاقتنا في مشكلة خطيرة.\u003c/p\u003e\n\u003cp\u003eبينما أنزل إلى الطابق السفلي، كان ضميري يدينني. نعم، ما كان ينبغي للغسيل أن يكون هناك؛ نعم، ربما كُسرت رقبتي؛ لكن تلك الأفكار هي في الأساس حديث \"الجسد\" المدافع عن نفسه. الحقيقة هي أن كلماتي كانت خارجة عن الحدود تماماً؛ لم تكن القسوة العاطفية مبالغاً فيها فحسب مقارنة بخطئها، بل إن الكتاب المقدس يخبرني أن أتغاضى عن الخطأ: «لِمَاذَا لاَ تُظْلَمُونَ بِالْحَرِيِّ؟ لِمَاذَا لاَ تُصْلَبُونَ بِالْحَرِيِّ؟» (١ كورنثوس ٦ : ٧).\u003c/p\u003e\n\u003cp\u003eلذا، بينما أدخل المطبخ، كان هناك جليد في الأجواء، وكان ظهرها موارباً لي بوضوح وهي تعمل عند طاولة المطبخ. ما الذي يجب أن يحدث هنا؟ الإجابة واضحة: أحتاج للاعتذار وطلب الغفران. سيكون هذا هو التصرف الصحيح. لكن هنا يكمن التشبيه: لماذا أريد غفرانها؟ لكي تعد لي فطوري المفضل؟ لكي ترحل مشاعر الذنب عني وأتمكن من التركيز في عملي اليوم؟ لكي لا يرى الأطفال خلافنا؟ لكي تعترف أخيراً بأن الغسيل ما كان يجب أن يكون هناك؟ قد تتحقق كل واحدة من تلك الرغبات، لكنها جميعاً دوافع معيبة لطلب غفرانها. إن ما ينقص هو التالي: أريد أن يُغفر لي لكي أحظى بالشركة الحلوة مع زوجتي مرة أخرى. هي السبب في رغبتي في نوال الغفران. أريد استعادة العلاقة. الغفران هو ببساطة وسيلة لإزالة العقبات من الطريق حتى نتمكن من النظر إلى بعضنا البعض ثانية بفرح.\u003c/p\u003e\n\u003cp\u003eهل ستكون سعيداً في السماء إذا لم يكن الله هناك؟\u003c/p\u003e\n\u003cp\u003eإن وجهة نظري في هذا الكتاب هي أن كل أحداث الخلاص وكل بركات الخلاص في الإنجيل هي وسائل لإزالة العقبات من الطريق لكي نعرف الله ونبتهج به على أكمل وجه. الكفارة، الفداء، الغفران، احتساب البر، التقديس، التحرر، الشفاء، السماء — لا شيء من هذه أخبار سارة إلا لسبب واحد: أنها تقربنا إلى الله لابتهاجنا الأبدي به. إذا كنا نؤمن أن كل هذه الأشياء قد حدثت لنا، ولكننا لا نعتنقها من أجل الوصول إلى الله، فهي لم تحدث لنا. المسيح لم يمت ليغفر لخطاة يستمرون في كنز أي شيء فوق رؤية الله والابتهاج به. والأشخاص الذين قد يكونون سعداء في السماء لو لم يكن المسيح هناك، لن يكونوا هناك. الإنجيل ليس وسيلة لإيصال الناس إلى السماء؛ إنه وسيلة لإيصال الناس إلى الله. إنه وسيلة للتغلب على كل عقبة تحول دون الفرح الأبدي في الله. إذا لم نكن نريد الله فوق كل شيء، فنحن لم نتغير بالإنجيل.\u003c/p\u003e\n\u003cp\u003eما هو الخير الأسمى الذي يجعل الإنجيل خبراً ساراً؟\u003c/p\u003e\n\u003cp\u003eالآن يجب أن ننتقل إلى الأساس الكتابي لهذه الحقيقة. لقد رأينا التعريف الكتابي الواسع للإنجيل، وركزنا على قلب الإنجيل في التبرير. والآن يجب أن نتساءل: ما هو الخير النهائي للإنجيل؟ ما هو هدفه؟ أي خير أسمى يجعل كل الجوانب الأخرى للإنجيل جيدة؟ لهذا ننتقل أولاً إلى إعلان عظيم للإنجيل في العهد القديم موجود في إشعياء ٤٠ : ٩:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«عَلَى جَبَلٍ عَالٍ اصْعَدِي، يَا مُبَشِّرَةَ صِهْيَوْنَ. ارْفَعِي صَوْتَكِ بِقُوَّةٍ، يَا مُبَشِّرَةَ أُورُشَلِيمَ. ارْفَعِي لاَ تَخَافِي. قُولِي لِمُدُنِ يَهُوذَا: هُوَذَا إِلَهُكُمْ».\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eشوق الإنجيل العظيم: أرني مجدك\u003c/p\u003e\n\u003cp\u003eإن الخير النهائي الذي أتيح بموت المسيح وقيامته، والمعلن في الإنجيل، هو: «هُوَذَا إِلَهُكُمْ!». لقد تضرع موسى لنيل هذه العطية وهو يصارع من أجل حضرة الله في الرحلة إلى أرض الموعد: «فَقَالَ: أَرِنِي مَجْدَكَ» (خروج ٣٣ : ١٨). وعبر الملك داود عن تفرد هذه البركة في مزمور ٢٧ : «وَاحِدَةً سَأَلْتُ مِنَ الرَّبِّ وَإِيَّاهَا أَلْتَمِسُ: أَنْ أَسْكُنَ فِي بَيْتِ الرَّبِّ كُلَّ أَيَّامِ حَيَاتِي، لِكَيْ أَنْظُرَ إِلَى جَمَالِ الرَّبِّ، وَأَتَفَرَّسَ فِي هَيْكَلِهِ... لَكَ قَالَ قَلْبِي: قُلْتَ اطْلُبُوا وَجْهِي. وَجْهَكَ يَا رَبُّ أَطْلُبُ» (الآيات ٤، ٨). وذكرى هذه اللقاءات مع الله ساندت داود في ضيقاته: «يَا اللهُ، إِلَهِي أَنْتَ. إِلَيْكَ أُبَكِّرُ. عَطِشَتْ إِلَيْكَ نَفْسِي، يَشْتَاقُ إِلَيْكَ جَسَدِي فِي أَرْضٍ نَاشِفَةٍ وَيَابِسَةٍ بِلاَ مَاءٍ، لِكَيْمَا أُبْصِرَ قُوَّتَكَ وَمَجْدَكَ كَمَا قَدْ رَأَيْتُكَ فِي مَقْدِسِكَ» (مزامير ٦٣ : ١-٢).\u003c/p\u003e\n\u003cp\u003eنحن نعلم أن رؤية الله مستحيلة بمعنيين: أخلاقياً، نحن لسنا صالحين بما يكفي في حالتنا الساقطة وسوف نفنى في نار قداسته إذا رأيناه تماماً كما هو؛ ولهذا السبب أظهر الله لموسى \"ظهره\" وليس وجهه: «وَقَالَ: لاَ تَقْدِرُ أَنْ تَرَى وَجْهِي، لأَنَّ الإِنْسَانَ لاَ يَرَانِي وَيَعِيشُ» (خروج ٣٣ : ٢٠). فَوَضَعَ اللهُ موسى في نقرة صخرة، واجتاز، وقال: «ثُمَّ أَرْفَعُ يَدِي فَتَنْظُرُ وَرَائِي، وَأَمَّا وَجْهِي فَلاَ يُرَى» (الآية ٢٣).\u003c/p\u003e\n\u003cp\u003eلكن استحالة رؤية الله ليست فقط بسبب حالتنا الأخلاقية، بل هي أيضاً لأنّه هو الله ونحن لسنا كذلك. يبدو أن هذا هو معنى ١ تيموثاوس ٦ : ١٦: «الَّذِي وَحْدَهُ لَهُ عَدَمُ الْمَوْتِ، سَاكِناً فِي نُورٍ لاَ يُدْنَى مِنْهُ، الَّذِي لَمْ يَرَهُ أَحدٌ مِنَ النَّاسِ وَلاَ يَقْدِرُ أَنْ يَرَاهُ، الَّذِي لَهُ الْكَرَامَةُ وَالْقُدْرَةُ الأَبَدِيَّةُ. آمِينَ». فالكائنات المخلوقة ببساطة لا تستطيع النظر إلى الخالق ورؤيته كما هو [١٥].\u003c/p\u003e\n\u003cp\u003eلذلك، كان التفرس في الله في العهد القديم يتم بوسيط؛ كان هناك شيء ما في المنتصف. لقد أعلن الله عن نفسه في أفعاله (مزامير ٧٧ : ١١-١٣) وأشكال رؤيوية (مثل حزقيال ١ : ٢٨) والطبيعة (مزامير ١٩ : ١) والملائكة (قضاة ١٣ : ٢١-٢٢) وبشكل خاص من خلال كلمته: «وَعَادَ الرَّبُّ يَتَرَاءَى فِي شِيلُوهَ، لأَنَّ الرَّبَّ اسْتَعْلَنَ لِصَمُوئِيلَ فِي شِيلُوهَ بِكَلِمَةِ الرَّبِّ» (١ صموئيل ٣ : ٢١).\u003c/p\u003e\n\u003cp\u003eمجد الرب يُستعلن — في يسوع المسيح\u003c/p\u003e\n\u003cp\u003eولكن سيأتي اليوم الذي يُستعلن فيه مجد الرب ويُرى بطريقة جديدة. كان هذا هو أعظم رجاء وتوقع في العهد القديم. «صَوْتُ صَارِخٍ فِي الْبَرِّيَّةِ: أَعِدُّوا طَرِيقَ الرَّبِّ. قَوِّمُوا فِي الْقَفْرِ سَبِيلاً لإِلَهِنَا. كُلُّ وَطَاءٍ يَرْتَفِعُ، وَكُلُّ جَبَلٍ وَأَكَمَةٍ يَنْخَفِضُ، وَيَصِيرُ الْمُعْوَجُّ مُسْتَقِيمًا، وَالْعَرَاقِيبُ سَهْلاً. فَيُعْلَنُ مَجْدُ الرَّبِّ وَيَرَاهُ كُلُّ بَشَرٍ جَمِيعًا، لأَنَّ فَمَ الرَّبِّ تَكَلَّمَ» (إشعياء ٤٠ : ٣-٥). «فَإِنِّي آتِي لِأَجْمَعَ كُلَّ الْأُمَمِ وَالْأَلْسِنَةِ، فَيَأْتُونَ وَيَرَوْنَ مَجْدِي» (إشعياء ٦٦ : ١٨).\u003c/p\u003e\n\u003cp\u003eلقد بزغ هذا اليوم بمجيء يسوع؛ فقد كان هو كلمة الله، وكان حقاً هو الله، وكان هو الإعلان المتجسد لمجد الله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فِي الْبَدْءِ كَانَ الْكَلِمَةُ، وَالْكَلِمَةُ كَانَ عِنْدَ اللهِ، وَكَانَ الْكَلِمَةُ اللهَ... وَالْكَلِمَةُ صَارَ جَسَداً وَحَلَّ بَيْنَنَا، وَرَأَيْنَا مَجْدَهُ، مَجْداً كَمَا لِوَحِيدٍ مِنَ الآبِ، مَمْلُوءاً نِعْمَةً وَحَقّاً» (يوحنا ١ : ١، ١٤).\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوعندما صنع عجائبه، كان المجد الذي رآه الناس —إذا آمنوا— هو مجد الله. قال يسوع لمرثا، قبيل إقامته لأخيها لعازر من الموت: «أَلَمْ أَقُلْ لَكِ: إِنْ آمَنْتِ تَرَيْنَ مَجْدَ اللهِ؟» (يوحنا ١١ : ٤٠).\u003c/p\u003e\n\u003cp\u003eظهر من الله أكثر مما حلم به الأنبياء\u003c/p\u003e\n\u003cp\u003eلقد أشرق مجد الرب على العالم بشكل أكمل وأروع مما تخيله الأنبياء. لقد عرفوا أن المسيا سيأتي وأنه سيظهر بر وأمانة الله كما لم يحدث من قبل. لكنهم لم يتمكنوا من الرؤية بوضوح [١٦]، كما نرى نحن، أنه في يسوع «فِيهِ يَحلُّ كُلُّ مِلْءِ اللَّاهُوتِ جَسَدِيّاً» (كولوسي ٢ : ٩)، وأنه في الآب والآب فيه، والاثنان واحد (يوحنا ١٠ : ٣٠، ٣٨). لكانوا سيصُعقوا وتُلجم ألسنتهم لو سمعوا يسوع يقول لفيلبس: «أَنَا مَعَكُمْ زَمَاناً هَذِهِ مُدَّتُهُ وَلَمْ تَعْرِفْنِي يَا فِيلُبُّسُ! اَلَّذِي رَآنِي فَقَدْ رَأَى الآبَ، فَكَيْفَ تَقُولُ أَنْتَ: أَرِنَا الآبَ؟» (يوحنا ١٤ : ٩). أو لو سمعوا يسوع يقول تلك الكلمات البسيطة والمذهلة: «قَبْلَ أَنْ يَكُونَ إِبْرَاهِيمُ أَنَا كَائِنٌ» (يوحنا ٨ : ٥٨).\u003c/p\u003e\n\u003cp\u003eولهذا السبب دعا الرسول بولس يسوع بـ «الْمَسِيحُ الْكَائِنُ عَلَى الْكُلِّ إِلَهاً مُبَارَكاً إِلَى الأَبَدِ» (رومية ٩ : ٥)، ولهذا وصف المسيح في تجسده بأنه كان «فِي صُورَةِ اللهِ» (فيلبي ٢ : ٦) [١٧]. ولهذا نجد في رسالة العبرانيين هذه الكلمات المذهلة عن يسوع: «وَأَمَّا عَنْ الاِبْنِ: كُرْسِيُّكَ يَا أَللهُ إِلَى دَهْرِ الدُّهُورِ... وَأَنْتَ يَا رَبُّ فِي الْبَدْءِ أَسَّسْتَ الأَرْضَ، وَالسَّمَاوَاتُ هِيَ عَمَلُ يَدَيْكَ» (١ : ٨، ١٠). عندما نرى يسوع، نرى مجد الله كما لا نراه في أي إعلان آخر [١٨].\u003c/p\u003e\n\u003cp\u003eتسامي المسيح الذي لم يره الجميع\u003c/p\u003e\n\u003cp\u003eبالطبع، كان هناك الكثيرون ممن رأوا يسوع ولم يروا مجد الله. رأوا أكولاً وشريب خمر (متى ١١ : ١٩)؛ رأوا بعلزبول رئيس الشياطين (متى ١٠ : ٢٥؛ ١٢ : ٢٤)؛ رأوا مخادعاً (متى ٢٧ : ٦٣). «لأَنَّهُمْ مُبْصِرِينَ لاَ يُبْصِرُونَ، وَسَامِعِينَ لاَ يَسْمَعُونَ» (متى ١٣ : ١٣). بل كان مجده في مجيئه الأول هو ذلك المزيج الفريد والرائع من الكمالات الروحية والأخلاقية والفكرية واللفظية والعملية التي ظهرت في نوع من صنع المعجزات الوديع، والتعليم الذي لا يُرد عليه، والعمل المتواضع الذي ميز يسوع عن جميع البشر [١٩].\u003c/p\u003e\n\u003cp\u003eما أحاول التعبير عنه هنا هو أن مجد المسيح يكمن في ما أسماه جوناثان إدواردز [٢٠] \"اقتران رائع من كمالات متنوعة\" [٢١]. ففي وعظة [٢٢] بعنوان \"تسامي المسيح\"، اتخذ إدواردز من نص رؤيا ٥ : ٥-٦ نصاً له، حيث يُشبه المسيح بكل من الأسد والحمل. كانت نقطته هي أن مجد المسيح الفريد يكمن في اتحاد مثل هذه الكمالات المتنوعة (الأسد والحمل) فيه؛ وهي كمالات متنوعة لدرجة أنها \"كانت لتبدو لنا غير متوافقة إطلاقاً في ذات الشخص\" [٢٣]. ونحن نعجب به لعظمته، ولكن بالأكثر لأنها عظمة في وداعة. ونحن نعجب به لأنه استطاع تهدئة العاصفة، ولكن بالأكثر لأنه رفض استخدام تلك القوة لضرب السامريين بالبرق (لوقا ٩ : ٥٤-٥٥).\u003c/p\u003e\n\u003cp\u003eمبصرين لم يبصروا، لأنهم أحبوا مجد الناس\u003c/p\u003e\n\u003cp\u003eلكن لم يرَ الجميع. فبينما كان لبعضهم عيون، إلا أنهم لم يبصروا. أما الذين كانت لهم عيون ليروا، فقد رأوا مجد الله عندما كان المسيح على الأرض. قال يسوع إن المؤمنين وحدهم هم من يمكنهم رؤية هذا المجد؛ فعلى سبيل المثال، عندما قلقت مرثا من أن أخيها الميت لن يقيمه يسوع، قال لها: «أَلَمْ أَقُلْ لَكِ: إِنْ آمَنْتِ تَرَيْنَ مَجْدَ اللهِ؟» (يوحنا ١١ : ٤٠). البعض رأى لعازر يُقام من الموت، لكنهم لم يروا مجد الله [٢٤]. «فَكَثِيرُونَ مِنَ الْيَهُودِ الَّذِينَ جَاءُوا إِلَى مَرْيَمَ وَنَظَرُوا مَا فَعَلَ يَسُوعُ آمَنُوا بِهِ. وَأَمَّا قَوْمٌ مِنْهُمْ فَمَضَوْا إِلَى الْفَرِّيسِيِّينَ وَقَالُوا لَهُمْ عَمَّا فَعَلَ يَسُوعُ» (يوحنا ١١ : ٤٥-٤٦) [٢٥].\u003c/p\u003e\n\u003cp\u003eإن مجد المسيح لا يترادف مع القوة الخام؛ فالمجد هو الجمال الإلهي لكمالاته المتعددة. ورؤية هذا تتطلب تغييراً في القلب. يوضح يسوع ذلك عندما يسأل: «كَيْفَ تَقْدِرُونَ أَنْ تُؤْمِنُوا وَأَنْتُمْ تَقْبَلُونَ مَجْداً بَعْضُكُمْ مِنْ بَعْضٍ، وَالْمَجْدُ الَّذِي مِنَ الإِلَهِ الْواحِدِ لَسْتُمْ تَطْلُبُونَهُ؟» (يوحنا ٥ : ٤٤). إن الحالة الطبيعية المتمركزة حول الذات للقلوب البشرية لا يمكنها أن تؤمن، لأنها لا تستطيع رؤية الجمال الروحي.\u003c/p\u003e\n\u003cp\u003eما لم يولد الإنسان ثانية لا يقدر أن يرى\u003c/p\u003e\n\u003cp\u003eلذلك، عندما يرى التلاميذ مجد المسيح ويؤمنون به، يقول يسوع: «وَلَكِنْ طُوبَى لِعُيُونِكُمْ لأَنَّهَا تُبْصِرُ، وَلآذَانِكُمْ لأَنَّهَا تَسْمَعُ» (متى ١٣ : ١٦). هناك عمل خاص للنعمة يغير قلوبنا ويمكننا من رؤية المجد الروحي. هذا هو ما عناه يسوع عندما قال: «إِنْ كَانَ أَحَدٌ لاَ يُولَدُ مِنْ فَوْقُ لاَ يَقْدِرُ أَنْ يَرَى مَلَكُوتَ اللهِ» (يوحنا ٣ : ٣). عندما نولد ثانية بروح الله، تحيا أرواحنا، ونصبح قادرين على إدراك الجمال الروحي المُصادق لذاته في شخص وعمل المسيح [٢٦].\u003c/p\u003e\n\u003cp\u003eرؤية مجد المسيح لها تقلبات\u003c/p\u003e\n\u003cp\u003eالقدرة على رؤية الجمال الروحي ليست ثابتة؛ فهناك تقلبات في شركتنا مع المسيح. هناك أوقات من الرؤية الغائمة، خاصة إذا تغلبت الخطية في حياتنا لفترة من الزمن. «طُوبَى لِلأَنْقِيَاءِ الْقَلْبِ، لأَنَّهُمْ يُعَايِنُونَ اللهَ» (متى ٥ : ٨). وفقط عندما نصير كاملين في الدهر الآتي ستكون رؤيتنا غير غائمة. ولهذا السبب صلى بولس: «[لكي] يُعْطِيَكُمْ إِلَهُ رَبِّنا يَسُوعَ الْمَسِيحِ، أَبُو الْمَجْدِ، رُوحَ الْحِكْمَةِ وَالإِعْلاَنِ فِي مَعْرِفَتِهِ، مُسْتَنِيرَةً عُيُونُ أَذْهَانِكُمْ».\u003c/p\u003e\n\u003cp\u003eأكثر الأوامر نعمة وأفضل عطايا الإنجيل\u003c/p\u003e\n\u003cp\u003eإن الخير النهائي للإنجيل هو رؤية والابتهاج بجمال وقيمة الله. إن غضب الله وخطيتنا يعيقان تلك الرؤية وذلك الابتهاج. الغاية النهائية للإنجيل هي إظهار مجد الله وإزالة كل عقبة تحول دون رؤيتنا له وابتهاجنا به كأسمى كنز لنا. «هُوَذَا إِلَهُكُمْ!» هو أكثر الأوامر نعمة وأفضل عطية في الإنجيل. إذا لم نره ونبتهج به كأعظم ثروة لنا، فنحن لم نطع أو نؤمن بالإنجيل.\u003c/p\u003e\n\u003chr\u003e\n\u003cp\u003e\u003cstrong\u003e[الهوامش]\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e[٢] John Piper, Counted Righteous in Christ: Should We Abandon the Imputation of Christ’s Righteousness? (Wheaton, Ill.: Crossway Books, 2002).\u003c/p\u003e\n\u003cp\u003e[٣] جي. سي. بيركاور: لاهوتي هولندي إصلاحي بارز، أستاذ اللاهوت النظامي في جامعة أمستردام الحرة، عُرف بسلسلة \"دراسات في اللاهوت العقيدي\".\u003c/p\u003e\n\u003cp\u003e[٤] G. C. Berkouwer, Faith and Justification (Grand Rapids, Mich.: Eerdmans, 1954), 17.\u003c/p\u003e\n\u003cp\u003e[٥] جي. آي. باكر: لاهوتي بريطاني-كندي إصلاحي، مؤلف \"معرفة الله\" الكلاسيكي، ومحرر \"الكتاب المقدس الإنجليزي القياسي\" (ESV).\u003c/p\u003e\n\u003cp\u003e[٦] J. I. Packer, “Justification in Protestant Theology,” in Honoring the People of God, the Collected Shorter Writings of J. I. Packer, 4 vols. (Carlisle, Cumbria, UK: Paternoster, 1999), 4:227.\u003c/p\u003e\n\u003cp\u003e[٧] للدفاع عن هذا البيان، انظر الكتاب المذكور أعلاه: جون بايبر، احتسب باراً في المسيح.\u003c/p\u003e\n\u003cp\u003e[٨] جون كالفن: لاهوتي فرنسي إصلاحي، مؤسس النظام اللاهوتي في جنيف، مؤلف \"معاهد الدين المسيحي\" الذي يعد أساس اللاهوت الإصلاحي.\u003c/p\u003e\n\u003cp\u003e[٩] John Calvin, Institutes of the Christian Religion, 2 vols., ed. John T. McNeill, trans. Ford Lewis Battles (Philadelphia: Westminster Press, 1960), 1:727 (III.11.2).\u003c/p\u003e\n\u003cp\u003e[١٠] مارتن لوثر: مصلح ألماني، أب الإصلاح البروتستانتي، مؤلف \"الأطروحات الـ٩٥\" التي أشعلت الإصلاح ضد صكوك الغفران.\u003c/p\u003e\n\u003cp\u003e[١١] Cited in Packer, “Justification in Protestant Theology,” 19.\u003c/p\u003e\n\u003cp\u003e[١٢] Quoted in ibid., 225-226.\u003c/p\u003e\n\u003cp\u003e[١٣] \"كان قلب الإنجيل الكتابي بالنسبة لـ [المصلحين] هو عطية الله المجانية للبر والتبرير. هنا كان مجموع وجوهر الإيمان وحده — النعمة وحدها — المسيح وحده — الكتاب المقدس وحده — مجد الله وحده، وهو الموضوع المستمر لإعلاناتهم، ومناظراتهم، وتسابيحهم وصلواتهم\". المرجع السابق، ٢١٩.\u003c/p\u003e\n\u003cp\u003e[١٤] انظر الفصل الحادي عشر لشرح العلاقة بين هدف رؤية الله وهدف الصيرورة مثل الله.\u003c/p\u003e\n\u003cp\u003e[١٥] أعتبر نصوص الكتاب المقدس التي تبدو استثناءات لهذا (مثل تكوين ٣٢ : ٣٠: «فَدَعَا يَعْقُوبُ اسْمَ الْمَكَانِ فَنِيئِيلَ قَائِلاً: لأَنِّي نَظَرْتُ اللهَ وَجْهاً لِوجْهٍ، وَنُجِّيَتْ نَفْسِي») كبيانات تسير على نهج مزمور ٢٧ : ٤، ٨ حيث تعني رؤية وجه الله رؤية انعكاسات وأدلة بهائه ورضاه. بعض هذه الانعكاسات رائعة لدرجة أن الشهود يتحدثون عن رؤية الله نفسه — لكننا لا نحتاج إلى الاعتقاد بأنهم يعنون ذلك بدون وسيط على الإطلاق. يعلق جون سيلهامر: \"لم تعن ملاحظة يعقوب بالضرورة أن 'الرجل' الذي صارع معه يعقوب كان هو الله في الواقع. بل، كما هو الحال مع تصريحات مماثلة أخرى (مثل قضاة ١٣ : ٢٢)، عندما يرى المرء 'ملاك الرب'، كان من المناسب القول إنه رأى وجه الله\". Genesis, in The Expositor’s Bible Commentary, 12 vols., ed. Frank E. Gaebelein (Grand Rapids, Mich.: Zondervan, 1990), 1:210.\u003c/p\u003e\n\u003cp\u003e[١٦] تقول رسالة ١ بطرس ١ : ١٠-١١: «الْخَلاَصَ الَّذِي فَتَّشَ عَنْهُ أَنْبِيَاءُ وَبَحَثُوا عَنْهُ، الَّذِينَ تَنَبَّأُوا عَنِ النِّعْمَةِ الَّتِي لأَجْلِكُمْ، بَاحِثِينَ أَيُّ وَقْتٍ أَوْ أَيُّ حَالٍ كَانَ يَدُلُّ عَلَيْهِ رُوحُ الْمَسِيحِ الَّذِي فِيهِمْ، إِذْ سَبَقَ فَشَهِدَ بِالآلاَمِ الَّتِي لِلْمَسِيحِ، وَالأَمْجَادِ الَّتِي بَعْدَهَا».\u003c/p\u003e\n\u003cp\u003e[١٧] كون المسيح «فِي صُورَةِ اللهِ» (en morphē theou) لا يعني أنه في \"شكل\" الله فقط وبالتالي ليس إلهاً حقاً. فكلمة \"صورة\" (morphē) تستمد معناها من العبارة التالية: «مُعَادِلاً لِلَّهِ» (isa theō) ومن اللغة البشرية المقابلة في فيلبي ٢ : ٧: «أَخْلَى نَفْسَهُ، آخِذاً صُورَةَ عَبْدٍ، صَائِراً فِي شِبْهِ النَّاسِ» (morphēn doulou labōn, en homoiōmati anthrōpōn). اللغة المتوازية تهدف لإظهار أن المسيح كان إنساناً حقاً وكان إلهاً حقاً. انظر واحدة من أكثر الدراسات استفاضة لهذا النص المحوري: Ralph P. Martin, CARMEN CHRISTI: Philippians 2:5-11 (Cambridge, Mass.: Cambridge University Press, 1967).\u003c/p\u003e\n\u003cp\u003e[١٨] عندما يقول الكتاب المقدس إن «السَّماواتُ تُحَدِّثُ بِمَجْدِ اللهِ» (مزامير ١٩ : ١)، فإنه يعني شيئاً مختلفاً جوهرياً عما يعنيه عندما يقول إن المسيح هو بهاء مجد الله. لا يوجد مكان في الكتاب المقدس يقول أو يلمح إلى أن الطبيعة هي الله. لكن الكتاب يذكر ويظهر مراراً وتكراراً أن يسوع هو الله.\u003c/p\u003e\n\u003cp\u003e[١٩] بتعليقه على يقين إيمان بطرس بعد رؤية المجد الخارجي للمسيح على جبل التجلي (متى ١٧ : ١-٩)، حيث قال بطرس «نَحْنُ قَدْ كُنَّا مُعَايِنِينَ عَظَمَتَهُ» (٢ بطرس ١ : ١٦)، يشرح جوناثان إدواردز الفرق بين هذا \"المجد الخارجي\" و\"المجد الروحي\" الذي يراه المرء بعيني القلب: \"إذا كانت رؤية مجد المسيح الخارجي تعطي تأكيداً عقلانياً لألوهيته، فلماذا لا يفعل إدراك مجده الروحي ذلك أيضاً؟ بلا شك، مجد المسيح الروحي هو في حد ذاته مميز، ويظهر ألوهيته بوضوح مثل مجده الخارجي؛ بل وأكثر من ذلك بكثير: لأن مجده الروحي هو ما تتمثل فيه ألوهيته؛ والمجد الخارجي لتجليه أظهر ألوهيته فقط لكونه صورة أو تمثيلاً رائعاً لذلك المجد الروحي. بلا شك، إذن، فإن من حظي برؤية واضحة للمجد الروحي للمسيح، يمكنه أن يقول: 'لم نتبع خرافات مصنعة، بل كنا معاينين عظمته'، بناءً على أسس جيدة مثل الرسول\". “A Divine and Supernatural Light,” in Sermons and Discourses 1730-1733, in The Works of Jonathan Edwards, vol. 17, ed. Mark Valeri (New Haven, Conn.: Yale University Press, 1999), 419.\u003c/p\u003e\n\u003cp\u003e[٢٠] جوناثان إدواردز: واعظ أمريكي إصلاحي، فيلسوف اليقظة الكبرى الأولى، مؤلف \"المشاعر الدينية\".\u003c/p\u003e\n\u003cp\u003e[٢١] Jonathan Edwards, “The Excellency of Christ,” in Sermons And Discourses 1734-1738, in The Works of Jonathan Edwards, vol. 19, ed. M. X. Lesser (New Haven, Conn.: Yale University Press, 2001), 565.\u003c/p\u003e\n\u003cp\u003e[٢٢] تم استخدام \"وعظة\" بدلاً من المصطلحات غير المسيحية وفقاً للمصفوفة اللاهوتية.\u003c/p\u003e\n\u003cp\u003e[٢٣] المرجع السابق (إدواردز).\u003c/p\u003e\n\u003cp\u003e[٢٤] \"إن المعنى الحقيقي لما كان سيفعله لا يمكن الوصول إليه إلا بالإيمان. الجميع هناك، مؤمنين أم لا، سيرون المعجزة. لكن يسوع يعد مرثا برؤية المجد\". Leon Morris, The Gospel According to John (Grand Rapids, Mich.: Eerdmans, 1971), 560. \"ما أراد نقله هو هذا، أنه لو كفت مرثا عن التفكير في تلك الجثة وثبتت انتباهها على يسوع، واثقة تماماً فيه (في قوته وحبه)، لرأت هذه المعجزة كعلامة حقيقية، وتوضيح وبرهان لمجد الله المنعكس في ابن الله\". William Hendriksen, John (1954), 158.\u003c/p\u003e\n\u003cp\u003e[٢٥] \"قد يأمل المرء بمحبة أن يكون الدافع لبعضهم على الأقل هو كسب الفريسيين للحق، لكن التباين القائم بين الذين آمنوا والذين ذهبوا إلى الفريسيين يشير إلى أن قصدهم كان أكثر خبثاً\". D. A. Carson, The Gospel According to John (Grand Rapids, Mich.: Eerdmans, 1991), 419.\u003c/p\u003e\n\u003cp\u003e[٢٦] تشمل النصوص الإضافية التي تعلم هذه الحقيقة: لوقا ١٠ : ٢٢، يوحنا ٦ : ٣٧، يوحنا ٦ : ٤٤، يوحنا ٦ : ٦٥، أعمال الرسل ١٣ : ٤٨.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgMlJ2H1s_lbVtQ1aqBcWARXds5ypsFMnDGwWsxH_2egrXmet8kcPnZX3ebG2UTFCsM-FxizvVD1QkTZRkBPaifozMzZLhF0lQCG_hwo51iaNEP9wcZuwQzAbCOi99Bw88nftm_DBuY0KVE_lPxqL-GhGSDWEkHTeUl_VJ3kockLPijs1dAvjCI9QLQElw/s2752/03.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgMlJ2H1s_lbVtQ1aqBcWARXds5ypsFMnDGwWsxH_2egrXmet8kcPnZX3ebG2UTFCsM-FxizvVD1QkTZRkBPaifozMzZLhF0lQCG_hwo51iaNEP9wcZuwQzAbCOi99Bw88nftm_DBuY0KVE_lPxqL-GhGSDWEkHTeUl_VJ3kockLPijs1dAvjCI9QLQElw/s600/03.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"3f:T4245,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الثاني: الإنجيل - النطاق الكتابي لمعناه\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"وَلَكِنَّنِي لَسْتُ أَحْتَسِبُ لِشَيْءٍ، وَلَا نَفْسِي ثَمِينَةٌ عِنْدِي، حَتَّى أُتَمِّمَ بِفَرَحٍ سَعْيِي وَالْخِدْمَةَ الَّتِي أَخَذْتُهَا مِنَ الرَّبِّ يَسُوعَ، لِأَشْهَدَ بِبِشَارَةِ نِعْمَةِ اللهِ\" [أعمال الرسل ٢٠: ٢٤].\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eما سنراه في هذا الفصل هو كيف يعرّف الكتاب المقدس الإنجيل. أن الغاية من الفصل في النهاية هي إظهار أن العديد من الجوانب الحقيقية والثمينة للإنجيل يمكن التأكيد عليها، ومع ذلك قد يُفقَد الخير الأسمى للإنجيل. إن أمجاد الإنجيل المتعددة جميلة، ولكن هذه هي النقطة بالضبط؛ فإذا لم يُرَ الجمال الشامل —أعني جمال مجد المسيح— فإن هدف الإنجيل لن يَتَحَقَّق. سنعود إلى هذه النقطة في نهاية الفصل. أما الآن، فلننظر إلى الأوجه الكتابية لـ \"جوهرة الإنجيل\"، ونثبّت عيوننا على المجد الذي تهدف إلى إعلانه.\u003c/p\u003e\n\u003cp\u003eكيف نُعرّف الإنجيل؟: كيف يُعرّف الكتاب المقدس الإنجيل؟ من المثير للاهتمام أن الكتاب المقدس (بما في ذلك العهد القديم اليوناني والعهد الجديد) يستخدم اسم \"إنجيل\" (euangelion) ٧٧ مرة، وفعل \"يبشر\" (euangelizō) ٧٧ مرة. وفي الغالبية العظمى من هذه الاستخدامات، يُفترَض المعنى ضمناً بدلاً من تعريفه. ولكن توجد استخدامات تعريفية كافية لإعطاء صورة واضحة عما هو الإنجيل. لقد قمت بصياغة هذا الفصل حول استخدامات كلمة \"إنجيل\" التي تحتوي على تعريفات في سياقها المباشر. إن التحدي في تعريف كلمة مثل \"أخبار سارة\" هو تجنب طرفي نقيض: الأول هو تعريف الإنجيل بشكل واسع جداً، والآخر هو تعريفه بشكل ضيق جداً. آمل أن أجد طريقاً وسطاً.\u003c/p\u003e\n\u003cp\u003eهناك إله حي: يشمل الإنجيل الأخبار السارة بأن هناك إلهاً حياً خلق السماء والأرض. فعندما جاء بولس وبرنابا إلى مدينة لسترة، مكّنهما الله من شفاء رجل مقعد؛ ذُهل الجموع وصرخوا: \"إِنَّ الآلِهَةَ تَشَبَّهُوا بِالنَّاسِ وَنَزَلُوا إِلَيْنَا!\" [أعمال الرسل ١٤: ١١]. ودعوا برنابا \"زفس\"، ودعوا بولس \"هرمس\". وأراد كاهن زفس أن يذبح لهما. ولكن عند هذه النقطة بدأ بولس في الكرازة بالإنجيل: \"أَيُّهَا الرِّجَالُ، لِمَاذَا تَفْعَلُونَ هَذَا؟ نَحْنُ أَيْضاً بَشَرٌ تَحْتَ آلاَمٍ مِثْلُكُمْ، نُبَشِّرُكُمْ أَنْ تَرْجِعُوا مِنْ هَذِهِ الأَبَاطِيلِ إِلَى الإِلهِ الْحَيِّ الَّذِي صَنَعَ السَّمَاءَ وَالأَرْضَ وَالْبَحْرَ وَكُلَّ مَا فِيهَا\" [أعمال الرسل ١٤: ١٥].\u003c/p\u003e\n\u003cp\u003eببساطة، لا يمكن أن توجد أخبار سارة بدون إله حي خلق الكون. ولا يوجد أي جانب ثمين من الإنجيل سيكون له أي معنى فدائي إذا لم يكن هناك إله حي خلق السماء والأرض. لِذا، يقول لوقا، كاتب سفر أعمال الرسل، إن بولس بدأ رسالته بالأخبار السارة بأن هناك شيئاً أعظم بكثير مما حلم به أهل لسترة: هناك إله يحيا وخلق كل ما سواه.\u003c/p\u003e\n\u003cp\u003eمجيء سلطان الله السيادي: لا يشمل الإنجيل حقيقة أن الله هو الخالق الحي فحسب — بل يشمل أيضاً حقيقة أنه ملك الكون الذي يمارس الآن، في يسوع المسيح، سلطانه الملكي في العالم لأجل شعبه. في رومية ١٠: ١٥، يقتبس بولس من إشعياء ٥٢: ٧: \"مَا أَجْمَلَ عَلَى الْجِبَالِ قَدَمَيِ الْمُبَشِّرِ، الْمُخْبِرِ بِالسَّلاَمِ، الْمُبَشِّرِ بِالْخَيْرِ، الْمُخْبِرِ بِالْخَلاَصِ، الْقَائِلِ لِصِهْيَوْنَ: «قَدْ مَلَكَ إِلهُكِ».\" إن حُكم الله السيادي جوهري للإنجيل؛ لذا، عندما جاء المسيّا الموعود، كانت هذه هي الطريقة الرئيسية التي نطق بها بالإنجيل: \"جَاءَ يَسُوعُ إِلَى الْجَلِيلِ يَكْرِزُ بِبِشَارَةِ مَلَكُوتِ اللهِ وَيَقُولُ: «قَدْ كَمَلَ الزَّمَانُ وَاقْتَرَبَ مَلَكُوتُ اللهِ، فَتُوبُوا وَآمِنُوا بِالإِنْجِيلِ»\" [مرقس ١: ١٤-١٥].\u003c/p\u003e\n\u003cp\u003eيسوع، مخلص هو المسيح الرب: مع بدء خدمة يسوع المسيح، أصبح من الواضح أن مجيء ملكوت الله ومجيء يسوع هما أمر واحد؛ يُمْكِنُكَ أن ترى ذلك في أعمال الرسل ٨: ١٢: \"فَلَمَّا صَدَّقُوا فِيلُبُّسَ وَهُوَ يُبَشِّرُ بِالأُمُورِ الْمُخْتَصَّةِ بِمَلَكُوتِ اللهِ وَبِاسْمِ يَسُوعَ الْمَسِيحِ، اعْتَمَدُوا رِجَالاً وَنِسَاءً\". الإنجيل هو الأخبار السارة بأن ملك إسرائيل الموعود قد جاء. لذا، يَفْتَتِح بولس رسالة رومية: إنه \"إِنْجِيلِ اللهِ، الَّذِي سَبَقَ فَوَعَدَ بِهِ بِأَنْبِيَائِهِ فِي الْكُتُبِ الْمُقَدَّسَةِ، عَنِ ابْنِهِ... الَّذِي صَارَ مِنْ نَسْلِ دَاوُدَ\" [رومية ١: ١-٣]. وعندما أعلنت الملائكة وصول يسوع: \"فَقَالَ لَهُمُ الْمَلاَكُ: «لاَ تَخَافُوا! فَهَا أَنَا أُبَشِّرُكُمْ بِفَرَحٍ عَظِيمٍ يَكُونُ لِجَمِيعِ الشَّعْبِ: أَنَّهُ وُلِدَ لَكُمْ الْيَوْمَ فِي مَدِينَةِ دَاوُدَ مُخَلِّصٌ هُوَ الْمَسِيحُ الرَّبُّ»\" [لوقا ٢: ١٠-١١].\u003c/p\u003e\n\u003cp\u003eالمسيح مات من أجل خطايانا حسب الكتب: كيف أن يسوع مخلصاً؟ يُجيبنا هو: \"لأَنَّ ابْنَ الإِنْسَانِ أَيْضاً لَمْ يَأْتِ لِيُخْدَمَ بَلْ لِيَخْدَمَ وَلِيَبْذِلَ نَفْسَهُ فِدْيَةً عَنْ كَثِيرِينَ\" [مرقس ١٠: ٤٥]. وفي العشاء الأخير قال: \"هذِهِ الْكَأْسُ هِيَ الْعَهْدُ الْجَدِيدُ بِدَمِي الَّذِي يُسْفَكُ عَنْكُمْ\" [لوقا ٢٢: ٢٠]. الرسول بولس جعل الرابط صريحاً: \"وَأُعَرِّفُكُمْ أَيُّهَا الإِخْوَةُ بِالإِنْجِيلِ الَّذِي بَشَّرْتُكُمْ بِهِ... أَنَّ الْمَسِيحَ مَاتَ مِنْ أَجْلِ خَطَايَانَا حَسَبَ الْكُتُبِ\" [١ كورنثوس ١٥: ١-٣]. كان موته فدية عنّا لا يمكننا دفعها بأنفسنا.\u003c/p\u003e\n\u003cp\u003eيسوع، مُقام من الأموات كما في إنجيلي: لن يكون هناك إنجيل إذا ظل يسوع ميتاً: \"وَإِنْ لَمْ يَكُنِ الْمَسِيحُ قَدْ قَامَ، فَبَاطِلٌ إِيمَانُكُمْ. أَنْتُمْ بَعْدُ فِي خَطَايَاكُمْ\" [١ كورنثوس ١٥: ١٧]. لهذا يشمل تعريف الإنجيل كلاً من موت يسوع وقيامته. وأوضح بولس أن هذا جُزء أساسي: \"اُذْكُرْ يَسُوعَ الْمَسِيحَ الْمُقَامَ مِنَ الأَمْوَاتِ، مِنْ نَسْلِ دَاوُدَ بِحَسَبِ إِنْجِيلِي\" [٢ تيموثاوس ٢: ٨].\u003c/p\u003e\n\u003cp\u003eالإنجيل ليس أخباراً سارة بدون وعد الروح: عندما كرز يوحنا المعمدان بالإنجيل، أكد أن يسوع سيُعمد بالروح القدس ونار: \"هُوَ سَيُعَمِّدُكُمْ بِالرُّوحِ الْقُدُسِ وَنَارٍ\". لُوقا يقول: \"وَبِأَشْيَاءَ أُخَرَ كَثِيرَةٍ كَانَ يَعِظُ الشَّعْبَ وَيُبَشِّرُهُمْ\" [لوقا ٣: ١٦، ١٨]. عندما قام يسوع وعاد إلى السماء، لم يترك التلاميذ بدون حضوره: \"رُوحُ الْحَقِّ... لأَنَّهُ مَاكِثٌ مَعَكُمْ وَيَكُونُ فِيكُمْ. لاَ أَتْرُكُكُمْ يَتَامَى. إِنِّي آتِي إِلَيْكُمْ\" [يوحنا ١٤: ١٧-١٨].\u003c/p\u003e\n\u003cp\u003eفي الساعات الأخيرة، أكد يسوع: \"وَهَا أَنَا أُرْسِلُ إِلَيْكُمْ مَوْعِدَ أَبِي... لكِنَّكُمْ سَتَنَالُونَ قُوَّةً مَتَى حَلَّ الرُّوحُ الْقُدُسُ عَلَيْكُمْ\" [لوقا ٢٤: ٤٩؛ أعمال الرسل ١: ٨]. الروح القدس هو العُربون، ضمان لملء الفرح الذي سَنعرفه في الشركة الكاملة [٢ كورنثوس ١: ٢٢]. ما يجعل الإنجيل أخباراً سارة هو التمتع بمجد الله في المسيح، والروح القدس يُوفّر الِاختبار الحاضر لذلك التمتع.\u003c/p\u003e\n\u003cp\u003eوعد الخلاص لكل من يؤمن: يشير بولس إلى \"إِنْجِيلَ خَلاَصِكُمُ\" في أفسس ١: ١٣، ويقول في رومية ١: ١٦: \"لأَنِّي لَسْتُ أَسْتَحِي بِإِنْجِيلِ الْمَسِيحِ، لأَنَّهُ قُوَّةُ اللهِ لِلْخَلاَصِ لِكُلِّ مَنْ يُؤْمِنُ\". المشكلة هنا هي حاجتنا للتمييز بين \"اختبار\" الخلاص وبين \"وعد\" الخلاص. الاختبار الفعلي ليس جزءاً من الإنجيل، بل هو نتيجة له عندما يؤمن الشخص بالوعد. وكلمة الخلاص هذه تحتضن مواعيد الشفاء، وإعانة المساكين، والرؤية المُشبِعة لمجد الله.\u003c/p\u003e\n\u003cp\u003eما اشتراه الصليب هو ما يجعل الصليب أخباراً سارة: عندما شفى يسوع المرضى وأعان المساكين، كان يُبَرهن على ما جعل \"بشارة الملكوت\" أخباراً سارة [متى ٤: ٢٣]. قال يسوع: \"رُوحُ الرَّبِّ عَلَيَّ، لأَنَّهُ مَسَحَنِي لأُبَشِّرَ الْمَسَاكِينَ\" [لوقا ٤: ١٨]. كان يجب على الملك أن يموت قبل أن يملك؛ وإلا فإن عدله سيجلب الدينونة لا الخلاص. لِذا كان يجب شراء جميع بركات الملكوت بدم المسيح. لِهذا الصليب هو المركز والأساس.\u003c/p\u003e\n\u003cp\u003eالأخبار السارة للسلام مع الله ومع بعضنا البعض: وصف بطرس الإنجيل بأنه: \"يُبَشِّرُ بِالسَّلاَمِ بِيَسُوعَ الْمَسِيحِ\" [أعمال الرسل ١٠: ٣٦]. وتحدث بولس عن \"اسْتِعْدَادِ إِنْجِيلِ السَّلاَمِ\" [أفسس ٦: ١٥]. هذا السلام هو أولاً مع الله، وثانياً بين الناس [أفسس ٢: ١٤-١٨].\u003c/p\u003e\n\u003cp\u003eالأخبار السارة تَعِدُ بالحياة الأبدية: يقول بولس: \"وَإِنَّمَا أُظْهِرَتِ الآنَ بِظُهُورِ مُخَلِّصِنَا يَسُوعَ الْمَسِيحِ، الَّذِي أَبْطَلَ الْمَوْتَ وَأَنَارَ الْحَيَاةَ وَالْخُلُودَ بِوَاسِطَةِ الإِنْجِيلِ.\" [٢ تيموثاوس ١: ١٠]. الإنجيل يُنير الحياة الأبدية لأنه يوضح لماذا هي ممكنة (موت وقيامة يسوع).\u003c/p\u003e\n\u003cp\u003e\"فيك تتبارك جميع الأمم\": بشارة الملكوت لن تكون أخباراً سارة إذا لم يملك الملك على كل الشعوب: \"سَبَقَ فَبَشَّرَ إِبْرَاهِيمَ أَنْ «فِيكَ تَتَبَارَكُ جَمِيعُ الأُمَمِ»\" [غلاطية ٣: ٨]. لو كان الإنجيل إقليمياً ضيقاً، لما كان إنجيلاً.\u003c/p\u003e\n\u003cp\u003e\"بشارة نعمة الله\": يُطلق بولس على رسالته \"إِنْجِيلِ نِعْمَةِ اللهِ\" [أعمال الرسل ٢٠: ٢٤]. النعمة فِيمَا يَتَعَلَّقُ بخلاصنا هي نقيض الاستحقاق البشري: \"فَإِنْ كَانَ بِالنِّعْمَةِ فَلَيْسَ بَعْدُ بِالأَعْمَالِ\" [رومية ١١: ٦]. هذا هو \"اختيار النعمة\" [رومية ١١: ٥]. الله اختارنا في المسيح \"لِمَدْحِ مَجْدِ نِعْمَتِهِ\" [أفسس ١: ٦].\u003c/p\u003e\n\u003cp\u003eموت يسوع يجعل نعمة إنجيل الله عادلة: \" فَإِنَّكُمْ تَعْرِفُونَ نِعْمَةَ رَبِّنَا يَسُوعَ الْمَسِيحِ، أَنَّهُ مِنْ أَجْلِكُمُ افْتَقَرَ وَهو غَنِيٌّ، لِكَيْ تَسْتَغْنُوا أَنْتُمْ بِفَقْرِهِ\" [٢ كورنثوس ٨: ٩]. بما أن الله عادل، فقد أرسل المسيح ليحمل العقاب لكي \"يُظْهِرَ بِرَّهُ\" [رومية ٣: ٢٥]. \"لِيَكُونَ بَارّاً وَيُبَرِّرَ مَنْ هُوَ مِنَ الإِيمَانِ بِيَسُوعَ\" [رومية ٣: ٢٦].\u003c/p\u003e\n\u003cp\u003eنعمة الإنجيل هي أساس كل وعد صالح: من هذا العمل المركزي يتدفق نهر عظيم؛ فقد \"خَلَصَنَا وَدَعَانَا... بِمُقْتَضَى الْقَصْدِ وَالنِّعْمَةِ\" [٢ تيموثاوس ١: ٩]. أننا الآن \"بِالنِّعْمَةِ مُخَلَّصُونَ، بِالإِيمَانِ... هُوَ عَطِيَّةُ اللهِ\" [أفسس ٢: ٨]. بالنعمة يُبررنا الله، ويغفر زلاتنا، ويمنحنا عزاءً أبدياً [٢ تسالونيكي ٢: ١٦]. الإنجيل هو الأخبار السارة لأن الله لم يُشفق على ابنه \"كَيْفَ لاَ يَهَبُنَا أَيْضاً مَعَهُ كُلَّ شَيْءٍ؟\" [رومية ٨: ٣٢].\u003c/p\u003e\n\u003cp\u003eلا يوجد أمر صالح في الإنجيل يمكن أن يكون صالحاً دون الخير الأسمى وهو \"الله\" الأمور الصالحة المذكورة لا تكفي لجعل الإنجيل أخباراً سارة إذا لم يُرَ الخير الأسمى ويُعتَنَق. ذلك الخير هو الله نفسه، يُعايَن ويُبتهَج به في كل مجده. إذا آمنت بكل ما ذُكر، ولكنك لم تجعل مجد الله في المسيح كنزك الأسمى، فأنت لم تعتنق الإنجيل. إلى أن تقودك بركات الإنجيل لمُعايَنَة الله واعتباره كأسمى فرح لك، فأنت لم تعتنق إنجيل الله. لقد جاءت العطايا لسبب واحد عظيم: أن تُعاين إلى الأبد مجد الله في المسيح، وبالابتهاج تظهر جماله وقيمته السامية إلى الأبد.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4l036PyI40Iug6HxRKVoE33OqZTiwLdDXGvEMGPho8PMWdY1Cz0HP3P82FmSu8f83KOBhCoi08YdLZ0XwPcg909V7pupMWcp4AAdFVQYBzelYGfL8y-fQ1KmGCUs-cqir-N4wr-vNMJ5sln7OlgsNWehBgTU4WK78SXHrh172SB2kE_vKwTenx-UJXZY/s2752/02.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg4l036PyI40Iug6HxRKVoE33OqZTiwLdDXGvEMGPho8PMWdY1Cz0HP3P82FmSu8f83KOBhCoi08YdLZ0XwPcg909V7pupMWcp4AAdFVQYBzelYGfL8y-fQ1KmGCUs-cqir-N4wr-vNMJ5sln7OlgsNWehBgTU4WK78SXHrh172SB2kE_vKwTenx-UJXZY/s600/02.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"40:T23eb,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eالفصل الأول: الإنجيل - الكرازة والتفسير\u003c/h2\u003e\n\u003cp\u003eطبيعة الخبر السار وضرورة التفسير اللاهوتي\u003c/p\u003e\n\u003cp\u003eأصلي أن يكون أحد آثار هذا الكتاب هو أن يُنادى بإنجيل يسوع المسيح -يُعلن، ويُذاع، ويُجهر به- بكل ملئه الرائع ليسمعه العالم أجمع. هذا ما يفعله الشخص الذي سمع أخباراً سارة؛ إنه يخبر بها. والإنجيل يعني أخباراً سارة، والأخبار السارة مُعدَّة للمناداة كما كان يفعل المُنادي في المدن القديمة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"اسمعوا! اسمعوا! اسمعوا! يا كل المتمردين، والمنشقين، والمعارضين، والمحتجين ضد الملك! اسمعوا المرسوم الملكي! إن يوم الحساب العظيم آتٍ، يوم العدل والانتقام. ولكن اسمعوا الآن يا كل سكان مملكة الملك! لقد نُشر العفو العام بموجب رحمة صاحب السيادة. لقد دُفع الثمن. يمكن غفران كل الديون، والصفح عن كل تمرد، والعفو عن كل إهانة. لا أحد مستبعد من هذا العرض. ضعوا أسلحة التمرد، واجثوا خضوعاً، واقبلوا العفو الملكي بوصفه عطية من المحبة الملكية، وأقسموا بالولاء لسيدكم، وقوموا كرعايا أحرار وسعداء لملككم\".\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eأخبار! أخبار! أخبار! إن الكلمة المستخدمة للإنجيل في العهد الجديد هي (euangelion)، وهي مكونة من سابقة تعني \"صالح\" أو \"مفرح\" وجذر كلمة يعني \"رسالة\" أو \"أخبار\". استُخدمت الكلمة على نطاق واسع في عالم العهد الجديد لتعني \"رسالة النصر\"، ولكنها استُخدمت أيضاً للرسائل السياسية والخاصة التي تجلب الفرح. في فترة من التاريخ خلت من وسائل الإعلام المطبوعة أو الراديو أو التلفزيون، كان الرسول يحمل الأخبار السارة ويسلمها شخصياً؛ كانت تُنطق كإعلان، وكان يغلب عليها طابع الاحتفال؛ إذ كان الرسول يبتهج بالخبر الذي كان عليه نقله. لقد كانت أخباراً سارة حقاً.\u003c/p\u003e\n\u003cp\u003eومن السهل في يومنا هذا أن نفقد الشعور بالدهشة تجاه طبيعة \"الخبر\" في الإنجيل. لكي نشعر بما كانت عليه الأخبار السارة في العهد الجديد حقاً، لا يجب أن ننسى الطريقة التي أُعلن بها في بشارة لوقا البشير:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e\"فَقَالَ لَهُمُ الْمَلاَكُ: «لاَ تخَافُوا! فَهَا أَنَا أُبَشِّرُكُمْ بِفَرَحٍ عَظِيمٍ يَكُونُ لِجَمِيعِ الشَّعْبِ: أَنَّهُ وُلِدَ لَكُمْ الْيَوْمَ فِي مَدِينَةِ دَاوُدَ مُخَلِّصٌ هُوَ الْمَسِيحُ الرَّبُّ»\" [لوقا ٢: ١٠-١١]\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eعندما هبط هذا الخبر على الأرض، كان وقعه استثنائياً؛ لأن الخبر نفسه كان استثنائياً. لم يحدث شيء كهذا من قبل قط، ولم يحدث شيء مثله منذ ذلك الحين. لقد دخل شيء جديد تماماً في التاريخ؛ بل يمكن للمرء أن يقول إن تاريخاً جديداً تماماً بدأ بمجيء يسوع. ولتأمل أهمية وصول هذا الخبر، لنتخيل صورة من العصر الحديث؛ معسكر اعتقال للأسرى قبيل نهاية الحرب العالمية الثانية. داخل الأسلاك الشائكة، يعيش الجنود في ظروف قذرة وجوع مميت، بينما الآسرون يتجولون في الخارج بلا مبالاة. وفجأة، يتم تهريب راديو يعمل بالموجات القصيرة، فتصل \"الأخبار\".\u003c/p\u003e\n\u003cp\u003eفي اليوم التالي، يرى الآسرون شيئاً غريباً؛ الأسرى الهزال يبتسمون ويضحكون رغم أن ظروفهم لم تتغير. ما لا يعرفه الآسرون هو أن هؤلاء الجنود يملكون \"أخباراً\"؛ لقد تم اختراق خطوط العدو، وقوات التحرير باتت على بعد أميال قليلة. هذا هو الفرق الذي تصنعه الأخبار. لقد سمع المسيحيون الأخبار بأن المسيح قد جاء إلى العالم وخاض المعركة الحاسمة لهزيمة الشيطان والموت والخطية والجحيم. ستنتهي الحرب قريباً، ولم يعد هناك أي شك حول من سينتصر. المسيح سينتصر، وسيحرر كل من وضعوا رجاءهم فيه.\u003c/p\u003e\n\u003cp\u003eالأخبار السارة ليست في عدم وجود ألم أو موت؛ بل هي موجودة، ولكن الأخبار السارة هي أن الملك نفسه قد جاء، وقد هُزم هؤلاء الأعداء، وإذا وثقنا فيما فعله وفيما وعد به، فسنهرب من حكم الموت ونعاين مجد محررنا ونعيش معه إلى الأبد. هذه الأخبار تملؤنا بالرجاء والفرح [رومية ١٥: ١٣] وتخلصنا من الشفقة على الذات وتمكننا من محبة المتألمين. وفي هذه المحبة المسنودة بالرجاء، سيعيننا لكي نثابر حتى يُنفخ بوق التحرير النهائي ويحول معسكر السجن إلى \"أرض جديدة\" [٢ بطرس ٣: ١٣].\u003c/p\u003e\n\u003cp\u003eلكن الإنجيل ليس مجرد أخبار فحسب؛ إنه أخبار أولاً، ثم هو \"لاهوت\" ثانياً، واللاهوت يعني التعليم والتفسير والتوضيح. اللاهوت جزء من الإنجيل لأن الأخبار يجب استيعابها في عقل السامع. إذا نادى المنادي بالعفو العام، سيسأل السامع عن كنه العفو والثمن المدفوع وكيفية إهانة الملك. تكمن أهمية لاهوت الإنجيل في أن الأخبار السارة رائعة لدرجة أنه يجب فتحها كصندوق كنز، وإخراج كل نفائسه ليتمتع بها العالم. اللاهوت هو وصف هذه الكنوز؛ وهو يصف قيمتها الحقيقية، ويحرس \"جوهرة\" الإنجيل من أن يُلقى بها بعيداً كأنها مجرد زجاج، ويحميها من القراصنة المتاجرين بالحق.\u003c/p\u003e\n\u003cp\u003eويفعل علم اللاهوت كل ذلك وهو يحني رأسه في ذهول بأن يُسمح له بلمس أمور الله، يلهج بالتسبيح والشكر بينما يتعامل مع جواهر الملك، وترتجف أصابعه بسبب ثمن ما تتداوله. ويدرك علم لاهوت الإنجيل -وهو ساجد على ركبتيه- أنه يخدم المُنادي. الإنجيل في جوهره ليس مجرد تفسير؛ التفسير ضروري ولكنه ليس الغرض الأساسي، إذ إن \"المحبة\" هي الهدف النهائي. الإنجيل هو أخبار سارة، وعلم اللاهوت يخدم ذلك المُنادي الذي صارت قدماه \"جميلتين\" من المشي إلى الأماكن البعيدة ليعلن: \"تعالوا، استمعوا لأخبار الله! استمعوا لما فعله الله! افهموا! آمنوا!\".\u003c/p\u003e\n\u003cp\u003eويبقى التساؤل الجوهري الذي يفرض نفسه: ما هو إذًا هذا الخبر؟ ما هي الرسالة التي يجب أن يُنادى بها وتُفسّر؟ هذا ما سنتوجه إليه في الفصول القادمة، مع الأخذ في الاعتبار زاوية هذا البحث؛ فسؤالنا ليس مجرد: ما هو الإنجيل؟ بل ما هو الخير الأسمى في الإنجيل الذي يجعل كل جوانب الأخبار السارة صالحة؟ ما هو هدف الإنجيل الذي إذا فقدناه، سُلب كل صلاح منه؟ ماذا نعني عندما نقول \"الله هو الإنجيل\"؟\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgSGhsSwtTfTXpF3u1PO5PYizFf5H34oDDj5QrUwRplW6KqwIcpSefnlJBWi7SyPKKtTSCGuHJsy_gMzJ6j6vXJgfJF6jk3zMVU4b67HvBpmoVbCDLPe5eT8XRIWcZvp6IFveGdrZCTF4y7WuYdi9Wd8_WBbO9qaNtWSLtJLwGJOFSPSHIf2EU7HZ45BzM/s2752/01.png\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgSGhsSwtTfTXpF3u1PO5PYizFf5H34oDDj5QrUwRplW6KqwIcpSefnlJBWi7SyPKKtTSCGuHJsy_gMzJ6j6vXJgfJF6jk3zMVU4b67HvBpmoVbCDLPe5eT8XRIWcZvp6IFveGdrZCTF4y7WuYdi9Wd8_WBbO9qaNtWSLtJLwGJOFSPSHIf2EU7HZ45BzM/s600/01.png\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"41:T2b1e,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eحربُ الأختامِ: مِلْكِيَّةُ الحَمَلِ في مُواجهةِ مُحاكاةِ الوَحشِ\u003c/h2\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لاَ تَضُرُّوا الأَرْضَ وَلاَ الْبَحْرَ وَلاَ الأَشْجَارَ، حَتَّى نَخْتِمَ عَبِيدَ إِلهِنَا عَلَى جِبَاهِهِمْ» (رؤيا ٧: ٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبِالنَّظَرِ إِلَى تَارِيخِ الْفِدَاءِ، يَقِفُ الْإِنْسَانُ بَيْنَ عَلَامَتَيْنِ لَا ثَالِثَ لَهُمَا: فَإِمَّا أَنْ يَكُونَ مَمْلُوكاً لِلْخَالِقِ بِفِعْلِ النِّعْمَةِ، أَوْ مَوْسُوماً بِسِمَةِ التَّمَرُّدِ بِفِعْلِ الْقَهْرِ أَوِ الْمُسَايَرَةِ. إِنَّ الْمَشْهَدَ الْعَظِيمَ فِي سِفْرِ الرُّؤْيَا لَيْسَ مُجَرَّدَ تَنَبُّؤٍ بِاخْتِرَاعَاتٍ مَادِّيَّةٍ، بَلْ هُوَ ذُرْوَةُ «حَرْبِ الْعَلَامَاتِ» الَّتِي بَدَأَتْ بُذُورُهَا فِي رُؤْيا حِزْقِيَالَ قَدِيماً؛ حَيْثُ أَمَرَ الرَّبُّ بِوَسْمِ جِبَاهِ الْأُمَنَاءِ الَّذِينَ يَئِنُّونَ عَلَى الرَّجَاسَاتِ لِيَكُونُوا مَحْفُوظِينَ مِنْ سَخَطِهِ الْآتِي عَلَى أُورُشَلِيمَ: «اعْبُرْ فِي وَسْطِ الْمَدِينَةِ أُورُشَلِيمَ، وَسِمْ سِمَةً عَلَى جِبَاهِ الرِّجَالِ الَّذِينَ يَئِنُّونَ وَيَتَنَهَّدُونَ عَلَى كُلِّ الرَّجَاسَاتِ الْمَصْنُوعَةِ فِي وَسْطِهَا» (حِزْقِيَال ٩: ٤). هَذَا الْأَصْلُ النَّبَوِيُّ هُوَ الَّذِي اسْتَعَارَهُ يُوحَنَّا اللَّاهُوتِيُّ لِيَكْشِفَ لَنَا أَنَّ خَتْمَ اللهِ الْحَيِّ هُوَ الْإِعْلَانُ السَّمَاوِيُّ عَنْ مِلْكِيَّتِهِ لِخَاصَّتِهِ، وَهُوَ فِعْلٌ رُوحِيٌّ سِيَادِيٌّ يَسْكُنُ فِيهِ الرُّوحُ الْقُدُسُ فِي الْمُؤْمِنِ كَعُرْبُونٍ لِلْمِيرَاثِ الْأَبَدِيِّ.\u003c/p\u003e\n\u003cp\u003eوَفِي الْمُقَابِلِ، لَا يَمْلِكُ الْوَحْشُ قُدْرَةً عَلَى الْخَلْقِ، فَيَلْجَأُ إِلَى «الْمُحَاكَاةِ السَّاخِرَةِ»، مُشَوِّهاً هَذَا الْخَتْمَ الْإِلَهِيَّ بِسِمَةٍ تُمَثِّلُ قِمَّةَ الْقَهْرِ الْعَالَمِيِّ. هُنَا يَبْرُزُ فَارِقٌ جَوْهَرِيٌّ بَيْنَ «الْخَتْمِ» الصَّادِرِ عَنْ سُلْطَةٍ شَرْعِيَّةٍ تُقَرِّرُ مِلْكِيَّتَهَا الْحَقِيقِيَّةَ وَالشَّرْعِيَّةَ، وَبَيْنَ «السِّمَةِ» (Charagma) الَّتِي هِيَ نَوْعٌ مِنَ التَّشْوِيهِ أَوِ الْوَسْمِ الْمُهِينِ. يَعُودُ جِذْرُ «الْخَتْمِ» فِي سِفْرِ الرُّؤْيَا إِلَى (حِزْقِيَال ٩: ٤) كَمَا أَوْرَدْنَا سَابِقاً، حَيْثُ اسْتُخْدِمَ حَرْفُ «التَّاو» (ت) الْعِبْرِيُّ كَعَلَامَةٍ لِلْحِمَايَةِ. تَارِيخِيّاً، كَانَ هَذَا الْحَرْفُ يُكْتَبُ فِي الْعِبْرِيَّةِ الْقَدِيمَةِ عَلَى شَكْلِ عَلَامَةِ (+) أَوْ (X)، مِمَّا جَعَلَ الْآبَاءَ الْأَوَائِلَ يَرَوْنَ فِيهِ إِشَارَةً اسْتِبَاقِيَّةً لِلصَّلِيبِ. أَمَّا السِّيَاقُ التَّارِيخِيُّ لِسِمَةِ الْوَحْشِ فِي الْقَرْنِ الْأَوَّلِ فَيَرْتَبِطُ بِـ «الْخَتْمِ الْإِمْبِرَاطُورِيِّ» الَّذِي كَانَ يُوضَعُ عَلَى الْوَثَائِقِ، أَوِ الْوَسْمِ الَّذِي يُكْوَى بِهِ جِلْدُ الْعَبِيدِ لِبَيَانِ تَبَعِيَّتِهِمْ لِسَيِّدٍ أَرْضِيٍّ؛ وَهُنَا يَقْلِبُ يُوحَنَّا الصُّورَةَ لِيُبَيِّنَ أَنَّ الْوَحْشَ يَتَعَامَلُ مَعَ الْبَشَرِ كَقَطِيعٍ مَمْلُوكٍ لَهُ فِكْرِيّاً وَاقْتِصَادِيّاً.\u003c/p\u003e\n\u003cp\u003eبَيْنَمَا يَطْلُبُ اللهُ «الْجَبْهَةَ» لِيُقَدِّسَ الْفِكْرَ وَالْإِرَادَةَ وَفْقاً لِمَطْلَبِ الشَّرِيعَةِ الْقَدِيمِ: «فَضَعُوا كَلِمَاتِي هذِهِ عَلَى قُلُوبِكُمْ وَنُفُوسِكُمْ، وَارْبُطُوهَا عَلاَمَةً عَلَى أَيْدِيكُمْ، وَلْتَكُنْ عَصَائِبَ بَيْنَ عُيُونِكُمْ» (تَثْنِيَة ١١: ١٨)، يَكْتَفِي الْوَحْشُ بِـ «الْيَدِ» مَتَى اسْتَعْصَتْ عَلَيْهِ الْجَبْهَةُ؛ لِأَنَّ الْأَنْظِمَةَ الطَّاغِيَةَ لَا يَهُمُّهَا اقْتِنَاعُ الضَّمِيرِ بِقَدْرِ مَا يَهُمُّهَا انْصِيَاعُ السُّلوُكِ وَضَمَانُ الْوَلَاءِ الِاقْتِصَادِيِّ. إِنَّ سِمَةَ الْوَحْشِ هِيَ الثَّمَنُ الَّذِي يَدْفَعُهُ الْإِنْسَانُ لِيَعِيشَ فِي مَمْلَكةِ الظِّلِّ، بَيْنَمَا خَتْمُ اللهِ هُوَ النِّعْمَةُ الَّتِي تَهَبُ الْإِنْسَانَ الْحَيَاةَ حَتَّى لَوْ حُرِمَ مِنْ «سُوقِ» هَذَا الْعَالَمِ.\u003c/p\u003e\n\u003cp\u003eفَكُلُّ مَا لِلَّهِ، يُحَاوِلُ الشَّيْطَانُ تَزْيِيفَهُ. إِذَا كَانَ اللهُ يَخْتِمُ خَاصَّتَهُ بِالرُّوحِ الْقُدُسِ (أَفَسُس ١: ١٣)، فَإِنَّ الْوَحْشُ يَسِمُ أَتْبَاعَهُ بِسِمَةٍ خَارِجِيَّةٍ. هُنَاكَ تَضَادٌّ لَاهُوتِيٌّ بَيْنَ «خَتْمِ النِّعْمَةِ» الَّذِي يُعْطَى مَجَّاناً لِلْمُخْتَارِينَ، وَبَيْنَ «سِمَةِ الْأَعْمَالِ» الَّتِي تُفْرَضُ كَشَرْطٍ لِلْبَقَاءِ الِاقْتِصَادِيِّ. الْخَتْمُ فِي (رُؤْيَا ٧) يَسْبِقُ دَيْنُونَةَ الْأَبْوَاقِ، مِمَّا يُؤَكِّدُ عَقِيدَةَ «حِفْظِ الْقِدِّيسِينَ» رُوحِيّاً وَسْطَ الْآلَامِ الزَّمَنِيَّةِ. السِّمَةُ لَيْسَتْ مُجَرَّدَ كُودٍ أَوْ شَرِيحَةٍ إِلِكْتُرُونِيَّةٍ، بَلْ هِيَ مَنْظُومَةُ وَلَاءٍ؛ فَمَنْ يَعْتَنِقُ فِكْرَ الْوَحْشِ (الْجَبْهَةَ) وَيُمَارِسُ سُلُوكَهُ (الْيَدَ) يَكُونُ قَدْ دَخَلَ فِي حِلْفٍ ضِدَّ مَلَكُوتِ اللهِ. التِّكْنُولُوجْيَا وَالِاخْتِرَاعَاتُ الْحَدِيثَةُ —الشَّرِيحَةُ أَوْ غَيْرُهَا— هُنَا هِيَ أَدَاةٌ مُحَايِدَةٌ قَدْ يَسْتَخْدِمُهَا الْوَحْشُ لِإِحْكَامِ السَّيْطَرَةِ، لَكِنَّ التَّمَرُّدَ يَكْمُنُ فِي الْإِرَادَةِ الْبَشَرِيَّةِ الَّتِي تُقَدِّمُ «الْخُبْزَ» عَلَى «الْكَلِمَةِ».\u003c/p\u003e\n\u003cp\u003eإِنَّ السُّؤَالَ الَّذِي يَجِبُ أَنْ يُقْلِقَنَا الْيَوْمَ لَيْسَ عَنْ مَوْعِدِ ظُهُورِ شَرِيحَةٍ مَدِّيَّةٍ، بَلْ عَنْ هُوِيَّةِ «الْخَتْمِ» الَّذِي يَطْبَعُ قَرَارَاتِنَا السُّلوُكِيَّةَ وَالْفِكْرِيَّةَ فِي الْحَاضِرِ. إِنَّ الْمُؤْمِنَ الْحَقِيقِيَّ هُوَ مَنْ يَتَأَلَّمُ لِلرَّجَاسَاتِ الْمُعَاصِرَةِ وَيَرْفُضُ أَنْ يَبِيعَ وَلَاءَ قَلْبِهِ مُقَابِلَ الِاسْتِقْرَارِ الْمَدِّيِّ أَوِ الْقَبُولِ الِاجْتِمَاعِيِّ. إِنْ كُنْتَ تَسْتَمِدُّ أَمَانَكَ وَتَعْرِيفَ ذَاتِكَ مِنْ خُضُوعِكَ لِمَنْظُومَةِ الْعَالَمِ وَقِيَمِهِ الْمُتَغَيِّرَةِ خَوْفاً عَلَى «رِزْقِكَ»، فَأَنْتَ تَحْمِلُ ذِهْنِيَّةَ «سِمَةِ الْوَحْشِ». يَجِبُ أَنْ نُدَرِّبَ ضَمِيرَنَا الْمَسِيحِيَّ عَلَى رُؤْيَةِ «تَجْدِيفِ» الْعَالَمِ الَّذِي يُقَايِضُ الْحَقَّ بِالْخُبْزِ. إِنَّ مِلْكِيَّةَ الْمَسِيحِ لَنَا هِيَ الضَّمَانُ الْوَحِيدُ ضِدَّ إِغْرَاءَاتِ «سِمَةِ» الْوَفْرَةِ الْمَادِّيَّةِ الزَّائِفَةِ. التَّعْزِيَةُ الْعُظْمَى هِي أَنَّ خَتْمَ اللهِ لَا يُمْكِنُ فَكُّهُ؛ فَمَنْ خَتَمَهُ الرَّبُّ بِرُوحِهِ مَحْفُوظٌ وَسْطَ الضِّيقَاتِ، وَمِيرَاثُهُ لَيْسَ فِي عُمْلَاتِ الْقَيَاصِرَةِ الزَّائِلَةِ، بَلْ فِي الْمَدِينَةِ الَّتِي صَانِعُهَا وَبَارِئُهَا اللهُ.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgwczhHYAKAm8bnARmmjKPuMBgY0aaBVzbAApTldx0ufwm-cQesiEgtjZRc4Z2-kS4cKwHY1x9-e4YZ3F-LIqkRRWHON7Qw6tQKCcuPYlwE0_56L7_jMbrkPXidLTW0FbYoFK5MJawz1Z6WiM0Zr82Nhyb_irMWHkMl5wo-bRqT_0KMw6q2mbphGSL41P8/s1024/unnamed%20(55).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgwczhHYAKAm8bnARmmjKPuMBgY0aaBVzbAApTldx0ufwm-cQesiEgtjZRc4Z2-kS4cKwHY1x9-e4YZ3F-LIqkRRWHON7Qw6tQKCcuPYlwE0_56L7_jMbrkPXidLTW0FbYoFK5MJawz1Z6WiM0Zr82Nhyb_irMWHkMl5wo-bRqT_0KMw6q2mbphGSL41P8/s320/unnamed%20(55).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"42:T15b2,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eضلالة الاكتفاء بالوثيقة عن صاحب العهد\u003c/h2\u003e\n\u003cp\u003eتشخيص المغالطة الفريسية في الفصل بين شهادة الكتب وحياة المسيح\u003c/p\u003e\n\u003cp\u003eلكي ندرك عمق المواجهة اللاهوتية في النص الإنجيلي، لا بد من استعادة التمييز الجوهري بين \"العهد\" كفعل إلهي سيادي يربط الخالق بشعبه، وبين \"الوثيقة\" أو السجل المكتوب الذي يحفظ بنود هذا الارتباط. إن التمسك بالوثيقة مع تجاهل الفعل الذي تشهد له يوقع المؤمن في شكلية ميتة، وهو التوتر الذي يبرز بوضوح في كلمات الرب يسوع:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَتِّشُوا الْكُتُبَ لأَنَّكُمْ تَظُنُّونَ أَنَّ لَكُمْ فِيهَا حَيَاةً أَبَدِيَّةً. وَهِيَ الَّتِي تَشْهَدُ لِي. وَلاَ تُرِيدُونَ أَنْ تَأْتُوا إِلَيَّ لِتَكُونَ لَكُمْ حَيَاةٌ» (يوحنا ٥: ٣٩-٤٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eتكتمل صورة العهد حين نضعها تحت ضوء هذا النص، حيث يظهر التمايز الحتمي بين رمزية الظل وجوهر الحقيقة؛ فالذبائح والطقوس الموسوية لم تكن يوماً غاية لإرضاء الله لذاتها، بل كانت \"مؤشرات بصرية\" ورموزاً نبوية تُشير إلى عجز الإنسان وحاجته الماسة لذبيحة المسيح الكاملة. والمشكلة التي واجهها السيد المسيح مع الفريسيين لم تكن تكمن في قلة بحثهم في الأسفار، بل في طبيعة هذا البحث الذي حول الشهادة إلى مجرد مادة للدراسة، والوسيلة إلى غاية، والوثيقة المعصومة إلى صنم يُعبد بعيداً عن صاحبه.\u003c/p\u003e\n\u003cp\u003eوعند تشريح هذا الانفصال اللاهوتي بين الوثيقة والجوهر، نجد أن المسيح يشخص مغالطة تفسيرية كبرى، وهي توهم أن الحياة كامنة في \"نصوص\" العهد لذاتها كخزانة مغلقة. إن البحث في \"التناخ\" دون إدراك غايته المتمثلة في الإشارة للمسيح الآتي هو بحث في ظل يفتقر إلى الروح؛ فاليهود تمسكوا بالكتب (Graphai) لكنهم رفضوا الكلمة (Logos) التي تشهد لها هذه الكتب، مما جعل قراءتهم للعهد القديم قراءة لوثيقة ميتة منزوعة العهد. وهنا تبرز وحدة السلطة الإلهية التي تربط بين كتب موسى وكلمات المسيح برباط لاهوتي لا ينفصم، إذ إن قبول أحدهما هو بالضرورة قبول للآخر، ورفض أحدهما هو هدم للبناء كله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّكُمْ لَوْ كُنْتُمْ تُصَدِّقُونَ مُوسَى لَكُنْتُمْ تُصَدِّقُونَنِي، لأَنَّهُ هُوَ كَتَبَ عَنِّي. فَإِنْ كُنْتُمْ لَسْتُمْ تُصَدِّقُونَ كُتُبَ ذَاكَ، فَكَيْفَ تُصَدِّقُونَ كَلاَمِي؟» (يوحنا ٥: ٤٦-٤٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن المسيح لا يقدم نفسه كبديل منفصل عما سطره موسى، بل كتحقيق وتتميم لمراميه؛ فإذا كانت الوثيقة قد كشفت عجز الإنسان وفساده، فإنها فعلت ذلك لتقود القارئ يائساً من بره الذاتي إلى المسيح الذي هو جوهر العهد ومادته. لقد تحول موسى، الذي اتكل عليه المعترضون كشفيع، إلى \"مشتكٍ\" عليهم لأنهم لم يدركوا غاية رسالته. وهذا يثبت أن العهد القديم، في ظلاله ورموزه، لا يكمل الإنسان بل يدينه إذا ما انفصل عن المرموز إليه.\u003c/p\u003e\n\u003cp\u003eختاماً، يجب أن نستيقن أن الكتاب المقدس ليس \"خزنة\" تحتوي على الحياة في ورقها، بل هو \"مؤشر\" حي يشير إلى من هو الحياة ذاتها. إن البحث في \"درج الكتاب\" دون السجود لمن قيل عنه إنه جاء ليفعل مشيئة الله هو سقوط في فخ العلم الجاف الذي يقتل الروح. إن الحق يقتضي منا أن نقرأ الوثيقة لندخل في علاقة حية مع صاحب العهد، مؤمنين أن سلطة النص مستمدة كلياً من شهادته للمسيح، الذي بدمه الكريم ختم العهد الأبدي وأخرجنا من ظلمة الحرف إلى نور الحياة.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhi2gt_RmFWUWZB1nGkAnfZ3S25fzpuHYwREzQjLFGXTgBEAydeOmo3Xd6A0uQja1M71bVvgYIbiCOe9sgJRM9nVPqKq72Eg0NukuBLUloDjLLJGH_Xtd1OzJwXNEpAkfjj8nDNRRDL8vfHdvsGUHLgPvQmwTJYvC-8-Lw2Wd7analb3U-lJXyKf0ZW9js/s1024/unnamed%20(49).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhi2gt_RmFWUWZB1nGkAnfZ3S25fzpuHYwREzQjLFGXTgBEAydeOmo3Xd6A0uQja1M71bVvgYIbiCOe9sgJRM9nVPqKq72Eg0NukuBLUloDjLLJGH_Xtd1OzJwXNEpAkfjj8nDNRRDL8vfHdvsGUHLgPvQmwTJYvC-8-Lw2Wd7analb3U-lJXyKf0ZW9js/s320/unnamed%20(49).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"43:T14ee,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eذبيحة المشيئة والطريق الحي: تأمل في تكميل المقدسين\u003c/h2\u003e\n\u003cp\u003eتأمل لاهوتي في كفاية عمل المسيح وفتح طريق الأقداس\u003c/p\u003e\n\u003cp\u003eيفشل كثيرون في مسعاهم الروحي بسبب توهمهم أن التكرار الديني والممارسة الطقسية الخارجية يمكن أن تنتزع وطأة الخطية أو تمنح الضمير سلاماً حقيقياً؛ فهذا النوع من التدين يغفل حقيقة قصور نظام \"الظلال والرموز\" الذي، رغم سمو مصدره الإلهي، يقف عاجزاً عن النفوذ إلى أعماق النفس البشرية لتغييرها. إن العجز لم يكن يوماً في الوصية ذاتها، بل في فساد الطبيعة الإنسانية التي لم تستطع الوفاء بمطالب الناموس العادلة، مما حوله إلى ديان يقف خارج الإنسان، يطالبه بالكمال دون أن يمنحه القدرة عليه.\u003c/p\u003e\n\u003cp\u003eوأمام هذا الفشل المتجذر في إصلاح الطبيعة البشرية، استوجب الأمر تدخل صاحب العهد ذاته لينقلنا من عالم الظلال إلى جوهر الحقائق، فنحن نقف بخشوع أمام مشيئة الآب السيادية المقررة أزلياً، حيث قبل الابن أن يكون البديل الكامل عن البشر الخطاة. وحين يعلن المسيح حضوره لإتمام هذه المشيئة، فإنه يشير بوضوح إلى ما سطرته الأسفار النبوية الموحى بها، والتي حملت سر المسيا الآتي ليتمم ما عجزت عنه الذبائح المتكررة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هُنَذَا أَجِيءُ. فِي دَرْجِ الْكِتَابِ مَكْتُوبٌ عَنِّي: أَنْ أَفْعَلَ مَشِيئَتَكَ يَا إِلهِي» (مزمور ٤٠: ٧-٨)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن طاعة الابن المطلقة لمشيئة الآب هي الصخرة التي تأسس عليها فداؤنا؛ فالمسيح لم يأتِ ليقدم ذبيحة حيوانية رمزية، بل قدم \"نفسه\" محققاً طاعة عجزت عنها البشرية جمعاء، وبذلك ينزع النظام الطقسي المؤقت ليثبت عهد النعمة الأبدي. إن جوهر هذا العهد لا يقوم على تراكم محاولاتنا البشرية، بل على كفاية عمل المسيح الذي أنجز الفداء مرة واحدة وإلى الأبد؛ فبينما كان الكاهن القديم يقف يومياً في خدمة لا تنتهي كدليل على عجز ذبائحه، نجد المسيح قد جلس معلناً اكتمال العمل:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَأَمَّا هذَا فَبَعْدَمَا قَدَّمَ عَنِ الْخَطَايَا ذَبِيحَةً وَاحِدَةً، جَلَسَ إِلَى الأَبَدِ عَنْ يَمِينِ اللهِ... لأَنَّهُ بِقُرْبَانٍ وَاحِدٍ قَدْ أَكْمَلَ إِلَى الأَبَدِ الْمُقَدَّسِينَ» (عبرانيين ١٠: ١٢، ١٤)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا التكميل ليس مجرد تعديل خارجي، بل هو استجابة لشهادة الروح القدس الذي يفعل الفداء في داخلنا، كاتباً النواميس في القلوب والأذهان، ليحول علاقتنا بالله من خوف الدينونة إلى ثقة البنين. ومن ثم، صار لنا أن نتقدم بقلب صادق ويقين إيمان، لا بضمير مثقل بمرارة الفشل، بل بقلب مرشوش من كل شر بدم المسيح الكريم. إن الطريق الذي كرسه لنا مخلصنا هو طريق حي وجديد عبر حجاب جسده المكسور لأجلنا:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«طَرِيقًا كَرَّسَهُ لَنَا حَدِيثًا حَيًّا، بِالْحِجَابِ، أَيْ جَسَدِهِ» (عبرانيين ١٠: ٢٠)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفبموت المسيح، انشق حجاب الفصل وصار لنا حق الدخول إلى حضرة الله ذاته. إن أمانة الله لوعوده هي ضماننا الراسخ، والعيش في هذه النعمة يولد فينا ثمر المحبة والأعمال الحسنة، لا كفرض قانوني ثقيل، بل كفيض طبيعي لحياة الروح التي كتبت مشيئة الله في أقدس أعماق كياننا، محولة إيانا من مجرد ممارسين للطقوس إلى أبناء للميثاق الأبدي.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Q-TTVvFYYVsJnmAs_HTeX8rhq2YQm8KofX6aryVEaElccgM18SH2RtW0x4QiYWGCarW_r2zNiMhFSTKkaBUrlboYJD0ySbGFhPCL1hkiGUMnqmbM1qtZjzRBdSJ9VC4zwCwXoNKTFnpgd3oYirxfXF2fL7QOl_b9Fx6Z4s8bFMoncln4gvr0p7lOK00/s1024/unnamed%20(48).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh_Q-TTVvFYYVsJnmAs_HTeX8rhq2YQm8KofX6aryVEaElccgM18SH2RtW0x4QiYWGCarW_r2zNiMhFSTKkaBUrlboYJD0ySbGFhPCL1hkiGUMnqmbM1qtZjzRBdSJ9VC4zwCwXoNKTFnpgd3oYirxfXF2fL7QOl_b9Fx6Z4s8bFMoncln4gvr0p7lOK00/s320/unnamed%20(48).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"44:T1b74,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eمن ظلال الناموس إلى حياة الروح: الفشل الإنساني وكفاية العهد الجديد\u003c/h2\u003e\n\u003cp\u003eتشريح للعجز البشري أمام قداسة الوصية واختبار قوة النعمة المغيرة\u003c/p\u003e\n\u003cp\u003eيتمثل الوهم الأكبر الذي قد يسيطر على الذهن الديني في الاعتقاد بقدرة \"الوصية الخارجية\" على تكميل الإنسان أو تغيير طبيعته الفاسدة؛ فهذا التصور القاصر يجعل من الناموس غاية في حد ذاته، بينما هو في حقيقته مرآة كاشفة بوضوح لعجز الإنسان الساقط. إن الناموس أو العهد القديم، رغم مصدره الإلهي السامي وقداسة جوهره لكونه جزءاً لا يتجزأ من كلمة الله، يقف \"خارج\" الإنسان دياناً له، يطالبه بما لا يملك، ويدينه على ما لا يستطيع، دون أن يمنحه القوة اللازمة للتحول الكياني.\u003c/p\u003e\n\u003cp\u003eوفي هذا السياق، يضعنا الوحي في رسالة العبرانيين أمام حقيقة جوهرية، وهي أن الناموس لم يكن إلا ظلاً للمستقبل، والظل يشير بالضرورة إلى وجود جسم حقيقي لكنه يفتقر في ذاته إلى الحياة والجوهر:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنَّ النَّامُوسَ، إِذْ لَهُ ظِلُّ الْخَيْرَاتِ الْعَتِيدَةِ لاَ نَفْسُ صُورَةِ الأَشْيَاءِ، لاَ يَقْدِرُ أَبَدًا بِنَفْسِ الذَّبَائِحِ كُلَّ سَنَةٍ، الَّتِي يُقَدِّمُونَهَا هِيَ ذَاتَهَا، أَنْ يُكَمِّلَ الَّذِينَ يَتَقَدَّمُونَ» (عبرانيين ١٠: ١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eلقد كانت تلك الذبائح والطقوس رموزاً نبوية تُشير إلى المسيح، لكنها لم تملك القدرة على منح الكمال للمتقدمين إليها، بل كانت ترتيبات مؤقتة وُضعت «إِلَى وَقْتِ الإصْلاَحِ» (عبرانيين ٩: ١٠)، أي إلى حين مجيء المسيح؛ لتثبت يقيناً أن الإنسان يحتاج إلى ما هو أعمق من مجرد الطقس الخارجي، فنحن نحتاج إلى جوهر الأشياء لا ظلالها. ومن قلب هذا الاحتياج، لم يأتِ الوعد بالعهد الجديد في نبوة إرميا من فراغ، بل جاء في لحظة تاريخية مفصلية أثبت فيها الإنسان فشله الذريع في حفظ الميثاق:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هَا أَيَّامٌ تَأْتِي، يَقُولُ الرَّبُّ، وَأَقْطَعُ مَعَ بَيْتِ إِسْرَائِيلَ وَمَعَ بَيْتِ يَهُوذَا عَهْدًا جَدِيدًا. لَيْسَ كَالْعَهْدِ الَّذِي قَطَعْتُهُ مَعَ آبَائِهِمْ يَوْمَ أَمْسَكْتُهُمْ بِيَدِهِمْ لأُخْرِجَهُمْ مِنْ أَرْضِ مِصْرَ، حِينَ نَقَضُوا عَهْدِي فَرَفَضْتُهُمْ، يَقُولُ الرَّبُّ» (إرميا ٣١: ٣١-٣٢)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eهذا الفشل التراكمي، الذي شمل الشعب والملوك والكهنة على حد سواء، كان البرهان العملي على أن المشكلة لم تكن يوماً في \"الوصية\" بل في \"القلب\" البشري المتمرد. ومن هنا صار الناموس بمثابة «مُؤَدِّبَنَا إِلَى الْمَسِيحِ، لِكَيْ نَتَبَرَّرَ بِالإِيمَانِ» (غلاطية ٣: ٢٤)، أي المربي الصارم الذي يقودنا بعجزنا لنسقط عند قدمي المخلص الوحيد. إن العهد الجديد، في جوهره، ليس مجرد نسخة محسنة من وصايا قديمة، بل هو نقلة لاهوتية من \"الخارج\" إلى \"الداخل\"؛ فبينما كُتبت الوصايا الأولى على ألواح حجرية بقيت صلبة أمام قلوب أقسى منها، جاء المسيح ليصنع عهداً يغير الطبيعة ذاتها:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«بَلْ هذَا هُوَ الْعَهْدُ الَّذِي أَقْطَعُهُ مَعَ بَيْتِ إِسْرَائِيلَ بَعْدَ تِلْكَ الأَيَّامِ، يَقُولُ الرَّبُّ: أَجْعَلُ شَرِيعَتِي فِي دَاخِلِهِمْ وَأَكْتُبُهَا عَلَى قُلُوبِهِمْ، وَأَكُونُ لَهُمْ إِلَهًا وَهُمْ يَكُونُونَ لِي شَعْبًا» (إرميا ٣١: ٣٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإنها قوة الحياة التي تنزع قلب الحجر وتغرس معرفة قلبية حية بالرب، لنصبح نحن «رِسَالَةُ الْمَسِيحِ... مَكْتُوبَةً لاَ بِحِبْرٍ بَلْ بِرُوحِ اللهِ الْحَيِّ، لاَ فِي أَلْوَاحٍ حَجَرِيَّةٍ بَلْ فِي أَلْوَاحِ قَلْبٍ لَحْمِيَّةٍ» (٢ كورنثوس ٣: ٣). وهنا تكمن عظمة العهد الجديد في كونه يحقق ما عجز عنه الناموس بسبب ضعف طبيعتنا، محولاً الوصية من دينونة خارجية تترصد السقوط إلى رغبة داخلية في القداسة تفيض من حب الفادي.\u003c/p\u003e\n\u003cp\u003eلذلك، فإن الوقوف تحت ظلال الناموس اليوم يعني محاولة إرضاء الله بمجهود بشري ذاتي، وهو مسعى محكوم عليه بالفشل سلفاً؛ إذ إن الوعي بالعجز التام هو أولى خطوات النعمة. إن المسيح لم يأتِ ليرمم القلب القديم المتصلب، بل ليعطيك قلباً جديداً كلياً؛ فلا تبحث عن الله في وصايا مكتوبة بحبر خارجك، بل استجب لعمل الروح الذي يكتب مشيئة الله في أعماقك، محولاً عباداتك من واجب ثقيل ورهق ديني إلى حياة فياضة بقوة القيامة ومجد الشركة الأبدية.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjoNchfCcFAX0cIVF00gLIbmA9salznJksuDW4sSZQuZw04MJbPSKwj8Zo8NFuAolJSiIhOft7RCa4wK4aUzD1RZyu_VePYiJBMwwRINsZnv7NW5lEPT4W_qDWV3Py8PZFnaq2UaxFSPsnw5yjD10h9AT064xuz3NGUvIXPctobLEi1Tg4GImecqNDBLF0/s1024/unnamed%20(47).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjoNchfCcFAX0cIVF00gLIbmA9salznJksuDW4sSZQuZw04MJbPSKwj8Zo8NFuAolJSiIhOft7RCa4wK4aUzD1RZyu_VePYiJBMwwRINsZnv7NW5lEPT4W_qDWV3Py8PZFnaq2UaxFSPsnw5yjD10h9AT064xuz3NGUvIXPctobLEi1Tg4GImecqNDBLF0/s320/unnamed%20(47).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"45:T1953,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eعهد الله: كيف نفهم \"العهد\" في الكتاب المقدس؟\u003c/h2\u003e\n\u003cp\u003eتأصيل لاهوتي للعلاقة السيادية بين الخالق ومختاريه\u003c/p\u003e\n\u003cp\u003eليست تعبيرات \"العهد القديم\" أو \"العهد الجديد\" مجرد أسماء اصطلاحية لمجموعات من الأسفار التي دونها الأنبياء وكتاب الوحي، فهذا المفهوم السطحي قد يحجب عن أعيننا جوهر علاقتنا بالذات الإلهية. إن مفهوم \"العهد\" (Covenant) في الفكر الكتابي الرصين يتجاوز كونه تسمية ببليوغرافية، ليعبر في جوهره عن علاقة ارتباطية سيادية يقطعها الله مع شعبه؛ فهو فعل إلهي يترجم إلى واقع معاش لا مجرد نص مكتوب.\u003c/p\u003e\n\u003cp\u003eولفك الاشتباك بين العهد كفعل ومحتوى وبين العهد كتسمية للكتابات، يجب أن ندرك ابتداءً أن كلمة \"عهد\" في أصلها العبري (Berit) واليوناني (Diatheke) لا تعني كتاباً، بل تشير إلى اتفاق أو تحالف أو تنظيم لارتباط كياني يصف واقعة قانونية وتدبيراً إلهياً سابقاً للنص المكتوب. وهذا الارتباط يتسم بطابع سيادي مطلق، حيث يكون الله هو السيد والمبادر الوحيد بتقديم العهد، كما نلمس ذلك في عهده مع آدم الذي أشار إليه النبي هوشع بقوله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَمَّا هُمْ فَكَآدَمَ تَعَدَّوْا الْعَهْدَ» (هوشع ٦: ٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eويتضح هذا النمط السيادي أيضاً في العهود مع إبراهيم وإسرائيل، حيث كان الله هو الداعي للطرف الآخر والمقدم لشروط العهد ونعمه. ومن الناحية الطقسية، يستخدم الكتاب المقدس تعبير \"يقطع\" عهداً، لارتباط هذا الفعل بتقديم ذبيحة وتقطيع حيوان، في إشارة مهيبة إلى مصير من يجسر على كسر بنوده، وهو ما يؤكده الوحي في المزامير:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«اجْمَعُوا إِلَيَّ أَتْقِيَائِي، الْقَاطِعِينَ عَهْدِي عَلَى ذَبِيحَةٍ» (مزمور ٥٠: ٥)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eتاريخياً، لم يكن شعب الله يعرف هذه الكتب باسم \"العهد القديم\"، بل عرفوها بـ \"التناخ\" (Tanakh)، وهو التقسيم الذي اعتمده السيد المسيح نفسه للإشارة إلى الوحي المعصوم حين قال: «لاَ بُدَّ أَنْ يَتِمَّ كُلُّ مَا هُوَ مَكْتُوبٌ عَنِّي فِي نَامُوسِ مُوسَى وَالأَنْبِيَاءِ وَالْمَزَامِيرِ» (لوقا ٢٤: ٤٤). وبالمثل، لم تطلق الكنيسة الأولى على الأناجيل والرسائل مسمى \"العهد الجديد\" في البداية، بل اعتبرتها إعلاناً عن العهد الذي تنبأ به إرميا وتحقق بدم المسيح. وإن استخدام الرسول بولس لتعبير «عِنْدَ قِرَاءَةِ الْعَهْدِ الْقَدِيمِ» (٢ كورنثوس ٣: ١٤) لم يكن يقصد به تسمية الكتاب، بل نظام العهد الموسوي الذي يُقرأ من خلال أسفاره.\u003c/p\u003e\n\u003cp\u003eولكي ندرك عظمة ما نطالعه، لا بد أن نميز بين الميثاق الحي وبين الوثيقة التي سجلته؛ فالفرق بينهما كالفرق بين عقد الزواج والحياة الزوجية ذاتها؛ فالعقد هو السجل القانوني والشاهد، لكن الزواج هو الشركة والوعد والحياة. إن العهد هو الخيط اللاهوتي الناظم الذي يربط أجزاء الكتاب المقدس، ففي القديم كان \"المسيح الموعود به\"، وفي الجديد هو \"المسيح الذي جاء\". إن التسمية هنا تقع من قبيل المجاز، حيث يُسمى الكتاب باسم مضمونه للتأكيد على أن سلطة الكتاب مستمدة من كونه كلمة الله التي تثبت عهده مع مختاريه، هذا العهد الذي أعلنه الرب بلسان إرميا النبي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«هَا أَيَّامٌ تَأْتِي، يَقُولُ الرَّبُّ، وَأَقْطَعُ مَعَ بَيْتِ إِسْرَائِيلَ وَمَعَ بَيْتِ يَهُوذَا عَهْدًا جَدِيدًا... أَجْعَلُ شَرِيعَتِي فِي دَاخِلِهِمْ وَأَكْتُبُهَا عَلَى قُلُوبِهِمْ، وَأَكُونُ لَهُمْ إِلهًا وَهُمْ يَكُونُونَ لِي شَعْبًا» (إرميا ٣١: ٣١-٣٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eختاماً، نحن لا نؤمن بكتاب بمعزل عن صاحب العهد، بل نؤمن بإله قطع عهداً أبدياً معنا بدم ابنه الوحيد. والأسفار المقدسة هي وثيقة العهد التي تنقلنا من مجرد القراءة إلى الدخول في الشركة الحية. إن الرهبة التي يجب أن تملأ قلوبنا ونحن نتصفح هذه الأسفار هي رعدة أمام إله يفي بوعوده مهما طال الزمن؛ فالعـهد هو الفعل الذي نقلنا من الموت إلى الحياة، والكتاب هو الخريطة المعصومة التي تضمن لنا ألا نضل الطريق إلى صاحب هذا الميثاق العظيم.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiblNiWPa535z9GKxz1i4Q9oWCdGWAd0YUYpX58WZ5ghCz7SWVQrLOsW-rlQJtsNikuxg8k7HUsyOWGACdlaS-7SLaMN_u-rz0A_YZ_GbLT1NwDVpeCU0UHoICFp1gK0wMU8e-Ym2_bIknM9ufqsHzgoFW479SlBCYhElNYbmHsqiYYr3HSXYx9Cs0xUPs/s1024/unnamed%20(46).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiblNiWPa535z9GKxz1i4Q9oWCdGWAd0YUYpX58WZ5ghCz7SWVQrLOsW-rlQJtsNikuxg8k7HUsyOWGACdlaS-7SLaMN_u-rz0A_YZ_GbLT1NwDVpeCU0UHoICFp1gK0wMU8e-Ym2_bIknM9ufqsHzgoFW479SlBCYhElNYbmHsqiYYr3HSXYx9Cs0xUPs/s320/unnamed%20(46).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"46:T1913,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eيسوع الكرمة الحقيقية: زوال الظلال بحضور الأصل\u003c/h2\u003e\n\u003cp\u003eدراسة في لاهوت الاتحاد الإلهي وإحلال الحقيقة محل الرمز\u003c/p\u003e\n\u003cp\u003eكان الهيكل الذي أعاد هيرودس تجديده في أورشليم يمثل ذروة الفخر القومي والديني لليهود، حيث كانت واجهته تضم عند المدخل المؤدي إلى القدس كرمةً ذهبيةً ضخمةً، تتدلى منها عناقيد من عنب الذهب الخالص يبلغ طول الواحد منها طول الإنسان. لم تكن تلك الكرمة مجرد زخرفة معمارية، بل كانت الرمز المرئي لإسرائيل بصفتها \"كرمة الله\" التي تغنى بها المزامير والأنبياء عبر العصور. وفي تلك الليلة المصيرية التي سبقت الصليب، وفي غمرة حديثه الوداعي الأخير مع تلاميذه، أزاح الرب يسوع الستار عن الحقيقة الكبرى التي تتجاوز كل رمز مادي بقوله:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَنَا الْكَرْمَةُ الْحَقِيقِيَّةُ وَأَبِي الْكَرَّامُ» (يوحنا ١٥: ١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن هذا الإعلان لم يكن مجرد استعارة أدبية عابرة أو تشبيه لتبسيط المعنى، بل جاء كإعلان جوهري عبر مصطلح «المثل» أو «الماشال» (Mashal)، وهو بمثابة لغز لاهوتي يكشف حقائق الملكوت المخبوءة. فبقوله «أَنَا الْكَرْمَةُ الْحَقِيقِيَّةُ»، كان يسوع يزيح إسرائيل التاريخية ليحل هو محلها كأصل وحيد للحياة ومركز أوحد للعهد الجديد. لقد استخدم الوحي صفة «الْحَقِيقِيَّةُ» (alēthinos) ليضع تضاداً صارخاً مع كرمة العهد القديم التي أخفقت في تقديم الثمر المرجو، فرغم العناية الإلهية الفائقة، سجل النبي إشعياء خيبة الأمل الإلهية في تلك الكرمة الرمزية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لأَنْشِدَنَّ عَنْ حَبِيبِي نَشِيدَ مُحِبِّي لِكَرْمِهِ: كَانَ لِحَبِيبِي كَرْمٌ عَلَى أَكَمَةٍ خَصِيبَةٍ، فَنَقَبَهُ وَنَقَّى حِجَارَتَهُ وَغَرَسَهُ كَرْمَ سَوْرَقَ، وَبَنَى بُرْجاً فِي وَسَطِهِ، وَنَقَرَ فِيهِ أَيْضاً مِعْصَرَةً، فَانْتَظَرَ أَنْ يَصْنَعَ عِنَباً فَصَنَعَ عِنَباً رَدِيئاً... فَكَرْمُ رَبِّ الْجُنُودِ هُوَ بَيْتُ إِسْرَائِيلَ، وَغَرْسُ لَذَّتِهِ رِجَالُ يَهُوذَا. فَانْتَظَرَ حَقّاً فَإِذَا ظُلْمٌ، وَعَدْلاً فَإِذَا صُرَاخٌ» (إشعياء ٥: ١-٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن إخفاق إسرائيل لم يكن قصوراً في التدبير الإلهي، بل كان برهاناً على عجز الطبيعة البشرية الساقطة تحت نير الناموس عن إنتاج قداسة حقيقية. ومن قلب هذا العجز، انطلقت صرخة الاستغاثة النبوية في المزامير طلباً لإصلاح الكرمة المقطوعة، وهي الصرخة التي وجدت استجابتها الكاملة والنهائية في شخص يسوع المسيح، \"رجل اليمين\" و\"ابن آدم\" الذي حقق في ناسوته الطاعة الكاملة التي عجزت عنها إسرائيل القومية:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«يَا إِلَهَ الْجُنُودِ ارْجِعَنَّ. اطَّلِعْ مِنَ السَّمَاءِ وَانْظُرْ وَتَعَهَّدْ هَذِهِ الْكَرْمَةَ، وَالْغَرْسَ الَّذِي غَرَسَتْهُ يَمِينُكَ، وَالاِبْنَ الَّذِي اخْتَرْتَهُ لِنَفْسِكَ. هِيَ مَحْرُوقَةٌ بِنَارٍ، مَقْطُوعَةٌ. مِنْ انْتِهَارِ وَجْهِكَ يَبِيدُونَ. لِتَكُنْ يَدُكَ عَلَى رَجُلِ يَمِينِكَ، وَعَلَى ابْنِ آدَمَ الَّذِي اخْتَرْتَهُ لِنَفْسِكَ، فَلاَ نَرْتَدَّ عَنْكَ» (مزمور ٨٠: ١٤-١٨)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبناءً على هذا الإعلان الجوهري، انتقل المؤمن من زمن الرموز والظلال إلى عصر الحقيقة والجوهر، حيث لم يعد امتياز الدخول في العهد مرتبطاً بالعلامات الطقسية كالختان أو الانتماء العرقي، بل صار محصوراً في \"الاتحاد العضوي\" بالمسيح عبر عهد النعمة. إن هذا التحول اللاهوتي يعيد تعريف شعب الله بالكامل؛ فالمسيح اليوم هو المركز الذي يجتمع حوله المختارون من كل أمة وقبيلة، والكنيسة ليست مجرد خطة بديلة، بل هي التحقيق الفعلي للقصد الإلهي بجمع شعب مقدس يثبت في الكرمة الحقيقية ويستمد منها حياة لا تنقطع. فكل من ليس ثابتاً في هذا المصدر الحي يظل غصناً مقطوعاً يفتقر إلى جوهر الحياة، بينما يظل المختارون ثابتين في المسيح، يفيضون بثمر البر الذي يرضي قلب الآب الكرّام.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhdyGo8kfSmNO5JdP1wBRkBQy6V_RDqsHHFOH9rfVdZlp7bLQvJpCuoX3_H1-1gpi15rfl-yBCNECpsMd6IuOQXLGgt__NDh2GHGrIsQ-72zanllFvd0_bzjUyL7dpXc3rWRTjZOriRTWqLHK5QAO7Z4WFbAGoXtbX3PfZjy4Nt9mRtm3940Js8YV6CahA/s1024/unnamed%20(45).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhdyGo8kfSmNO5JdP1wBRkBQy6V_RDqsHHFOH9rfVdZlp7bLQvJpCuoX3_H1-1gpi15rfl-yBCNECpsMd6IuOQXLGgt__NDh2GHGrIsQ-72zanllFvd0_bzjUyL7dpXc3rWRTjZOriRTWqLHK5QAO7Z4WFbAGoXtbX3PfZjy4Nt9mRtm3940Js8YV6CahA/s320/unnamed%20(45).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"47:T184a,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eحرية الثبات أم حرية المعرفة؟\u003c/h2\u003e\n\u003cp\u003eتشريح مغالطة \"الاجتزاء السياقي\" في الوعد بالتحرر\u003c/p\u003e\n\u003cp\u003eتتردد في الأروقة العامة والخطابات التنويرية كلمات جليلة، غالباً ما تُنتزع من سياقها لتُقدَّم كقانون كوني يمنح الحرية لكل من امتلك معلومة أو أدرك حقيقة مجردة، وهي قول السيد المسيح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«وَتَعْرِفُونَ الْحَقَّ، وَالْحَقُّ يُحَرِّرُكُمْ» (يوحنا ٨: ٣٢)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eفي هذا المشهد، يقف المتحدث مدفوعاً بحماسة معرفية ليعلن أن \"المعرفة\" هي مفتاح الخلاص من قيود الجهل والاستبداد، محوِّلاً النص الإنجيلي إلى مبدأ فلسفي عام. وبالرغم من جاذبية هذا الفهم للعقل الحديث، إلا أنه في جوهره يفرغ كلمات الرب من سلطانها اللاهوتي، ويحول \"الحرية الروحية\" إلى مجرد \"تحرر معرفي\" سطحي. إن الاستقامة التفسيرية تقتضي منا التوقف عن قراءة هذه الآية كجزيرة منعزلة، والعودة إلى الارتباط العضوي بالشرط الذي وضعه الرب في الآية السابقة لها؛ إذ يقع التناول الشائع في مغالطة \"الاجتزاء البنيوي\" باقتطاع النتيجة من مقدمتها الشرطية.\u003c/p\u003e\n\u003cp\u003eإن فحص واقع النص يفرض صرامة لاهوتية؛ فالسيد المسيح لم يطلق وعد الحرية كقاعدة عامة للبشرية، بل وجه حديثه لفئة محددة من اليهود الذين آمنوا به، واضعاً بنية شرطية لا تقبل المساومة تصرح بوضوح:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«إِنَّكُمْ إِنْ ثَبَتُّمْ فِي كَلاَمِي فَبِالْحَقِيقَةِ تَكُونُونَ تَلاَمِيذِي» (يوحنا ٨: ٣١)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eويظهر الخطأ المنهجي الجسيم في محاولة القفز فوق كلمة «إِنْ» الشرطية؛ فبدون \"الثبات في الكلمة\" لا توجد تلمذة حقيقية، وبدون التلمذة يظل \"إدراك الحق\" متعذراً، وبالتالي تظل \"الحرية\" بعيدة المنال. إن المعرفة والحرية في القاموس الإنجيلي هما نتيجتان مترتبتان حصراً على فعل الثبات الكياني. ولعل رد الفعل اليهودي الذي سجلته الأناجيل، متمثلاً في فخرهم العرقي بكونهم ذرية إبراهيم وادعائهم أنهم لم يُستعبدوا لأحد قط، يكشف زيف ادعاء الحرية بعيداً عن الثبات في المسيح؛ إذ تظل المعرفة دون هذا الثبات مجرد تراكم ذهني عاجز عن فك قيود الإرادة المستعبدة للخطية.\u003c/p\u003e\n\u003cp\u003eومن هذا المنطلق، ندرك أن الفرق بين المعرفة التي ينشدها العالم وتلك التي يقصدها المسيح هو فرق جوهري؛ فالحق في لاهوت القديس يوحنا ليس مجموعة من القوانين أو النظريات، بل هو \"شخص\" تجسد في قول الرب: «أَنَا هُوَ الطَّرِيقُ وَالْحَقُّ وَالْحَيَاةُ» (يوحنا ١٤: ٦). لذا، فإن معرفة الحق ليست استيعاباً لعقيدة جافة، بل هي اختبار لسيادة المسيح المطلقة على الحياة. إن الحرية هنا لا تعني \"القدرة على فعل ما نشاء\"، بل هي \"التحرر من عبودية الذات لفعل ما يمجّد الله\"، وهي قوة تنبع من فعل النعمة الذي يُثبت المؤمن في الكلمة (Logos) كما يثبت الغصن في الكرمة ليحيا.\u003c/p\u003e\n\u003cp\u003eوعليه، فإن معرفة الحق التي لا تقترن بتلمذة خاضعة هي في واقع الأمر معرفة كاذبة، تفتقر إلى القوة المُغيرة للكيان. إن الحق الذي يحرر هو الحق الذي يسكن فينا ونثبت نحن فيه، في رحلة تبدأ بالخضوع لسيادة الكلمة، وتمر بصراع التفكيك لكل أصنام الذات، وصولاً إلى بهاء الحرية التي لا يمنحها إلا الابن:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«فَإِنْ حَرَّرَكُمْ الاِبْنُ فَبِالْحَقِيقَةِ تَكُونُونَ أَحْرَاراً» (يوحنا ٨: ٣٦)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eإن احترام قدسية النص يقتضي ألا نفصل الثمرة عن جذرها؛ فالحرية المسيحية هي ثمرة شجرة التلمذة، والتلمذة هي الاستجابة الحية لنداء الثبات. إن ادعاء الحرية دون الخضوع لكلام المسيح هو وقوع في عبودية خفية لوهم المعرفة. فلنتمسك إذاً بالحق في كليته، معترفين بأن حريتنا ليست فيما نعرفه \"عن\" المسيح من معلومات، بل في معرفتنا \"لشخص\" المسيح نفسه، وفي تمام تبعيتنا لذاك الذي حررنا بروحه القدوس؛ روح الحق والحياة والحرية الحقيقية.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjLcq1zEU8eWyR6OAaiCqrNB7Sahx8gKtMsIXlFAAjxQOq3O26YqW1jetpndghrlI2r-xEqk8O2C-1Jed40vxLPq-xcQqqH8cGKZB3cZUURuvH17wWV-8_-bBf2nSXlxfLjFvmbo5Ox3BVaO2HKck699XQDmEshKMBVIkQlzOef_V9C7c3BgiwBW4iCxn0/s1024/unnamed%20(44).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjLcq1zEU8eWyR6OAaiCqrNB7Sahx8gKtMsIXlFAAjxQOq3O26YqW1jetpndghrlI2r-xEqk8O2C-1Jed40vxLPq-xcQqqH8cGKZB3cZUURuvH17wWV-8_-bBf2nSXlxfLjFvmbo5Ox3BVaO2HKck699XQDmEshKMBVIkQlzOef_V9C7c3BgiwBW4iCxn0/s320/unnamed%20(44).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"48:T1f1e,"])</script><script>self.__next_f.push([1,"\u003ch2\u003e«أَسْتَطِيعُ كُلَّ شَيْءٍ».. هل هي آية \"سوبر مان\" المسيحي؟\u003c/h2\u003e\n\u003cp\u003eقراءة في سياق النص تعيد للآية هيبتها المسلوبة\u003c/p\u003e\n\u003cp\u003eلعلها الآية الأكثر شهرةً في العصر الحديث، إذ نجدها مطبوعة على القمصان الرياضية، ومحفورة على ميداليات الفائزين كشعار للنصر والتمكين الشخصي:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي» (فيلبي ٤: ١٣)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eبيد أنه في المخيلة الشعبية المعاصرة، انحرفت هذه الكلمات لتتحول إلى ما يشبه \"تعويذة القوة الخارقة\"، حيث أضحى التفسير الضمني المعتاد يروج لفكرة مفادها أنه طالما كان المسيح معي، فسأحقق أهدافي الذاتية، وأفوز في مبارياتي، وأنجح في مشروعاتي، بل وأحطم كل الأرقام القياسية. لقد تم اختزال شخص المسيح هنا ليكون مجرد \"وقود\" يوضع في محركات طموحاتنا الشخصية لبلوغ خط النهاية قبل الجميع؛ وهو تصوير يحول المؤمن إلى \"سوبر مان\" لا يقهر، ويجعل من الآية وعداً بالنجاح الدنيوي الكاسح.\u003c/p\u003e\n\u003cp\u003eولكن، حين نقترب بوقار أكاديمي من النص، يبرز السؤال الجوهري: هل كان هذا ما يدور في ذهن بولس الرسول حقاً حين سطر هذه الكلمات؟ أم أننا قمنا بانتزاع النص من تربته الأصلية لنسقط عليه أحلامنا الاستهلاكية الحديثة؟ إن القاعدة الذهبية في التفسير تقرر أن \"السياق هو الملك\"، وبالعودة للظرف التاريخي لهذه الرسالة، نصطدم بحقيقة صادمة؛ فبولس لم يكتب هذه الكلمات وهو يعتلي منصة تكريم أو يفتتح صرحاً كنسياً عملاقاً، بل كتبها وهو يرسف في الأغلال داخل السجن، يواجه احتمالية الموت، ويعتمد على تبرعات كنيسة فيلبي لتسديد أدنى احتياجاته المعيشية.\u003c/p\u003e\n\u003cp\u003eإن قراءة الآيات السابقة مباشرة تعيد تشكيل فهمنا للنص بشكل جذري، حيث يقول الرسول في ذات الرسالة:\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«لَيْسَ أَنِّي أَقُولُ مِنْ جِهَةِ احْتِيَاجٍ، فَإِنِّي قَدْ تَعَلَّمْتُ أَنْ أَكُونَ مُكْتَفِيًا بِمَا أَنَا فِيهِ. أَعْرِفُ أَنْ أَتَّضِعَ وَأَعْرِفُ أَيْضًا أَنْ أَسْتَفِضِلَ. فِي كُلِّ شَيْءٍ وَفِي جَمِيعِ الأَشْيَاءِ قَدْ تَدَرَّبْتُ أَنْ أَشْبَعَ وَأَنْ أَجُوعَ، وَأَنْ أَسْتَفِضِلَ وَأَنْ أَنْقُصَ» (فيلبي ٤: ١١-١٢)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003eوبناءً على هذا التدفق السردي، تنكشف لنا ثلاثة مفاتيح لاهوتية لفهم القوة الحقيقية؛ أولها أن تعبير «كل شيء» (Panta) ليس شيكاً على بياض لممارسة المعجزات الخارقة أو تحقيق الثراء، بل هو إشارة محددة للقائمة التي ذكرها في الآية السابقة من جوع وشبع ونقص واستفاضة. المعنى الدقيق هنا هو القدرة على الثبات الداخلي والرضا وسط الظروف المتناقضة، وليس القدرة على \"تغيير الظروف\" لتناسب رغباتنا.\u003c/p\u003e\n\u003cp\u003eأما المفتاح الثاني فيكمن في سر «الاكتفاء» (Autarkēs) الوارد في الآية الحادية عشرة، وهو مصطلح استعاره بولس من الفلسفة الرواقية وقلبه رأساً على عقب. فبينما كان الرواقيون ينشدون الاكتفاء المستمد من كبرياء الذات واستقلالها عن العالم، يؤكد بولس أن اكتفاءه ليس ذاتياً، بل هو مستمد من مصدر خارجي، وهو ما يفسر قوله لاحقاً «فِي الْمَسِيحِ». وهذا يقودنا للمفتاح الثالث في قوله «تدربت» (Memuēmai)، وهو فعل يشير في أصله إلى \"الدخول في سر\" أو \"الاستنارة بمعرفة باطنية\"، وكأن بولس يعلن اكتشافه للوصفة السرية التي تمنعه من الانهيار تحت الضغط أو الفساد تحت الرخاء، وهي الاستمداد اللحظي للقوة من شخص الفادي.\u003c/p\u003e\n\u003cp\u003eمن هنا، ندرك حجم المغالطة اللاهوتية التي تقع فيها التفسيرات الشعبية، حيث تحول المسيح من \"مصدر\" إلى \"أداة\". في الطرح السطحي، تكون الغاية هي النجاح الشخصي والمسيح هو \"البطارية\" التي تشحن المؤمن للوصول إليها، وهذا نوع من الوثنية المقنعة. أما المنظور الكتابي الرصين، فيجعل المسيح هو الغاية والمصدر معاً؛ فالقوة المقصودة (Endunamounti) هي قوة \"احتمال\" وصمود، وليست مجرد قوة \"إنجاز\" مادي. إنها ذات القوة التي جعلت الشهداء يرتلون وسط ألسنة اللهب، وجعلت بولس يكرز وهو مقيد بالسلاسل.\u003c/p\u003e\n\u003cp\u003eقد يشعر البعض بخيبة أمل حين يدرك أن الآية لا تعد بانتصارات أرضية محتومة، لكن التفسير الكتابي يقدم رجاءً أعمق وأكثر واقعية؛ ذلك أن تفسير \"سوبر مان\" يتهاوى فور إصابة المؤمن بمرض أو خسارة مادية، مخلفاً وراءه تساؤلات مريرة حول صدق الوعد الإلهي. أما التفسير الصحيح، فهو الوحيد الذي يصمد في وجه مآسي الحياة، إذ يعلن للمؤمن أنه حتى في وادي ظل الموت أو سجن الظروف القاسية، فإنه يستطيع أن يحتفظ بفرحه كاملاً ويظل مسبحاً وشاكراً، لأن القوة النابضة في داخله ليست مشروطة بالظرف الجيد، بل هي مستمدة من المسيح الحي.\u003c/p\u003e\n\u003cp\u003eفي الختام، إن آية «أَسْتَطِيعُ كُلَّ شَيْءٍ» ليست وعداً بأنك لن تُهزم أبداً في معارك العالم، بل هي ضمانة يقينية بأنك لن تُسحق أبداً تحت وطأتها. إنها ليست آية للأبطال الذين ينتظرون تصفيق الجماهير، بل هي ترنيمة المتألمين الصامدين الذين يبتسمون في وجه العاصفة، لأن في أعماقهم قوةً سماويةً تتجاوز حدود هذا العالم الفاني.\u003c/p\u003e\n\u003cp\u003e\u003ca href=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiLnbSqZhpxZDU61y4ngf_41zdUNNvUoN9BlhcM4Aas4Mn6jh6pmYG3CrF9Uz-k6Sf8NJB58nbQjbRBIIr-UIgL_inL-NY7to_jyx14r9dQ7hzXFiJKKqANLlti7cau2Yn9bYE34D93jjvIGb2XWsUXRPKiJKdPqaPtvkXMdZbiZpNS7-aBZ_2besUm2jg/s1024/unnamed%20(27).jpg\"\u003e\u003cimg src=\"https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiLnbSqZhpxZDU61y4ngf_41zdUNNvUoN9BlhcM4Aas4Mn6jh6pmYG3CrF9Uz-k6Sf8NJB58nbQjbRBIIr-UIgL_inL-NY7to_jyx14r9dQ7hzXFiJKKqANLlti7cau2Yn9bYE34D93jjvIGb2XWsUXRPKiJKdPqaPtvkXMdZbiZpNS7-aBZ_2besUm2jg/s320/unnamed%20(27).jpg\" alt=\"\"\u003e\u003c/a\u003e\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"49:T1229,"])</script><script>self.__next_f.push([1,"\u003ch2\u003eملكوت الله: سيادة الدهر الآتي التي غزت الحاضر\u003c/h2\u003e\n\u003cp\u003eسلسلة \"أصداء المعنى الأول\" - إعادة تأسيس للمفاهيم الكتابية\u003c/p\u003e\n\u003cblockquote\u003e\n\u003cp\u003e«مِنْ ذلِكَ الزَّمَانِ ابْتَدَأَ يَسُوعُ يَكْرِزُ وَيَقُولُ: «تُوبُوا لأَنَّهُ قَدِ اقْتَرَبَ مَلَكُوتُ السَّمَاوَاتِ».» (متى ٤: ١٧)\u003c/p\u003e\n\u003c/blockquote\u003e\n\u003cp\u003e\u003cstrong\u003eلغوياً وتاريخياً، مصطلح \"ملكوت الله\" (Basileia) في القرن الأول لم يكن يشير إلى \"حيز جغرافي\" (Realm)، أو إلى مكان تنتقل إليه بعد الموت، أو إلى ما نسميه اليوم \"الجنة\"، بل كان يشير إلى \"فعل السيادة والحكم الديناميكي\" (Dynamic Reign) لله نفسه.\u003c/strong\u003e عندما استخدم يسوع هذا المصطلح، كان يخاطب التوقع اليهودي الملموس بتدخل يهوه المباشر لإنهاء حكم الوثنية واستعادة المجد. الصدمة التي أحدثها يسوع لم تكن في استخدام المصطلح، بل في قلب طبيعته؛ فقد أعلن أن سيادة -مُلك أو حكم- الله هذه تأتي عبر الضعف والصليب، وليس عبر السيف العسكري الذي توقعه اليهود، والذي أدى تمسكهم به إلى خراب الهيكل في ثورتهم الأولى (٧٠م)، ثم إلى خراب أورشليم النهائي في ثورتهم الثانية (١٣٥م).\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003eلاهوتياً، الملكوت هو \"غزو أخروي\"؛ حيث اقتحم \"الدهر الآتي\" أراضي \"الدهر الحاضر الشرير\" في شخص يسوع المسيح.\u003c/strong\u003e هذا يخلق التوتر المقدس الذي نعيش فيه الآن: الملكوت قد \"دُشِّن\" (بدأ) بالفعل (Already) بانتصار المسيح على الموت وحلول الروح القدس، لكنه \"لم يكتمل بعد\" (Not Yet) في مجده النهائي [١]. إذاً، الملكوت ليس هروباً مستقبلياً من الأرض، بل هو استعادة الله لسيادته الإلهية على الأرض، وهي سيادة قائمة الآن وسط مقاومة العدو.\u003c/p\u003e\n\u003cp\u003eالملكوت هو استعادة لما فُقد في عدن؛ أي حكم الله المباشر على خليقته. وهو يمر عبر العهد مع داود الذي وعده الله بأن من نسله يأتي ملك يملك إلى الأبد، وقد تحقق هذا في يسوع الذي
